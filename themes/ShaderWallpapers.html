      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>

s ease; letter-spacing:.01em; }\n  kbd{ font:inherit; font-size:11px; background:rgba(255,255,255,0.10); border:1px solid var(--ui-stroke);\n    border-radius:6px; padding:1px 6px; color:var(--ui-text); }\n\n  @media (max-width:640px){\n    #dock{ bottom:16px; gap:2px; padding:6px; max-width:calc(100vw - 20px); overflow-x:auto; }\n    .chip{ padding:8px 11px; font-size:12.5px; }\n    #panel{ right:12px; left:12px; width:auto; bottom:76px; }\n    #nameBadge{ left:74px; top:20px; }\n    .hint{ display:none; }\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n  \n  <canvas id=\"gl\"><\u002Fcanvas>\n\n  <button id=\"uiToggle\" title=\"Wallpaper controls (H)\" aria-label=\"Toggle wallpaper controls\">\n    <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M4 6h11M4 12h7M4 18h13\"><\u002Fpath><circle cx=\"18\" cy=\"6\" r=\"2\"><\u002Fcircle><circle cx=\"14\" cy=\"12\" r=\"2\"><\u002Fcircle><circle cx=\"20\" cy=\"18\" r=\"2\"><\u002Fcircle><\u002Fsvg>\n  <\u002Fbutton>\n\n  <div id=\"nameBadge\">\n    <span class=\"idx\" id=\"badgeIdx\">01<\u002Fspan>\n    <span class=\"nm\" id=\"badgeName\">Aurora Silk<\u002Fspan>\n    <span class=\"sub\" id=\"badgeSub\">drifting light ribbons<\u002Fspan>\n  <\u002Fdiv>\n\n  <div id=\"panel\" class=\"ui hidden\">\n    <h4>Adjust<\u002Fh4>\n    <div class=\"row\">\n      <div class=\"lab\"><span>Speed<\u002Fspan><span class=\"val\" id=\"vSpeed\">1.00×<\u002Fspan><\u002Fdiv>\n      <input id=\"sSpeed\" type=\"range\" min=\"0\" max=\"2.5\" step=\"0.01\" value=\"1\">\n    <\u002Fdiv>\n    <div class=\"row\">\n      <div class=\"lab\"><span>Scale<\u002Fspan><span class=\"val\" id=\"vScale\">1.00×<\u002Fspan><\u002Fdiv>\n      <input id=\"sScale\" type=\"range\" min=\"0.35\" max=\"3\" step=\"0.01\" value=\"1\">\n    <\u002Fdiv>\n    <div class=\"row\">\n      <div class=\"lab\"><span>Grain<\u002Fspan><span class=\"val\" id=\"vGrain\">0.04<\u002Fspan><\u002Fdiv>\n      <input id=\"sGrain\" type=\"range\" min=\"0\" max=\"0.16\" step=\"0.005\" value=\"0.04\">\n    <\u002Fdiv>\n    <div class=\"row\">\n      <div class=\"lab\" style=\"margin-bottom:10px\"><span>Palette<\u002Fspan><span class=\"val\" id=\"vPal\">Jewel<\u002Fspan><\u002Fdiv>\n      <div class=\"swatches\" id=\"swatches\"><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div id=\"dock\" class=\"ui\">\n    <div id=\"chips\" style=\"display:flex; gap:4px;\"><\u002Fdiv>\n    <div class=\"divider\"><\u002Fdiv>\n    <button class=\"icobtn\" id=\"btnSettings\" title=\"Adjust\">\n      <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M4 6h11M4 12h7M4 18h13\"><\u002Fpath><circle cx=\"18\" cy=\"6\" r=\"2\"><\u002Fcircle><circle cx=\"14\" cy=\"12\" r=\"2\"><\u002Fcircle><circle cx=\"20\" cy=\"18\" r=\"2\"><\u002Fcircle><\u002Fsvg>\n    <\u002Fbutton>\n    <button class=\"icobtn\" id=\"btnSave\" title=\"Save PNG\">\n      <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 3v12m0 0l-4-4m4 4l4-4\"><\u002Fpath><path d=\"M5 21h14\"><\u002Fpath><\u002Fsvg>\n    <\u002Fbutton>\n    <button class=\"icobtn\" id=\"btnFs\" title=\"Fullscreen\">\n      <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M4 9V4h5M20 9V4h-5M4 15v5h5M20 15v5h-5\"><\u002Fpath><\u002Fsvg>\n    <\u002Fbutton>\n  <\u002Fdiv>\n\n  <div class=\"hint\" id=\"hint\">Press <kbd>H<\u002Fkbd> to hide UI · <kbd>←<\u002Fkbd> <kbd>→<\u002Fkbd> to switch<\u002Fdiv>\n\n<script>\n/* ============================================================= *\n *  Shader Wallpapers — WebGL renderer + 6 animated shaders\n * ============================================================= */\n\n// ---------- Palettes (4 stops each, dark → light) ----------\nfunction hex(h){ return [parseInt(h.slice(1,3),16)/255, parseInt(h.slice(3,5),16)/255, parseInt(h.slice(5,7),16)/255]; }\nconst PALETTES = [\n  { name:\"Jewel\",   c:[\"#0a0a23\",\"#3b1d8f\",\"#1f8aa0\",\"#e25fd0\"] },\n  { name:\"Sunset\",  c:[\"#180a26\",\"#b23a6a\",\"#ff7a4d\",\"#ffd27a\"] },\n  { name:\"Mint\",    c:[\"#062126\",\"#2bbf9a\",\"#9d8bff\",\"#8fd6ff\"] },\n  { name:\"Ember\",   c:[\"#0a0604\",\"#6e0f1a\",\"#ff7b29\",\"#ffd36b\"] },\n  { name:\"Mono\",    c:[\"#0b0b0f\",\"#3a3f4b\",\"#aeb8c6\",\"#eaf1ff\"] },\n];\n\n// ---------- GLSL ----------\nconst VERT = `attribute vec2 p; void main(){ gl_Position = vec4(p,0.0,1.0); }`;\n\nconst HEAD = `precision highp float;\nuniform vec2 u_res; uniform float u_time; uniform float u_speed; uniform float u_scale; uniform float u_grain;\nuniform vec3 u_p0,u_p1,u_p2,u_p3;\nfloat hash21(vec2 p){ p=fract(p*vec2(123.34,345.45)); p+=dot(p,p+34.345); return fract(p.x*p.y); }\nfloat vnoise(vec2 p){ vec2 i=floor(p), f=fract(p); f=f*f*(3.0-2.0*f);\n  float a=hash21(i), b=hash21(i+vec2(1,0)), c=hash21(i+vec2(0,1)), d=hash21(i+vec2(1,1));\n  return mix(mix(a,b,f.x), mix(c,d,f.x), f.y); }\nfloat fbm(vec2 p){ float s=0.0,a=0.5; mat2 m=mat2(1.6,1.2,-1.2,1.6);\n  for(int i=0;i<6;i++){ s+=a*vnoise(p); p=m*p; a*=0.5; } return s; }\nvec3 pal4(float t){ t=clamp(t,0.0,1.0);\n  if(t<0.3333) return mix(u_p0,u_p1, t/0.3333);\n  else if(t<0.6666) return mix(u_p1,u_p2,(t-0.3333)/0.3333);\n  return mix(u_p2,u_p3,(t-0.6666)/0.3334); }\nfloat grain(vec2 uv){ return hash21(uv*u_res + fract(u_time)*97.0); }\n`;\n\nconst SHADERS = [\n  { id:\"aurora\", name:\"Aurora Silk\", sub:\"drifting light ribbons\", pal:2, frag:`\n  void main(){\n    vec2 uv=(gl_FragCoord.xy-0.5*u_res)/u_res.y;\n    float t=u_time*u_speed*0.10;\n    vec2 q=uv*u_scale;\n    float warp=fbm(q*1.5+vec2(0.0,t));\n    float bands=fbm(q*vec2(0.6,1.8)+vec2(warp*1.6, t*1.5));\n    float v=fbm(q+vec2(bands*1.2,-t));\n    float m=smoothstep(0.15,0.95,v+bands*0.45);\n    vec3 col=pal4(m);\n    col*=0.75+0.55*bands;\n    col=mix(u_p0*0.45, col, smoothstep(0.0,0.7,v));\n    col+=(grain(uv)-0.5)*u_grain;\n    gl_FragColor=vec4(col,1.0);\n  }`},\n  { id:\"nebula\", name:\"Plasma Nebula\", sub:\"deep-space clouds & stars\", pal:0, frag:`\n  void main(){\n    vec2 uv=(gl_FragCoord.xy-0.5*u_res)/u_res.y;\n    float t=u_time*u_speed*0.08;\n    vec2 q=uv*u_scale*1.2;\n    vec2 w=vec2(fbm(q+vec2(t,0.0)), fbm(q+vec2(0.0,t)+5.0));\n    float n=fbm(q+w*2.5);\n    vec3 col=pal4(n);\n    col=mix(u_p0*0.25, col, smoothstep(0.08,0.85,n));\n    float st=hash21(floor(uv*u_scale*180.0));\n    st=pow(st,42.0)*1.6;\n    col+=st*(0.6+0.4*sin(u_time*0.8+uv.x*60.0))*vec3(0.9,0.95,1.0);\n    col+=(grain(uv)-0.5)*u_grain;\n    gl_FragColor=vec4(col,1.0);\n  }`},\n  { id:\"oil\", name:\"Oil Slick\", sub:\"iridescent thin film\", pal:4, frag:`\n  vec3 cosPal(float t){ return 0.5+0.5*cos(6.28318*(vec3(t)+vec3(0.0,0.33,0.67))); }\n  void main(){\n    vec2 uv=(gl_FragCoord.xy-0.5*u_res)/u_res.y;\n    float t=u_time*u_speed*0.12;\n    vec2 q=uv*u_scale*2.0;\n    float warp=fbm(q+vec2(t,t*0.7));\n    float f=fbm(q*1.5+warp*2.0+t);\n    float film=fbm(q+f*1.5);\n    vec3 rain=cosPal(film*1.5+f*0.5+t);\n    vec3 col=mix(u_p0*0.5, rain, 0.82);\n    col=mix(col, u_p2, 0.18*sin(film*6.0+t));\n    col+=(grain(uv)-0.5)*u_grain;\n    gl_FragColor=vec4(col,1.0);\n  }`},\n  { id:\"lava\", name:\"Lava Lamp\", sub:\"slow morphing blobs\", pal:3, frag:`\n  void main(){\n    vec2 uv=(gl_FragCoord.xy-0.5*u_res)/u_res.y;\n    float t=u_time*u_speed*0.4;\n    float s=u_scale;\n    float field=0.0;\n    for(int i=0;i<6;i++){\n      float fi=float(i);\n      vec2 c=vec2(sin(t*0.3+fi*1.7)*0.62, cos(t*0.23+fi*2.1)*0.5);\n      c+=0.2*vec2(sin(t*0.5+fi), cos(t*0.4+fi*1.3));\n      float r=(0.17+0.06*sin(t+fi))/s;\n      field+=r*r/dot(uv-c,uv-c);\n    }\n    float m=smoothstep(0.55,1.5,field);\n    vec3 col=mix(u_p0, pal4(clamp(field*0.4,0.0,1.0)), m);\n    col+=(grain(uv)-0.5)*u_grain;\n    gl_FragColor=vec4(col,1.0);\n  }`},\n  { id:\"metal\", name:\"Liquid Metal\", sub:\"specular chrome waves\", pal:4, frag:`\n  void main(){\n    vec2 uv=(gl_FragCoord.xy-0.5*u_res)/u_res.y;\n    float t=u_time*u_speed*0.15;\n    vec2 q=uv*u_scale*1.5;\n    float w=fbm(q+vec2(t,0.0));\n    float n=fbm(q*1.5+w*2.0+vec2(0.0,t));\n    float m=sin(n*6.28318*1.5+t*2.0)*0.5+0.5;\n    float spec=pow(m,6.0);\n    vec3 base=mix(u_p0,u_p1,n);\n    vec3 col=base+spec*u_p3;\n    col=mix(col,u_p2,0.15*w);\n    col+=(grain(uv)-0.5)*u_grain;\n    gl_FragColor=vec4(col,1.0);\n  }`},\n  { id:\"sunset\", name:\"Sunset Drift\", sub:\"calm gradient & glow\", pal:1, frag:`\n  void main(){\n    vec2 uvp=gl_FragCoord.xy/u_res;\n    float t=u_time*u_speed*0.05;\n    vec2 c=(gl_FragCoord.xy-0.5*u_res)/u_res.y*u_scale;\n    float n=fbm(c*0.6+vec2(t,t*0.5))*0.4;\n    float g=uvp.y+n-0.1*sin(uvp.x*3.0+t*2.0);\n    vec3 col=pal4(clamp(g,0.0,1.0));\n    vec2 sun=vec2(0.5+0.2*sin(t),0.34+0.1*cos(t*0.7));\n    float d=length((uvp-sun)*vec2(u_res.x/u_res.y,1.0));\n    col+=u_p3*smoothstep(0.55,0.0,d)*0.28;\n    col+=(grain(uvp)-0.5)*u_grain;\n    gl_FragColor=vec4(col,1.0);\n  }`},\n];\n\n// ---------- WebGL setup ----------\nconst canvas = document.getElementById('gl');\nconst gl = canvas.getContext('webgl', { antialias:true, preserveDrawingBuffer:true, premultipliedAlpha:false });\nif(!gl){ document.body.innerHTML = '<div style=\"color:#fff;font:16px sans-serif;padding:40px\">WebGL is not available in this browser.<\u002Fdiv>'; }\n\nfunction compile(type, src){\n  const sh = gl.createShader(type);\n  gl.shaderSource(sh, src); gl.compileShader(sh);\n  if(!gl.getShaderParameter(sh, gl.COMPILE_STATUS)){\n    console.error('Shader error:', gl.getShaderInfoLog(sh), '\\n', src);\n    return null;\n  }\n  return sh;\n}\nfunction program(fragBody){\n  const p = gl.createProgram();\n  gl.attachShader(p, compile(gl.VERTEX_SHADER, VERT));\n  gl.attachShader(p, compile(gl.FRAGMENT_SHADER, HEAD + fragBody));\n  gl.linkProgram(p);\n  if(!gl.getProgramParameter(p, gl.LINK_STATUS)){ console.error('Link error:', gl.getProgramInfoLog(p)); }\n  return p;\n}\n\n// full-screen triangle\nconst buf = gl.createBuffer();\ngl.bindBuffer(gl.ARRAY_BUFFER, buf);\ngl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 3,-1, -1,3]), gl.STATIC_DRAW);\n\n// build programs + uniform locations\nconst progs = SHADERS.map(s=>{\n  const prog = program(s.frag);\n  const loc = name => gl.getUniformLocation(prog, name);\n  const aP = gl.getAttribLocation(prog, 'p');\n  return { prog, aP, u:{\n    res:loc('u_res'), time:loc('u_time'), speed:loc('u_speed'), scale:loc('u_scale'), grain:loc('u_grain'),\n    p0:loc('u_p0'), p1:loc('u_p1'), p2:loc('u_p2'), p3:loc('u_p3')\n  }};\n});\n\n// ---------- State ----------\nconst DEFAULTS = { wp:0, speed:1, scale:1, grain:0.04, pal:2 };\nlet state = Object.assign({}, DEFAULTS);\ntry{ const saved = JSON.parse(localStorage.getItem('shaderwall')||'null'); if(saved) state = Object.assign(state, saved); }catch(e){}\nfunction save(){ try{ localStorage.setItem('shaderwall', JSON.stringify(state)); }catch(e){} }\n\n// ---------- Resize ----------\nfunction resize(){\n  const dpr = Math.min(window.devicePixelRatio||1, 2);\n  const w = Math.round(innerWidth*dpr), h = Math.round(innerHeight*dpr);\n  if(canvas.width!==w || canvas.height!==h){ canvas.width=w; canvas.height=h; }\n  gl.viewport(0,0,canvas.width,canvas.height);\n}\nwindow.addEventListener('resize', resize);\nresize();\n\n// ---------- Render loop ----------\nlet start = performance.now();\nfunction frame(now){\n  const t = (now - start)/1000;\n  const P = progs[state.wp];\n  gl.useProgram(P.prog);\n  gl.bindBuffer(gl.ARRAY_BUFFER, buf);\n  gl.enableVertexAttribArray(P.aP);\n  gl.vertexAttribPointer(P.aP, 2, gl.FLOAT, false, 0, 0);\n  gl.uniform2f(P.u.res, canvas.width, canvas.height);\n  gl.uniform1f(P.u.time, t);\n  gl.uniform1f(P.u.speed, state.speed);\n  gl.uniform1f(P.u.scale, state.scale);\n  gl.uniform1f(P.u.grain, state.grain);\n  const pal = PALETTES[state.pal].c.map(hex);\n  gl.uniform3fv(P.u.p0, pal[0]); gl.uniform3fv(P.u.p1, pal[1]);\n  gl.uniform3fv(P.u.p2, pal[2]); gl.uniform3fv(P.u.p3, pal[3]);\n  gl.drawArrays(gl.TRIANGLES, 0, 3);\n  requestAnimationFrame(frame);\n}\nrequestAnimationFrame(frame);\n\n// ---------- UI ----------\nconst chips = document.getElementById('chips');\nconst badgeIdx = document.getElementById('badgeIdx');\nconst badgeName = document.getElementById('badgeName');\nconst badgeSub = document.getElementById('badgeSub');\n\nSHADERS.forEach((s,i)=>{\n  const b = document.createElement('button');\n  b.className='chip'; b.dataset.i=i;\n  const palc = PALETTES[s.pal].c;\n  b.innerHTML = `<span class=\"dot\" style=\"background:linear-gradient(135deg,${palc[2]},${palc[3]})\"><\u002Fspan>${s.name}`;\n  b.addEventListener('click', ()=>selectWP(i));\n  chips.appendChild(b);\n});\n\nfunction flashBadge(){\n  const nb = document.getElementById('nameBadge');\n  nb.style.opacity='1';\n  clearTimeout(flashBadge._t);\n  flashBadge._t = setTimeout(()=>{ nb.style.opacity='0.0'; }, 2600);\n}\nfunction selectWP(i){\n  state.wp = i; save();\n  [...chips.children].forEach((c,ci)=>c.classList.toggle('active', ci===i));\n  const s = SHADERS[i];\n  badgeIdx.textContent = String(i+1).padStart(2,'0');\n  badgeName.textContent = s.name; badgeSub.textContent = s.sub;\n  flashBadge();\n}\n\n// palette swatches\nconst swWrap = document.getElementById('swatches');\nPALETTES.forEach((p,i)=>{\n  const d = document.createElement('div');\n  d.className='sw'; d.dataset.i=i; d.title=p.name;\n  d.style.background = `linear-gradient(120deg, ${p.c[0]} 0%, ${p.c[1]} 38%, ${p.c[2]} 70%, ${p.c[3]} 100%)`;\n  d.addEventListener('click', ()=>{ state.pal=i; save(); syncPanel(); });\n  swWrap.appendChild(d);\n});\n\n// sliders\nconst sSpeed=document.getElementById('sSpeed'), sScale=document.getElementById('sScale'), sGrain=document.getElementById('sGrain');\nconst vSpeed=document.getElementById('vSpeed'), vScale=document.getElementById('vScale'), vGrain=document.getElementById('vGrain'), vPal=document.getElementById('vPal');\nfunction syncPanel(){\n  sSpeed.value=state.speed; sScale.value=state.scale; sGrain.value=state.grain;\n  vSpeed.textContent=(+state.speed).toFixed(2)+'×';\n  vScale.textContent=(+state.scale).toFixed(2)+'×';\n  vGrain.textContent=(+state.grain).toFixed(3);\n  vPal.textContent=PALETTES[state.pal].name;\n  [...swWrap.children].forEach((c,ci)=>c.classList.toggle('active', ci===state.pal));\n}\nsSpeed.addEventListener('input', e=>{ state.speed=+e.target.value; save(); syncPanel(); });\nsScale.addEventListener('input', e=>{ state.scale=+e.target.value; save(); syncPanel(); });\nsGrain.addEventListener('input', e=>{ state.grain=+e.target.value; save(); syncPanel(); });\n\n// settings toggle\nconst panel=document.getElementById('panel'), btnSettings=document.getElementById('btnSettings');\nbtnSettings.addEventListener('click', ()=>{ panel.classList.toggle('hidden'); btnSettings.classList.toggle('on', !panel.classList.contains('hidden')); });\n\n// fullscreen\nconst btnFs=document.getElementById('btnFs');\nbtnFs.addEventListener('click', ()=>{ if(!document.fullscreenElement){ document.documentElement.requestFullscreen?.(); } else { document.exitFullscreen?.(); } });\n\n// save PNG\ndocument.getElementById('btnSave').addEventListener('click', ()=>{\n  const a=document.createElement('a');\n  a.download = `${SHADERS[state.wp].id}-${PALETTES[state.pal].name.toLowerCase()}.png`;\n  a.href = canvas.toDataURL('image/png');\n  a.click();\n});\n\n// ---------- Hide UI / keyboard ----------\nlet uiHidden=false;\nconst uiToggle=document.getElementById('uiToggle');\nfunction setUI(hidden){\n  uiHidden=hidden;\n  document.querySelectorAll('.ui').forEach(el=>el.classList.toggle('hidden', hidden));\n  document.getElementById('hint').style.opacity = hidden? '0':'';\n  uiToggle.classList.toggle('on', !hidden);\n  if(hidden){\n    panel.classList.add('hidden'); btnSettings.classList.remove('on');\n    document.getElementById('nameBadge').style.opacity='0';\n  } else {\n    flashBadge();\n  }\n}\nuiToggle.addEventListener('click', ()=>setUI(!uiHidden));\n\n// ---------- Host bridge (for embedding as a background iframe) ----------\n// The parent page can post {type:'shaderwall', action:'show'|'hide'|'toggle'}.\n// We reply with {type:'shaderwall', state:'shown'|'hidden'} so the host can\n// bring the iframe forward (interactive) while controls are open, then send it\n// back behind content (click-through) once they're closed.\nfunction notifyHost(){\n  if(window.parent && window.parent!==window){\n    try{ window.parent.postMessage({ type:'shaderwall', state: uiHidden?'hidden':'shown' }, '*'); }catch(e){}\n  }\n}\nconst _setUI = setUI;\nsetUI = function(hidden){ _setUI(hidden); notifyHost(); };\nwindow.addEventListener('message', e=>{\n  const d = e.data || {};\n  if(d.type!=='shaderwall') return;\n  if(d.action==='show') setUI(false);\n  else if(d.action==='hide') setUI(true);\n  else if(d.action==='toggle') setUI(!uiHidden);\n});\n\nwindow.addEventListener('keydown', e=>{\n  if(e.key==='h'||e.key==='H'){ setUI(!uiHidden); }\n  else if(!uiHidden && e.key==='ArrowRight'){ selectWP((state.wp+1)%SHADERS.length); }\n  else if(!uiHidden && e.key==='ArrowLeft'){ selectWP((state.wp-1+SHADERS.length)%SHADERS.length); }\n  else if(!uiHidden && e.key>='1' && e.key<='6'){ const i=+e.key-1; if(i<SHADERS.length) selectWP(i); }\n});\n\n// auto-fade hint\nsetTimeout(()=>{ document.getElementById('hint').style.opacity='0'; }, 6000);\n\n// ---------- Init ----------\nselectWP(state.wp);\nsyncPanel();\nsetUI(true); // start hidden — this is a website background; toggle via top-left button or H\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
