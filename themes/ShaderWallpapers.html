<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shader Wallpapers</title>
    <style>
      :root {
        --ui-bg: rgba(16, 16, 22, 0.62);
        --ui-bg-solid: #14141b;
        --ui-stroke: rgba(255, 255, 255, 0.1);
        --ui-stroke-strong: rgba(255, 255, 255, 0.22);
        --ui-text: rgba(255, 255, 255, 0.92);
        --ui-dim: rgba(255, 255, 255, 0.52);
        --ui-accent: #c8b6ff;
        --shadow:
          0 10px 40px rgba(0, 0, 0, 0.45),
          0 1px 0 rgba(255, 255, 255, 0.05) inset;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        background: #000;
        overflow: hidden;
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          'Segoe UI',
          Roboto,
          Helvetica,
          Arial,
          sans-serif;
        color: var(--ui-text);
        -webkit-font-smoothing: antialiased;
      }
      #gl {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        display: block;
      }

      /* ---- floating name badge ---- */
      #nameBadge {
        position: fixed;
        left: 74px;
        top: 21px;
        z-index: 20;
        display: flex;
        align-items: baseline;
        gap: 12px;
        pointer-events: none;
        transition: opacity 0.5s ease;
        text-shadow: 0 2px 18px rgba(0, 0, 0, 0.55);
      }
      #nameBadge .idx {
        font-variant-numeric: tabular-nums;
        font-size: 13px;
        letter-spacing: 0.18em;
        color: var(--ui-dim);
        font-weight: 600;
      }
      #nameBadge .nm {
        font-size: 22px;
        font-weight: 600;
        letter-spacing: -0.01em;
      }
      #nameBadge .sub {
        font-size: 13px;
        color: var(--ui-dim);
        letter-spacing: 0.02em;
      }

      /* ---- bottom dock ---- */
      .ui {
        transition:
          opacity 0.45s ease,
          transform 0.45s ease;
      }
      .ui.hidden {
        opacity: 0;
        transform: translateY(14px);
        pointer-events: none;
      }

      #dock {
        position: fixed;
        left: 50%;
        bottom: 26px;
        transform: translateX(-50%);
        z-index: 30;
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 7px;
        border-radius: 18px;
        background: var(--ui-bg);
        backdrop-filter: blur(22px) saturate(1.3);
        -webkit-backdrop-filter: blur(22px) saturate(1.3);
        border: 1px solid var(--ui-stroke);
        box-shadow: var(--shadow);
      }
      .chip {
        appearance: none;
        border: 1px solid transparent;
        background: transparent;
        color: var(--ui-dim);
        font: inherit;
        font-size: 13.5px;
        font-weight: 550;
        letter-spacing: 0.01em;
        padding: 9px 14px;
        border-radius: 12px;
        cursor: pointer;
        white-space: nowrap;
        display: flex;
        align-items: center;
        gap: 9px;
        transition:
          background 0.2s,
          color 0.2s,
          border-color 0.2s;
      }
      .chip:hover {
        color: var(--ui-text);
        background: rgba(255, 255, 255, 0.05);
      }
      .chip.active {
        color: #0d0d12;
        background: var(--ui-text);
        border-color: transparent;
      }
      .chip .dot {
        width: 9px;
        height: 9px;
        border-radius: 50%;
        flex: 0 0 auto;
        box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.25) inset;
      }
      .divider {
        width: 1px;
        height: 26px;
        background: var(--ui-stroke);
        margin: 0 3px;
      }

      .icobtn {
        appearance: none;
        border: 1px solid transparent;
        background: transparent;
        color: var(--ui-dim);
        width: 40px;
        height: 40px;
        border-radius: 12px;
        cursor: pointer;
        display: grid;
        place-items: center;
        transition:
          background 0.2s,
          color 0.2s;
      }
      .icobtn:hover {
        color: var(--ui-text);
        background: rgba(255, 255, 255, 0.06);
      }
      .icobtn.on {
        color: var(--ui-accent);
        background: rgba(200, 182, 255, 0.12);
      }
      .icobtn svg {
        width: 18px;
        height: 18px;
      }

      /* ---- settings panel ---- */
      #panel {
        position: fixed;
        right: 24px;
        bottom: 84px;
        z-index: 40;
        width: 288px;
        padding: 18px;
        border-radius: 18px;
        background: var(--ui-bg);
        backdrop-filter: blur(26px) saturate(1.3);
        -webkit-backdrop-filter: blur(26px) saturate(1.3);
        border: 1px solid var(--ui-stroke);
        box-shadow: var(--shadow);
        transform-origin: bottom right;
        transition:
          opacity 0.22s ease,
          transform 0.22s ease;
      }
      #panel.hidden {
        opacity: 0;
        transform: scale(0.96) translateY(6px);
        pointer-events: none;
      }
      #panel h4 {
        margin: 0 0 2px;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--ui-dim);
      }
      .row {
        margin-top: 16px;
      }
      .row .lab {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        margin-bottom: 8px;
      }
      .row .lab span:first-child {
        font-size: 13px;
        font-weight: 550;
      }
      .row .lab .val {
        font-size: 12px;
        color: var(--ui-dim);
        font-variant-numeric: tabular-nums;
      }
      input[type='range'] {
        -webkit-appearance: none;
        appearance: none;
        width: 100%;
        height: 4px;
        border-radius: 4px;
        background: rgba(255, 255, 255, 0.16);
        outline: none;
      }
      input[type='range']::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background: #fff;
        cursor: pointer;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
        border: none;
      }
      input[type='range']::-moz-range-thumb {
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background: #fff;
        cursor: pointer;
        border: none;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
      }

      .swatches {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 8px;
      }
      .sw {
        height: 34px;
        border-radius: 10px;
        cursor: pointer;
        position: relative;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.12);
        transition:
          transform 0.15s,
          border-color 0.15s;
      }
      .sw:hover {
        transform: translateY(-2px);
      }
      .sw.active {
        border-color: #fff;
        box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.25);
      }

      /* ---- always-on top-left toggle ---- */
      #uiToggle {
        position: fixed;
        left: 20px;
        top: 20px;
        z-index: 60;
        width: 42px;
        height: 42px;
        border-radius: 13px;
        cursor: pointer;
        display: grid;
        place-items: center;
        color: var(--ui-text);
        background: rgba(16, 16, 22, 0.42);
        backdrop-filter: blur(18px) saturate(1.3);
        -webkit-backdrop-filter: blur(18px) saturate(1.3);
        border: 1px solid var(--ui-stroke);
        box-shadow: var(--shadow);
        opacity: 0.32;
        transition:
          opacity 0.25s ease,
          background 0.25s ease,
          color 0.25s ease,
          transform 0.2s ease;
      }
      #uiToggle:hover {
        opacity: 1;
        transform: translateY(-1px);
      }
      #uiToggle.on {
        opacity: 1;
        color: var(--ui-accent);
        background: rgba(200, 182, 255, 0.14);
      }
      #uiToggle svg {
        width: 19px;
        height: 19px;
      }

      .hint {
        position: fixed;
        left: 28px;
        bottom: 30px;
        z-index: 20;
        font-size: 12px;
        color: var(--ui-dim);
        pointer-events: none;
        transition: opacity 0.5s ease;
        letter-spacing: 0.01em;
      }
      kbd {
        font: inherit;
        font-size: 11px;
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid var(--ui-stroke);
        border-radius: 6px;
        padding: 1px 6px;
        color: var(--ui-text);
      }

      @media (max-width: 640px) {
        #dock {
          bottom: 16px;
          gap: 2px;
          padding: 6px;
          max-width: calc(100vw - 20px);
          overflow-x: auto;
        }
        .chip {
          padding: 8px 11px;
          font-size: 12.5px;
        }
        #panel {
          right: 12px;
          left: 12px;
          width: auto;
          bottom: 76px;
        }
        #nameBadge {
          left: 74px;
          top: 20px;
        }
        .hint {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <template id="__bundler_thumbnail" data-bg-color="#0a0a12">
      <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="tg" cx="42%" cy="40%" r="75%">
            <stop offset="0%" stop-color="#8fd6ff" />
            <stop offset="38%" stop-color="#9d8bff" />
            <stop offset="70%" stop-color="#e25fd0" />
            <stop offset="100%" stop-color="#0a0a12" />
          </radialGradient>
        </defs>
        <rect width="1200" height="800" fill="#0a0a12" />
        <circle cx="600" cy="400" r="300" fill="url(#tg)" />
      </svg>
    </template>
    <canvas id="gl"></canvas>

    <button
      id="uiToggle"
      title="Wallpaper controls (H)"
      aria-label="Toggle wallpaper controls">
      <svg
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="1.8"
        stroke-linecap="round"
        stroke-linejoin="round">
        <path d="M4 6h11M4 12h7M4 18h13" />
        <circle cx="18" cy="6" r="2" />
        <circle cx="14" cy="12" r="2" />
        <circle cx="20" cy="18" r="2" />
      </svg>
    </button>

    <div id="nameBadge">
      <span class="idx" id="badgeIdx">01</span>
      <span class="nm" id="badgeName">Aurora Silk</span>
      <span class="sub" id="badgeSub">drifting light ribbons</span>
    </div>

    <div id="panel" class="ui hidden">
      <h4>Adjust</h4>
      <div class="row">
        <div class="lab">
          <span>Speed</span><span class="val" id="vSpeed">1.00×</span>
        </div>
        <input
          id="sSpeed"
          type="range"
          min="0"
          max="2.5"
          step="0.01"
          value="1" />
      </div>
      <div class="row">
        <div class="lab">
          <span>Scale</span><span class="val" id="vScale">1.00×</span>
        </div>
        <input
          id="sScale"
          type="range"
          min="0.35"
          max="3"
          step="0.01"
          value="1" />
      </div>
      <div class="row">
        <div class="lab">
          <span>Grain</span><span class="val" id="vGrain">0.04</span>
        </div>
        <input
          id="sGrain"
          type="range"
          min="0"
          max="0.16"
          step="0.005"
          value="0.04" />
      </div>
      <div class="row">
        <div class="lab" style="margin-bottom: 10px">
          <span>Palette</span><span class="val" id="vPal">Jewel</span>
        </div>
        <div class="swatches" id="swatches"></div>
      </div>
    </div>

    <div id="dock" class="ui">
      <div id="chips" style="display: flex; gap: 4px"></div>
      <div class="divider"></div>
      <button class="icobtn" id="btnSettings" title="Adjust">
        <svg
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.8"
          stroke-linecap="round"
          stroke-linejoin="round">
          <path d="M4 6h11M4 12h7M4 18h13" />
          <circle cx="18" cy="6" r="2" />
          <circle cx="14" cy="12" r="2" />
          <circle cx="20" cy="18" r="2" />
        </svg>
      </button>
      <button class="icobtn" id="btnSave" title="Save PNG">
        <svg
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.8"
          stroke-linecap="round"
          stroke-linejoin="round">
          <path d="M12 3v12m0 0l-4-4m4 4l4-4" />
          <path d="M5 21h14" />
        </svg>
      </button>
      <button class="icobtn" id="btnFs" title="Fullscreen">
        <svg
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.8"
          stroke-linecap="round"
          stroke-linejoin="round">
          <path d="M4 9V4h5M20 9V4h-5M4 15v5h5M20 15v5h-5" />
        </svg>
      </button>
    </div>

    <div class="hint" id="hint">
      Press <kbd>H</kbd> to hide UI · <kbd>←</kbd> <kbd>→</kbd> to switch
    </div>

    <script>
      /* ============================================================= *
       *  Shader Wallpapers — WebGL renderer + 6 animated shaders
       * ============================================================= */

      // ---------- Palettes (4 stops each, dark → light) ----------
      function hex(h) {
        return [
          parseInt(h.slice(1, 3), 16) / 255,
          parseInt(h.slice(3, 5), 16) / 255,
          parseInt(h.slice(5, 7), 16) / 255
        ];
      }
      const PALETTES = [
        {name: 'Jewel', c: ['#0a0a23', '#3b1d8f', '#1f8aa0', '#e25fd0']},
        {name: 'Sunset', c: ['#180a26', '#b23a6a', '#ff7a4d', '#ffd27a']},
        {name: 'Mint', c: ['#062126', '#2bbf9a', '#9d8bff', '#8fd6ff']},
        {name: 'Ember', c: ['#0a0604', '#6e0f1a', '#ff7b29', '#ffd36b']},
        {name: 'Mono', c: ['#0b0b0f', '#3a3f4b', '#aeb8c6', '#eaf1ff']}
      ];

      // ---------- GLSL ----------
      const VERT = `attribute vec2 p; void main(){ gl_Position = vec4(p,0.0,1.0); }`;

      const HEAD = `precision highp float;
uniform vec2 u_res; uniform float u_time; uniform float u_speed; uniform float u_scale; uniform float u_grain;
uniform vec3 u_p0,u_p1,u_p2,u_p3;
float hash21(vec2 p){ p=fract(p*vec2(123.34,345.45)); p+=dot(p,p+34.345); return fract(p.x*p.y); }
float vnoise(vec2 p){ vec2 i=floor(p), f=fract(p); f=f*f*(3.0-2.0*f);
  float a=hash21(i), b=hash21(i+vec2(1,0)), c=hash21(i+vec2(0,1)), d=hash21(i+vec2(1,1));
  return mix(mix(a,b,f.x), mix(c,d,f.x), f.y); }
float fbm(vec2 p){ float s=0.0,a=0.5; mat2 m=mat2(1.6,1.2,-1.2,1.6);
  for(int i=0;i<6;i++){ s+=a*vnoise(p); p=m*p; a*=0.5; } return s; }
vec3 pal4(float t){ t=clamp(t,0.0,1.0);
  if(t<0.3333) return mix(u_p0,u_p1, t/0.3333);
  else if(t<0.6666) return mix(u_p1,u_p2,(t-0.3333)/0.3333);
  return mix(u_p2,u_p3,(t-0.6666)/0.3334); }
float grain(vec2 uv){ return hash21(uv*u_res + fract(u_time)*97.0); }
`;

      const SHADERS = [
        {
          id: 'aurora',
          name: 'Aurora Silk',
          sub: 'drifting light ribbons',
          pal: 2,
          frag: `
  void main(){
    vec2 uv=(gl_FragCoord.xy-0.5*u_res)/u_res.y;
    float t=u_time*u_speed*0.10;
    vec2 q=uv*u_scale;
    float warp=fbm(q*1.5+vec2(0.0,t));
    float bands=fbm(q*vec2(0.6,1.8)+vec2(warp*1.6, t*1.5));
    float v=fbm(q+vec2(bands*1.2,-t));
    float m=smoothstep(0.15,0.95,v+bands*0.45);
    vec3 col=pal4(m);
    col*=0.75+0.55*bands;
    col=mix(u_p0*0.45, col, smoothstep(0.0,0.7,v));
    col+=(grain(uv)-0.5)*u_grain;
    gl_FragColor=vec4(col,1.0);
  }`
        },
        {
          id: 'nebula',
          name: 'Plasma Nebula',
          sub: 'deep-space clouds & stars',
          pal: 0,
          frag: `
  void main(){
    vec2 uv=(gl_FragCoord.xy-0.5*u_res)/u_res.y;
    float t=u_time*u_speed*0.08;
    vec2 q=uv*u_scale*1.2;
    vec2 w=vec2(fbm(q+vec2(t,0.0)), fbm(q+vec2(0.0,t)+5.0));
    float n=fbm(q+w*2.5);
    vec3 col=pal4(n);
    col=mix(u_p0*0.25, col, smoothstep(0.08,0.85,n));
    float st=hash21(floor(uv*u_scale*180.0));
    st=pow(st,42.0)*1.6;
    col+=st*(0.6+0.4*sin(u_time*0.8+uv.x*60.0))*vec3(0.9,0.95,1.0);
    col+=(grain(uv)-0.5)*u_grain;
    gl_FragColor=vec4(col,1.0);
  }`
        },
        {
          id: 'oil',
          name: 'Oil Slick',
          sub: 'iridescent thin film',
          pal: 4,
          frag: `
  vec3 cosPal(float t){ return 0.5+0.5*cos(6.28318*(vec3(t)+vec3(0.0,0.33,0.67))); }
  void main(){
    vec2 uv=(gl_FragCoord.xy-0.5*u_res)/u_res.y;
    float t=u_time*u_speed*0.12;
    vec2 q=uv*u_scale*2.0;
    float warp=fbm(q+vec2(t,t*0.7));
    float f=fbm(q*1.5+warp*2.0+t);
    float film=fbm(q+f*1.5);
    vec3 rain=cosPal(film*1.5+f*0.5+t);
    vec3 col=mix(u_p0*0.5, rain, 0.82);
    col=mix(col, u_p2, 0.18*sin(film*6.0+t));
    col+=(grain(uv)-0.5)*u_grain;
    gl_FragColor=vec4(col,1.0);
  }`
        },
        {
          id: 'lava',
          name: 'Lava Lamp',
          sub: 'slow morphing blobs',
          pal: 3,
          frag: `
  void main(){
    vec2 uv=(gl_FragCoord.xy-0.5*u_res)/u_res.y;
    float t=u_time*u_speed*0.4;
    float s=u_scale;
    float field=0.0;
    for(int i=0;i<6;i++){
      float fi=float(i);
      vec2 c=vec2(sin(t*0.3+fi*1.7)*0.62, cos(t*0.23+fi*2.1)*0.5);
      c+=0.2*vec2(sin(t*0.5+fi), cos(t*0.4+fi*1.3));
      float r=(0.17+0.06*sin(t+fi))/s;
      field+=r*r/dot(uv-c,uv-c);
    }
    float m=smoothstep(0.55,1.5,field);
    vec3 col=mix(u_p0, pal4(clamp(field*0.4,0.0,1.0)), m);
    col+=(grain(uv)-0.5)*u_grain;
    gl_FragColor=vec4(col,1.0);
  }`
        },
        {
          id: 'metal',
          name: 'Liquid Metal',
          sub: 'specular chrome waves',
          pal: 4,
          frag: `
  void main(){
    vec2 uv=(gl_FragCoord.xy-0.5*u_res)/u_res.y;
    float t=u_time*u_speed*0.15;
    vec2 q=uv*u_scale*1.5;
    float w=fbm(q+vec2(t,0.0));
    float n=fbm(q*1.5+w*2.0+vec2(0.0,t));
    float m=sin(n*6.28318*1.5+t*2.0)*0.5+0.5;
    float spec=pow(m,6.0);
    vec3 base=mix(u_p0,u_p1,n);
    vec3 col=base+spec*u_p3;
    col=mix(col,u_p2,0.15*w);
    col+=(grain(uv)-0.5)*u_grain;
    gl_FragColor=vec4(col,1.0);
  }`
        },
        {
          id: 'sunset',
          name: 'Sunset Drift',
          sub: 'calm gradient & glow',
          pal: 1,
          frag: `
  void main(){
    vec2 uvp=gl_FragCoord.xy/u_res;
    float t=u_time*u_speed*0.05;
    vec2 c=(gl_FragCoord.xy-0.5*u_res)/u_res.y*u_scale;
    float n=fbm(c*0.6+vec2(t,t*0.5))*0.4;
    float g=uvp.y+n-0.1*sin(uvp.x*3.0+t*2.0);
    vec3 col=pal4(clamp(g,0.0,1.0));
    vec2 sun=vec2(0.5+0.2*sin(t),0.34+0.1*cos(t*0.7));
    float d=length((uvp-sun)*vec2(u_res.x/u_res.y,1.0));
    col+=u_p3*smoothstep(0.55,0.0,d)*0.28;
    col+=(grain(uvp)-0.5)*u_grain;
    gl_FragColor=vec4(col,1.0);
  }`
        }
      ];

      // ---------- WebGL setup ----------
      const canvas = document.getElementById('gl');
      const gl = canvas.getContext('webgl', {
        antialias: true,
        preserveDrawingBuffer: true,
        premultipliedAlpha: false
      });
      if (!gl) {
        document.body.innerHTML =
          '<div style="color:#fff;font:16px sans-serif;padding:40px">WebGL is not available in this browser.</div>';
      }

      function compile(type, src) {
        const sh = gl.createShader(type);
        gl.shaderSource(sh, src);
        gl.compileShader(sh);
        if (!gl.getShaderParameter(sh, gl.COMPILE_STATUS)) {
          console.error('Shader error:', gl.getShaderInfoLog(sh), '\n', src);
          return null;
        }
        return sh;
      }
      function program(fragBody) {
        const p = gl.createProgram();
        gl.attachShader(p, compile(gl.VERTEX_SHADER, VERT));
        gl.attachShader(p, compile(gl.FRAGMENT_SHADER, HEAD + fragBody));
        gl.linkProgram(p);
        if (!gl.getProgramParameter(p, gl.LINK_STATUS)) {
          console.error('Link error:', gl.getProgramInfoLog(p));
        }
        return p;
      }

      // full-screen triangle
      const buf = gl.createBuffer();
      gl.bindBuffer(gl.ARRAY_BUFFER, buf);
      gl.bufferData(
        gl.ARRAY_BUFFER,
        new Float32Array([-1, -1, 3, -1, -1, 3]),
        gl.STATIC_DRAW
      );

      // build programs + uniform locations
      const progs = SHADERS.map((s) => {
        const prog = program(s.frag);
        const loc = (name) => gl.getUniformLocation(prog, name);
        const aP = gl.getAttribLocation(prog, 'p');
        return {
          prog,
          aP,
          u: {
            res: loc('u_res'),
            time: loc('u_time'),
            speed: loc('u_speed'),
            scale: loc('u_scale'),
            grain: loc('u_grain'),
            p0: loc('u_p0'),
            p1: loc('u_p1'),
            p2: loc('u_p2'),
            p3: loc('u_p3')
          }
        };
      });

      // ---------- State ----------
      const DEFAULTS = {wp: 0, speed: 1, scale: 1, grain: 0.04, pal: 2};
      let state = Object.assign({}, DEFAULTS);
      try {
        const saved = JSON.parse(localStorage.getItem('shaderwall') || 'null');
        if (saved) state = Object.assign(state, saved);
      } catch (e) {}
      function save() {
        try {
          localStorage.setItem('shaderwall', JSON.stringify(state));
        } catch (e) {}
      }

      // ---------- Resize ----------
      function resize() {
        const dpr = Math.min(window.devicePixelRatio || 1, 2);
        const w = Math.round(innerWidth * dpr),
          h = Math.round(innerHeight * dpr);
        if (canvas.width !== w || canvas.height !== h) {
          canvas.width = w;
          canvas.height = h;
        }
        gl.viewport(0, 0, canvas.width, canvas.height);
      }
      window.addEventListener('resize', resize);
      resize();

      // ---------- Render loop ----------
      let start = performance.now();
      function frame(now) {
        const t = (now - start) / 1000;
        const P = progs[state.wp];
        gl.useProgram(P.prog);
        gl.bindBuffer(gl.ARRAY_BUFFER, buf);
        gl.enableVertexAttribArray(P.aP);
        gl.vertexAttribPointer(P.aP, 2, gl.FLOAT, false, 0, 0);
        gl.uniform2f(P.u.res, canvas.width, canvas.height);
        gl.uniform1f(P.u.time, t);
        gl.uniform1f(P.u.speed, state.speed);
        gl.uniform1f(P.u.scale, state.scale);
        gl.uniform1f(P.u.grain, state.grain);
        const pal = PALETTES[state.pal].c.map(hex);
        gl.uniform3fv(P.u.p0, pal[0]);
        gl.uniform3fv(P.u.p1, pal[1]);
        gl.uniform3fv(P.u.p2, pal[2]);
        gl.uniform3fv(P.u.p3, pal[3]);
        gl.drawArrays(gl.TRIANGLES, 0, 3);
        requestAnimationFrame(frame);
      }
      requestAnimationFrame(frame);

      // ---------- UI ----------
      const chips = document.getElementById('chips');
      const badgeIdx = document.getElementById('badgeIdx');
      const badgeName = document.getElementById('badgeName');
      const badgeSub = document.getElementById('badgeSub');

      SHADERS.forEach((s, i) => {
        const b = document.createElement('button');
        b.className = 'chip';
        b.dataset.i = i;
        const palc = PALETTES[s.pal].c;
        b.innerHTML = `<span class="dot" style="background:linear-gradient(135deg,${palc[2]},${palc[3]})"></span>${s.name}`;
        b.addEventListener('click', () => selectWP(i));
        chips.appendChild(b);
      });

      function flashBadge() {
        const nb = document.getElementById('nameBadge');
        nb.style.opacity = '1';
        clearTimeout(flashBadge._t);
        flashBadge._t = setTimeout(() => {
          nb.style.opacity = '0.0';
        }, 2600);
      }
      function selectWP(i) {
        state.wp = i;
        save();
        [...chips.children].forEach((c, ci) =>
          c.classList.toggle('active', ci === i)
        );
        const s = SHADERS[i];
        badgeIdx.textContent = String(i + 1).padStart(2, '0');
        badgeName.textContent = s.name;
        badgeSub.textContent = s.sub;
        flashBadge();
      }

      // palette swatches
      const swWrap = document.getElementById('swatches');
      PALETTES.forEach((p, i) => {
        const d = document.createElement('div');
        d.className = 'sw';
        d.dataset.i = i;
        d.title = p.name;
        d.style.background = `linear-gradient(120deg, ${p.c[0]} 0%, ${p.c[1]} 38%, ${p.c[2]} 70%, ${p.c[3]} 100%)`;
        d.addEventListener('click', () => {
          state.pal = i;
          save();
          syncPanel();
        });
        swWrap.appendChild(d);
      });

      // sliders
      const sSpeed = document.getElementById('sSpeed'),
        sScale = document.getElementById('sScale'),
        sGrain = document.getElementById('sGrain');
      const vSpeed = document.getElementById('vSpeed'),
        vScale = document.getElementById('vScale'),
        vGrain = document.getElementById('vGrain'),
        vPal = document.getElementById('vPal');
      function syncPanel() {
        sSpeed.value = state.speed;
        sScale.value = state.scale;
        sGrain.value = state.grain;
        vSpeed.textContent = (+state.speed).toFixed(2) + '×';
        vScale.textContent = (+state.scale).toFixed(2) + '×';
        vGrain.textContent = (+state.grain).toFixed(3);
        vPal.textContent = PALETTES[state.pal].name;
        [...swWrap.children].forEach((c, ci) =>
          c.classList.toggle('active', ci === state.pal)
        );
      }
      sSpeed.addEventListener('input', (e) => {
        state.speed = +e.target.value;
        save();
        syncPanel();
      });
      sScale.addEventListener('input', (e) => {
        state.scale = +e.target.value;
        save();
        syncPanel();
      });
      sGrain.addEventListener('input', (e) => {
        state.grain = +e.target.value;
        save();
        syncPanel();
      });

      // settings toggle
      const panel = document.getElementById('panel'),
        btnSettings = document.getElementById('btnSettings');
      btnSettings.addEventListener('click', () => {
        panel.classList.toggle('hidden');
        btnSettings.classList.toggle('on', !panel.classList.contains('hidden'));
      });

      // fullscreen
      const btnFs = document.getElementById('btnFs');
      btnFs.addEventListener('click', () => {
        if (!document.fullscreenElement) {
          document.documentElement.requestFullscreen?.();
        } else {
          document.exitFullscreen?.();
        }
      });

      // save PNG
      document.getElementById('btnSave').addEventListener('click', () => {
        const a = document.createElement('a');
        a.download = `${SHADERS[state.wp].id}-${PALETTES[state.pal].name.toLowerCase()}.png`;
        a.href = canvas.toDataURL('image/png');
        a.click();
      });

      // ---------- Hide UI / keyboard ----------
      let uiHidden = false;
      const uiToggle = document.getElementById('uiToggle');
      function setUI(hidden) {
        uiHidden = hidden;
        document
          .querySelectorAll('.ui')
          .forEach((el) => el.classList.toggle('hidden', hidden));
        document.getElementById('hint').style.opacity = hidden ? '0' : '';
        uiToggle.classList.toggle('on', !hidden);
        if (hidden) {
          panel.classList.add('hidden');
          btnSettings.classList.remove('on');
          document.getElementById('nameBadge').style.opacity = '0';
        } else {
          flashBadge();
        }
      }
      uiToggle.addEventListener('click', () => setUI(!uiHidden));

      // When embedded as a background iframe, hide our own top-left toggle —
      // the host page provides its own (always-clickable) control button instead.
      const EMBEDDED = window.parent && window.parent !== window;
      if (EMBEDDED) {
        uiToggle.style.display = 'none';
      }

      // ---------- Host bridge (for embedding as a background iframe) ----------
      // The parent page can post {type:'shaderwall', action:'show'|'hide'|'toggle'}.
      // We reply with {type:'shaderwall', state:'shown'|'hidden'} so the host can
      // bring the iframe forward (interactive) while controls are open, then send it
      // back behind content (click-through) once they're closed.
      function notifyHost() {
        window.parent.postMessage({type: 'shaderwall', state: uiHidden ? 'hidden' : 'shown'});
      }
      
      const _setUI = setUI;
      setUI = function (hidden) {
        _setUI(hidden);
        notifyHost();
      };
      window.addEventListener('message', (e) => {
        if (e.origin != location.origin) return;
        const d = e.data || {};
        if (d.type !== 'shaderwall') return;
        if (d.action === 'show') setUI(false);
        else if (d.action === 'hide') setUI(true);
        else if (d.action === 'toggle') setUI(!uiHidden);
      });

      window.addEventListener('keydown', (e) => {
        if (e.key === 'h' || e.key === 'H') {
          setUI(!uiHidden);
        } else if (!uiHidden && e.key === 'ArrowRight') {
          selectWP((state.wp + 1) % SHADERS.length);
        } else if (!uiHidden && e.key === 'ArrowLeft') {
          selectWP((state.wp - 1 + SHADERS.length) % SHADERS.length);
        } else if (!uiHidden && e.key >= '1' && e.key <= '6') {
          const i = +e.key - 1;
          if (i < SHADERS.length) selectWP(i);
        }
      });

      // auto-fade hint
      setTimeout(() => {
        document.getElementById('hint').style.opacity = '0';
      }, 6000);

      // ---------- Init ----------
      selectWP(state.wp);
      syncPanel();
      setUI(true); // start hidden — this is a website background; toggle via top-left button or H
    </script>
  </body>
</html>
