<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grove</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #0c1430;
      }
      canvas {
        position: fixed;
        inset: 0;
        display: block;
      }
      /* control panel — revealed only when the wallpaper is brought forward (✦) */
      #ui {
        position: fixed;
        left: 50%;
        bottom: 18px;
        transform: translateX(-50%);
        z-index: 10;
        display: none;
        flex-direction: column;
        gap: 6px;
        align-items: center;
        padding: 10px 12px;
        border-radius: 12px;
        max-width: 92vw;
        background: rgba(12, 20, 40, 0.7);
        border: 1px solid rgba(160, 200, 255, 0.22);
        -webkit-backdrop-filter: blur(8px);
        backdrop-filter: blur(8px);
        color: #d7e6f0;
        font:
          13px ui-monospace,
          'Consolas',
          monospace;
      }
      body.shown #ui {
        display: flex;
      }
      #ui .row {
        display: flex;
        gap: 5px;
        flex-wrap: wrap;
        justify-content: center;
      }
      #ui button {
        font: inherit;
        color: #cfe0ef;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(160, 200, 255, 0.2);
        border-radius: 8px;
        padding: 5px 9px;
        cursor: pointer;
      }
      #ui button:hover {
        background: rgba(255, 255, 255, 0.12);
      }
      #ui button.on {
        background: #2c5a8c;
        border-color: #6fb0ef;
        color: #fff;
      }
      #ui .lbl {
        opacity: 0.6;
        font-size: 11px;
        align-self: center;
        margin-right: 2px;
      }
    </style>
  </head>
  <body>
    <div
      id="ui"
      role="group"
      aria-label="Wallpaper controls"
      aria-hidden="true">
      <div class="row" id="uiBiome"></div>
      <div class="row" id="uiTime"></div>
      <div class="row" id="uiSeason"></div>
    </div>
    <script src="grove/pixi.min.js"></script>
    <script>
      'use strict';
      let VW = 1280; // canvas width — tracks the display aspect so any screen ratio fills (see fitVW)
      const VWBASE = 1280, // the width the per-biome art was composed at; backgrounds scale from this
        VH = 720,
        HZ = 430; // design space + celestial horizon
      let XS = 1; // VW / VWBASE — scales the hand-placed background content to the current width
      const reduce = matchMedia('(prefers-reduced-motion: reduce)');
      const app = new PIXI.Application({
        resizeTo: window,
        antialias: true,
        backgroundAlpha: 0
      });
      // far-off content is heavily downscaled; without mipmaps that minification aliases into a
      // crunchy, "pixelated" look a real distant object never has. Mipmaps give smooth downscaling.
      PIXI.BaseTexture.defaultOptions.mipmap = PIXI.MIPMAP_MODES.ON;
      // the canvas width tracks the display's aspect (the height stays fixed at VH, so the vertical
      // composition — sky, horizon, ground, water — is constant), clamped so extreme ratios stay
      // sensible. A 21:9 screen simply gets more landscape; portrait a narrower slice. No cropping.
      const fitVW = () =>
        Math.round(
          Math.max(
            840,
            Math.min(2560, VH * (app.screen.width / app.screen.height))
          )
        );
      document.body.appendChild(app.view);
      const root = new PIXI.Container();
      app.stage.addChild(root);
      const OVERSCAN = 1.05; // a little zoom so parallax layer shifts never reveal the page behind
      const PAR_V = 10; // vertical foreground parallax travel (design px) to keep below the fold
      function fit() {
        // cover the display, then anchor the FOREGROUND (ground + water) to the bottom rather than
        // centring — the water sits at the very bottom of the design, so centring always clipped it
        // (even on a 16:9 laptop, by the overscan). Anchoring the bottom keeps the water fully in
        // view on any shape of screen; the slack crops the sky at the top instead, which is filler.
        const s =
          Math.max(app.screen.width / VW, app.screen.height / VH) * OVERSCAN;
        root.scale.set(s);
        root.position.set(
          (app.screen.width - VW * s) / 2, // centre horizontally (overscan leaves parallax margin)
          app.screen.height - (VH - PAR_V) * s // anchor the water to the bottom (a few px of margin for parallax)
        );
      }
      // on resize, re-fit immediately for a snappy feel; if the window's aspect changed enough that
      // the canvas width should change, rebuild the scene to the new width once the drag settles
      let resizeT;
      app.renderer.on('resize', () => {
        fit();
        if (ready && Math.abs(fitVW() - VW) > 48) {
          clearTimeout(resizeT);
          resizeT = setTimeout(build, 220);
        }
      });
      // gentle parallax: pointer (desktop/standalone) or device tilt (mobile) nudges near layers more than far
      let farLayer,
        parX = 0,
        parY = 0,
        parTX = 0,
        parTY = 0;
      addEventListener(
        'pointermove',
        (e) => {
          parTX = (e.clientX / innerWidth - 0.5) * 2;
          parTY = (e.clientY / innerHeight - 0.5) * 2;
        },
        {passive: true}
      );
      addEventListener(
        'deviceorientation',
        (e) => {
          if (e.gamma == null) return;
          parTX = Math.max(-1, Math.min(1, e.gamma / 28));
          parTY = Math.max(-1, Math.min(1, ((e.beta || 45) - 45) / 28));
        },
        {passive: true}
      );

      // ---------- time of day ----------
      const q = new URLSearchParams(location.search);
      const hourParam = q.get('hour'),
        cyc = parseFloat(q.get('cycle')),
        seasonParam = q.get('season'),
        moonParam = q.get('moon'), // 0..1 phase override for previewing (0/1 new, .5 full)
        coverParam = q.get('cover'); // 0..1 cloud-cover override for previewing weather states
      const LS = (k, v) => {
        try {
          if (v === undefined) return localStorage.getItem('grove:' + k);
          localStorage.setItem('grove:' + k, v);
        } catch (e) {}
      };
      let timeMode = LS('time') || 'auto',
        seasonMode = LS('season') || 'auto',
        weatherMode = LS('weather') || 'auto',
        soundOn = LS('sound') === '1',
        journeyOn = LS('journey') === '1';
      // journey: slowly drift through the biomes, fading between them
      const JOURNEY_PERIOD = 120; // seconds spent on each biome
      let journeyTimer = JOURNEY_PERIOD,
        journeyFade = 0, // 0 idle | -1 fading the scene out | +1 fading it back in
        journeyNext = null; // the biome to build at the bottom of the fade
      // weather front runtime: cover = cloud cover, wet = rain intensity, wetness = lingering ground wetness
      let frontState = 'clear',
        frontT = 60 + Math.random() * 120,
        cover = 0,
        wet = 0, // rain intensity (front-driven, warm scenes)
        wetness = 0,
        snowAcc = 0, // settled snow depth on the ground (0..1)
        snowI = 0, // snowfall intensity right now (front-driven, cold scenes)
        snowRate = 1, // per-build multiplier on how fast snow settles/melts (variety)
        iceRate = 1, // per-build multiplier on how fast the pond freezes/thaws (variety)
        temp = 0, // biome temperature (~degrees, 0 = freezing): climate + season + time of day + weather
        iceAmt = 0, // how frozen the pond is (0..1), driven by temperature
        rainbow = 0,
        rainbowLife = 0,
        flash = 0,
        flashT = 6,
        boltPts = [],
        snowing = false, // cold scene: precipitation falls as snow
        weatherIsSnow = false, // the falling-particle layer is snowflakes (gate their density on snowI)
        lastSnowDraw = -1, // snowAcc/wetness at last redraw of the (heavy) settling-snow + puddle shapes;
        lastWetDraw = -1, // they only change while those values move, so we skip the rebuild once settled
        lastLightDraw = -1,
        lastIceDraw = -1;
      // baseline climate per biome (~degrees, 0 = freezing); season, time of day and weather shift it
      const TEMP_BASE = {
        grove: 9,
        desert: 22,
        coast: 14,
        wetland: 11,
        alpine: -5,
        savanna: 18,
        bamboo: 12,
        volcanic: 24,
        fjord: -4,
        cave: 7,
        reef: 15,
        jungle: 26,
        canyon: 21,
        polar: -9,
        glade: 13,
        summit: 1
      };
      const SEASON_TEMP = {winter: -16, autumn: -5, spring: 1, summer: 5};
      function nowHour() {
        if (hourParam != null) return parseFloat(hourParam);
        if (timeMode === 'dawn') return 6.4;
        if (timeMode === 'day') return 13;
        if (timeMode === 'dusk') return 18.7;
        if (timeMode === 'night') return 23;
        if (cyc > 0) return ((performance.now() / 1000 / cyc) * 24 + 6) % 24;
        const d = new Date();
        return d.getHours() + d.getMinutes() / 60;
      }
      const SKY = [
        {h: 0, top: '#10183a', bot: '#243a5e', light: 0.3},
        {h: 5, top: '#26305c', bot: '#caa05e', light: 0.45},
        {h: 7, top: '#6aaedd', bot: '#cfe7f2', light: 0.9},
        {h: 12, top: '#54a3e0', bot: '#d6eef0', light: 1},
        {h: 17, top: '#58a6df', bot: '#e2eec6', light: 0.95},
        {h: 19, top: '#39406e', bot: '#e88a4a', light: 0.5},
        {h: 20.5, top: '#141d44', bot: '#2a3e60', light: 0.32},
        {h: 24, top: '#10183a', bot: '#243a5e', light: 0.3}
      ];
      const hx = (s) => [
        parseInt(s.slice(1, 3), 16),
        parseInt(s.slice(3, 5), 16),
        parseInt(s.slice(5, 7), 16)
      ];
      const lp = (a, b, t) => a + (b - a) * t;
      const lpH = (a, b, t) => {
        const A = hx(a),
          B = hx(b);
        return [lp(A[0], B[0], t), lp(A[1], B[1], t), lp(A[2], B[2], t)];
      }; // hex strings
      const mixA = (a, b, t) => [
        lp(a[0], b[0], t),
        lp(a[1], b[1], t),
        lp(a[2], b[2], t)
      ]; // rgb arrays
      const css = (c) => `rgb(${c[0] | 0},${c[1] | 0},${c[2] | 0})`;
      const hexI = (c) => ((c[0] | 0) << 16) | ((c[1] | 0) << 8) | (c[2] | 0);
      function tod(h) {
        for (let i = 0; i < SKY.length - 1; i++)
          if (h >= SKY[i].h && h <= SKY[i + 1].h) {
            const a = SKY[i],
              b = SKY[i + 1],
              t = (h - a.h) / (b.h - a.h || 1);
            return {
              top: lpH(a.top, b.top, t),
              bot: lpH(a.bot, b.bot, t),
              light: lp(a.light, b.light, t)
            };
          }
        return tod(0.01);
      }
      function celestial(h) {
        if (h >= 6 && h <= 19) {
          const f = (h - 6) / 13;
          return {
            x: VW * f,
            y: HZ - Math.sin(f * Math.PI) * HZ * 0.78,
            sun: true
          };
        }
        const nh = h < 6 ? h + 24 : h,
          f = (nh - 19) / 11;
        return {
          x: VW * f,
          y: HZ - Math.sin(f * Math.PI) * HZ * 0.66,
          sun: false
        };
      }
      // ---------- season ----------
      function nowSeason() {
        if (seasonParam) return seasonParam;
        if (seasonMode !== 'auto') return seasonMode;
        const m = new Date().getMonth(); // N hemisphere
        return m < 2 || m === 11
          ? 'winter'
          : m < 5
            ? 'spring'
            : m < 8
              ? 'summer'
              : 'autumn';
      }
      const SEASONS = {
        spring: {
          foliage: 0xeafff0,
          hill: 0xeafff2,
          weather: 'petal',
          snow: false
        },
        summer: {
          foliage: 0xffffff,
          hill: 0xffffff,
          weather: 'none',
          snow: false
        },
        autumn: {
          foliage: 0xffb765,
          hill: 0xe9ce93,
          weather: 'leaf',
          snow: false
        },
        winter: {
          foliage: 0xd2e2ec,
          hill: 0xdfeaf2,
          weather: 'flake',
          snow: true
        }
      };
      const LEAFTINTS = [0xe07a2e, 0xd9a441, 0xc24f2e, 0xb8862e];
      const mulTint = (a, b) => {
        const r = (((a >> 16) & 255) * ((b >> 16) & 255)) / 255,
          g = (((a >> 8) & 255) * ((b >> 8) & 255)) / 255,
          bl = ((a & 255) * (b & 255)) / 255;
        return ((r << 16) | (g << 8) | bl) & 0xffffff;
      };
      // vary a base count by roughly ±a third per build (min 1) — so scatters aren't a fixed number
      const vc = (n) =>
        Math.max(1, Math.round(n * (0.68 + Math.random() * 0.5)));
      // nudge a tint a little per instance (lighter/darker, warmer/cooler), so a stand of one sprite
      // isn't a single flat shade — the foliage reads as living, not stamped copies
      const tintJit = (base, amt) => {
        const a = amt == null ? 0.1 : amt,
          ch = (v) =>
            Math.max(
              0,
              Math.min(255, (v * (1 + (Math.random() - 0.5) * 2 * a)) | 0)
            );
        return (
          (ch((base >> 16) & 255) << 16) |
          (ch((base >> 8) & 255) << 8) |
          ch(base & 255)
        );
      };
      // lerp a hex colour toward cool frost-white (for whitening hills/forest in winter — a job a
      // multiply tint can't do, since multiplying only darkens)
      const frostHex = (c, a) => {
        const w = 0xe6eff7,
          r = (((c >> 16) & 255) * (1 - a) + ((w >> 16) & 255) * a) | 0,
          g = (((c >> 8) & 255) * (1 - a) + ((w >> 8) & 255) * a) | 0,
          b = ((c & 255) * (1 - a) + (w & 255) * a) | 0;
        return (r << 16) | (g << 8) | b;
      };

      // ---------- biome ----------
      let biomeParam = q.get('biome'); // cleared once Journey/Surprise takes over so biomeMode drives
      let biomeMode = LS('biome') || 'grove';
      function nowBiome() {
        return biomeParam || biomeMode;
      }

          ground: 'meadow',
          mid: [
            ['pine', 0.7, 180],

          ],

          critterScale: 0.42,
          hopper: 'rabbit',
          squirrel: true, // a squirrel forages the grove floor now and then
          perchBird: true, // a songbird perches in the canopy and flits between trees
          woodpecker: true, // a woodpecker drums on a trunk by day
          owl: true, // an owl hunts the meadow after dark
          kingfisher: true, // a kingfisher plunge-dives the pond for fish by day
          hedgehog: true, // a hedgehog snuffles the floor at night
          snail: true, // a snail glides out onto the wet grass after rain
          toadstools: true, // fly-agaric sprout under the trees after rain
          dewWeb: true, // a spider's web beads with dew at first light
          ladybird: true, // a ladybird trundles the meadow floor by day
          mouse: true, // a field mouse scurries the meadow grass by day
          grasshopper: true, // a grasshopper springs through the warm meadow grass
          flyer: 0xffffff,
          flutter: true,
          bee: 2, // bumblebees work the wildflowers by day
          bats: 3, // bats feed over the meadow at dusk
          roller: null
        },
        desert: {
          label: '🏜️ Desert',
          sky: 0xfff0d6,
          seasonal: false,
          hills: [0xe9d3a4, 0xdcbb80, 0xcca35f],
          distant: {
            sprite: 'butte',
            count: 4,
            sc: [0.55, 1.0],
            y: 474,
            tint: 0xe7d4ab,
            alpha: 0.96
          }, // textured buttes hazed into the heat shimmer
          ground: 'sand',
          mid: [
            ['cactus', 0.5, 260],

          ],

          nightCritter: 'fennec', // a fennec fox forages the cool night sand
          beetle: true, // a beetle scuttles the sand

          hopper: null,

        },

          critterScale: 0.4,

          roadrunner =
          squirrel =
          songbird =
          beetle =
          snail =
          salamander =
          olm =
          hedgehog =
          mouse =
          grasshopper =
          kingfisher =
          woodpecker =
          fennec =
          aardvark =
          kinkajou =
          octopus =
            null;
        whale =
          spoutG =
          surfG =
          cloudSeaG =
          cloudGlow =
          choughHub =
          beamG =
            null;
        SE = SEASONS[nowSeason()] || SEASONS.summer;
        BI = BIOMES[nowBiome()] || BIOMES.grove;
        // SP = optional per-biome season palette (tint-only seasons); else fall back to the global SEASONS, and non-seasonal biomes ignore the season entirely.
        const SP =
          BI.seasonal && BI.seasonPalette
            ? BI.seasonPalette[nowSeason()]
            : null;
        const folTint =
          BI.foliageTint || (SP ? SP.fol : BI.seasonal ? SE.foliage : 0xffffff);
        const snow =
          (SP ? false : BI.seasonal ? SE.snow : false) || !!BI.snowCaps;
        // build-time darkness (0 by day → 1 deep night) so nocturnal life knows whether to come out
        const buildNight = Math.min(
          1,
          Math.max(0, (0.78 - tod(nowHour()).light) / 0.46)
        );
        const weatherKind =
          BI.ambientWeather || // a biome can force a constant fall (blossom petals)
          (SP
            ? SP.weather || 'none'
            : BI.seasonal
              ? SE.weather
              : snow
                ? 'flake'
                : 'none');
        const hillTint = SP ? SP.hill : BI.seasonal ? SE.hill : 0xffffff;
        const grassTint = SP && SP.grass ? SP.grass : null;
        lastSkyH = -99; // force the sky to redraw into the fresh Graphics next frame

        farLayer = new PIXI.Container();
        root.addChild(farLayer); // sky/celestial group: parallaxes less than the foreground scene
        sky = new PIXI.Graphics();
        sky.tint = BI.underwater || BI.canopy || BI.glade ? 0xffffff : BI.sky; // underwater/canopy/glade paint their own true colours
        farLayer.addChild(sky);
        auroraG = new PIXI.Graphics();
        auroraG.blendMode = PIXI.BLEND_MODES.ADD;
        farLayer.addChild(auroraG); // polar lights (aurora biomes only)

        stars = new PIXI.Container();
        farLayer.addChild(stars);
        const sg = new PIXI.Graphics();
        for (let i = 0; i < 70; i++) {
          sg.beginFill(0xffffff, 0.5 + Math.random() * 0.5);
          sg.drawCircle(
            Math.random() * VW,
            Math.random() * HZ * 0.95,
            Math.random() < 0.2 ? 1.6 : 1
          );
          sg.endFill();
        }
        stars.addChild(sg);
        rainbowG = new PIXI.Graphics();
        farLayer.addChild(rainbowG); // rainbow arc (behind the sun/clouds), shown after a daytime shower
        shoot = null;
        shootT = 3 + Math.random() * 5; // shooting-star state (its layer is added on top, below, so the meteor stays above the night veil)

        sunGlow = spr('glow', 0, 0, 3.4, 0.5, 0.5);
        sunGlow.blendMode = PIXI.BLEND_MODES.ADD;
        farLayer.addChild(sunGlow);
        sun = spr('sun', 0, 0, 1, 0.5, 0.5);
        farLayer.addChild(sun);
        moon = spr('moon', 0, 0, 0.9, 0.5, 0.5);
        farLayer.addChild(moon);
        // clip the moon to tonight's phase (the disc is r=40 in a 100px sprite → 0.8 of the half-width)
        moonR = (moon.width / 2) * 0.8;
        moonPh = moonPhaseFraction();
        moonShadow = new PIXI.Graphics();
        farLayer.addChild(moonShadow);
        moon.mask = moonShadow;
        drawMoonPhase(moonShadow, 0, 0, moonR, moonPh); // a sensible static phase for reduced motion
        raysG = new PIXI.Graphics();
        raysG.blendMode = PIXI.BLEND_MODES.ADD;
        farLayer.addChild(raysG); // god-rays shafting from the sun through breaking cloud (clouds render over)

        if (!BI.interior && !BI.underwater && !BI.canopy && !BI.glade) {
          // this build's cloud mood shifts the sky's whole character — a fair-weather scatter, big
          // low cumulus, high thin wisps, or a near-clear sky. Count still scales with width so a
          // wide sky isn't left bare.
          const cmr = Math.random();
          const cm =
            cmr < 0.22
              ? {
                  nMul: 0.55,
                  scAdd: 0.55,
                  yLo: 95,
                  yR: 120,
                  sx: 0.92,
                  sy: 1.06,
                  al: 1
                } // big low cumulus
              : cmr < 0.44
                ? {
                    nMul: 1.3,
                    scAdd: -0.06,
                    yLo: 38,
                    yR: 76,
                    sx: 1.95,
                    sy: 0.46,
                    al: 0.6
                  } // high thin wisps
                : cmr < 0.56
                  ? {
                      nMul: 0.3,
                      scAdd: 0,
                      yLo: 55,
                      yR: 150,
                      sx: 1,
                      sy: 1,
                      al: 0.95
                    } // a near-clear sky
                  : {nMul: 1, scAdd: 0, yLo: 60, yR: 150, sx: 1, sy: 1, al: 1}; // fair-weather scatter
          const baseN = 1 + ((Math.random() * 6 * XS) | 0);
          for (
            let i = 0, n = Math.max(1, Math.round(baseN * cm.nMul));
            i < n;
            i++
          ) {
            const sc = Math.max(0.2, 0.5 + Math.random() * 0.5 + cm.scAdd),
              c = spr(
                'cloud',
                Math.random() * VW,
                cm.yLo + Math.random() * cm.yR,
                sc,
                0.5,
                0.5
              );
            // squash/stretch and flip each one so no two puffs are the same shape
            c.scale.set(
              sc *
                (0.8 + Math.random() * 0.5) *
                cm.sx *
                (Math.random() < 0.5 ? -1 : 1),
              sc * (0.78 + Math.random() * 0.34) * cm.sy
            );
            c.alpha = cm.al;
            c.vx = 0.12 + Math.random() * 0.22;
            clouds.push(c);
            farLayer.addChild(c);
          }
        }

        // crossing flyer (bird, or bat underground); reef + jungle handle their own flyers below
        if (!BI.underwater && !BI.canopy && !BI.glade) {
          const bird = anim(
            BI.flyerFrames || ['bird_a', 'bird_b'],
            -80,
            150,
            0.7,
            0.06
          );
          bird.isBird = true;
          bird.isBat = !!BI.interior; // bats flit erratically rather than gliding across
          bird.vx = 1.2;
          bird.vy = 0;
          bird.tint = BI.flyer ? tintJit(BI.flyer, 0.12) : 0xffffff; // a slightly different bird each time
          flutters.push(bird);
          farLayer.addChild(bird);
        }

        // migrating flock: a V of birds that crosses the sky occasionally (created hidden, parallaxes with the far sky); a different-sized skein each time
        if (!BI.interior && !BI.underwater && !BI.canopy && !BI.glade)
          for (let i = 0, n = 5 + ((Math.random() * 5) | 0); i < n; i++) {
            const fb = anim(
              ['bird_a', 'bird_b'],
              0,
              0,
              0.4,
              0.05 + Math.random() * 0.02
            );
            fb.tint = 0x49515f;
            fb.visible = false;
            fb.wing = i === 0 ? 0 : Math.ceil(i / 2) * (i % 2 ? -1 : 1);
            fb.ph = Math.random() * 6.28;
            flock.push(fb);
            farLayer.addChild(fb);
          }
        flockT = 8 + Math.random() * 14;

        // dusk murmuration: a cloud of starlings wheels and boils over the horizon before they
        // roost. Built as dark specks on the far sky; a dusk factor fades it in (set pre-veil so
        // it's right under reduced motion), and the swirl itself is driven from the ticker.
        murmurC = null;
        if (!BI.interior && !BI.underwater && !BI.canopy) {
          murmurC = new PIXI.Container();
          murmurC.alpha = 0;
          farLayer.addChild(murmurC);
          for (let i = 0; i < 56; i++) {
            const b = spr(
              'bird_a',
              0,
              0,
              0.1 + Math.random() * 0.055,
              0.5,
              0.5
            );
            b.tint = 0x2c333f;
            b.a0 = Math.random() * 6.283; // its fixed angle within the cloud
            b.r0 = Math.sqrt(Math.random()); // sqrt fills the disk evenly to the rim
            b.wob = Math.random() * 6.283;
            b.ws = 0.8 + Math.random() * 0.9;
            // a static blob, in case the swirl ticker doesn't run (reduced motion)
            b.x = VW * 0.5 + Math.cos(b.a0) * b.r0 * 150;
            b.y = 200 + Math.sin(b.a0) * b.r0 * 58;
            murmur.push(b);
            murmurC.addChild(b);
          }
          if (reduce.matches)
            murmurC.alpha =
              Math.exp(-Math.pow((nowHour() - 18.1) / 0.95, 2)) * 0.85;
        }

        // ---- scene (everything that night darkens) ----
        scene = new PIXI.Container();
        root.addChild(scene);
        // overcast: a soft grey wash that dims sky + scene when clouds gather (above the scene, below the rain)
        overcastG = new PIXI.Graphics();
        overcastG
          .beginFill(0x6b7686)
          .drawRect(-40, -40, VW + 80, VH + 80)
          .endFill();
        overcastG.alpha = 0;
        root.addChild(overcastG);
        if (BI.distant) {
          // the far horizon landform sits behind everything, including any feature landmark
          const D = BI.distant;
          // a continuous landform (mountain range / ridge / forest) is drawn procedurally; depends on
          // spanning + connecting across the whole horizon, so it can't be a fixed sprite
          if (D.style) scene.addChild(drawDistant(D, snow ? 1 : 0));
          // discrete landforms (buttes) are designed, textured sprites scattered across the horizon
          if (D.sprite) {
            const span = VW / D.count;
            for (let i = 0; i < D.count; i++) {
              const bx = (i + 0.5) * span + (Math.random() - 0.5) * span * 0.7,
                bt = spr(
                  D.sprite,
                  bx,
                  D.y,
                  D.sc[0] + Math.random() * (D.sc[1] - D.sc[0])
                );
              bt.tint = D.tint;
              if (D.alpha != null) bt.alpha = D.alpha;
              scene.addChild(bt);
            }
          }
          // far acacia (the real sprite, small + hazed) standing on the savanna ridge — reads as trees, not blobs
          if (D.trees)
            for (let i = 0; i < D.trees; i++) {
              const x = 40 + Math.random() * (VW - 80),
                tr = spr(
                  'acacia',
                  x,
                  ridgeY(x) + 3,
                  0.13 + Math.random() * 0.05
                );
              tr.tint = 0xa7b48f; // sun-bleached, hazed into the distance
              tr.alpha = 0.9;
              scene.addChild(tr);
            }
        }
        if (BI.feature) {
          const fe = spr(BI.feature, 640, 486, 0.95);
          scene.addChild(fe);
        } // large background landmark (in front of the distant range, behind the hills)
        // randomise the land for this build: the front ground (gFreq/gPh/gAmp…, set above) carries
        // the trees; two rolling background bands get their own wave each. Stored as contour
        // functions so the crest snow follows whatever shape they take.
        // this build's terrain mood: usually gentle rolls, but sometimes a near-flat plain and
        // sometimes a notably hillier run, so the land's character changes build to build. The
        // hillier setting is held back on water biomes so a deep roll can't undercut the pond bank.
        const tMood = Math.random();
        const relief = tMood < 0.3 ? 0.5 : tMood > 0.76 && !BI.water ? 1.7 : 1;
        gFreq = 0.0042 + Math.random() * 0.0045; // wavelength of the rolls
        gPh = Math.random() * 6.283;
        gAmp = (17 + Math.random() * 17) * relief; // flatter ↔ hillier
        gBase = 530 + Math.random() * 10;
        gFreq2 = 0.013 + Math.random() * 0.01; // a second, shorter roll for a less sine-y line
        gPh2 = Math.random() * 6.283;
        gAmp2 = (4 + Math.random() * 8) * relief;
        const wave = (cy, a, p, f) => (x) => cy + Math.sin(x * f + p) * a;
        const HILLS = [
          wave(
            396 + Math.random() * 28,
            18 + Math.random() * 15,
            Math.random() * 6.283,
            0.004 + Math.random() * 0.004
          ),
          wave(
            450 + Math.random() * 24,
            20 + Math.random() * 15,
            Math.random() * 6.283,
            0.0045 + Math.random() * 0.004
          ),
          groundY // the front band IS the ground the trees and animals stand on
        ];
        hillBands.length = 0;
        if (BI.cloudSea) {
          // ── above the clouds: snow peaks poking through a slow rolling sea of cloud ──
          const surfY = (x) =>
            500 + Math.sin(x * 0.012) * 12 + Math.sin(x * 0.031 + 1) * 6;
          // a natural, jagged range: a multi-octave silhouette (peaks at all heights), snow that
          // clings to the high ground in patches with rock spurs poking through, and a wandering
          // snowline — so the snow never starts from one flat line. Feet hidden in the cloud.
          const off = Math.random() * 3000; // a different slice of the range each visit
          const ridgeY = (x) => {
            x += off;
            return (
              266 +
              Math.sin(x * 0.0061 + 1.2) * 80 + // where the big peaks rise / valleys fall
              Math.sin(x * 0.0173 + 3.0) * 34 + // secondary ridges
              Math.sin(x * 0.047 + 0.7) * 16 + // jaggedness
              Math.sin(x * 0.121 + 2.1) * 7 // fine roughness
            );
          };
          const peaks = new PIXI.Graphics();
          peaks.beginFill(0x808fa4); // rock massif
          peaks.moveTo(-60, 660);
          for (let x = -60; x <= VW + 60; x += 5) peaks.lineTo(x, ridgeY(x));
          peaks.lineTo(VW + 60, 660);
          peaks.closePath();
          peaks.endFill();
          peaks.beginFill(0x5c6b80, 0.5); // a hazier, shadowed lower band for depth
          peaks.moveTo(-60, 660);
          for (let x = -60; x <= VW + 60; x += 5)
            peaks.lineTo(x, ridgeY(x) + 130);
          peaks.lineTo(VW + 60, 660);
          peaks.closePath();
          peaks.endFill();
          for (let x = -30; x <= VW + 30; x += 53) {
            // shaded gullies running down from the ridge, for rocky texture
            const ry = ridgeY(x);
            peaks.beginFill(0x6c7b90, 0.4);
            peaks.moveTo(x - 3, ry + 6);
            peaks.lineTo(x + 4, ry + 6);
            peaks.lineTo(x + 9, 660);
            peaks.lineTo(x - 8, 660);
            peaks.closePath();
            peaks.endFill();
          }
          const snowLo = (x) => {
            x += off;
            return (
              352 +
              Math.sin(x * 0.013) * 22 +
              Math.sin(x * 0.043 + 1.5) * 14 +
              Math.sin(x * 0.105 + 0.3) * 7
            ); // the snowline wanders, never flat
          };
          let run = [];
          const flushSnow = () => {
            if (run.length < 2) return;
            for (const [col, a, dy] of [
              [0xbfd2e6, 0.85, 7], // faint blue under-shadow
              [0xeef5fb, 0.97, 0] // bright snow over it
            ]) {
              peaks.beginFill(col, a);
              peaks.moveTo(run[0][0], snowLo(run[0][0]) + dy);
              for (const p of run) peaks.lineTo(p[0], p[1] + dy); // along the ridge
              for (let k = run.length - 1; k >= 0; k--)
                peaks.lineTo(run[k][0], snowLo(run[k][0]) + dy); // back along the snowline
              peaks.closePath();
              peaks.endFill();
            }
          };
          for (let x = -60; x <= VW + 60; x += 5) {
            const ry = ridgeY(x),
              lo = snowLo(x),
              sx = x + off,
              spur =
                Math.sin(sx * 0.19 + 0.4) * 0.6 + Math.sin(sx * 0.07 + 2) * 0.5; // rock spurs break the snow up
            if (ry <= lo - 3 && spur > -0.5) run.push([x, ry]);
            else {
              flushSnow();
              run = [];
            }
          }
          flushSnow();
          scene.addChild(peaks);
          cloudSeaG = new PIXI.Container();
          const body = new PIXI.Graphics();
          body.beginFill(0xe7f0f8); // the cloud mass
          body.moveTo(-60, VH + 60);
          for (let x = -60; x <= VW + 60; x += 12) body.lineTo(x, surfY(x));
          body.lineTo(VW + 60, VH + 60);
          body.closePath();
          body.endFill();
          body.beginFill(0x9fb6cc, 0.45); // hazy depth lower down
          body.moveTo(-60, VH + 60);
          for (let x = -60; x <= VW + 60; x += 12)
            body.lineTo(x, surfY(x) + 90);
          body.lineTo(VW + 60, VH + 60);
          body.closePath();
          body.endFill();
          cloudSeaG.addChild(body);
          // a fluffy rolling top made of soft cloud puffs sitting on the surface
          for (let x = -40; x <= VW + 80; x += 64) {
            const c = spr(
              'cloud',
              x + (Math.random() - 0.5) * 22,
              surfY(x) + 10,
              0.5 + Math.random() * 0.3,
              0.5,
              0.5
            );
            c.tint = 0xf4f9fd;
            cloudSeaG.addChild(c);
          }
          scene.addChild(cloudSeaG);
          // a few nearer puffs drifting over the sea (reuse the cloud drift + day/night tint)
          for (let i = 0; i < 3; i++) {
            const c = spr(
              'cloud',
              Math.random() * VW,
              486 + Math.random() * 40,
              0.6 + Math.random() * 0.45,
              0.5,
              0.5
            );
            c.vx = 0.14 + Math.random() * 0.2;
            clouds.push(c);
            scene.addChild(c);
          }
          // (eagles soar over the cloud sea via the shared BI.soar builder above)
          // warm light that catches the cloud tops at sunrise / sunset (ADD; alpha set by the sun's height)
          cloudGlow = new PIXI.Sprite(
            gradTex(
              [
                [0, '#000000'],
                [0.42, '#ffba74'],
                [1, '#000000']
              ],
              180
            )
          );
          cloudGlow.position.set(-40, 420);
          cloudGlow.width = VW + 80;
          cloudGlow.height = 180;
          cloudGlow.blendMode = PIXI.BLEND_MODES.ADD;
          const cel0 = celestial(nowHour()); // a correct static value for reduced motion
          cloudGlow.alpha =
            (cel0.sun ? Math.max(0, Math.min(1, (cel0.y - 240) / 175)) : 0) *
            0.62;
          scene.addChild(cloudGlow);
        } else {
          for (const fn of HILLS) hillBands.push(fn); // remembered so settling snow can thicken each crest over time
          HILLS.forEach((fn, i) => {
            // winter whitens the actual hill colour (deeper on the near bands), then the seasonal
            // multiply tint still cools it — so the slopes read as snow, not green under a wash
            const base = snow
              ? frostHex(BI.hills[i], 0.45 + i * 0.12)
              : BI.hills[i];
            const hh = hill(fn, base);
            hh.tint = hillTint;
            scene.addChild(hh);
          });
        }
        if (BI.fog) {
          // distant haze softening the hills, behind the trees
          const fz = new PIXI.TilingSprite(T('fog'), VW + 120, 120);
          fz.position.set(-60, 372);
          fz.tileScale.set(1.6, 120 / 90);
          fz.baseA = 0.62;
          fz.spd = 0.1;
          fz.windF = 4;
          scene.addChild(fz);
          fogLayers.push(fz);
        }
        // crest snow lives just behind the trees; redrawn each frame to grow with accumulation
        crestG = new PIXI.Graphics();
        scene.addChild(crestG);
        const ceilEdge = (x) =>
          74 + Math.sin(x * 0.012 + 1) * 26 + Math.sin(x * 0.05) * 8;
        if (BI.interior) {
          // rock ceiling across the top with stalactites hanging from its underside
          const ceil = new PIXI.Graphics();
          ceil.beginFill(0x130f1d);
          ceil.moveTo(-40, -40);
          ceil.lineTo(VW + 40, -40);
          for (let x = VW + 40; x >= -40; x -= 26) ceil.lineTo(x, ceilEdge(x));
          ceil.closePath();
          ceil.endFill();
          scene.addChild(ceil);
          for (
            let x = 70 + Math.random() * 60;
            x < VW - 30;
            x += 120 + Math.random() * 90 // spaced across the full ceiling, however wide the cave
          ) {
            const cy = ceilEdge(x),
              s = spr(
                'stalactite',
                x,
                cy - 6,
                0.42 + Math.random() * 0.5,
                0.5,
                0
              );
            scene.addChild(s);
            if (Math.random() < 0.55)
              drips.push({
                x,
                y0: cy + 200 * s.scale.y,
                t: Math.random() * 4,
                dropY: null
              });
          }
          // the big rock ledge (a designed sprite, tinted to the cave's cool stone), behind the crystals
          if (BI.waterfall && BI.waterfall.rock) {
            const wf = BI.waterfall,
              rk = spr('bigrock', wf.x, wf.y, wf.scale, wf.ax, 1);
            rk.tint = wf.rock; // lit enough to read against the dark
            scene.addChild(rk);
          }
        }
        if (BI.canopy) {
          // a dense leaf canopy across the top with a lumpy underside (the gaps let the light + rays through)
          const cEdge = (x) =>
            96 +
            Math.sin(x * 0.013 + 1) * 30 +
            Math.abs(Math.sin(x * 0.088)) * 16;
          const cg = new PIXI.Graphics();
          cg.beginFill(0x244c21);
          cg.moveTo(-40, -40);
          cg.lineTo(VW + 40, -40);
          for (let x = VW + 40; x >= -40; x -= 9) cg.lineTo(x, cEdge(x));
          cg.closePath();
          cg.endFill();
          cg.beginFill(0x357b33, 0.55); // lit leaf clumps
          for (let i = 0; i < 28; i++) {
            const x = -20 + Math.random() * (VW + 40);
            cg.drawEllipse(x, cEdge(x) - 16 + Math.random() * 8, 24, 15);
          }
          cg.endFill();
          cg.beginFill(0x16330f, 0.5); // shaded underside fringe
          for (let i = 0; i < 32; i++) {
            const x = -20 + Math.random() * (VW + 40);
            cg.drawEllipse(x, cEdge(x) - 3, 17, 10);
          }
          cg.endFill();
          scene.addChild(cg);
          // dappled light shafts breaking through the canopy (additive, drawn each frame, behind the trees)
          causticG = new PIXI.Graphics();
          causticG.blendMode = PIXI.BLEND_MODES.ADD;
          scene.addChild(causticG);
        }
        // cloud shadows: soft dark patches that drift across the hills when the sun is out behind
        // broken cloud. Multiply-blended over the land (under the trees) so only the ground dims.
        if (!BI.interior && !BI.underwater && !BI.canopy && !BI.glade) {
          const csl = new PIXI.Container();
          scene.addChild(csl);
          csl.alpha = 0;
          cloudShadows.layer = csl;
          for (let i = 0; i < 4; i++) {
            const s = spr(
              'glow',
              (i / 4) * VW + Math.random() * 220,
              498 + Math.random() * 66,
              5 + Math.random() * 3,
              0.5,
              0.5
            );
            s.tint = 0x556074; // cool grey shade
            s.blendMode = PIXI.BLEND_MODES.MULTIPLY;
            s.scale.y *= 0.38; // flatten so the shadow pools low along the ground, off the sky
            s.spd = 0.7 + Math.random() * 0.7;
            cloudShadows.push(s);
            csl.addChild(s);
          }
        }
        // in a snowy scene, lay a snow sprite over each pine/oak as a child, so it settles on the
        // branches and sways with the tree; its alpha tracks how much snow has piled up
        const SNOWABLE = {
          pine: 1,
          oak: 1,

          aardvark = spr(

        if (BI.penguins) {

        }
        // lift any framing rocks above the animals so they pass behind the side rocks (canyon mesas)
        for (const r of frontRocks) scene.addChild(r);

        // little kicked-up specks (grass, dirt, bark) when a paw, talon or bill strikes — sits in
        // front of the land creatures, behind the pond foreground; empty where nothing kicks up
        burstG = new PIXI.Graphics();
        scene.addChild(burstG);
        // water biomes (pond) — reflections, lilies, ducks, dragonflies
        glit = new PIXI.Graphics();
        reflLayer = null;
        frogTongueG = null;
        pondShape = null;
        waterL = 120;
        waterR = VW - 120;
        if (BI.water) {
          // calm freshwater biomes hold an enclosed pond most visits (grass banks wrap round an oval

          // when it is a pond its size, depth and placement vary, so the water shape is never the

          // to waterL..waterR so none strays onto the grass.
          if (BI.water.pond && !snow && Math.random() < 0.66) {
            const wide = Math.random() < 0.5; // a broad central pool or a smaller pool set off to one side
            const rx =
                VW *
                (wide
                  ? 0.4 + Math.random() * 0.06
                  : 0.29 + Math.random() * 0.08),
              cx = VW / 2 + (Math.random() - 0.5) * (wide ? 90 : 230),
              // the far shore sits a touch INTO the water (>= 606, never above the 600 waterline) so
              // the oval's top never exposes the grass behind it; the depth varies the rest
              top = 606 + Math.random() * 8,
              bot = 700 + Math.random() * 24,
              cy = (top + bot) / 2,
              ry = (bot - top) / 2;
            pondShape = {cx, cy, rx, ry};
            waterL = cx - rx * 0.82;
            waterR = cx + rx * 0.82;
          }
          water = new PIXI.Sprite(
            gradTex(
              [
                [0, BI.water.top],
                [1, BI.water.bot]
              ],

            )

          water.width = VW + 80;
          water.height = VH - 600;
          water.tint = snow ? 0xcfe6ef : 0xffffff;
          scene.addChild(water);
          if (BI.water.olm) {
            // a pale, blind olm drifts just under the surface of the still cave pool

            olm = spr(
              'olm',
              ox,
              624 + Math.random() * 26,
              0.4 + Math.random() * 0.12,
              0.5,
              0.5
            );
            olm.baseSc = Math.abs(olm.scale.x);
            olm.dir = Math.random() < 0.5 ? 1 : -1;
            olm.scale.x = olm.dir * olm.baseSc;
            olm.spd = 0.18 + Math.random() * 0.2; // a slow, ghostly drift
            olm.ph = Math.random() * 6.28;
            olm.ty = olm.y;
            olm.alpha = 0.9;
            scene.addChild(olm);
          }
          if (BI.ground === 'beach') {

            scene.addChild(surfG);
            if (reduce.matches) {
              // a static lapping line when the swash ticker won't run
              const edgeY = 584;
              surfG.beginFill(0x4c3d28, 0.16);
              surfG.drawRect(-40, edgeY + 2, VW + 80, 600 - edgeY);
              surfG.endFill();
              surfG.beginFill(0xffffff, 0.5);
              surfG.moveTo(-40, edgeY + 7);
              for (let x = -40; x <= VW + 40; x += 14)
                surfG.lineTo(
                  x,
                  edgeY + Math.sin(x * 0.05) * 2.3 + Math.sin(x * 0.13) * 1.3
                );
              surfG.lineTo(VW + 40, edgeY + 7);
              surfG.closePath();
              surfG.endFill();

          // bankside trees mirrored in the still water — a soft, wavering reflection just under the

          scene.addChild(glit);
          rippleG = new PIXI.Graphics();

          if (pondShape) {

            for (let i = 0, n = 7 + ((Math.random() * 5) | 0); i < n; i++) {

            ducks.push(dm);
            const drakeTex = Math.random() < 0.5 ? 'wood_duck' : 'duck'; // mallard or wood duck
            const d2 = spr(

            );
            d2.scale.x = -0.55;

            // a moorhen often potters among them — darker, smaller, with a red bill
            if (Math.random() < 0.5) {

              mh.baseSpd = 0.22 + Math.random() * 0.2; // potters a little slower than the ducks

          // a layer for a frog's tongue to flick across, drawn over the frogs each frame
          if (lilies.some((lp) => lp.isFrog)) {
            frogTongueG = new PIXI.Graphics();
            scene.addChild(frogTongueG);
          }
          if (BI.water.drag && !snow) {
            const dn = Math.max(
              1,
              (BI.water.drag === true ? 3 : BI.water.drag) +
                ((Math.random() * 3) | 0) -
                1
            ); // ±1
            // dragonflies come teal, red (a darter) or golden (a hawker); slim blue damselflies
            // flit among them
            const dragonKinds = [
              ['dragonfly_a', 'dragonfly_b'],
              ['dragonfly_r_a', 'dragonfly_r_b'],

          if (

          ) {
            // pond-skaters rest on the calm surface, then dart in quick bursts that ring the water

            for (let i = 0; i < fn; i++) {

              const frames =
                BI.water.fishSprite ||

              const f = anim(

        } else {

        }
        // steep rock walls plunging to the water (the fjord's framing) — in front of the water
        if (BI.cliffs)
          for (const c of BI.cliffs) {

            const cl = spr('cliff', cx, 616, c.s, 0.5, 1);

          }
        streakTile = null;
        if (BI.waterfall && BI.waterfall.falls) {

          scene.addChild(fa);
          if (wf.streak) {

            const s = wf.streak,

            e.cy = BI.soar.yLo + Math.random() * (BI.soar.yHi - BI.soar.yLo);
            e.rx = 100 + Math.random() * 80;
