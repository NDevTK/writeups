      #ui {
        position: fixed;

      const OVERSCAN = 1.05; // a little zoom so parallax layer shifts never reveal the page behind

        const s =
          Math.max(app.screen.width / VW, app.screen.height / VH) * OVERSCAN;
        root.scale.set(s);
        root.position.set(
          (app.screen.width - VW * s) / 2,
          (app.screen.height - VH * s) / 2
        );
      }
      app.renderer.on('resize', fit);
      // gentle parallax: pointer (desktop/standalone) or device tilt (mobile) nudges near layers more than far

        parX = 0,
        parY = 0,
        parTX = 0,
        parTY = 0;

        'pointermove',
        (e) => {
          parTX = (e.clientX / innerWidth - 0.5) * 2;
          parTY = (e.clientY / innerHeight - 0.5) * 2;
        },
        {passive: true}
      );
      addEventListener(
        'deviceorientation',
        (e) => {
          if (e.gamma == null) return;
          parTX = Math.max(-1, Math.min(1, e.gamma / 28));
          parTY = Math.max(-1, Math.min(1, ((e.beta || 45) - 45) / 28));

      function nowHour() {
        if (hourParam != null) return parseFloat(hourParam);
        if (timeMode === 'dawn') return 6.4;
        if (timeMode === 'day') return 13;
        if (timeMode === 'dusk') return 18.7;
        if (timeMode === 'night') return 23;
        if (cyc > 0) return ((performance.now() / 1000 / cyc) * 24 + 6) % 24;
        const d = new Date();
        return d.getHours() + d.getMinutes() / 60;

      const SKY = [
        {h: 0, top: '#10183a', bot: '#243a5e', light: 0.3},
        {h: 5, top: '#26305c', bot: '#caa05e', light: 0.45},
        {h: 7, top: '#6aaedd', bot: '#cfe7f2', light: 0.9},

        {h: 24, top: '#10183a', bot: '#243a5e', light: 0.3}

      const hx = (s) => [
        parseInt(s.slice(1, 3), 16),
        parseInt(s.slice(3, 5), 16),
        parseInt(s.slice(5, 7), 16)

      const lp = (a, b, t) => a + (b - a) * t;
      const lpH = (a, b, t) => {
        const A = hx(a),
          B = hx(b);
        return [lp(A[0], B[0], t), lp(A[1], B[1], t), lp(A[2], B[2], t)];
      }; // hex strings
      const mixA = (a, b, t) => [
        lp(a[0], b[0], t),
        lp(a[1], b[1], t),
        lp(a[2], b[2], t)
      ]; // rgb arrays
      const css = (c) => `rgb(${c[0] | 0},${c[1] | 0},${c[2] | 0})`;
      const hexI = (c) => ((c[0] | 0) << 16) | ((c[1] | 0) << 8) | (c[2] | 0);
      function tod(h) {
        for (let i = 0; i < SKY.length - 1; i++)
          if (h >= SKY[i].h && h <= SKY[i + 1].h) {
            const a = SKY[i],
              b = SKY[i + 1],
              t = (h - a.h) / (b.h - a.h || 1);
            return {
              top: lpH(a.top, b.top, t),
              bot: lpH(a.bot, b.bot, t),
              light: lp(a.light, b.light, t)

          }
        return tod(0.01);
      }
      function celestial(h) {
        if (h >= 6 && h <= 19) {
          const f = (h - 6) / 13;
          return {
            x: VW * f,
            y: HZ - Math.sin(f * Math.PI) * HZ * 0.78,
            sun: true

        const nh = h < 6 ? h + 24 : h,

        return {
          x: VW * f,
          y: HZ - Math.sin(f * Math.PI) * HZ * 0.66,
          sun: false

      function gradTex(stops, h) {
        const c = document.createElement('canvas');

          lg = g.createLinearGradient(0, 0, 0, h);
        stops.forEach(([o, col]) => lg.addColorStop(o, col));
        g.fillStyle = lg;
        g.fillRect(0, 0, 1, h);

      function drawSky(P) {
        // banded gradient via Graphics (no texture upload quirks)
        sky.clear();

          // a cavern: deep rock that fades from near-black at the ceiling to a faint warmth low down
          const top = [16, 12, 24],
            mid = [26, 20, 38],
            bot = [40, 32, 54],
            N = 70;
          for (let i = 0; i < N; i++) {
            const u = i / (N - 1),
              col =
                u < 0.55
                  ? mixA(top, mid, u / 0.55)
                  : mixA(mid, bot, (u - 0.55) / 0.45);
            sky.beginFill(hexI(col));
            sky.drawRect(
              -40,
              Math.floor(u * VH),
              VW + 80,
              Math.ceil(VH / N) + 1
            );
            sky.endFill();
          }
          return;
        }
        const mid = mixA(P.top, P.bot, 0.7),
          N = 90;
        for (let i = 0; i < N; i++) {
          const t = i / (N - 1),
            col =
              t < 0.62
                ? mixA(P.top, mid, t / 0.62)

      function drawAurora(time, night, intensity) {
        // wavy additive ribbons in the upper sky; intensity swells and fades them over minutes
        auroraG.clear();
        if (night < 0.04) return;
        const cols = [0x5fffa6, 0x3ad6ff, 0x9a7aff];
        for (let b = 0; b < 3; b++) {
          const baseY = 66 + b * 30,
            amp = (20 + b * 4) * (0.65 + intensity * 0.6),
            al = night * (0.2 - b * 0.03) * intensity;
          auroraG.beginFill(cols[b], al);
          auroraG.moveTo(0, baseY + Math.sin(time * 0.5 + b) * amp);
          for (let x = 0; x <= VW; x += 24)
            auroraG.lineTo(
              x,
              baseY + Math.sin(x * 0.0045 + time * 0.5 + b) * amp
            );
          for (let x = VW; x >= 0; x -= 24)
            auroraG.lineTo(
              x,
              baseY + 48 + Math.sin(x * 0.0045 + time * 0.5 + b + 1.4) * amp
            );
          auroraG.closePath();
          auroraG.endFill();
        }
      }

          for (const lp of lilies) if (lp.isFrog) scene.addChild(lp);
          if (BI.water.drag && !snow) {
            const dn = BI.water.drag === true ? 3 : BI.water.drag;
            for (let i = 0; i < dn; i++) {
              const d = anim(
                ['dragonfly_a', 'dragonfly_b'],
                200 + Math.random() * 880,
                612 + Math.random() * 60,
                0.45,
                0.4
              );
              d.vx = (Math.random() - 0.5) * 2.4;
              d.vy = (Math.random() - 0.5) * 1.2;
              d.lo = 605;
              d.hi = 690;
              flutters.push(d);
              scene.addChild(d);
            }
          }
          if (BI.water.sailboat) {
            const sb = spr('sailboat', 740, 606, 0.5);
            sb.baseY = 606;
            sb.vx = 0.22;
            ducks.push(sb);
            scene.addChild(sb);
          }
        } else {
          scene.addChild(glit);
          water = null;
          iceG = null;
        }
        streakTile = null;
        if (BI.waterfall && BI.waterfall.falls) {
          // the falling water is a 2-frame sprite, in front of the rock + pool
          const wf = BI.waterfall,
            fa = anim(wf.falls, wf.x, wf.y, wf.scale, 0.05);
          fa.anchor.set(wf.ax, 1);
          if (reduce.matches) fa.gotoAndStop(0); // hold a still frame when motion is reduced
          scene.addChild(fa);
          if (wf.streak) {
            // a seamless streak texture scrolled down over the cascade — this is what reads as "flowing"
            const s = wf.streak,
              ts = new PIXI.TilingSprite(T('wstreak'), s.w, s.h);
            ts.position.set(s.x, s.y);
            ts.tileScale.set(s.scale);
            ts.alpha = s.alpha;
            ts.spd = s.speed;
            scene.addChild(ts);
            streakTile = ts;
          }
        }
        if (BI.flutter && !snow)
          for (let i = 0; i < 4; i++) {
            const f = anim(
              ['butterfly_a', 'butterfly_b'],
              Math.random() * VW,
              500 + Math.random() * 70,
              0.5,
              0.18
            );
            f.vx = (Math.random() - 0.5) * 1.2;
            f.vy = (Math.random() - 0.5) * 0.8;
            f.lo = 470;
            f.hi = 590;
            flutters.push(f);
            scene.addChild(f);
          }

        // night veil (multiply) — only darkens the scene's pixels
        veil = new PIXI.Graphics();
        veil
          .beginFill(0x2b3a66)
          .drawRect(-40, -40, VW + 80, VH + 80)
          .endFill();
        veil.blendMode = PIXI.BLEND_MODES.MULTIPLY;
        scene.addChild(veil);

        // fireflies above the veil (warm seasons only) — or glowworms strung under a cave ceiling
        const fl = new PIXI.Container();
        root.addChild(fl);
        fireflies.fl = fl;
        const hasFlies =
          BI.glow === 'cave' ||
          ((BI.ground === 'meadow' ||
            BI.ground === 'marsh' ||
            BI.ground === 'fern') &&
            !snow);
        if (hasFlies) {
          const cave = BI.glow === 'cave',
            n = cave ? 30 : 16;
          for (let i = 0; i < n; i++) {
            const gx = 40 + Math.random() * (VW - 80),
              g = spr(
                'glow',
                gx,
                cave
                  ? ceilEdge(gx) + 10 + Math.random() * 120
                  : 470 + Math.random() * 130,
                cave ? 0.1 + Math.random() * 0.06 : 0.16,
                0.5,
                0.5
              );
            g.tint = cave ? 0x8ff0ff : 0xeaff8a;
            g.blendMode = PIXI.BLEND_MODES.ADD;
            g.ph = Math.random() * 6.28;
            g.vx = (Math.random() - 0.5) * (cave ? 0.16 : 0.4);
            g.vy = (Math.random() - 0.5) * (cave ? 0.12 : 0.3);
            fireflies.push(g);
            fl.addChild(g);
          }
        }

        // seasonal weather: drifting petals / tumbling leaves / falling snow
        const wl = new PIXI.Container();
        root.addChild(wl);
        weather.layer = wl;
        if (weatherKind !== 'none') {
          const count =
              weatherKind === 'flake' ? 70 : weatherKind === 'leaf' ? 26 : 34,
            kind = weatherKind;
          for (let i = 0; i < count; i++) {
            const p = spr(
              kind === 'flake' ? 'flake' : kind === 'leaf' ? 'leaf' : 'petal',
              Math.random() * VW,
              Math.random() * VH,
              kind === 'flake'
                ? 0.3 + Math.random() * 0.4
                : 0.5 + Math.random() * 0.5,
              0.5,
              0.5
            );
            if (kind === 'leaf')
              p.tint = LEAFTINTS[(Math.random() * LEAFTINTS.length) | 0];
            p.vy =
              kind === 'flake'
                ? 0.6 + Math.random() * 0.8
                : kind === 'leaf'
                  ? 1 + Math.random() * 1.2
                  : 0.7 + Math.random() * 0.8;
            p.vx = (Math.random() - 0.5) * (kind === 'leaf' ? 1.2 : 0.6);
            p.spin = (Math.random() - 0.5) * (kind === 'leaf' ? 0.06 : 0.02);
            p.ph = Math.random() * 6.28;
            p.sw = kind === 'flake' ? 0.5 : 1.2;
            weather.push(p);
            wl.addChild(p);
          }
        }

        // rain (independent of season; toggled live) — drawn each frame
        rainG = new PIXI.Graphics();
        root.addChild(rainG);
        rainDrops.length = 0;
        for (let i = 0; i < 130; i++)
          rainDrops.push({
            x: Math.random() * VW,
            y: Math.random() * VH,
            len: 9 + Math.random() * 8,
            sp: 9 + Math.random() * 5
          });

        // volcanic feature: crater glow, drifting smoke, rising embers (all on root so night never dims them)
        if (BI.feature === 'volcano') {
          lavaGlow = spr('glow', 640, 270, 1.6, 0.5, 0.5);
          lavaGlow.tint = 0xff6a26;
          lavaGlow.blendMode = PIXI.BLEND_MODES.ADD;
          root.addChild(lavaGlow);
          for (let i = 0; i < 4; i++) {
            const p = spr('cloud', 636, 262 - i * 42, 0.22, 0.5, 0.5);
            p.tint = 0x4a444c;
            p.alpha = 0.5;
            p.ph = Math.random() * 6.28;
            smoke.push(p);
            root.addChild(p);
          }
        }
        if (BI.embers)
          for (let i = 0; i < 22; i++) {
            const e = spr(
              'glow',
              Math.random() * VW,
              400 + Math.random() * 180,
              0.07 + Math.random() * 0.06,
              0.5,
              0.5
            );
            e.tint = Math.random() < 0.5 ? 0xff7a2a : 0xffb84a;
            e.blendMode = PIXI.BLEND_MODES.ADD;
            e.vy = -(0.3 + Math.random() * 0.6);
            e.vx = (Math.random() - 0.5) * 0.3;
            e.ph = Math.random() * 6.28;
            embers.push(e);
            root.addChild(e);
          }

        shootG = new PIXI.Graphics();
        root.addChild(shootG); // shooting stars render on top, above the night veil so the meteor reads bright

        flashG = new PIXI.Graphics();
        flashG.blendMode = PIXI.BLEND_MODES.ADD;
        root.addChild(flashG); // lightning flash + bolt, on top so it lights the whole scene

        fit();
        ready = true;
      }

      // ---- opt-in ambient audio: a soft rain hiss + thunder that trails the lightning ----
      // everything is guarded so a missing/blocked AudioContext just stays silent.
      let audio = null;
      function initAudio() {
        if (audio) return audio;
        try {
          const AC = window.AudioContext || window.webkitAudioContext;
          if (!AC) return null;
          const ctx = new AC();
          const master = ctx.createGain();
          master.gain.value = 0;
          master.connect(ctx.destination);
          // one reusable 2s white-noise buffer feeds both the rain and the thunder
          const buf = ctx.createBuffer(1, ctx.sampleRate * 2, ctx.sampleRate);
          const data = buf.getChannelData(0);
          for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
          // steady rain: looped noise shaped to a wet hiss
          const rainSrc = ctx.createBufferSource();
          rainSrc.buffer = buf;
          rainSrc.loop = true;
          const hp = ctx.createBiquadFilter();
          hp.type = 'highpass';
          hp.frequency.value = 600;
          const lp = ctx.createBiquadFilter();
          lp.type = 'lowpass';
          lp.frequency.value = 3200;
          const rainGain = ctx.createGain();
          rainGain.gain.value = 0;
          rainSrc.connect(hp).connect(lp).connect(rainGain).connect(master);
          rainSrc.start();
          audio = {ctx, master, rainGain, buf};
        } catch (e) {
          audio = null;
        }
        return audio;
      }
      function thunder() {
        if (!audio) return;
        try {
          const {ctx, master, buf} = audio;
          const now = ctx.currentTime;
          const src = ctx.createBufferSource();
          src.buffer = buf;
          const lp = ctx.createBiquadFilter();
          lp.type = 'lowpass';
          lp.frequency.setValueAtTime(400, now);
          lp.frequency.exponentialRampToValueAtTime(90, now + 2.2);
          const g = ctx.createGain();
          g.gain.setValueAtTime(0.0001, now);
          g.gain.exponentialRampToValueAtTime(0.9, now + 0.08); // the crack
          g.gain.exponentialRampToValueAtTime(0.0001, now + 2.6); // the rolling decay
          src.connect(lp).connect(g).connect(master);
          src.start(now);
          src.stop(now + 2.7);
        } catch (e) {}
      }

      let t = 0;
      app.ticker.add((dt) => {
        if (!ready || document.hidden) return;
        const h = nowHour(),
          P = tod(h),
          cel = celestial(h),
          night = Math.min(1, Math.max(0, (0.78 - P.light) / 0.46));
        if (!reduce.matches) t += dt / 60;

        // sky (rebuild texture only when the hour shifts)
        if (Math.abs(h - lastSkyH) > 0.04) {
          lastSkyH = h;
          drawSky(P);
        }
        veil.alpha = BI.interior ? night * 0.2 : night * 0.72; // a cave is already dark; barely dims further
        stars.alpha = BI.interior ? 0 : night;

        // ---- weather front: clouds gather (cover), a shower rolls through (wet), then it clears ----
        if (!reduce.matches) {
          let coverTarget, wetTarget;
          if (weatherMode === 'rain') {
            coverTarget = 0.8;
            wetTarget = 1;
          } else if (weatherMode === 'clear') {
            coverTarget = 0;
            wetTarget = 0;
          } else {
            frontT -= dt / 60;
            if (frontT < 0) {
              if (frontState === 'clear') {
                frontState = 'gather';
                frontT = 20 + Math.random() * 14;
              } else if (frontState === 'gather') {
                frontState = 'rain';
                frontT = 28 + Math.random() * 45;
              } else if (frontState === 'rain') {
                frontState = 'clearup';
                frontT = 30;
                if (cel.sun && P.light > 0.72) rainbowLife = 24; // sunshower payoff
              } else {
                frontState = 'clear';
                frontT = 150 + Math.random() * 200;
              }
            }
            coverTarget =
              frontState === 'gather' || frontState === 'rain'
                ? 0.88
                : frontState === 'clearup'
                  ? 0.4
                  : 0;
            wetTarget = frontState === 'rain' ? 1 : 0;
          }
          cover += (coverTarget - cover) * 0.008 * dt;
          wet += (wetTarget - wet) * 0.025 * dt;
          // ground wetness rises in rain and dries slowly afterwards
          const wetUp = wet > 0.3;
          wetness += ((wetUp ? 1 : 0) - wetness) * (wetUp ? 0.012 : 0.004) * dt;
          // snow settles while it falls and melts once it stops
          snowAcc +=
            ((snowing ? 1 : 0) - snowAcc) * (snowing ? 0.005 : 0.007) * dt;
          if (rainbowLife > 0) {
            rainbowLife -= dt / 60;
            rainbow = Math.sin(Math.max(0, 1 - rainbowLife / 24) * Math.PI);
          } else rainbow = 0;
          // lightning: occasional strike during a heavy shower (never underground)
          if (wet > 0.55 && !BI.interior) {
            flashT -= dt / 60;
            if (flashT < 0) {
              flashT = 4 + Math.random() * 11;
              flash = 1;
              if (soundOn) setTimeout(thunder, 800 + Math.random() * 1700); // rumble trails the flash, like distance
              boltPts = [];
              let bx = 180 + Math.random() * (VW - 360),
                by = 0;
              while (by < 430) {
                boltPts.push([bx, by]);
                by += 24 + Math.random() * 26;
                bx += (Math.random() - 0.5) * 56;
              }
              boltPts.push([bx, by]);
            }
          }
          flash = Math.max(0, flash - (dt / 60) * 3.5);
        }
        overcastG.alpha = BI.interior
          ? 0
          : cover * 0.55 * (0.25 + P.light * 0.75); // dim by cover, faint at night (no weather underground)

        // audio follows the mute toggle and swells with the rain (click-free via setTargetAtTime)
        if (audio) {
          const at = audio.ctx.currentTime;
          audio.master.gain.setTargetAtTime(soundOn ? 0.55 : 0, at, 0.4);
          audio.rainGain.gain.setTargetAtTime(
            soundOn ? Math.min(1, wet * 1.1) : 0,
            at,
            0.5
          );
        }

        // rainbow: a coloured arc that fades in after a daytime shower clears
        rainbowG.clear();
        if (rainbow > 0.01 && !BI.interior) {
          const cols = [
            0xff6a6a, 0xffa84a, 0xffe24a, 0x6ad86a, 0x52a8ff, 0x6a6aff, 0xb06aff
          ];
          for (let i = 0; i < 7; i++) {
            rainbowG.lineStyle(8, cols[i], rainbow * 0.45);
            rainbowG.arc(640, 620, 420 - i * 8, Math.PI * 1.06, Math.PI * 1.94);
          }
        }

        // puddles: grow with ground wetness, reflecting a sliver of sky, then dry up
        puddleG.clear();
        if (wetness > 0.02 && !BI.interior) {
          for (const pd of puddles) {
            const rx = pd.r * Math.min(1, wetness * 1.3);
            puddleG.beginFill(0x2b3a52, wetness * 0.28);
            puddleG.drawEllipse(pd.x, pd.y, rx, rx * 0.3);
            puddleG.endFill();
            puddleG.beginFill(
              hexI(lpH('#5b7da0', '#d6ecff', P.light)),
              wetness * 0.5
            );
            puddleG.drawEllipse(pd.x, pd.y - 1, rx * 0.82, rx * 0.22);
            puddleG.endFill();
          }
        }

        // settling snow, two parts that both grow with snowAcc and melt back when it stops:
        // (1) a deepening cap along every hill crest (reads even over water, behind the trees)
        crestG.clear();
        if (snowing || snowAcc > 0.02) {
          const lift = snowAcc * 5, // crest creeps a touch higher as it deepens
            thick = 7 + snowAcc * 26; // and gets fatter underneath
          crestG.beginFill(0xeef5fc, Math.min(1, 0.7 + snowAcc * 0.3));
          for (const [cy, am, ph] of hillBands) {
            crestG.moveTo(-40, cy + Math.sin(-40 * 0.006 + ph) * am - lift);
            for (let x = -40; x <= VW + 40; x += 8)
              crestG.lineTo(x, cy + Math.sin(x * 0.006 + ph) * am - lift);
            for (let x = VW + 40; x >= -40; x -= 8)
              crestG.lineTo(x, cy + Math.sin(x * 0.006 + ph) * am + thick);
            crestG.closePath();
          }
          crestG.endFill();
        }
        // (2) snow piling up on the open foreground
        snowAccG.clear();
        if (snowAcc > 0.02) {
          if (!BI.water) {
            // dry biome: a blanket rising across the whole foreground
            const topY = VH - 26 - snowAcc * 158;
            snowAccG.beginFill(0xeef5fc, Math.min(0.96, 0.45 + snowAcc * 0.55));
            snowAccG.moveTo(-40, VH + 40);
            for (let x = -40; x <= VW + 40; x += 14)
              snowAccG.lineTo(x, topY + Math.sin(x * 0.02 + 1.5) * 7);
            snowAccG.lineTo(VW + 40, VH + 40);
            snowAccG.closePath();
            snowAccG.endFill();
          } else {
            // water biome: snow covers the visible bank (ground contour down to the waterline), never the pond
            snowAccG.beginFill(0xeef5fc, Math.min(0.9, 0.32 + snowAcc * 0.58));
            snowAccG.moveTo(-40, 602);
            for (let x = -40; x <= VW + 40; x += 12)
              snowAccG.lineTo(x, groundY(x) - 2);
            snowAccG.lineTo(VW + 40, 602);
            snowAccG.closePath();
            snowAccG.endFill();
          }
        }

        // winter ice: shelves creep in from both banks as snow settles, leaving a shrinking
        // open lead down the middle (the ducks keep to it). melts back with snowAcc.
        const ice = water && BI.water.freeze ? Math.min(1, snowAcc) : 0; // only the shallow pond freezes; the deep fjord stays open
        const openHalf = VW / 2 + 40 - ice * (VW / 2 + 40 - 190); // lead never closes below ~380px
        if (iceG) {
          iceG.clear();
          if (ice > 0.02) {
            const cx = VW / 2,
              lE = cx - openHalf,
              rE = cx + openHalf,
              topY = 600,
              botY = VH + 10,
              a = Math.min(0.94, 0.5 + ice * 0.5);
            for (const [bank, edge, dir] of [
              [-40, lE, 1],
              [VW + 40, rE, -1]
            ]) {
              // shelf body with a ragged, slightly broken inner edge biting back toward the bank
              iceG.beginFill(0xe2eff5, a);
              iceG.moveTo(bank, topY);
              for (let y = topY; y <= botY; y += 16)
                iceG.lineTo(edge - dir * (4 + Math.sin(y * 0.13 + dir) * 6), y);
              iceG.lineTo(bank, botY);
              iceG.closePath();
              iceG.endFill();
              // a brighter frost rim picks out the open edge
              iceG.lineStyle(2, 0xf6fcff, a * 0.7);
              for (let y = topY; y <= botY; y += 16) {
                const ex = edge - dir * (4 + Math.sin(y * 0.13 + dir) * 6);
                y === topY ? iceG.moveTo(ex, y) : iceG.lineTo(ex, y);
              }
              iceG.lineStyle(0);
            }
          }
        }

        // aurora intensity: a slow swell/fade so it has quiet stretches and dramatic bursts
        const auroraI =
          0.22 + 0.78 * Math.pow(0.5 + 0.5 * Math.sin(t * 0.05), 2);
        if (BI.aurora) drawAurora(t, night, auroraI);
        fireflies.fl.alpha = BI.interior ? 0.8 + night * 0.2 : night; // glowworms glow around the clock underground
        for (const c of clouds) {
          c.tint = hexI(
            lpH(
              '#33406a',
              '#ffffff',
              Math.min(1, P.light + 0.05) * (1 - cover * 0.5)
            )
          );
        }

        // sun / moon + halo (hidden underground — no sky bodies in a cave)
        const body = cel.sun ? sun : moon,
          other = cel.sun ? moon : sun;
        other.visible = false;
        body.visible = !BI.interior;
        body.alpha = 1 - cover * 0.6; // sun/moon fades behind gathering cloud
        body.position.set(cel.x, cel.y);
        sunGlow.visible = !BI.interior;
        sunGlow.position.set(cel.x, cel.y);
        sunGlow.tint = cel.sun ? 0xffe9a8 : 0x9fb6d8;
        sunGlow.scale.set((cel.sun ? 3.4 : 2.2) + Math.sin(t * 1.5) * 0.12);
        sunGlow.alpha = (cel.sun ? 0.8 : 0.5) * (1 - cover * 0.85);

        raysG.clear();
        if (BI.interior) {
          // a soft shaft of daylight spilling through the ceiling — brightest up top, dissolving before the floor
          const sx = 760,
            top = 24,
            depth = 452,
            baseA = (0.05 + P.light * 0.13) * (1 - cover * 0.6),
            N = 16;
          for (let k = 0; k < N; k++) {
            const u0 = k / N,
              u1 = (k + 1) / N,
              y0 = top + u0 * (depth - top),
              y1 = top + u1 * (depth - top),
              w0 = 18 + u0 * 58,
              w1 = 18 + u1 * 58,
              a = baseA * (1 - u0) * (1 - u0); // quadratic falloff so it fades into the dark
            raysG.beginFill(0xd6e6ff, a);
            raysG.moveTo(sx - w0, y0);
            raysG.lineTo(sx + w0, y0);
            raysG.lineTo(sx + w1, y1);
            raysG.lineTo(sx - w1, y1);
            raysG.closePath();
            raysG.endFill();
          }
        } else {
          // god-rays: shafts from the sun when cloud is breaking up — peak near light cover (~1/3),
          // fading to nothing under solid overcast (no sun) and clear sky (nothing to shaft through)
          const rays = cel.sun
            ? Math.max(0, cover * (1 - cover) * (1 - cover) * 6.75)
            : 0;
          if (rays > 0.03) {
            for (let i = 0; i < 7; i++) {
              const ang =
                Math.PI * 0.5 + (i - 3) * 0.13 + Math.sin(t * 0.25 + i) * 0.012;
              const len = 600,
                w = 15 + 6 * Math.sin(t * 0.6 + i * 2),
                ex = cel.x + Math.cos(ang) * len,
                ey = cel.y + Math.sin(ang) * len,
                nx = -Math.sin(ang) * w,
                ny = Math.cos(ang) * w;
              raysG.beginFill(0xfff1c4, rays * 0.06);
              raysG.moveTo(cel.x, cel.y);
              raysG.lineTo(ex + nx, ey + ny);
              raysG.lineTo(ex - nx, ey - ny);
              raysG.closePath();
              raysG.endFill();
            }
          }
        }

        if (reduce.matches) {
          if (deer) deer.gotoAndStop(0);
          return;
        }

        const raining = wet > 0.45; // animals hunker down / shelter in a real shower

        // parallax: ease toward the pointer/tilt target; the foreground scene shifts more than the far sky
        parX += (parTX - parX) * 0.05;
        parY += (parTY - parY) * 0.05;
        farLayer.position.set(parX * 5, parY * 3);
        scene.position.set(parX * 14, parY * 8);
        fireflies.fl.position.set(parX * 14, parY * 8);

        // wind: a breeze that slowly varies and gusts (used by foliage, particles, and the water surface)
        const wind =
          Math.sin(t * 0.35) * 0.35 +
          Math.sin(t * 0.11 + 1.3) * 0.45 +
          Math.sin(t * 0.07) * 0.25;

        // shooting stars: an occasional streak across the night sky (any biome, but not underground)
        shootG.clear();
        if (night > 0.34 && !BI.interior) {
          if (shoot) {
            shoot.x += shoot.vx * dt;
            shoot.y += shoot.vy * dt;
            shoot.life -= dt / 60;
            const fade = Math.sin(
                Math.max(0, 1 - shoot.life / shoot.dur) * Math.PI
              ),
              steps = 9;
            for (let i = 0; i < steps; i++) {
              const f = i / steps;
              shootG.lineStyle(3 * (1 - f) + 0.3, 0xffffff, fade * (1 - f));
              shootG.moveTo(
                shoot.x - shoot.vx * f * 4,
                shoot.y - shoot.vy * f * 4
              );
              shootG.lineTo(
                shoot.x - shoot.vx * (f + 1 / steps) * 4,
                shoot.y - shoot.vy * (f + 1 / steps) * 4
              );
            }
            shootG.beginFill(0xffffff, fade);
            shootG.drawCircle(shoot.x, shoot.y, 2);
            shootG.endFill();
            if (shoot.life <= 0 || shoot.x > VW + 40 || shoot.y > 420) {
              shoot = null;
              shootT = 5 + Math.random() * 8;
            }
          } else {
            shootT -= dt / 60;
            if (shootT < 0)
              shoot = {
                x: 60 + Math.random() * VW * 0.6,
                y: 20 + Math.random() * 120,
                vx: 7 + Math.random() * 4,
                vy: 2.4 + Math.random() * 2,
                life: 0.9,
                dur: 0.9
              };
          }
        }

        // sun/moon reflection on the pond: a soft reflected disc at the waterline + a shimmering trail below it
        glit.clear();
        if (water && BI.interior) {
          // underground pool mirrors the glowing crystals instead of any sky body
          for (const gl of crystals) {
            const a = gl.alpha;
            glit.beginFill(gl.tint, 0.16 * a);
            glit.drawEllipse(gl.x, 609, 20, 5);
            glit.endFill();
            for (let y = 612; y < VH; y += 6) {
              const d = (y - 612) / (VH - 612);
              glit.beginFill(gl.tint, (1 - d) * 0.13 * a);
              glit.drawRect(
                gl.x + Math.sin(y * 0.5 + t * 1.6 + gl.ph) * (2 + d * 7) - 3,
                y,
                6,
                2
              );
              glit.endFill();
            }
          }
        }
        if (water && !BI.interior && cel.y < 560) {
          const col = cel.sun ? 0xfff0b8 : 0xc9d8ea,
            str = cel.sun ? 1 : 0.7;
          for (let k = 3; k >= 1; k--) {
            glit.beginFill(col, 0.14 * str * (k / 3));
            glit.drawEllipse(cel.x, 611, 9 + k * 7, 3 + k * 2.4);
            glit.endFill();
          }
          for (let y = 606; y < VH; y += 5) {
            const d = (y - 606) / (VH - 606),
              wob =
                Math.sin(y * 0.6 + t * 2.2) *
                (2 + d * 10) *
                (1 + Math.abs(wind) * 1.1); // gusts scatter the reflection
            glit.beginFill(col, (1 - d) * 0.5 * str);
            glit.drawRect(cel.x + wob - (2 + d * 4), y, 4 + d * 8, 2);
            glit.endFill();
          }
        }
        if (water && BI.aurora && night > 0.08) {
          // aurora mirrored on the water: wavy green/teal bands, scaled by the live aurora intensity
          const acols = [0x4fffa8, 0x36c9ff];
          for (let b = 0; b < 2; b++) {
            glit.beginFill(acols[b], night * 0.2 * auroraI);
            const by = 622 + b * 28;
            glit.moveTo(0, by + Math.sin(t * 1.3 + b) * 4);
            for (let x = 0; x <= VW; x += 30)
              glit.lineTo(x, by + Math.sin(x * 0.017 + t * 1.4 + b) * 6);
            for (let x = VW; x >= 0; x -= 30)
              glit.lineTo(
                x,
                by + 18 + Math.sin(x * 0.017 + t * 1.4 + b + 1) * 6
              );
            glit.closePath();
            glit.endFill();
          }
        }
        if (water && Math.abs(wind) > 0.16) {
          // wind chop: faint wavelets that ripple across the water surface during gusts
          const chop = Math.abs(wind) - 0.16;
          for (let i = 0; i < 5; i++) {
            const wy = 614 + i * 20,
              a = chop * 0.16 * (1 - i * 0.12);
            if (a <= 0) continue;
            glit.lineStyle(1.2, 0xffffff, a);
            glit.moveTo(0, wy);
            for (let x = 0; x <= VW; x += 24)
              glit.lineTo(
                x,
                wy + Math.sin(x * 0.03 + t * 3 + i) * (1.4 + chop * 4)
              );
          }
          glit.lineStyle(0);
        }

        for (const c of clouds) {
          c.x += (c.vx + wind * 0.18) * dt;
          if (c.x - c.width > VW) c.x = -c.width;
          else if (c.x + c.width < 0) c.x = VW + c.width;
        }
        for (const w of swayers)
          w.s.rotation = Math.sin(t * w.sp + w.ph) * w.amp + wind * w.amp * 2.5;

        // walker: deer ambles then grazes; a camel plods along; in rain it stands and waits it out
        if (deer) {
          const multi = deer.totalFrames > 1;
          if (raining) {
            if (multi) deer.gotoAndStop(0);
            deer.y = groundY(deer.x) + 8;
          } else {
            deerTimer -= dt / 60;
            if (!deer.graze) deerMode = 'walk';
            if (deerMode === 'walk') {
              deer.x += 0.35 * dt;
              if (multi && !deer.playing) deer.play();
              if (deer.graze && deerTimer < 0) {
                deerMode = 'graze';
                deerTimer = 2.5 + Math.random() * 3;
                if (multi) deer.gotoAndStop(0);
              }
            } else if (deerTimer < 0) {
              deerMode = 'walk';
              deerTimer = 5 + Math.random() * 6;
            }
            if (deer.x > VW + 60) deer.x = -60;
            deer.y =
              groundY(deer.x) +
              8 +
              (deerMode === 'walk' ? Math.abs(Math.sin(t * 4)) * -2 : 0);
          }
          dropTrack(deer, 'deer', 30);
        }

        // critter (fox / lizard / crab): trots across now and then
        if (fox) {
          foxTimer -= dt / 60;
          if (fox.visible !== false) {
            fox.x += fox.dir * 1.5 * dt;
            fox.y = groundY(fox.x) + 6 + Math.abs(Math.sin(t * 7)) * -2;
            dropTrack(fox, 'fox', 18);
            if (fox.x > VW + 80) {
              fox.visible = false;
              foxTimer = 8 + Math.random() * 10;
            }
          } else if (foxTimer < 0) {
            fox.visible = true;
            fox.x = -80;
            fox.dir = 1;
          }
        }

        // hopper (rabbit): hops in its facing direction and turns at the edges; in rain it hunkers down still
        if (rabbit) {
          if (raining) {
            rabbit.y = rabbit.baseY + 2;
          } else {
            rabbit.hopT = (rabbit.hopT == null ? 2 : rabbit.hopT) - dt / 60;
            const hop =
              rabbit.hopT < 0.4 && rabbit.hopT > 0
                ? Math.sin(((0.4 - rabbit.hopT) / 0.4) * Math.PI)
                : 0;
            rabbit.y = rabbit.baseY - hop * 24;
            rabbit.x += rabbit.dir * hop * 1.8 * dt;
            dropTrack(rabbit, 'rabbit', 26);
            if (rabbit.hopT < 0) {
              rabbit.hopT = 1.1 + Math.random() * 1.9;
              if (rabbit.x > VW - 140) rabbit.dir = -1;
              else if (rabbit.x < 140) rabbit.dir = 1;
              rabbit.scale.x = rabbit.dir * Math.abs(rabbit.scale.x);
            }
          }
        }
        // roller (tumbleweed) bounds across at intervals
        if (roller) {
          rollerTimer -= dt / 60;
          if (roller.visible) {
            roller.x += 3 * dt;
            roller.rotation += 0.13 * dt;
            roller.y = groundY(roller.x) + 2 - Math.abs(Math.sin(t * 6)) * 10;
            if (roller.x > VW + 60) {
              roller.visible = false;
              rollerTimer = 5 + Math.random() * 7;
            }
          } else if (rollerTimer < 0) {
            roller.visible = true;
            roller.x = -60;
          }
        }

        // footprint trails: prints fade over time and fill in faster while snow is actively falling
        if (tracksG) {
          tracksG.clear();
          for (let i = tracks.length - 1; i >= 0; i--) {
            const tr = tracks[i];
            tr.life -= (dt / 60) * (snowing ? 0.04 : 0.014);
            if (tr.life <= 0) {
              tracks.splice(i, 1);
              continue;
            }
            tracksG.beginFill(0x7e98bc, 0.5 * Math.min(1, tr.life));
            if (tr.kind === 'deer') {
              tracksG.drawEllipse(tr.x - 3, tr.y, 2.3, 1.5); // cloven pair
              tracksG.drawEllipse(tr.x + 3, tr.y, 2.3, 1.5);
            } else if (tr.kind === 'fox') {
              tracksG.drawEllipse(tr.x, tr.y, 2, 1.5); // a neat single pad
            } else {
              tracksG.drawEllipse(tr.x - 4, tr.y, 1.8, 2.6); // rabbit's paired hind feet
              tracksG.drawEllipse(tr.x + 4, tr.y, 1.8, 2.6);
            }
            tracksG.endFill();
          }
        }

        // ducks drift + bob, brood + reflection follow
        for (const d of ducks) {
          d.x += d.vx * dt;
          // keep to the open lead — as winter ice closes in, the frozen banks turn the duck back
          const loX = ice > 0.02 ? VW / 2 - openHalf + 40 : 40,
            hiX = ice > 0.02 ? VW / 2 + openHalf - 40 : VW - 40;
          if (d.x > hiX) d.vx = -Math.abs(d.vx);
          if (d.x < loX) d.vx = Math.abs(d.vx);
          // steer around lily pads: ease aside to give a nearby pad a berth, then settle back into the lane
          let steer = 0;
          for (const lp of lilies) {
            if (lp.isFrog) continue;
            const dx = Math.abs(lp.x - d.x);
            if (dx < 80) steer += (1 - dx / 80) * 16;
          }
          const cur = d.sy || 0; // undefined on the first frame; || keeps it numeric (and self-heals from NaN)
          d.sy = cur + (steer - cur) * 0.08;
          d.scale.x = (d.vx < 0 ? -1 : 1) * Math.abs(d.scale.x);
          d.y =
            d.baseY +
            d.sy +
            Math.sin(t * 2 + d.x * 0.05) * 1.6 * (1 - ice * 0.5); // stiller on slush
          if (d.ref) {
            d.ref.x = d.x;
            d.ref.y = d.y + 18 + Math.sin(t * 2) * 1;
            d.ref.scale.x = d.scale.x;
            d.ref.alpha = 0.28 * (1 - ice * 0.55); // the freezing surface reflects less
          }
          if (d.kids)
            d.kids.forEach((k, i) => {
              const b = d.vx < 0 ? 1 : -1;
              k.x = d.x + b * (34 + i * 22);
              k.y = k.baseY + d.sy + Math.sin(t * 2 + i) * 1.4;
              k.scale.x = (d.vx < 0 ? -1 : 1) * Math.abs(k.scale.x);
              k.alpha = Math.max(0, 1 - ice * 1.8); // the brood doesn't winter on the ice
            });
          d.rip = (d.rip == null ? 0.5 : d.rip) - dt / 60;
          if (d.rip < 0) {
            ripples.push({
              x: d.x - (d.vx < 0 ? -1 : 1) * 14,
              y: d.baseY + 9,
              r: 4,
              life: 1 - ice * 0.5
            });
            d.rip = (0.8 + Math.random() * 0.6) * (1 + ice * 1.6); // wakes come slower through slush
          }
        }
        // expanding ripple rings trailing the ducks/boat (or cave drips) on the water surface
        if (water) {
          rippleG.clear();
          // cave drips: a stalactite releases a drop that falls and rings the pool (faster when it's wet outside)
          if (BI.interior)
            for (const dp of drips) {
              if (dp.dropY == null) {
                dp.t -= dt / 60;
                if (dp.t < 0) dp.dropY = dp.y0;
              } else {
                dp.dropY += 4.5 * dt;
                if (dp.dropY >= 604) {
                  dp.dropY = null;
                  dp.t = 2 + Math.random() * 3 + (wet > 0.3 ? 0 : 2.5);
                  ripples.push({x: dp.x, y: 607, r: 3, life: 1});
                } else {
                  rippleG.beginFill(0xafe0ee, 0.8);
                  rippleG.drawEllipse(dp.x, dp.dropY, 1.5, 4.5);
                  rippleG.endFill();
                }
              }
            }
          for (let i = ripples.length - 1; i >= 0; i--) {
            const rp = ripples[i];
            rp.r += 0.7 * dt;
            rp.life -= (dt / 60) * 0.85;
            if (rp.life <= 0) {
              ripples.splice(i, 1);
              continue;
            }
            rippleG.lineStyle(1.4, 0xdff1f6, rp.life * 0.32);
            rippleG.drawEllipse(rp.x, rp.y, rp.r, rp.r * 0.34);
          }
        }

        // waterfall: scroll the streak texture down so the cascade flows, and ring the plunge pool
        if (streakTile) streakTile.tilePosition.y += streakTile.spd * dt;
        if (BI.waterfall && water && Math.random() < 0.12 * dt)
          ripples.push({
            x: BI.waterfall.plungeX + (Math.random() - 0.5) * 20,
            y: 606,
            r: 3,
            life: 1
          });

        // butterflies, dragonflies, bird — wandering / crossing
        for (const f of flutters) {
          if (f.isBird) {
            f.x += 1.1 * dt;
            f.y = 150 + Math.sin(f.x * 0.004) * 30;
            if (f.x > VW + 80) {
              f.x = -80;
              f.y = 120 + Math.random() * 80;
            }
            continue;
          }
          f.x += f.vx * dt;
          f.y += f.vy * dt;
          f.alpha += ((raining ? 0 : 1) - f.alpha) * 0.04 * dt; // butterflies/dragonflies shelter in rain
          if (Math.random() < 0.02) {
            f.vx = (Math.random() - 0.5) * (f.hi > 600 ? 2.4 : 1.2);
            f.vy = (Math.random() - 0.5) * (f.hi > 600 ? 1.2 : 0.8);
          }
          if (f.x < 20 || f.x > VW - 20) f.vx *= -1;
          if (f.y < f.lo || f.y > f.hi) f.vy *= -1;
        }
        // migrating flock: crosses the sky now and then, holding a loose V behind the lead
        if (flock.length) {
          const lead = flock[0];
          if (lead.visible) {
            lead.fx += flockDir * 2.6 * dt;
            lead.fy += Math.sin(t * 0.5) * 0.2 * dt;
            for (const fb of flock) {
              const tx = lead.fx - flockDir * Math.abs(fb.wing) * 26,
                ty = lead.fy + fb.wing * 11 + Math.sin(t * 3 + fb.ph) * 2;
              fb.x += (tx - fb.x) * 0.2; // ease toward the slot for a lagging, lifelike V
              fb.y += (ty - fb.y) * 0.2;
              fb.scale.x = (flockDir < 0 ? -1 : 1) * Math.abs(fb.scale.x);
            }
            if (
              (flockDir > 0 && lead.fx > VW + 130) ||
              (flockDir < 0 && lead.fx < -130)
            ) {
              for (const fb of flock) fb.visible = false;
              flockT = 28 + Math.random() * 50;
            }
          } else {
            flockT -= dt / 60;
            if (flockT < 0 && !raining) {
              flockDir = Math.random() < 0.5 ? 1 : -1;
              const sx = flockDir > 0 ? -130 : VW + 130,
                sy = 66 + Math.random() * 84;
              lead.fx = sx;
              lead.fy = sy;
              for (const fb of flock) {
                fb.x = sx - flockDir * Math.abs(fb.wing) * 26;
                fb.y = sy + fb.wing * 11;
                fb.scale.x = (flockDir < 0 ? -1 : 1) * Math.abs(fb.scale.x);
                fb.visible = true;
              }
            }
          }
        }
        // crystals breathe a slow glow (and the pool mirrors it)
        for (const gl of crystals)
          gl.alpha = 0.62 + Math.sin(t * 1.3 + gl.ph) * 0.3;
        // fireflies drift + twinkle
        for (const g of fireflies) {
          g.x += g.vx * dt;
          g.y += g.vy * dt;
          if (Math.random() < 0.02) {
            g.vx = (Math.random() - 0.5) * 0.4;
            g.vy = (Math.random() - 0.5) * 0.3;
          }
          if (g.x < 40 || g.x > VW - 40) g.vx *= -1;
          if (g.y < 460 || g.y > 600) g.vy *= -1;
          g.alpha = 0.4 + 0.6 * (Math.sin(t * 3 + g.ph) * 0.5 + 0.5);
        }
        // lily pads bob; seasonal weather falls
        for (const lp of lilies) {
          const bob = Math.sin(t * 1.5 + lp.x * 0.05) * 1.2;
          if (lp.isFrog) {
            lp.hopT =
              (lp.hopT == null ? 1.5 + Math.random() * 3 : lp.hopT) - dt / 60;
            const hop =
              lp.hopT < 0.35 && lp.hopT > 0
                ? Math.sin(((0.35 - lp.hopT) / 0.35) * Math.PI)
                : 0;
            lp.y = lp.baseY + bob - hop * 14;
            if (lp.hopT < 0) {
              if (water)
                ripples.push({x: lp.x, y: lp.baseY + 8, r: 4, life: 1});
              lp.hopT = 2.5 + Math.random() * 4;
            }
          } else lp.y = lp.baseY + bob;
        }
        for (const w of weather) {
          w.y += w.vy * dt;
          w.x += (w.vx + Math.sin(t * 1.2 + w.ph) * w.sw + wind * 2.2) * dt;
          w.rotation += w.spin * dt;
          if (w.y > VH + 14) {
            w.y = -14;
            w.x = Math.random() * VW;
          }
          if (w.x < -14) w.x = VW + 14;
          else if (w.x > VW + 14) w.x = -14;
        }
        // rain: intensity driven by the weather front (wet); shower slants harder as it picks up
        if (wet > 0.02 && !BI.interior) {
          rainG.clear();
          rainG.lineStyle(1.4, 0xbcd6e8, 0.55 * wet);
          const n = Math.ceil(rainDrops.length * Math.min(1, wet * 1.2));
          for (let i = 0; i < n; i++) {
            const d = rainDrops[i];
            d.y += d.sp * dt;
            d.x += (1.4 + wet * 1.6) * dt;
            if (d.y > VH) {
              d.y = -d.len;
              d.x = Math.random() * VW;
            }
            if (d.x > VW) d.x -= VW;
            rainG.moveTo(d.x, d.y);
            rainG.lineTo(d.x - 2.5 - wet * 1.5, d.y + d.len);
          }
        } else if (rainG.geometry.graphicsData.length) rainG.clear();

        // lightning: a brief flash that lights the whole scene, plus a jagged bolt
        flashG.clear();
        if (flash > 0.01 && !BI.interior) {
          flashG.beginFill(0xc8d6ff, flash * 0.5);
          flashG.drawRect(0, 0, VW, VH);
          flashG.endFill();
          flashG.lineStyle(2.5, 0xffffff, flash);
          if (boltPts.length) {
            flashG.moveTo(boltPts[0][0], boltPts[0][1]);
            for (let i = 1; i < boltPts.length; i++)
              flashG.lineTo(boltPts[i][0], boltPts[i][1]);
          }
        }

        // volcanic: pulse the crater glow, billow smoke upward, drift embers up
        if (lavaGlow) {
          lavaGlow.alpha = 0.7 + Math.sin(t * 1.8) * 0.18;
          lavaGlow.scale.set(1.6 + Math.sin(t * 1.3) * 0.12);
        }
        for (const p of smoke) {
          p.y += -0.5 * dt;
          p.x += Math.sin(t * 0.5 + p.ph) * 0.3 * dt;
          p.scale.set(p.scale.x + 0.0009 * dt);
          p.alpha -= 0.0016 * dt;
          if (p.alpha <= 0) {
            p.y = 262;
            p.x = 636 + (Math.random() - 0.5) * 16;
            p.scale.set(0.2);
            p.alpha = 0.55;
          }
        }
        for (const e of embers) {
          e.y += e.vy * dt;
          e.x += (e.vx + Math.sin(t * 2 + e.ph) * 0.3) * dt;
          e.alpha = 0.45 + 0.45 * (Math.sin(t * 4 + e.ph) * 0.5 + 0.5);
          if (e.y < 360) {
            e.y = 470 + Math.random() * 170;
            e.x = Math.random() * VW;
          }
        }
      });

      PIXI.Assets.load(
        NAMES.map((n) => ({alias: n, src: `grove/assets/${n}.png`}))
      )
        .then(build)
        .catch((e) => console.error('Grove load failed:', e));

      // ---- control panel (revealed by the ✦ wallpaper toggle) ----
      const TLIST = [
        ['auto', 'Auto'],
        ['dawn', 'Dawn'],
        ['day', 'Day'],
        ['dusk', 'Dusk'],
        ['night', 'Night']
      ];
      const SLIST = [
        ['auto', 'Auto'],
        ['spring', 'Spring'],
        ['summer', 'Summer'],
        ['autumn', 'Autumn'],
        ['winter', 'Winter']
      ];
      const uiBiome = document.getElementById('uiBiome'),
        uiTime = document.getElementById('uiTime'),
        uiSeason = document.getElementById('uiSeason');
      const mkBtn = (label, on, fn) => {
        const b = document.createElement('button');
        b.textContent = label;
        if (on) b.className = 'on';
        b.addEventListener('click', fn);
        return b;
      };
      const lbl = (text, row) => {
        const s = document.createElement('span');
        s.className = 'lbl';
        s.textContent = text;
        row.appendChild(s);
      };
      function buildUI() {
        uiBiome.textContent = '';
        uiTime.textContent = '';
        uiSeason.textContent = '';
        Object.entries(BIOMES).forEach(([k, v]) =>
          uiBiome.appendChild(
            mkBtn(v.label, k === biomeMode, () => {
              biomeMode = k;
              LS('biome', k);
              if (ready) build();
              buildUI();
            })
          )
        );
        lbl('time', uiTime);
        TLIST.forEach(([k, l]) =>
          uiTime.appendChild(
            mkBtn(l, k === timeMode, () => {
              timeMode = k;
              LS('time', k);
              lastSkyH = -99;
              buildUI();
            })
          )
        );
        lbl('season', uiSeason);
        SLIST.forEach(([k, l]) =>
          uiSeason.appendChild(
            mkBtn(l, k === seasonMode, () => {
              seasonMode = k;
              LS('season', k);
              if (ready) build();
              buildUI();
            })
          )
        );
        const WLBL = {
          auto: '⛅ Weather: Auto',
          rain: '🌧 Weather: Rain',
          clear: '☀️ Weather: Clear'
        };
        const WNEXT = {auto: 'rain', rain: 'clear', clear: 'auto'};
        uiSeason.appendChild(
          mkBtn(WLBL[weatherMode], weatherMode !== 'auto', () => {
            weatherMode = WNEXT[weatherMode];
            LS('weather', weatherMode);
            if (weatherMode === 'auto') {
              frontState = 'clear';
              frontT = 30 + Math.random() * 60;
            }
            buildUI();
          })
        );
        uiSeason.appendChild(
          mkBtn(soundOn ? '🔊 Sound: On' : '🔇 Sound: Off', soundOn, () => {
            soundOn = !soundOn;
            LS('sound', soundOn ? '1' : '0');
            // the click is the user gesture autoplay policies need: create + resume here
            if (soundOn) {
              initAudio();
              if (audio) audio.ctx.resume().catch(() => {});
            }
            buildUI();
          })
        );
      }
      buildUI();

      // ---- host bridge + pause when hidden ----
      let shown = false;
      function setShown(v) {
        shown = v;
        document.body.classList.toggle('shown', v);
        window.parent.postMessage(
          {type: 'shaderwall', state: v ? 'shown' : 'hidden'},
          location.origin
        );
      }
      addEventListener('message', (e) => {
        if (e.origin != location.origin) return;
        const d = e.data || {};
        if (d.type === 'wallpaper-pointer') {
          parTX = (d.x - 0.5) * 2;
          parTY = (d.y - 0.5) * 2;
          return;
        }
        if (d.type !== 'shaderwall') return;
        if (d.action === 'show') setShown(true);
        else if (d.action === 'hide') setShown(false);
        else if (d.action === 'toggle') setShown(!shown);
      });
      addEventListener('keydown', (e) => {
        if (e.key === 'h' || e.key === 'H') setShown(!shown);
      });
      document.addEventListener('visibilitychange', () => {
        document.hidden ? app.ticker.stop() : app.ticker.start();
      });
      setShown(false);
    </script>
  </body>
</html>
