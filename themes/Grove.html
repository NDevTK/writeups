<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grove</title>
    <style>
      html, body { margin: 0; height: 100%; overflow: hidden; background: #0c1430; }
      canvas { position: fixed; inset: 0; display: block; }
      /* control panel — revealed only when the wallpaper is brought forward (✦) */
      #ui {
        position: fixed; left: 50%; bottom: 18px; transform: translateX(-50%); z-index: 10;
        display: none; flex-direction: column; gap: 6px; align-items: center;
        padding: 10px 12px; border-radius: 12px; max-width: 92vw;
        background: rgba(12, 20, 40, 0.7); border: 1px solid rgba(160, 200, 255, 0.22);
        -webkit-backdrop-filter: blur(8px); backdrop-filter: blur(8px);
        color: #d7e6f0; font: 13px ui-monospace, 'Consolas', monospace;
      }
      body.shown #ui { display: flex; }
      #ui .row { display: flex; gap: 5px; flex-wrap: wrap; justify-content: center; }
      #ui button {
        font: inherit; color: #cfe0ef; background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(160, 200, 255, 0.2); border-radius: 8px; padding: 5px 9px; cursor: pointer;
      }
      #ui button:hover { background: rgba(255, 255, 255, 0.12); }
      #ui button.on { background: #2c5a8c; border-color: #6fb0ef; color: #fff; }
      #ui .lbl { opacity: 0.6; font-size: 11px; align-self: center; margin-right: 2px; }
    </style>
  </head>
  <body>
    <div id="ui" aria-hidden="true">
      <div class="row" id="uiBiome"></div>
      <div class="row" id="uiTime"></div>
      <div class="row" id="uiSeason"></div>
    </div>
    <script src="grove/pixi.min.js"></script>
    <script>
      'use strict';
      const VW = 1280, VH = 720, HZ = 430; // design space + celestial horizon
      const reduce = matchMedia('(prefers-reduced-motion: reduce)');
      const app = new PIXI.Application({ resizeTo: window, antialias: true, backgroundAlpha: 0 });
      document.body.appendChild(app.view);
      const root = new PIXI.Container(); app.stage.addChild(root);
      function fit() {
        const s = Math.max(app.screen.width / VW, app.screen.height / VH);
        root.scale.set(s); root.position.set((app.screen.width - VW * s) / 2, (app.screen.height - VH * s) / 2);
      }
      app.renderer.on('resize', fit);

      // ---------- time of day ----------
      const q = new URLSearchParams(location.search);
      const hourParam = q.get('hour'), cyc = parseFloat(q.get('cycle')), seasonParam = q.get('season');
      const LS = (k, v) => { try { if (v === undefined) return localStorage.getItem('grove:' + k); localStorage.setItem('grove:' + k, v); } catch (e) {} };
      let timeMode = LS('time') || 'auto', seasonMode = LS('season') || 'auto', rainOn = LS('rain') === '1';
      function nowHour() {
        if (hourParam != null) return parseFloat(hourParam);
        if (timeMode === 'dawn') return 6.4;
        if (timeMode === 'day') return 13;
        if (timeMode === 'dusk') return 18.7;
        if (timeMode === 'night') return 23;
        if (cyc > 0) return ((performance.now() / 1000) / cyc * 24 + 6) % 24;
        const d = new Date(); return d.getHours() + d.getMinutes() / 60;
      }
      const SKY = [
        { h: 0, top: '#10183a', bot: '#243a5e', light: 0.3 }, { h: 5, top: '#26305c', bot: '#caa05e', light: 0.45 },
        { h: 7, top: '#6aaedd', bot: '#cfe7f2', light: 0.9 }, { h: 12, top: '#54a3e0', bot: '#d6eef0', light: 1 },
        { h: 17, top: '#58a6df', bot: '#e2eec6', light: 0.95 }, { h: 19, top: '#39406e', bot: '#e88a4a', light: 0.5 },
        { h: 20.5, top: '#141d44', bot: '#2a3e60', light: 0.32 }, { h: 24, top: '#10183a', bot: '#243a5e', light: 0.3 },
      ];
      const hx = (s) => [parseInt(s.slice(1, 3), 16), parseInt(s.slice(3, 5), 16), parseInt(s.slice(5, 7), 16)];
      const lp = (a, b, t) => a + (b - a) * t;
      const lpH = (a, b, t) => { const A = hx(a), B = hx(b); return [lp(A[0], B[0], t), lp(A[1], B[1], t), lp(A[2], B[2], t)]; }; // hex strings
      const mixA = (a, b, t) => [lp(a[0], b[0], t), lp(a[1], b[1], t), lp(a[2], b[2], t)]; // rgb arrays
      const css = (c) => `rgb(${c[0] | 0},${c[1] | 0},${c[2] | 0})`;
      const hexI = (c) => ((c[0] | 0) << 16) | ((c[1] | 0) << 8) | (c[2] | 0);
      function tod(h) {
        for (let i = 0; i < SKY.length - 1; i++) if (h >= SKY[i].h && h <= SKY[i + 1].h) {
          const a = SKY[i], b = SKY[i + 1], t = (h - a.h) / ((b.h - a.h) || 1);
          return { top: lpH(a.top, b.top, t), bot: lpH(a.bot, b.bot, t), light: lp(a.light, b.light, t) };
        }
        return tod(0.01);
      }
      function celestial(h) {
        if (h >= 6 && h <= 19) { const f = (h - 6) / 13; return { x: VW * f, y: HZ - Math.sin(f * Math.PI) * HZ * 0.78, sun: true }; }
        const nh = h < 6 ? h + 24 : h, f = (nh - 19) / 11; return { x: VW * f, y: HZ - Math.sin(f * Math.PI) * HZ * 0.66, sun: false };
      }
      // ---------- season ----------
      function nowSeason() {
        if (seasonParam) return seasonParam;
        if (seasonMode !== 'auto') return seasonMode;
        const m = new Date().getMonth(); // N hemisphere
        return m < 2 || m === 11 ? 'winter' : m < 5 ? 'spring' : m < 8 ? 'summer' : 'autumn';
      }
      const SEASONS = {
        spring: { foliage: 0xeafff0, hill: 0xeafff2, weather: 'petal', snow: false },
        summer: { foliage: 0xffffff, hill: 0xffffff, weather: 'none', snow: false },
        autumn: { foliage: 0xffb765, hill: 0xe9ce93, weather: 'leaf', snow: false },
        winter: { foliage: 0xd2e2ec, hill: 0xdfeaf2, weather: 'flake', snow: true },
      };
      const LEAFTINTS = [0xe07a2e, 0xd9a441, 0xc24f2e, 0xb8862e];
      const mulTint = (a, b) => { const r = (a >> 16 & 255) * (b >> 16 & 255) / 255, g = (a >> 8 & 255) * (b >> 8 & 255) / 255, bl = (a & 255) * (b & 255) / 255; return (r << 16 | g << 8 | bl) & 0xffffff; };

      // ---------- biome ----------
      const biomeParam = q.get('biome');
      let biomeMode = LS('biome') || 'grove';
      function nowBiome() { return biomeParam || biomeMode; }
      const BIOMES = {
        grove: {
          label: '🌳 Grove', sky: 0xffffff, seasonal: true,
          hills: [0x9cc6b0, 0x73b25a, 0x4f9c3e], ground: 'meadow',
          mid: [['pine', 0.7, 180], ['oak', 0.7, 330], ['oak', 0.66, 1040], ['pine', 0.64, 1180]],
          near: [['oak', 1.05, 120], ['pine', 1, 430], ['oak', 1.1, 900], ['bush', 1, 1150]],
          water: { top: '#5fa7ca', bot: '#2f6f93', lily: true, ducks: true, drag: true },
          walker: ['deer_a', 'deer_b'], walkerScale: 0.62, graze: true,
          critter: 'fox', critterScale: 0.42, hopper: 'rabbit', flyer: 0xffffff, flutter: true, roller: null,
        },
        desert: {
          label: '🏜️ Desert', sky: 0xfff0d6, seasonal: false,
          hills: [0xe9d3a4, 0xdcbb80, 0xcca35f], ground: 'sand',
          mid: [['cactus', 0.5, 260], ['rock', 0.7, 1010], ['cactus2', 0.55, 700]],
          near: [['cactus', 1, 170], ['cactus2', 1, 480], ['rock', 1, 900], ['cactus', 0.8, 1120]],
          water: null,
          walker: ['camel'], walkerScale: 0.62, graze: false,
          critter: 'lizard', critterScale: 0.5, hopper: null, flyer: 0x4a4036, flutter: false, roller: 'tumbleweed',
        },
        coast: {
          label: '🏖️ Coast', sky: 0xffffff, seasonal: false,
          hills: [0xe8ddbc, 0xe0cd9c, 0xd6bd80], ground: 'beach',
          mid: [['palm', 0.6, 250], ['palm', 0.5, 1010]],
          near: [['palm', 1.05, 150], ['palm', 0.9, 1130], ['rock', 0.7, 520]],
          water: { top: '#62c8e4', bot: '#2f86b4', lily: false, ducks: false, drag: false, sailboat: true },
          walker: null, critter: 'crab', critterScale: 0.5, hopper: null, flyer: 0xffffff, flyerFrames: ['gull'], flutter: false, roller: null,
        },
      };
      const RIGID = { rock: 1, cactus: 1, cactus2: 1 };

      const NAMES = ['oak', 'pine', 'bush', 'grass', 'flower_p', 'flower_w', 'cloud', 'sun', 'moon', 'glow',
        'duck', 'duckling', 'bird_a', 'bird_b', 'butterfly_a', 'butterfly_b', 'rabbit', 'fox',
        'dragonfly_a', 'dragonfly_b', 'deer_a', 'deer_b', 'lily', 'leaf', 'petal', 'flake',
        'cactus', 'cactus2', 'rock', 'lizard', 'camel', 'tumbleweed',
        'palm', 'crab', 'sailboat', 'starfish', 'gull'];
      const T = (n) => PIXI.Assets.get(n);
      const spr = (n, x, y, s, ax, ay) => { const p = new PIXI.Sprite(T(n)); p.anchor.set(ax == null ? 0.5 : ax, ay == null ? 1 : ay); p.position.set(x, y); if (s) p.scale.set(s); return p; };
      const anim = (frames, x, y, s, spd) => { const a = new PIXI.AnimatedSprite(frames.map(T)); a.anchor.set(0.5, 1); a.position.set(x, y); if (s) a.scale.set(s); a.animationSpeed = spd; a.play(); return a; };
      function gradTex(stops, h) { const c = document.createElement('canvas'); c.width = 1; c.height = h; const g = c.getContext('2d'), lg = g.createLinearGradient(0, 0, 0, h); stops.forEach(([o, col]) => lg.addColorStop(o, col)); g.fillStyle = lg; g.fillRect(0, 0, 1, h); return PIXI.Texture.from(c); }
      function hill(crestY, amp, color, phase) { const g = new PIXI.Graphics(); g.beginFill(color); g.moveTo(0, VH); g.lineTo(0, crestY); for (let x = 0; x <= VW; x += 8) g.lineTo(x, crestY + Math.sin(x * 0.006 + phase) * amp); g.lineTo(VW, VH); g.closePath(); g.endFill(); return g; }
      function drawSky(P) { // banded gradient via Graphics (no texture upload quirks)
        sky.clear(); const mid = mixA(P.top, P.bot, 0.7), N = 90;
        for (let i = 0; i < N; i++) { const t = i / (N - 1), col = t < 0.62 ? mixA(P.top, mid, t / 0.62) : mixA(mid, P.bot, (t - 0.62) / 0.38); sky.beginFill(hexI(col)); sky.drawRect(0, Math.floor(t * VH), VW, Math.ceil(VH / N) + 1); sky.endFill(); }
      }
      const groundY = (x) => 540 + Math.sin(x * 0.006 + 2.4) * 26;

      const swayers = [], clouds = [], ducks = [], flutters = [], dragons = [], fireflies = [], lilies = [], weather = [], rainDrops = [];
      let sky, stars, sun, moon, sunGlow, scene, veil, glit, rainG, deer, fox, rabbit, roller, water, SE, BI, ready = false;
      let lastSkyH = -99, deerMode = 'walk', deerTimer = 5, foxTimer = 6, rollerTimer = 4;

      function build() {
        root.removeChildren(); swayers.length = clouds.length = ducks.length = flutters.length = dragons.length = fireflies.length = lilies.length = weather.length = 0;
        SE = SEASONS[nowSeason()] || SEASONS.summer;
        BI = BIOMES[nowBiome()] || BIOMES.grove;
        const folTint = BI.seasonal ? SE.foliage : 0xffffff, snow = SE.snow, weatherKind = BI.seasonal ? SE.weather : (snow ? 'flake' : 'none');
        lastSkyH = -99; // force the sky to redraw into the fresh Graphics next frame

        sky = new PIXI.Graphics(); sky.tint = BI.sky; root.addChild(sky);

        stars = new PIXI.Container(); root.addChild(stars);
        const sg = new PIXI.Graphics();
        for (let i = 0; i < 70; i++) { sg.beginFill(0xffffff, 0.5 + Math.random() * 0.5); sg.drawCircle(Math.random() * VW, Math.random() * HZ * 0.95, Math.random() < 0.2 ? 1.6 : 1); sg.endFill(); }
        stars.addChild(sg);

        sunGlow = spr('glow', 0, 0, 3.4, 0.5, 0.5); sunGlow.blendMode = PIXI.BLEND_MODES.ADD; root.addChild(sunGlow);
        sun = spr('sun', 0, 0, 1, 0.5, 0.5); root.addChild(sun);
        moon = spr('moon', 0, 0, 0.9, 0.5, 0.5); root.addChild(moon);

        for (let i = 0; i < 4; i++) { const c = spr('cloud', Math.random() * VW, 60 + Math.random() * 150, 0.5 + Math.random() * 0.5, 0.5, 0.5); c.vx = 0.12 + Math.random() * 0.22; clouds.push(c); root.addChild(c); }

        const bird = anim(BI.flyerFrames || ['bird_a', 'bird_b'], -80, 150, 0.7, 0.06); bird.isBird = true; bird.tint = BI.flyer; flutters.push(bird); root.addChild(bird);

        // ---- scene (everything that night darkens) ----
        scene = new PIXI.Container(); root.addChild(scene);
        const HILLS = [[420, 26, 0], [470, 30, 1.3], [540, 26, 2.4]];
        HILLS.forEach(([cy, am, ph], i) => { const hh = hill(cy, am, BI.hills[i], ph); hh.tint = SE.hill; scene.addChild(hh); });
        if (snow) for (const [cy, am, ph] of HILLS) { // snow settled along each crest
          const g = new PIXI.Graphics(); g.beginFill(0xeef5fc); g.moveTo(0, cy + Math.sin(ph) * am);
          for (let x = 0; x <= VW; x += 8) g.lineTo(x, cy + Math.sin(x * 0.006 + ph) * am);
          for (let x = VW; x >= 0; x -= 8) g.lineTo(x, cy + Math.sin(x * 0.006 + ph) * am + 13);
          g.closePath(); g.endFill(); scene.addChild(g);
        }
        for (const [n, sc, x] of BI.mid) { const t = spr(n, x, 482 + Math.sin(x * 0.006 + 1.3) * 30, sc); t.tint = mulTint(0xcfe3d0, folTint); scene.addChild(t); if (!RIGID[n]) swayers.push({ s: t, amp: 0.012, sp: 0.7, ph: Math.random() * 6 }); }
        for (const [n, sc, x] of BI.near) { const t = spr(n, x, groundY(x) + 4, sc); t.tint = folTint; scene.addChild(t); if (!RIGID[n]) swayers.push({ s: t, amp: 0.02, sp: 0.9, ph: Math.random() * 6 }); }
        if (BI.ground === 'meadow') {
          for (let i = 0; i < 16; i++) { const x = 40 + Math.random() * (VW - 80), g = spr('grass', x, groundY(x) + 6, 0.6 + Math.random() * 0.5); g.tint = folTint; scene.addChild(g); swayers.push({ s: g, amp: 0.05, sp: 1.6, ph: Math.random() * 6 }); }
          if (!snow) for (let i = 0; i < 10; i++) { const x = 60 + Math.random() * (VW - 120), f = spr(Math.random() < 0.5 ? 'flower_p' : 'flower_w', x, groundY(x) + 8, 0.6 + Math.random() * 0.4); scene.addChild(f); swayers.push({ s: f, amp: 0.06, sp: 1.4, ph: Math.random() * 6 }); }
        } else if (BI.ground === 'sand') {
          for (let i = 0; i < 16; i++) { const x = 30 + Math.random() * (VW - 60); scene.addChild(spr('rock', x, groundY(x) + 8, 0.1 + Math.random() * 0.14)); }
          for (let i = 0; i < 6; i++) { const x = Math.random() * VW, g = spr('grass', x, groundY(x) + 6, 0.4 + Math.random() * 0.3); g.tint = 0xcdb87a; scene.addChild(g); swayers.push({ s: g, amp: 0.04, sp: 1.4, ph: Math.random() * 6 }); }
        } else if (BI.ground === 'beach') {
          for (let i = 0; i < 12; i++) { const x = 30 + Math.random() * (VW - 60); scene.addChild(spr('rock', x, groundY(x) + 8, 0.07 + Math.random() * 0.09)); }
          for (let i = 0; i < 6; i++) scene.addChild(spr('starfish', 60 + Math.random() * (VW - 120), 582 + Math.random() * 14, 0.28 + Math.random() * 0.22));
          for (let i = 0; i < 5; i++) { const x = Math.random() * VW, g = spr('grass', x, groundY(x) + 6, 0.4 + Math.random() * 0.3); g.tint = 0xd8c88a; scene.addChild(g); swayers.push({ s: g, amp: 0.05, sp: 1.5, ph: Math.random() * 6 }); }
        }
        if (BI.walker) { deer = anim(BI.walker, 300, groundY(300) + 8, BI.walkerScale, 0.12); if (BI.walker.length > 1) deer.stop(); else deer.gotoAndStop(0); deer.graze = BI.graze; scene.addChild(deer); } else deer = null;
        fox = spr(BI.critter, -80, groundY(-80) + 6, BI.critterScale); scene.addChild(fox); fox.dir = 1;
        if (BI.hopper) { rabbit = spr(BI.hopper, 760, groundY(760) + 6, 0.55); rabbit.baseY = rabbit.y; scene.addChild(rabbit); } else rabbit = null;
        if (BI.roller) { roller = spr(BI.roller, -60, groundY(-60) + 2, 0.5); roller.tint = 0xc2a468; scene.addChild(roller); roller.visible = false; rollerTimer = 2 + Math.random() * 3; } else roller = null;

        // water biomes (pond) — reflections, lilies, ducks, dragonflies
        glit = new PIXI.Graphics();
        if (BI.water) {
          water = new PIXI.Sprite(gradTex([[0, BI.water.top], [1, BI.water.bot]], 288)); water.position.set(0, 600); water.width = VW; water.height = VH - 600; water.tint = snow ? 0xcfe6ef : 0xffffff; scene.addChild(water);
          const lip = new PIXI.Graphics(); lip.beginFill(0xbfe6ef, 0.5); lip.drawRect(0, 600, VW, 3); lip.endFill(); scene.addChild(lip);
          scene.addChild(glit);
          if (BI.water.lily && !snow) for (const [lx, ly, ls] of [[230, 632, 0.7], [610, 648, 0.82], [1010, 636, 0.66]]) { const lp = spr('lily', lx, ly, ls, 0.5, 0.5); lp.baseY = ly; scene.addChild(lp); lilies.push(lp); }
          if (BI.water.ducks) {
            const dm = spr('duck', 380, 656, 0.6); dm.baseY = dm.y; dm.vx = 0.5; dm.kids = [];
            dm.ref = spr('duck', 380, 0, 0.6); dm.ref.scale.y = -0.6; dm.ref.alpha = 0.28; dm.ref.tint = 0x6f8ea0; scene.addChildAt(dm.ref, scene.getChildIndex(glit));
            for (let i = 0; i < 3; i++) { const k = spr('duckling', dm.x - 34 - i * 22, 668, 0.5); k.baseY = k.y; scene.addChild(k); dm.kids.push(k); }
            scene.addChild(dm); ducks.push(dm);
            const d2 = spr('duck', 980, 690, 0.55); d2.scale.x = -0.55; d2.baseY = d2.y; d2.vx = -0.4; ducks.push(d2); scene.addChild(d2);
          }
          if (BI.water.drag && !snow) for (let i = 0; i < 3; i++) { const d = anim(['dragonfly_a', 'dragonfly_b'], 200 + Math.random() * 880, 612 + Math.random() * 60, 0.45, 0.4); d.vx = (Math.random() - 0.5) * 2.4; d.vy = (Math.random() - 0.5) * 1.2; d.lo = 605; d.hi = 690; flutters.push(d); scene.addChild(d); }
          if (BI.water.sailboat) { const sb = spr('sailboat', 740, 614, 0.5); sb.baseY = 614; sb.vx = 0.22; ducks.push(sb); scene.addChild(sb); }
        } else { scene.addChild(glit); water = null; }
        if (BI.flutter && !snow) for (let i = 0; i < 4; i++) { const f = anim(['butterfly_a', 'butterfly_b'], Math.random() * VW, 500 + Math.random() * 70, 0.5, 0.18); f.vx = (Math.random() - 0.5) * 1.2; f.vy = (Math.random() - 0.5) * 0.8; f.lo = 470; f.hi = 590; flutters.push(f); scene.addChild(f); }

        // night veil (multiply) — only darkens the scene's pixels
        veil = new PIXI.Graphics(); veil.beginFill(0x2b3a66).drawRect(0, 0, VW, VH).endFill(); veil.blendMode = PIXI.BLEND_MODES.MULTIPLY; scene.addChild(veil);

        // fireflies above the veil (warm seasons only)
        const fl = new PIXI.Container(); root.addChild(fl); fireflies.fl = fl;
        if (BI.ground === 'meadow' && !snow) for (let i = 0; i < 16; i++) { const g = spr('glow', 60 + Math.random() * (VW - 120), 470 + Math.random() * 130, 0.16, 0.5, 0.5); g.tint = 0xeaff8a; g.blendMode = PIXI.BLEND_MODES.ADD; g.ph = Math.random() * 6.28; g.vx = (Math.random() - 0.5) * 0.4; g.vy = (Math.random() - 0.5) * 0.3; fireflies.push(g); fl.addChild(g); }

        // seasonal weather: drifting petals / tumbling leaves / falling snow
        const wl = new PIXI.Container(); root.addChild(wl); weather.layer = wl;
        if (weatherKind !== 'none') {
          const count = weatherKind === 'flake' ? 70 : weatherKind === 'leaf' ? 26 : 34, kind = weatherKind;
          for (let i = 0; i < count; i++) {
            const p = spr(kind === 'flake' ? 'flake' : kind === 'leaf' ? 'leaf' : 'petal', Math.random() * VW, Math.random() * VH, kind === 'flake' ? 0.3 + Math.random() * 0.4 : 0.5 + Math.random() * 0.5, 0.5, 0.5);
            if (kind === 'leaf') p.tint = LEAFTINTS[(Math.random() * LEAFTINTS.length) | 0];
            p.vy = kind === 'flake' ? 0.6 + Math.random() * 0.8 : kind === 'leaf' ? 1 + Math.random() * 1.2 : 0.7 + Math.random() * 0.8;
            p.vx = (Math.random() - 0.5) * (kind === 'leaf' ? 1.2 : 0.6);
            p.spin = (Math.random() - 0.5) * (kind === 'leaf' ? 0.06 : 0.02);
            p.ph = Math.random() * 6.28; p.sw = kind === 'flake' ? 0.5 : 1.2;
            weather.push(p); wl.addChild(p);
          }
        }

        // rain (independent of season; toggled live) — drawn each frame
        rainG = new PIXI.Graphics(); root.addChild(rainG);
        rainDrops.length = 0;
        for (let i = 0; i < 130; i++) rainDrops.push({ x: Math.random() * VW, y: Math.random() * VH, len: 9 + Math.random() * 8, sp: 9 + Math.random() * 5 });

        fit(); ready = true;
      }

      let t = 0;
      app.ticker.add((dt) => {
        if (!ready || document.hidden) return;
        const h = nowHour(), P = tod(h), cel = celestial(h), night = Math.min(1, Math.max(0, (0.78 - P.light) / 0.46));
        if (!reduce.matches) t += dt / 60;

        // sky (rebuild texture only when the hour shifts)
        if (Math.abs(h - lastSkyH) > 0.04) { lastSkyH = h; drawSky(P); }
        veil.alpha = night * 0.72;
        stars.alpha = night;
        fireflies.fl.alpha = night;
        for (const c of clouds) { c.tint = hexI(lpH('#33406a', '#ffffff', Math.min(1, P.light + 0.05))); }

        // sun / moon + halo
        const body = cel.sun ? sun : moon, other = cel.sun ? moon : sun;
        other.visible = false; body.visible = true; body.position.set(cel.x, cel.y);
        sunGlow.visible = true; sunGlow.position.set(cel.x, cel.y);
        sunGlow.tint = cel.sun ? 0xffe9a8 : 0x9fb6d8;
        sunGlow.scale.set((cel.sun ? 3.4 : 2.2) + Math.sin(t * 1.5) * 0.12);
        sunGlow.alpha = cel.sun ? 0.8 : 0.5;

        if (reduce.matches) { if (deer) deer.gotoAndStop(0); return; }

        // glitter: sun/moon reflection shimmer on the pond
        glit.clear();
        if (water && cel.y < 560) {
          const col = cel.sun ? 0xfff0b8 : 0xc9d8ea;
          for (let y = 606; y < VH; y += 5) {
            const d = (y - 606) / (VH - 606), wob = Math.sin(y * 0.6 + t * 2.2) * (2 + d * 10);
            glit.beginFill(col, (1 - d) * 0.5 * (cel.sun ? 1 : 0.7)); glit.drawRect(cel.x + wob - (2 + d * 4), y, 4 + d * 8, 2); glit.endFill();
          }
        }

        for (const c of clouds) { c.x += c.vx * dt; if (c.x - c.width > VW) c.x = -c.width; }
        for (const w of swayers) w.s.rotation = Math.sin(t * w.sp + w.ph) * w.amp;

        // walker: deer ambles then grazes; a camel just plods along
        if (deer) {
          deerTimer -= dt / 60; const multi = deer.totalFrames > 1;
          if (!deer.graze) deerMode = 'walk';
          if (deerMode === 'walk') { deer.x += 0.35 * dt; if (multi && !deer.playing) deer.play(); if (deer.graze && deerTimer < 0) { deerMode = 'graze'; deerTimer = 2.5 + Math.random() * 3; if (multi) deer.gotoAndStop(0); } }
          else if (deerTimer < 0) { deerMode = 'walk'; deerTimer = 5 + Math.random() * 6; }
          if (deer.x > VW + 60) deer.x = -60;
          deer.y = groundY(deer.x) + 8 + (deerMode === 'walk' ? Math.abs(Math.sin(t * 4)) * -2 : 0);
        }

        // fox: trots across now and then
        foxTimer -= dt / 60;
        if (fox.visible !== false) {
          fox.x += fox.dir * 1.5 * dt; fox.y = groundY(fox.x) + 6 + Math.abs(Math.sin(t * 7)) * -2;
          if (fox.x > VW + 80) { fox.visible = false; foxTimer = 8 + Math.random() * 10; }
        } else if (foxTimer < 0) { fox.visible = true; fox.x = -80; fox.dir = 1; }

        // hopper (rabbit)
        if (rabbit) {
          rabbit.hopT = (rabbit.hopT == null ? 2 : rabbit.hopT) - dt / 60;
          const hop = rabbit.hopT < 0.4 && rabbit.hopT > 0 ? Math.sin((0.4 - rabbit.hopT) / 0.4 * Math.PI) : 0;
          rabbit.y = rabbit.baseY - hop * 24; rabbit.x += hop * 1.1;
          if (rabbit.hopT < 0) { rabbit.hopT = 3 + Math.random() * 4; if (rabbit.x > VW - 80) rabbit.x = 120; }
        }
        // roller (tumbleweed) bounds across at intervals
        if (roller) {
          rollerTimer -= dt / 60;
          if (roller.visible) { roller.x += 3 * dt; roller.rotation += 0.13 * dt; roller.y = groundY(roller.x) + 2 - Math.abs(Math.sin(t * 6)) * 10; if (roller.x > VW + 60) { roller.visible = false; rollerTimer = 5 + Math.random() * 7; } }
          else if (rollerTimer < 0) { roller.visible = true; roller.x = -60; }
        }

        // ducks drift + bob, brood + reflection follow
        for (const d of ducks) {
          d.x += d.vx * dt; d.y = d.baseY + Math.sin(t * 2 + d.x * 0.05) * 1.6;
          if (d.x > VW - 40) d.vx = -Math.abs(d.vx); if (d.x < 40) d.vx = Math.abs(d.vx);
          d.scale.x = (d.vx < 0 ? -1 : 1) * Math.abs(d.scale.x);
          if (d.ref) { d.ref.x = d.x; d.ref.y = d.y + 18 + Math.sin(t * 2) * 1; d.ref.scale.x = d.scale.x; }
          if (d.kids) d.kids.forEach((k, i) => { const b = d.vx < 0 ? 1 : -1; k.x = d.x + b * (34 + i * 22); k.y = k.baseY + Math.sin(t * 2 + i) * 1.4; k.scale.x = (d.vx < 0 ? -1 : 1) * Math.abs(k.scale.x); });
        }

        // butterflies, dragonflies, bird — wandering / crossing
        for (const f of flutters) {
          if (f.isBird) { f.x += 1.1 * dt; f.y = 150 + Math.sin(f.x * 0.004) * 30; if (f.x > VW + 80) { f.x = -80; f.y = 120 + Math.random() * 80; } continue; }
          f.x += f.vx * dt; f.y += f.vy * dt;
          if (Math.random() < 0.02) { f.vx = (Math.random() - 0.5) * (f.hi > 600 ? 2.4 : 1.2); f.vy = (Math.random() - 0.5) * (f.hi > 600 ? 1.2 : 0.8); }
          if (f.x < 20 || f.x > VW - 20) f.vx *= -1; if (f.y < f.lo || f.y > f.hi) f.vy *= -1;
        }
        // fireflies drift + twinkle
        for (const g of fireflies) { g.x += g.vx * dt; g.y += g.vy * dt; if (Math.random() < 0.02) { g.vx = (Math.random() - 0.5) * 0.4; g.vy = (Math.random() - 0.5) * 0.3; } if (g.x < 40 || g.x > VW - 40) g.vx *= -1; if (g.y < 460 || g.y > 600) g.vy *= -1; g.alpha = 0.4 + 0.6 * (Math.sin(t * 3 + g.ph) * 0.5 + 0.5); }
        // lily pads bob; seasonal weather falls
        for (const lp of lilies) lp.y = lp.baseY + Math.sin(t * 1.5 + lp.x * 0.05) * 1.2;
        for (const w of weather) { w.y += w.vy * dt; w.x += (w.vx + Math.sin(t * 1.2 + w.ph) * w.sw) * dt; w.rotation += w.spin * dt; if (w.y > VH + 14) { w.y = -14; w.x = Math.random() * VW; } if (w.x < -14) w.x = VW + 14; else if (w.x > VW + 14) w.x = -14; }
        // rain (toggleable, any season)
        if (rainOn) {
          rainG.clear(); rainG.lineStyle(1.4, 0xbcd6e8, 0.5);
          for (const d of rainDrops) { d.y += d.sp * dt; d.x += 1.4 * dt; if (d.y > VH) { d.y = -d.len; d.x = Math.random() * VW; } if (d.x > VW) d.x -= VW; rainG.moveTo(d.x, d.y); rainG.lineTo(d.x - 2.5, d.y + d.len); }
        } else if (rainG.geometry.graphicsData.length) rainG.clear();
      });

      PIXI.Assets.load(NAMES.map((n) => ({ alias: n, src: `grove/assets/${n}.png` }))).then(build).catch((e) => console.error('Grove load failed:', e));

      // ---- control panel (revealed by the ✦ wallpaper toggle) ----
      const TLIST = [['auto', 'Auto'], ['dawn', 'Dawn'], ['day', 'Day'], ['dusk', 'Dusk'], ['night', 'Night']];
      const SLIST = [['auto', 'Auto'], ['spring', 'Spring'], ['summer', 'Summer'], ['autumn', 'Autumn'], ['winter', 'Winter']];
      const uiBiome = document.getElementById('uiBiome'), uiTime = document.getElementById('uiTime'), uiSeason = document.getElementById('uiSeason');
      const mkBtn = (label, on, fn) => { const b = document.createElement('button'); b.textContent = label; if (on) b.className = 'on'; b.addEventListener('click', fn); return b; };
      const lbl = (text, row) => { const s = document.createElement('span'); s.className = 'lbl'; s.textContent = text; row.appendChild(s); };
      function buildUI() {
        uiBiome.textContent = ''; uiTime.textContent = ''; uiSeason.textContent = '';
        Object.entries(BIOMES).forEach(([k, v]) => uiBiome.appendChild(mkBtn(v.label, k === biomeMode, () => { biomeMode = k; LS('biome', k); if (ready) build(); buildUI(); })));
        lbl('time', uiTime);
        TLIST.forEach(([k, l]) => uiTime.appendChild(mkBtn(l, k === timeMode, () => { timeMode = k; LS('time', k); lastSkyH = -99; buildUI(); })));
        lbl('season', uiSeason);
        SLIST.forEach(([k, l]) => uiSeason.appendChild(mkBtn(l, k === seasonMode, () => { seasonMode = k; LS('season', k); if (ready) build(); buildUI(); })));
        uiSeason.appendChild(mkBtn('🌧 Rain', rainOn, () => { rainOn = !rainOn; LS('rain', rainOn ? '1' : '0'); buildUI(); }));
      }
      buildUI();

      // ---- host bridge + pause when hidden ----
      let shown = false;
      function setShown(v) { shown = v; document.body.classList.toggle('shown', v); window.parent.postMessage({ type: 'shaderwall', state: v ? 'shown' : 'hidden' }, location.origin); }
      addEventListener('message', (e) => { if (e.origin != location.origin) return; const d = e.data || {}; if (d.type !== 'shaderwall') return; if (d.action === 'show') setShown(true); else if (d.action === 'hide') setShown(false); else if (d.action === 'toggle') setShown(!shown); });
      addEventListener('keydown', (e) => { if (e.key === 'h' || e.key === 'H') setShown(!shown); });
      document.addEventListener('visibilitychange', () => { document.hidden ? app.ticker.stop() : app.ticker.start(); });
      setShown(false);
    </script>
  </body>
</html>
