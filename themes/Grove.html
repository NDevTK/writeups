      }

        position: fixed;

        justify-content: center;

      }

        background: #2c5a8c;

      }
      #ui .lbl {

        font-size: 11px;
        align-self: center;
        margin-right: 2px;

        const d = new Date();

      const hx = (s) => [
        parseInt(s.slice(1, 3), 16),
        parseInt(s.slice(3, 5), 16),
        parseInt(s.slice(5, 7), 16)

      const lp = (a, b, t) => a + (b - a) * t;
      const lpH = (a, b, t) => {
        const A = hx(a),
          B = hx(b);
        return [lp(A[0], B[0], t), lp(A[1], B[1], t), lp(A[2], B[2], t)];
      }; // hex strings
      const mixA = (a, b, t) => [
        lp(a[0], b[0], t),
        lp(a[1], b[1], t),
        lp(a[2], b[2], t)
      ]; // rgb arrays
      const css = (c) => `rgb(${c[0] | 0},${c[1] | 0},${c[2] | 0})`;
      const hexI = (c) => ((c[0] | 0) << 16) | ((c[1] | 0) << 8) | (c[2] | 0);
      function tod(h) {
        for (let i = 0; i < SKY.length - 1; i++)
          if (h >= SKY[i].h && h <= SKY[i + 1].h) {
            const a = SKY[i],
              b = SKY[i + 1],
              t = (h - a.h) / (b.h - a.h || 1);
            return {
              top: lpH(a.top, b.top, t),
              bot: lpH(a.bot, b.bot, t),
              light: lp(a.light, b.light, t)

          }
        return tod(0.01);

      function celestial(h) {

            y: HZ - Math.sin(f * Math.PI) * HZ * 0.78,
            sun: true

        return {
          x: VW * f,
          y: HZ - Math.sin(f * Math.PI) * HZ * 0.66,
          sun: false

        for (const [n, sc, x] of BI.mid) {

        }
        if (BI.ground === 'meadow') {
          for (let i = 0; i < 16; i++) {

          }
          if (!snow)

              swayers.push({s: f, amp: 0.06, sp: 1.4, ph: Math.random() * 6});

        } else if (BI.ground === 'sand') {

          }
          for (let i = 0; i < 6; i++) {
            const x = Math.random() * VW,

        } else if (BI.ground === 'beach') {

            scene.addChild(

          for (let i = 0; i < 5; i++) {

        } else if (BI.ground === 'snow') {

        } else if (BI.ground === 'fern') {

        } else if (BI.ground === 'basalt') {
          for (let i = 0; i < 14; i++) {

              r = spr('rock', x, groundY(x) + 8, 0.1 + Math.random() * 0.22);

            scene.addChild(r);
          }
          const cr = new PIXI.Graphics();
          cr.blendMode = PIXI.BLEND_MODES.ADD;
          for (let i = 0; i < 8; i++) {
            const x = Math.random() * VW,
              y = groundY(x) + 18 + Math.random() * 130;
            cr.lineStyle(2 + Math.random() * 2, 0xff5a1e, 0.55);

        if (BI.walker) {

        if (BI.critter) {

        } else rabbit = null; // flip to face its hop direction (rightward)
        if (BI.roller) {

        // water biomes (pond) — reflections, lilies, ducks, dragonflies

        if (BI.water) {

          rippleG = new PIXI.Graphics();

        } else {

        // night veil (multiply) — only darkens the scene's pixels
        veil = new PIXI.Graphics();

        const fl = new PIXI.Container();
        root.addChild(fl);
        fireflies.fl = fl;
        if (

        if (weatherKind !== 'none') {

          for (let i = 0; i < count; i++) {

          });

        if (BI.feature === 'volcano') {

          for (let i = 0; i < 22; i++) {

            );
            e.tint = Math.random() < 0.5 ? 0xff7a2a : 0xffb84a;

            e.vy = -(0.3 + Math.random() * 0.6);

        shootG = new PIXI.Graphics();
        root.addChild(shootG); // shooting stars render on top, above the night veil so the meteor reads bright

        fit();

      }

      let t = 0;
      app.ticker.add((dt) => {
        if (!ready || document.hidden) return;
        const h = nowHour(),
          P = tod(h),
          cel = celestial(h),
          night = Math.min(1, Math.max(0, (0.78 - P.light) / 0.46));
        if (!reduce.matches) t += dt / 60;

        // sky (rebuild texture only when the hour shifts)
        if (Math.abs(h - lastSkyH) > 0.04) {
          lastSkyH = h;
          drawSky(P);
        }
        veil.alpha = night * 0.72;
        stars.alpha = night;
        // aurora intensity: a slow swell/fade so it has quiet stretches and dramatic bursts
        const auroraI =
          0.22 + 0.78 * Math.pow(0.5 + 0.5 * Math.sin(t * 0.05), 2);
        if (BI.aurora) drawAurora(t, night, auroraI);
        fireflies.fl.alpha = night;
        for (const c of clouds) {
          c.tint = hexI(lpH('#33406a', '#ffffff', Math.min(1, P.light + 0.05)));
        }

        // sun / moon + halo
        const body = cel.sun ? sun : moon,
          other = cel.sun ? moon : sun;
        other.visible = false;
        body.visible = true;
        body.position.set(cel.x, cel.y);
        sunGlow.visible = true;
        sunGlow.position.set(cel.x, cel.y);
        sunGlow.tint = cel.sun ? 0xffe9a8 : 0x9fb6d8;
        sunGlow.scale.set((cel.sun ? 3.4 : 2.2) + Math.sin(t * 1.5) * 0.12);
        sunGlow.alpha = cel.sun ? 0.8 : 0.5;

        if (reduce.matches) {
          if (deer) deer.gotoAndStop(0);
          return;
        }

        // parallax: ease toward the pointer/tilt target; the foreground scene shifts more than the far sky
        parX += (parTX - parX) * 0.05;
        parY += (parTY - parY) * 0.05;
        farLayer.position.set(parX * 5, parY * 3);
        scene.position.set(parX * 14, parY * 8);
        fireflies.fl.position.set(parX * 14, parY * 8);

        // wind: a breeze that slowly varies and gusts (used by foliage, particles, and the water surface)
        const wind =
          Math.sin(t * 0.35) * 0.35 +
          Math.sin(t * 0.11 + 1.3) * 0.45 +
          Math.sin(t * 0.07) * 0.25;

        // shooting stars: an occasional streak across the night sky (any biome)
        shootG.clear();
        if (night > 0.34) {
          if (shoot) {
            shoot.x += shoot.vx * dt;
            shoot.y += shoot.vy * dt;
            shoot.life -= dt / 60;
            const fade = Math.sin(
                Math.max(0, 1 - shoot.life / shoot.dur) * Math.PI
              ),
              steps = 9;
            for (let i = 0; i < steps; i++) {
              const f = i / steps;
              shootG.lineStyle(3 * (1 - f) + 0.3, 0xffffff, fade * (1 - f));
              shootG.moveTo(
                shoot.x - shoot.vx * f * 4,
                shoot.y - shoot.vy * f * 4
              );
              shootG.lineTo(
                shoot.x - shoot.vx * (f + 1 / steps) * 4,
                shoot.y - shoot.vy * (f + 1 / steps) * 4
              );
            }
            shootG.beginFill(0xffffff, fade);
            shootG.drawCircle(shoot.x, shoot.y, 2);
            shootG.endFill();
            if (shoot.life <= 0 || shoot.x > VW + 40 || shoot.y > 420) {
              shoot = null;
              shootT = 5 + Math.random() * 8;
            }
          } else {
            shootT -= dt / 60;
            if (shootT < 0)
              shoot = {
                x: 60 + Math.random() * VW * 0.6,
                y: 20 + Math.random() * 120,
                vx: 7 + Math.random() * 4,
                vy: 2.4 + Math.random() * 2,
                life: 0.9,
                dur: 0.9
              };
          }
        }

        // sun/moon reflection on the pond: a soft reflected disc at the waterline + a shimmering trail below it
        glit.clear();
        if (water && cel.y < 560) {
          const col = cel.sun ? 0xfff0b8 : 0xc9d8ea,
            str = cel.sun ? 1 : 0.7;
          for (let k = 3; k >= 1; k--) {
            glit.beginFill(col, 0.14 * str * (k / 3));
            glit.drawEllipse(cel.x, 611, 9 + k * 7, 3 + k * 2.4);
            glit.endFill();
          }
          for (let y = 606; y < VH; y += 5) {
            const d = (y - 606) / (VH - 606),
              wob =
                Math.sin(y * 0.6 + t * 2.2) *
                (2 + d * 10) *
                (1 + Math.abs(wind) * 1.1); // gusts scatter the reflection
            glit.beginFill(col, (1 - d) * 0.5 * str);
            glit.drawRect(cel.x + wob - (2 + d * 4), y, 4 + d * 8, 2);
            glit.endFill();
          }
        }
        if (water && BI.aurora && night > 0.08) {
          // aurora mirrored on the water: wavy green/teal bands, scaled by the live aurora intensity
          const acols = [0x4fffa8, 0x36c9ff];
          for (let b = 0; b < 2; b++) {
            glit.beginFill(acols[b], night * 0.2 * auroraI);
            const by = 622 + b * 28;
            glit.moveTo(0, by + Math.sin(t * 1.3 + b) * 4);
            for (let x = 0; x <= VW; x += 30)
              glit.lineTo(x, by + Math.sin(x * 0.017 + t * 1.4 + b) * 6);
            for (let x = VW; x >= 0; x -= 30)
              glit.lineTo(
                x,
                by + 18 + Math.sin(x * 0.017 + t * 1.4 + b + 1) * 6
              );
            glit.closePath();
            glit.endFill();
          }
        }
        if (water && Math.abs(wind) > 0.16) {
          // wind chop: faint wavelets that ripple across the water surface during gusts
          const chop = Math.abs(wind) - 0.16;
          for (let i = 0; i < 5; i++) {
            const wy = 614 + i * 20,
              a = chop * 0.16 * (1 - i * 0.12);
            if (a <= 0) continue;
            glit.lineStyle(1.2, 0xffffff, a);
            glit.moveTo(0, wy);
            for (let x = 0; x <= VW; x += 24)
              glit.lineTo(
                x,
                wy + Math.sin(x * 0.03 + t * 3 + i) * (1.4 + chop * 4)
              );
          }
          glit.lineStyle(0);
        }

        for (const c of clouds) {
          c.x += (c.vx + wind * 0.18) * dt;
          if (c.x - c.width > VW) c.x = -c.width;
          else if (c.x + c.width < 0) c.x = VW + c.width;
        }
        for (const w of swayers)
          w.s.rotation = Math.sin(t * w.sp + w.ph) * w.amp + wind * w.amp * 2.5;

        // walker: deer ambles then grazes; a camel just plods along
        if (deer) {
          deerTimer -= dt / 60;
          const multi = deer.totalFrames > 1;
          if (!deer.graze) deerMode = 'walk';
          if (deerMode === 'walk') {
            deer.x += 0.35 * dt;
            if (multi && !deer.playing) deer.play();
            if (deer.graze && deerTimer < 0) {
              deerMode = 'graze';
              deerTimer = 2.5 + Math.random() * 3;
              if (multi) deer.gotoAndStop(0);
            }
          } else if (deerTimer < 0) {
            deerMode = 'walk';
            deerTimer = 5 + Math.random() * 6;
          }
          if (deer.x > VW + 60) deer.x = -60;
          deer.y =
            groundY(deer.x) +
            8 +
            (deerMode === 'walk' ? Math.abs(Math.sin(t * 4)) * -2 : 0);
        }

        // critter (fox / lizard / crab): trots across now and then
        if (fox) {
          foxTimer -= dt / 60;
          if (fox.visible !== false) {
            fox.x += fox.dir * 1.5 * dt;
            fox.y = groundY(fox.x) + 6 + Math.abs(Math.sin(t * 7)) * -2;
            if (fox.x > VW + 80) {
              fox.visible = false;
              foxTimer = 8 + Math.random() * 10;
            }
          } else if (foxTimer < 0) {
            fox.visible = true;
            fox.x = -80;
            fox.dir = 1;
          }
        }

        // hopper (rabbit)
        if (rabbit) {
          rabbit.hopT = (rabbit.hopT == null ? 2 : rabbit.hopT) - dt / 60;
          const hop =
            rabbit.hopT < 0.4 && rabbit.hopT > 0
              ? Math.sin(((0.4 - rabbit.hopT) / 0.4) * Math.PI)
              : 0;
          rabbit.y = rabbit.baseY - hop * 24;
          rabbit.x += hop * 1.1;
          if (rabbit.hopT < 0) {
            rabbit.hopT = 3 + Math.random() * 4;
            if (rabbit.x > VW - 80) rabbit.x = 120;
          }
        }
        // roller (tumbleweed) bounds across at intervals
        if (roller) {
          rollerTimer -= dt / 60;
          if (roller.visible) {
            roller.x += 3 * dt;
            roller.rotation += 0.13 * dt;
            roller.y = groundY(roller.x) + 2 - Math.abs(Math.sin(t * 6)) * 10;
            if (roller.x > VW + 60) {
              roller.visible = false;
              rollerTimer = 5 + Math.random() * 7;
            }
          } else if (rollerTimer < 0) {
            roller.visible = true;
            roller.x = -60;
          }
        }

        // ducks drift + bob, brood + reflection follow
        for (const d of ducks) {
          d.x += d.vx * dt;
          d.y = d.baseY + Math.sin(t * 2 + d.x * 0.05) * 1.6;
          if (d.x > VW - 40) d.vx = -Math.abs(d.vx);
          if (d.x < 40) d.vx = Math.abs(d.vx);
          d.scale.x = (d.vx < 0 ? -1 : 1) * Math.abs(d.scale.x);
          if (d.ref) {
            d.ref.x = d.x;
            d.ref.y = d.y + 18 + Math.sin(t * 2) * 1;
            d.ref.scale.x = d.scale.x;
          }
          if (d.kids)
            d.kids.forEach((k, i) => {
              const b = d.vx < 0 ? 1 : -1;
              k.x = d.x + b * (34 + i * 22);
              k.y = k.baseY + Math.sin(t * 2 + i) * 1.4;
              k.scale.x = (d.vx < 0 ? -1 : 1) * Math.abs(k.scale.x);
            });
          d.rip = (d.rip == null ? 0.5 : d.rip) - dt / 60;
          if (d.rip < 0) {
            ripples.push({
              x: d.x - (d.vx < 0 ? -1 : 1) * 14,
              y: d.baseY + 9,
              r: 4,
              life: 1
            });
            d.rip = 0.8 + Math.random() * 0.6;
          }
        }
        // expanding ripple rings trailing the ducks/boat on the water surface
        if (water) {
          rippleG.clear();
          for (let i = ripples.length - 1; i >= 0; i--) {
            const rp = ripples[i];
            rp.r += 0.7 * dt;
            rp.life -= (dt / 60) * 0.85;
            if (rp.life <= 0) {
              ripples.splice(i, 1);
              continue;
            }
            rippleG.lineStyle(1.4, 0xdff1f6, rp.life * 0.32);
            rippleG.drawEllipse(rp.x, rp.y, rp.r, rp.r * 0.34);
          }
        }

        // butterflies, dragonflies, bird — wandering / crossing
        for (const f of flutters) {
          if (f.isBird) {
            f.x += 1.1 * dt;
            f.y = 150 + Math.sin(f.x * 0.004) * 30;
            if (f.x > VW + 80) {
              f.x = -80;
              f.y = 120 + Math.random() * 80;
            }
            continue;
          }
          f.x += f.vx * dt;
          f.y += f.vy * dt;
          if (Math.random() < 0.02) {
            f.vx = (Math.random() - 0.5) * (f.hi > 600 ? 2.4 : 1.2);
            f.vy = (Math.random() - 0.5) * (f.hi > 600 ? 1.2 : 0.8);
          }
          if (f.x < 20 || f.x > VW - 20) f.vx *= -1;
          if (f.y < f.lo || f.y > f.hi) f.vy *= -1;
        }
        // migrating flock: crosses the sky now and then, holding a loose V behind the lead
        if (flock.length) {
          const lead = flock[0];
          if (lead.visible) {
            lead.fx += flockDir * 2.6 * dt;
            lead.fy += Math.sin(t * 0.5) * 0.2 * dt;
            for (const fb of flock) {
              const tx = lead.fx - flockDir * Math.abs(fb.wing) * 26,
                ty = lead.fy + fb.wing * 11 + Math.sin(t * 3 + fb.ph) * 2;
              fb.x += (tx - fb.x) * 0.2; // ease toward the slot for a lagging, lifelike V
              fb.y += (ty - fb.y) * 0.2;
              fb.scale.x = (flockDir < 0 ? -1 : 1) * Math.abs(fb.scale.x);
            }
            if (
              (flockDir > 0 && lead.fx > VW + 130) ||
              (flockDir < 0 && lead.fx < -130)
            ) {
              for (const fb of flock) fb.visible = false;
              flockT = 28 + Math.random() * 50;
            }
          } else {
            flockT -= dt / 60;
            if (flockT < 0) {
              flockDir = Math.random() < 0.5 ? 1 : -1;
              const sx = flockDir > 0 ? -130 : VW + 130,
                sy = 66 + Math.random() * 84;
              lead.fx = sx;
              lead.fy = sy;
              for (const fb of flock) {
                fb.x = sx - flockDir * Math.abs(fb.wing) * 26;
                fb.y = sy + fb.wing * 11;
                fb.scale.x = (flockDir < 0 ? -1 : 1) * Math.abs(fb.scale.x);
                fb.visible = true;
              }
            }
          }
        }
        // fireflies drift + twinkle
        for (const g of fireflies) {
          g.x += g.vx * dt;
          g.y += g.vy * dt;
          if (Math.random() < 0.02) {
            g.vx = (Math.random() - 0.5) * 0.4;
            g.vy = (Math.random() - 0.5) * 0.3;
          }
          if (g.x < 40 || g.x > VW - 40) g.vx *= -1;
          if (g.y < 460 || g.y > 600) g.vy *= -1;
          g.alpha = 0.4 + 0.6 * (Math.sin(t * 3 + g.ph) * 0.5 + 0.5);
        }
        // lily pads bob; seasonal weather falls
        for (const lp of lilies) {
          const bob = Math.sin(t * 1.5 + lp.x * 0.05) * 1.2;
          if (lp.isFrog) {
            lp.hopT =
              (lp.hopT == null ? 1.5 + Math.random() * 3 : lp.hopT) - dt / 60;
            const hop =
              lp.hopT < 0.35 && lp.hopT > 0
                ? Math.sin(((0.35 - lp.hopT) / 0.35) * Math.PI)
                : 0;
            lp.y = lp.baseY + bob - hop * 14;
            if (lp.hopT < 0) {
              if (water)
                ripples.push({x: lp.x, y: lp.baseY + 8, r: 4, life: 1});
              lp.hopT = 2.5 + Math.random() * 4;
            }
          } else lp.y = lp.baseY + bob;
        }
        for (const w of weather) {
          w.y += w.vy * dt;
          w.x += (w.vx + Math.sin(t * 1.2 + w.ph) * w.sw + wind * 2.2) * dt;
          w.rotation += w.spin * dt;
          if (w.y > VH + 14) {
            w.y = -14;
            w.x = Math.random() * VW;
          }
          if (w.x < -14) w.x = VW + 14;
          else if (w.x > VW + 14) w.x = -14;
        }
        // rain (toggleable, any season)
        if (rainOn) {
          rainG.clear();
          rainG.lineStyle(1.4, 0xbcd6e8, 0.5);
          for (const d of rainDrops) {
            d.y += d.sp * dt;
            d.x += 1.4 * dt;
            if (d.y > VH) {
              d.y = -d.len;
              d.x = Math.random() * VW;
            }
            if (d.x > VW) d.x -= VW;
            rainG.moveTo(d.x, d.y);
            rainG.lineTo(d.x - 2.5, d.y + d.len);
          }
        } else if (rainG.geometry.graphicsData.length) rainG.clear();

        // volcanic: pulse the crater glow, billow smoke upward, drift embers up
        if (lavaGlow) {
          lavaGlow.alpha = 0.7 + Math.sin(t * 1.8) * 0.18;
          lavaGlow.scale.set(1.6 + Math.sin(t * 1.3) * 0.12);
        }
        for (const p of smoke) {
          p.y += -0.5 * dt;
          p.x += Math.sin(t * 0.5 + p.ph) * 0.3 * dt;
          p.scale.set(p.scale.x + 0.0009 * dt);
          p.alpha -= 0.0016 * dt;
          if (p.alpha <= 0) {
            p.y = 262;
            p.x = 636 + (Math.random() - 0.5) * 16;
            p.scale.set(0.2);
            p.alpha = 0.55;
          }
        }
        for (const e of embers) {
          e.y += e.vy * dt;
          e.x += (e.vx + Math.sin(t * 2 + e.ph) * 0.3) * dt;
          e.alpha = 0.45 + 0.45 * (Math.sin(t * 4 + e.ph) * 0.5 + 0.5);
          if (e.y < 360) {
            e.y = 470 + Math.random() * 170;
            e.x = Math.random() * VW;
          }
        }
      });

      PIXI.Assets.load(
        NAMES.map((n) => ({alias: n, src: `grove/assets/${n}.png`}))
      )
        .then(build)
        .catch((e) => console.error('Grove load failed:', e));

      // ---- control panel (revealed by the ✦ wallpaper toggle) ----
      const TLIST = [
        ['auto', 'Auto'],
        ['dawn', 'Dawn'],
        ['day', 'Day'],
        ['dusk', 'Dusk'],
        ['night', 'Night']
      ];
      const SLIST = [
        ['auto', 'Auto'],
        ['spring', 'Spring'],
        ['summer', 'Summer'],
        ['autumn', 'Autumn'],
        ['winter', 'Winter']
      ];
      const uiBiome = document.getElementById('uiBiome'),
        uiTime = document.getElementById('uiTime'),
        uiSeason = document.getElementById('uiSeason');
      const mkBtn = (label, on, fn) => {
        const b = document.createElement('button');
        b.textContent = label;
        if (on) b.className = 'on';
        b.addEventListener('click', fn);
        return b;
      };
      const lbl = (text, row) => {
        const s = document.createElement('span');
        s.className = 'lbl';
        s.textContent = text;
        row.appendChild(s);
      };
      function buildUI() {
        uiBiome.textContent = '';
        uiTime.textContent = '';
        uiSeason.textContent = '';
        Object.entries(BIOMES).forEach(([k, v]) =>
          uiBiome.appendChild(
            mkBtn(v.label, k === biomeMode, () => {
              biomeMode = k;
              LS('biome', k);
              if (ready) build();
              buildUI();
            })
          )
        );
        lbl('time', uiTime);
        TLIST.forEach(([k, l]) =>
          uiTime.appendChild(
            mkBtn(l, k === timeMode, () => {
              timeMode = k;
              LS('time', k);
              lastSkyH = -99;
              buildUI();
            })
          )
        );
        lbl('season', uiSeason);
        SLIST.forEach(([k, l]) =>
          uiSeason.appendChild(
            mkBtn(l, k === seasonMode, () => {
              seasonMode = k;
              LS('season', k);
              if (ready) build();
              buildUI();
            })
          )
        );
        uiSeason.appendChild(
          mkBtn('🌧 Rain', rainOn, () => {
            rainOn = !rainOn;
            LS('rain', rainOn ? '1' : '0');
            buildUI();
          })
        );
      }
      buildUI();

      // ---- host bridge + pause when hidden ----
      let shown = false;
      function setShown(v) {
        shown = v;
        document.body.classList.toggle('shown', v);
        window.parent.postMessage(
          {type: 'shaderwall', state: v ? 'shown' : 'hidden'},
          location.origin
        );
      }
      addEventListener('message', (e) => {
        if (e.origin != location.origin) return;
        const d = e.data || {};
        if (d.type === 'wallpaper-pointer') {
          parTX = (d.x - 0.5) * 2;
          parTY = (d.y - 0.5) * 2;
          return;
        }
        if (d.type !== 'shaderwall') return;
        if (d.action === 'show') setShown(true);
        else if (d.action === 'hide') setShown(false);
        else if (d.action === 'toggle') setShown(!shown);
      });
      addEventListener('keydown', (e) => {
        if (e.key === 'h' || e.key === 'H') setShown(!shown);
      });
      document.addEventListener('visibilitychange', () => {
        document.hidden ? app.ticker.stop() : app.ticker.start();
      });
      setShown(false);
    </script>
  </body>
</html>
