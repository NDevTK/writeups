            e.x = e.cx + Math.cos(e.ph) * e.rx; // a sensible static spot for reduced motion
            e.y = e.cy + Math.sin(e.ph) * e.ry;
            if (reduce.matches) e.gotoAndStop(0);
            flutters.push(e);
            scene.addChild(e);
          }

        // a flock of alpine choughs wheels and tumbles up near the crags — fast and playful, the
        // foil to the eagles' slow circles. they share a drifting centre and now and then all swoop
        if (BI.choughs) {
          choughHub = {
            x: VW * 0.35 + Math.random() * VW * 0.3,
            y: 200 + Math.random() * 60,
            vx: (0.3 + Math.random() * 0.4) * (Math.random() < 0.5 ? 1 : -1),
            ph: Math.random() * 6.28,
            tmb: 3 + Math.random() * 4,
            tumble: 0
          };
          for (let i = 0; i < BI.choughs; i++) {
            const c = anim(
              ['chough_a', 'chough_b'],
              0,
              0,
              0.24 + Math.random() * 0.12,
              0.18 + Math.random() * 0.1
            );
            c.orx = 26 + Math.random() * 46; // its own loose loop within the flock
            c.ory = 16 + Math.random() * 22;
            c.ox = (Math.random() - 0.5) * 90;
            c.oy = (Math.random() - 0.5) * 50;
            c.ph = Math.random() * 6.28;
            c.sp = 0.7 + Math.random() * 0.7;
            c.tint = 0x2a2630; // near-black, a hint of the sky in it
            c.baseSc = Math.abs(c.scale.x);
            c.x = choughHub.x + c.ox + Math.cos(c.ph) * c.orx; // a sensible spread for reduced motion
            c.y = choughHub.y + c.oy + Math.sin(c.ph) * c.ory;
            if (reduce.matches) c.gotoAndStop(0);
            choughs.push(c);
            scene.addChild(c);
          }
        }

        // bats emerge at dusk and flit low over the water + meadow, feeding on the insects
        // (the fireflies). gone by day — they fade in with the night. (not in winter; they hibernate)
        if (BI.bats && !snow) {
          const night0 = Math.min(
            1,
            Math.max(0, (0.78 - tod(nowHour()).light) / 0.46)
          ); // a correct static alpha for reduced motion (the ticker drives it otherwise)
          for (let i = 0; i < BI.bats; i++) {
            const b = anim(
              ['bat_a', 'bat_b'],
              Math.random() * VW,
              320 + Math.random() * 150,
              0.3 + Math.random() * 0.12,
              0.24
            );
            b.isBat = true;
            b.isDuskBat = true;
            b.tint = 0x241f2b;
            b.lo = 300;
            b.hi = 500; // flit low against the twilight, over the scene
            b.vx = (Math.random() < 0.5 ? -1 : 1) * (1 + Math.random() * 1.6);
            b.vy = (Math.random() - 0.5) * 2.4;
            b.alpha = night0;
            if (reduce.matches) b.gotoAndStop(0);
            flutters.push(b);
            scene.addChild(b);
          }
        }

        // dawn mist rising off the water — a low wispy band over the surface, in only at first light
        if (BI.water && !BI.underwater && !BI.cloudSea) {
          const mist = new PIXI.TilingSprite(T('fog'), VW + 120, 86);
          mist.position.set(-60, 576);
          mist.tileScale.set(1.5, 86 / 90);
          mist.baseA = 0.6;
          mist.spd = 0.05;
          mist.windF = 3;
          mist.dawnMist = true; // alpha driven by the dawn factor; hugs the water
          scene.addChild(mist);
          fogLayers.push(mist);
        }

        // night veil (multiply) — only darkens the scene's pixels
        veil = new PIXI.Graphics();
        veil
          .beginFill(0x2b3a66)
          .drawRect(-40, -40, VW + 80, VH + 80)
          .endFill();
        veil.blendMode = PIXI.BLEND_MODES.MULTIPLY;
        scene.addChild(veil);

        // fireflies above the veil (warm seasons only) — or glowworms strung under a cave ceiling
        const fl = new PIXI.Container();
        root.addChild(fl);
        fireflies.fl = fl;
        const hasFlies =
          BI.glow === 'cave' ||
          BI.glade ||
          ((BI.ground === 'meadow' ||
            BI.ground === 'marsh' ||
            BI.ground === 'fern' ||
            BI.ground === 'jungle') &&
            !snow);
        if (hasFlies) {
          const cave = BI.glow === 'cave',
            n = cave ? 30 : 16;
          for (let i = 0; i < n; i++) {
            const gx = 40 + Math.random() * (VW - 80),
              g = spr(
                'glow',
                gx,
                cave
                  ? ceilEdge(gx) + 10 + Math.random() * 120
                  : 470 + Math.random() * 130,
                cave ? 0.1 + Math.random() * 0.06 : 0.16,
                0.5,
                0.5
              );
            g.tint = cave ? 0x8ff0ff : BI.glade ? 0x9affd2 : 0xeaff8a;
            g.blendMode = PIXI.BLEND_MODES.ADD;
            g.ph = Math.random() * 6.28;
            g.vx = (Math.random() - 0.5) * (cave ? 0.16 : 0.4);
            g.vy = (Math.random() - 0.5) * (cave ? 0.12 : 0.3);
            fireflies.push(g);
            fl.addChild(g);
          }
        }

        // morning dew: a scatter of tiny glints beaded on the grass that catch the low sun
        // at first light and burn off as it climbs — pairs with the mist rising off the water.
        const dl = new PIXI.Container();
        root.addChild(dl);
        dewdrops.dl = dl;
        const hasDew =
          !snow &&
          !BI.underwater &&
          !BI.interior &&
          !BI.cloudSea &&
          (BI.ground === 'meadow' ||
            BI.ground === 'marsh' ||
            BI.ground === 'fern' ||
            BI.ground === 'jungle' ||
            BI.ground === 'glade' ||
            BI.ground === 'savanna');
        if (hasDew) {
          for (let i = 0; i < 36; i++) {
            const dx = 24 + Math.random() * (VW - 48),
              warm = Math.random() < 0.34, // a third catch the sunrise gold; the rest read sky-cool
              d = spr(
                'glow',
                dx,
                560 + Math.random() * 72,
                0.04 + Math.random() * 0.05,
                0.5,
                0.5
              );
            d.tint = warm ? 0xffe6a8 : 0xdaf3ff;
            d.blendMode = PIXI.BLEND_MODES.ADD;
            d.ph = Math.random() * 6.28;
            d.sp = 2.2 + Math.random() * 2.6; // each beads sharply at its own pace
            d.alpha = 0.55; // a sensible static glint for reduced motion (the twinkle drives it otherwise)
            dewdrops.push(d);
            dl.addChild(d);
          }
        }

        // seasonal weather: drifting petals / tumbling leaves / falling snow
        const wl = new PIXI.Container();
        root.addChild(wl);
        weather.layer = wl;
        if (weatherKind !== 'none') {
          const count =
              weatherKind === 'flake' ? 70 : weatherKind === 'leaf' ? 26 : 34,
            kind = weatherKind,
            leafKinds = ['leaf', 'leaf_m', 'leaf_o'], // ovate / maple / oak tumble together
            petalKinds = ['petal', 'petal', 'petal_w', 'petal_r']; // cherry pink, white, rose
          for (let i = 0; i < count; i++) {
            const p = spr(
              kind === 'flake'
                ? 'flake'
                : kind === 'leaf'
                  ? leafKinds[(Math.random() * leafKinds.length) | 0]
                  : petalKinds[(Math.random() * petalKinds.length) | 0],
              Math.random() * VW,
              Math.random() * VH,
              kind === 'flake'
                ? 0.3 + Math.random() * 0.4
                : 0.5 + Math.random() * 0.5,
              0.5,
              0.5
            );
            if (kind === 'leaf')
              p.tint = LEAFTINTS[(Math.random() * LEAFTINTS.length) | 0];
            p.vy =
              kind === 'flake'
                ? 0.6 + Math.random() * 0.8
                : kind === 'leaf'
                  ? 1 + Math.random() * 1.2
                  : 0.7 + Math.random() * 0.8;
            p.vx = (Math.random() - 0.5) * (kind === 'leaf' ? 1.2 : 0.6);
            p.spin = (Math.random() - 0.5) * (kind === 'leaf' ? 0.06 : 0.02);
            p.ph = Math.random() * 6.28;
            p.sw = kind === 'flake' ? 0.5 : 1.2;
            weather.push(p);
            wl.addChild(p);
          }
        }

        // rain (independent of season; toggled live) — drawn each frame
        rainG = new PIXI.Graphics();
        root.addChild(rainG);
        rainDrops.length = 0;
        for (let i = 0; i < 130; i++)
          rainDrops.push({
            x: Math.random() * VW,
            y: Math.random() * VH,
            len: 9 + Math.random() * 8,
            sp: 9 + Math.random() * 5
          });

        // volcanic feature: crater glow, drifting smoke, rising embers (all on root so night never dims them)
        if (BI.feature === 'volcano') {
          lavaGlow = spr('glow', 640, 270, 1.6, 0.5, 0.5);
          lavaGlow.tint = 0xff6a26;
          lavaGlow.blendMode = PIXI.BLEND_MODES.ADD;
          root.addChild(lavaGlow);
          for (let i = 0; i < 4; i++) {
            const p = spr('cloud', 636, 262 - i * 42, 0.22, 0.5, 0.5);
            p.tint = 0x4a444c;
            p.alpha = 0.5;
            p.ph = Math.random() * 6.28;
            smoke.push(p);
            root.addChild(p);
          }
        }
        if (BI.embers)
          for (let i = 0; i < 22; i++) {
            const e = spr(
              'glow',
              Math.random() * VW,
              400 + Math.random() * 180,
              0.07 + Math.random() * 0.06,
              0.5,
              0.5
            );
            e.tint = Math.random() < 0.5 ? 0xff7a2a : 0xffb84a;
            e.blendMode = PIXI.BLEND_MODES.ADD;
            e.vy = -(0.3 + Math.random() * 0.6);
            e.vx = (Math.random() - 0.5) * 0.3;
            e.ph = Math.random() * 6.28;
            embers.push(e);
            root.addChild(e);
          }

        shootG = new PIXI.Graphics();
        root.addChild(shootG); // shooting stars render on top, above the night veil so the meteor reads bright

        flashG = new PIXI.Graphics();
        flashG.blendMode = PIXI.BLEND_MODES.ADD;
        root.addChild(flashG); // lightning flash + bolt, on top so it lights the whole scene

        fit();
        ready = true;
      }

      // ---- opt-in ambient audio: a soft rain hiss + thunder that trails the lightning ----
      // everything is guarded so a missing/blocked AudioContext just stays silent.
      let audio = null;
      function initAudio() {
        if (audio) return audio;
        try {
          const AC = window.AudioContext || window.webkitAudioContext;
          if (!AC) return null;
          const ctx = new AC();
          const master = ctx.createGain();
          master.gain.value = 0;
          master.connect(ctx.destination);
          // one reusable 2s white-noise buffer feeds both the rain and the thunder
          const buf = ctx.createBuffer(1, ctx.sampleRate * 2, ctx.sampleRate);
          const data = buf.getChannelData(0);
          for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
          // steady rain: looped noise shaped to a wet hiss
          const rainSrc = ctx.createBufferSource();
          rainSrc.buffer = buf;
          rainSrc.loop = true;
          const hp = ctx.createBiquadFilter();
          hp.type = 'highpass';
          hp.frequency.value = 600;
          const lp = ctx.createBiquadFilter();
          lp.type = 'lowpass';
          lp.frequency.value = 3200;
          const rainGain = ctx.createGain();
          rainGain.gain.value = 0;
          rainSrc.connect(hp).connect(lp).connect(rainGain).connect(master);
          rainSrc.start();
          audio = {ctx, master, rainGain, buf};
        } catch (e) {
          audio = null;
        }
        return audio;
      }
      function thunder() {
        if (!audio) return;
        try {
          const {ctx, master, buf} = audio;
          const now = ctx.currentTime;
          const src = ctx.createBufferSource();
          src.buffer = buf;
          const lp = ctx.createBiquadFilter();
          lp.type = 'lowpass';
          lp.frequency.setValueAtTime(400, now);
          lp.frequency.exponentialRampToValueAtTime(90, now + 2.2);
          const g = ctx.createGain();
          g.gain.setValueAtTime(0.0001, now);
          g.gain.exponentialRampToValueAtTime(0.9, now + 0.08); // the crack
          g.gain.exponentialRampToValueAtTime(0.0001, now + 2.6); // the rolling decay
          src.connect(lp).connect(g).connect(master);
          src.start(now);
          src.stop(now + 2.7);
        } catch (e) {}
      }

      // the next biome in the loop, or a random different one for 'Surprise me'
      function nextJourneyBiome(random) {
        const keys = Object.keys(BIOMES),
          cur = nowBiome();
        if (random && keys.length > 1) {
          let k;
          do {
            k = keys[(Math.random() * keys.length) | 0];
          } while (k === cur);
          return k;
        }
        return keys[(keys.indexOf(cur) + 1) % keys.length];
      }
      // switch biome with a gentle fade: fade the scene down, rebuild it at the bottom, fade back up
      // (an instant swap when motion is reduced)
      function startJourney(biome) {
        if (journeyFade) return; // already mid-transition
        journeyTimer = JOURNEY_PERIOD;
        if (reduce.matches) {
          biomeParam = null;
          biomeMode = biome;
          LS('biome', biome);
          build();
          buildUI();
          return;
        }
        journeyNext = biome;
        journeyFade = -1;
      }

      let t = 0;
      app.ticker.add((dt) => {
        if (!ready || document.hidden) return;
        // journey: run an in-progress fade, otherwise tick the auto-cycle timer
        if (journeyFade) {
          root.alpha = Math.max(
            0,
            Math.min(1, root.alpha + journeyFade * 0.025 * dt)
          );
          if (journeyFade < 0 && root.alpha <= 0.001) {
            biomeParam = null; // let biomeMode drive nowBiome() from here on
            biomeMode = journeyNext;
            LS('biome', biomeMode);
            build();
            buildUI();
            journeyFade = 1; // now fade the new scene in
          } else if (journeyFade > 0 && root.alpha >= 0.999) {
            root.alpha = 1;
            journeyFade = 0;
            journeyNext = null;
          }
        } else if (journeyOn && wpMode !== 'shown') {
          journeyTimer -= dt / 60;
          if (journeyTimer <= 0) startJourney(nextJourneyBiome(false));
        }
        const h = nowHour(),
          cel = celestial(h);
        let P = tod(h),
          night = Math.min(1, Math.max(0, (0.78 - P.light) / 0.46));
        if (BI.glade) {
          // an enchanted clearing held in perpetual twilight, so its glow always reads
          P = {top: hx('#181333'), bot: hx('#27474a'), light: 0.22};
          night = 0.82;
        }
        if (!reduce.matches) t += dt / 60;

        // sky (rebuild texture only when the hour shifts)
        if (Math.abs(h - lastSkyH) > 0.04) {
          lastSkyH = h;
          drawSky(P);
        }
        veil.alpha = BI.interior
          ? night * 0.2 // a cave is already dark; barely dims further
          : BI.underwater
            ? night * 0.5 // the reef sinks into gloom at night (the column already darkens too)
            : BI.glade
              ? 0.28 // a soft, constant dusk shade (night is forced high, so don't crush it to black)
              : night * 0.72;
        stars.alpha = BI.interior || BI.underwater || BI.canopy ? 0 : night;

        // ---- weather front: clouds gather (cover), a shower rolls through (wet), then it clears ----
        // (no weather underwater: cover/wet/snow all stay 0, which silences rain, overcast, lightning, etc.)
        if (!reduce.matches && !BI.underwater) {
          let coverTarget, precipTarget; // precip = the front's precipitation phase (falls as rain, or snow when cold)
          if (weatherMode === 'rain') {
            coverTarget = 0.82;
            precipTarget = 1;
          } else if (weatherMode === 'clear') {
            coverTarget = 0;
            precipTarget = 0;
          } else {
            frontT -= dt / 60;
            if (frontT < 0) {
              if (frontState === 'clear') {
                frontState = 'gather';
                frontT = (snowing ? 14 : 20) + Math.random() * 14;
              } else if (frontState === 'gather') {
                frontState = 'rain'; // precipitation phase (rain or a snow squall)
                // cold scenes get longer, more frequent squalls so winter still reads as wintry
                frontT =
                  (snowing ? 45 : 28) + Math.random() * (snowing ? 80 : 45);
              } else if (frontState === 'rain') {
                frontState = 'clearup';
                frontT = 30;
                if (!snowing && cel.sun && P.light > 0.72) rainbowLife = 24; // sunshower payoff (rain only)
              } else {
                frontState = 'clear';
                // shorter dry gaps when it's cold, so the snow doesn't all melt away between squalls
                frontT =
                  (snowing ? 45 : 150) + Math.random() * (snowing ? 70 : 200);
              }
            }
            coverTarget =
              frontState === 'gather' || frontState === 'rain'
                ? 0.88
                : frontState === 'clearup'
                  ? 0.4
                  : 0;
            precipTarget = frontState === 'rain' ? 1 : 0;
          }
          cover += (coverTarget - cover) * 0.008 * dt;
          if (coverParam != null) cover = parseFloat(coverParam); // preview override
          // the same front falls as rain in the warmth and snow in the cold
          wet += ((snowing ? 0 : precipTarget) - wet) * 0.025 * dt;
          snowI += ((snowing ? precipTarget : 0) - snowI) * 0.02 * dt;
          // ground wetness rises in rain and dries slowly afterwards
          const wetUp = wet > 0.3;
          wetness += ((wetUp ? 1 : 0) - wetness) * (wetUp ? 0.012 : 0.004) * dt;
          // temperature: the climate baseline, cooled at night and under cloud/precip, warmed by midday
          // sun — eased so it has thermal inertia. it sets how fast snow settles and whether ice forms.
          const tTarget =
            (TEMP_BASE[nowBiome()] ?? 9) +
            (BI.seasonal ? (SEASON_TEMP[nowSeason()] ?? 0) : 0) +
            (P.light - 0.55) * 9 -
            cover * 3.5 -
            snowI * 2.5 -
            wet * 1.5;
          temp += (tTarget - temp) * 0.01 * dt;
          const coldness = Math.max(0, -temp), // degrees below freezing
            warmth = Math.max(0, temp); // degrees above
          // snow settles faster the colder and heavier the fall; melts faster the warmer it gets
          if (snowing) {
            const build = snowI * (0.00028 + coldness * 0.00006) * snowRate,
              melt = (0.00004 + warmth * 0.00012) * snowRate;
            snowAcc = Math.max(0, Math.min(1, snowAcc + (build - melt) * dt));
          } else snowAcc += (0 - snowAcc) * 0.02 * dt;
          // ice forms on a freezable pond once it's below freezing (more the colder), and thaws when it warms
          const iceTarget =
            water && BI.water && BI.water.freeze && temp < 0
              ? Math.min(1, coldness / 7)
              : 0;
          iceAmt +=
            (iceTarget - iceAmt) *
            (iceTarget > iceAmt ? 0.004 : 0.006) *
            iceRate *
            dt;
          if (rainbowLife > 0) {
            rainbowLife -= dt / 60;
            rainbow = Math.sin(Math.max(0, 1 - rainbowLife / 24) * Math.PI);
          } else rainbow = 0;
          // lightning: occasional strike during a heavy shower (never underground)
          if (wet > 0.55 && !BI.interior) {
            flashT -= dt / 60;
            if (flashT < 0) {
              flashT = 4 + Math.random() * 11;
              flash = 1;
              if (soundOn) setTimeout(thunder, 800 + Math.random() * 1700); // rumble trails the flash, like distance
              boltPts = [];
              let bx = 180 + Math.random() * (VW - 360),
                by = 0;
              while (by < 430) {
                boltPts.push([bx, by]);
                by += 24 + Math.random() * 26;
                bx += (Math.random() - 0.5) * 56;
              }
              boltPts.push([bx, by]);
            }
          }
          flash = Math.max(0, flash - (dt / 60) * 3.5);
        }
        overcastG.alpha =
          BI.interior || BI.underwater
            ? 0
            : cover * 0.55 * (0.25 + P.light * 0.75); // dim by cover, faint at night (no weather underground/underwater)

        // morning mist: thickest at dawn, burning off by midday, lingering after rain; tinted to the horizon
        if (fogLayers.length) {
          const fogTOD =
            0.06 +
            0.56 * Math.exp(-Math.pow((h - 6.3) / 1.9, 2)) +
            0.3 * (1 - P.light);
          const fogAmt = Math.min(
              1,
              (BI.fog || 0) *
                (fogTOD + wetness * 0.35 + cover * 0.45 + wet * 0.3) // haze thickens as a front gathers + rains
            ),
            fogTint = hexI(mixA(P.bot, [255, 255, 255], 0.55));
          // mist that rises off the water peaks sharply at first light and burns off as the sun climbs
          const dawnMist =
            Math.exp(-Math.pow((h - 6.1) / 1.3, 2)) * (1 - cover * 0.4);
          for (const fz of fogLayers) {
            fz.alpha = (fz.dawnMist ? dawnMist : fogAmt) * fz.baseA;
            fz.tint = fogTint;
          }
        }

        // audio follows the mute toggle and swells with the rain (click-free via setTargetAtTime)
        if (audio) {
          const at = audio.ctx.currentTime;
          audio.master.gain.setTargetAtTime(soundOn ? 0.55 : 0, at, 0.4);
          audio.rainGain.gain.setTargetAtTime(
            soundOn ? Math.min(1, wet * 1.1) : 0,
            at,
            0.5
          );
        }

        // rainbow: a coloured arc that fades in after a daytime shower clears
        rainbowG.clear();
        if (rainbow > 0.01 && !BI.interior && !BI.canopy) {
          const cols = [
            0xff6a6a, 0xffa84a, 0xffe24a, 0x6ad86a, 0x52a8ff, 0x6a6aff, 0xb06aff
          ];
          for (let i = 0; i < 7; i++) {
            rainbowG.lineStyle(8, cols[i], rainbow * 0.45);
            rainbowG.arc(640, 620, 420 - i * 8, Math.PI * 1.06, Math.PI * 1.94);
          }
        }

        // puddles: grow with ground wetness, reflecting a sliver of sky, then dry up.
        // Both the size (wetness) and the reflected colour (light) crawl, so only redraw when one actually moves.
        if (
          Math.abs(wetness - lastWetDraw) > 0.0015 ||
          Math.abs(P.light - lastLightDraw) > 0.01
        ) {
          lastWetDraw = wetness;
          lastLightDraw = P.light;
          puddleG.clear();
          if (wetness > 0.02 && !BI.interior) {
            for (const pd of puddles) {
              const rx = pd.r * Math.min(1, wetness * 1.3);
              puddleG.beginFill(0x2b3a52, wetness * 0.28);
              puddleG.drawEllipse(pd.x, pd.y, rx, rx * 0.3);
              puddleG.endFill();
              puddleG.beginFill(
                hexI(lpH('#5b7da0', '#d6ecff', P.light)),
                wetness * 0.5
              );
              puddleG.drawEllipse(pd.x, pd.y - 1, rx * 0.82, rx * 0.22);
              puddleG.endFill();
            }
          }
        }

        // settling snow + winter ice — all driven purely by snowAcc, which crawls in then settles
        // and sits static for minutes. These are the heaviest per-frame shapes (the crest cap alone
        // is ~1600 points across every hill), so rebuild them only while snowAcc is actually moving.
        const snowDirty = Math.abs(snowAcc - lastSnowDraw) > 0.0015;
        if (snowDirty) lastSnowDraw = snowAcc;
        if (snowDirty) {
          // (1) a deepening cap along every hill crest (reads even over water, behind the trees)
          crestG.clear();
          if (snowing || snowAcc > 0.02) {
            const lift = snowAcc * 5, // crest creeps a touch higher as it deepens
              thick = 7 + snowAcc * 26; // and gets fatter underneath
            crestG.beginFill(0xeef5fc, Math.min(1, 0.7 + snowAcc * 0.3));
            for (const fn of hillBands) {
              crestG.moveTo(-40, fn(-40) - lift);
              for (let x = -40; x <= VW + 40; x += 8)
                crestG.lineTo(x, fn(x) - lift);
              for (let x = VW + 40; x >= -40; x -= 8)
                crestG.lineTo(x, fn(x) + thick);
              crestG.closePath();
            }
            crestG.endFill();
          }
          // (2) snow piling up on the open foreground
          snowAccG.clear();
          if (snowAcc > 0.02 && !BI.cloudSea) {
            if (!BI.water) {
              // dry biome: a blanket rising across the whole foreground
              const topY = VH - 26 - snowAcc * 158;
              snowAccG.beginFill(
                0xeef5fc,
                Math.min(0.96, 0.45 + snowAcc * 0.55)
              );
              snowAccG.moveTo(-40, VH + 40);
              for (let x = -40; x <= VW + 40; x += 14)
                snowAccG.lineTo(x, topY + Math.sin(x * 0.02 + 1.5) * 7);
              snowAccG.lineTo(VW + 40, VH + 40);
              snowAccG.closePath();
              snowAccG.endFill();
            } else {
              // water biome: snow covers the visible bank (ground contour down to the waterline), never the pond
              snowAccG.beginFill(
                0xeef5fc,
                Math.min(0.9, 0.32 + snowAcc * 0.58)
              );
              snowAccG.moveTo(-40, 602);
              for (let x = -40; x <= VW + 40; x += 12)
                snowAccG.lineTo(x, groundY(x) - 2);
              snowAccG.lineTo(VW + 40, 602);
              snowAccG.closePath();
              snowAccG.endFill();
            }
          }
          // (3) snow on the pine/oak crowns fades in with the depth (the sprite itself sways)
          const capA = Math.min(1, 0.2 + snowAcc * 1.9);
          for (const ov of snowTrees) ov.alpha = capA;
        }

        // winter ice: shelves creep in from both banks as the pond freezes, leaving a shrinking
        // open lead down the middle (the ducks keep to it). driven by temperature now, not snow depth.
        const ice = iceAmt; // 0 on the deep fjord / unfrozen ponds; grows as it gets colder
        const openHalf = VW / 2 + 40 - ice * (VW / 2 + 40 - 190); // lead never closes below ~380px
        const iceDirty = Math.abs(ice - lastIceDraw) > 0.0015;
        if (iceDirty) lastIceDraw = ice;
        if (iceG && iceDirty) {
          iceG.clear();
          if (ice > 0.02) {
            const cx = VW / 2,
              lE = cx - openHalf,
              rE = cx + openHalf,
              topY = 600,
              botY = VH + 10,
              a = Math.min(0.94, 0.5 + ice * 0.5);
            for (const [bank, edge, dir] of [
              [-40, lE, 1],
              [VW + 40, rE, -1]
            ]) {
              // shelf body with a ragged, slightly broken inner edge biting back toward the bank
              iceG.beginFill(0xe2eff5, a);
              iceG.moveTo(bank, topY);
              for (let y = topY; y <= botY; y += 16)
                iceG.lineTo(edge - dir * (4 + Math.sin(y * 0.13 + dir) * 6), y);
              iceG.lineTo(bank, botY);
              iceG.closePath();
              iceG.endFill();
              // a brighter frost rim picks out the open edge
              iceG.lineStyle(2, 0xf6fcff, a * 0.7);
              for (let y = topY; y <= botY; y += 16) {
                const ex = edge - dir * (4 + Math.sin(y * 0.13 + dir) * 6);
                y === topY ? iceG.moveTo(ex, y) : iceG.lineTo(ex, y);
              }
              iceG.lineStyle(0);
            }
          }
        }

        // aurora intensity: a slow swell/fade for quiet stretches and dramatic bursts — and it
        // swells on clear cold nights (cloud veils it; the colder the air, the more vivid it burns)
        const auroraI =
          (0.22 + 0.78 * Math.pow(0.5 + 0.5 * Math.sin(t * 0.05), 2)) *
          (1 - cover * 0.8) *
          Math.min(1.25, 0.55 + Math.max(0, -temp) * 0.08);
        if (BI.aurora) drawAurora(t, night, auroraI);
        fireflies.fl.alpha = BI.interior ? 0.8 + night * 0.2 : night; // glowworms glow around the clock underground
        // dew sparkles strongest at first light and dries off as the sun climbs; a clear night beads more
        dewdrops.dl.alpha =
          Math.exp(-Math.pow((h - 6.2) / 1.0, 2)) * (1 - cover * 0.7);
        // the dew-beaded web rides the same first-light window (a touch wider — a strung web holds
        // its dew a little longer than the grass), shimmering faintly and swaying in the air
        if (dewWeb) {
          const webDawn =
            Math.exp(-Math.pow((h - 6.3) / 1.2, 2)) * (1 - cover * 0.6);
          dewWeb.alpha =
            webDawn * (0.82 + Math.sin(t * 1.7 + dewWeb.ph) * 0.12);
          dewWeb.rotation = Math.sin(t * 0.7 + dewWeb.ph) * 0.02;
        }
        // the murmuration gathers as the sun goes down and is gone by full dark / daylight
        if (murmur.length)
          murmurC.alpha =
            Math.exp(-Math.pow((h - 18.1) / 0.95, 2)) *
            (1 - cover * 0.45) *
            0.92;
        // cloud shadows read strongest when the sky is half-broken (sun out between clouds), and
        // fade away when it's clear, fully overcast, raining or after dark
        if (cloudShadows.length)
          cloudShadows.layer.alpha =
            cover * (1 - cover) * 4 * P.light * (1 - wet) * 0.62;
        for (const c of clouds) {
          c.tint = hexI(
            lpH(
              '#33406a',
              '#ffffff',
              Math.min(1, P.light + 0.05) * (1 - cover * 0.5)
            )
          );
        }

        // sun / moon + halo (hidden underground — no sky bodies in a cave)
        const body = cel.sun ? sun : moon,
          other = cel.sun ? moon : sun;
        other.visible = false;
        body.visible =
          !BI.interior && !BI.underwater && !BI.canopy && !BI.glade;
        body.alpha = 1 - cover * 0.6; // sun/moon fades behind gathering cloud
        body.position.set(cel.x, cel.y);
        if (moon.visible)
          drawMoonPhase(moonShadow, cel.x, cel.y, moonR, moonPh); // ride the moon, hold the phase
        sunGlow.visible =
          !BI.interior && !BI.underwater && !BI.canopy && !BI.glade;
        sunGlow.position.set(cel.x, cel.y);
        sunGlow.tint = cel.sun ? 0xffe9a8 : 0x9fb6d8;
        sunGlow.scale.set((cel.sun ? 3.4 : 2.2) + Math.sin(t * 1.5) * 0.12);
        sunGlow.alpha = (cel.sun ? 0.8 : 0.5) * (1 - cover * 0.85);

        raysG.clear();
        if (BI.underwater) {
          // sunlight filtering down from the surface as broad slanted shafts — strong by day, gone at night
          const baseA = 0.03 + 0.13 * P.light;
          if (baseA > 0.02)
            for (let i = 0; i < 6; i++) {
              const sx = 110 + i * 205 + Math.sin(t * 0.1 + i) * 28,
                top = -30,
                depth = 540,
                w0 = 24 + 9 * Math.sin(t * 0.5 + i * 1.7),
                N = 12;
              for (let k = 0; k < N; k++) {
                const u0 = k / N,
                  u1 = (k + 1) / N,
                  y0 = top + u0 * (depth - top),
                  y1 = top + u1 * (depth - top),
                  ww0 = w0 * (1 + u0 * 0.7),
                  ww1 = w0 * (1 + u1 * 0.7),
                  sl = 46, // shafts lean a little as they sink
                  a = baseA * (1 - u0) * (1 - u0);
                raysG.beginFill(0xcdf3ff, a);
                raysG.moveTo(sx - ww0 + u0 * sl, y0);
                raysG.lineTo(sx + ww0 + u0 * sl, y0);
                raysG.lineTo(sx + ww1 + u1 * sl, y1);
                raysG.lineTo(sx - ww1 + u1 * sl, y1);
                raysG.closePath();
                raysG.endFill();
              }
            }
        } else if (BI.interior) {
          // a soft shaft of daylight spilling through the ceiling — brightest up top, dissolving before the floor
          const sx = 760,
            top = 24,
            depth = 452,
            baseA = (0.05 + P.light * 0.13) * (1 - cover * 0.6),
            N = 16;
          for (let k = 0; k < N; k++) {
            const u0 = k / N,
              u1 = (k + 1) / N,
              y0 = top + u0 * (depth - top),
              y1 = top + u1 * (depth - top),
              w0 = 18 + u0 * 58,
              w1 = 18 + u1 * 58,
              a = baseA * (1 - u0) * (1 - u0); // quadratic falloff so it fades into the dark
            raysG.beginFill(0xd6e6ff, a);
            raysG.moveTo(sx - w0, y0);
            raysG.lineTo(sx + w0, y0);
            raysG.lineTo(sx + w1, y1);
            raysG.lineTo(sx - w1, y1);
            raysG.closePath();
            raysG.endFill();
          }
        } else {
          // god-rays: shafts from the sun when cloud is breaking up — peak near light cover (~1/3),
          // fading to nothing under solid overcast (no sun) and clear sky (nothing to shaft through)
          const rays = cel.sun
            ? Math.max(0, cover * (1 - cover) * (1 - cover) * 6.75)
            : 0;
          if (rays > 0.03) {
            for (let i = 0; i < 7; i++) {
              const ang =
                Math.PI * 0.5 + (i - 3) * 0.13 + Math.sin(t * 0.25 + i) * 0.012;
              const len = 600,
                w = 15 + 6 * Math.sin(t * 0.6 + i * 2),
                ex = cel.x + Math.cos(ang) * len,
                ey = cel.y + Math.sin(ang) * len,
                nx = -Math.sin(ang) * w,
                ny = Math.cos(ang) * w;
              raysG.beginFill(0xfff1c4, rays * 0.06);
              raysG.moveTo(cel.x, cel.y);
              raysG.lineTo(ex + nx, ey + ny);
              raysG.lineTo(ex - nx, ey - ny);
              raysG.closePath();
              raysG.endFill();
            }
          }
        }

        // dawn/dusk light shafts: soft golden god-rays fanning out from the low sun and raking
        // across the land — brightest near the sun, fading with distance, gone by midday and night.
        // Anchored to the sun, so they lean in low from the left at dawn and from the right at dusk.
        // Additive and faint, drifting slowly — light hanging in the hazy air, not hard rays.
        if (beamG) {
          beamG.clear();
          const low = cel.sun
              ? Math.max(0, Math.min(1, (cel.y - 250) / 150))
              : 0,
            beam = low * low * (1 - cover * 0.7); // ease in as the sun drops; fade as cloud hides it
          beamField.on = beam > 0.02;
          beamField.beam = beam;
          if (beamField.on) {
            const sunX = cel.x,
              sunY = cel.y,
              baseAng = Math.atan2(VH * 0.9 - sunY, VW * 0.5 - sunX), // aim into the scene
              N = 10,
              halfSpread = 0.32, // the fan's half-angle
              len = 1500,
              SEG = 4;
            beamField.sunX = sunX;
            beamField.sunY = sunY;
            beamField.len = len;
            beamField.rays.length = 0;
            for (let i = 0; i < N; i++) {
              const fr = N > 1 ? i / (N - 1) - 0.5 : 0, // -0.5..0.5 across the fan
                ang =
                  baseAng +
                  fr * 2 * halfSpread +
                  Math.sin(t * 0.07 + i * 1.3) * 0.014, // slow drift
                dirx = Math.cos(ang),
                diry = Math.sin(ang),
                px = -diry, // unit perpendicular to the ray
                py = dirx,
                w = 24 + 8 * Math.sin(t * 0.4 + i * 2); // far-end half-width, gently pulsing
              beamField.rays.push({dirx, diry, w}); // remembered so drifting dust can catch a beam
              for (let s = 0; s < SEG; s++) {
                const a0 = s / SEG,
                  a1 = (s + 1) / SEG,
                  d0 = 50 + a0 * (len - 50), // distance from the sun along the ray
                  d1 = 50 + a1 * (len - 50),
                  w0 = w * (0.28 + a0 * 0.9), // narrow at the sun, widening outward
                  w1 = w * (0.28 + a1 * 0.9),
                  cx0 = sunX + dirx * d0,
                  cy0 = sunY + diry * d0,
                  cx1 = sunX + dirx * d1,
                  cy1 = sunY + diry * d1;
                beamG.beginFill(0xffd488, beam * 0.13 * (1 - a0)); // fades out from the sun
                beamG.moveTo(cx0 + px * w0, cy0 + py * w0);
                beamG.lineTo(cx0 - px * w0, cy0 - py * w0);
                beamG.lineTo(cx1 - px * w1, cy1 - py * w1);
                beamG.lineTo(cx1 + px * w1, cy1 + py * w1);
                beamG.closePath();
                beamG.endFill();
              }
            }
          }
        }

        // additive light layer: caustics under the reef surface, or dappled shafts through the jungle canopy
        if (causticG) {
          causticG.clear();
          if (BI.canopy) {
            // god-rays slanting down through gaps in the canopy — warm green-gold, fading at night
            const baseA = 0.02 + 0.1 * P.light;
            if (baseA > 0.015)
              for (let i = 0; i < 7; i++) {
                const sx = 70 + i * 178 + Math.sin(t * 0.12 + i) * 22,
                  top = 70,
                  depth = 580,
                  w0 = 14 + 6 * Math.sin(t * 0.5 + i * 1.7),
                  N = 10;
                for (let k = 0; k < N; k++) {
                  const u0 = k / N,
                    u1 = (k + 1) / N,
                    y0 = top + u0 * (depth - top),
                    y1 = top + u1 * (depth - top),
                    sl = 64,
                    a = baseA * (1 - u0) * (1 - u0);
                  causticG.beginFill(0xe6f0a4, a);
                  causticG.moveTo(sx - w0 * (1 + u0 * 0.5) + u0 * sl, y0);
                  causticG.lineTo(sx + w0 * (1 + u0 * 0.5) + u0 * sl, y0);
                  causticG.lineTo(sx + w0 * (1 + u1 * 0.5) + u1 * sl, y1);
                  causticG.lineTo(sx - w0 * (1 + u1 * 0.5) + u1 * sl, y1);
                  causticG.closePath();
                  causticG.endFill();
                }
              }
          } else {
            const ca = 0.03 + 0.11 * P.light;
            for (let b = 0; b < 5; b++) {
              const y = 14 + b * 24;
              causticG.beginFill(0xbff0ff, ca * (1 - b * 0.13));
              causticG.moveTo(-40, y);
              for (let x = -40; x <= VW + 40; x += 24)
                causticG.lineTo(
                  x,
                  y + Math.sin(x * 0.02 + t * 0.8 + b * 1.3) * 7
                );
              for (let x = VW + 40; x >= -40; x -= 24)
                causticG.lineTo(
                  x,
                  y + 9 + Math.sin(x * 0.02 + t * 0.8 + b * 1.3) * 7
                );
              causticG.closePath();
              causticG.endFill();
            }
          }
        }

        if (reduce.matches) {
          for (const d of walkers) if (d.totalFrames > 1) d.gotoAndStop(0);
          return;
        }

        const raining = wet > 0.45; // animals hunker down / shelter in a real shower

        // parallax: ease toward the pointer/tilt target; the foreground scene shifts more than the far sky
        parX += (parTX - parX) * 0.05;
        parY += (parTY - parY) * 0.05;
        farLayer.position.set(parX * 5, parY * 3);
        scene.position.set(parX * 14, parY * 8);
        fireflies.fl.position.set(parX * 14, parY * 8);
        dewdrops.dl.position.set(parX * 14, parY * 8); // dew rides the grass, same parallax as the scene

        // wind: a breeze that slowly varies and gusts (used by foliage, particles, and the water surface).
        // it freshens and gusts as a weather front gathers and blows through, then calms as it clears.
        const stormWind = cover * 0.4 + wet * 0.8;
        const wind =
          (Math.sin(t * 0.35) * 0.35 +
            Math.sin(t * 0.11 + 1.3) * 0.45 +
            Math.sin(t * 0.07) * 0.25) *
            (1 + stormWind) +
          Math.sin(t * 1.7 + 0.6) * 0.28 * stormWind; // sharper gusting under the storm

        // shooting stars: an occasional streak across the night sky (any biome, but not underground)
        shootG.clear();
        if (night > 0.34 && !BI.interior && !BI.underwater && !BI.canopy) {
          if (shoot) {
            shoot.x += shoot.vx * dt;
            shoot.y += shoot.vy * dt;
            shoot.life -= dt / 60;
            const fade = Math.sin(
                Math.max(0, 1 - shoot.life / shoot.dur) * Math.PI
              ),
              steps = 9;
            for (let i = 0; i < steps; i++) {
              const f = i / steps;
              shootG.lineStyle(3 * (1 - f) + 0.3, 0xffffff, fade * (1 - f));
              shootG.moveTo(
                shoot.x - shoot.vx * f * 4,
                shoot.y - shoot.vy * f * 4
              );
              shootG.lineTo(
                shoot.x - shoot.vx * (f + 1 / steps) * 4,
                shoot.y - shoot.vy * (f + 1 / steps) * 4
              );
            }
            shootG.beginFill(0xffffff, fade);
            shootG.drawCircle(shoot.x, shoot.y, 2);
            shootG.endFill();
            if (shoot.life <= 0 || shoot.x > VW + 40 || shoot.y > 420) {
              shoot = null;
              shootT = 5 + Math.random() * 8;
            }
          } else {
            shootT -= dt / 60;
            if (shootT < 0)
              shoot = {
                x: 60 + Math.random() * VW * 0.6,
                y: 20 + Math.random() * 120,
                vx: 7 + Math.random() * 4,
                vy: 2.4 + Math.random() * 2,
                life: 0.9,
                dur: 0.9
              };
          }
        }

        // sun/moon reflection on the pond: a soft reflected disc at the waterline + a shimmering trail below it
        glit.clear();
        if (water && (BI.interior || BI.glade)) {
          // an underground pool / glade creek mirrors the glowing crystals + mushrooms, not any sky body
          for (const gl of crystals) {
            const a = gl.alpha;
            glit.beginFill(gl.tint, 0.16 * a);
            glit.drawEllipse(gl.x, 609, 20, 5);
            glit.endFill();
            for (let y = 612; y < VH; y += 6) {
              const d = (y - 612) / (VH - 612);
              glit.beginFill(gl.tint, (1 - d) * 0.13 * a);
              glit.drawRect(
                gl.x + Math.sin(y * 0.5 + t * 1.6 + gl.ph) * (2 + d * 7) - 3,
                y,
                6,
                2
              );
              glit.endFill();
            }
          }
        }
        if (water && !BI.interior && !BI.glade && cel.y < 560) {
          // the reflection deepens to gold and burns brighter as the sun drops toward the horizon —
          // the same golden-hour fall that lights the shafts, now caught and rippling on the water
          const low = cel.sun
            ? Math.max(0, Math.min(1, (cel.y - 250) / 150))
            : 0;
          const col = cel.sun
              ? hexI(mixA([255, 240, 184], [255, 166, 77], low))
              : 0xc9d8ea,
            str = (cel.sun ? 1 : 0.7) * (1 + low * 0.5);
          for (let k = 3; k >= 1; k--) {
            glit.beginFill(col, 0.14 * str * (k / 3));
            glit.drawEllipse(cel.x, 611, 9 + k * 7, 3 + k * 2.4);
            glit.endFill();
          }
          for (let y = 606; y < VH; y += 5) {
            const d = (y - 606) / (VH - 606),
              wob =
                Math.sin(y * 0.6 + t * 2.2) *
                (2 + d * 10) *
                (1 + Math.abs(wind) * 1.1); // gusts scatter the reflection
            glit.beginFill(col, (1 - d) * 0.5 * str);
            glit.drawRect(cel.x + wob - (2 + d * 4), y, 4 + d * 8, 2);
            glit.endFill();
          }
        }
        if (water && beamField.on && !BI.interior && !BI.glade) {
          // dawn/dusk shafts striking the pond: warm sparkle pooling on the surface wherever a beam
          // reaches the water — at full golden strength (not the beams' faded tail), each glint
          // winking and scattered into wavelets by the breeze
          const F = beamField,
            cols = []; // where each downward ray crosses the waterline, and its width there
          for (let i = 0; i < F.rays.length; i++) {
            const r = F.rays[i];
            if (r.diry <= 0.03) continue; // only rays angled down reach the water
            const d = (612 - F.sunY) / r.diry; // distance from the sun to the waterline
            if (d < 50 || d > F.len) continue;
            cols.push({
              cx: F.sunX + r.dirx * d,
              hw: r.w * (0.28 + (d / F.len) * 0.9) * 1.32
            });
          }
          for (let x = 0; x <= VW; x += 9) {
            let cov = 0; // how squarely a beam lands on this stretch of water
            for (let i = 0; i < cols.length; i++) {
              const dd = Math.abs(x - cols[i].cx) / cols[i].hw;
              if (dd < 1 && 1 - dd > cov) cov = 1 - dd;
            }
            const glow = cov * F.beam;
            if (glow < 0.025) continue;
            const tw = 0.55 + 0.45 * Math.sin(x * 0.5 + t * 3); // individual sparkles wink
            for (let r = 0; r < 3; r++) {
              const wy = 611 + r * 18,
                a = glow * tw * 1.3 * (1 - r * 0.28),
                ww =
                  Math.sin(x * 0.06 + t * 2.4 + r) *
                  (2 + r * 3) *
                  (1 + Math.abs(wind));
              glit.beginFill(0xffe6a8, Math.min(0.5, a));
              glit.drawRect(x - 4 + ww, wy, 9, 2.4);
              glit.endFill();
            }
          }
        }
        if (water && BI.aurora && night > 0.08) {
          // aurora mirrored on the water: wavy green/teal bands, scaled by the live aurora intensity
          const acols = [0x4fffa8, 0x36c9ff];
          for (let b = 0; b < 2; b++) {
            glit.beginFill(acols[b], night * 0.2 * auroraI);
            const by = 622 + b * 28;
            glit.moveTo(0, by + Math.sin(t * 1.3 + b) * 4);
            for (let x = 0; x <= VW; x += 30)
              glit.lineTo(x, by + Math.sin(x * 0.017 + t * 1.4 + b) * 6);
            for (let x = VW; x >= 0; x -= 30)
              glit.lineTo(
                x,
                by + 18 + Math.sin(x * 0.017 + t * 1.4 + b + 1) * 6
              );
            glit.closePath();
            glit.endFill();
          }
        }
        if (water && Math.abs(wind) > 0.16) {
          // wind chop: faint wavelets that ripple across the water surface during gusts
          const chop = Math.abs(wind) - 0.16;
          for (let i = 0; i < 5; i++) {
            const wy = 614 + i * 20,
              a = chop * 0.16 * (1 - i * 0.12);
            if (a <= 0) continue;
            glit.lineStyle(1.2, 0xffffff, a);
            glit.moveTo(0, wy);
            for (let x = 0; x <= VW; x += 24)
              glit.lineTo(
                x,
                wy + Math.sin(x * 0.03 + t * 3 + i) * (1.4 + chop * 4)
              );
          }
          glit.lineStyle(0);
        }

        for (const c of clouds) {
          c.x += (c.vx + wind * 0.18) * dt;
          if (c.x - c.width > VW) c.x = -c.width;
          else if (c.x + c.width < 0) c.x = VW + c.width;
        }
        // the far herd: a slow amble along the mid-hill with grazing pauses, turning at the edges,
        // on its own depth plane (farY) at a far pace
        if (!reduce.matches)
          for (const d of farHerd) {
            if (d.isYoung) {

                  d.dir * Math.min(Math.abs(tx - d.x), (p.spd + 0.04) * dt);

                d.scale.x = d.dir * d.baseSc;

              d.y = farY(d.x) + d.dy;
              continue;
            }
            d.timer -= dt / 60;
            if (d.mode === 'walk') {
              d.x += d.dir * d.spd * dt;
              if (!d.playing) d.play();
              if (d.x > VW - 30) d.dir = -1;
              else if (d.x < 30) d.dir = 1;
              d.scale.x = d.dir * d.baseSc;
              if (d.timer < 0) {
                d.mode = 'graze';
                d.timer = 2 + Math.random() * 5;
                d.gotoAndStop(0);
              }
            } else if (d.timer < 0) {
              d.mode = 'walk';
              d.timer = 3 + Math.random() * 6;
              if (Math.random() < 0.4) d.dir = -d.dir;
              d.scale.x = d.dir * d.baseSc;
            }

          }
        if (cloudSeaG) cloudSeaG.y = Math.sin(t * 0.3) * 4; // the cloud sea breathes slowly

          // warm light grows as the sun nears the horizon (low sun = golden hour)
          cloudGlow.alpha =
            (cel.sun ? Math.max(0, Math.min(1, (cel.y - 240) / 175)) : 0) *
            0.62;

        for (const fz of fogLayers)
          fz.tilePosition.x -= (fz.spd + wind * fz.windF * 0.25) * dt;
        for (const w of swayers) {
          // a gust rolls across the field as a wave (phase keyed to x), so the grass ripples in
          // sequence rather than leaning all as one; the wave vanishes when the air falls calm
          const gust = Math.sin(t * 2.1 - w.s.x * 0.009) * wind * 0.8;
          w.s.rotation =
            Math.sin(t * w.sp + w.ph) * w.amp + (wind + gust) * w.amp * 2.5;
          if (w.nod > 0) {
            // an insect just alighted: the bloom dips and springs back in a damped bob
            w.nod -= dt / 60;
            const e = w.nodD - Math.max(0, w.nod); // seconds since the alight

        // the mirrored trees drift on the breeze and fade as the surface roughens or freezes over

            (1 - iceAmt * 0.8) * (1 - cover * 0.3) * (1 - wet * 0.4);
        }

        // cloud shadows drift across the land on the wind, wrapping round as they leave the frame
        if (cloudShadows.length && cloudShadows.layer.alpha > 0.003)
          for (const s of cloudShadows) {
            s.x += (s.spd + wind * 5) * dt * 0.2;
            if (s.x > VW + 300) s.x = -300;
            else if (s.x < -300) s.x = VW + 300;
          }

        // shore break: a wave swashes up the sand and slides back, leaving a lacy foam edge and a
        // wet sheen behind it. Sets of bigger and smaller waves come through, and the surf freshens
        // as the wind gets up.
        if (surfG) {
          surfG.clear();
          const set = 0.6 + 0.4 * Math.sin(t * 0.11 + 0.5), // wave sets roll through
            pulse = Math.pow(Math.max(0, Math.sin(t * 0.5)), 1.2), // a wave runs in, then draws back
            swash = (0.3 + 0.7 * pulse) * set * (1 + Math.abs(wind) * 0.2), // always some lap

          surfG.endFill();

        // sandpipers run the waterline: their footing tracks the foam edge — they scurry up sharply

            if (s.pauseT > 0) {

              if (s.peck > 0) s.peck -= dt / 9;
              else if (Math.random() < 0.05 * dt) s.peck = 1; // a quick jab at the sand
              s.rotation = Math.max(0, s.peck) * 0.5;
            } else {
              s.x += s.dir * s.spd * dt;
              s.rotation = 0;
              bob = Math.abs(Math.sin(t * 18 + s.ph)) * -1.2; // twinkling little legs
              if (s.x > VW - 80) {
                s.dir = -1;
                s.scale.x = -s.baseSc;
              } else if (s.x < 80) {
                s.dir = 1;
                s.scale.x = s.baseSc;
              }
              if (Math.random() < 0.02 * dt) {

        }

        // walker: deer ambles then grazes; a camel plods along; in rain it stands and waits it out
        if (deer && deer.isHeron) {
          // heron: stands statue-still watching the water, takes the odd slow wading step, and now
          // and then strikes — a sharp downward stab that splashes the surface
          const STRIKE = 0.7;
          if (deer.strike > 0) {
            deer.strike -= dt / 60;
            const lunge = Math.sin(
              Math.max(0, Math.min(1, 1 - deer.strike / STRIKE)) * Math.PI
            ); // 0 -> 1 -> 0
            deer.rotation = deer.dir * lunge * 0.7; // the head stabs down and forward
            deer.y = 602 + lunge * 16;
            if (deer.strike <= 0) {
              deer.rotation = 0;
              deer.y = 602;
              deer.fishTmr = 3 + Math.random() * 4;
              if (water)
                ripples.push({
                  x: deer.x + deer.dir * 60,
                  y: 604,
                  r: 5,
                  life: 1
                }); // the splash
            }
          } else if (raining) {
            deer.y = 602;
            deer.rotation = Math.sin(t * 0.6) * 0.01; // hunkers, statue-still
          } else {
            deer.fishTmr -= dt / 60;
            deer.y = 602;
            deer.rotation = Math.sin(t * 0.5 + deer.x) * 0.013; // a slight idle sway
            if (deer.stepTarget != null) {
              deer.x += Math.sign(deer.stepTarget - deer.x) * 0.45 * dt; // a slow, deliberate step
              if (Math.abs(deer.x - deer.stepTarget) < 2)

            } else if (deer.fishTmr <= 0) {
              if (Math.random() < 0.45) {
                if (Math.random() < 0.35) deer.dir = -deer.dir; // sometimes turn to face the other way

                  140,
                  Math.min(

                    }
                  } else if (Math.random() < 0.45) {

                fox.x < VW - 170 &&

            // it BOLTS once the fox is close and stays committed (facing away) until the fox is well
            // clear (240px) — no toggling back to 'watch' mid-chase.
            if (rabbit.fleeDir == null && dist < 125) {
              rabbit.fleeDir = dx >= 0 ? 1 : -1; // commit a heading away from the fox
              if (rabbit.fleeDir > 0 && rabbit.x > VW - 150)
                rabbit.fleeDir = -1;
              else if (rabbit.fleeDir < 0 && rabbit.x < 150) rabbit.fleeDir = 1;
            } else if (rabbit.fleeDir != null && dist > 240) {
              rabbit.fleeDir = null; // fox is well clear now — stand down
            }
            if (rabbit.fleeDir != null) {
              flee = true;
              // juke off an edge and bolt past, rather than hop in place against the wall
              if (rabbit.fleeDir > 0 && rabbit.x > VW - 96) rabbit.fleeDir = -1;
              else if (rabbit.fleeDir < 0 && rabbit.x < 96) rabbit.fleeDir = 1;
              rabbit.dir = rabbit.fleeDir;
              rabbit.scale.x = rabbit.dir * Math.abs(rabbit.scale.x);
            } else if (dist < 250) {
              freeze = true;
              rabbit.dir = dx >= 0 ? -1 : 1; // sit up and watch it
              rabbit.scale.x = rabbit.dir * Math.abs(rabbit.scale.x);
            }
          } else rabbit.fleeDir = null;
          // a twitch in progress is dropped the moment it stops foraging (freezes, bolts or hunkers)
          if (rabbit.earT > 0 && (freeze || flee || raining)) {
            rabbit.earT = 0;
            rabbit.texture = T(rabbit.coatTex);
          }
          if (freeze) {
            rabbit.y = groundY(rabbit.x) + 6; // frozen, dead still, on the ground
          } else if (raining && !flee) {
            rabbit.y = groundY(rabbit.x) + 8;
          } else if (
            (rabbit.forageT = rabbit.forageT ?? 1 + Math.random() * 3) > 0 &&
            !flee
          ) {
            // settle and crop the grass for a good spell, with a small nibbling bob — rabbits sit
            // far more than they hop
            rabbit.forageT -= dt / 60;
            rabbit.y = groundY(rabbit.x) + 6 + Math.sin(t * 3 + rabbit.x) * 0.5;
            // the odd ear-twitch while it sits and crops — one ear swivels back, then forward
            if (rabbit.earTex) {
              if (rabbit.earT > 0) {
                rabbit.earT -= dt / 60;
                if (rabbit.earT <= 0) rabbit.texture = T(rabbit.coatTex);
              } else if ((rabbit.earCD -= dt / 60) <= 0) {
                rabbit.texture = T(rabbit.earTex); // an ear flicks back
                rabbit.earT = 0.16 + Math.random() * 0.16;
                rabbit.earCD = 2.5 + Math.random() * 4;
              }
            }
            if (rabbit.forageT <= 0) {
              // then a short bout of hops off to a fresh patch
              rabbit.earT = 0;
              rabbit.texture = T(rabbit.coatTex); // ears forward before it goes
              rabbit.hopsLeft = 2 + ((Math.random() * 3) | 0);
              rabbit.hopT = 0.5 + Math.random() * 0.6;
              if (rabbit.x > VW - 140) rabbit.dir = -1;
              else if (rabbit.x < 140) rabbit.dir = 1;
              else if (Math.random() < 0.5) rabbit.dir = -rabbit.dir;
              rabbit.scale.x = rabbit.dir * Math.abs(rabbit.scale.x);
            }
          } else {
            rabbit.hopT = (rabbit.hopT == null ? 2 : rabbit.hopT) - dt / 60;
            const dur = flee ? 0.3 : 0.4,
              hop =
                rabbit.hopT < dur && rabbit.hopT > 0
                  ? Math.sin(((dur - rabbit.hopT) / dur) * Math.PI)
                  : 0;
            rabbit.x += rabbit.dir * hop * (flee ? 3.6 : 1.8) * dt;
            rabbit.x = Math.max(60, Math.min(VW - 60, rabbit.x));
            // ride the land contour at the rabbit's current spot, then add the hop on top — it was
            // holding its start-of-scene ground height, so fleeing uphill flung it into the hills
            rabbit.y = groundY(rabbit.x) + 6 - hop * (flee ? 30 : 24);
            dropTrack(rabbit, 'rabbit', 26);
            if (rabbit.hopT < 0) {
              if (flee)
                rabbit.hopT = 0.12 + Math.random() * 0.18; // panicked, rapid hops
              else {
                rabbit.hopsLeft = (rabbit.hopsLeft ?? 1) - 1;
                if (rabbit.hopsLeft <= 0)
                  rabbit.forageT = 3.5 + Math.random() * 5; // bout done — settle to forage again
                else rabbit.hopT = 0.5 + Math.random() * 0.7;
                if (rabbit.x > VW - 140) rabbit.dir = -1;
                else if (rabbit.x < 140) rabbit.dir = 1;
                rabbit.scale.x = rabbit.dir * Math.abs(rabbit.scale.x);
              }
            }
          }
        }
        // roller (tumbleweed) bounds across at intervals
        if (roller) {
          rollerTimer -= dt / 60;
          if (roller.visible) {
            roller.x += 3 * dt;
            roller.rotation += 0.13 * dt;
            roller.y = groundY(roller.x) + 2 - Math.abs(Math.sin(t * 6)) * 10;
            if (roller.x > VW + 60) {
              roller.visible = false;
              rollerTimer = 5 + Math.random() * 7;
            }
          } else if (rollerTimer < 0) {
            roller.visible = true;
            roller.x = -60;
          }
        }

        // footprint trails: prints fade over time and fill in faster while snow is actively falling
        if (tracksG) {
          tracksG.clear();
          for (let i = tracks.length - 1; i >= 0; i--) {
            const tr = tracks[i];
            tr.life -= (dt / 60) * (snowing ? 0.04 : 0.014);
            if (tr.life <= 0) {
              tracks.splice(i, 1);
              continue;
            }
            tracksG.beginFill(0x7e98bc, 0.5 * Math.min(1, tr.life));
            if (tr.kind === 'deer') {
              tracksG.drawEllipse(tr.x - 3, tr.y, 2.3, 1.5); // cloven pair
              tracksG.drawEllipse(tr.x + 3, tr.y, 2.3, 1.5);
            } else if (tr.kind === 'fox') {
              tracksG.drawEllipse(tr.x, tr.y, 2, 1.5); // a neat single pad
            } else if (tr.kind === 'paw') {
              tracksG.drawEllipse(tr.x - 2, tr.y, 1.4, 2); // penguin's two little webbed feet
              tracksG.drawEllipse(tr.x + 2, tr.y, 1.4, 2);
            } else {
              tracksG.drawEllipse(tr.x - 4, tr.y, 1.8, 2.6); // rabbit's paired hind feet
              tracksG.drawEllipse(tr.x + 4, tr.y, 1.8, 2.6);
            }
            tracksG.endFill();
          }
        }

        // ducks paddle around, dabble, and pick a new spot — not metronomic laps. brood + reflection follow
        for (const d of ducks) {
          // keep to the open lead — as winter ice closes in, the frozen banks shrink the water
          const loX = ice > 0.02 ? VW / 2 - openHalf + 40 : waterL,
            hiX = ice > 0.02 ? VW / 2 + openHalf - 40 : waterR;
          if (d.tx == null) d.tx = loX + Math.random() * (hiX - loX);
          // ducks doze off to sleep — a brief loaf by day, long stretches through the night, and not
          // only after dark (a daytime nap can take any of them). They make for the nearer bank to
          // sleep tucked at the water's edge rather than out in open water.
          if (d.sleep == null) d.sleep = 0;
          if (d.haul == null) d.haul = 0; // 0 = afloat, 1 = hauled out dozing on the bank
          if (d.sleep <= 0 && Math.random() < (0.0004 + 0.004 * night) * dt) {
            d.sleep = (5 + Math.random() * 6) * (1 + night * 2.5); // time spent settled, longer at night
            // most naps are taken hauled out on dry land, the rest adrift at the water's edge. Pick a
            // bank spot that's genuinely on-screen for the water's shape, else just sleep afloat.
            d.land = null;
            if (Math.random() < 0.62) {
              if (pondShape) {
                // an enclosed pond has grass all round: step out just past the nearer rim (or the far
                // one if that side runs off-screen), level with the bank — never down past its foot
                for (const side of d.x < pondShape.cx ? [-1, 1] : [1, -1]) {
                  const bx = pondShape.cx + side * (pondShape.rx + 18);
                  if (bx > 26 && bx < VW - 26) {
                    d.land = {
                      x: bx,
                      y: Math.min(d.baseY - 6, 600 + pondShape.ry * 0.4)
                    };
                    break;
                  }
                }
              } else {
                // open lakefront/river: no side banks, so climb up onto the near shore above the
                // waterline — below the water is off-screen, so it never beds down that way
                d.land = {x: d.x, y: 590};
              }
            }
            d.sleepX = d.land
              ? d.land.x
              : d.x < (loX + hiX) / 2
                ? loX + 14
                : hiX - 14;
          }
          const sleeping = d.sleep > 0;
          if (sleeping) {
            d.tx = d.sleepX;
            d.upend = 0; // it doesn't feed while it sleeps
          }
          // it makes for its spot first; only once settled there does the rest-clock run — so the
          // swim over never eats into the nap
          const atSpot = sleeping && Math.abs(d.x - d.sleepX) < 24;
          if (atSpot) d.sleep -= dt / 60;
          // haul measures how far up the bank it is: for a pond it's tied to how far past the rim it
          // has paddled, so it climbs out and slips back in step with the swim (no snap on waking);
          // for an open shore it just rises and lowers in place. The reflection and bob fade with it.
          let haulTarget = 0;
          if (d.land) {
            if (pondShape)
              haulTarget = Math.max(
                0,
                Math.min(
                  1,
                  d.land.x > hiX
                    ? (d.x - hiX) / (d.land.x - hiX)
                    : (loX - d.x) / (loX - d.land.x)
                )
              );
            else haulTarget = sleeping ? 1 : 0;
          }
          d.haul += (haulTarget - d.haul) * 0.12 * dt;
          if (d.pauseT > 0) {
            d.pauseT -= dt / 60; // dabbling / preening / dozing in place
            d.vx += (0 - d.vx) * 0.08 * dt; // ease to a near stop
          } else {
            const dir = Math.sign(d.tx - d.x) || 1,
              // a steady cruise, quickened into a purposeful paddle while making for its spot to sleep
              spd = (d.baseSpd ?? 0.4) * (sleeping && !atSpot ? 1.6 : 1);
            d.vx += (dir * spd - d.vx) * 0.05 * dt; // ease toward a gentle cruise
            if (Math.abs(d.x - d.tx) < 16) {
              if (sleeping) {
                d.pauseT = 2 + Math.random() * 2.5; // settled at the bank, dozing
              } else if (Math.random() < 0.6) {
                // arrived: usually pause to dabble, then strike out for a new, unrelated spot
                d.pauseT = (1.5 + Math.random() * 4) * (1 + night * 2.5);
                // a dabbling duck up-ends to feed — bottom-up, tail in the air — before righting
                if (
                  d.dabbler &&
                  !d.upend &&
                  !ice &&
                  Math.random() < 0.5 * (1 - night)
                ) {
                  d.upend = 1 + Math.random() * 1.6;
                  d.pauseT = Math.max(d.pauseT, d.upend + 0.6);
                }
              }
              d.tx = sleeping ? d.sleepX : loX + Math.random() * (hiX - loX);
            }
          }
          d.x += d.vx * dt;
          // hauling out (or still up on the bank, even as it wakes) it may sit past the water's edge;
          // otherwise it's reined back into the water
          const ashore = d.land && (sleeping || d.haul > 0.02),
            bndHi = ashore ? Math.max(hiX, d.land.x) : hiX,
            bndLo = ashore ? Math.min(loX, d.land.x) : loX;
          if (d.x > bndHi) {
            d.x = bndHi;
            if (!ashore) d.tx = loX + Math.random() * (hiX - loX) * 0.7;
          } else if (d.x < bndLo) {
            d.x = bndLo;
            if (!ashore) d.tx = d.x + Math.random() * (hiX - loX) * 0.7;
          }
          // steer around lily pads: ease aside to give a nearby pad a berth, then settle back into the lane
          let steer = 0;
          for (const lp of lilies) {
            if (lp.isFrog) continue;
            const dx = Math.abs(lp.x - d.x);
            if (dx < 80) steer += (1 - dx / 80) * 16;
          }
          const cur = d.sy || 0; // undefined on the first frame; || keeps it numeric (and self-heals from NaN)
          d.sy = cur + (steer - cur) * 0.08;
          d.scale.x = (d.vx < 0 ? -1 : 1) * Math.abs(d.scale.x);
          // up-end: ease the tip in while feeding bottom-up, then right itself; rings the surface
          if (d.upend > 0) {
            d.upend -= dt / 60;
            if (water && Math.random() < 0.18 * dt)
              ripples.push({x: d.x, y: d.baseY + 6, r: 3, life: 0.6});
          }
          d.up = (d.up || 0) + ((d.upend > 0 ? 1 : 0) - (d.up || 0)) * 0.1 * dt;
          d.rotation = d.up * 1.25 * Math.sign(d.scale.x || 1); // head dips, tail lifts
          const waterY =
            d.baseY +
            d.sy +
            Math.sin(t * 2 + d.x * 0.05) * 1.6 * (1 - ice * 0.5) + // stiller on slush
            d.up * 9; // sink the front as it tips bottom-up
          // lerp up onto the bank as it hauls out; the bob (part of waterY) fades with it
          d.y = d.land ? waterY + (d.land.y - waterY) * d.haul : waterY;
          // bill-tuck: once it's stopped at its sleeping spot, turn the head back and bury the bill
          // in the back feathers; the head comes straight back up the moment it stirs or wakes
          if (d.sleepTex) {
            const want =
              sleeping && atSpot && Math.abs(d.vx) < 0.14
                ? d.sleepTex
                : d.baseTex;
            if (want !== d.curTex) {
              d.curTex = want;
              d.texture = T(want);
              if (d.ref) d.ref.texture = T(want); // the reflection tucks too
            }
          }
          // when it up-ends, half the duck is under the (transparent) water. Follow the fish
          // convention rather than cutting the head off: the part above the waterline stays bright,
          // the submerged head/breast shows MURKY — sunk toward the water colour, half-seen through
          // the surface. Two clips of the same duck composite it: bright above, murky below.
          if (d.dabbler) {
            if (d.up > 0.04) {
              const wl = d.baseY + 7; // the waterline this duck floats at
              if (!d.under) {
                d.wmask = new PIXI.Graphics()
                  .beginFill(0xffffff)
                  .drawRect(-VW, wl - 1600, VW * 3, 1600)
                  .endFill(); // above the waterline
                d.umask = new PIXI.Graphics()
                  .beginFill(0xffffff)
                  .drawRect(-VW, wl, VW * 3, 1600)
                  .endFill(); // below it
                d.under = new PIXI.Sprite(d.texture);
                d.under.anchor.copyFrom(d.anchor);
                d.under.tint = 0x6f8ea0; // murky, sunk toward the water colour (as the fish are)
                d.under.mask = d.umask;
                scene.addChild(d.wmask);
                scene.addChild(d.umask);
                scene.addChildAt(d.under, scene.getChildIndex(d)); // just behind the bright half
              }
              d.mask = d.wmask;
              d.wmask.visible = true; // visible so it can serve as the mask; hidden again on un-dunk
              d.under.visible = true;
              d.under.position.set(d.x, d.y);
              d.under.rotation = d.rotation;
              d.under.scale.set(d.scale.x, d.scale.y);
              d.under.alpha = 0.62 * Math.min(1, d.up * 1.4); // dimmer, half-seen through the water
            } else {
              // nulling the mask flips the white mask rect back to renderable, so without
              // hiding it here it flashes up over the whole scene as the head comes back up
              if (d.mask) d.mask = null;
              if (d.wmask) d.wmask.visible = false;
              if (d.under) d.under.visible = false;
            }
          }
          if (d.ref) {
            d.ref.x = d.x;
            d.ref.y = d.y + 18 + Math.sin(t * 2) * 1;
            d.ref.scale.x = d.scale.x;
            d.ref.alpha =
              0.28 * (1 - ice * 0.55) * (1 - d.up * 0.85) * (1 - d.haul); // gone once it's up on the bank
          }
          if (d.kids) {
            // following mum she strings them out in a line astern; when she settles to sleep they
            // gather in and huddle against her instead, easing between the two so it reads smoothly
            const huddle =
              d.sleep > 0 || (d.pauseT > 0 && Math.abs(d.vx) < 0.07);
            d.kids.forEach((k, i) => {
              if (k.hx == null) {
                k.hx =
                  (i - (d.kids.length - 1) / 2) * 15 +
                  (Math.random() - 0.5) * 7;
                k.hy = (Math.random() - 0.5) * 5;
              }
              const b = d.vx < 0 ? 1 : -1,
                tx = huddle ? d.x + k.hx : d.x + b * (34 + i * 22),
                ty = huddle
                  ? // follow mum up onto the bank too, holding their slight offset below her
                    d.y +
                    (k.baseY - d.baseY) +
                    k.hy +
                    Math.sin(t * 1.3 + i) * 0.6
                  : k.baseY + d.sy + Math.sin(t * 2 + i) * 1.4;
              k.x += (tx - k.x) * 0.09 * dt; // paddle to keep up / gather in, never snapping into place
              k.y += (ty - k.y) * 0.12 * dt;
              if (!huddle)
                k.scale.x = (d.vx < 0 ? -1 : 1) * Math.abs(k.scale.x);
              k.alpha = Math.max(0, 1 - ice * 1.8); // the brood doesn't winter on the ice
            });
          }
          d.rip = (d.rip == null ? 0.5 : d.rip) - dt / 60;
          if (d.rip < 0 && Math.abs(d.vx) > 0.12) {
            // a wake only while actually paddling — a dabbling duck sits still
            ripples.push({
              x: d.x - (d.vx < 0 ? -1 : 1) * 14,
              y: d.baseY + 9,
              r: 4,
              life: 1 - ice * 0.5
            });
            d.rip = (0.8 + Math.random() * 0.6) * (1 + ice * 1.6); // wakes come slower through slush
          } else if (d.rip < 0) d.rip = 0.5;
        }
        // fish: cruise below the surface, dimple it now and then, and occasionally leap clear with a splash
        if (fish.length) {
          const fLo = ice > 0.05 ? VW / 2 - openHalf + 50 : waterL, // keep to the open lead once the pond ices over
            fHi = ice > 0.05 ? VW / 2 + openHalf - 50 : waterR;
          // pond fish drift between gathering into a loose shoal and scattering to roam free
          if (!fish[0].reef && fish.shoalTmr != null) {
            fish.shoalTmr -= dt / 60;
            if (fish.shoalTmr <= 0) {
              fish.shoalOn = fish.length > 1 ? !fish.shoalOn : false;
              fish.shoalTmr = 10 + Math.random() * 14;
              fish.shoalPh = Math.random() * 6.28;
            }
          }
          for (const f of fish) {
            if (f.reef) {
              // reef fish: drift through the whole column in a loose school that wanders the reef
              const cx =
                  VW * 0.5 + Math.sin(t * 0.12 + f.school * 2.1) * VW * 0.4,
                cy = 280 + Math.sin(t * 0.08 + f.school * 1.7) * 150,
                tx = cx + f.ox,
                ty = cy + f.oy + Math.sin(t * 1.3 + f.wob) * 6,
                pxx = f.x;
              f.x += (tx - f.x) * 0.02 * dt;
              f.y += (ty - f.y) * 0.02 * dt;
              if (Math.abs(f.x - pxx) > 0.06 * dt) {
                f.dir = f.x < pxx ? -1 : 1; // turn to face the way it's drifting
                f.scale.x = f.dir * f.baseSc;
              }
              continue;
            }
            if (f.jump > 0) {
              // a leap: rise from cruising depth, break the surface, arc over and splash back
              f.jump += dt / 42;
              const a = Math.min(1, f.jump),
                arc = Math.sin(a * Math.PI),
                py = f.y;
              f.x += f.dir * f.spd * 1.5 * dt;
              if (f.x < fLo || f.x > fHi)
                f.x = Math.max(fLo, Math.min(fHi, f.x)); // never leaps over the bank
              f.y = f.cruiseY + (f.apexY - f.cruiseY) * arc;
              const clear = Math.max(0, Math.min(1, (600 - f.y) / 46)); // how far it is out of the water
              f.alpha = 0.82 + clear * 0.18;
              f.tint = hexI(mixA(f.subA, [228, 240, 247], clear)); // flashes silver in the air
              f.rotation =
                f.dir *
                Math.max(-0.6, Math.min(0.6, (f.y - py) * 0.05)) *
                clear; // nose tips up rising, down on re-entry
              if (water) {
                if (py >= 600 && f.y < 600)
                  ripples.push({x: f.x, y: 602, r: 4, life: 0.9}); // surface break on the way up
                if (py < 600 && f.y >= 600)
                  ripples.push({x: f.x, y: 602, r: 6, life: 1}); // bigger splash on re-entry
              }
              if (f.jump >= 1) {
                f.jump = 0;
                f.rotation = 0;
                f.y = f.cruiseY;
                f.tint = hexI(f.subA);
                f.next = 7 + Math.random() * 10;
              }
              continue;
            }
            if (f.rise > 0) {
              // a quiet rise to sip an insect off the film: noses up to just under the
              // surface, dimples it, then slips back down — gentler than a clearing leap
              f.rise += dt / 40;
              const a = Math.min(1, f.rise),
                arc = Math.sin(a * Math.PI),
                py = f.y;
              f.x += (f.riseTx - f.x) * 0.05 * dt; // drift under the target as it rises
              f.y = f.cruiseY + (603 - f.cruiseY) * arc; // up to just under the surface
              f.rotation = f.dir * 0.16 * arc; // nose tips up into the rise
              f.alpha = 0.82 + arc * 0.12; // shows a touch as it nears the light
              if (water && py > 607 && f.y <= 607)
                ripples.push({x: f.x, y: 606, r: 3, life: 0.95}); // the dimple as it breaks the film
              if (f.rise >= 1) {
                f.rise = 0;
                f.rotation = 0;
                f.y = f.cruiseY;
                f.alpha = 0.82;
              }
              continue;
            }
            if (fish.shoalOn) {
              // gathered into a loose shoal: ease toward a slowly drifting centre, each holding its
              // own slot so the group stays loose, all facing the way the shoal drifts
              const span = fHi - fLo,
                scx =
                  fLo + span * (0.5 + Math.sin(t * 0.05 + fish.shoalPh) * 0.32),
                tx = scx + f.shoalOx,
                ty = f.cruiseY + f.shoalOy + Math.sin(t * 1.2 + f.wob) * 3,
                px = f.x;
              f.x += (tx - f.x) * 0.014 * dt;
              f.y += (ty - f.y) * 0.03 * dt;
              if (Math.abs(f.x - px) > 0.02 * dt) {
                f.dir = f.x < px ? -1 : 1;
                f.scale.x = f.dir * f.baseSc;
              }
            } else {
              // roaming free: cruise and turn back at the banks, each on its own
              f.x += f.dir * f.spd * dt;
              if (f.x > fHi) f.dir = -1;
              else if (f.x < fLo) f.dir = 1;
              f.scale.x = f.dir * f.baseSc;
              f.y = f.cruiseY + Math.sin(t * 1.1 + f.x * 0.018) * 4; // slow depth wobble
            }
            f.alpha = 0.82 * (1 - ice * 0.55); // sluggish and all but hidden once it ices over
            // rise to take a low insect: a dragonfly skimming the pond, or a butterfly
            // puddling at the water's edge — the fish noses up to sip it and dimples the film
            f.riseCD = (f.riseCD ?? 3 + Math.random() * 6) - dt / 60;
            if (f.riseCD <= 0 && ice < 0.15) {
              for (const fl of flutters) {
                if (fl.alpha < 0.3) continue;
                if (
                  !fl.water &&
                  !(fl.isButterfly && fl.puddling && fl.settled > 0)
                )
                  continue;
                if (Math.abs(fl.x - f.x) < 64) {
