          }
        }
        // tadpoles wriggle (the 2-frame tail flick) and drift slowly about the shallows
        for (const td of tadpoles) {
          td.x += td.vx * dt;
          td.y = td.baseY + Math.sin(t * 1.6 + td.ph) * 1.4; // a gentle bob in the shallows
          if (Math.random() < 0.015 * dt) td.vx = (Math.random() - 0.5) * 0.5; // wander
          if (td.x > waterR) td.vx = -Math.abs(td.vx);
          else if (td.x < waterL) td.vx = Math.abs(td.vx);
          td.scale.x = (td.vx < 0 ? -1 : 1) * Math.abs(td.scale.x);
        }
        // a kingfisher watches from its twig, then plunges bill-first to the water and climbs back
        if (kingfisher) {
          const k = kingfisher;
          if (k.mode === 'perch') {
            k.y = k.py + Math.sin(t * 1.5) * 0.6; // a gentle perched bob
            k.rotation = Math.sin(t * 0.7) * 0.04; // turning its head to watch the water
            k.tmr -= dt / 60;
            if (k.tmr <= 0 && !raining) {
              k.mode = 'dive';
              k.diveT = 0;
              k.diveDur = 0.45 + Math.random() * 0.15;
              k.tx = k.px + k.dir * (10 + Math.random() * 40);
              k.ty = 602; // the water surface
            }
          } else if (k.mode === 'dive') {
            k.diveT += dt / 60;
            const p = Math.min(1, k.diveT / k.diveDur);
            k.x = k.px + (k.tx - k.px) * p;
            k.y = k.py + (k.ty - k.py) * (p * p); // an accelerating plunge
            k.rotation = k.dir * (0.2 + p * 1.0); // tip bill-down through the dive
            if (p >= 1) {
              if (water) {
                ripples.push({x: k.x, y: k.ty, r: 5, life: 1});
                ripples.push({x: k.x, y: k.ty, r: 9, life: 1}); // the splash
              }
              k.mode = 'rise';
              k.riseT = 0;
              k.riseDur = 0.55 + Math.random() * 0.2;
              k.fromX = k.x;
              k.fromY = k.y;
            }
          } else {
            k.riseT += dt / 60;
            const p = Math.min(1, k.riseT / k.riseDur);
            k.x = k.fromX + (k.px - k.fromX) * p;
            k.y = k.fromY + (k.py - k.fromY) * (1 - (1 - p) * (1 - p)); // a decelerating climb
            k.rotation = k.dir * 1.2 * (1 - p); // straighten up as it lands
            if (p >= 1) {
              k.x = k.px;
              k.y = k.py;
              k.rotation = 0;
              k.mode = 'perch';
              k.tmr = 4 + Math.random() * 6;
            }
          }
        }
        // a woodpecker clings to the trunk and drums in sudden fast bursts, pausing to look about
        if (woodpecker) {
          const w = woodpecker;
          if (w.pecking > 0) {
            w.pecking -= dt / 60;
            w.x = w.bx + w.dir * (1.4 + 1.4 * Math.abs(Math.sin(t * 46))); // the jackhammer jabs
            w.rotation = 0;
            if (w.pecking <= 0) {
              w.x = w.bx;
              w.pkT = 1.4 + Math.random() * 3.2;
            }
          } else {
            w.x = w.bx;
            w.y = w.by;
            w.rotation = Math.sin(t * 1.1) * 0.05; // cocks its head, watching the bark
            w.pkT -= dt / 60;
            if (w.pkT <= 0) {
              w.pecking = 0.45 + Math.random() * 0.7; // a drumroll
              if (Math.random() < 0.35) {
                // now and then it hitches a little way up or down the trunk
                w.by = Math.max(
                  w.byMin,
                  Math.min(w.byMax, w.by + (Math.random() - 0.5) * 34)
                );
                w.y = w.by;
              }
            }
          }
        }
        // a bloom dips and springs back when a bee or butterfly settles on it: find the
        // nearest unbobbing flower to the alighting point and give it a damped nod
        const nodNearestFlower = (px, py, reach) => {
          let best = null,
            bd = reach;
          for (const fl of flowers) {
            if (fl.nod > 0) continue; // already bobbing from a recent visit
            const d = Math.abs(fl.s.x - px);
            if (d < bd && Math.abs(fl.s.y - py) < 140) {
              best = fl;
              bd = d;
            }
          }
          if (best) {
            best.nod = best.nodD = 0.95 + Math.random() * 0.2;
            best.nodA = 0.2 + Math.random() * 0.12;
            best.nodDir = px >= best.s.x ? 1 : -1;
          }
        };
        // the x of the nearest real bloom to a point (so an insect can make for an actual
        // flower rather than a bare patch of grass), or null when none is close enough
        const nearestFlowerX = (x, reach) => {
          let bx = null,
            bd = reach;
          for (const fl of flowers) {
            const d = Math.abs(fl.s.x - x);
            if (d < bd) {
              bd = d;
              bx = fl.s.x;
            }
          }
          return bx;
        };
        // butterflies, dragonflies, bird — wandering / crossing
        for (const f of flutters) {
          if (f.isBat) {
            // erratic flit: darts and changes direction rather than gliding sideways
            f.x += f.vx * dt;
            f.y += f.vy * dt;
            if (Math.random() < 0.06 * dt) f.vy = (Math.random() - 0.5) * 5;
            if (Math.random() < 0.03 * dt)
              f.vx = (f.vx < 0 ? -1 : 1) * (0.7 + Math.random() * 2);
            if (f.y < (f.lo ?? 64)) f.vy = Math.abs(f.vy) + 0.4;
            if (f.y > (f.hi ?? 340)) f.vy = -Math.abs(f.vy) - 0.4;
            if (f.x > VW + 60) {
              f.vx = -Math.abs(f.vx);
              f.x = VW + 58;
            }
            if (f.x < -60) {
              f.vx = Math.abs(f.vx);
              f.x = -58;
            }
            f.scale.x = (f.vx < 0 ? -1 : 1) * Math.abs(f.scale.x);
            if (f.isDuskBat) f.alpha = night; // out only after dusk, like the fireflies
            continue;
          }
          if (f.isToucan) {
            // glides across the understory with a gentle bob, then loops back after a rest
            f.x += f.vx * dt;
            f.y = f.baseY + Math.sin(f.x * 0.006) * 16;
            f.scale.x = (f.vx < 0 ? -1 : 1) * Math.abs(f.scale.x);
            if (f.x > VW + 110 || f.x < -110) {
              f.vx = -f.vx;
              f.baseY = 170 + Math.random() * 160;
            }
            continue;
          }
          if (f.isOwl) {
            // a slow, silent glide across the clearing; rests off-screen, then crosses back the other way
            if (f.rest > 0) {
              f.rest -= dt / 60;
            } else if (f.swoop != null) {
              // a hunting stoop: drops from the glide right down to the grass, reaches for prey,
              // and sweeps back up onto the wing — pitching down into it and up out of it
              f.swoop += dt / 60 / 1.3; // ~1.3s
              const p = Math.min(1, f.swoop),
                dip = Math.sin(p * Math.PI),
                glideY = f.baseY + Math.sin(f.x * 0.006) * 14,
                lowY = groundY(f.x) - 26; // just over the meadow grass
              f.x += f.vx * (1 + dip * 0.45) * dt; // a touch quicker through the stoop
              f.y = glideY + (lowY - glideY) * dip;
              f.scale.x = (f.vx < 0 ? -1 : 1) * Math.abs(f.scale.x);
              f.rotation = Math.sign(f.vx) * Math.cos(p * Math.PI) * 0.4; // nose-down in, nose-up out
              if (p >= 0.46 && !f.struck) {
                f.struck = true; // a few blades of grass kicked up as it reaches the turf
                emitBurst(
                  f.x,
                  groundY(f.x) + 2,
                  4,
                  [0x6fae4a, 0x57933a],
                  2.1,
                  3
                );
              }
              if (p >= 1) {
                f.swoop = null;
                f.rotation = 0;
              }
            } else {
              f.x += f.vx * dt;
              f.y = f.baseY + Math.sin(f.x * 0.006) * 14;
              f.scale.x = (f.vx < 0 ? -1 : 1) * Math.abs(f.scale.x);
              // out over the open meadow it now and then stoops to hunt
              if (
                f.x > 150 &&
                f.x < VW - 150 &&
                !raining &&
                Math.random() < 0.0034 * dt
              ) {
                f.swoop = 0;
                f.struck = false;
              }
              if (f.x > VW + 120 || f.x < -120) {
                f.dir = -f.dir;
                f.vx = f.dir * (0.7 + Math.random() * 0.3);
                f.baseY = 170 + Math.random() * 130;
                f.x = f.dir > 0 ? -118 : VW + 118;
                f.rest = 4 + Math.random() * 6;
              }
            }
            continue;
          }
          if (f.isBird) {
            f.x += 1.1 * dt;
            f.y = 150 + Math.sin(f.x * 0.004) * 30;
            if (f.x > VW + 80) {
              f.x = -80;
              f.y = 120 + Math.random() * 80;
            }
            continue;
          }
          if (f.isSoar) {
            // a lazy thermal circle, facing into the turn — but the thermal itself drifts on the
            // wind and the circle slowly breathes, so the bird wanders the sky and never traces the
            // exact same loop twice rather than staying pinned over one spot
            f.cx += (f.drift + wind * 0.08) * dt;
            if (f.cx > VW + 170) f.cx = -170;
            else if (f.cx < -170) f.cx = VW + 170;
            const a = t * f.sp + f.ph,
              breath = 1 + Math.sin(t * 0.11 + f.ph) * 0.18;
            f.x = f.cx + Math.cos(a) * f.rx * breath;
            f.y = f.cy + Math.sin(a) * f.ry * breath;
            f.scale.x = (Math.sin(a) > 0 ? -1 : 1) * f.baseSc;
            continue;
          }
          if (f.isBee) {
            // bumbles flower to flower: cruises low to a new bloom, then hovers over it a while
            if (f.mode === 'hover') {
              f.hoverT -= dt / 60;
              f.x = f.tx + Math.cos(t * 9 + f.ph) * 3; // a tight buzzing bob over the bloom
              f.y = f.ty + Math.sin(t * 7 + f.ph) * 2.6;
              if (f.hoverT <= 0 || raining) {
                f.mode = 'cruise';
                if (f.patchN > 0) {
                  // drift to a neighbouring bloom in the same patch
                  f.patchN -= 1;
                  f.tx = Math.max(
                    40,
                    Math.min(VW - 40, f.patchX + (Math.random() - 0.5) * 90)
                  );
                } else {
                  // patch worked out — off to a fresh patch of flowers a little way along,
                  // settling on a real bloom cluster so the bee works actual flowers
                  f.patchX = Math.max(
                    60,
                    Math.min(VW - 60, f.x + (Math.random() - 0.5) * 360)
                  );
                  const pfx = nearestFlowerX(f.patchX, 180);
                  if (pfx != null) f.patchX = pfx;
                  f.patchN = 3 + ((Math.random() * 5) | 0); // a few blooms to work here
                  f.tx = Math.max(
                    40,
                    Math.min(VW - 40, f.patchX + (Math.random() - 0.5) * 60)
                  );
                }
                const fx = nearestFlowerX(f.tx, 75); // make for an actual bloom if one's near
                if (fx != null) f.tx = fx;
                f.ty = groundY(f.tx) - (12 + Math.random() * 46);
              }
            } else {
              const dx = f.tx - f.x,
                dy = f.ty - f.y;
              f.x += dx * 0.045 * dt;
              f.y += dy * 0.045 * dt + Math.sin(t * 8 + f.ph) * 0.7; // bumbling wobble en route
              if (Math.abs(dx) > 2) f.scale.x = (dx < 0 ? -1 : 1) * f.baseSc;
              if (Math.abs(dx) < 8 && Math.abs(dy) < 10) {
                f.mode = 'hover';
                f.hoverT = 1.2 + Math.random() * 2.4;
                nodNearestFlower(f.x, f.y, 42); // the bloom it settles onto dips under it
              }
            }
            f.alpha += ((raining ? 0.25 : 1) - f.alpha) * 0.04 * dt; // shelters when it rains
            continue;
          }
          if (f.isButterfly) {
            if (f.settled > 0) {
              // resting on a flower with folded wings; lifts off when the rest is over
              f.settled -= dt / 60;
              f.alpha += ((raining ? 0 : 1) - f.alpha) * 0.04 * dt;
              if (f.settled <= 0 || raining) {
                f.play();
                f.settleTmr = 6 + Math.random() * 9;
                f.vy = -0.7; // a flick upward as it leaves
                f.vx = (Math.random() - 0.5) * 1.2;
              }
              continue;
            }
            if (f.landing) {
              // descending toward the chosen flower; bail out and fly off if a shower starts
              if (raining) {
                f.landing = false;
                f.settleTmr = 4 + Math.random() * 6;
              } else {
                f.x += (f.tx - f.x) * 0.05 * dt;
                f.y += (f.ty - f.y) * 0.07 * dt;
                if (Math.abs(f.y - f.ty) < 3 && Math.abs(f.x - f.tx) < 6) {
                  f.landing = false;
                  f.settled = f.puddling
                    ? 5 + Math.random() * 6 // lingers at the water, sipping
                    : 1.6 + Math.random() * 2.8;
                  f.gotoAndStop(0); // alight, wings folded
                  if (!f.puddling) nodNearestFlower(f.x, f.y, 46); // a bloom it lands on nods
                }
                continue;
              }
            }
            f.settleTmr -= dt / 60;
            if (f.settleTmr <= 0 && !raining) {
              f.landing = true;
              if (
                !!water &&
                night < 0.5 &&
                !BI.interior &&
                !BI.underwater &&
                !BI.glade &&
                Math.random() < 0.32
              ) {
                // puddle at the damp water's edge to sip minerals — butterflies gather at the shore
                f.tx = waterL + 20 + Math.random() * (waterR - waterL - 40);
                f.ty = 597;
                f.puddling = true;
              } else {
                // otherwise alight on a nearby spot on the ground, making for a real bloom
                // if one is close (so it rests on a flower and nods it)
                f.tx = Math.max(
                  40,
                  Math.min(VW - 40, f.x + (Math.random() - 0.5) * 140)
                );
                const fx = nearestFlowerX(f.tx, 90);
                if (fx != null) f.tx = fx;
                f.ty = groundY(f.tx) - 2;
                f.puddling = false;
              }
              continue;
            }
          }
          if (f.water) {
            // a dragonfly hangs in the air on a faint wobble, then darts to a fresh spot and hangs
            // again — patrolling the pond in quick stop-start bursts rather than aimless drift
            if (f.ph0 == null) {
              f.ph0 = Math.random() * 6.28;
              f.ph1 = Math.random() * 6.28;
            }
            f.dartT = (f.dartT ?? 0.4 + Math.random()) - dt / 60;
            if (f.darting) {
              const ddx = f.dtx - f.x,
                ddy = f.dty - f.y,
                dd = Math.hypot(ddx, ddy) || 1,
                step = Math.min(dd, 6 * dt); // a fast zip
              f.x += (ddx / dd) * step;
              f.y += (ddy / dd) * step;
              if (dd < 8 || f.dartT <= 0) {
                f.darting = false;
                f.hx = f.x;
                f.hy = f.y;
                f.dartT = 0.6 + Math.random() * 1.9; // then hang a while
              }
            } else {
              if (f.hx == null) {
                f.hx = f.x;
                f.hy = f.y;
              }
              f.x = f.hx + Math.sin(t * 9 + f.ph0) * 1.6; // hover wobble
              f.y = f.hy + Math.sin(t * 7 + f.ph1) * 1.2;
              if (f.dartT <= 0) {
                f.darting = true;
                f.dtx = Math.max(
                  waterL + 20,
                  Math.min(waterR - 40, f.x + (Math.random() - 0.5) * 300)
                );
                f.dty = Math.max(
                  f.lo,
                  Math.min(f.hi, f.y + (Math.random() - 0.5) * 70)
                );
                f.dartT = 0.2 + Math.random() * 0.4;
                f.scale.x = (f.dtx >= f.x ? 1 : -1) * Math.abs(f.scale.x);
              }
            }
            f.alpha += ((raining ? 0 : 1) - f.alpha) * 0.04 * dt; // shelter in rain
            continue;
          }
          f.x += f.vx * dt;
          f.y += f.vy * dt;
          f.alpha += ((raining ? 0 : 1) - f.alpha) * 0.04 * dt; // butterflies/dragonflies shelter in rain
          if (Math.random() < 0.02) {
            f.vx = (Math.random() - 0.5) * (f.hi > 600 ? 2.4 : 1.2);
            f.vy = (Math.random() - 0.5) * (f.hi > 600 ? 1.2 : 0.8);
          }
          // pond dragonflies turn back at the banks; free flyers range to the scene edges
          const fl = f.water ? waterL - 50 : 20,
            fr = f.water ? waterR + 50 : VW - 20;
          if (f.x < fl || f.x > fr) f.vx *= -1;
          if (f.y < f.lo || f.y > f.hi) f.vy *= -1;
        }
        // alpine choughs: the flock drifts on a shared centre, each bird looping within it, and now
        // and then the whole group tumbles — a quick shared swoop and climb on the updraught
        if (choughs.length && choughHub) {
          const h = choughHub;
          h.x += h.vx * dt;
          if (h.x > VW * 0.8) h.vx = -Math.abs(h.vx);
          else if (h.x < VW * 0.2) h.vx = Math.abs(h.vx);
          h.ph += dt / 60;
          h.tmb -= dt / 60;
          if (h.tmb < 0) {
            h.tumble = 1;
            h.tmb = 4 + Math.random() * 5;
          }
          if (h.tumble > 0) h.tumble = Math.max(0, h.tumble - dt / 45);
          const hubY =
            h.y +
            Math.sin(h.ph * 0.7) * 18 -
            Math.sin((1 - h.tumble) * Math.PI) * 50; // the shared tumble-swoop
          for (const c of choughs) {
            c.ph += c.sp * dt * 0.05;
            const tx = h.x + c.ox + Math.cos(c.ph) * c.orx,
              ty = hubY + c.oy + Math.sin(c.ph * 1.3) * c.ory;
            c.scale.x = (tx >= c.x ? 1 : -1) * c.baseSc; // face the way it's heading
            c.x = tx;
            c.y = ty;
          }
        }
        // murmuration: the whole cloud wanders, wheels, breathes and shears while a density wave
        // sweeps round it — so the shape boils and never settles, the way a starling flock does
        if (murmur.length && murmurC.alpha > 0.01) {
          const cx =
              VW * 0.5 +
              Math.sin(t * 0.11) * VW * 0.33 +
              Math.sin(t * 0.05 + 1) * 90,
            cy = 178 + Math.sin(t * 0.15 + 0.5) * 44 + Math.sin(t * 0.23) * 16,
            rot = t * 0.2,
            stretch = 1.5 + 0.7 * Math.sin(t * 0.31),
            breathe = 74 + 26 * Math.sin(t * 0.47),
            shear = Math.sin(t * 0.26) * 0.55;
          for (const b of murmur) {
            const wave = 1 + 0.34 * Math.sin(b.a0 * 2.5 - t * 1.5), // dark bands sweep round
              rr = b.r0 * breathe * wave,
              ang = b.a0 + rot;
            let ox = Math.cos(ang) * rr * stretch,
              oy = Math.sin(ang) * rr * 0.62;
            oy += ox * shear;
            b.x = cx + ox + Math.sin(t * b.ws + b.wob) * 3;
            b.y = cy + oy + Math.cos(t * b.ws + b.wob) * 2.4;
          }
        }

        // migrating flock: crosses the sky now and then, holding a loose V behind the lead
        if (flock.length) {
          const lead = flock[0];
          if (lead.visible) {
            lead.fx += flockDir * 2.6 * dt;
            lead.fy += Math.sin(t * 0.5) * 0.2 * dt;
            for (const fb of flock) {
              const tx = lead.fx - flockDir * Math.abs(fb.wing) * 26,
                ty = lead.fy + fb.wing * 11 + Math.sin(t * 3 + fb.ph) * 2;
              fb.x += (tx - fb.x) * 0.2; // ease toward the slot for a lagging, lifelike V
              fb.y += (ty - fb.y) * 0.2;
              fb.scale.x = (flockDir < 0 ? -1 : 1) * Math.abs(fb.scale.x);
            }
            if (
              (flockDir > 0 && lead.fx > VW + 130) ||
              (flockDir < 0 && lead.fx < -130)
            ) {
              for (const fb of flock) fb.visible = false;
              flockT = 28 + Math.random() * 50;
            }
          } else {
            flockT -= dt / 60;
            if (flockT < 0 && !raining) {
              flockDir = Math.random() < 0.5 ? 1 : -1;
              const sx = flockDir > 0 ? -130 : VW + 130,
                sy = 66 + Math.random() * 84;
              lead.fx = sx;
              lead.fy = sy;
              for (const fb of flock) {
                fb.x = sx - flockDir * Math.abs(fb.wing) * 26;
                fb.y = sy + fb.wing * 11;
                fb.scale.x = (flockDir < 0 ? -1 : 1) * Math.abs(fb.scale.x);
                fb.visible = true;
              }
            }
          }
        }
        // crystals breathe a slow glow (and the pool mirrors it)
        for (const gl of crystals)
          gl.alpha = 0.62 + Math.sin(t * 1.3 + gl.ph) * 0.3;
        // glade spores rise, wobble and twinkle — fading in low, out high, then respawning near the floor
        for (const g of spores) {
          g.y -= g.vy * dt;
          g.x = g.baseX + Math.sin(t * 0.6 + g.ph) * 14;
          if (g.y < 372) {
            g.y = 556 + Math.random() * 70;
            g.baseX = 40 + Math.random() * (VW - 80);
          }
          const f = Math.max(
            0,
            Math.min(1, (558 - g.y) / 60, (g.y - 372) / 80)
          );
          g.alpha = 0.45 * f * (0.7 + 0.3 * Math.sin(t * 2 + g.ph));
        }
        // fireflies drift + twinkle
        for (const g of fireflies) {
          g.x += g.vx * dt;
          g.y += g.vy * dt;
          if (Math.random() < 0.02) {
            g.vx = (Math.random() - 0.5) * 0.4;
            g.vy = (Math.random() - 0.5) * 0.3;
          }
          if (g.x < 40 || g.x > VW - 40) g.vx *= -1;
          if (g.y < 460 || g.y > 600) g.vy *= -1;
          g.alpha = 0.4 + 0.6 * (Math.sin(t * 3 + g.ph) * 0.5 + 0.5);
        }
        // dew sits still on the grass and glints — a sharp catch of light rather than a soft pulse
        for (const d of dewdrops) {
          const s = 0.5 + 0.5 * Math.sin(t * d.sp + d.ph);
          d.alpha = 0.12 + 0.88 * s * s * s * s;
        }
        // lily pads bob; seasonal weather falls
        if (frogTongueG) frogTongueG.clear();
        for (const lp of lilies) {
          const bob = Math.sin(t * 1.5 + lp.x * 0.05) * 1.2;
          if (lp.isFrog) {
            lp.hopT =
              (lp.hopT == null ? 1.5 + Math.random() * 3 : lp.hopT) - dt / 60;
            const hop =
              lp.hopT < 0.35 && lp.hopT > 0
                ? Math.sin(((0.35 - lp.hopT) / 0.35) * Math.PI)
                : 0;
            lp.y = lp.baseY + bob - hop * 14;
            if (lp.hopT < 0) {
              if (water)
                ripples.push({x: lp.x, y: lp.baseY + 8, r: 4, life: 1});
              lp.hopT = 2.5 + Math.random() * 4;
            }
            // snap at a dragonfly that strays within reach — the tongue flicks out and the
            // dragonfly bolts (it nearly always gets away)
            lp.flickCD = (lp.flickCD ?? Math.random() * 2) - dt / 60;
            if (lp.flickT > 0) {
              lp.flickT -= dt / 60;
              if (frogTongueG) {
                const e = 1 - Math.abs(lp.flickT / 0.34 - 0.5) * 2, // out then back
                  mx = lp.x + lp.dir * 5,
                  my = lp.y - 6,
                  tx = mx + (lp.tongueX - mx) * e,
                  ty = my + (lp.tongueY - my) * e;
                frogTongueG.lineStyle(2.2, 0xcf5168);
                frogTongueG.moveTo(mx, my);
                frogTongueG.lineTo(tx, ty);
                frogTongueG.lineStyle(0);
                frogTongueG
                  .beginFill(0xcf5168)
                  .drawCircle(tx, ty, 2.6)
                  .endFill();
              }
            } else if (lp.flickCD <= 0 && hop === 0) {
              for (const fl of flutters) {
                if (!fl.water || fl.alpha < 0.3) continue;
                const ddx = fl.x - lp.x,
                  ddy = fl.y - lp.y;
                if (Math.abs(ddx) < 56 && ddy > -50 && ddy < 35) {
                  lp.flickT = 0.34;
                  lp.tongueX = fl.x;
                  lp.tongueY = fl.y;
                  lp.dir = ddx >= 0 ? 1 : -1;
                  lp.scale.x = lp.dir * Math.abs(lp.scale.x);
                  lp.flickCD = 2 + Math.random() * 3;
                  fl.darting = true; // the dragonfly jinks away
                  fl.dtx = Math.max(
                    waterL + 20,
                    Math.min(
                      waterR - 40,
                      fl.x - Math.sign(ddx || 1) * (90 + Math.random() * 60)
                    )
                  );
                  fl.dty = Math.max(fl.lo ?? 605, fl.y - 16);
                  fl.dartT = 0.45;
                  break;
                }
              }
            }
          } else lp.y = lp.baseY + bob;
        }
        // falling weather: petals/leaves drift the whole time; snowflakes thin out to match the
        // current snowfall (heavy during a squall, none on a clear cold day) so snow reads as an event
        const flakeN = weatherIsSnow
          ? Math.ceil(weather.length * Math.min(1, snowI * 1.15))
          : weather.length;
        for (let wi = 0; wi < weather.length; wi++) {
          const w = weather[wi];
          if (wi >= flakeN) {
            w.visible = false;
            continue;
          }
          w.visible = true;
          w.y += w.vy * dt;
          w.x += (w.vx + Math.sin(t * 1.2 + w.ph) * w.sw + wind * 2.2) * dt;
          w.rotation += w.spin * dt;
          if (w.y > VH + 14) {
            w.y = -14;
            w.x = Math.random() * VW;
          }
          if (w.x < -14) w.x = VW + 14;
          else if (w.x > VW + 14) w.x = -14;
        }
        // rain: intensity driven by the weather front (wet); shower slants harder as it picks up
        if (wet > 0.02 && !BI.interior) {
          rainG.clear();
          rainG.lineStyle(1.4, 0xbcd6e8, 0.55 * wet);
          const n = Math.ceil(rainDrops.length * Math.min(1, wet * 1.2));
          for (let i = 0; i < n; i++) {
            const d = rainDrops[i];
            d.y += d.sp * dt;
            d.x += (1.4 + wet * 1.6) * dt;
            if (d.y > VH) {
              d.y = -d.len;
              d.x = Math.random() * VW;
            }
            if (d.x > VW) d.x -= VW;
            rainG.moveTo(d.x, d.y);
            rainG.lineTo(d.x - 2.5 - wet * 1.5, d.y + d.len);
          }
        } else if (rainG.geometry.graphicsData.length) rainG.clear();

        // lightning: a brief flash that lights the whole scene, plus a jagged bolt
        flashG.clear();
        if (flash > 0.01 && !BI.interior) {
          flashG.beginFill(0xc8d6ff, flash * 0.5);
          flashG.drawRect(0, 0, VW, VH);
          flashG.endFill();
          flashG.lineStyle(2.5, 0xffffff, flash);
          if (boltPts.length) {
            flashG.moveTo(boltPts[0][0], boltPts[0][1]);
            for (let i = 1; i < boltPts.length; i++)
              flashG.lineTo(boltPts[i][0], boltPts[i][1]);
          }
        }

        // volcanic: pulse the crater glow, billow smoke upward, drift embers up
        if (lavaGlow) {
          lavaGlow.alpha = 0.7 + Math.sin(t * 1.8) * 0.18;
          lavaGlow.scale.set(1.6 + Math.sin(t * 1.3) * 0.12);
        }
        for (const p of smoke) {
          p.y += -0.5 * dt;
          p.x += Math.sin(t * 0.5 + p.ph) * 0.3 * dt;
          p.scale.set(p.scale.x + 0.0009 * dt);
          p.alpha -= 0.0016 * dt;
          if (p.alpha <= 0) {
            p.y = 262;
            p.x = 636 + (Math.random() - 0.5) * 16;
            p.scale.set(0.2);
            p.alpha = 0.55;
          }
        }
        for (const e of embers) {
          e.y += e.vy * dt;
          e.x += (e.vx + Math.sin(t * 2 + e.ph) * 0.3) * dt;
          e.alpha = 0.45 + 0.45 * (Math.sin(t * 4 + e.ph) * 0.5 + 0.5);
          if (e.y < 360) {
            e.y = 470 + Math.random() * 170;
            e.x = Math.random() * VW;
          }
        }
      });

      PIXI.Assets.load(
        NAMES.map((n) => ({alias: n, src: `grove/assets/${n}.png`}))
      )
        .then(build)
        .catch((e) => console.error('Grove load failed:', e));

      // ---- control panel (revealed by the ✦ wallpaper toggle) ----
      const TLIST = [
        ['auto', 'Auto'],
        ['dawn', 'Dawn'],
        ['day', 'Day'],
        ['dusk', 'Dusk'],
        ['night', 'Night']
      ];
      const SLIST = [
        ['auto', 'Auto'],
        ['spring', 'Spring'],
        ['summer', 'Summer'],
        ['autumn', 'Autumn'],
        ['winter', 'Winter']
      ];
      const uiBiome = document.getElementById('uiBiome'),
        uiTime = document.getElementById('uiTime'),
        uiSeason = document.getElementById('uiSeason');
      const mkBtn = (label, on, fn) => {
        const b = document.createElement('button');
        b.textContent = label;
        if (on) b.className = 'on';
        b.addEventListener('click', fn);
        return b;
      };
      const lbl = (text, row) => {
        const s = document.createElement('span');
        s.className = 'lbl';
        s.textContent = text;
        row.appendChild(s);
      };
      function buildUI() {
        uiBiome.textContent = '';
        uiTime.textContent = '';
        uiSeason.textContent = '';
        Object.entries(BIOMES).forEach(([k, v]) =>
          uiBiome.appendChild(
            mkBtn(v.label, k === biomeMode, () => {
              biomeMode = k;
              LS('biome', k);
              if (ready) build();
              buildUI();
            })
          )
        );
        lbl('time', uiTime);
        TLIST.forEach(([k, l]) =>
          uiTime.appendChild(
            mkBtn(l, k === timeMode, () => {
              timeMode = k;
              LS('time', k);
              lastSkyH = -99;
              buildUI();
            })
          )
        );
        lbl('season', uiSeason);
        SLIST.forEach(([k, l]) =>
          uiSeason.appendChild(
            mkBtn(l, k === seasonMode, () => {
              seasonMode = k;
              LS('season', k);
              if (ready) build();
              buildUI();
            })
          )
        );
        const WLBL = {
          auto: '⛅ Weather: Auto',
          rain: '🌧 Weather: Rain',
          clear: '☀️ Weather: Clear'
        };
        const WNEXT = {auto: 'rain', rain: 'clear', clear: 'auto'};
        uiSeason.appendChild(
          mkBtn(WLBL[weatherMode], weatherMode !== 'auto', () => {
            weatherMode = WNEXT[weatherMode];
            LS('weather', weatherMode);
            if (weatherMode === 'auto') {
              frontState = 'clear';
              frontT = 30 + Math.random() * 60;
            }
            buildUI();
          })
        );
        uiSeason.appendChild(
          mkBtn(soundOn ? '🔊 Sound: On' : '🔇 Sound: Off', soundOn, () => {
            soundOn = !soundOn;
            LS('sound', soundOn ? '1' : '0');
            // the click is the user gesture autoplay policies need: create + resume here
            if (soundOn) {
              initAudio();
              if (audio) audio.ctx.resume().catch(() => {});
            }
            buildUI();
          })
        );
        uiSeason.appendChild(
          mkBtn('🎲 Surprise', false, () =>
            startJourney(nextJourneyBiome(true))
          )
        ); // jump to a random biome
        uiSeason.appendChild(
          mkBtn(
            journeyOn ? '🧭 Journey: On' : '🧭 Journey: Off',
            journeyOn,
            () => {
              journeyOn = !journeyOn;
              LS('journey', journeyOn ? '1' : '0');
              journeyTimer = JOURNEY_PERIOD; // don't fire immediately on toggle
              buildUI();
            }
          )
        ); // slowly auto-cycle through the biomes
        uiSeason.appendChild(
          mkBtn('✕ Hide options', false, () => setMode('bare'))
        ); // drop to a clean wallpaper; the ✦ toggle brings the controls back
      }
      buildUI();

      // ---- host bridge + pause when hidden ----
      // three states: 'hidden' = page content (the iframe sits behind the page) | 'shown' = the
      // controls panel is up | 'bare' = a clean wallpaper (controls hidden, but the host keeps the
      // iframe forward, covering the page). 'Hide options' goes to 'bare'; the ✦ toggle brings the
      // controls back.
      let wpMode = 'hidden';
      const uiPanel = document.getElementById('ui');
      function setMode(m) {
        wpMode = m;
        document.body.classList.toggle('shown', m === 'shown'); // the panel shows only in 'shown'
        // expose the controls to assistive tech only while they're actually on screen
        uiPanel.setAttribute('aria-hidden', m === 'shown' ? 'false' : 'true');
        window.parent.postMessage(
          {type: 'shaderwall', state: m},
          location.origin
        );
      }
      addEventListener('message', (e) => {
        if (e.origin != location.origin) return;
        const d = e.data || {};
        if (d.type === 'wallpaper-pointer') {
          parTX = (d.x - 0.5) * 2;
          parTY = (d.y - 0.5) * 2;
          return;
        }
        if (d.type !== 'shaderwall') return;
        if (d.action === 'show') setMode('shown');
        else if (d.action === 'hide') setMode('hidden');
        // the ✦ toggle: from the controls drop back to the page; from the page (or a bare
        // wallpaper) bring the controls up
        else if (d.action === 'toggle')
          setMode(wpMode === 'shown' ? 'hidden' : 'shown');
      });
      addEventListener('keydown', (e) => {
        if (e.key === 'h' || e.key === 'H')
          setMode(wpMode === 'shown' ? 'hidden' : 'shown');
      });
      document.addEventListener('visibilitychange', () => {
        document.hidden ? app.ticker.stop() : app.ticker.start();
      });
      setMode('hidden');
    </script>
  </body>
</html>
