<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pond</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #0a1024;
      }
      #c {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
      }
    </style>
  </head>
  <body>
    <canvas id="c"></canvas>
    <script>
      'use strict';

      const canvas = document.getElementById('c');
      const ctx = canvas.getContext('2d');
      ctx.imageSmoothingEnabled = false;
      const reduce = matchMedia('(prefers-reduced-motion: reduce)');

      // ---- low-res pixel buffer (CSS scales it up, nearest-neighbour) ----
      let vw = 0;
      let vh = 0;
      let horizon = 0;
      let PX = 5;
      function resize() {
        PX = Math.max(3, Math.round(innerHeight / 175));
        vw = Math.ceil(innerWidth / PX);
        vh = Math.ceil(innerHeight / PX);
        canvas.width = vw;
        canvas.height = vh;
        ctx.imageSmoothingEnabled = false;
        horizon = Math.round(vh * 0.56);
        initScene();
      }
      addEventListener('resize', resize);

      // ---- time-of-day palette (interpolated by local hour) ----
      const HEX = (s) => [
        parseInt(s.slice(1, 3), 16),
        parseInt(s.slice(3, 5), 16),
        parseInt(s.slice(5, 7), 16)
      ];
      const mix = (a, b, t) => [
        a[0] + (b[0] - a[0]) * t,
        a[1] + (b[1] - a[1]) * t,
        a[2] + (b[2] - a[2]) * t
      ];
      const rgb = (c) => 'rgb(' + (c[0] | 0) + ',' + (c[1] | 0) + ',' + (c[2] | 0) + ')';
      const dim = (c, f) => [c[0] * f, c[1] * f, c[2] * f];
      const KF = [
        {h: 0, t: '#070b1e', hz: '#141d3a', w: '#0a1024', hl: '#0c1226', tr: '#05080f', su: '#d8e0ec', st: 1, li: 0.55},
        {h: 6, t: '#243056', hz: '#f0a368', w: '#20304a', hl: '#1c2742', tr: '#0e1626', su: '#ffd9a0', st: 0.25, li: 0.78},
        {h: 9, t: '#5193c9', hz: '#cfe7f2', w: '#4885a4', hl: '#5c806b', tr: '#2e4d33', su: '#fff6cf', st: 0, li: 1},
        {h: 16, t: '#5193c9', hz: '#cfe7f2', w: '#4885a4', hl: '#5c806b', tr: '#2e4d33', su: '#fff6cf', st: 0, li: 1},
        {h: 18.7, t: '#312a55', hz: '#f07b4e', w: '#2b3350', hl: '#2a2c46', tr: '#12152a', su: '#ff8a4a', st: 0.4, li: 0.78},
        {h: 20.5, t: '#070b1e', hz: '#141d3a', w: '#0a1024', hl: '#0c1226', tr: '#05080f', su: '#d8e0ec', st: 1, li: 0.55},
        {h: 24, t: '#070b1e', hz: '#141d3a', w: '#0a1024', hl: '#0c1226', tr: '#05080f', su: '#d8e0ec', st: 1, li: 0.55}
      ];
      KF.forEach((k) => {
        k.t = HEX(k.t); k.hz = HEX(k.hz); k.w = HEX(k.w);
        k.hl = HEX(k.hl); k.tr = HEX(k.tr); k.su = HEX(k.su);
      });
      function tod(h) {
        for (let i = 0; i < KF.length - 1; i++) {
          if (h >= KF[i].h && h <= KF[i + 1].h) {
            const a = KF[i], b = KF[i + 1];
            const f = (h - a.h) / (b.h - a.h || 1);
            return {
              t: mix(a.t, b.t, f), hz: mix(a.hz, b.hz, f), w: mix(a.w, b.w, f),
              hl: mix(a.hl, b.hl, f), tr: mix(a.tr, b.tr, f), su: mix(a.su, b.su, f),
              st: a.st + (b.st - a.st) * f, li: a.li + (b.li - a.li) * f
            };
          }
        }
        return tod(0.001);
      }
      function nowHour() {
        const p = new URLSearchParams(location.search).get('hour');
        if (p != null) return parseFloat(p);
        const d = new Date();
        return d.getHours() + d.getMinutes() / 60;
      }

      // ---- sprites ----
      const DUCK = [
        '....HHH.....',
        '...HHHHHe...',
        '...HHHHHBB..',
        '...nnnn.....',
        '..cbbbbbd...',
        '.cbbbbbbbd..',
        '.dbbbbbbt...',
        '..wwwwww....'
      ];
      const DPAL = {
        H: [31, 122, 61], e: [10, 12, 8], B: [240, 194, 74], n: [230, 238, 228],
        c: [176, 150, 118], b: [120, 96, 70], d: [80, 62, 44], t: [70, 56, 40],
        w: [200, 225, 228]
      };
      const BIRD_A = ['#...#', '.#.#.', '..#..'];
      const BIRD_B = ['.....', '#...#', '.###.'];

      function drawSprite(map, pal, x, y, flip, light, alpha) {
        const w = map[0].length;
        ctx.globalAlpha = alpha == null ? 1 : alpha;
        for (let r = 0; r < map.length; r++) {
          for (let c = 0; c < w; c++) {
            const ch = map[r][c];
            if (ch === '.' || ch === ' ') continue;
            const col = pal ? pal[ch] : [20, 24, 30];
            ctx.fillStyle = rgb(dim(col, light));
            ctx.fillRect((flip ? x + (w - 1 - c) : x + c) | 0, (y + r) | 0, 1, 1);
          }
        }
        ctx.globalAlpha = 1;
      }

      // ---- scene state ----
      let stars = [], ducks = [], reeds = [], fireflies = [], ripples = [], bird = {};
      function initScene() {
        stars = [];
        for (let i = 0; i < 60; i++)
          stars.push({x: Math.random() * vw, y: Math.random() * horizon * 0.9, ph: Math.random() * 6.28});
        ducks = [];
        const nd = 3;
        for (let i = 0; i < nd; i++)
          ducks.push({
            x: Math.random() * vw,
            y: horizon + 6 + Math.random() * (vh - horizon - 12),
            dir: Math.random() < 0.5 ? -1 : 1,
            sp: 0.06 + Math.random() * 0.05,
            bob: Math.random() * 6.28,
            wake: 0
          });
        ducks.sort((a, b) => a.y - b.y);
        reeds = [];
        for (let i = 0; i < 7; i++) {
          const left = i < 4;
          reeds.push({
            x: left ? 1 + i * 2 : vw - 2 - (i - 4) * 2,
            h: 6 + Math.random() * 8,
            ph: Math.random() * 6.28
          });
        }
        fireflies = [];
        for (let i = 0; i < 18; i++)
          fireflies.push({
            x: Math.random() * vw,
            y: horizon - 4 + Math.random() * (vh - horizon),
            ph: Math.random() * 6.28,
            vx: (Math.random() - 0.5) * 0.05,
            vy: (Math.random() - 0.5) * 0.05
          });
        ripples = [];
        bird = {x: Math.random() * vw, y: horizon * 0.4, sp: 0.18 + Math.random() * 0.1, flap: 0};
      }

      function ellipse(cx, cy, rx, ry, color, alpha) {
        ctx.globalAlpha = alpha;
        ctx.strokeStyle = color;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.ellipse(cx, cy, Math.max(1, rx), Math.max(0.6, ry), 0, 0, 6.2832);
        ctx.stroke();
        ctx.globalAlpha = 1;
      }

      function draw(now) {
        requestAnimationFrame(draw);
        if (document.hidden) return;
        const reduced = reduce.matches;
        const T = reduced ? 0 : now / 1000;
        const P = tod(nowHour());

        // sky gradient
        for (let y = 0; y < horizon; y++) {
          ctx.fillStyle = rgb(mix(P.t, P.hz, y / horizon));
          ctx.fillRect(0, y, vw, 1);
        }
        // stars
        if (P.st > 0.05) {
          for (const s of stars) {
            const a = P.st * (0.35 + 0.65 * ((Math.sin(T * 2 + s.ph) + 1) / 2));
            ctx.globalAlpha = a;
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(s.x | 0, s.y | 0, 1, 1);
          }
          ctx.globalAlpha = 1;
        }
        // sun / moon
        const h = nowHour();
        let bodyX, bodyY, isSun;
        if (h >= 6 && h <= 19) {
          const f = (h - 6) / 13;
          bodyX = vw * f;
          bodyY = horizon - Math.sin(f * Math.PI) * horizon * 0.72;
          isSun = true;
        } else {
          const nh = h < 6 ? h + 24 : h;
          const f = (nh - 19) / 11;
          bodyX = vw * f;
          bodyY = horizon - Math.sin(f * Math.PI) * horizon * 0.6;
          isSun = false;
        }
        const rad = Math.max(2, Math.round(vh * 0.03));
        ctx.globalAlpha = 1;
        ctx.fillStyle = rgb(P.su);
        ctx.beginPath();
        ctx.arc(bodyX, bodyY, rad, 0, 6.2832);
        ctx.fill();
        if (!isSun) {
          // moon crescent shadow
          ctx.fillStyle = rgb(mix(P.t, P.hz, bodyY / horizon));
          ctx.beginPath();
          ctx.arc(bodyX + rad * 0.5, bodyY - rad * 0.4, rad, 0, 6.2832);
          ctx.fill();
        }

        // distant hills (two humps)
        ctx.fillStyle = rgb(P.hl);
        ctx.beginPath();
        ctx.moveTo(0, horizon);
        ctx.quadraticCurveTo(vw * 0.25, horizon - vh * 0.14, vw * 0.5, horizon);
        ctx.quadraticCurveTo(vw * 0.78, horizon - vh * 0.2, vw, horizon);
        ctx.lineTo(vw, horizon);
        ctx.lineTo(0, horizon);
        ctx.fill();
        // treeline silhouette along the shore
        ctx.fillStyle = rgb(P.tr);
        ctx.fillRect(0, horizon - 2, vw, 3);
        for (let x = 0; x < vw; x += 3) {
          const th = 2 + ((Math.sin(x * 1.3) + Math.sin(x * 0.5)) + 2) * 1.6;
          ctx.fillRect(x, horizon - th, 2, th + 1);
        }

        // ---- water: reflected sky + shimmer + sun streak ----
        for (let y = horizon; y < vh; y++) {
          const mir = 2 * horizon - y; // mirror into the sky
          const sky = mix(P.t, P.hz, Math.max(0, Math.min(1, mir / horizon)));
          const depth = (y - horizon) / (vh - horizon);
          let col = mix(dim(sky, 0.6), P.w, 0.55 + depth * 0.3);
          const sh = 1 + (reduced ? 0 : 0.07 * Math.sin(y * 0.7 + T * 1.6));
          ctx.fillStyle = rgb(dim(col, sh));
          ctx.fillRect(0, y, vw, 1);
        }
        // sun/moon glitter path on the water
        for (let y = horizon + 1; y < vh; y += 1) {
          const depth = (y - horizon) / (vh - horizon);
          const wob = (reduced ? 0 : Math.sin(y * 0.9 + T * 2.2)) * (1 + depth * 5);
          if (Math.random() < 0.5) continue;
          ctx.globalAlpha = (1 - depth) * 0.5 * (P.st > 0.2 ? 0.8 : 1);
          ctx.fillStyle = rgb(P.su);
          ctx.fillRect((bodyX + wob) | 0, y, 1 + (depth > 0.5 ? 1 : 0), 1);
        }
        ctx.globalAlpha = 1;

        // ripples (fish + duck wakes)
        for (let i = ripples.length - 1; i >= 0; i--) {
          const r = ripples[i];
          if (!reduced) {
            r.r += 0.25;
            r.life -= 0.012;
          }
          if (r.life <= 0) { ripples.splice(i, 1); continue; }
          ellipse(r.x, r.y, r.r, r.r * 0.35, rgb(dim(P.su, 0.9)), r.life * 0.5);
        }
        if (!reduced && Math.random() < 0.02) {
          ripples.push({x: Math.random() * vw, y: horizon + 4 + Math.random() * (vh - horizon - 6), r: 1, life: 1});
        }

        // ducks
        for (const dk of ducks) {
          if (!reduced) {
            dk.x += dk.dir * dk.sp;
            dk.bob += 0.04;
            if (dk.x < 6) dk.dir = 1;
            if (dk.x > vw - 18) dk.dir = -1;
            if (Math.random() < 0.003) dk.dir *= -1;
            dk.wake++;
            if (dk.wake > 28) {
              dk.wake = 0;
              ripples.push({x: dk.x + (dk.dir > 0 ? 1 : 11), y: dk.y + 7, r: 1, life: 0.8});
            }
          }
          const by = dk.y + (reduced ? 0 : Math.sin(dk.bob) * 0.6);
          // faint reflection
          drawSprite(DUCK, DPAL, dk.x, by + 8, dk.dir < 0, P.li * 0.4, 0.25);
          drawSprite(DUCK, DPAL, dk.x, by, dk.dir < 0, P.li, 1);
        }

        // reeds (foreground)
        for (const rd of reeds) {
          const sway = reduced ? 0 : Math.sin(T * 1.3 + rd.ph) * 1;
          ctx.strokeStyle = rgb(dim([34, 64, 38], P.li));
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.moveTo(rd.x, vh);
          ctx.lineTo(rd.x + sway, vh - rd.h);
          ctx.stroke();
        }

        // fireflies (dusk + night)
        if (P.st > 0.25) {
          for (const ff of fireflies) {
            if (!reduced) {
              ff.x += ff.vx; ff.y += ff.vy;
              if (Math.random() < 0.02) { ff.vx = (Math.random() - 0.5) * 0.08; ff.vy = (Math.random() - 0.5) * 0.08; }
              if (ff.x < 0 || ff.x > vw) ff.vx *= -1;
              if (ff.y < horizon - 8 || ff.y > vh) ff.vy *= -1;
            }
            const a = (Math.sin(T * 3 + ff.ph) + 1) / 2;
            ctx.globalAlpha = a * 0.9 * Math.min(1, (P.st - 0.25) * 3);
            ctx.fillStyle = '#dff58a';
            ctx.fillRect(ff.x | 0, ff.y | 0, 1, 1);
            ctx.globalAlpha *= 0.4;
            ctx.fillRect((ff.x | 0) - 1, ff.y | 0, 1, 1);
            ctx.fillRect((ff.x | 0) + 1, ff.y | 0, 1, 1);
          }
          ctx.globalAlpha = 1;
        }

        // bird gliding across the sky
        if (!reduced) {
          bird.x += bird.sp;
          if (bird.x > vw + 4) { bird.x = -4; bird.y = horizon * (0.25 + Math.random() * 0.4); }
          bird.flap = (bird.flap + 1) % 36;
        }
        drawSprite(bird.flap < 18 ? BIRD_A : BIRD_B, null, bird.x | 0, bird.y | 0, false, P.li * 0.7, 0.85);
      }
      requestAnimationFrame(draw);
      resize();

      // ---------- host bridge (shaderwall protocol) ----------
      let shown = false;
      function setShown(value) {
        shown = value;
        window.parent.postMessage(
          {type: 'shaderwall', state: shown ? 'shown' : 'hidden'},
          location.origin
        );
      }
      addEventListener('message', (e) => {
        if (e.origin != location.origin) return;
        const d = e.data || {};
        if (d.type !== 'shaderwall') return;
        if (d.action === 'show') setShown(true);
        else if (d.action === 'hide') setShown(false);
        else if (d.action === 'toggle') setShown(!shown);
      });
      addEventListener('keydown', (e) => {
        if (e.key === 'h' || e.key === 'H') setShown(!shown);
      });
      setShown(false);
    </script>
  </body>
</html>
