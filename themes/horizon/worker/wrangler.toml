# horizon-adsb: the Horizon theme's live-data edge proxy (see
# src/index.js) - /adsb aircraft, /ais ships, /probe diagnostic.
# Deploy from this directory:
#   npx wrangler deploy
# and the theme will find it at
#   https://horizon-adsb.<your-subdomain>.workers.dev
# (update ADSB_PROXY / AIS_PROXY in Horizon.html if the
# subdomain differs).
#
# /ais needs the aisstream.io key (free, GitHub sign-in; their
# terms forbid exposing it to browsers - that is WHY it lives
# here and not in the page):
#   npx wrangler secret put AISSTREAM_KEY
# (local dev reads .dev.vars instead - gitignored.)
name = "horizon-adsb"
main = "src/index.js"
compatibility_date = "2026-07-01"
workers_dev = true
