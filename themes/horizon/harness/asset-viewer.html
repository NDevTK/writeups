<!doctype html>
<html>
  <head>
    <script type="importmap">
      {
        "imports": {
          "three": "../three.webgpu.min.js",
          "three/webgpu": "../three.webgpu.min.js",
          "three/tsl": "../three.tsl.min.js"
        }
      }
    </script>
  </head>
  <body style="margin: 0; overflow: hidden; background: #9db8cc">
    <script>
      /* swizzle shim (older bundled Chrome) */ if (
        navigator.gpu &&
        self.GPUTexture
      ) {
        const ov = GPUTexture.prototype.createView;
        GPUTexture.prototype.createView = function (d) {
          if (d && 'swizzle' in d) {
            d = Object.assign({}, d);
            delete d.swizzle;
          }
          return ov.call(this, d);
        };
      }
    </script>
    <script type="module">
      // Asset viewer - the vessel design loop. Renders the shared
      // vessels.js fleet (the SAME module the theme ships) in
      // isolation on a flat sea, so the shapes are judged and
      // iterated on visually. ?cls=cargo shows one class large;
      // ?az=deg&el=deg orbit the camera; ?len=&beam= override the
      // measured size. Serve the repo root and open
      // /themes/horizon/harness/asset-viewer.html.
      import * as THREE from 'three/webgpu';
      import {buildVessel} from '../vessels.js';
      import {typeClass} from '../ships.js';
      import {buildingsGeometry, parseBuildings} from '../buildings.js';
      import {
        BUILDINGS_FIXTURE,
        CHURCH_FIXTURE
      } from '../buildings-fixture.mjs';
      import {parseRoads, roadsGeometry} from '../roads.js';
      import {ROADS_FIXTURE} from '../roads-fixture.mjs';
      import {landTint, parseLanduse} from '../landuse.js';
      import {LANDUSE_FIXTURE} from '../landuse-fixture.mjs';
      import {parseWaterways, riversGeometry} from '../rivers.js';
      import {RIVERS_FIXTURE} from '../rivers-fixture.mjs';
      import {parseRailways, railsGeometry} from '../rails.js';
      import {RAILS_FIXTURE} from '../rails-fixture.mjs';
      import {consistOf} from '../trains.js';
      import {buildTrain, makeTrainMaterials} from '../rollingstock.js';
      import {liveryFor} from '../livery.js';
      import {buildAircraft, makeAircraftMaterials} from '../airframes.js';
      import {aircraftDims} from '../aircraft.js';
      import {rotorOmega, specOf} from '../turbines.js';
      import {buildWindmill} from '../windmills.js';

      const q = new URLSearchParams(location.search);
      const renderer = new THREE.WebGPURenderer({antialias: true});
      renderer.setSize(innerWidth, innerHeight);
      renderer.setPixelRatio(1);
      document.body.appendChild(renderer.domElement);
      const scene = new THREE.Scene();
      scene.background = new THREE.Color('#b9cede');
      scene.fog = new THREE.Fog('#b9cede', 2200, 7000);
      const camera = new THREE.PerspectiveCamera(
        35,
        innerWidth / innerHeight,
        0.5,
        4000
      );

      const sun = new THREE.DirectionalLight('#fff4e0', 4.5);
      sun.position.set(240, 460, 520);
      scene.add(sun);
      scene.add(new THREE.HemisphereLight('#cfe0ee', '#48607a', 2.2));

      const sea = new THREE.Mesh(
        new THREE.PlaneGeometry(8000, 8000),
        new THREE.MeshStandardMaterial({color: '#28516b', roughness: 0.55})
      );
      sea.rotation.x = -Math.PI / 2;
      scene.add(sea);

      const mk = (color, roughness = 0.85) =>
        new THREE.MeshStandardMaterial({color, roughness});
      const mats = {
        hullA: mk('#3a444d'),
        hullB: mk('#6e3a2c'),
        sup: mk('#8a949e'),
        white: mk('#dfe3e7', 0.7),
        deck: mk('#4b5157'),
        funnel: mk('#c8402f'),
        sail: new THREE.MeshStandardMaterial({
          color: '#f2efe6',
          roughness: 0.9,
          side: THREE.DoubleSide
        }),
        boxes: [
          '#a4553d',
          '#3f7392',
          '#7b9245',
          '#b09a3e',
          '#6a5488',
          '#8a8f96'
        ].map((c) => mk(c))
      };

      // ?asset=windmills: the three Mont Crosin models plus the
      // model-less power rung through the same turbines.js/
      // windmills.js the theme ships (metres); rotors run at
      // their region-2 speed for a 8 m/s hub wind, one blade
      // phase apart. ?v= sets the wind.
      if (q.get('asset') === 'windmills') {
        sea.material.color.set('#5d7a52'); // grass stage
        sun.position.set(-320, 380, -420);
        const wmats = {body: mk('#d5d8d9', 0.55), dark: mk('#3c4146', 0.6)};
        const LINEUP = [
          {model: 'V90'},
          {manufacturer: 'Enercon', model: 'E82'},
          {model: 'V112'},
          {'generator:output:electricity': '2000 kW'}
        ];
        const v = +q.get('v') || 8;
        const rigs = [];
        let x = 0;
        const xs = [];
        for (const tags of LINEUP) {
          const spec = specOf(tags);
          const g = new THREE.Group();
          const rig = buildWindmill(g, spec, wmats, 1);
          rig.rotor.rotation.z = rigs.length * 0.7;
          rigs.push({rig, om: rotorOmega(spec, v)});
          x += spec.d * 0.62;
          g.position.set(x, 0, 0);
          g.rotation.y = ((+q.get('yaw') || 20) * Math.PI) / 180;
          xs.push(x);
          x += spec.d * 0.62;
          scene.add(g);
        }
        const mid = (xs[0] + xs[xs.length - 1]) / 2;
        const az = ((+q.get('az') || 195) * Math.PI) / 180;
        const el = ((+q.get('el') || 8) * Math.PI) / 180;
        const d = +q.get('d') || 520;
        camera.position.set(
          mid + d * Math.cos(el) * Math.sin(az),
          Math.max(d * Math.sin(el), 15),
          d * Math.cos(el) * Math.cos(az)
        );
        camera.lookAt(mid, 75, 0);
        await renderer.init();
        window.__r = renderer;
        window.__scene = scene;
        window.__cam = camera;
        window.__THREE = THREE;
        let wframes = 0;
        let wt = performance.now();
        renderer.setAnimationLoop(() => {
          const now = performance.now();
          const dt = Math.min((now - wt) / 1000, 0.1);
          wt = now;
          for (const {rig, om} of rigs) rig.rotor.rotation.z -= om * dt;
          renderer.render(scene, camera);
          if (++wframes === 5) console.log('DONE');
        });
      } else if (q.get('asset') === 'trains') {
        // ?asset=trains: one consist per category family through
        // the same trains.js/rollingstock.js the theme ships
        // (metres).
        sea.material.color.set('#82868b'); // ballast stage
        sun.position.set(-320, 380, -420);
        // One consist per real operator livery (livery.js): SBB
        // intercity silver, DB ICE white + red cheatline, BLS
        // silver-and-lime, RhB red, the Jungfrau blue/yellow BOB,
        // Swiss regional red.
        const liveryMatCache = new Map();
        const matsFor = (cat, op) => {
          const lv = liveryFor(cat, op);
          let m = liveryMatCache.get(lv.key);
          if (!m) {
            m = makeTrainMaterials(THREE.MeshStandardMaterial, lv);
            liveryMatCache.set(lv.key, m);
          }
          return m;
        };
        const LINEUP = [
          ['IC', 'SBB'],
          ['ICE', 'DB'],
          ['RE', 'BLS-bls'],
          ['R', 'RhB'],
          ['R', 'BOB'],
          ['RE', 'SBB']
        ];
        let x = 0;
        const xs = [];
        for (const [cat, op] of LINEUP) {
          const g = new THREE.Group();
          buildTrain(g, cat, consistOf(cat, op), matsFor(cat, op), 1);
          x += 8;
          g.position.set(x, 0, 0);
          xs.push(x);
          x += 8;
          scene.add(g);
        }
        const mid = (xs[0] + xs[xs.length - 1]) / 2;
        const az = ((+q.get('az') || 235) * Math.PI) / 180;
        const el = ((+q.get('el') || 14) * Math.PI) / 180;
        const d = +q.get('d') || 190;
        camera.position.set(
          mid + d * Math.cos(el) * Math.sin(az),
          Math.max(d * Math.sin(el), 3),
          d * Math.cos(el) * Math.cos(az)
        );
        camera.lookAt(mid, 3, 0);
        await renderer.init();
        window.__r = renderer;
        window.__scene = scene;
        window.__cam = camera;
        window.__THREE = THREE;
        let tframes = 0;
        renderer.setAnimationLoop(() => {
          renderer.render(scene, camera);
          if (++tframes === 5) console.log('DONE');
        });
      } else if (q.get('asset') === 'aircraft') {
        // ?asset=aircraft: one airframe per body class through the same
        // aircraft.js/airframes.js the theme ships, sized to the real
        // wingspan/length (metres). ?type=A320 shows one large.
        sea.material.color.set('#8a9099');
        sun.position.set(-340, 360, -300);
        const only = q.get('type');
        const LINEUP = only
          ? [only]
          : [
              'A388',
              'B744',
              'B77W',
              'A320',
              'B738',
              'E195',
              'AT72',
              'GLF6',
              'C172',
              'EC35'
            ];
        let x = 0;
        const xs = [];
        for (let i = 0; i < LINEUP.length; i++) {
          const dims = aircraftDims(LINEUP[i]);
          const g = new THREE.Group();
          const mats = makeAircraftMaterials(THREE.MeshStandardMaterial, {
            tint: (i % 3) * 0.3
          });
          buildAircraft(g, dims, mats, i / LINEUP.length, 1);
          const W = dims.wingspanM;
          x += W / 2 + 14;
          g.position.set(x, W * 0.35, 0);
          g.rotation.y = ((+q.get('yaw') || -28) * Math.PI) / 180;
          xs.push(x);
          x += W / 2 + 14;
          scene.add(g);
        }
        const mid = (xs[0] + xs[xs.length - 1]) / 2 || 0;
        const az = ((+q.get('az') || 210) * Math.PI) / 180;
        const el = ((+q.get('el') || 14) * Math.PI) / 180;
        const d =
          +q.get('d') || (only ? Math.max(80, 3) : Math.max(x * 0.6, 260));
        camera.position.set(
          mid + d * Math.cos(el) * Math.sin(az),
          Math.max(d * Math.sin(el), 12),
          d * Math.cos(el) * Math.cos(az)
        );
        camera.lookAt(mid, 6, 0);
        await renderer.init();
        window.__r = renderer;
        window.__scene = scene;
        window.__cam = camera;
        window.__THREE = THREE;
        let aframes = 0;
        renderer.setAnimationLoop(() => {
          renderer.render(scene, camera);
          if (++aframes === 5) console.log('DONE');
        });
      } else if (q.get('asset') === 'buildings') {
        sea.material.color.set('#5d7a52'); // grass stage
        sun.position.set(-320, 380, -420); // camera side (az 205)
        const anchor = {lat: 46.6863, lon: 7.8632};
        // The real ground cover under the town (landuse.js): paint
        // the tint field into a canvas over the stage grass, the
        // same 280-unit box the theme rasterises. ?landuse=0 hides.
        if (q.get('landuse') !== '0') {
          const t = landTint(parseLanduse(LANDUSE_FIXTURE), anchor, 280, 192);
          if (t) {
            const cv = document.createElement('canvas');
            cv.width = cv.height = t.n;
            const cx = cv.getContext('2d');
            const img = cx.createImageData(t.n, t.n);
            const g = (v) => Math.round(255 * Math.sqrt(v)); // ~sRGB
            for (let k = 0; k < t.n * t.n; k++) {
              const a = t.data[4 * k + 3];
              if (a) {
                img.data[4 * k] = g(t.data[4 * k]);
                img.data[4 * k + 1] = g(t.data[4 * k + 1]);
                img.data[4 * k + 2] = g(t.data[4 * k + 2]);
                img.data[4 * k + 3] = 235;
              } else {
                img.data[4 * k] = 93; // the stage grass
                img.data[4 * k + 1] = 122;
                img.data[4 * k + 2] = 82;
                img.data[4 * k + 3] = 255;
              }
            }
            // canvas row 0 renders at +v = the plane's far (north)
            // edge after the -PI/2 rotation; the tint's row 0 is
            // SOUTH - flip while blitting.
            const flip = cx.createImageData(t.n, t.n);
            for (let j = 0; j < t.n; j++)
              flip.data.set(
                img.data.subarray(j * t.n * 4, (j + 1) * t.n * 4),
                (t.n - 1 - j) * t.n * 4
              );
            cx.putImageData(flip, 0, 0);
            const tex = new THREE.CanvasTexture(cv);
            tex.colorSpace = THREE.SRGBColorSpace;
            tex.magFilter = THREE.LinearFilter;
            const landPlane = new THREE.Mesh(
              new THREE.PlaneGeometry(280, 280),
              new THREE.MeshStandardMaterial({map: tex, roughness: 1})
            );
            landPlane.rotation.x = -Math.PI / 2;
            // stage-only clearance over the 8000-unit backdrop
            // (the THEME blends this in the terrain shader itself)
            landPlane.position.y = 0.05;
            scene.add(landPlane);
          }
        }
        let builds = parseBuildings({
          elements: [
            ...BUILDINGS_FIXTURE.elements,
            ...CHURCH_FIXTURE.elements // the Unterseen spire
          ]
        });
        // ?facade=demo: a row of colour/material-tagged buildings to
        // verify facade.js maps OSM tags to real wall/roof colours.
        if (q.get('facade') === 'demo') {
          const box = (i, tags) => {
            const la = 46.688,
              lo = 7.8605 + i * 0.00042; // ~32 m apart, east
            const d = 8 / 111320; // ~16 m square
            const dl = d / Math.cos((la * Math.PI) / 180);
            return {
              type: 'way',
              id: 900000 + i,
              geometry: [
                [la - d, lo - dl],
                [la - d, lo + dl],
                [la + d, lo + dl],
                [la + d, lo - dl],
                [la - d, lo - dl]
              ].map(([lat, lon]) => ({lat, lon})),
              tags: {building: 'house', 'building:levels': '3', ...tags}
            };
          };
          const demos = [
            {'building:material': 'brick', 'roof:material': 'roof_tiles'},
            {'building:colour': 'white', 'roof:material': 'slate'},
            {'building:material': 'glass', 'roof:material': 'glass'},
            {'building:colour': '#eecfaf', 'roof:colour': '#753e3a'},
            {'building:material': 'wood', 'roof:material': 'thatch'},
            {'building:material': 'concrete', 'roof:material': 'copper'},
            {'building:colour': 'sandybrown', 'roof:colour': 'firebrick'}
          ];
          builds = parseBuildings({elements: demos.map((t, i) => box(i, t))});
        }
        // ?roofs=demo: one building per roof:shape to verify the
        // roof geometry (gabled/hipped/half-hipped/pyramidal/skillion/
        // flat), a uniform light colour so the shape reads.
        if (q.get('roofs') === 'demo') {
          const box2 = (i, tags) => {
            const la = 46.688,
              lo = 7.8605 + i * 0.0005; // ~38 m apart
            const d = 9 / 111320;
            const dl = (d * 1.6) / Math.cos((la * Math.PI) / 180); // oblong
            return {
              type: 'way',
              id: 910000 + i,
              geometry: [
                [la - d, lo - dl],
                [la - d, lo + dl],
                [la + d, lo + dl],
                [la + d, lo - dl],
                [la - d, lo - dl]
              ].map(([lat, lon]) => ({lat, lon})),
              tags: {building: 'yes', 'building:levels': '3', ...tags}
            };
          };
          const shapes = [
            'gabled',
            'hipped',
            'half-hipped',
            'pyramidal',
            'skillion',
            'flat'
          ];
          builds = parseBuildings({
            elements: shapes.map((s, i) => box2(i, {'roof:shape': s}))
          });
        }
        if (+q.get('n')) builds = builds.slice(0, +q.get('n')); // nearest-first
        const g = buildingsGeometry(
          builds,
          anchor,
          () => 0,
          () => +q.get('glow') || 0,
          7 / 400, // theme-exact scale: footprints land in scene units
          1e9
        );
        const geo = new THREE.BufferGeometry();
        geo.setAttribute('position', new THREE.BufferAttribute(g.position, 3));
        geo.setAttribute('normal', new THREE.BufferAttribute(g.normal, 3));
        geo.setAttribute('color', new THREE.BufferAttribute(g.color, 3));
        const mat = new THREE.MeshStandardMaterial({
          vertexColors: true,
          roughness: 0.9
        });
        scene.add(new THREE.Mesh(geo, mat));
        // The watercourses (rivers.js - the same gated ribbon
        // builder as the roads, water albedo): the Aare and the
        // alpine streams thread the stage. ?rivers=0 hides.
        if (q.get('rivers') !== '0') {
          const vg = riversGeometry(
            parseWaterways(RIVERS_FIXTURE),
            anchor,
            () => 0.075, // between the ground cover and the roads
            7 / 400,
            1e9
          );
          const vgeo = new THREE.BufferGeometry();
          vgeo.setAttribute(
            'position',
            new THREE.BufferAttribute(vg.position, 3)
          );
          vgeo.setAttribute('normal', new THREE.BufferAttribute(vg.normal, 3));
          vgeo.setAttribute('color', new THREE.BufferAttribute(vg.color, 3));
          const vmat = new THREE.MeshStandardMaterial({
            vertexColors: true,
            roughness: 0.25 // water sheen
          });
          scene.add(new THREE.Mesh(vgeo, vmat));
        }
        // The railways (rails.js - same gated builder, beds at the
        // MEASURED gauge widths): the BOB, the standard-gauge Thun
        // line and the Harderbahn thread the stage. ?rails=0 hides.
        if (q.get('rails') !== '0') {
          const kg = railsGeometry(
            parseRailways(RAILS_FIXTURE),
            anchor,
            () => 0.09, // above the rivers, under the roads
            7 / 400,
            1e9
          );
          const kgeo = new THREE.BufferGeometry();
          kgeo.setAttribute(
            'position',
            new THREE.BufferAttribute(kg.position, 3)
          );
          kgeo.setAttribute('normal', new THREE.BufferAttribute(kg.normal, 3));
          kgeo.setAttribute('color', new THREE.BufferAttribute(kg.color, 3));
          const kmat = new THREE.MeshStandardMaterial({
            vertexColors: true,
            roughness: 0.9
          });
          scene.add(new THREE.Mesh(kgeo, kmat));
        }
        // The street network under the town (roads.js, same fixture
        // area), ribbons lifted a hair off the flat stage.
        if (q.get('roads') !== '0') {
          const rg = roadsGeometry(
            parseRoads(ROADS_FIXTURE),
            anchor,
            () => 0.1, // above the stage ground layers
            7 / 400,
            1e9
          );
          const rgeo = new THREE.BufferGeometry();
          rgeo.setAttribute(
            'position',
            new THREE.BufferAttribute(rg.position, 3)
          );
          rgeo.setAttribute('normal', new THREE.BufferAttribute(rg.normal, 3));
          rgeo.setAttribute('color', new THREE.BufferAttribute(rg.color, 3));
          const rmat = new THREE.MeshStandardMaterial({
            vertexColors: true,
            roughness: 0.95
          });
          scene.add(new THREE.Mesh(rgeo, rmat));
        }
        // Frame what was actually built: aim at the geometry's
        // bounding box, back off proportionally (?d overrides).
        let x0 = 0;
        let x1 = 0;
        let z0 = 0;
        let z1 = 0;
        let y1 = 1;
        if (g.count) {
          x0 = z0 = Infinity;
          x1 = z1 = -Infinity;
          for (let i = 0; i < g.count; i++) {
            x0 = Math.min(x0, g.position[3 * i]);
            x1 = Math.max(x1, g.position[3 * i]);
            z0 = Math.min(z0, g.position[3 * i + 2]);
            z1 = Math.max(z1, g.position[3 * i + 2]);
            y1 = Math.max(y1, g.position[3 * i + 1]);
          }
        }
        const cx = (x0 + x1) / 2;
        const cz = (z0 + z1) / 2;
        const az = ((+q.get('az') || 205) * Math.PI) / 180;
        const el = ((+q.get('el') || 18) * Math.PI) / 180;
        const d = +q.get('d') || Math.max(x1 - x0, z1 - z0, 0.5) * 0.85;
        // near scales with distance: the road ribbons ride 0.7 m
        // above the stage and need the depth precision.
        camera.near = Math.max(0.02, d * 0.01);
        camera.updateProjectionMatrix();
        camera.position.set(
          cx + d * Math.cos(el) * Math.sin(az),
          Math.max(d * Math.sin(el), y1 * 0.6),
          cz + d * Math.cos(el) * Math.cos(az)
        );
        camera.lookAt(cx, y1 * 0.4, cz);
        await renderer.init();
        window.__r = renderer;
        window.__scene = scene;
        window.__cam = camera;
        window.__THREE = THREE;
        let bframes = 0;
        renderer.setAnimationLoop(() => {
          renderer.render(scene, camera);
          if (++bframes === 5) console.log('DONE');
        });
      } else {
        await fleetMode();
      }

      // The measured fleet - one of each silhouette class.
      async function fleetMode() {
        const FLEET = [
          ['cargo', 70, 240, 32, 566001],
          ['tanker', 80, 180, 28, 566002],
          ['passenger', 60, 140, 22, 566003],
          ['fishing', 30, 24, 7, 566004],
          ['sailing', 36, 14, 4, 566005],
          ['tug', 52, 30, 10, 566006],
          ['other', 0, 90, 14, 566007],
          ['cargo2', 71, 160, 24, 566008]
        ];
        const only = q.get('cls');
        const shown = only ? FLEET.filter(([n]) => n.startsWith(only)) : FLEET;
        let x = 0;
        const xs = [];
        for (const [, t, len, beam, mmsi] of shown) {
          const g = new THREE.Group();
          const L = +q.get('len') || len;
          const B = +q.get('beam') || beam;
          buildVessel(g, L, B, typeClass(t), mats, mmsi, 1);
          x += (L * 0.75) / 2 + 25;
          g.position.set(x, 0, 0);
          xs.push(x);
          x += (L * 0.75) / 2 + 25;
          g.rotation.y = ((+q.get('yaw') || -32) * Math.PI) / 180;
          scene.add(g);
        }
        const mid = (xs[0] + xs[xs.length - 1]) / 2 || 0;
        const az = ((+q.get('az') || 205) * Math.PI) / 180;
        const el = ((+q.get('el') || 12) * Math.PI) / 180;
        const d = +q.get('d') || (only ? 300 : Math.max(x * 0.62, 400));
        camera.position.set(
          mid + d * Math.cos(el) * Math.sin(az),
          Math.max(d * Math.sin(el), 3),
          d * Math.cos(el) * Math.cos(az)
        );
        camera.lookAt(mid, 8, 0);

        await renderer.init();
        // shoot.mjs capture hooks (composited screenshots are blank
        // for WebGPU surfaces - the readback path is the camera).
        window.__r = renderer;
        window.__scene = scene;
        window.__cam = camera;
        window.__THREE = THREE;
        let frames = 0;
        renderer.setAnimationLoop(() => {
          renderer.render(scene, camera);
          if (++frames === 5) console.log('DONE');
        });
      }
    </script>
  </body>
</html>
