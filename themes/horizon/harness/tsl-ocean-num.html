<!doctype html><html><head><script type="importmap">
{
  "imports": {
    "three": "./writeups/themes/horizon/three.webgpu.min.js",
    "three/webgpu": "./writeups/themes/horizon/three.webgpu.min.js",
    "three/tsl": "./writeups/themes/horizon/three.tsl.min.js"
  }
}
</script></head><body style="margin:0"><canvas id="gl"></canvas><script>/* swizzle shim */ if (navigator.gpu && self.GPUTexture) { const ov = GPUTexture.prototype.createView; GPUTexture.prototype.createView = function (d) { if (d && 'swizzle' in d) { d = Object.assign({}, d); delete d.swizzle; } return ov.call(this, d); }; }</script><script type="module">
// Per-texel FFT-ocean check against ocean-reference.mjs (run the
// reference with `node` for expected values): same N/L/params/seed/
// lambda/t. Prints h, Dx, Dz (disp map / lambda), n-derived slope
// check and J at the reference points.
import * as T from 'three/webgpu';
import {createOceanFFT} from './writeups/themes/horizon/ocean-tsl.js';
const log = (s) => console.log('OCEAN|' + s);
try {
  const r = new T.WebGPURenderer({canvas: document.getElementById('gl'), forceWebGL: !new URLSearchParams(location.search).get('wgpu'), antialias: false});
  await r.init();
  log('backend ' + (r.backend.isWebGPUBackend ? 'webgpu' : 'webgl2'));
  r.setSize(300, 300);
  const LAMBDA = 1.1;
  const ocean = createOceanFFT(r, {N: 256, L: 450, U10: 12, F: 120e3, D: 60, windDir: 0, seed: 1337, lambda: LAMBDA});
  ocean.update(13.7);
  const pts = [[0, 0], [37, 81], [128, 200], [255, 13]];
  for (const [i, j] of pts) {
    const d = await ocean.readMap('disp', i, j, 1, 1);
    const v = await ocean.readMap('deriv', i, j, 1, 1);
    log(`(${i},${j}): h=${d[1].toFixed(4)} Dx=${(d[0] / LAMBDA).toFixed(4)} Dz=${(d[2] / LAMBDA).toFixed(4)} nx=${v[0].toFixed(4)} nz=${v[1].toFixed(4)} J=${v[2].toFixed(4)}`);
  }
  // Full-column scan: locate reference h(37,81)=1.20377 in the map.
  const col = await ocean.readMap('disp', 37, 0, 1, 256);
  let best = -1, bd = 1e9;
  for (let j = 0; j < 256; j++) {
    const d2 = Math.abs(col[j * 4 + 1] - 1.20377);
    if (d2 < bd) { bd = d2; best = j; }
  }
  log(`scan: h(37,81)ref found at j=${best} (|dh|=${bd.toFixed(4)}), h[81]=${col[81 * 4 + 1].toFixed(4)}, h[174]=${col[174 * 4 + 1].toFixed(4)}`);
  log('DONE');
} catch (e) { log('ERR ' + e.message + ' :: ' + (e.stack || '').split('\n')[1]); log('DONE'); }
</script></body></html>
