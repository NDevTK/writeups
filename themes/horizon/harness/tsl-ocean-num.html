<!doctype html>
<html>
  <head>
    <script type="importmap">
      {
        "imports": {
          "three": "./writeups/themes/horizon/three.webgpu.min.js",
          "three/webgpu": "./writeups/themes/horizon/three.webgpu.min.js",
          "three/tsl": "./writeups/themes/horizon/three.tsl.min.js"
        }
      }
    </script>
  </head>
  <body style="margin: 0">
    <canvas id="gl"></canvas>
    <script>
      /* swizzle shim */ if (navigator.gpu && self.GPUTexture) {
        const ov = GPUTexture.prototype.createView;
        GPUTexture.prototype.createView = function (d) {
          if (d && 'swizzle' in d) {
            d = Object.assign({}, d);
            delete d.swizzle;
          }
          return ov.call(this, d);
        };
      }
    </script>
    <script type="module">
      // Per-texel FFT-ocean gate against ocean-reference.mjs: same
      // N/L/params/seed/lambda/t. The expected values below are the
      // double-precision reference's 'REF t=13.7' / 'REF sea t=13.7'
      // lines; the GPU maps must land on them at fp32 tolerance -
      // ground-truth validation, no second renderer involved.
      import * as T from 'three/webgpu';
      import {createOceanFFT} from './writeups/themes/horizon/ocean-tsl.js';
      const log = (s) => console.log('OCEAN|' + s);
      try {
        const r = new T.WebGPURenderer({
          canvas: document.getElementById('gl'),
          forceWebGL: false,
          antialias: false
        });
        await r.init();
        log('backend ' + (r.backend.isWebGPUBackend ? 'webgpu' : 'webgl2'));
        r.setSize(300, 300);
        const LAMBDA = 1.1;
        // ?sea=1: the reference's measured-partition state (wind sea
        // 1.5 m @ 6 s toward +x under U10 = 10; swell 2 m @ 14 s toward
        // 60 deg) - expected texels from the 'REF sea' lines.
        const seaMode = new URLSearchParams(location.search).get('sea') === '1';
        const sea = seaMode
          ? [
              {hs: 1.5, tp: 6, dir: 0, U10: 10},
              {hs: 2.0, tp: 14, dir: Math.PI / 3}
            ]
          : undefined;
        const ocean = createOceanFFT(r, {
          N: 256,
          L: 450,
          U10: 12,
          F: 120e3,
          D: 60,
          windDir: 0,
          sea,
          seed: 1337,
          lambda: LAMBDA
        });
        ocean.update(13.7);
        // [i, j, h, Dx, Dz] from ocean-reference.mjs.
        const EXP = seaMode
          ? [
              [0, 0, 0.35933, 0.54697, 0.83656],
              [37, 81, 0.30592, -0.29644, -0.94486],
              [128, 200, -0.49547, -0.13915, -0.21753],
              [255, 13, -0.28231, 0.11266, 0.14675]
            ]
          : [
              [0, 0, 1.19279, 0.01599, 0.4124],
              [37, 81, 0.60189, 0.36917, -0.02282],
              [128, 200, -0.7136, -0.79298, -0.63373],
              [255, 13, 0.30142, -0.3038, -0.08177]
            ];
        const TOL = 5e-3; // fp32 through a full FFT chain
        let bad = 0;
        for (const [i, j, hE, dxE, dzE] of EXP) {
          const d = await ocean.readMap('disp', i, j, 1, 1);
          const v = await ocean.readMap('deriv', i, j, 1, 1);
          // maps carry combinable terms; rebuild n and J like the material
          const lxx = v[2],
            lzz = v[3],
            lxz = d[3];
          const J = (1 + lxx) * (1 + lzz) - lxz * lxz;
          const tx = [1 + lxx, v[0], lxz],
            tz = [lxz, v[1], 1 + lzz];
          const n = [
            tz[1] * tx[2] - tz[2] * tx[1],
            tz[2] * tx[0] - tz[0] * tx[2],
            tz[0] * tx[1] - tz[1] * tx[0]
          ];
          const nl = Math.hypot(...n);
          const dh = Math.abs(d[1] - hE);
          const ddx = Math.abs(d[0] / LAMBDA - dxE);
          const ddz = Math.abs(d[2] / LAMBDA - dzE);
          if (dh > TOL || ddx > TOL || ddz > TOL) bad++;
          log(
            `(${i},${j}): h=${d[1].toFixed(4)} Dx=${(d[0] / LAMBDA).toFixed(4)} Dz=${(d[2] / LAMBDA).toFixed(4)} nx=${(n[0] / nl).toFixed(4)} nz=${(n[2] / nl).toFixed(4)} J=${J.toFixed(4)} |dref|=${Math.max(dh, ddx, ddz).toExponential(1)}`
          );
        }
        log(
          bad === 0
            ? 'TEXELS PASS (at the double-precision reference, fp32 tol)'
            : 'TEXELS FAIL (' + bad + ' points off the reference)'
        );
        // Full-column scan: locate the reference h(37,81) in the map
        // (wind 0.60189 / sea 0.30592).
        const col = await ocean.readMap('disp', 37, 0, 1, 256);
        const hRef = seaMode ? 0.30592 : 0.60189;
        let best = -1,
          bd = 1e9;
        for (let j = 0; j < 256; j++) {
          const d2 = Math.abs(col[j * 4 + 1] - hRef);
          if (d2 < bd) {
            bd = d2;
            best = j;
          }
        }
        log(
          `scan: h(37,81)ref=${hRef} found at j=${best} (|dh|=${bd.toFixed(4)}), h[81]=${col[81 * 4 + 1].toFixed(4)}, h[174]=${col[174 * 4 + 1].toFixed(4)}`
        );
        log('DONE');
      } catch (e) {
        log('ERR ' + e.message + ' :: ' + (e.stack || '').split('\n')[1]);
        log('DONE');
      }
    </script>
  </body>
</html>
