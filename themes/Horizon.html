    <title>Horizon</title>
    <!--
      A 3D landscape where everything shown is real state:
      - the terrain is your terrain: real elevations around the visitor's
        location (AWS terrarium elevation tiles at ~30-90m resolution,
        falling back to the open-meteo elevation API), with sea rendered
        where the sea actually is; shading reads the DEM directly - a
        world-space normal map baked from the heightfield at close to
        full tile resolution lights every pixel with the real hillside
        orientation (the mesh only carries the silhouette)
      - a multiple-scattering atmosphere after Hillaire (2020):
        transmittance, multiple-scattering and per-frame sky-view LUTs
        with Rayleigh, measured-aerosol Mie (GEFS-Aerosols spectral
        extinction, albedo and asymmetry; CAMS AOD fallback) and ozone
        profiles, so twilight structure emerges from the raymarch; an
        aerial-perspective LUT applies the same scattering to the air
        BETWEEN camera and terrain, so distant ridges blue out by
        physics; the sun's terrain light carries its true transmitted
        colour; sun position from astronomy-engine (VSOP87/ELP
        truncations, topocentric, refraction-corrected); Preetham as
        fallback
      - the actual night sky (Yale Bright Star Catalog: 2887 stars with
        real positions, magnitudes and colour temperatures) rotated for
        the latitude and the current sidereal time; the five naked-eye
        planets at their ephemeris positions and magnitudes; the moon
        shows its real phase (lit from the sun's true direction) and its
        real apparent size for today's Earth-Moon distance
      - fog obeys the Koschmieder relation on the MEASURED visibility;
        sun glitter follows Cox & Munk (1954) slope statistics; cloud
        cover renders in the model's real low/mid/high layers, each deck
        riding its own real wind (surface, 700hPa, 250hPa jet); the low
        cumulus deck AND the mid altostratus deck are raymarched
        volumetric cloudscapes after Schneider & Vos (SIGGRAPH 2015):
        Perlin-Worley density carved by the real cover at the real LCL,
        a zero-mean weather map varying that cover across the sky
        without changing it, stratus/cumulus/cumulonimbus height
        profiles picked by the reported WMO code, adaptive
        coarse-to-fine marching, Beer-powder sun lighting, dual-lobe
        Henyey-Greenstein phase - reconstructed temporally exactly as
        shipped in HZD (quarter-res buffer, 1-of-16 Bayer refresh,
        reprojection, golden-ratio jitter integration) with a terrain
        depth prepass so cloud passes IN FRONT of far ridges, and
        nearest-depth upsampling (Jansen & Bavoil 2010) keeping
        silhouettes clean (only thin cirrus stays 2D, as in the
        research)
      - snow is MEASURED where a satellite saw it: the daily MODIS
        NDSI snow product (GIBS, the same keyless WMTS as the night
        lights) drives the terrain's snow through the published
        colormap inverted verbatim and the Salomonson & Appel (2004)
        fractional-cover regression - July glaciers included; under
        cloud or night the freezing-level rule below stands in
      - the snowline tracks the real freezing level; the treeline follows
        Körner & Paulsen (2004); deciduous leaves follow Hopkins' law
        (real date, latitude and elevation), so autumn arrives when it
        actually does; surf breaks along the real shallows (McCowan
        H > 0.78d on the terrarium bathymetry)
      - atmospheric optics appear only under their true conditions:
        Descartes rainbows (42/51 deg) opposite a low sun during real
        rain, the 22 deg cirrus halo with low-sun parhelia, star twinkle
        growing with airmass, and real solar eclipses dimming the scene
      - live weather (open-meteo + geojs, both keyless): cloud cover,
        rain, snow, fog, wind-driven sway; fresh snow whitens the ground
        only when it is actually freezing where you are
      - the sea follows oceanography: Pierson-Moskowitz wave height and
        period from the real wind, deep-water dispersion, whitecap
        fraction from Monahan & O'Muircheartaigh, fresnel sun glitter
      - clouds ride the true wind vector at the real lifting condensation
        level; trees are spring-dampers forced by real mean wind and
        gusts, and the cable-car cabins pendulum in the same air -
        drag/gravity statics for the lean, gusts cycling it at the
        hanger's own sqrt(g/L) frequency
      - USGS M4.5+ earthquakes arrive at their true seismic travel times
        (P then S), attenuated by real distance
      - aurora follows NOAA's OVATION forecast oval: its real latitude
        sets the curtain's elevation in the sky (Kp heuristic fallback)
      - the ISS crosses the sky via SGP4-propagated live elements, drawn
        only during genuinely visible passes
      - when it snows, flakes are rigid bodies in a real physics engine
        (vendored Rapier): air drag, real wind force, collision with a
        heightfield of the local terrain and with settled flakes, so
        drifts accumulate while the page is open and melt when the real
        temperature rises
      - sky haze is measured air: GEFS-Aerosols spectral extinction,
        single-scattering albedo and asymmetry per channel (CAMS total
        AOD as fallback); at night the terrain carries NASA Black
        Marble measured city lights (daily VNP46A2 radiances - the
        same VIIRS data the Falchi skyglow derives from, so towns
        glow exactly where the sky above them does); trees stand
        inside the real OSM forest polygons
        around you; the sea is a reflecting three.js Water plane whose
        wave energy follows the real sea state; constellation figures
        (d3-celestial data) ride the same sidereal dome as the stars
      - a data panel (the ✦ wallpaper control, ?debug=1, or the D key)
        lists every live source with its last real value
      - explore (the G key, double-click, or ?explore=1): the measured
        world is not uniformly rich, so explore.js curates destinations
        that are documented superlatives (each promise cited, each
        annotated by the repo's own Falchi-atlas and IGRF-14 models),
        and the open-meteo geocoder reaches any other place by name.
        Relocating sets only lat/lon/place - never a weather pin - so
        the destination's REAL sky, sea, ships and storms load.
      - real inland water: OSM natural=water polygons (relations
        stitched, surface at the measured median-shore DEM level) put
        Lake Thun where Lake Thun is - the sea rule alone never could;
        lake vessels float at the lake's own level
      - real towns: OSM building footprints extruded to their tagged
        heights (the Simple 3D Buildings ladder: height tag, then
        levels x 3 m, then per-type defaults), gabled roofs on the
        house families, seated on the sampled terrain and never in
        water; after dark the walls emit the town's measured Black
        Marble radiance, so windows warm exactly where the night
        lights say the town is lit, and snow lies on the roofs
        exactly as it lies on the ground beside them - the measured
        satellite cover or the live snowfall, roof surfaces only; the street network is real too -
        OSM highway ways as ribbons of their tagged width (width >
        lanes x 3.5 m > per-type defaults) and tagged surface
        albedo, cut by water except where a tagged bridge spans it;
        and the ground itself carries the real cover - OSM landuse
        polygons tint the grass where farmland, meadows, residential
        blocks and bare rock actually are (unknown classes stay
        base grass, mountains and snow untouched) - and the bare
        soils DARKEN with the measured topsoil moisture (Lobell &
        Asner 2002: reflectance falls exponentially with degree of
        saturation), so the fields dry pale and rain leaves them
        dark; linear water is
        real too - OSM waterway ways thread the Aare and the alpine
        streams down the valleys (tunnelled reaches skipped), and a
        stream reaching a lake stops at the shore where the polygon
        surface takes over, and the widths BREATHE with the real
        flow - GloFAS daily discharge against its 92-day median
        through Leopold & Maddock's at-a-station hydraulic geometry
        (w ~ Q^0.26), so the Aare widens in flood and narrows in
        drought; railways run their real lines - beds at
        the MEASURED OSM gauge (tracks x (gauge + ballast
        shoulders)), tunnels skipped, tagged rail bridges decking
        over the rivers they span; and where a registered transit
        provider covers the view (Swiss open transport API first -
        location-scoped, never called outside its coverage), real
        trains run the lines on their real timetable: category,
        number, operator and live delay from the station board,
        positions interpolated between the stops each train
        reports at its delay-shifted times; the cable cars hang
        their real lines too - OSM aerialway ways whose nodes are
        the actual pylons, every span on the exact catenary (Newton
        on the cosh sag identity, never the parabola), cabins at
        deterministic positions; the summits carry their NAMES -
        OSM natural=peak nodes with surveyed elevations, labelled
        panorama-style ('Jungfrau · 4158 m') under the gated
        elevation-ranked declutter rule; everywhere else the
        worldwide GTFS aggregator (transitous.org) answers instead -
        every rail leg operating in the box right now, followed
        along the polyline of its ACTUAL route by arc length, with
        its published real-time times (ferries take the boats
        path) - and the PIER station's
        board does the same for the lake steamers (category BAT):
        where AIS coverage misses them the schedule floats them at
        the lake's measured level, an active AIS vessel nearby
        always winning (a measured position beats a schedule)
      - roam (just fly): the free camera streams terrain. 4 km from
        the anchor the world re-anchors on your geodetic position
        (roam.js - exact inverse mapping and altitude-datum carry,
        reference-gated), the live stream/polls/skyglow re-anchor
        with it, and the URL follows so a reload keeps the spot.
        ?roam=0 disables.

      Standalone debug overrides (query params, e.g. Horizon.html?time=...):
        lat, lon (relocate - live data still loads there), place (label),
        explore=1 (open the destination menu), time (ISO), cloud (0-100),
        wind (km/h), winddir (deg),
        gust (km/h), precip (mm), snow (cm), temp (C), dew (C), aod,
        pm25, vis (m), cloudlow/cloudmid/cloudhigh (0-100), code (WMO
        weather code), quake (magnitude), kp (0-9), aurora (0-1),
        auroralat (deg), dem=0 (skip real terrain), demtiles=URL
        (terrarium tile endpoint override), roam=0 (pin the box),
        space=URL (solar-wind endpoint override), metar=URL (aerodrome
        observation endpoint override), smoke=URL (HMS plume endpoint
        override), aerosol=URL (measured-aerosol endpoint override),
        lights=0|URL (Black Marble night lights off / tile endpoint
        override), water=0 (skip OSM lakes), buildings=0 (skip OSM
        buildings), roads=0 (skip OSM roads), landuse=0 (skip OSM
        ground cover), rivers=0 (skip OSM waterways), rails=0 (skip
        OSM railways), trains=0 (skip live trains), aerialways=0
        (skip OSM cable cars), turbines=0 (skip OSM wind
        turbines), peaks=0 (skip summit labels),
        discharge=0 (pin river widths to the ladder), snowcover=0|URL
        (measured snow off / tile endpoint override), soil=0 (pin
        bare-soil tints dry), comets=0 (skip MPC
        comets), comet=g (synthetic comet for the harness), irr=0
        (skip satellite irradiance), ghi=W (override it), debug=1,
        look=az,alt (degrees - pin the default camera's view
        direction, e.g. antisolar for a rainbow)
    -->

      import {hpScale} from './horizon/solarwind.js';

      import {

      import {buildingsGeometry, parseBuildings} from './horizon/buildings.js';

      import {

      import {

      import {

      } from './horizon/rails.js';
      import {
        BOAT_CATS,

      } from './horizon/trains.js';
      import {buildTrain} from './horizon/rollingstock.js';
      import {

      } from './horizon/aerialways.js';
      import {labelText, parsePeaks, selectPeaks} from './horizon/peaks.js';
      import {

      } from './horizon/turbines.js';
      import {buildWindmill} from './horizon/windmills.js';
      import {farmFactors} from './horizon/wakes.js';
      import {snowField, SNOW_LAYER, SNOW_Z} from './horizon/snowcover.js';
      import {lakeAt, lakeMask, parseWater} from './horizon/lakes.js';
      import {lineStrengths} from './horizon/airglow.js';
      import {fR, ZL_OMEGA} from './horizon/zodiacal.js';
      import {
        activeShowers,
        drawMagnitude,

      } from './horizon/meteors.js';
      import {CSMShadowNode} from './horizon/CSMShadowNode.js';

      const params = new URL(location.href).searchParams;
      const reduceMotion = matchMedia(
        '(prefers-reduced-motion: reduce)'
      ).matches;
      const timeScale = reduceMotion ? 0.25 : 1;

      // ---------- real time (with optional ?time= override) ----------
      const t0 = performance.now();
      const timeBase = params.has('time')
        ? new Date(params.get('time')).getTime()
        : 0;
      const now = () =>
        timeBase ? new Date(timeBase + (performance.now() - t0)) : new Date();

      // ---------- astronomy (NOAA/Almanac low-precision, ~0.1 deg) ----------
      const RAD = Math.PI / 180;
      const days2000 = (d) => d.getTime() / 86400000 - 10957.5;

      // The sun's geocentric ecliptic longitude (radians) - the same
      // NOAA low-precision series sunEquatorial builds on; the
      // zodiacal light dome is anchored to it.
      function sunEclipticLon(d) {
        const n = days2000(d);
        const L = (280.46 + 0.9856474 * n) % 360;
        const g = (357.528 + 0.9856003 * n) * RAD;
        return (L + 1.915 * Math.sin(g) + 0.02 * Math.sin(2 * g)) * RAD;
      }

      function sunEquatorial(d) {
        const lambda = sunEclipticLon(d);
        const eps = 23.439 * RAD;
        return {
          ra: Math.atan2(Math.cos(eps) * Math.sin(lambda), Math.cos(lambda)),
          dec: Math.asin(Math.sin(eps) * Math.sin(lambda))
        };
      }

      function moonEquatorial(d) {
        const n = days2000(d);
        const L = (218.316 + 13.176396 * n) * RAD;
        const M = (134.963 + 13.064993 * n) * RAD;
        const F = (93.272 + 13.22935 * n) * RAD;
        const lambda = L + 6.289 * RAD * Math.sin(M);
        const beta = 5.128 * RAD * Math.sin(F);
        const eps = 23.439 * RAD;
        return {
          ra: Math.atan2(
            Math.sin(lambda) * Math.cos(eps) - Math.tan(beta) * Math.sin(eps),
            Math.cos(lambda)
          ),
          dec: Math.asin(
            Math.sin(beta) * Math.cos(eps) +
              Math.cos(beta) * Math.sin(eps) * Math.sin(lambda)
          )
        };
      }

      // Greenwich mean sidereal time, radians.
      const gmst = (d) =>
        ((18.697374558 + 24.06570982441908 * days2000(d)) % 24) * 15 * RAD;

      // Equatorial -> local horizontal (altitude/azimuth from north, cw).
      function altAz(eq, d, lat, lon) {
        const lst = gmst(d) + lon * RAD;
        const H = lst - eq.ra;
        const phi = lat * RAD;
        const alt = Math.asin(
          Math.sin(phi) * Math.sin(eq.dec) +
            Math.cos(phi) * Math.cos(eq.dec) * Math.cos(H)
        );
        const az = Math.atan2(
          Math.sin(H),
          Math.cos(H) * Math.sin(phi) - Math.tan(eq.dec) * Math.cos(phi)
        );
        return {alt, az: az + Math.PI}; // 0 = north, clockwise via east
      }

      // Alt/az onto the sky dome. East = +x, north = -z, up = +y.
      const skyPoint = (alt, az, r) =>
        new THREE.Vector3(
          r * Math.cos(alt) * Math.sin(az),
          r * Math.sin(alt),
          -r * Math.cos(alt) * Math.cos(az)
        );

      const haversineKm = (lat1, lon1, lat2, lon2) => {
        const a =
          Math.sin(((lat2 - lat1) * RAD) / 2) ** 2 +
          Math.cos(lat1 * RAD) *
            Math.cos(lat2 * RAD) *
            Math.sin(((lon2 - lon1) * RAD) / 2) ** 2;
        return 12742 * Math.asin(Math.sqrt(a));
      };

      // ---------- state from the real world ----------
      const state = {
        lat: params.has('lat') ? +params.get('lat') : 51.48,
        lon: params.has('lon') ? +params.get('lon') : 0,
        place: params.get('place') ?? '',
        cloud: params.has('cloud') ? +params.get('cloud') : 20,
        wind: params.has('wind') ? +params.get('wind') : 8,
        precip: params.has('precip') ? +params.get('precip') : 0,
        snow: params.has('snow') ? +params.get('snow') : 0,
        temp: params.has('temp') ? +params.get('temp') : 14,
        winddir: params.has('winddir') ? +params.get('winddir') : 250,
        gust: params.has('gust') ? +params.get('gust') : 12,
        dew: params.has('dew') ? +params.get('dew') : 8,
        aod: params.has('aod') ? +params.get('aod') : 0.12,
        pm25: params.has('pm25') ? +params.get('pm25') : 6,
        cloudLow: params.has('cloudlow') ? +params.get('cloudlow') : null,
        cloudMid: params.has('cloudmid') ? +params.get('cloudmid') : null,
        cloudHigh: params.has('cloudhigh') ? +params.get('cloudhigh') : null,
        visibility: params.has('vis') ? +params.get('vis') : 30000,
        wind700: params.has('w700') ? +params.get('w700') : null,
        dir700: params.has('d700') ? +params.get('d700') : null,
        wind250: params.has('w250') ? +params.get('w250') : null,
        dir250: params.has('d250') ? +params.get('d250') : null,
        freezing: params.has('fl') ? +params.get('fl') : null,
        code: params.has('code') ? +params.get('code') : 1,
        kp: params.has('kp') ? +params.get('kp') : 0,
        auroraP: null, // OVATION oval probability 0..1, null = use Kp
        auroraLat: 68,
        hpNow: null, // OVATION hemispheric power, GW (live, 5 min)
        hpAtGrid: null, // ...as it was when the oval grid was fetched
        metar: null, // nearest fresh aerodrome observation (metar.js)
        profile: null, // measured refraction column (refraction.js)
        smoke: null, // analyst-verified wildfire plume overhead (smoke.js)
        sea: null, // measured wave partitions (marine model), null = wind sea
        shake: 0
      };
      // Pinned sea state (harness/debug): hsw/tpw/dww wind-sea Hs (m),
      // peak Tp (s), met direction; hss/tps/dws the swell partition;
      // hstot the total Hs if it differs from the two partitions.
      if (params.has('hsw') || params.has('hss')) {
        const wp = params.has('hsw')
          ? {
              hs: +params.get('hsw'),
              tp: +(params.get('tpw') ?? 6),
              dir: +(params.get('dww') ?? state.winddir)
            }
          : null;
        const sp = params.has('hss')
          ? {
              hs: +params.get('hss'),
              tp: +(params.get('tps') ?? 12),
              dir: +(params.get('dws') ?? state.winddir)
            }
          : null;
        state.sea = {
          hs: params.has('hstot')
            ? +params.get('hstot')
            : Math.hypot(wp ? wp.hs : 0, sp ? sp.hs : 0),
          wind: wp,
          swell: sp
        };
      }
      // Weather pins freeze the sky (harness/debug; the list lives in
      // explore.js - the model lives once). A pinned LOCATION is not a
      // pin on the weather: ?lat&lon (the explore system, or a hand
      // URL) still loads that place's real conditions - it only stops
      // the IP geolocation from overriding where to stand.
      const overridden = WEATHER_PINS.some((k) => params.has(k));
      // let, not const: roaming re-anchors the view away from the
      // IP location mid-session and must stop geolocation from
      // snapping it back on the next weather refresh.
      let pinnedLoc = params.has('lat') || params.has('lon');

      const caption = document.getElementById('caption');
      let captionTimer = 0;
      function say(text, sticky) {
        caption.textContent = text;
        caption.style.opacity = 1;
        clearTimeout(captionTimer);
        if (!sticky)
          captionTimer = setTimeout(() => (caption.style.opacity = 0), 12000);
      }

      // Every live data source records what it last delivered, so the
      // panel (the site's ✦ wallpaper toggle, or ?debug=1, or the D key)
      // can prove nothing here is invented.
      const sources = {};
      function record(name, value) {
        sources[name] = {value: String(value), at: Date.now()};
      }

      const WMO = {
        0: 'clear',
        1: 'mostly clear',
        2: 'partly cloudy',
        3: 'overcast',
        45: 'fog',
        48: 'rime fog',
        51: 'drizzle',
        53: 'drizzle',
        55: 'drizzle',
        61: 'light rain',
        63: 'rain',
        65: 'heavy rain',
        71: 'light snow',
        73: 'snow',
        75: 'heavy snow',
        77: 'snow grains',
        80: 'showers',
        81: 'showers',
        82: 'heavy showers',
        85: 'snow showers',
        86: 'snow showers',
        95: 'thunderstorm',
        96: 'thunderstorm',
        99: 'thunderstorm'
      };

      async function syncWeather() {
        if (overridden) return;
        if (pinnedLoc) {
          record(
            'relocated view',
            state.lat.toFixed(2) +
              ', ' +
              state.lon.toFixed(2) +
              (state.place ? ' · ' + state.place : '') +
              ' · live data for the destination'
          );
        } else {
          try {
            const geo = await (
              await fetch('https://get.geojs.io/v1/ip/geo.json', {
                credentials: 'omit'
              })
            ).json();
            state.lat = +geo.latitude;
            state.lon = +geo.longitude;
            state.place = geo.city || geo.country || '';
            record(
              'geojs.io IP location',
              state.lat.toFixed(2) +
                ', ' +
                state.lon.toFixed(2) +
                ' · ' +
                state.place
            );
          } catch {
            // Keep the Greenwich fallback.
          }
        }
        try {
          const w = await (
            await fetch(
              'https://api.open-meteo.com/v1/forecast?latitude=' +
                state.lat +
                '&longitude=' +
                state.lon +
                '&current=weather_code,cloud_cover,cloud_cover_low,cloud_cover_mid,cloud_cover_high,visibility,precipitation,snowfall,wind_speed_10m,wind_direction_10m,wind_gusts_10m,temperature_2m,dew_point_2m' +
                '&hourly=wind_speed_80m,wind_speed_120m&forecast_hours=1',
              {credentials: 'omit'}
            )
          ).json();
          const c = w.current;
          state.code = c.weather_code;
          state.cloud = c.cloud_cover;
          // the measured cover re-scales the skyglow (Kyba 2011)
          applyCloudSkyglow();
          state.cloudLow = c.cloud_cover_low;
          state.cloudMid = c.cloud_cover_mid;
          state.cloudHigh = c.cloud_cover_high;
          state.visibility = c.visibility || state.visibility;
          state.precip = c.precipitation;
          state.snow = c.snowfall;
          state.wind = c.wind_speed_10m;
          state.winddir = c.wind_direction_10m;
          state.gust = c.wind_gusts_10m;
          state.temp = c.temperature_2m;
          state.dew = c.dew_point_2m;
          // Hub-height winds for the turbines: the forecast
          // model's own 80/120 m levels (turbines.js
          // interpolates on ln z between them).
          state.wind80 = w.hourly?.wind_speed_80m?.[0] ?? null;
          state.wind120 = w.hourly?.wind_speed_120m?.[0] ?? null;
          // the measured wind re-lays the farm wakes
          applyWakes();
          record(
            'open-meteo current',
            (WMO[state.code] || state.code) +
              ' · ' +
              state.temp +
              '°C · wind ' +
              state.wind +
              ' km/h from ' +
              state.winddir +
              '° gust ' +
              state.gust +
              ' · cloud ' +
              state.cloud +
              '% · dew ' +
              state.dew +
              '°C'
          );
          say(
            (state.place ? state.place + ' · ' : '') +
              (WMO[state.code] || 'weather code ' + state.code) +
              (pinnedLoc
                ? ' · live view of this place · G to explore'
                : ' · this scene mirrors your sky and terrain')
          );
        } catch {
          say('weather unavailable · showing a calm day');
        }
        // the measured rain re-lays the bow LUT
        refreshBowLUT();
      }

      // Winds aloft and the freezing level: mid clouds ride the 700hPa
      // wind, cirrus rides the 250hPa jet, and the snowline on the peaks
      // follows the real 0°C isotherm.
      async function syncAloft() {
        if (params.has('fl') || params.has('w250')) return;
        try {
          // The full 500..50 hPa wind/height profile spans the ITU-R
          // P.1621 5-20 km slab that drives the Hufnagel-Valley
          // turbulence model (cn2.js) for the star scintillation.
          const LV = [500, 400, 300, 250, 200, 150, 100, 70, 50];
          // The refraction column (refraction.js): temperature and
          // humidity at the LOW pressure levels too - the setting
          // sun's rays live in the bottom kilometres the Cn2 slab
          // never needed. Geopotential heights for the low levels
          // only (the upper ones ride the LV request above).
          const PLV = [1000, 950, 925, 900, 850, 700, 500, 300, 200];
          const w = await (
            await fetch(
              'https://api.open-meteo.com/v1/forecast?latitude=' +
                state.lat +
                '&longitude=' +
                state.lon +
                '&hourly=wind_speed_700hPa,wind_direction_700hPa,wind_direction_250hPa,freezing_level_height,temperature_250hPa,relative_humidity_250hPa,' +
                LV.map(
                  (p) =>
                    'wind_speed_' + p + 'hPa,geopotential_height_' + p + 'hPa'
                ).join(',') +
                ',' +
                PLV.map(
                  (p) =>
                    'temperature_' + p + 'hPa,relative_humidity_' + p + 'hPa'
                ).join(',') +
                ',' +
                [1000, 950, 925, 900, 850, 700]
                  .map((p) => 'geopotential_height_' + p + 'hPa')
                  .join(',') +
                '&forecast_hours=1',
              {credentials: 'omit'}
            )
          ).json();
          const h = w.hourly;
          state.wind700 = h.wind_speed_700hPa[0];
          state.dir700 = h.wind_direction_700hPa[0];
          state.wind250 = h.wind_speed_250hPa[0];
          state.dir250 = h.wind_direction_250hPa[0];
          state.freezing = h.freezing_level_height[0];
          record(
            'open-meteo winds aloft',
            '700hPa ' +
              state.wind700 +
              ' km/h @' +
              state.dir700 +
              '° · 250hPa jet ' +
              state.wind250 +
              ' km/h @' +
              state.dir250 +
              '° · freezing level ' +
              state.freezing +
              ' m'
          );
          // Schmidt-Appleman (contrails.js): the measured 250 hPa
          // temperature and humidity decide whether contrails can
          // exist right now, and whether they persist (ice
          // supersaturation). The display's ambient traffic only
          // draws what the criterion allows.
          if (
            typeof h.temperature_250hPa?.[0] === 'number' &&
            typeof h.relative_humidity_250hPa?.[0] === 'number'
          ) {
            const t250 = h.temperature_250hPa[0];
            const rh250 = h.relative_humidity_250hPa[0];
            state.contrail = appleman(25000, t250, rh250 / 100);
            record(
              'Schmidt-Appleman contrails',
              t250.toFixed(1) +
                '°C / ' +
                rh250 +
                '% at 250 hPa → ' +
                (state.contrail.forms
                  ? state.contrail.persists
                    ? 'PERSISTENT trails (RHi ' +
                      state.contrail.rhi.toFixed(2) +
                      ')'
                    : 'short-lived trails (RHi ' +
                      state.contrail.rhi.toFixed(2) +
                      ')'
                  : 'no formation (T_LC ' +
                    state.contrail.tlc.toFixed(1) +
                    '°C)')
            );
          }
          // Heights above ground (geopotential is AMSL), speeds in
          // m/s; the RMS 5-20 km wind sets the HV profile, and the
          // profile sets the twinkle depth and rate.
          const pts = LV.map((p) => ({
            h: h['geopotential_height_' + p + 'hPa'][0] - w.elevation,
            v: h['wind_speed_' + p + 'hPa'][0] / 3.6
          })).filter((q) => Number.isFinite(q.h) && Number.isFinite(q.v));
          const v = vRms(pts);
          if (v) {
            state.cn2Scale = sigmaScale(v);
            state.cn2Rate = shadowRate(pts, v);
            record(
              'Hufnagel-Valley Cn² (winds aloft)',
              'RMS 5-20 km wind ' +
                v.toFixed(1) +
                ' m/s · sigma x' +
                state.cn2Scale.toFixed(2) +
                ' · shadow rate ' +
                state.cn2Rate.toFixed(0) +
                ' Hz'
            );
          }
          // The measured refraction column: (p, h, T, rh) triples
          // straight off the pressure levels (no hydrostatic
          // assumption at the nodes - buildProfile is gated),
          // closed at the ground by the current surface
          // temperature and dew point. Levels the model
          // extrapolates below the terrain are dropped.
          const elevM = Number.isFinite(w.elevation) ? w.elevation : 0;
          const lv = PLV.map((p) => ({
            pPa: p * 100,
            hM: h['geopotential_height_' + p + 'hPa']?.[0],
            tC: h['temperature_' + p + 'hPa']?.[0],
            rh: (h['relative_humidity_' + p + 'hPa']?.[0] ?? 0) / 100
          })).filter(
            (q) =>
              Number.isFinite(q.hM) && Number.isFinite(q.tC) && q.hM > elevM + 1
          );
          if (lv.length >= 4) {
            const rhSurf = Math.min(
              eLiq(state.dew + 273.15) / eLiq(state.temp + 273.15),
              1
            );
            state.profile = buildProfile(lv, {
              hM: elevM,
              tC: state.temp,
              rh: rhSurf
            });
            record(
              'refraction column (pressure levels)',
              lv.length +
                ' measured levels to ' +
                Math.round(lv[lv.length - 1].hM / 1000) +
                ' km · surface ' +
                state.temp +
                '°C rh ' +
                (rhSurf * 100).toFixed(0) +
                '%'
            );
          }
        } catch {
          // Layers fall back to the surface wind.
        }
      }

      // Real aerosols: the scattering sky's turbidity and the haze come
      // from measured air quality, not guesses.
      async function syncAir() {
        if (params.has('aod') || params.has('pm25')) return;
        try {
          const a = await (
            await fetch(
              'https://air-quality-api.open-meteo.com/v1/air-quality?latitude=' +
                state.lat +
                '&longitude=' +
                state.lon +
                '&current=aerosol_optical_depth,pm2_5',
              {credentials: 'omit'}
            )
          ).json();
          state.aod = a.current.aerosol_optical_depth ?? state.aod;
          state.pm25 = a.current.pm2_5 ?? state.pm25;
          record(
            'open-meteo air quality',
            'AOD ' + state.aod + ' · PM2.5 ' + state.pm25 + ' µg/m³'
          );
        } catch {
          // Keep the temperate defaults.
        }
      }

      // The real sea: measured wave partitions from the marine model
      // (ECMWF WAM under open-meteo) - wind sea and swell each with
      // significant height, PEAK period and direction - drive the FFT
      // spectrum as a measured two-peak composition. Over land the
      // partitions come back null and the fetch-limited wind-sea
      // prediction stands (same spectrum builder, no data - predict).
      const seaDirRad = (deg) => {
        // Met convention: waves come FROM deg; the spectrum wants the
        // world-XZ math angle they travel TOWARD (same convention as
        // dirOf for the wind).
        const a = (deg + 180) * RAD;
        return Math.atan2(-Math.cos(a), Math.sin(a));
      };
      function seaParts() {
        if (!state.sea) return null;
        const parts = [];
        const w = state.sea.wind;
        const s = state.sea.swell;
        if (w && w.hs > 0.01 && w.tp > 0.5) {
          parts.push({
            hs: w.hs,
            tp: w.tp,
            dir: seaDirRad(w.dir),
            U10: Math.max(state.wind / 3.6, 1)
          });
        }
        if (s && s.hs > 0.01 && s.tp > 0.5) {
          parts.push({hs: s.hs, tp: s.tp, dir: seaDirRad(s.dir)});
        }
        return parts.length ? parts : null;
      }
      // Geomagnetic frame at the visitor (IGRF-14, igrf.js):
      // declination steers the aurora curtain azimuth, geomagnetic
      // latitude organises the Kp oval fallback. Pure computation -
      // refresh whenever the location may have moved.
      function syncGeomag() {
        const year = Date.now() / 31557600000 + 1970; // decimal year
        const f = igrfField(state.lat, state.lon, 0, year);
        state.magD = f.d;
        state.magI = f.i;
        state.gmLat = geomagneticLatitude(state.lat, state.lon, year);
        // Field-aligned rays: the curtain shader fans its rays
        // toward the magnetic zenith with tan|I|.
        auroraU.uTanI.value = Math.max(Math.tan(Math.abs(f.i) * RAD), 0.5);
        record(
          'IGRF-14 geomagnetism',
          'declination ' +
            f.d.toFixed(1) +
            '° · inclination ' +
            f.i.toFixed(1) +
            '° · geomagnetic lat ' +
            state.gmLat.toFixed(1) +
            '°'
        );
      }

      async function syncMarine() {
        // Pinned sea, or pinned weather (a live sea would contradict
        // the pinned wind): keep what the URL says.
        if (params.has('hsw') || params.has('hss') || overridden) return;
        try {
          const m = await (
            await fetch(
              'https://marine-api.open-meteo.com/v1/marine?latitude=' +
                state.lat +
                '&longitude=' +
                state.lon +
                '&current=wave_height,wind_wave_height,wind_wave_peak_period,wind_wave_direction,swell_wave_height,swell_wave_peak_period,swell_wave_direction,sea_level_height_msl',
              {credentials: 'omit'}
            )
          ).json();
          const c = m.current;
          // The MEASURED tide (sea level vs MSL, tides + surge):
          // lifts the water plane through the same asinh world
          // mapping the terrain uses and deepens/shoals the surf
          // zone's true depth. Independent of the wave fields -
          // a flat calm still has a tide.
          if (c && typeof c.sea_level_height_msl === 'number') {
            state.tide = c.sea_level_height_msl;
            record(
              'open-meteo tide',
              'sea level ' + c.sea_level_height_msl.toFixed(2) + ' m vs MSL'
            );
          }
          if (c && (c.wind_wave_height || c.swell_wave_height)) {
            state.sea = {
              hs: c.wave_height,
              wind: {
                hs: c.wind_wave_height,
                tp: c.wind_wave_peak_period,
                dir: c.wind_wave_direction
              },
              swell: {
                hs: c.swell_wave_height,
                tp: c.swell_wave_peak_period,
                dir: c.swell_wave_direction
              }
            };
            record(
              'open-meteo marine',
              'Hs ' +
                c.wave_height +
                ' m · wind sea ' +
                c.wind_wave_height +
                ' m @' +
                c.wind_wave_peak_period +
                ' s · swell ' +
                c.swell_wave_height +
                ' m @' +
                c.swell_wave_peak_period +
                ' s from ' +
                c.swell_wave_direction +
                '°'
            );
          } else {
            state.sea = null;
          }
        } catch {
          // Keep the wind-sea prediction.
        }
      }

      // MEASURED precipitation: the latest RainViewer radar composite
      // decoded at the visitor (radar.js - their black-and-white dBZ
      // tile scheme; Marshall & Palmer 1948 Z-R for rain, Sekhon &
      // Srivastava 1970 for the snow-flagged pixels). Radar is a
      // measurement with ~10-minute latency; when fresh it replaces
      // the model's point value. No coverage or offline: the model
      // stands silently.
      let radarObs = null; // {rain, snow, coverage, snowFrac, time}
      async function syncRadar() {
        if (overridden) return;
        try {
          const cat = await (
            await fetch('https://api.rainviewer.com/public/weather-maps.json', {
              credentials: 'omit'
            })
          ).json();
          const frames = cat.radar && cat.radar.past;
          if (!frames || !frames.length) return;
          const f = frames[frames.length - 1];
          const {tx, ty, px, py} = tileAt(state.lat, state.lon, 8);
          const img = new Image();
          img.crossOrigin = 'anonymous';
          img.src =
            cat.host + f.path + '/256/8/' + tx + '/' + ty + '/0/0_0.png';
          await img.decode();
          const cv = document.createElement('canvas');
          cv.width = cv.height = 256;
          const cx = cv.getContext('2d', {willReadFrequently: true});
          cx.drawImage(img, 0, 0);
          const data = cx.getImageData(0, 0, 256, 256).data;
          // window sized to the 16 km world footprint
          const h = Math.max(
            Math.round(8000 / metresPerPixel(state.lat, 8)),
            1
          );
          const s = windowStats(data, px, py, h);
          radarObs = {...s, time: f.time * 1000};
          // The measured coverage field for the cloud decks (the
          // Nubis weather map, from data): precip at a texel means
          // cloud overhead - map the local rate onto a coverage
          // value with the drizzle floor as threshold. Zero border
          // ring so the field fades at the world edge.
          const RM = 64;
          const field = new Float32Array(RM * RM * 4);
          const mppScene = metresPerPixel(state.lat, 8) / MPU;
          for (let jj = 0; jj < RM; jj++) {
            for (let ii = 0; ii < RM; ii++) {
              const k = (jj * RM + ii) * 4;
              field[k + 3] = 1;
              if (ii === 0 || jj === 0 || ii === RM - 1 || jj === RM - 1)
                continue;
              const xs = ((ii + 0.5) / RM - 0.5) * WORLD; // scene units
              const zs = ((jj + 0.5) / RM - 0.5) * WORLD;
              const pi = Math.round(px + xs / mppScene);
              const pj = Math.round(py + zs / mppScene);
              if (pi < 0 || pi > 255 || pj < 0 || pj > 255) continue;
              const kk = (pj * 256 + pi) * 4;
              if (data[kk + 3] === 0) continue;
              const dec = decodeRed(data[kk]);
              const rate = dec.snow ? snowRate(dec.dbz) : rainRate(dec.dbz);
              // >0.05 mm/h (below drizzle nothing shows on radar
              // reliably); saturate toward 0.95 local cover by 1 mm/h
              field[k] = 0.95 * THREE.MathUtils.smoothstep(rate, 0.05, 1.0);
            }
          }
          radarObs.field = field;
          radarObs.fieldSize = RM;
          if (cloudSys) cloudSys.setRadarCover(field, RM, WORLD);
          record(
            'RainViewer radar',
            (s.coverage > 0.05
              ? 'rain ' +
                s.rain.toFixed(2) +
                ' mm/h · snow ' +
                s.snow.toFixed(2) +
                ' mm/h liq · ' +
                Math.round(s.snowFrac * 100) +
                '% snow px'
              : 'no radar coverage here') +
              ' · ' +
              Math.round((Date.now() - radarObs.time) / 60000) +
              ' min old'
          );
        } catch {
          // Keep the model's precipitation.
        }
      }

      // Real forests: OSM wood/forest polygons around the visitor decide
      // where trees stand (scene-space polygons, cached per location).
      // OSM wood polygons, stored GEODETIC ([lat, lon] rings) so a
      // roam re-anchor cannot orphan them; placeTrees() projects
      // them onto whatever box is current (forestScene).
      let forestGeo = null;
      let forestScene = null;
      async function syncForests() {
        const key =
          'horizon-forest-geo-' +
          state.lat.toFixed(2) +
          ',' +
          state.lon.toFixed(2);
        try {
          const hit = localStorage.getItem(key);
          if (hit) {
            forestGeo = JSON.parse(hit);
            record(
              'OSM Overpass forests (cached)',
              forestGeo.length + ' wood polygons'
            );
            if (worldBuilt) placeTrees();
            return;
          }
        } catch {}
        try {
          const mLat = 111320;
          const mLon = Math.max(111320 * Math.cos(state.lat * RAD), 1e-6);
          const dLat = DEM_HALF_M / mLat;
          const dLon = DEM_HALF_M / mLon;
          const bbox =
            (state.lat - dLat).toFixed(4) +
            ',' +
            (state.lon - dLon).toFixed(4) +
            ',' +
            (state.lat + dLat).toFixed(4) +
            ',' +
            (state.lon + dLon).toFixed(4);
          const q =
            '[out:json][timeout:25];(way[natural=wood](' +

      async function syncSoil() {
        if (params.get('soil') === '0') return;

          const j = await (
            await fetch(

          ).json();
          const times = (j.hourly && j.hourly.time) || [];
          const vals = (j.hourly && j.hourly.soil_moisture_0_to_1cm) || [];
          const hour = new Date().toISOString().slice(0, 13) + ':00';
          let i = times.indexOf(hour);
          if (i < 0) i = 0;
          const v = vals[i];
          soilTheta = Number.isFinite(v) ? v : null;
          if (soilTheta != null) {

              'ERA5 topsoil moisture',

      // MEASURED snow cover: the freezing-level snowline was the
      // theme's oldest surviving heuristic. GIBS serves the daily
      // MODIS NDSI snow product over the same keyless WMTS as the
      // Black Marble lights; snowcover.js (gated) inverts the
      // published colormap verbatim and turns NDSI into fractional
      // cover through the Salomonson & Appel (2004) regression.
      // Where the satellite saw ground the measurement drives the
      // terrain's snow; under cloud/night the heuristic stands.
      // ?snowcover=0 keeps the heuristic everywhere.
      const SNOW_TILES =
        params.get('snowcover') ??
        'https://gibs.earthdata.nasa.gov/wmts/epsg3857/best/' +
          SNOW_LAYER +
          '/default/{d}/GoogleMapsCompatible_Level8/{z}/{r}/{c}.png';
      let snowCovSeq = 0;
      async function syncSnowCover() {
        if (params.get('snowcover') === '0' || !terrainObj) return;
        const seq = ++snowCovSeq;
        try {
          const anchor = {lat: state.lat, lon: state.lon};
          const need = new Map();
          for (const [sx, sz] of [
            [-1, -1],
            [1, -1],
            [-1, 1],
            [1, 1]
          ]) {
            const g = sceneToGeo((sx * WORLD) / 2, (sz * WORLD) / 2, anchor);
            const p = pixelOf(g.lat, g.lon, SNOW_Z);
            const c = Math.floor(p.px / 256);
            const r = Math.floor(p.py / 256);
            need.set(r + '/' + c, [r, c]);
          }
          // Terra passes in the morning; the product publishes a
          // day or so behind - newest available day wins.
          let imgs = null;
          let day = '';
          for (let back = 1; back <= 8 && !imgs; back++) {
            const d = new Date(Date.now() - back * 86400e3)
              .toISOString()
              .slice(0, 10);
            try {
              const loaded = await Promise.all(
                [...need.values()].map(([r, c]) => {
                  const img = new Image();
                  img.crossOrigin = 'anonymous';
                  img.src = SNOW_TILES.replace('{d}', d)
                    .replace('{z}', SNOW_Z)
                    .replace('{r}', r)
                    .replace('{c}', c);
                  return img.decode().then(() => img);
                })
              );
              imgs = new Map([...need.keys()].map((k, i) => [k, loaded[i]]));
              day = d;
            } catch {
              // that day not published - go older
            }
          }
          if (!imgs || seq !== snowCovSeq) return;
          const px = new Map();
          for (const [k, img] of imgs) {
            const cv = document.createElement('canvas');
            cv.width = cv.height = 256;
            const cx = cv.getContext('2d', {willReadFrequently: true});
            cx.drawImage(img, 0, 0);
            px.set(k, cx.getImageData(0, 0, 256, 256).data);
          }
          const pxAt = (ix, iy) => {
            const d = px.get(Math.floor(iy / 256) + '/' + Math.floor(ix / 256));
            if (!d) return null;
            const o = ((iy & 255) * 256 + (ix & 255)) * 4;
            return [d[o], d[o + 1], d[o + 2], d[o + 3]];
          };
          const N = 96;
          const f = snowField(pxAt, anchor, WORLD, N);
          const tex = new THREE.DataTexture(
            f.data,
            N,
            N,
            THREE.RedFormat,
            THREE.FloatType
          );
          tex.minFilter = tex.magFilter = THREE.NearestFilter;
          tex.needsUpdate = true;
          const old = terrainObj.snowTexNode.value;
          terrainObj.snowTexNode.value = tex;
          if (old && old.image && old.image.width > 1) old.dispose();
          terrainUniforms.uSnowCovOn.value = 1;
          // The town's roofs read the SAME measured field - re-seat
          // the buildings so their snow attribute picks it up.
          bldSnowAt = (x, z) => {
            const gi = Math.round((x / WORLD + 0.5) * N - 0.5);
            const gj = Math.round((0.5 - z / WORLD) * N - 0.5);
            if (gi < 0 || gi >= N || gj < 0 || gj >= N) return 0;
            const v = f.data[gj * N + gi];
            return v > 0 ? v : 0;
          };
          if (worldBuilt) placeBuildings();
          record(
            'MODIS NDSI snow cover ' + day,
            Math.round(f.known * 100) +
              '% of the box seen · mean cover ' +
              Math.round(f.snowy * 100) +
              '% there · Salomonson-Appel FSC'
          );
        } catch (e) {
          // The heuristic snowline stands - the truthful fallback.
          if (params.has('debug')) console.warn('snowcover: ' + e.message);
        }
      }

      // Measured river flow: GloFAS (Open-Meteo Flood API, keyless,

          const finite = series.filter((v) => Number.isFinite(v) && v > 0);
          const qNow = finite[finite.length - 1];
          const qRef = refDischarge(series);
          const factor = dischargeFactor(qNow, qRef);
          riverFlow = {qNow, qRef, factor};
          record(
            'GloFAS river discharge',
            qRef == null
              ? 'record too short - ladder widths stand'
              : qNow.toFixed(1) +

                  factor.toFixed(2) +

          );

        } catch (e) {
          riverFlow = null; // ladder widths stand - nothing invented
          if (params.has('debug')) console.warn('discharge: ' + e.message);
        }

      // Real cable cars: OSM way[aerialway] via the same mirrors -

      // Wind turbines (power=generator + generator:source=wind):

      // Real trains on the real timetable: where a REGISTERED
      // transit provider covers the view (trains.js PROVIDERS -
      // location-scoped, an out-of-scope provider is never even
      // called), the nearest station's live board drives trains
      // with their real metadata: category, number, operator,
      // real-time delay. Positions are the timetable's own fixes -
      // interpolated between the stops each train reports, at its
      // delay-shifted times - the AIS ships' dead-reckoning
      // honesty on rails. ?trains=0 disables.
      let trainJourneys = [];
      let boatJourneys = [];
      const trainPool = new Map(); // journey key -> consist group
      const boatPool = new Map(); // sailing key -> vessel group
      let trainMats = null;
      let trainsSeq = 0;
      async function syncTrains() {
        if (params.get('trains') === '0') return;
        const prov = providerFor(state.lat, state.lon);
        if (!prov) return; // outside every provider's scope: no call
        const seq = ++trainsSeq;
        try {
          if (prov.kind === 'trips') {
            // The worldwide aggregator: ONE box query around the
            // view - every rail leg operating right now with its
            // real-time times and the polyline of its actual
            // route, which trainAt follows by arc length. FERRY
            // legs take the boats path.
            const legs = await (
              await fetch(prov.tripsURL(state.lat, state.lon, Date.now()), {
                credentials: 'omit'
              })
            ).json();
            if (seq !== trainsSeq) return;
            const all = parseTrips(legs);
            trainJourneys = all.filter((j) => j.cat !== 'BAT');
            boatJourneys = all.filter((j) => j.cat === 'BAT');
            const rt = trainJourneys.filter((j) => j.realTime).length;
            const first = trainJourneys[0];
            record(
              prov.name + ' map trips',
              trainJourneys.length +
                ' rail legs (' +
                rt +
                ' real-time)' +
                (boatJourneys.length
                  ? ' · ' + boatJourneys.length + ' ferries'
                  : '') +
                (first ? ' · ' + first.label + ' → ' + first.to : '')
            );
            return;
          }
          if (prov.kind === 'radar') {
            // The HAFAS radar: every vehicle MOVING in the box
            // right now, with its line's real metadata and its
            // realtime-adjusted stopovers - actual tracking.
            // Ferries take the boats path; buses never parse.
            const frame = await (
              await fetch(prov.radarURL(state.lat, state.lon), {
                credentials: 'omit'
              })
            ).json();
            if (seq !== trainsSeq) return;
            const all = parseRadar(frame);
            trainJourneys = all.filter((j) => !BOAT_CATS.has(j.cat));
            boatJourneys = all.filter((j) => BOAT_CATS.has(j.cat));
            const first = trainJourneys[0];
            record(
              prov.name + ' radar',
              trainJourneys.length +
                ' vehicles tracked' +
                (boatJourneys.length
                  ? ' \u00b7 ' + boatJourneys.length + ' ferries'
                  : '') +
                (first
                  ? ' \u00b7 ' +
                    first.label +
                    ' \u2192 ' +
                    first.to +
                    (first.operator ? ' (' + first.operator + ')' : '')
                  : '')
            );
            return;
          }
          const loc = await (
            await fetch(prov.locationsURL(state.lat, state.lon), {
              credentials: 'omit'
            })
          ).json();
          const stations = ((loc && loc.stations) || []).filter(
            (s) => s.id && s.coordinate && Number.isFinite(s.coordinate.x)
          );
          // ONE locations call names both worlds: the nearest rail
          // station and - where one exists - the nearest PIER (the
          // lake sailings live on its board as category BAT).
          const st = stations.find((s) => s.icon === 'train') || stations[0];
          const pier = stations.find((s) => s.icon === 'ship');
          if (!st || seq !== trainsSeq) return;
          const board = await (
            await fetch(prov.boardURL(st.id), {credentials: 'omit'})
          ).json();
          if (seq !== trainsSeq) return;
          trainJourneys = parseBoard(board);
          const first = trainJourneys[0];
          record(
            prov.name + ' station board',
            (st.name || '?') +
              ' · ' +
              trainJourneys.length +
              ' departures' +
              (first
                ? ' · next ' +
                  first.label +
                  ' → ' +
                  first.to +
                  ' (' +
                  first.operator +
                  ')'
                : '')
          );
          if (pier) {
            const seaBoard = await (
              await fetch(prov.boardURL(pier.id), {credentials: 'omit'})
            ).json();
            if (seq !== trainsSeq) return;
            boatJourneys = parseBoard(seaBoard, BOAT_CATS);
            const b0 = boatJourneys[0];
            if (boatJourneys.length)
              record(
                prov.name + ' pier board',
                (pier.name || '?') +
                  ' · ' +
                  boatJourneys.length +
                  ' sailings' +
                  (b0
                    ? ' · next ' +
                      b0.label +
                      ' → ' +
                      b0.to +
                      ' (' +
                      b0.operator +
                      ')'
                    : '')
              );
          }
        } catch (e) {
          // No board, no trains - the truthful default.
          if (params.has('debug')) console.warn('trains: ' + e.message);
        }
      }

      // Surface BRDF: the visitor pixel's own multi-angular MODIS
      // reflectance record (MOD09A1 8-day surface reflectance with
      // per-composite sun/view geometry, ORNL subset REST API, 60
      // composites = ~16 months of Terra cross-track sampling - the
      // archetype papers fit multi-year records per location)
      // selects one of the six global RTLSR BRDF archetypes (Zhang,
      // Jiao et al. 2016) by the published minimum-fitting-error
      // rule (Jiao et al. 2014). The terrain's vegetation then
      // carries that archetype's Ross-Li anisotropy: hotspot
      // brightening opposite the sun, shadow-driven darkening into
      // it. Too few strictly-clear looks (ocean, polar night,
      // persistent cloud - the state-word QC keeps only cloud-,
      // shadow-, snow- and heavy-aerosol-free land) leaves the
      // grass Lambertian, and says so.
      async function syncBrdf() {
        const key =
          'horizon-brdf-' + state.lat.toFixed(2) + ',' + state.lon.toFixed(2);
        const apply = (fit, n, cached) => {
          const w = ARCHETYPES.red[fit.k];
          terrainUniforms.uRossW.value.set(w.iso, w.vol, w.geo);
          terrainUniforms.uRossOn.value = 1;
          record(
            'MODIS MOD09A1 BRDF' + (cached ? ' (cached)' : ''),
            'archetype A' +
              (fit.k + 1) +
              ' red, ' +
              n +
              ' clear obs, rmse ' +
              fit.rmse.toFixed(4)
          );
        };
        // Debug override (the harness page is offline): ?brdf=N pins
        // archetype A_N directly, N in 1..6.
        if (params.has('brdf')) {
          const k = THREE.MathUtils.clamp((+params.get('brdf') || 1) - 1, 0, 5);
          apply({k, rmse: 0}, 0, false);
          return;
        }
        try {
          const hit = JSON.parse(localStorage.getItem(key));
          // One MOD09A1 compositing period is 8 days.
          if (hit && Date.now() - hit.t < 8 * 864e5) {
            apply(hit.fit, hit.n, true);
            return;
          }
        } catch {}
        try {
          const base = 'https://modis.ornl.gov/rst/api/v1/MOD09A1';
          const q = 'latitude=' + state.lat + '&longitude=' + state.lon;
          const dr = await (
            await fetch(base + '/dates?' + q, {credentials: 'omit'})
          ).json();
          if (!Array.isArray(dr.dates)) return;
          const md = dr.dates.map((d) => d.modis_date).slice(-60);
          const obs = [];
          // The subset endpoint caps one request at 10 composites.
          for (let i = 0; i < md.length; i += 10) {
            const span =
              '&startDate=' +
              md[i] +
              '&endDate=' +
              md[Math.min(i + 9, md.length - 1)];
            const rs = await Promise.all(
              ['b01', 'szen', 'vzen', 'raz', 'state_500m'].map((b) =>
                fetch(
                  base +
                    '/subset?' +
                    q +
                    '&band=sur_refl_' +
                    b +
                    span +
                    '&kmAboveBelow=0&kmLeftRight=0',
                  {credentials: 'omit'}
                ).then((r) => r.json())
              )
            );
            for (let j = 0; j < rs[0].subset.length; j++) {
              const [r, sz, vz, ra, st] = rs.map((x) => x.subset[j].data[0]);
              const refl = r * 1e-4; // stored scale 0.0001
              if (!mod09Clear(st) || refl <= 0 || refl > 1) continue;
              obs.push({
                r: refl,
                ti: sz * 0.01 * RAD, // angles stored in 0.01 deg
                tv: vz * 0.01 * RAD,
                phi: ra * 0.01 * RAD
              });
            }
          }
          const fit = fitArchetype(obs, 'red');
          if (!fit) {
            // Too few clear looks: Lambertian stays - and the panel
            // proves the source was consulted, not skipped.
            record(
              'MODIS MOD09A1 BRDF',
              obs.length + ' clear obs of 60 - Lambertian fallback'
            );
            return;
          }
          apply(fit, obs.length, false);
          try {
            localStorage.setItem(
              key,
              JSON.stringify({t: Date.now(), fit, n: obs.length})
            );
          } catch {}
        } catch {
          // Lambertian grass stays.
        }
      }

      function inForest(x, z) {
        if (!forestScene || !forestScene.length) return true;
        for (const poly of forestScene) {
          let inside = false;
          for (let i = 0, j = poly.length - 1; i < poly.length; j = i++) {
            const xi = poly[i][0];
            const zi = poly[i][1];
            const xj = poly[j][0];
            const zj = poly[j][1];
            if (
              zi > z !== zj > z &&
              x < ((xj - xi) * (z - zi)) / (zj - zi) + xi
            )
              inside = !inside;
          }
          if (inside) return true;
        }
        return false;
      }

      // Solar 10.7 cm radio flux (NOAA SWPC): drives the airglow
      // line intensities via PALACE Eq. 1. PALACE regressed on
      // centred 27-day averages; live we take the trailing 27-day
      // mean of the SWPC feed (~3 reports/day, newest first).
      async function syncF107() {
        if (params.has('f107')) {
          airglowU.uLineI.value.fromArray(lineStrengths(+params.get('f107')));
          return;
        }
        try {
          const rows = await (
            await fetch(
              'https://services.swpc.noaa.gov/json/f107_cm_flux.json',
              {credentials: 'omit'}
            )
          ).json();
          const fs = rows
            .slice(0, 81)
            .map((r) => +r.flux)
            .filter((f) => f > 0);
          if (!fs.length) return;
          const srf = fs.reduce((a, b) => a + b, 0) / fs.length;
          state.f107 = srf;
          airglowU.uLineI.value.fromArray(lineStrengths(srf));
          record(
            'NOAA SWPC F10.7',
            srf.toFixed(0) +
              ' sfu (27-day mean) · airglow lines x' +
              (1 + 0.00754 * (srf - 100)).toFixed(2)
          );
        } catch {
          // The 100 sfu PALACE reference intensities stay.
        }
      }

      async function syncKp() {
        if (params.has('kp')) return;
        try {
          const rows = await (
            await fetch(
              'https://services.swpc.noaa.gov/json/planetary_k_index_1m.json',
              {credentials: 'omit'}
            )
          ).json();
          state.kp = +rows[rows.length - 1].estimated_kp || 0;
          record('NOAA SWPC planetary K-index', state.kp.toFixed(2));
        } catch {
          state.kp = 0;
        }
      }

      // NOAA's OVATION model: the actual forecast auroral oval. We take
      // the strongest probability near our meridian on our hemisphere,
      // and where it sits decides the curtain's true elevation in the
      // sky (overhead if the oval reaches our latitude).
      async function syncOvation() {
        if (params.has('aurora')) {
          state.auroraP = +params.get('aurora');
          state.auroraLat = params.has('auroralat')
            ? +params.get('auroralat')
            : state.lat + 6;
          return;
        }
        try {
          const o = await (
            await fetch(
              'https://services.swpc.noaa.gov/json/ovation_aurora_latest.json',
              {credentials: 'omit'}
            )
          ).json();
          const myLon = ((state.lon % 360) + 360) % 360;
          const south = state.lat < 0;
          let best = 0;
          let bestLat = south ? -68 : 68;
          for (const [lon, la, val] of o.coordinates) {
            if (south ? la > -40 : la < 40) continue;
            let dl = Math.abs(lon - myLon);
            if (dl > 180) dl = 360 - dl;
            if (dl > 3) continue;
            if (val > best) {
              best = val;
              bestLat = la;
            }
          }
          state.auroraP = best / 100;
          state.auroraLat = bestLat;
          // Rebase the live hemispheric-power scaling: this grid
          // embodies HP as of NOW, so the ratio restarts at 1.
          state.hpAtGrid = state.hpNow;
          record(
            'NOAA OVATION aurora oval',
            best + '% at lat ' + bestLat + '° on this meridian'
          );
        } catch {
          state.auroraP = null; // fall back to the Kp heuristic
        }
      }

      // The aurora's driver, measured 1.5 million km upwind:
      // DSCOVR/ACE at L1 via the horizon-live daemon (/solarwind
      // + the `space` stream event) - solar wind speed and IMF
      // By/Bz already propagated to the bow shock by SWPC, the
      // Newell 2007 coupling computed by the gated solarwind.js,
      // and OVATION's hemispheric power (GW, 5-minute cadence).
      // Between 30-minute oval refreshes the curtain scales by
      // HP(now)/HP(at grid) - emission is linear in precipitating
      // power for a fixed spectrum (Rees 1989 ch. 3), and this is
      // the measured evolution of the SAME model that draws the
      // oval. The propagated time is a real physical lead: the
      // panel can say what the sky will do before it does it.
      const SPACE_PROXY =
        params.get('space') ?? 'https://api.ndev.tk/solarwind';
      function applySpace(j) {
        if (j.hp) {
          state.hpNow = state.lat < 0 ? j.hp.south : j.hp.north;
          record(
            'OVATION hemispheric power',
            j.hp.north +
              ' GW N / ' +
              j.hp.south +
              ' GW S' +
              (state.hpAtGrid
                ? ' · curtain ×' +
                  hpScale(state.hpNow, state.hpAtGrid).toFixed(2) +
                  ' since the oval grid'
                : '')
          );
        }
        if (j.wind) {
          const lead = (Date.parse(j.wind.propagatedTime) - Date.now()) / 60000;
          record(
            'DSCOVR/ACE solar wind (L1)',
            j.wind.speed.toFixed(0) +
              ' km/s · Bz ' +
              (j.wind.bz > 0 ? '+' : '') +
              j.wind.bz.toFixed(1) +
              ' nT · Newell coupling ' +
              Math.round(j.wind.coupling) +
              (Number.isFinite(lead) && lead > 0
                ? ' · strikes the magnetosphere in ' + lead.toFixed(0) + ' min'
                : ' · driving the magnetosphere now')
          );
        }
      }
      async function syncSpace() {
        try {
          const j = await (
            await fetch(SPACE_PROXY, {credentials: 'omit'})
          ).json();
          applySpace(j);
        } catch {
          // Stream event or the next poll refreshes it.
        }
      }

      // Aerodrome observations: the nearest fresh METAR is a
      // MEASUREMENT of the sky - ceilometer cloud bases, layer
      // covers, transmissometer visibility - and it outranks the
      // model where it can see (the same rule the radar layer
      // follows). Scope is deliberate: METAR governs the LOW
      // etage (measured deck base + cover) and the visibility;
      // automated ceilometers are blind above a few km, so the
      // mid and high decks stay with the model. Via the daemon
      // (/metar - aviationweather.gov sends no CORS header).
      const METAR_PROXY = params.get('metar') ?? 'https://api.ndev.tk/metar';
      async function syncMetar() {
        if (overridden) return;
        try {
          const r = await (
            await fetch(
              METAR_PROXY +
                '?lat=' +
                state.lat.toFixed(3) +
                '&lon=' +
                state.lon.toFixed(3),
              {credentials: 'omit'}
            )
          ).json();
          const s = pickStation(
            r.metars,
            state.lat,
            state.lon,
            Date.now() / 1000
          );
          if (!s) {
            state.metar = null;
            return;
          }
          const e = etageCovers(s.clouds);
          state.metar = {
            at: Date.now(),
            id: s.id,
            km: s.km,
            low: e.low,
            baseM: e.baseM,
            visM: visibilityM(s.visib),
            wx: s.wx
          };
          record(
            'METAR ' + s.id + ' (' + s.km.toFixed(0) + ' km)',
            (s.cover ?? 'sky') +
              (e.baseM !== null
                ? ' · measured base ' + Math.round(e.baseM) + ' m'
                : '') +
              (state.metar.visM !== null
                ? ' · vis ' + (state.metar.visM / 1000).toFixed(1) + ' km'
                : '') +
              (s.wx ? ' · ' + s.wx : '')
          );
        } catch {
          // The model stands.
        }
      }

      // Measured aerosol RADIATIVE properties: GEFS-Aerosols
      // (NOAA's operational GOCART coupling) publishes, per
      // 0.25-deg cell, total optical thickness at five optical
      // bands, scattering optical thickness, single-scattering
      // albedo, asymmetry, and the dust/sea-salt/sulphate/
      // organic/black-carbon split. The daemon decodes the NOMADS
      // GRIB2 subset (gated grib2.js) and the gated aerosol.js
      // turns it into the sky's per-channel Mie coefficients -
      // the one gray knob (total AOD) becomes measured spectral
      // extinction, measured albedo and measured phase asymmetry.
      const AEROSOL_PROXY =
        params.get('aerosol') ?? 'https://api.ndev.tk/aerosol';
      async function syncAerosol() {
        if (overridden || params.has('aod')) return;
        try {
          const r = await (
            await fetch(
              AEROSOL_PROXY +
                '?lat=' +
                state.lat.toFixed(3) +
                '&lon=' +
                state.lon.toFixed(3),
              {credentials: 'omit'}
            )
          ).json();
          if (!r.products) return;
          const set = channelSet(r.products);
          state.aerosol = {at: Date.now(), set, cycle: r.cycle, fhr: r.fhr};
          const f = set.fractions;
          const pct = (k) => Math.round((f[k] ?? 0) * 100);
          record(
            'GEFS-Aerosols ' + r.cycle.slice(0, 13) + 'z+' + r.fhr,
            'tau550 ' +
              set.tau[1].toFixed(3) +
              ' · SSA ' +
              set.ssa[1].toFixed(2) +
              ' · g ' +
              set.g.toFixed(2) +
              ' · du/ss/su/om/bc ' +
              pct('dust') +
              '/' +
              pct('seaSalt') +
              '/' +
              pct('sulfate') +
              '/' +
              pct('organic') +
              '/' +
              pct('blackCarbon') +
              '%'
          );
        } catch {
          // The CAMS total AOD stands.
        }
      }

      // The ground under the skyglow: NASA Black Marble measured
      // night lights (VNP46A2 - daily, gap-filled, BRDF-corrected,
      // moonlight-removed; Roman et al. 2018). The Falchi atlas
      // the SKY already uses is derived from these very DNB
      // radiances - this puts the source on the ground, so the
      // valley towns glow exactly where the sky above them does.
      // GIBS WMTS serves the tiles keyless with CORS *, and the
      // published colormap inverts to CALIBRATED radiance
      // (nightlights.js, gated) - town brightness is measured and
      // linear, not painted. ?lights=0 disables, ?lights=URL
      // overrides the tile endpoint ({d}/{z}/{r}/{c}).
      const LIGHTS_TILES =
        params.get('lights') ??
        'https://gibs.earthdata.nasa.gov/wmts/epsg3857/best/' +
          NL_LAYER +
          '/default/{d}/GoogleMapsCompatible_Level8/{z}/{r}/{c}.png';
      let lightsSeq = 0;
      let lampPts = null;
      let lampMat = null;
      let lampNightU = null;
      async function syncLights() {
        if (params.get('lights') === '0' || !terrainObj) return;
        const seq = ++lightsSeq; // a roam hop restarts the fetch
        try {
          const anchor = {lat: state.lat, lon: state.lon};
          const need = new Map();
          for (const [sx, sz] of [
            [-1, -1],
            [1, -1],
            [-1, 1],
            [1, 1]
          ]) {
            const g = sceneToGeo((sx * WORLD) / 2, (sz * WORLD) / 2, anchor);
            const p = pixelOf(g.lat, g.lon);
            const c = Math.floor(p.px / 256);
            const r = Math.floor(p.py / 256);
            need.set(r + '/' + c, [r, c]);
          }
          // The daily product publishes a couple of days behind -
          // newest available day wins.
          let imgs = null;
          let day = '';
          for (let back = 2; back <= 8 && !imgs; back++) {
            const d = new Date(Date.now() - back * 86400e3)
              .toISOString()
              .slice(0, 10);
            try {
              const loaded = await Promise.all(
                [...need.values()].map(([r, c]) => {
                  const img = new Image();
                  img.crossOrigin = 'anonymous';
                  img.src = LIGHTS_TILES.replace('{d}', d)
                    .replace('{z}', NL_Z)
                    .replace('{r}', r)
                    .replace('{c}', c);
                  return img.decode().then(() => img);
                })
              );
              imgs = new Map([...need.keys()].map((k, i) => [k, loaded[i]]));
              day = d;
            } catch {
              // that day not published (or a gap) - go older
            }
          }
          if (!imgs || seq !== lightsSeq) return;
          const px = new Map();
          for (const [k, img] of imgs) {
            const cv = document.createElement('canvas');
            cv.width = cv.height = 256;
            const cx = cv.getContext('2d', {willReadFrequently: true});
            cx.drawImage(img, 0, 0);
            px.set(k, cx.getImageData(0, 0, 256, 256).data);
          }
          const pxAt = (ix, iy) => {
            const d = px.get(Math.floor(iy / 256) + '/' + Math.floor(ix / 256));
            if (!d) return null;
            const o = ((iy & 255) * 256 + (ix & 255)) * 4;
            return [d[o], d[o + 1], d[o + 2], d[o + 3]];
          };
          const N = 96;
          const f = lightsField(pxAt, anchor, WORLD, N);
          const tex = new THREE.DataTexture(
            f.data,
            N,
            N,
            THREE.RedFormat,
            THREE.FloatType
          );
          tex.minFilter = tex.magFilter = THREE.LinearFilter;
          tex.needsUpdate = true;
          const old = terrainObj.lightsTexNode.value;
          terrainObj.lightsTexNode.value = tex;
          if (old && old.image && old.image.width > 1) old.dispose();
          terrainUniforms.uLightsOn.value = 1;
          // The SOURCES, not just the glow: Earth-anchored lamp
          // points (nightlights.js, gated - roam's shared hash on
          // geodetic cells, density linear in measured radiance),
          // dropped onto the terrain surface, never on water.
          const radAtGeo = (lat, lon) => {
            const s = geoToScene(lat, lon, anchor);
            const gi = Math.round((s.x / WORLD + 0.5) * N - 0.5);
            const gj = Math.round((0.5 - s.z / WORLD) * N - 0.5);
            return gi < 0 || gi >= N || gj < 0 || gj >= N
              ? 0
              : f.data[gj * N + gi];
          };
          const lamps = lampCandidates(radAtGeo, anchor, WORLD).filter(
            (L) => !sample(L.x, L.z).water
          );
          const pos = new Float32Array(lamps.length * 3);
          const col = new Float32Array(lamps.length * 3);
          lamps.forEach((L, k) => {
            pos[3 * k] = L.x;
            pos[3 * k + 1] = sample(L.x, L.z).y + 0.12;
            pos[3 * k + 2] = L.z;
            // Brightness follows the measured radiance (sqrt for
            // the eye's crushed response to point sources).
            const b = 0.35 + 0.65 * Math.sqrt(Math.min(L.rad / LAMP_FULL, 1));
            col[3 * k] = LAMP_TINT[0] * b;
            col[3 * k + 1] = LAMP_TINT[1] * b;
            col[3 * k + 2] = LAMP_TINT[2] * b;
          });
          const lg = new THREE.BufferGeometry();
          lg.setAttribute('position', new THREE.BufferAttribute(pos, 3));
          lg.setAttribute('color', new THREE.BufferAttribute(col, 3));
          if (!lampMat) {
            // Additive warm points through the shared AgX + fog
            // encode - lamps dim with distance haze like every
            // other emitter; at day the night gate multiplies them
            // to black, which adds nothing.
            lampNightU = tslUniform(0);
            lampMat = new THREE.PointsNodeMaterial({
              transparent: true,
              depthWrite: false,
              blending: THREE.AdditiveBlending
            });
            lampMat.size = 2.2;
            lampMat.sizeAttenuation = false;
            lampMat.colorNode = aerial.encodeFog(
              tslAttribute('color').mul(lampNightU)
            );
          }
          if (lampPts) {
            scene.remove(lampPts);
            lampPts.geometry.dispose();
          }
          lampPts = new THREE.Points(lg, lampMat);
          lampPts.frustumCulled = false;
          scene.add(lampPts);
          // The town's walls sample the SAME measured field for
          // their window glow - re-seat the standing buildings so
          // the attribute picks up the fresh radiances.
          bldGlowAt = (x, z) => {
            const gi = Math.round((x / WORLD + 0.5) * N - 0.5);
            const gj = Math.round((0.5 - z / WORLD) * N - 0.5);
            return gi < 0 || gi >= N || gj < 0 || gj >= N
              ? 0
              : Math.min(f.data[gj * N + gi] / LAMP_FULL, 1);
          };
          if (worldBuilt) placeBuildings();
          record(
            'VIIRS Black Marble ' + day,
            'max ' +
              f.max.toFixed(1) +
              ' · mean ' +
              f.mean.toFixed(2) +
              ' nW/cm²/sr · ' +
              lamps.length +
              ' lamps'
          );
        } catch (e) {
          // The ground stays dark - the truthful default.
          if (params.has('debug')) console.warn('lights: ' + e.message);
        }
      }

      // Wildfire smoke: NOAA HMS analysts draw verified plume
      // polygons from satellite imagery (North America - null
      // elsewhere is the truthful answer). The daemon holds the
      // daily file; the panel records the verdict and state.smoke
      // carries the published class concentration (Ruminski et
      // al. 2006: 5/16/27 ug/m^3). The RENDER side of smoke is
      // measured, not invented: GEFS-Aerosols' organic-matter and
      // black-carbon columns (syncAerosol) darken the sky's
      // measured single-scattering albedo wherever a plume
      // actually absorbs - HMS stays the analyst-verified
      // provenance layer.
      const SMOKE_PROXY = params.get('smoke') ?? 'https://api.ndev.tk/smoke';
      async function syncSmoke() {
        try {
          const j = await (
            await fetch(
              SMOKE_PROXY +
                '?lat=' +
                state.lat.toFixed(3) +
                '&lon=' +
                state.lon.toFixed(3),
              {credentials: 'omit'}
            )
          ).json();
          state.smoke = j.smoke ?? null;
          if (state.smoke) {
            record(
              'NOAA HMS wildfire smoke',
              state.smoke.density +
                ' plume overhead (analyst-verified) · class ~' +
                state.smoke.ugm3 +
                ' µg/m³'
            );
          }
        } catch {
          // No verdict; the measured AOD stands alone.
        }
      }

      const seenQuakes = new Set();
      let firstQuakePoll = true;
      async function pollQuakes() {
        try {
          const q = await (
            await fetch(
              'https://earthquake.usgs.gov/earthquakes/feed/v1.0/summary/4.5_day.geojson',
              {credentials: 'omit'}
            )
          ).json();
          for (const f of q.features) {
            if (seenQuakes.has(f.id)) continue;
            seenQuakes.add(f.id);
            if (firstQuakePoll) continue; // only rumble live events
            // Real distance decides how hard it shakes here - and real
            // seismology decides WHEN. Waves are not instant: P-waves
            // average ~7.8 km/s and the stronger S-waves ~4.4 km/s, so
            // each arrival is scheduled at its true travel time (unless
            // feed latency means it already passed).
            const [qlon, qlat] = f.geometry.coordinates;
            const km = haversineKm(state.lat, state.lon, qlat, qlon);
            const atten = Math.max(Math.exp(-km / 2500), 0.04);
            const mag = f.properties.mag;
            const elapsed = (Date.now() - f.properties.time) / 1000;
            const pDelay = km / 7.8 - elapsed;
            const sDelay = km / 4.4 - elapsed;
