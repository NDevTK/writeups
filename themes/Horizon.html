              moon.alt,
              profNow,
              0.55,
              camAltM,
              400
            );
            const u = apparentAltitude(
              moon.alt + SUN_DISC_RAD,
              profNow,
              0.55,
              camAltM,
              400
            );
            const dn = apparentAltitude(
              moon.alt - SUN_DISC_RAD,
              profNow,
              0.55,
              camAltM,
              400
            );
            refr.moonFlat = Math.min((u - dn) / (2 * SUN_DISC_RAD), 1);
          } else {
            refr.moonApp = moon.alt + (refr.graze ?? 0.0093);
            refr.moonFlat = 1;
          }
        }
        moonDisc.position.copy(skyPoint(refr.moonApp, moon.az, 1500));
        moonDisc.scale.y = astro.moonScale * refr.moonFlat;
        // Sun direction as seen at the moon disc (same geometry the old
        // directional light encoded), feeding the Lommel-Seeliger shader.
        moonU.sunDirM.value
          .copy(skyPoint(sun.alt, sun.az, 200))
          .sub(moonDisc.position)
          .normalize();
        // Earthshine: the ashen light on the dark limb, from the
        // MEASURED Earth albedo (earthshine.js, Goode 2001). The
        // lunar phase angle comes from the same two vectors the
        // Hapke shader uses; the ratio peaks (~8e-5) at new moon
        // - full Earth over the thinnest crescent - and dies at
        // full moon. ?eshine=N scales it for harness shots.
        eshV.copy(moonDisc.position).negate().normalize();
        moonU.eshine.value =
          earthshineRatio(
            Math.acos(
              THREE.MathUtils.clamp(moonU.sunDirM.value.dot(eshV), -1, 1)
            )
          ) * (params.has('eshine') ? +params.get('eshine') : 1);
        // Lunar eclipse: the umbral immersion (exact lens geometry,
        // eclipses.js) drives the copper darkening - inside the
        // umbra the moon glows only with sunlight refracted through
        // every terrestrial sunrise and sunset at once (Danjon's
        // ashen red; the tint/level is the documented display
        // mapping of a mid-scale L2 eclipse). The penumbra dims
        // gently, as it really does.
        {
          const le = astro.lunarEcl;
          const imm = le ? THREE.MathUtils.clamp(le.inUmbra, 0, 1) : 0;
          const pen = le
            ? THREE.MathUtils.clamp(le.penMag, 0, 1) * (1 - imm)
            : 0;
          moonU.albM.value
            .setHex(0xcdd4e2)
            .multiplyScalar(1 - 0.18 * pen)
            .lerp(eclCopper, imm);
        }

        polar.rotation.x = -(90 - state.lat) * RAD;
        celestial.rotation.y = -(gmst(d) + state.lon * RAD);

        const day = THREE.MathUtils.clamp((sun.alt / RAD + 6) / 24, 0, 1);
        const dusk = 1 - Math.abs(day - 0.5) * 2;
        const cloudy = state.cloud / 100;
        // Stars belong to dusk, not daylight: the night sky fades in only
        // once the sun is truly below the horizon (civil to nautical
        // twilight, -3 to -9 deg).
        const nightSky = THREE.MathUtils.clamp(-(sun.alt / RAD + 3) / 6, 0, 1);

        // The sky's Mie term: the MEASURED GEFS-Aerosols channel
        // set when the daemon answers (per-channel extinction by
        // Angstrom interpolation of five measured bands, measured
        // SSA and phase asymmetry), else the Hillaire defaults
        // (flat spectrum, SSA 0.9, g 0.8) calibrated to the
        // measured CAMS total AOD. Both paths run the same gated
        // profile calibration: the column above the terrain
        // integrates to the measured optical depth EXACTLY (the
        // old AOD/0.12 normalisation - the paper's very clean
        // default air passed off as the global mean - is gone).
        const aeroFresh =
          state.aerosol && Date.now() - state.aerosol.at < 6 * 3600e3;
        const aodC = THREE.MathUtils.clamp(state.aod, TAU_MIN, TAU_MAX);
        const mieSet = aeroFresh
          ? state.aerosol.set
          : {tau: [aodC, aodC, aodC], ssa: [0.9, 0.9, 0.9], g: 0.8};
        const mieRad = mieCoefficients(mieSet, centerElev);
        if (atmo.ok) {
          const skyExposure = 24 / (0.2 + 0.8 * day);
          // The camera's REAL altitude (inverting the asinh height
          // compression) feeds the sky and aerial LUTs, so flying up
          // physically lowers the horizon and thins the haze.
          const eCam = centerElev + 500 * Math.sinh(camera.position.y / 16);
          // Crepuscular rays: the sky and aerial marches place
          // their cloud shadow samples from the camera's scene
          // position, the sun azimuth and the box's elevation
          // datum (set BEFORE update - the fills run there).
          atmo.aerialShadow.camXZ.value.set(
            camera.position.x,
            camera.position.z
          );
          atmo.aerialShadow.sunAz.value.set(sunVec.x, sunVec.z).normalize();
          atmo.aerialShadow.elev0.value = centerElev;
          // The dome's terminal ground bounce (Hillaire 2020): fed
          // Payne (1972) open-ocean broadband albedo 0.06 where the
          // box has sea, 0 inland (a land albedo needs its own
          // citation before inland horizons change).
          atmo.update(
            sunVec,
            mieRad,
            Math.max(eCam, 50),
            skyExposure,
            water ? 0.06 : 0
          );
          // Aerial perspective shares the dome's exposure so inscattered
          // light on the terrain matches the sky it comes from.
          aerialU.uSunAzV.value.set(sunVec.x, sunVec.z).normalize();
          aerialU.uAerialExp.value = skyExposure;
        }
        veilU.alpha.value = cloudy * cloudy * 0.85 * day;

        tmpB
          .copy(cNightBot)
          .lerp(cDayBot, day)
          .lerp(cSetBot, dusk * 0.8)
          .lerp(cGray, cloudy * 0.7 * day);
        aerialU.uFogColor.value.copy(tmpB);
        // Koschmieder relation: extinction from the MEASURED visibility
        // (2% contrast at V). Fog codes need no special-casing - a foggy
        // hour reports a short visibility by itself. A fresh nearby
        // METAR's transmissometer reading outranks the model value.
        const visEff =
          state.metar &&
          Date.now() - state.metar.at < 90 * 60e3 &&
          state.metar.visM !== null
            ? state.metar.visM
            : state.visibility;
        aerialU.uFogDensity.value =
          1.98 / (Math.max(visEff, 400) / MPU) + cloudy * 0.001;

        // A real solar eclipse dims the direct light by its obscuration.
        const ecl = astro.eclipse || 0;
        // The sun's light on the world carries its true transmitted
        // colour: the CPU mirror of the transmittance integral reddens
        // low sun physically instead of by hue heuristic.
        const st = sunTransmittanceJS(Math.sin(Math.max(sun.alt, 0)), mieRad);
        const stMax = Math.max(st[0], st[1], st[2], 1e-4);
        sunLight.color.setRGB(st[0] / stMax, st[1] / stMax, st[2] / stMax);
        const stLum = 0.2126 * st[0] + 0.7152 * st[1] + 0.0722 * st[2];
        // Direct-sun cloud attenuation is now per pixel (the cloud
        // shadow map, Beer-Lambert through the actual decks); the
        // only GLOBAL cloud factor left is the cirrus veil, as
        // exp(-tau/sin(alt)) with tau_vis = 1 at full high cover
        // (typical cirrostratus optical depth).
        const cHighFrac = (state.cloudHigh ?? state.cloud * 0.3) / 100;
        const cirrusT = Math.exp(
          -cHighFrac / Math.max(Math.sin(sun.alt), 0.08)
        );
        sunLight.intensity =
          (0.18 + 2.4 * stLum) * (day > 0 ? 1 : 0) * cirrusT * (1 - 0.93 * ecl);
        const moonUp = moon.alt > 0 ? 0.07 * (1 - day) : 0;
        if (atmo.ok) {
          if (t - lastIrrT > 1000) {
            lastIrrT = t;
            // Async staging read - no pipeline stall; it lands a frame
            // or two later, which a 1 Hz ambient cannot notice.
            atmo.readIrradiance().then((ir) => {
              if (ir && ir[0] + ir[1] + ir[2] > 1e-7) {
                skyIrr.setRGB(ir[0], ir[1], ir[2]);
                skyIrrReady = true;
              }
            });
          }
          // The ambient term IS the sky: cosine-weighted irradiance
          // integrated from the sky-view LUT (read back at 1 Hz), in the
          // dome's own eye-adaptation exposure - twilight blues, sunset
          // warmth and dusk falloff arrive from the raymarch, not from a
          // tuned curve. One calibration constant maps LUT radiance into
          // three's light units (the sun's intensity mapping already
          // does the same). The LUT is clear-sky and sunlit only, so the
          // measured cloud dimming, the eclipse obscuration and a small
          // moonlit-sky term apply here.
          const expo = 24 / (0.2 + 0.8 * day);
          // the measured sky where the satellite saw one (the
          // Erbs-scaled clearness index), the cover heuristic
          // otherwise
          const dimCloud =
            state.ktAmbient != null ? state.ktAmbient : 1 - cloudy * 0.3;
          const dim = (1 - 0.85 * ecl) * dimCloud;
          ambient.intensity = 1;
          // 1.1 puts the clear-sky diffuse fraction at ~20% of direct,
          // the measured real-world ratio.
          ambient.color.copy(skyIrr).multiplyScalar(expo * 1.1 * dim);
          tmpC.setRGB(0.05, 0.055, 0.075).multiplyScalar(moonUp * 14);
          ambient.color.add(tmpC);
          // Ground half: sky plus direct sun bounced off the terrain
          // albedo (0.25 grass/rock to 0.7 snow).
          const alb = 0.25 + 0.45 * terrainUniforms.uSnowy.value;
          tmpC
            .copy(sunLight.color)
            .multiplyScalar(
              sunLight.intensity * Math.max(Math.sin(sun.alt), 0) * 0.55
            )
            .add(ambient.color);
          ambient.groundColor.copy(tmpC).multiplyScalar(alb);
        } else {
          // Preetham fallback keeps the tuned formula.
          ambient.intensity =
            (0.12 +
              day * 0.3 * (1 - cloudy * 0.3) +
              cloudy * day * 0.12 +
              moonUp) *
            (1 - 0.8 * ecl);
          ambient.color.copy(tmpB);
          ambient.groundColor.copy(tmpB).multiplyScalar(0.4);
        }
        if (starObj) {
          starObj.u.night.value = nightSky * (1 - cloudy * 0.85) * lpVis;
          starObj.u.time.value = t / 1000;
          // Winds-aloft turbulence (cn2.js): the measured pressure-
          // level profile sets BOTH the twinkle depth (Young's
          // zenith sigma scaled by the Hufnagel-Valley mu_5/6 ratio
          // of the ITU-R RMS 5-20 km wind) and the flicker rate
          // (Fresnel-shadow crossing rate, ~500 Hz physical,
          // displayed at 1/50 - same documented-division pattern as
          // before, now from the profile instead of the raw jet).
          if (state.cn2Scale) {
            starObj.u.sigZen.value = THREE.MathUtils.clamp(
              youngSigma(EYE_D_CM, 1) * state.cn2Scale,
              0.05,
              0.6
            );
          }
          starObj.u.twRate.value = THREE.MathUtils.clamp(
            state.cn2Rate
              ? state.cn2Rate / 50
              : (state.wind250 ?? state.wind * 3) / 20,
            4,
            18
          );
        }
        // Nightglow: per-line solar scaling arrives via syncF107
        // (uLineI); extinction rides the engine's own zenith
        // transmittance at the current aerosol load; gated with the
        // stars.
        airglowU.night.value = nightSky * (1 - cloudy * 0.85) * lpVis;
        airglowU.uTzen.value.fromArray(sunTransmittanceJS(1, mieRad));
        // Zodiacal light: anchored to the sun's ecliptic longitude,
        // scaled by the Earth's REAL heliocentric distance (r^-2.3,
        // ephemeris when the engine is loaded) and the Masana
        // symmetry-plane sinusoid for |beta| >= 60 deg; same zenith
        // transmittance, gated with the stars.
        const dNow = now();
        const sunLam = sunEclipticLon(dNow);
        {
          zodiU.night.value = nightSky * (1 - cloudy * 0.85) * lpVis;
          zodiU.uSunLam.value = sunLam;
          const AEg = window.Astronomy;
          const rAU =
            AEg && AEg.HelioDistance
              ? AEg.HelioDistance(AEg.Body.Earth, dNow)
              : 1;
          zodiU.uScale.value = zodiBase * fR(rAU);
          zodiU.uFs.value =
            1 + 0.1 * Math.sin(sunLam + Math.PI - ZL_OMEGA * RAD);
          zodiU.uTzen.value.copy(airglowU.uTzen.value);
          // The galaxy shares the zodiacal gating and extinction
          // (same night factor, same zenith transmittance) - only
          // the r^-2.3 heliocentric factor is zodiacal-specific.
          mwU.night.value = zodiU.night.value;
          mwU.uTzen.value.copy(airglowU.uTzen.value);
          // Noctilucent clouds: geometry in the shader (exact
          // shadow cylinder); here only the sun direction, the
          // 6-deg sky-brightness gate, the climatological
          // season/latitude envelope, and tropospheric cloud
          // cover. Day-of-year from the same clock as sidereal
          // time.
          {
            const betaDeg = -(sun.alt / RAD);
            const doy = Math.ceil(
              (d - new Date(Date.UTC(d.getUTCFullYear(), 0, 0))) / 86400e3
            );
            const env = params.has('nlc')
              ? +params.get('nlc')
              : seasonEnvelope(doy, state.lat);
            nlcU.uAmp.value =
              env *
              THREE.MathUtils.smoothstep(betaDeg, BETA_MIN_DEG, 7.5) *
              (1 - cloudy * 0.95);
            nlcU.uSunDirW.value.copy(skyPoint(sun.alt, sun.az, 1)).normalize();
            nlcU.time.value = t / 1000;
            nlcShell.visible = nlcU.uAmp.value > 0.001;
          }
        }
        // Meteors: the observed rate right now is the sum over the
        // active showers of ZHR(lam_sun) x sin(radiant elevation)
        // (meteors.js). Poisson spawning; ?meteor=N forces N/h for
        // the offline harness.
        {
          const mNight = nightSky * (1 - cloudy * 0.85) * lpVisBright;
          let total = 0;
          const act = [];
          if (mNight > 0.05) {
            const lamDeg = (((sunLam / RAD) % 360) + 360) % 360;
            for (const {s, zhr} of activeShowers(lamDeg)) {
              const rad = radiantAt(s, lamDeg);
              const aa = altAz(
                {ra: rad.ra * RAD, dec: rad.dec * RAD},
                dNow,
                state.lat,
                state.lon
              );
              const hr = hourlyRate(zhr, aa.alt);
              if (hr > 0.3) {
                total += hr;
                act.push({s, rad, cum: total});
              }
            }
            if (params.has('meteor') && act.length === 0) {
              // Harness override: a synthetic shower with the
              // radiant at the local zenith.
              const lst = gmst(dNow) + state.lon * RAD;
              total = +params.get('meteor') || 60;
              act.push({
                s: {v: 59, r: 2.2},
                rad: {ra: lst / RAD, dec: state.lat},
                cum: total
              });
            } else if (params.has('meteor') && total > 0) {
              total = +params.get('meteor') || 60;
              act[act.length - 1].cum = total;
            }
            if (!meteorsRecorded && act.length && !params.has('meteor')) {
              meteorsRecorded = true;
              record(
                'IMO 2026 + Jenniskens 1994 meteors',
                act
                  .map(
                    (a, i) =>
                      (a.s.code ?? 'x') +
                      ' ' +
                      (a.cum - (i ? act[i - 1].cum : 0)).toFixed(1) +
                      '/h'
                  )
                  .join(' · ')
              );
            }
          }
          for (const p of meteorPool) {
            if (p.active) {
              p.t += dt;
              p.u.life.value = (p.t / p.dur) * 1.2;
              p.u.night.value = mNight;
              if (p.t > p.dur * 1.2) {
                p.active = false;
                p.mesh.visible = false;
              }
            } else if (total > 0 && Math.random() < (total * dt) / 3600) {
              const pick = Math.random() * total;
              const a = act.find((x) => pick <= x.cum) ?? act[act.length - 1];
              const ok = spawnMeteor(meteorPool.indexOf(p), a.s, a.rad);
              if (params.has('meteor'))
                console.log(
                  'METEOR|' +
                    (ok ? 'spawn' : 'reject') +
                    '|night ' +
                    mNight.toFixed(2) +
                    '|amp ' +
                    p.u.amp.value.toFixed(3) +
                    '|dur ' +
                    p.dur.toFixed(2)
                );
              p.u.night.value = mNight;
            }
          }
        }
        // Contrails: only what the measured criterion allows.
        // Cruise level stays sunlit until the sun is ~8 deg below
        // the ground horizon; cloud cover hides the trails from
        // below like it hides the stars.
        {
          const ctOv = params.has('contrail') ? +params.get('contrail') : null;
          const ct =
            ctOv !== null
              ? {forms: ctOv > 0, persists: ctOv > 1}
              : (state.contrail ?? {forms: false, persists: false});
          const dayHigh =
            THREE.MathUtils.clamp((sun.alt / RAD + 8) / 8, 0, 1) *
            (1 - cloudy * 0.9);
          const drift = (state.wind250 ?? 0) / 3.6 / MPU;
          for (const p of contrailPool) {
            if (p.active) {
              p.t += dt;
              p.u.head.value = Math.min(p.t / p.u.cross.value, 1);
              p.u.day.value = dayHigh;
              p.u.tint.value.copy(sunLight.color);
              // The laid trail drifts with the measured 250 hPa wind.
              p.mesh.matrix.elements[12] += windVHigh.x * drift * dt;
              p.mesh.matrix.elements[14] += windVHigh.z * drift * dt;
              if (p.t > p.life) {
                p.active = false;
                p.mesh.visible = false;
              }
            } else if (ct.forms && dayHigh > 0.02) {
              // REAL aircraft claim free slots first (live ADS-B
              // via the daemon); otherwise the ambient-traffic
              // cadence (documented display choice: a new transit
              // every ~75 s; the harness override spawns fast so a
              // pinned shot catches one).
              const live = liveTraffic?.length ? liveTraffic.shift() : null;
              if (live) {
                seenFlights.set(live.hex, Date.now());
                spawnContrail(p, !!ct.persists, live);
                p.u.day.value = dayHigh;
                p.u.tint.value.copy(sunLight.color);
              } else if (Math.random() < dt / (ctOv !== null ? 4 : 75)) {
                spawnContrail(p, !!ct.persists);
                p.u.day.value = dayHigh;
                p.u.tint.value.copy(sunLight.color);
              }
            }
          }
        }
        // Ships: dead-reckon on SOG/COG between AIS reports.
        // Lights obey COLREGS end to end: carried only from
        // sunset to sunrise (Rule 20(b), solar altitude below
        // -50'), each shown only inside its Rule 21 arc for the
        // CURRENT relative bearing of the camera, brightness from
        // the Annex I candela through Allard's law at the actual
        // distance - so a 3 nm sidelight fades out at exactly the
        // range the regulation rates it for.
        {
          const shipLightsOn = sun.alt / RAD < SUNSET_ELEV;
          if (params.has('debug'))
            window.__ships = shipPool
              .filter((s) => s.active)
              .map((s) => ({x: s.x, y: s.g.position.y, z: s.z, label: s.name}));
          for (const s of shipPool) {
            if (!s.active) continue;
            s.x += s.vx * dt;
            s.z += s.vz * dt;
            if (Math.abs(s.x) > 160 || Math.abs(s.z) > 160) {
              s.active = false;
              s.g.visible = false;
              continue;
            }
            s.g.visible = true;
            // Lake vessels float at the lake's MEASURED level (the
            // BLS steamers on Thunersee carry AIS too); sea ships
            // stay on the tide-following plane.
            const lakeIdx = lakesMask ? lakeAt(lakesMask, s.x, s.z) : -1;
            s.g.position.set(
              s.x,
              lakeIdx >= 0 ? sample(s.x, s.z).y : water ? water.position.y : 0,
              s.z
            );
            s.g.rotation.y = -s.hdg * RAD;
            const rel = relBearing(s.hdg, s, {
              x: camera.position.x,
              z: camera.position.z
            });
            const arcs = lightArcs(rel);
            const dM =
              Math.hypot(camera.position.x - s.x, camera.position.z - s.z) *
              MPU;
            // Each light carries ITS OWN Rule 22 range now (from
            // the measured length via lightPlan) - a 15 m boat's
            // 3 nm masthead fades sooner than a freighter's 6 nm.
            for (const {arc, range, dot} of s.lightList) {
              if (!shipLightsOn || !arcs[arc]) {
                dot.visible = false;
                continue;
              }
              const E = apparentLux(luminousIntensity(range), Math.max(dM, 30));
              const amp = THREE.MathUtils.clamp(
                Math.log10(E / 2e-7) / 2.5,
                0,
                1
              );
              dot.visible = amp > 0;
              if (dot.visible)
                dot.material.color
                  .set(NAV_COLOR[arc])
                  .multiplyScalar(0.4 + 3.6 * amp);
            }
          }
        }
        // Trains: each live journey drawn at the position its OWN
        // timetable reports right now (trains.js trainAt - real
        // stops, real delay-shifted times), the consist from its
        // published category and operator. Journeys outside their
        // window (not departed / arrived) or off the box are
        // hidden; the pool prunes boards that rolled over.
        if (trainJourneys.length && params.get('trains') !== '0') {
          if (!trainMats) {
            const mk = (color, rough) => {
              const m = new THREE.MeshStandardNodeMaterial({
                color,
                roughness: rough
              });
              applyAerial(m);
              return m;
            };
            // The asset-viewer palette (?asset=trains), aerial-hooked.
            trainMats = {
              icBody: mk('#e6e7e9', 0.55),
              regBody: mk('#a5291f', 0.6),
              win: mk('#141a20', 0.3),
              roof: mk('#686d72', 0.7),
              cab: mk('#22272d', 0.5)
            };
          }
          const nowMs = Date.now();
          let onRails = 0;
          let offNet = 0;
          // Harness: visible train positions (?debug=1), so the
          // shot driver can aim the camera at a drawn train.
          const dbgTrains = params.has('debug') ? [] : null;
          for (const j of trainJourneys) {
            const key = j.label + '@' + j.stops[0].depMs;
            let g = trainPool.get(key);
            const p = trainAt(j, nowMs);
            if (!p) {
              if (g) g.visible = false;
              continue;
            }
            const sc = geoToScene(p.lat, p.lon, dressAnchor);
            if (Math.abs(sc.x) > 140 || Math.abs(sc.z) > 140) {
              if (g) g.visible = false;
              continue;
            }
            // Map-match to the drawn network (rails.js). Moving:
            // route the leg over the rail graph and place BY ARC
            // LENGTH at the timetable's fraction; dwelling: snap
            // the station point to the nearest arc. A leg the
            // network cannot carry (tunnel, undrawn way) hides
            // its train rather than running it through the grass.
            let dir = null;
            if (railSnapIdx) {
              let matched = false;
              if (p.moving && p.legFrom && !j.path) {
                const ck = key + '#' + p.legFrom.lat + ',' + p.legTo.lat;
                let rt = railRouteCache.get(ck);
                if (rt === undefined) {
                  const a = geoToScene(
                    p.legFrom.lat,
                    p.legFrom.lon,
                    dressAnchor
                  );
                  const b = geoToScene(p.legTo.lat, p.legTo.lon, dressAnchor);
                  rt = railRoute(railSnapIdx, a.x, a.z, b.x, b.z, 150 / MPU);
                  railRouteCache.set(ck, rt);
                }
                if (rt) {
                  const q = routePoint(rt, p.f);
                  sc.x = q.x;
                  sc.z = q.z;
                  dir = q;
                  matched = true;
                } else {
                  // The leg would not route (a stop beyond the box
                  // or the drawn ways): the chord position still
                  // map-matches by nearest arc when the line is
                  // gently curved - GPS-error-scale gate.
                  const arc = snapToRail(railSnapIdx, sc.x, sc.z, 100 / MPU);
                  if (arc) {
                    sc.x = arc.x;
                    sc.z = arc.z;
                    let s = 1;
                    if (p.hdgTo) {
                      const t2 = geoToScene(
                        p.hdgTo.lat,
                        p.hdgTo.lon,
                        dressAnchor
                      );
                      s =
                        (t2.x - sc.x) * arc.dx + (t2.z - sc.z) * arc.dz < 0
                          ? -1
                          : 1;
                    }
                    dir = {dx: s * arc.dx, dz: s * arc.dz};
                    matched = true;
                  }
                }
              } else if (!p.moving) {
                const arc = snapToRail(railSnapIdx, sc.x, sc.z, 120 / MPU);
                if (arc) {
                  sc.x = arc.x;
                  sc.z = arc.z;
                  dir = null; // heading from the next leg below
                  matched = true;
                }
              } else {
                // a journey carrying its own published shape is
                // already on real geometry
                matched = true;
              }
              if (!matched) {
                offNet++;
                if (g) g.visible = false;
                continue;
              }
              onRails++;
            }
            if (!g) {
              g = new THREE.Group();
              buildTrain(g, j.cat, j.consist, trainMats, 1 / MPU);
              scene.add(g);
              trainPool.set(key, g);
            }
            g.visible = true;
            // Seated at rail-bed height; over water (a rail bridge)
            // the deck rides the same clearance above the surface.
            g.position.set(sc.x, sample(sc.x, sc.z).y + 1.8 / MPU, sc.z);
            if (dir) {
              // The routed polyline runs from-stop -> to-stop, so
              // its local direction IS the heading of travel.
              g.rotation.y = Math.atan2(dir.dx, dir.dz);
            } else if (p.hdgTo) {
              const t2 = geoToScene(p.hdgTo.lat, p.hdgTo.lon, dressAnchor);
              g.rotation.y = Math.atan2(t2.x - sc.x, t2.z - sc.z);
            }
            if (dbgTrains)
              dbgTrains.push({
                x: sc.x,
                y: g.position.y,
                z: sc.z,
                label: j.label,
                moving: !!p.moving
              });
          }
          if (dbgTrains) window.__trains = dbgTrains;
          if (railSnapIdx)
            live['trains (map-matched)'] =
              onRails +
              ' on drawn rails · ' +
              offNet +
              ' off-network hidden (tunnel or undrawn way)';
          if (trainPool.size > 24) {
            const live = new Set(
              trainJourneys.map((j) => j.label + '@' + j.stops[0].depMs)
            );
            for (const [k, g] of trainPool)
              if (!live.has(k)) {
                scene.remove(g);
                trainPool.delete(k);
              }
          }
        }
        // Scheduled boats: the pier board's sailings, positioned by
        // the SAME timetable interpolation, floated at the lake's
        // measured level through the gated vessels.js passenger
        // hull. An active AIS vessel nearby WINS - a measured
        // position beats a schedule, so nothing double-draws.
        if (boatJourneys.length && params.get('trains') !== '0') {
          const nowMs = Date.now();
          for (const j of boatJourneys) {
            const key = j.label + '@' + j.stops[0].depMs;
            let g = boatPool.get(key);
            const p = trainAt(j, nowMs);
            if (!p) {
              if (g) g.visible = false;
              continue;
            }
            const sc = geoToScene(p.lat, p.lon, dressAnchor);
            const ais = shipPool.some(
              (s) => s.active && Math.hypot(s.x - sc.x, s.z - sc.z) * MPU < 300
            );
            if (Math.abs(sc.x) > 140 || Math.abs(sc.z) > 140 || ais) {
              if (g) g.visible = false;
              continue;
            }
            if (!g) {
              g = new THREE.Group();
              buildVessel(
                g,
                BOAT_DIMS.len,
                BOAT_DIMS.beam,
                'passenger',
                shipMats,
                parseInt(j.number, 10) || 590000,
                1 / MPU
              );
              scene.add(g);
              boatPool.set(key, g);
            }
            g.visible = true;
            const lakeIdx = lakesMask ? lakeAt(lakesMask, sc.x, sc.z) : -1;
            g.position.set(
              sc.x,
              lakeIdx >= 0
                ? sample(sc.x, sc.z).y
                : water
                  ? water.position.y
                  : 0,
              sc.z
            );
            if (p.hdgTo) {
              const t2 = geoToScene(p.hdgTo.lat, p.hdgTo.lon, dressAnchor);
              g.rotation.y = Math.atan2(t2.x - sc.x, t2.z - sc.z);
            }
          }
          if (boatPool.size > 16) {
            const live = new Set(
              boatJourneys.map((j) => j.label + '@' + j.stops[0].depMs)
            );
            for (const [k, g] of boatPool)
              if (!live.has(k)) {
                scene.remove(g);
                boatPool.delete(k);
              }
          }
        }
        // Aircraft lights: dead-reckon on track/ground speed;
        // 14 CFR from end to end - lighted sunset to sunrise
        // (91.209, the same -50' boundary as the ships), each
        // position light only inside its 25.1385 arc at the
        // 25.1391 candela for the camera's angle off the nose,
        // strobes on the certified 25.1401 schedule - all through
        // Allard's law at the true SLANT range.
        {
          const airOn = sun.alt / RAD < SUNSET_ELEV;
          const tSec = t / 1000;
          // Harness: live dead-reckoned aircraft positions
          // (?debug=1), like __trains - the shot driver aims here.
          if (params.has('debug'))
            window.__planes = airLights
              .filter((a) => a.active)
              .map((a) => ({
                x: a.x,
                y: a.y,
                z: a.z,
                label: a.hex,
                altM: a.altM
              }));
          for (const a of airLights) {
            if (!a.active) continue;
            a.x += a.vx * dt;
            a.z += a.vz * dt;
            if (
              (planeOv === null && Date.now() - a.seen > 300e3) ||
              Math.abs(a.x) > 230 ||
              Math.abs(a.z) > 230
            ) {
              a.active = false;
              a.g.visible = false;
              continue;
            }
            if (!airOn) {
              a.g.visible = false;
              continue;
            }
            a.g.visible = true;
            a.g.position.set(a.x, a.y, a.z);
            a.g.rotation.y = -a.track * RAD;
            const rel = relBearing(a.track, a, {
              x: camera.position.x,
              z: camera.position.z
            });
            const arcs = lightArcsAir(rel);
            const horizM =
              Math.hypot(camera.position.x - a.x, camera.position.z - a.z) *
              MPU;
            const slantM = Math.max(
              Math.hypot(horizM, Math.max(a.altM - centerElev, 0)),
              200
            );
            const posI = positionIntensity(rel);
            for (const k of ['red', 'green', 'tail']) {
              const dot = a.lights[k];
              if (!arcs[k]) {
                dot.visible = false;
                continue;
              }
              const amp = THREE.MathUtils.clamp(
                Math.log10(apparentLux(posI, slantM) / 2e-7) / 2.5,
                0,
                1
              );
              dot.visible = amp > 0;
              if (dot.visible)
                dot.material.color
                  .set(dot.userData.base)
                  .multiplyScalar(0.4 + 3.2 * amp);
            }
            const sAmp = THREE.MathUtils.clamp(
              Math.log10(apparentLux(400, slantM) / 2e-7) / 2.5,
              0,
              1
            );
            const strobe = a.lights.strobe;
            strobe.visible = sAmp > 0 && strobeOn(a.hex, tSec);
            if (strobe.visible)
              strobe.material.color
                .set(strobe.userData.base)
                .multiplyScalar(1 + 5 * sAmp);
          }
        }
        // Lightning: advance each live flash along its Rakov-Uman
        // stroke sequence - the 60 Hz frame cadence resolves the
        // ~60 ms interstroke flicker and the continuing-current
        // glow directly; amp0 already carries Koschmieder + 1/d^2.
        for (const p of flashPool) {
          if (!p.active) continue;
          p.t += dt;
          if (p.t > p.seq.dur) {
            p.active = false;
            p.mesh.visible = false;
            p.u.amp.value = 0;
            continue;
          }
          p.u.amp.value = flashAmplitude(p.seq, p.t) * p.amp0 * 2.2;
        }
        if (constMat)
          constMat.opacity = nightSky * (1 - cloudy * 0.9) * 0.2 * lpVis;
        // The measured city glow rises as the sky darkens and even
        // lights the cloud undersides a touch (real urban overcast
        // glows warm rather than black).
        lpGlowObj.u.alpha.value =
          lpGlowAmp * nightSky * 0.22 * (1 + cloudy * 0.8);
        // Venus and Jupiter pierce twilight a little before the stars.
        planetObj.u.night.value =
          THREE.MathUtils.clamp(nightSky * 1.6, 0, 1) *
          (1 - cloudy * 0.85) *
          lpVisBright;
        cometObj.u.night.value = planetObj.u.night.value;
        moonDisc.visible = moon.alt > -0.05;

        // The Water plane: the FFT ocean advances on REAL seconds
        // (finite-depth dispersion is physical), the spectrum rebuilds
        // in place when the wind moves materially, the Cox-Munk
        // glitter lobe gets the RESIDUAL slope variance - total wind
        // mss minus what the cascades resolve (Bruneton et al. 2010) -
        // and whitecap coverage now emerges from the folding Jacobian
        // inside the material.
        if (water && oceanCascades) {
          const Ums = state.wind / 3.6;
          oceanTime += dt;
          const dirNow = Math.atan2(windV.z, windV.x);
          const dDir = Math.abs(
            Math.atan2(
              Math.sin(dirNow - oceanBuiltDir),
              Math.cos(dirNow - oceanBuiltDir)
            )
          );
          // Measured partitions rule when the marine model has them
          // (they only move on the 15-minute sync); otherwise the
          // wind-sea prediction with its drift gating.
          const partsNow = seaParts();
          const seaKey = partsNow ? JSON.stringify(partsNow) : null;
          if (seaKey !== oceanBuiltSeaKey) {
            if (partsNow) {
              for (const c of oceanCascades) c.setSeaState(partsNow);
            } else {
              for (const c of oceanCascades) c.setWind(Ums, dirNow);
              oceanBuiltU = Ums;
              oceanBuiltDir = dirNow;
            }
            oceanBuiltSeaKey = seaKey;
          } else if (
            !partsNow &&
            (Math.abs(Ums - oceanBuiltU) > 1.5 || dDir > 0.35)
          ) {
            for (const c of oceanCascades) c.setWind(Ums, dirNow);
            oceanBuiltU = Ums;
            oceanBuiltDir = dirNow;
          }
          for (const c of oceanCascades) c.update(oceanTime);
          water.sunDirection.value.copy(sunVec);
          water.sunColor.value
            .copy(sunLight.color)
            .multiplyScalar(sunLight.intensity);
          // The MEASURED total Hs (marine model, includes secondary
          // swells) sets the surf/breaking scale when present; the
          // Pierson-Moskowitz wind estimate is the fallback.
          const hsNow = state.sea?.hs ?? (0.21 * Ums * Ums) / 9.81;
          water.distortionScale.value = 0.6 + hsNow * 2.5;
          const mss = 0.003 + 0.00512 * Ums;
          const resolved = oceanCascades.reduce((s, c) => s + c.resolvedMss, 0);
          water.mssSubgrid.value = Math.max(mss - resolved, 1e-4);
          water.foamW.value = Math.min(3.84e-6 * Math.pow(Ums, 3.41), 0.5);
          water.hsWave.value = hsNow;
          // Battjes-Janssen surf profile: peak period from the
          // DOMINANT measured partition, or the fetch-limited
          // JONSWAP peak when the sea is wind-predicted - the same
          // spectrum the cascades realise (setSurf gates on change).
          const sw = state.sea?.wind;
          const ss = state.sea?.swell;
          const tpNow = state.sea
            ? (((ss?.hs ?? 0) > (sw?.hs ?? 0) ? ss?.tp : sw?.tp) ?? 6)
            : (2 * Math.PI) / peakOmega(Math.max(Ums, 1), 150e3);
          water.setSurf(hsNow, tpNow, oceanSeaDepth);
          // The MEASURED tide: the water plane rides sea level
          // through the same asinh compression the terrain uses,
          // and the surf shader adds the same offset to the signed
          // bathymetry - high water drowns the breakpoint sandbars,
          // low water exposes them (Battjes-Janssen at the TRUE
          // local depth).
          const tideNow = params.has('tide')
            ? +params.get('tide')
            : (state.tide ?? 0);
          water.tide.value = tideNow;
          water.position.y =
            16 * Math.asinh((tideNow - centerElev) / 500) - 0.15;
        }

        // The real wind vectors, per level: meteorological direction is
        // where wind comes FROM; the scene advects along where it blows.
        const dirOf = (deg, out) => {
          const a = (deg + 180) * RAD;
          out.set(Math.sin(a), 0, -Math.cos(a));
        };
        dirOf(state.winddir, windV);
        dirOf(state.dir700 ?? state.winddir, windVMid);
        dirOf(state.dir250 ?? state.winddir, windVHigh);

        // The snowline on the peaks tracks the real freezing level (snow
        // lingers a little below the instantaneous 0°C isotherm).
        terrainUniforms.uSnowLine.value +=
          ((state.freezing != null
            ? THREE.MathUtils.clamp(state.freezing - 300, 600, 5500)
            : 2300) -
            terrainUniforms.uSnowLine.value) *
          Math.min(dt, 1);

        // Sea-state uniforms: real wind feeds the wave model. The
        // Cox-Munk glitter takes the wind at the paper's own
        // 12.5 m mast height - the forecast model's 80/120 m
        // levels log-interpolated down (turbines.js hubWind), the
        // 10 m wind standing in until the levels arrive.
        terrainUniforms.uTime.value = t / 1000;
        terrainUniforms.uWindMs.value = state.wind / 3.6;
        terrainUniforms.uWind125.value =
          state.wind80 != null
            ? hubWind(
                state.wind / 3.6,
                state.wind80 / 3.6,
                (state.wind120 ?? state.wind80) / 3.6,
                12.5
              )
            : state.wind / 3.6;
        // Night lights fade in through civil twilight (streetlights
        // lead the stars); the camera sits under the decks with
        // them, so no cloud dimming applies. The lamp points share
        // the gate.
        const lightsNight = THREE.MathUtils.clamp(
          -(sun.alt / RAD + 0.5) / 5,
          0,
          1
        );
        terrainUniforms.uLightsNight.value = lightsNight;
        if (lampNightU) lampNightU.value = lightsNight;
        if (lampPts) lampPts.visible = lightsNight > 0;
        if (bldNightU) bldNightU.value = lightsNight;
        terrainUniforms.uWindVec.value.set(windV.x, windV.z);
        terrainUniforms.uSunDirW.value.copy(sunVec);
        terrainUniforms.uSunCol.value
          .copy(sunLight.color)
          .multiplyScalar(
            sunLight.intensity * (sun.alt > 0.01 ? 1 : 0) * (1 - cloudy * 0.8)
          );
        // Diffuse-skylight fraction for the Ross-Li blend (the
        // blue-sky albedo weighting, Roman et al. 2010): the SAME
        // two irradiances the rig lights the terrain with, as
        // relative luminance - direct beam on the horizontal vs the
        // hemisphere ambient.
        {
          const sc = terrainUniforms.uSunCol.value;
          const ac = ambient.color;
          const dirL =
            (0.2126 * sc.r + 0.7152 * sc.g + 0.0722 * sc.b) *
            Math.max(Math.sin(sun.alt), 0);
          const difL =
            ambient.intensity * (0.2126 * ac.r + 0.7152 * ac.g + 0.0722 * ac.b);
          terrainUniforms.uRossMix.value =
            dirL + difL > 0 ? difL / (difL + dirL) : 1;
        }

        // Aurora: OVATION oval probability when available (Kp heuristic
        // otherwise), with the curtain elevation from the oval's true
        // distance - Earth curvature included, ~150km emission height.
        let auroraP;
        let ovalDeg;
        if (state.auroraP !== null) {
          auroraP = state.auroraP;
          ovalDeg = Math.abs(state.auroraLat) - Math.abs(state.lat);
        } else {
          // The oval is organised by GEOMAGNETIC latitude (IGRF-14
          // dipole axis), not geographic - Alaska at 61 N geographic
          // sits under the oval; Hamburg at 53.5 N does not.
          auroraP =
            THREE.MathUtils.clamp((state.kp - 4) / 4, 0, 1) *
            THREE.MathUtils.clamp(
              (Math.abs(state.gmLat ?? state.lat) - 46) / 14,
              0,
              1
            );
          ovalDeg = 8;
        }
        const ovalKm = Math.max(ovalDeg, 0) * 111;
        const elevA = Math.atan2(
          150 - (ovalKm * ovalKm) / 12742,
          Math.max(ovalKm, 60)
        );
        // Live hemispheric power scales the curtain between oval
        // refreshes (linear in precipitating power, gated hpScale;
        // rebased to 1 whenever a fresh grid lands). Pinned aurora
        // stays pinned; the product is clamped at the full-curtain
        // display level the theme was designed around.
        const hpK =
          params.has('aurora') || state.auroraP === null
            ? 1
            : hpScale(state.hpNow, state.hpAtGrid);
        auroraU.strength.value =
          Math.min(auroraP * hpK, 1) *
          nightSky *
          (1 - cloudy * 0.7) *
          (elevA > 0.035 ? 1 : 0);
        auroraU.time.value = t / 1000;
        // Characteristic energy for the emission LUT: the public
        // OVATION product carries probability, not spectra, so this
        // is a documented display mapping - stronger ovals as harder
        // precipitation (nightside diffuse/discrete range 1-6 keV);
        // the ALTITUDE PROFILES per E0 are exact physics
        // (aurora-lut.js). setE0 gates its own rebuilds.
        auroraObj.setE0(1.5 + 4.5 * auroraP);
        const yAurora = Math.tan(THREE.MathUtils.clamp(elevA, 0.06, 1.1)) * 760;
        auroraU.uBase.value = yAurora - 160;
        aurora.position.y = yAurora + 200;
        // The curtain centres on MAGNETIC north (south), not true:
        // auroral arcs run along geomagnetic east-west, so the
        // whole band swings by the local IGRF declination (+D means
        // magnetic north lies east of true north; east is +x, and
        // positive rotation.y carries the north-placed curtain
        // west, hence the minus).
        aurora.rotation.y =
          (state.lat < 0 ? Math.PI : 0) - (state.magD ?? 0) * RAD;

        // Three cloud layers from the model's real per-layer covers.
        // A fresh nearby METAR outranks the model where it can see:
        // its ceilometer MEASURED the low deck's base and cover, so
        // those replace the Espy LCL estimate (~125m per degree of
        // dew point spread) and the model's low cover; automated
        // ceilometers are blind above a few km, so the mid and high
        // decks stay with the model. Clamped above the camera
        // because the asinh height compression squeezes low decks
        // harder than the terrain they sit over.
        const mzr =
          state.metar && Date.now() - state.metar.at < 90 * 60e3
            ? state.metar
            : null;
        const cLow = mzr ? mzr.low : (state.cloudLow ?? state.cloud * 0.7);
        const cMid = state.cloudMid ?? state.cloud * 0.5;
        const cHigh = state.cloudHigh ?? state.cloud * 0.3;
        const baseAgl =
          mzr && mzr.baseM !== null
            ? mzr.baseM // ceilometer measurement
            : Math.max(125 * (state.temp - state.dew), 150); // Espy LCL
        const yCloud = Math.max(
          16 * Math.asinh(baseAgl / 500) + 8,
          camBaseY + 26
        );
        // Each deck rides its own real wind: surface, 700hPa, 250hPa jet.
        const driftLayer = (arr, cover, y, wv, speed) => {
          const showN = Math.round((cover / 100) * arr.length);
          arr.forEach((c, i) => {
            c.visible = i < showN;
            c.position.x += wv.x * speed * 0.06 * dt;
            c.position.z += wv.z * speed * 0.06 * dt;
            c.position.y +=
              (y + c.userData.jitter - c.position.y) * Math.min(dt, 1);
            if (c.position.x > 260) c.position.x = -260;
            if (c.position.x < -260) c.position.x = 260;
            if (c.position.z > 260) c.position.z = -260;
            if (c.position.z < -260) c.position.z = 260;
          });
        };
        // Volumetric decks: real cover carves the density field, the
        // real wind advects it, the physically transmitted sun lights it.
        if ((cLow > 3 || cMid > 3) && !cloudTexPending && skyIrrReady) {
          cloudTexPending = true;
          setTimeout(() => {
            const tex = generateCloudTexturesTSL();
            cloudSys = createCloudSystemTSL(
              renderer,
              tex.baseTex,
              tex.detailTex
            );
            cloudSys.attachShadow(cloudShadow);
            if (radarObs && radarObs.field)
              cloudSys.setRadarCover(radarObs.field, radarObs.fieldSize, WORLD);
            sizeCloudTargets();
            record(
              'Nubis cloud noise (generated)',
              'Perlin-Worley 64³ + Worley 32³, tileable'
            );
            record(
              'Temporal cloud reconstruction',
              'quarter-res march · 1/16 Bayer refresh · reprojection'
            );
          }, 60);
        }
        cloudsActive = !!cloudSys && (cLow > 2 || cMid > 2);
        if (cloudsActive) {
          cloudSys.shared.sunDirW.value.copy(sunVec);
          cloudSys.shared.sunCol.value
            .copy(sunLight.color)
            .multiplyScalar(Math.max(sunLight.intensity, 0.02) * 0.55);
          // Cloud ambient is the same integrated sky the terrain gets.
          if (atmo.ok)
            cloudSys.shared.ambCol.value
              .copy(ambient.color)
              .multiplyScalar(0.6);
          else
            cloudSys.shared.ambCol.value
              .copy(tmpB)
              .multiplyScalar(0.22 + day * 0.5);

          const lu = cloudSys.uniformsLow;
          lu.cov.value =
            cLow > 2 ? THREE.MathUtils.clamp(cLow / 100, 0, 0.95) : 0;
          // Cloud TYPE from the reported WMO code: overcast, fog and
          // drizzle/steady-rain codes mean a flat stratiform sheet,
          // shower and thunderstorm codes mean towering convection,
          // anything else is fair-weather cumulus. The deck's thickness
          // follows the type.
          const wmo = state.code || 0;
          const cTypeT =
            wmo >= 80 ? 1.85 : wmo === 3 || (wmo >= 45 && wmo <= 67) ? 0.15 : 1;
          lu.cType.value += (cTypeT - lu.cType.value) * Math.min(dt * 0.5, 1);
          lu.yBase.value = yCloud;
          lu.yTop.value = yCloud + 8 + lu.cType.value * 9;
          lu.wOff.value.x += windV.x * state.wind * 0.06 * dt;
          lu.wOff.value.y += windV.z * state.wind * 0.06 * dt;

          // Mid deck: altostratus at the 700 hPa level - stratiform
          // profile, lower liquid water content, advected by the REAL
          // wind at its own altitude.
          const mu = cloudSys.uniformsMid;
          mu.cov.value =
            cMid > 2 ? THREE.MathUtils.clamp(cMid / 100, 0, 0.95) : 0;
          mu.yBase.value = Math.max(16 * Math.asinh(8), yCloud + 16);
          mu.yTop.value = mu.yBase.value + 6;
          const w700 = state.wind700 ?? state.wind;
          mu.wOff.value.x += windVMid.x * w700 * 0.06 * dt;
          mu.wOff.value.y += windVMid.z * w700 * 0.06 * dt;
        }
        // The cloud shadow map: refreshed with the advected field;
        // zero (full sun) whenever the decks are inactive.
        cloudShadow.update(sunVec, cloudsActive);
        if (cloudsActive) cloudSys.updateShadow();
        driftLayer(
          cloudsHigh,
          cHigh,
          Math.max(16 * Math.asinh(16), yCloud + 26),
          windVHigh,
          state.wind250 ?? state.wind
        );
        cirrusMat.opacity = 0.05 + day * 0.12;

        // Ground snow cover reacts live to the real temperature.
        const snowyGround =
          state.temp <= 0.5 && (state.snow > 0 || state.code >= 71) ? 1 : 0;
        terrainUniforms.uSnowy.value +=
          (snowyGround - terrainUniforms.uSnowy.value) * Math.min(dt, 1);
        if (bldSnowU) bldSnowU.value = terrainUniforms.uSnowy.value;

        const snowing =
          state.snow > 0 ||
          (state.code >= 71 &&
            state.code <= 86 &&
            ![80, 81, 82].includes(state.code));
        // Radar measurement over model value when fresh and covered.
        const radarFresh =
          radarObs &&
          Date.now() - radarObs.time < 25 * 60 * 1000 &&
          radarObs.coverage > 0.05;
        const precipMeas = radarFresh
          ? radarObs.rain + radarObs.snow
          : state.precip;
        const raining = !snowing && (precipMeas > 0.02 || state.code >= 51);
        const rate = snowing
          ? THREE.MathUtils.clamp(
              radarFresh ? radarObs.snow * 1.2 : state.snow / 2,
              0.3,
              1
            )
          : THREE.MathUtils.clamp(precipMeas / 4, 0.25, 1);
        precipU.opacity.value = raining || snowing ? 0.35 + rate * 0.45 : 0;
        precipU.size.value = snowing ? 0.34 : 0.16;
        precipU.color.value.set(snowing ? '#ffffff' : '#a9c6e2');
        if (raining || snowing) {
          const p = precipObj.posAttr;
          const fall = (snowing ? 6 : 34) * (0.4 + rate * 0.6) * dt;
          // Advected along the true wind vector, not just eastward.
          const drift = state.wind * 0.05 * dt;
          for (let i = 0; i < PRECIP_N; i++) {
            let y = p.getY(i) - fall;
            const wob = snowing ? Math.sin(t / 900 + i) * 0.02 : 0;
            let x = p.getX(i) + windV.x * drift + wob;
            let z = p.getZ(i) + windV.z * drift;
            if (y < 0) y += 45;
            if (x > 45) x -= 90;
            if (x < -45) x += 90;
            if (z > 45) z -= 90;
            if (z < -45) z += 90;
            p.setY(i, y);
            p.setX(i, x);
            p.setZ(i, z);
          }
          p.needsUpdate = true;
        }

        // Atmospheric optics, gated by the real conditions: bows need
        // rain with the sun shining below the Descartes angle; the halo
        // needs real cirrus; parhelia strengthen at low sun.
        opticsU.sunDir.value.copy(sunVec);
        opticsU.antisolar.value.copy(sunVec).negate();
        const sunOut = day * THREE.MathUtils.clamp(1 - cloudy * 1.1, 0, 1);
        opticsU.bow.value =
          raining && sun.alt > 0 && sun.alt < 0.733 ? sunOut : 0;
        opticsU.halo.value =
          (cHigh / 100) *
          (cHigh < 90 ? 1 : 0.5) *
          sunOut *
          (sun.alt > 0 ? 1 : 0);
        // Bravais parhelia: re-lay the dog LUT when the sun has
        // moved 0.2 deg; the migration, dispersion and the ~61-deg
        // death are the LUT's own physics, so the old low-sun
        // display ramp is gone.
        opticsU.srcAlt.value = sun.alt;
        if (dogAltSun === null || Math.abs(sun.alt - dogAltSun) > 0.0035) {
          dogAltSun = sun.alt;
          const dl = buildDogLUT(sun.alt);
          opticsU.dogData.set(dl.data);
          opticsU.dogTex.needsUpdate = true;
          opticsU.dogA0.value = (dl.azMinDeg * Math.PI) / 180;
          opticsU.dogA1.value = (dl.azMaxDeg * Math.PI) / 180;
          dogOnSun = dl.any;
        }
        opticsU.dogs.value = dogOnSun ? 1 : 0;
        // The moon's dome: same gating physics (cirrus for the
        // halo, rain for the bow, low source for the dogs), the
        // source now the moon at its true phase brightness.
        {
          // Anchored at the DRAWN (refracted) moon so the halo ring
          // stays centred on the disc the visitor sees.
          const moonVec2 = skyPoint(refr.moonApp, moon.az, 1);
          opticsMoonU.sunDir.value.copy(moonVec2);
          opticsMoonU.antisolar.value.copy(moonVec2).negate();
          const moonOut =
            (1 - day) *
            THREE.MathUtils.clamp(1 - cloudy * 1.1, 0, 1) *
            (astro.moonRel ?? 0) *
            lpVisBright *
            MOONOPT_GAIN;
          opticsMoonU.bow.value =
            raining && moon.alt > 0 && moon.alt < 0.733 ? moonOut : 0;
          opticsMoonU.halo.value =
            (cHigh / 100) *
            (cHigh < 90 ? 1 : 0.5) *
            moonOut *
            (moon.alt > 0 ? 1 : 0);
          opticsMoonU.srcAlt.value = refr.moonApp;
          if (
            dogAltMoon === null ||
            Math.abs(refr.moonApp - dogAltMoon) > 0.0035
          ) {
            dogAltMoon = refr.moonApp;
            const dl = buildDogLUT(refr.moonApp);
            opticsMoonU.dogData.set(dl.data);
            opticsMoonU.dogTex.needsUpdate = true;
            opticsMoonU.dogA0.value = (dl.azMinDeg * Math.PI) / 180;
            opticsMoonU.dogA1.value = (dl.azMaxDeg * Math.PI) / 180;
            dogOnMoon = dl.any;
          }
          opticsMoonU.dogs.value = dogOnMoon ? 1 : 0;
        }

        // Deciduous phenology: Hopkins' bioclimatic law shifts the leaf
        // calendar ~4 days per degree of latitude and per 122m of
        // elevation; the southern hemisphere is half a year out of phase.
        let doy = (d.getTime() - Date.UTC(d.getUTCFullYear(), 0, 0)) / 86400000;
        if (state.lat < 0) doy = (doy + 182.5) % 365;
        const hop = 4 * (Math.abs(state.lat) - 39) + centerElev / 30.5;
        const leafOut = 105 + hop;
        const senesce = 265 - hop;
        const frac = (x, a, b) =>
          THREE.MathUtils.clamp((x - a) / (b - a), 0, 1);
        const spring = frac(doy, leafOut, leafOut + 18);
        const mature = frac(doy, leafOut + 18, leafOut + 45);
        const fall = frac(doy, senesce, senesce + 20);
        const drop = frac(doy, senesce + 25, senesce + 45);
        broadMats.forEach((m, i) => {
          m.color
            .copy(cBare)
            .lerp(cSpring, spring)
            .lerp(broadBases[i], spring * mature)
            .lerp(cAutumn, fall)
            .lerp(cBare, drop);
        });

        // Physical snow: lazily boot Rapier the first time it really
        // snows, then step the world once per frame.
        if (snowing && !snowSim && !snowLoading && !reduceMotion) initSnowSim();
        if (snowSim) {
          snowSim.world.step();
          let fi = 0;
          for (const body of snowSim.bodies) {
            // The real wind pushes every airborne flake.
            body.resetForces(true);
            body.addForce(
              {
                x: windV.x * state.wind * 0.0004,
                y: 0,
                z: windV.z * state.wind * 0.0004
              },
              true
            );
            const p = body.translation();
            // Settled = genuinely at rest. The per-frame wind force keeps
            // bodies formally awake, so ask the velocity, not sleep state.
            const v = body.linvel();
            const settled =
              body.isSleeping() ||
              Math.hypot(v.x, v.y, v.z) < 0.07 ||
              p.y < sample(p.x, p.z).y + 0.05;
            if (settled) {
              if (snowing) snowSim.deposit(p);
              snowSim.spawn(body);
            } else if (Math.abs(p.x) > 130 || Math.abs(p.z) > 130) {
              snowSim.spawn(body); // blown out of the near field
            } else if (snowing) {
              tmpM4.makeScale(1, 1, 1).setPosition(p.x, p.y, p.z);
              flakeMesh.setMatrixAt(fi++, tmpM4);
            }
          }
          flakeMesh.count = fi;
          flakeMesh.visible = fi > 0;
          flakeMesh.instanceMatrix.needsUpdate = true;
          // Warm real temperatures erode the drifts, oldest first.
          if (state.temp > 1 && snowSim.countD) {
            snowSim.melt += dt * (state.temp - 1) * 1.5;
            while (snowSim.melt > 1 && snowSim.countD) {
              snowSim.melt -= 1;
              snowSim.meltOldest();
            }
          }
        }

        // Trees: an underdamped spring-damper per tree, forced by the
        // real mean wind and the real gust spread, leaning along the
        // true wind direction.
        const meanLean = Math.min(state.wind / 130, 0.5);
        const gustAmp = Math.min(
          Math.max(state.gust - state.wind, 0) / 90,
          0.6
        );
        treeAxis.set(windV.z, 0, -windV.x);
        for (const tree of trees) {
          const u = tree.userData;
          const forcing =
            meanLean +
            gustAmp *
              (0.6 *
                Math.sin(t * 0.0011 + u.phase) *
                Math.sin(t * 0.00043 + u.phase * 2.7) +
                0.4 * Math.sin(t * 0.0027 + u.phase * 1.3));
          u.v += (14 * (forcing - u.a) - 4.2 * u.v) * dt;
          u.a += u.v * dt;
          tree.setRotationFromAxisAngle(treeAxis, u.a);
        }

        // Cable cabins: pendulums in the SAME measured wind that
        // sways the trees - the drag/gravity statics set the lean,
        // gusts cycle it at the pendulum's own sqrt(g/L) frequency
        // (aerialways.js, gated). treeAxis already points along
        // the true wind's perpendicular this frame.
        if (aerialCabins.length) {
          const armU = CABIN.arm / MPU;
          const tS = t / 1000;
          for (const c of aerialCabins) {
            const th = cabinSwing(
              state.wind / 3.6,
              state.gust / 3.6,
              centerElev,
              tS,
              c.phase
            );
            const s = Math.sin(th) * armU;
            c.m.position.set(
              c.hang[0] + windV.x * s,
              c.hang[1] - Math.cos(th) * armU,
              c.hang[2] + windV.z * s
            );
            c.m.setRotationFromAxisAngle(treeAxis, th);
          }
        }

        // Wind turbines: nacelles slew into the measured wind at
        // the published 0.5 deg/s yaw rate, rotors run the
        // variable-speed law at the hub-height wind (the
        // forecast's own 80/120 m levels on the log profile),
        // clockwise seen from upwind as every sheet states.
        if (turbineRigs.length) {
          const target = Math.atan2(-windV.x, -windV.z);
          const maxYaw = YAW_DEG_S * RAD * dt;
          for (const r of turbineRigs) {
            if (r.yawA === null) r.yawA = target; // born facing it
            let dy = target - r.yawA;
            dy -= Math.round(dy / (2 * Math.PI)) * 2 * Math.PI;
            r.yawA += Math.abs(dy) < maxYaw ? dy : Math.sign(dy) * maxYaw;
            r.yaw.rotation.y = r.yawA;
            const v = turbineHubWind(r.spec) * (r.wake || 1);
            r.rotor.rotation.z -= rotorOmega(r.spec, v) * dt;
          }
        }

        // ISS: SGP4-propagated position; drawn only when the pass is
        // genuinely visible (above horizon, sunlit against a dark sky).
        if (satrec && window.satellite) {
          const pv = satellite.propagate(satrec, d);
          if (pv.position) {
            const lk = satellite.ecfToLookAngles(
              {
                latitude: state.lat * RAD,
                longitude: state.lon * RAD,
                height: centerElev / 1000
              },
              satellite.eciToEcf(pv.position, satellite.gstime(d))
            );
            // Cylindrical Earth-shadow test in the equatorial frame.
            const sEq = sunEquatorial(d);
            const sx = Math.cos(sEq.dec) * Math.cos(sEq.ra);
            const sy = Math.cos(sEq.dec) * Math.sin(sEq.ra);
            const sz = Math.sin(sEq.dec);
            const r = pv.position;
            const dp = r.x * sx + r.y * sy + r.z * sz;
            const perp = Math.hypot(
              r.x - dp * sx,
              r.y - dp * sy,
              r.z - dp * sz
            );
            const sunlit = dp > 0 || perp > 6371;
            iss.visible = lk.elevation > 0.09 && sunlit && sun.alt < -0.05;
            if (iss.visible) {
              iss.position.copy(skyPoint(lk.elevation, lk.azimuth, 820));
              if (t - lastPassSaid > 900000) {
                lastPassSaid = t;
                say(
                  'ISS pass · ' +
                    Math.round(lk.rangeSat) +
                    ' km away · real orbit via SGP4'
                );
              }
            }
          }
        }

        // The fleet: every naked-eye satellite above the horizon,
        // under the ISS's exact visibility physics (sats.js:
        // Vallado shadow cylinder, McCants magnitude on the
        // shared Lambert law). SGP4 refreshes round-robin (8 per
        // frame, each ~10 us); between refreshes positions ride
        // the stored velocity - under 10 ms of drift.
        {
          let dotI = 0;
          if (satFleet.length && window.satellite && sun.alt < -0.05) {
            const sEq2 = sunEquatorial(d);
            const sHat = {
              x: Math.cos(sEq2.dec) * Math.cos(sEq2.ra),
              y: Math.cos(sEq2.dec) * Math.sin(sEq2.ra),
              z: Math.sin(sEq2.dec)
            };
            const gmstNow = satellite.gstime(d);
            const obsGd = {
              latitude: state.lat * RAD,
              longitude: state.lon * RAD,
              height: centerElev / 1000
            };
            const obsEci = satellite.ecfToEci(
              satellite.geodeticToEcf(obsGd),
              gmstNow
            );
            const nowMs = d.getTime();
            let refreshed = 0;
            for (const f of satFleet) {
              if (refreshed < 8 && nowMs - f.t0 > 10000) {
                refreshed++;
                f.t0 = nowMs;
                const pv = satellite.propagate(f.satrec, d);
                if (pv.position && pv.velocity) {
                  f.r = pv.position;
                  f.v = pv.velocity;
                } else {
                  f.r = null; // decayed or bad set - never drawn
                }
              }
              if (!f.r || dotI >= SAT_DOT_N) continue;
              const dtE = (nowMs - f.t0) / 1000;
              const P = {
                x: f.r.x + f.v.x * dtE,
                y: f.r.y + f.v.y * dtE,
                z: f.r.z + f.v.z * dtE
              };
              if (!sunlitEci(P, sHat)) continue;
              const lk = satellite.ecfToLookAngles(
                obsGd,
                satellite.eciToEcf(P, gmstNow)
              );
              if (lk.elevation < 0.09) continue;
              const tox = obsEci.x - P.x;
              const toy = obsEci.y - P.y;
              const toz = obsEci.z - P.z;
              const tl = Math.hypot(tox, toy, toz);
              const beta = Math.acos(
                THREE.MathUtils.clamp(
                  (tox * sHat.x + toy * sHat.y + toz * sHat.z) / tl,
                  -1,
                  1
                )
              );
              const m = satMagnitude(lk.rangeSat, beta);
              if (m > 4.6) continue; // below the naked eye
              const dot = satDots[dotI++];
              dot.visible = true;
              dot.position.copy(skyPoint(lk.elevation, lk.azimuth, 820));
              dot.scale.setScalar(
                THREE.MathUtils.clamp(2.3 - 0.38 * m, 0.55, 3.2)
              );
            }
          }
          for (; dotI < SAT_DOT_N; dotI++) satDots[dotI].visible = false;
        }

        let shakeX = 0;
        let shakeY = 0;
        if (state.shake > 0.005 && !reduceMotion) {
          shakeX = (Math.random() - 0.5) * state.shake;
          shakeY = (Math.random() - 0.5) * state.shake * 0.6;
          state.shake *= Math.pow(0.35, dt);
        }

        if (freeCam.on) {
          // Free flight: yaw/pitch from drag, movement from keys and
          // wheel, height clamped to the real terrain.
          const cp = Math.cos(freeCam.pitch);
          const fx = Math.sin(freeCam.yaw) * cp;
          const fy = -Math.sin(freeCam.pitch);
          const fz = Math.cos(freeCam.yaw) * cp;
          const rx = Math.cos(freeCam.yaw);
          const rz = -Math.sin(freeCam.yaw);
          const k = freeCam.keys;
          const fast = k.has('ShiftLeft') || k.has('ShiftRight') ? 3 : 1;
          const sp = 12 * fast * dt;
          let mx = 0;
          let my = 0;
          let mz = 0;
          if (k.has('KeyW') || k.has('ArrowUp')) {
            mx += fx * sp;
            my += fy * sp;
            mz += fz * sp;
          }
          if (k.has('KeyS') || k.has('ArrowDown')) {
            mx -= fx * sp;
            my -= fy * sp;
            mz -= fz * sp;
          }
          if (k.has('KeyD') || k.has('ArrowRight')) {
            mx += rx * sp;
            mz += rz * sp;
          }
          if (k.has('KeyA') || k.has('ArrowLeft')) {
            mx -= rx * sp;
            mz -= rz * sp;
          }
          if (k.has('KeyR')) my += sp;
          if (k.has('KeyF')) my -= sp;
          // Wheel dolly eases out along the view direction.
          const dol = freeCam.dolly * Math.min(dt * 8, 1);
          freeCam.dolly -= dol;
          mx += fx * dol;
          my += fy * dol;
          mz += fz * dol;
          freeCam.pos.x = THREE.MathUtils.clamp(freeCam.pos.x + mx, -130, 130);
          freeCam.pos.z = THREE.MathUtils.clamp(freeCam.pos.z + mz, -130, 130);
          const ground = sample(freeCam.pos.x, freeCam.pos.z).y + 1.6;
          freeCam.pos.y = THREE.MathUtils.clamp(freeCam.pos.y + my, ground, 95);
          // Past the trigger ring the world re-anchors under you
          // (roam block above); the clamp only ever bites while a
          // fetch is pending or failed - always inside real data.
          maybeRoam(t, mx !== 0 || my !== 0 || mz !== 0);
          camera.position.set(
            freeCam.pos.x + shakeX,
            freeCam.pos.y + shakeY,
            freeCam.pos.z
          );
          camera.lookAt(
            freeCam.pos.x + fx,
            freeCam.pos.y + fy,
            freeCam.pos.z + fz
          );
        } else {
          const equatorYaw = state.lat < 0 ? Math.PI : 0;
          const auroraOn = auroraU.strength.value > 0.04;
          const LK = (params.has('debug') && window.__look) || LOOK;
          const targetYaw = LK
            ? Math.PI - LK[0] * RAD
            : auroraOn
              ? Math.PI - equatorYaw
              : equatorYaw;
          if (!yawInit || LK) {
            // A pinned look (harness) takes effect immediately; only
            // the ambient aurora turn keeps the slow ease.
            yaw = targetYaw;
            yawInit = true;
          }
          yaw += (targetYaw - yaw) * Math.min(dt * 0.4, 1);
          const vx = Math.sin(yaw);
          const vz = Math.cos(yaw);
          const camZ = -26 * vz;
          const camX = -26 * vx;
          // Clear the immediate foreground so the camera never sits with
          // its face in a hillside.
          const baseY =
            Math.max(
              sample(camX, camZ).y,
              sample(camX + 5, camZ).y,
              sample(camX - 5, camZ).y,
              sample(camX, camZ + 5).y,
              sample(camX, camZ - 5).y
            ) + 4.5;
          camBaseY += (baseY - camBaseY) * Math.min(dt * 2, 1);

          camera.position.set(
            camX + look.x * 3 + shakeX,
            camBaseY + look.y * -1.2 + shakeY,
            camZ
          );
          const lookAlt = LK ? (LK[1] || 0) * RAD : 0;
          camera.lookAt(
            camX + Math.cos(lookAlt) * vx * 66 + look.x * 8,
            camBaseY + 1 + look.y * -5 + Math.sin(lookAlt) * 66,
            camZ + Math.cos(lookAlt) * vz * 66
          );
          // Harness pose override (?debug=1): place the camera AT a
          // point with a compass az / alt view - close framing for
          // visual verification (a train fills the frame instead of
          // being a 1.5 km speck from the default vantage).
          if (params.has('debug') && window.__pose) {
            const p = window.__pose;
            camera.position.set(p.x, p.y, p.z);
            const pAz = p.az * RAD;
            const pAlt = (p.alt || 0) * RAD;
            camera.lookAt(
              p.x + Math.cos(pAlt) * Math.sin(pAz),
              p.y + Math.sin(pAlt),
              p.z - Math.cos(pAlt) * Math.cos(pAz)
            );
          }
        }

        if (!panel.hidden) {
          const Ums = state.wind / 3.6;
          live['sun (computed)'] =
            (sun.alt / RAD).toFixed(1) +
            '° alt · ' +
            ((((sun.az / RAD) % 360) + 360) % 360).toFixed(0) +
            '° az';
          live['moon (computed)'] = (moon.alt / RAD).toFixed(1) + '° alt';
          live['sea state'] =
            'Hs ' +
            ((0.21 * Ums * Ums) / 9.81).toFixed(2) +
            ' m · Tp ' +
            (0.7305 * Ums).toFixed(1) +
            ' s (Pierson-Moskowitz) · mss ' +
            (0.003 + 0.00512 * Ums).toFixed(4) +
            ' (Cox-Munk) · whitecaps ' +
            (3.84e-4 * Math.pow(Ums, 3.41)).toFixed(2) +
            '% (Monahan)';
          live['visibility (Koschmieder fog)'] =
            (state.visibility / 1000).toFixed(1) + ' km measured';
          live['snowline (freezing level)'] =
            Math.round(terrainUniforms.uSnowLine.value) + ' m';
          live['treeline (Körner & Paulsen)'] =
            Math.round(treelineM(state.lat)) + ' m';
          live['optics'] =
            'bow ' +
            opticsU.bow.value.toFixed(2) +
            ' · halo ' +
            opticsU.halo.value.toFixed(2) +
            ' · eclipse ' +
            ((astro.eclipse || 0) * 100).toFixed(0) +
            '%';
          live['aurora curtain'] =
            auroraU.strength.value.toFixed(2) + ' strength';
          if (snowSim)
            live['snow (Rapier)'] =
              snowSim.countD +
              ' drift deposits · ' +
              flakeMesh.count +
              ' falling';
        }

        camera.updateMatrixWorld();

        if (cloudsActive) {
          // Terrain depth prepass (cheap: colour writes off, override
          // material): gives the cloud march its scene depth and the
          // composite its bilateral weights.
          const mask = camera.layers.mask;
          scene.overrideMaterial = depthOnlyMat;
          camera.layers.mask = 1 << 3;
          renderer.setRenderTarget(cloudDepthRT);
          renderer.render(scene, camera);
          renderer.setRenderTarget(null);
          camera.layers.mask = mask;
          scene.overrideMaterial = null;
          cloudSys.render(camera, cloudDepthRT.depthTexture);
        }
        renderer.render(scene, camera);
        if (cloudsActive) cloudSys.composite();
        // Precipitation overlays the composite (rain and snow fall in
        // FRONT of the far cloud decks), still depth-tested against the
        // scene via the preserved depth buffer.
        {
          const mask = camera.layers.mask;
          camera.layers.mask = 1 << 4;
          renderer.autoClear = false;
          renderer.render(scene, camera);
          renderer.autoClear = true;
          camera.layers.mask = mask;
        }

        if (captureReq) {
          // The WebGPU canvas texture is recycled on present, so no
          // 2D snapshot ever sees it - instead the frame's own pass
          // sequence (main render, cloud composite, precipitation
          // overlay) is repeated into an offscreen target and read
          // back through three. composite() draws its quad into
          // whatever target is bound, so the bracket captures the
          // full composited frame.
          const req = captureReq;
          captureReq = null;
          const rt = new THREE.RenderTarget(req.w, req.h);
          renderer.setRenderTarget(rt);
          renderer.render(scene, camera);
          if (cloudsActive) cloudSys.composite();
          {
            const mask = camera.layers.mask;
            camera.layers.mask = 1 << 4;
            renderer.autoClear = false;
            renderer.render(scene, camera);
            renderer.autoClear = true;
            camera.layers.mask = mask;
          }
          renderer.setRenderTarget(null);
          console.warn('capture: passes rendered, reading back');
          renderer
            .readRenderTargetPixelsAsync(rt, 0, 0, req.w, req.h)
            .then((buf) => {
              rt.dispose();
              console.warn('capture: readback done');
              req.res(buf);
            })
            .catch((e) => console.warn('capture: readback failed ' + e));
        }
      }

      (async () => {
        if (document.prerendering) {
          await new Promise((resolve) =>
            document.addEventListener('prerenderingchange', resolve, {
              once: true
            })
          );
        }
        requestAnimationFrame(frame);
        await syncWeather();
        // overridden harness weather never reaches syncWeather's
        // own call - lay the bow LUT from whatever state holds now
        refreshBowLUT();
        syncComets();
        syncInsolation();
        setInterval(syncInsolation, 15 * 60 * 1000);
        setInterval(syncWeather, 15 * 60 * 1000);
        syncGeomag();
        syncAir();
        setInterval(syncAir, 30 * 60 * 1000);
        syncMarine();
        setInterval(syncMarine, 15 * 60 * 1000);
        syncRadar();
        setInterval(syncRadar, 10 * 60 * 1000);
        syncAloft();
        setInterval(syncAloft, 30 * 60 * 1000);
        syncForests();
        syncBrdf();
        syncTraffic();
        setInterval(syncTraffic, 60 * 1000);
        syncShips();
        setInterval(syncShips, 120 * 1000);
        syncF107();
        setInterval(syncF107, 6 * 60 * 60 * 1000);
        syncKp();
        setInterval(syncKp, 15 * 60 * 1000);
        syncOvation();
        setInterval(syncOvation, 30 * 60 * 1000);
        syncSpace();
        syncMetar();
        setInterval(syncMetar, 10 * 60 * 1000);
        syncSmoke();
        setInterval(syncSmoke, 30 * 60 * 1000);
        syncAerosol();
        setInterval(syncAerosol, 30 * 60 * 1000);
        syncWater();
        syncBuildings();
        syncRoads();
        syncRivers();
        syncDischarge();
        setInterval(syncDischarge, 6 * 60 * 60 * 1000);
        syncRails();
        syncAerialways();
        syncTurbines();
        syncPeaks();
        syncLanduse();
        syncSoil();
        setInterval(syncSoil, 3 * 60 * 60 * 1000);
        syncTrains();
        setInterval(syncTrains, 90 * 1000);
        syncLights();
        setInterval(syncLights, 6 * 60 * 60 * 1000);
        syncSnowCover();
        setInterval(syncSnowCover, 6 * 60 * 60 * 1000);
        setInterval(syncSpace, 5 * 60 * 1000);
        syncISS();
        setInterval(syncISS, 6 * 60 * 60 * 1000);
        syncFleet();
        setInterval(syncFleet, 6 * 60 * 60 * 1000);
        if (params.get('dem') !== '0') {
          try {
            demData = await fetchDEMTiles(state.lat, state.lon);
            buildWorld();
          } catch (e) {
            if (params.has('debug')) console.warn('dem tiles: ' + e.message);
            try {
              demData = await fetchDEM(state.lat, state.lon);
              buildWorld();
            } catch (e2) {
              // Keep the procedural fallback (but say why in debug).
              if (params.has('debug')) console.warn('dem: ' + e2.message);
            }
          }
        }
        if (params.has('quake')) {
          setTimeout(() => {
            state.shake = Math.min((+params.get('quake') - 4) * 0.5, 1.2);
            say('M' + params.get('quake') + ' earthquake · debug override');
          }, 1500);
        } else {
          pollQuakes();
          setInterval(pollQuakes, 5 * 60 * 1000);
        }
      })();
    </script>
  </body>
</html>
