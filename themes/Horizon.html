<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Horizon</title>
    <!--
      A 3D landscape where everything shown is real state:
      - the terrain is your terrain: real elevations around the visitor's
        location (AWS terrarium elevation tiles at ~30-90m resolution,
        falling back to the open-meteo elevation API), with sea rendered
        where the sea actually is; shading reads the DEM directly - a
        world-space normal map baked from the heightfield at close to
        full tile resolution lights every pixel with the real hillside
        orientation (the mesh only carries the silhouette)
      - a multiple-scattering atmosphere after Hillaire (2020):
        transmittance, multiple-scattering and per-frame sky-view LUTs
        with Rayleigh, Mie (scaled by the measured AOD) and ozone
        profiles, so twilight structure emerges from the raymarch; an
        aerial-perspective LUT applies the same scattering to the air
        BETWEEN camera and terrain, so distant ridges blue out by
        physics; the sun's terrain light carries its true transmitted
        colour; sun position from astronomy-engine (VSOP87/ELP
        truncations, topocentric, refraction-corrected); Preetham as
        fallback
      - the actual night sky (Yale Bright Star Catalog: 2887 stars with
        real positions, magnitudes and colour temperatures) rotated for
        the latitude and the current sidereal time; the five naked-eye
        planets at their ephemeris positions and magnitudes; the moon
        shows its real phase (lit from the sun's true direction) and its
        real apparent size for today's Earth-Moon distance
      - fog obeys the Koschmieder relation on the MEASURED visibility;
        sun glitter follows Cox & Munk (1954) slope statistics; cloud
        cover renders in the model's real low/mid/high layers, each deck
        riding its own real wind (surface, 700hPa, 250hPa jet); the low
        cumulus deck AND the mid altostratus deck are raymarched
        volumetric cloudscapes after Schneider & Vos (SIGGRAPH 2015):
        Perlin-Worley density carved by the real cover at the real LCL,
        a zero-mean weather map varying that cover across the sky
        without changing it, stratus/cumulus/cumulonimbus height
        profiles picked by the reported WMO code, adaptive
        coarse-to-fine marching, Beer-powder sun lighting, dual-lobe
        Henyey-Greenstein phase - reconstructed temporally exactly as
        shipped in HZD (quarter-res buffer, 1-of-16 Bayer refresh,
        reprojection, golden-ratio jitter integration) with a terrain
        depth prepass so cloud passes IN FRONT of far ridges, and
        nearest-depth upsampling (Jansen & Bavoil 2010) keeping
        silhouettes clean (only thin cirrus stays 2D, as in the
        research)
      - the snowline tracks the real freezing level; the treeline follows
        Körner & Paulsen (2004); deciduous leaves follow Hopkins' law
        (real date, latitude and elevation), so autumn arrives when it
        actually does; surf breaks along the real shallows (McCowan
        H > 0.78d on the terrarium bathymetry)
      - atmospheric optics appear only under their true conditions:
        Descartes rainbows (42/51 deg) opposite a low sun during real
        rain, the 22 deg cirrus halo with low-sun parhelia, star twinkle
        growing with airmass, and real solar eclipses dimming the scene
      - live weather (open-meteo + geojs, both keyless): cloud cover,
        rain, snow, fog, wind-driven sway; fresh snow whitens the ground
        only when it is actually freezing where you are
      - the sea follows oceanography: Pierson-Moskowitz wave height and
        period from the real wind, deep-water dispersion, whitecap
        fraction from Monahan & O'Muircheartaigh, fresnel sun glitter
      - clouds ride the true wind vector at the real lifting condensation
        level; trees are spring-dampers forced by real mean wind and gusts
      - USGS M4.5+ earthquakes arrive at their true seismic travel times
        (P then S), attenuated by real distance
      - aurora follows NOAA's OVATION forecast oval: its real latitude
        sets the curtain's elevation in the sky (Kp heuristic fallback)
      - the ISS crosses the sky via SGP4-propagated live elements, drawn
        only during genuinely visible passes
      - when it snows, flakes are rigid bodies in a real physics engine
        (vendored Rapier): air drag, real wind force, collision with a
        heightfield of the local terrain and with settled flakes, so
        drifts accumulate while the page is open and melt when the real
        temperature rises
      - sky turbidity and haze come from measured air quality (open-meteo
        AOD and PM2.5); trees stand inside the real OSM forest polygons
        around you; the sea is a reflecting three.js Water plane whose
        wave energy follows the real sea state; constellation figures
        (d3-celestial data) ride the same sidereal dome as the stars
      - a data panel (the ✦ wallpaper control, ?debug=1, or the D key)
        lists every live source with its last real value

      Standalone debug overrides (query params, e.g. Horizon.html?time=...):
        lat, lon, time (ISO), cloud (0-100), wind (km/h), winddir (deg),
        gust (km/h), precip (mm), snow (cm), temp (C), dew (C), aod,
        pm25, vis (m), cloudlow/cloudmid/cloudhigh (0-100), code (WMO
        weather code), quake (magnitude), kp (0-9), aurora (0-1),
        auroralat (deg), dem=0 (skip real terrain), debug=1
    -->
    <style>

  <body>
    <canvas id="gl"></canvas>
    <div id="caption"></div>
    <div id="panel" hidden></div>
    <script src="./horizon/satellite.min.js"></script>
    <script src="./horizon/astronomy.browser.min.js"></script>
    <script type="module">
      import * as THREE from 'three';
      import {Sky} from './horizon/Sky.js';
      import {Water} from './horizon/Water.js';
      import {
        createAtmosphere,
        sunTransmittanceJS
      } from './horizon/atmosphere.js';
      import {
        createCloudSystem,
        generateCloudTextures
      } from './horizon/clouds.js';
      import {CSM} from './horizon/CSM.js';

      const params = new URL(location.href).searchParams;
      const reduceMotion = matchMedia(
        '(prefers-reduced-motion: reduce)'
      ).matches;
      const timeScale = reduceMotion ? 0.25 : 1;

      // ---------- real time (with optional ?time= override) ----------
      const t0 = performance.now();
      const timeBase = params.has('time')
        ? new Date(params.get('time')).getTime()
        : 0;
      const now = () =>
        timeBase ? new Date(timeBase + (performance.now() - t0)) : new Date();

      // ---------- astronomy (NOAA/Almanac low-precision, ~0.1 deg) ----------
      const RAD = Math.PI / 180;
      const days2000 = (d) => d.getTime() / 86400000 - 10957.5;

      function sunEquatorial(d) {
        const n = days2000(d);
        const L = (280.46 + 0.9856474 * n) % 360;
        const g = (357.528 + 0.9856003 * n) * RAD;
        const lambda = (L + 1.915 * Math.sin(g) + 0.02 * Math.sin(2 * g)) * RAD;
        const eps = 23.439 * RAD;
        return {
          ra: Math.atan2(Math.cos(eps) * Math.sin(lambda), Math.cos(lambda)),
          dec: Math.asin(Math.sin(eps) * Math.sin(lambda))
        };
      }

      function moonEquatorial(d) {
        const n = days2000(d);
        const L = (218.316 + 13.176396 * n) * RAD;
        const M = (134.963 + 13.064993 * n) * RAD;
        const F = (93.272 + 13.22935 * n) * RAD;
        const lambda = L + 6.289 * RAD * Math.sin(M);
        const beta = 5.128 * RAD * Math.sin(F);
        const eps = 23.439 * RAD;
        return {
          ra: Math.atan2(
            Math.sin(lambda) * Math.cos(eps) - Math.tan(beta) * Math.sin(eps),
            Math.cos(lambda)
          ),
          dec: Math.asin(
            Math.sin(beta) * Math.cos(eps) +
              Math.cos(beta) * Math.sin(eps) * Math.sin(lambda)
          )
        };
      }

      // Greenwich mean sidereal time, radians.
      const gmst = (d) =>
        ((18.697374558 + 24.06570982441908 * days2000(d)) % 24) * 15 * RAD;

      // Equatorial -> local horizontal (altitude/azimuth from north, cw).
      function altAz(eq, d, lat, lon) {
        const lst = gmst(d) + lon * RAD;
        const H = lst - eq.ra;
        const phi = lat * RAD;
        const alt = Math.asin(
          Math.sin(phi) * Math.sin(eq.dec) +
            Math.cos(phi) * Math.cos(eq.dec) * Math.cos(H)
        );
        const az = Math.atan2(
          Math.sin(H),
          Math.cos(H) * Math.sin(phi) - Math.tan(eq.dec) * Math.cos(phi)
        );
        return {alt, az: az + Math.PI}; // 0 = north, clockwise via east
      }

      // Alt/az onto the sky dome. East = +x, north = -z, up = +y.
      const skyPoint = (alt, az, r) =>
        new THREE.Vector3(
          r * Math.cos(alt) * Math.sin(az),
          r * Math.sin(alt),
          -r * Math.cos(alt) * Math.cos(az)
        );

      const haversineKm = (lat1, lon1, lat2, lon2) => {
        const a =
          Math.sin(((lat2 - lat1) * RAD) / 2) ** 2 +
          Math.cos(lat1 * RAD) *
            Math.cos(lat2 * RAD) *
            Math.sin(((lon2 - lon1) * RAD) / 2) ** 2;
        return 12742 * Math.asin(Math.sqrt(a));
      };

      // ---------- state from the real world ----------
      const state = {
        lat: params.has('lat') ? +params.get('lat') : 51.48,
        lon: params.has('lon') ? +params.get('lon') : 0,
        place: '',
        cloud: params.has('cloud') ? +params.get('cloud') : 20,
        wind: params.has('wind') ? +params.get('wind') : 8,
        precip: params.has('precip') ? +params.get('precip') : 0,
        snow: params.has('snow') ? +params.get('snow') : 0,
        temp: params.has('temp') ? +params.get('temp') : 14,
        winddir: params.has('winddir') ? +params.get('winddir') : 250,
        gust: params.has('gust') ? +params.get('gust') : 12,
        dew: params.has('dew') ? +params.get('dew') : 8,
        aod: params.has('aod') ? +params.get('aod') : 0.12,
        pm25: params.has('pm25') ? +params.get('pm25') : 6,
        cloudLow: params.has('cloudlow') ? +params.get('cloudlow') : null,
        cloudMid: params.has('cloudmid') ? +params.get('cloudmid') : null,
        cloudHigh: params.has('cloudhigh') ? +params.get('cloudhigh') : null,
        visibility: params.has('vis') ? +params.get('vis') : 30000,
        wind700: params.has('w700') ? +params.get('w700') : null,
        dir700: params.has('d700') ? +params.get('d700') : null,
        wind250: params.has('w250') ? +params.get('w250') : null,
        dir250: params.has('d250') ? +params.get('d250') : null,
        freezing: params.has('fl') ? +params.get('fl') : null,
        code: params.has('code') ? +params.get('code') : 1,
        kp: params.has('kp') ? +params.get('kp') : 0,
        auroraP: null, // OVATION oval probability 0..1, null = use Kp
        auroraLat: 68,
        shake: 0
      };
      const overridden = [
        'lat',
        'lon',
        'cloud',
        'wind',
        'precip',
        'snow',
        'temp',
        'winddir',
        'gust',
        'dew',
        'code'
      ].some((k) => params.has(k));

      const caption = document.getElementById('caption');
      let captionTimer = 0;
      function say(text, sticky) {
        caption.textContent = text;
        caption.style.opacity = 1;
        clearTimeout(captionTimer);
        if (!sticky)
          captionTimer = setTimeout(() => (caption.style.opacity = 0), 12000);
      }

      // Every live data source records what it last delivered, so the
      // panel (the site's ✦ wallpaper toggle, or ?debug=1, or the D key)
      // can prove nothing here is invented.
      const sources = {};
      function record(name, value) {
        sources[name] = {value: String(value), at: Date.now()};
      }

      const WMO = {
        0: 'clear',
        1: 'mostly clear',
        2: 'partly cloudy',
        3: 'overcast',
        45: 'fog',
        48: 'rime fog',
        51: 'drizzle',
        53: 'drizzle',
        55: 'drizzle',
        61: 'light rain',
        63: 'rain',
        65: 'heavy rain',
        71: 'light snow',
        73: 'snow',
        75: 'heavy snow',
        77: 'snow grains',
        80: 'showers',
        81: 'showers',
        82: 'heavy showers',
        85: 'snow showers',
        86: 'snow showers',
        95: 'thunderstorm',
        96: 'thunderstorm',
        99: 'thunderstorm'
      };

      async function syncWeather() {
        if (overridden) return;
        try {
          const geo = await (
            await fetch('https://get.geojs.io/v1/ip/geo.json', {
              credentials: 'omit'
            })
          ).json();
          state.lat = +geo.latitude;
          state.lon = +geo.longitude;
          state.place = geo.city || geo.country || '';
          record(
            'geojs.io IP location',
            state.lat.toFixed(2) +
              ', ' +
              state.lon.toFixed(2) +
              ' · ' +
              state.place
          );
        } catch {
          // Keep the Greenwich fallback.
        }
        try {
          const w = await (
            await fetch(
              'https://api.open-meteo.com/v1/forecast?latitude=' +
                state.lat +
                '&longitude=' +
                state.lon +
                '&current=weather_code,cloud_cover,cloud_cover_low,cloud_cover_mid,cloud_cover_high,visibility,precipitation,snowfall,wind_speed_10m,wind_direction_10m,wind_gusts_10m,temperature_2m,dew_point_2m',
              {credentials: 'omit'}
            )
          ).json();
          const c = w.current;
          state.code = c.weather_code;
          state.cloud = c.cloud_cover;
          state.cloudLow = c.cloud_cover_low;
          state.cloudMid = c.cloud_cover_mid;
          state.cloudHigh = c.cloud_cover_high;
          state.visibility = c.visibility || state.visibility;
          state.precip = c.precipitation;
          state.snow = c.snowfall;
          state.wind = c.wind_speed_10m;
          state.winddir = c.wind_direction_10m;
          state.gust = c.wind_gusts_10m;
          state.temp = c.temperature_2m;
          state.dew = c.dew_point_2m;
          record(
            'open-meteo current',
            (WMO[state.code] || state.code) +
              ' · ' +
              state.temp +
              '°C · wind ' +
              state.wind +
              ' km/h from ' +
              state.winddir +
              '° gust ' +
              state.gust +
              ' · cloud ' +
              state.cloud +
              '% · dew ' +
              state.dew +
              '°C'
          );
          say(
            (state.place ? state.place + ' · ' : '') +
              (WMO[state.code] || 'weather code ' + state.code) +
              ' · this scene mirrors your sky and terrain'
          );
        } catch {
          say('weather unavailable · showing a calm day');
        }
      }

      // Winds aloft and the freezing level: mid clouds ride the 700hPa
      // wind, cirrus rides the 250hPa jet, and the snowline on the peaks
      // follows the real 0°C isotherm.
      async function syncAloft() {
        if (params.has('fl') || params.has('w250')) return;
        try {
          const w = await (
            await fetch(
              'https://api.open-meteo.com/v1/forecast?latitude=' +
                state.lat +
                '&longitude=' +
                state.lon +
                '&hourly=wind_speed_700hPa,wind_direction_700hPa,wind_speed_250hPa,wind_direction_250hPa,freezing_level_height&forecast_hours=1',
              {credentials: 'omit'}
            )
          ).json();
          const h = w.hourly;
          state.wind700 = h.wind_speed_700hPa[0];
          state.dir700 = h.wind_direction_700hPa[0];
          state.wind250 = h.wind_speed_250hPa[0];
          state.dir250 = h.wind_direction_250hPa[0];
          state.freezing = h.freezing_level_height[0];
          record(
            'open-meteo winds aloft',
            '700hPa ' +
              state.wind700 +
              ' km/h @' +
              state.dir700 +
              '° · 250hPa jet ' +
              state.wind250 +
              ' km/h @' +
              state.dir250 +
              '° · freezing level ' +
              state.freezing +
              ' m'
          );
        } catch {
          // Layers fall back to the surface wind.
        }
      }

      // Real aerosols: the scattering sky's turbidity and the haze come
      // from measured air quality, not guesses.
      async function syncAir() {
        if (params.has('aod') || params.has('pm25')) return;
        try {
          const a = await (
            await fetch(
              'https://air-quality-api.open-meteo.com/v1/air-quality?latitude=' +
                state.lat +
                '&longitude=' +
                state.lon +
                '&current=aerosol_optical_depth,pm2_5',
              {credentials: 'omit'}
            )
          ).json();
          state.aod = a.current.aerosol_optical_depth ?? state.aod;
          state.pm25 = a.current.pm2_5 ?? state.pm25;
          record(
            'open-meteo air quality',
            'AOD ' + state.aod + ' · PM2.5 ' + state.pm25 + ' µg/m³'
          );
        } catch {
          // Keep the temperate defaults.
        }
      }

      // Real forests: OSM wood/forest polygons around the visitor decide
      // where trees stand (scene-space polygons, cached per location).
      let forestPolys = null;
      async function syncForests() {
        const key =
          'horizon-forest-' + state.lat.toFixed(2) + ',' + state.lon.toFixed(2);
        try {
          const hit = localStorage.getItem(key);
          if (hit) {
            forestPolys = JSON.parse(hit);
            record(
              'OSM Overpass forests (cached)',
              forestPolys.length + ' wood polygons'
            );
            buildWorld();
            return;
          }
        } catch {}
        try {
          const mLat = 111320;
          const mLon = Math.max(111320 * Math.cos(state.lat * RAD), 1e-6);
          const dLat = DEM_HALF_M / mLat;
          const dLon = DEM_HALF_M / mLon;
          const bbox =
            (state.lat - dLat).toFixed(4) +
            ',' +
            (state.lon - dLon).toFixed(4) +
            ',' +
            (state.lat + dLat).toFixed(4) +
            ',' +
            (state.lon + dLon).toFixed(4);
          const q =
            '[out:json][timeout:25];(way[natural=wood](' +
            bbox +
            ');way[landuse=forest](' +
            bbox +
            '););out geom 120;';
          // The mail.ru mirror is faster (Surveillance.html uses it too);
          // the main overpass-api.de instance is the fallback.
          let osm = null;
          for (const host of [
            'https://maps.mail.ru/osm/tools/overpass/api/interpreter',
            'https://overpass-api.de/api/interpreter'
          ]) {
            try {
              const r = await fetch(host + '?data=' + encodeURIComponent(q), {
                credentials: 'omit'
              });
              if (!r.ok) throw new Error(r.status);
              osm = await r.json();
              break;
            } catch {
              // Try the next mirror.
            }
          }
          if (!osm) throw new Error('overpass unavailable');
          forestPolys = osm.elements
            .filter((w) => w.geometry && w.geometry.length > 3)
            .map((w) =>
              w.geometry.map((g) => [
                +(((g.lon - state.lon) / (2 * dLon)) * WORLD).toFixed(1),
                +((-(g.lat - state.lat) / (2 * dLat)) * WORLD).toFixed(1)
              ])
            );
          record('OSM Overpass forests', forestPolys.length + ' wood polygons');
          try {
            localStorage.setItem(key, JSON.stringify(forestPolys));
          } catch {}
          buildWorld(); // replant where the real woods are
        } catch {
          forestPolys = null; // procedural scatter stays
        }
      }

      function inForest(x, z) {
        if (!forestPolys || !forestPolys.length) return true;
        for (const poly of forestPolys) {
          let inside = false;
          for (let i = 0, j = poly.length - 1; i < poly.length; j = i++) {
            const xi = poly[i][0];
            const zi = poly[i][1];
            const xj = poly[j][0];
            const zj = poly[j][1];
            if (
              zi > z !== zj > z &&
              x < ((xj - xi) * (z - zi)) / (zj - zi) + xi
            )
              inside = !inside;
          }
          if (inside) return true;
        }
        return false;
      }

      async function syncKp() {
        if (params.has('kp')) return;
        try {
          const rows = await (
            await fetch(
              'https://services.swpc.noaa.gov/json/planetary_k_index_1m.json',
              {credentials: 'omit'}
            )
          ).json();
          state.kp = +rows[rows.length - 1].estimated_kp || 0;
          record('NOAA SWPC planetary K-index', state.kp.toFixed(2));
        } catch {
          state.kp = 0;
        }
      }

      // NOAA's OVATION model: the actual forecast auroral oval. We take
      // the strongest probability near our meridian on our hemisphere,
      // and where it sits decides the curtain's true elevation in the
      // sky (overhead if the oval reaches our latitude).
      async function syncOvation() {
        if (params.has('aurora')) {
          state.auroraP = +params.get('aurora');
          state.auroraLat = params.has('auroralat')
            ? +params.get('auroralat')
            : state.lat + 6;
          return;
        }
        try {
          const o = await (
            await fetch(
              'https://services.swpc.noaa.gov/json/ovation_aurora_latest.json',
              {credentials: 'omit'}
            )
          ).json();
          const myLon = ((state.lon % 360) + 360) % 360;
          const south = state.lat < 0;
          let best = 0;
          let bestLat = south ? -68 : 68;
          for (const [lon, la, val] of o.coordinates) {
            if (south ? la > -40 : la < 40) continue;
            let dl = Math.abs(lon - myLon);
            if (dl > 180) dl = 360 - dl;
            if (dl > 3) continue;
            if (val > best) {
              best = val;
              bestLat = la;
            }
          }
          state.auroraP = best / 100;
          state.auroraLat = bestLat;
          record(
            'NOAA OVATION aurora oval',
            best + '% at lat ' + bestLat + '° on this meridian'
          );
        } catch {
          state.auroraP = null; // fall back to the Kp heuristic
        }
      }

      const seenQuakes = new Set();
      let firstQuakePoll = true;
      async function pollQuakes() {
        try {
          const q = await (
            await fetch(
              'https://earthquake.usgs.gov/earthquakes/feed/v1.0/summary/4.5_day.geojson',
              {credentials: 'omit'}
            )
          ).json();
          for (const f of q.features) {
            if (seenQuakes.has(f.id)) continue;
            seenQuakes.add(f.id);
            if (firstQuakePoll) continue; // only rumble live events
            // Real distance decides how hard it shakes here - and real
            // seismology decides WHEN. Waves are not instant: P-waves
            // average ~7.8 km/s and the stronger S-waves ~4.4 km/s, so
            // each arrival is scheduled at its true travel time (unless
            // feed latency means it already passed).
            const [qlon, qlat] = f.geometry.coordinates;
            const km = haversineKm(state.lat, state.lon, qlat, qlon);
            const atten = Math.max(Math.exp(-km / 2500), 0.04);
            const mag = f.properties.mag;
            const elapsed = (Date.now() - f.properties.time) / 1000;
            const pDelay = km / 7.8 - elapsed;
            const sDelay = km / 4.4 - elapsed;
            if (sDelay < -120) continue; // shaking here is long over
            const jolt = (amp) => {
              state.shake = Math.max(
                state.shake,
                Math.min((mag - 4) * 0.5 * atten * amp, 1.2)
              );
            };
            if (pDelay > 0) setTimeout(() => jolt(0.35), pDelay * 1000);
            if (sDelay > 0) setTimeout(() => jolt(1), sDelay * 1000);
            else jolt(1);
            say(
              'M' +
                mag.toFixed(1) +
                ' earthquake · ' +
                Math.round(km).toLocaleString('en') +
                ' km away · ' +
                (sDelay > 5
                  ? 'S-wave arrives in ' + Math.round(sDelay) + 's · '
                  : '') +
                f.properties.place
            );
          }
          firstQuakePoll = false;
          record('USGS M4.5+ quake feed', q.features.length + ' events today');
        } catch {
          // Silent: quakes are garnish, not the meal.
        }
      }

      // ---------- real terrain (open-meteo elevation, Copernicus DEM) ----------
      // 24x24 real elevations spanning 16km around the visitor, cached per
      // rounded location. The mesh gets macro relief from the DEM and only
      // fine detail from noise, so the landscape is recognisably *yours*.
      const DEM_N = 24;
      const DEM_HALF_M = 8000;
      const WORLD = 280; // scene units across; ~57 m per unit

      // Primary source: AWS terrarium tiles (Mapzen open data). Elevation
      // is PNG-encoded as (R*256 + G + B/256) - 32768, CORS-open, so a
      // stitched canvas gives ~30-90m real elevations in a few requests.
      // Kept at full pixel resolution (no downsampled cache: the browser's
      // HTTP cache already holds the tiles themselves).
      async function fetchDEMTiles(lat, lon) {
        const z = Math.max(
          8,
          Math.min(
            13,
            Math.round(Math.log2((40075000 * Math.cos(lat * RAD)) / 8000))
          )
        );
        const world = 2 ** z * 256; // global pixels at this zoom
        const px = (lo) => ((lo + 180) / 360) * world;
        const py = (la) => {
          const r = la * RAD;
          return (
            ((1 - Math.log(Math.tan(r) + 1 / Math.cos(r)) / Math.PI) / 2) *
            world
          );
        };
        const mLat = 111320;
        const mLon = Math.max(111320 * Math.cos(lat * RAD), 1e-6);
        const dLat = DEM_HALF_M / mLat;
        const dLon = DEM_HALF_M / mLon;
        const x0 = Math.floor(px(lon - dLon) / 256);
        const x1 = Math.floor(px(lon + dLon) / 256);
        const y0 = Math.floor(py(lat + dLat) / 256);
        const y1 = Math.floor(py(lat - dLat) / 256);
        if ((x1 - x0 + 1) * (y1 - y0 + 1) > 12)
          throw new Error('tile span too large');
        const canvas = document.createElement('canvas');
        canvas.width = (x1 - x0 + 1) * 256;
        canvas.height = (y1 - y0 + 1) * 256;
        const ctx = canvas.getContext('2d', {willReadFrequently: true});
        const jobs = [];
        for (let ty = y0; ty <= y1; ty++)
          for (let tx = x0; tx <= x1; tx++)
            jobs.push(
              new Promise((resolve, reject) => {
                const img = new Image();
                img.crossOrigin = 'anonymous';
                img.onload = () => {
                  ctx.drawImage(img, (tx - x0) * 256, (ty - y0) * 256);
                  resolve();
                };
                img.onerror = reject;
                img.src =
                  'https://s3.amazonaws.com/elevation-tiles-prod/terrarium/' +
                  z +
                  '/' +
                  tx +
                  '/' +
                  ty +
                  '.png';
              })
            );
        await Promise.all(jobs);
        const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
        const elev = new Float32Array(canvas.width * canvas.height);
        for (let k = 0; k < elev.length; k++)
          elev[k] =
            data[k * 4] * 256 + data[k * 4 + 1] + data[k * 4 + 2] / 256 - 32768;
        record(
          'AWS terrarium DEM tiles',
          jobs.length +
            ' tiles at z' +
            z +
            ' · ' +
            canvas.width +
            'x' +
            canvas.height +
            ' px'
        );
        return {
          kind: 'img',
          w: canvas.width,
          h: canvas.height,
          elev,
          ox: x0 * 256,
          oy: y0 * 256,
          worldPx: world,
          lat,
          lon,
          dLat,
          dLon
        };
      }

      async function fetchDEM(lat, lon) {
        const key = 'horizon-dem-om-' + lat.toFixed(2) + ',' + lon.toFixed(2);
        try {
          const hit = localStorage.getItem(key);
          if (hit) return JSON.parse(hit);
        } catch {}
        const mLat = 111320;
        const mLon = Math.max(111320 * Math.cos(lat * RAD), 1e-6);
        const lats = [];
        const lons = [];
        for (let j = 0; j < DEM_N; j++)
          for (let i = 0; i < DEM_N; i++) {
            lats.push(
              (lat + ((j / (DEM_N - 1) - 0.5) * 2 * DEM_HALF_M) / mLat).toFixed(
                4
              )
            );
            lons.push(
              (lon + ((i / (DEM_N - 1) - 0.5) * 2 * DEM_HALF_M) / mLon).toFixed(
                4
              )
            );
          }
        const grid = [];
        for (let o = 0; o < DEM_N * DEM_N; o += 96) {
          const r = await fetch(
            'https://api.open-meteo.com/v1/elevation?latitude=' +
              lats.slice(o, o + 96).join(',') +
              '&longitude=' +
              lons.slice(o, o + 96).join(','),
            {credentials: 'omit'}
          );
          if (!r.ok) throw new Error(r.status);
          grid.push(...(await r.json()).elevation);
        }
        const dem = {n: DEM_N, grid};
        record(
          'open-meteo elevation API',
          DEM_N + 'x' + DEM_N + ' grid (fallback)'
        );
        try {
          localStorage.setItem(key, JSON.stringify(dem));
        } catch {}
        return dem;
      }

      // ---------- scene ----------
      const canvas = document.getElementById('gl');
      const renderer = new THREE.WebGLRenderer({canvas, antialias: true});
      renderer.setPixelRatio(Math.min(devicePixelRatio, 1.5));
      // AgX tone reproduction (Sobotka; Blender 4's default view
      // transform, in three since r160): better hue preservation toward
      // clipping than ACES, which notoriously skews bright chroma.
      renderer.toneMapping = THREE.AgXToneMapping;
      renderer.toneMappingExposure = 0.55;
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;
      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(55, 1, 0.1, 2000);
      camera.layers.enable(2);

      // Cascaded shadow maps (vendored three.js CSM: practical split
      // scheme after Zhang et al. 2006). A single fixed ortho shadow box
      // only ever worked because the camera never moved; three cascades
      // follow the view frustum instead.
      const csm = new CSM({
        camera,
        parent: scene,
        cascades: 3,
        maxFar: 460,
        mode: 'practical',
        shadowMapSize: innerWidth < 800 ? 1024 : 2048,
        lightDirection: new THREE.Vector3(0, -1, 0),
        lightIntensity: 1,
        lightNear: 1,
        lightFar: 800,
        lightMargin: 150
      });
      csm.fade = true;
      csm.lights.forEach((l) => {
        l.shadow.bias = -0.0004;
        l.shadow.normalBias = 1.5;
      });
      record('Cascaded shadow maps', '3 cascades · practical splits (CSM)');

      let sizeCloudTargets = null;
      function resize() {
        renderer.setSize(innerWidth, innerHeight);
        camera.aspect = innerWidth / innerHeight;
        camera.updateProjectionMatrix();
        csm.updateFrustums();
        if (sizeCloudTargets) sizeCloudTargets();
      }
      addEventListener('resize', resize);
      resize();

      // Pure data holder now: its colour/intensity (from the CPU
      // transmittance mirror) drive the CSM cascade lights, the clouds
      // and the water each frame.
      const sunLight = new THREE.DirectionalLight(0xffffff, 1);
      // Ambient is a hemisphere fed by the REAL sky: the atmosphere pass
      // integrates its own sky-view LUT (cosine-weighted) and the result
      // is read back at 1 Hz - twilight blues, overcast greys and sunset
      // warmth arrive from the raymarch, not from a tuned formula. The
      // ground half is that irradiance bounced off an estimated terrain
      // albedo (0.25 grass/rock, 0.7 snow - the one disclosed estimate).
      const ambient = new THREE.HemisphereLight(0xffffff, 0x404038, 0.5);
      scene.add(ambient);

      // The sky: Hillaire (2020) multiple-scattering atmosphere -
      // transmittance, multiple-scattering and per-frame sky-view LUTs
      // with Rayleigh, Mie (scaled by measured AOD) and ozone profiles.
      // Twilight arch and the Belt of Venus emerge from the raymarch
      // instead of being painted. Preetham (three.js Sky) remains as the
      // fallback when float render targets are unavailable.
      const atmo = createAtmosphere(renderer);
      let skyU = null;
      if (atmo.ok) {
        scene.add(atmo.mesh);
        record(
          'Hillaire (2020) atmosphere',
          'multiple-scattering LUTs · ozone · AOD-scaled Mie'
        );
      } else {
        const sky = new Sky();
        sky.scale.setScalar(1200);
        scene.add(sky);
        skyU = sky.material.uniforms;
        skyU.rayleigh.value = 2.2;
        skyU.mieCoefficient.value = 0.004;
        skyU.mieDirectionalG.value = 0.8;
        record('Preetham sky (fallback)', 'no float render targets');
      }

      // Aerial perspective (Hillaire 2020, sec. 5.2): the atmosphere
      // BETWEEN the camera and every surface. atmosphere.js marches a
      // 64x32 LUT of inscattered radiance and mean transmittance over
      // (relative azimuth x distance), and every world material swaps
      // three.js' colour-only fog input for it - distant ridges turn
      // blue by scattering physics, then the Koschmieder haze (which
      // carries the MEASURED visibility) applies on top.
      const aerialU = {
        uAerialTex: {value: atmo.ok ? atmo.aerialTex : null},
        uAerialMaxU: {value: atmo.ok ? atmo.aerialMaxUnits : 1},
        uSunAzV: {value: new THREE.Vector2(1, 0)},
        uAerialExp: {value: 0}
      };
      const AERIAL_PARS =
        'uniform sampler2D uAerialTex; uniform float uAerialMaxU;\n' +
        'uniform vec2 uSunAzV; uniform float uAerialExp;\n' +
        'varying vec3 vAerialDir;';
      const AERIAL_FOG_FRAG =
        '#ifdef USE_FOG\n' +
        'float aerD = length(vAerialDir);\n' +
        'vec2 aerH = normalize(vAerialDir.xz + vec2(1e-6));\n' +
        'float aerAz = acos(clamp(dot(aerH, uSunAzV), -1.0, 1.0)) / 3.14159265;\n' +
        'vec4 aer = texture2D(uAerialTex, vec2(aerAz, min(aerD / uAerialMaxU, 1.0)));\n' +
        'gl_FragColor.rgb = gl_FragColor.rgb * aer.a + aer.rgb * uAerialExp;\n' +
        '#ifdef FOG_EXP2\n' +
        'float kFog = 1.0 - exp(-fogDensity * fogDensity * vFogDepth * vFogDepth);\n' +
        'gl_FragColor.rgb = mix(gl_FragColor.rgb, fogColor, kFog);\n' +
        '#endif\n' +
        '#endif';
      let aerialId = 0;
      function applyAerial(mat) {
        if (!atmo.ok) return;
        const prev = mat.onBeforeCompile;
        // The wrapper's source is identical for every material, so
        // three.js' program cache (keyed on onBeforeCompile.toString())
        // would hand them all ONE compiled program - the terrain would
        // silently get the tree shader. A unique key per material keeps
        // each wrapped program distinct.
        const id = aerialId++;
        mat.customProgramCacheKey = () => 'aerial' + id;
        mat.onBeforeCompile = (shader, r) => {
          if (prev) prev(shader, r);
          Object.assign(shader.uniforms, aerialU);
          shader.vertexShader = shader.vertexShader
            .replace(
              '#include <fog_pars_vertex>',
              '#include <fog_pars_vertex>\nvarying vec3 vAerialDir;'
            )
            .replace(
              '#include <fog_vertex>',
              '#include <fog_vertex>\n' +
                '#ifdef USE_INSTANCING\n' +
                'vAerialDir = (modelMatrix * instanceMatrix * vec4(transformed, 1.0)).xyz - cameraPosition;\n' +
                '#else\n' +
                'vAerialDir = (modelMatrix * vec4(transformed, 1.0)).xyz - cameraPosition;\n' +
                '#endif'
            );
          shader.fragmentShader = shader.fragmentShader
            .replace(
              '#include <fog_pars_fragment>',
              '#include <fog_pars_fragment>\n' + AERIAL_PARS
            )
            .replace('#include <fog_fragment>', AERIAL_FOG_FRAG);
        };
        mat.needsUpdate = true;
      }
      if (atmo.ok) {
        record(
          'Aerial perspective LUT',
          'per-pixel inscatter + transmittance on every material'
        );
        record(
          'Sky-irradiance ambient',
          'hemisphere light integrated from the sky-view LUT'
        );
      }
      const skyIrr = new THREE.Color(0.05, 0.07, 0.1);
      const tmpC = new THREE.Color();
      let lastIrrT = -1e9;

      // Overcast veil: a translucent grey dome that fades in with real
      // cloud cover (the scattering model alone stays too blue).
      const veilU = {
        alpha: {value: 0},
        top: {value: new THREE.Color('#79838c')},
        bottom: {value: new THREE.Color('#a2abb3')}
      };
      const veil = new THREE.Mesh(
        new THREE.SphereGeometry(600, 24, 16),
        new THREE.ShaderMaterial({
          side: THREE.BackSide,
          transparent: true,
          depthWrite: false,
          uniforms: veilU,
          vertexShader:
            'varying vec3 p; void main(){ p = position;' +
            ' gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }',
          fragmentShader:
            'varying vec3 p; uniform vec3 top; uniform vec3 bottom; uniform float alpha;' +
            ' void main(){ float h = clamp(normalize(p).y * 1.4 + 0.25, 0.0, 1.0);' +
            ' gl_FragColor = vec4(mix(bottom, top, h), alpha); }'
        })
      );
      veil.renderOrder = -1;
      scene.add(veil);
      scene.fog = new THREE.FogExp2('#dceef7', 0.004);

      // ---------- terrain ----------
      function mulberry32(a) {
        return () => {
          a |= 0;
          a = (a + 0x6d2b79f5) | 0;
          let t = Math.imul(a ^ (a >>> 15), 1 | a);
          t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
          return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
        };
      }
      const rand = mulberry32(20260704);
      const gridN = 48;
      const grid = Array.from({length: gridN * gridN}, rand);
      const lerp = (a, b, t) => a + (b - a) * t;
      const smooth = (t) => t * t * (3 - 2 * t);
      function noise2(x, y) {
        const xi = Math.floor(x),
          yi = Math.floor(y);
        const g = (ix, iy) =>
          grid[
            (((iy % gridN) + gridN) % gridN) * gridN +
              (((ix % gridN) + gridN) % gridN)
          ];
        const tx = smooth(x - xi),
          ty = smooth(y - yi);
        return lerp(
          lerp(g(xi, yi), g(xi + 1, yi), tx),
          lerp(g(xi, yi + 1), g(xi + 1, yi + 1), tx),
          ty
        );
      }
      const fbm = (x, y) =>
        0.55 * noise2(x, y) +
        0.27 * noise2(x * 2.1 + 13, y * 2.1 + 7) +
        0.13 * noise2(x * 4.3 + 41, y * 4.3 + 3) +
        0.05 * noise2(x * 8.9 + 5, y * 8.9 + 59);

      // Fallback height model when the DEM is unavailable: domain-warped
      // fBm, in real metres so the colouring logic stays unified.
      function proceduralElev(x, z) {
        const wx = x / 90 + 1.7 * fbm(x / 60 + 31, z / 60 + 17);
        const wz = z / 90 + 1.7 * fbm(x / 60 + 3, z / 60 + 47);
        const ridged = 1 - Math.abs(2 * fbm(wx, wz) - 1);
        return 90 + 700 * ridged * ridged + 260 * fbm(x / 40, z / 40);
      }

      let demData = null; // full-res tile image or {n, grid} API fallback
      function demElev(x, z) {
        if (demData.kind === 'img') {
          // Scene x/z -> lat/lon -> mercator pixel, bilinear on the tiles.
          const la = demData.lat - (z / WORLD) * 2 * demData.dLat;
          const lo = demData.lon + (x / WORLD) * 2 * demData.dLon;
          const r = la * RAD;
          const gx = THREE.MathUtils.clamp(
            ((lo + 180) / 360) * demData.worldPx - demData.ox,
            0,
            demData.w - 1.001
          );
          const gy = THREE.MathUtils.clamp(
            ((1 - Math.log(Math.tan(r) + 1 / Math.cos(r)) / Math.PI) / 2) *
              demData.worldPx -
              demData.oy,
            0,
            demData.h - 1.001
          );
          const i = Math.floor(gx);
          const j = Math.floor(gy);
          const e = demData.elev;
          const w = demData.w;
          return lerp(
            lerp(e[j * w + i], e[j * w + i + 1], gx - i),
            lerp(e[(j + 1) * w + i], e[(j + 1) * w + i + 1], gx - i),
            gy - j
          );
        }
        // x east, z south, in scene units -> bilinear over the DEM grid.
        const N = demData.n;
        const u = THREE.MathUtils.clamp(x / WORLD + 0.5, 0, 1) * (N - 1);
        const v = THREE.MathUtils.clamp(1 - (z / WORLD + 0.5), 0, 1) * (N - 1);
        const i = Math.min(Math.floor(u), N - 2);
        const j = Math.min(Math.floor(v), N - 2);
        const g = demData.grid;
        const e00 = g[j * N + i];
        const e10 = g[j * N + i + 1];
        const e01 = g[(j + 1) * N + i];
        const e11 = g[(j + 1) * N + i + 1];
        return lerp(lerp(e00, e10, u - i), lerp(e01, e11, u - i), v - j);
      }

      let centerElev = 300;
      function sample(x, z) {
        const e = demData ? demElev(x, z) : proceduralElev(x, z);
        const water = demData && e <= 0.3;
        // Real metres compressed onto the scene: asinh keeps flatlands
        // honest while alpine relief still towers.
        let y = 16 * Math.asinh((e - centerElev) / 500);
        if (water) y = 16 * Math.asinh((0 - centerElev) / 500) - 0.6;
        else {
          // With 30m tile data the noise is only seasoning; the coarse
          // fallbacks need more of it to avoid reading as blobs.
          const micro = demData && demData.kind === 'img' ? 0.5 : 1.6;
          y += micro * (fbm(x / 7, z / 7) - 0.5);
        }
        return {e, y, water};
      }

      const ground = new THREE.Group();
      scene.add(ground);
      // Tree archetypes (shared geometry, per-tree scale): conifers for
      // the subalpine band, broadleaves lower down.
      // GGX standard materials: bark and foliage are near-diffuse
      // (roughness ~1), which the microfacet model represents honestly
      // instead of Lambert's zero specular.
      const trunkMat = new THREE.MeshStandardMaterial({
        color: '#6b4a33',
        roughness: 0.9,
        metalness: 0
      });
      const leafMats = [
        new THREE.MeshStandardMaterial({color: '#2e5230', roughness: 1}),
        new THREE.MeshStandardMaterial({color: '#3f6b3a', roughness: 1}),
        new THREE.MeshStandardMaterial({color: '#4d7a35', roughness: 1})
      ];
      const broadMats = [
        new THREE.MeshStandardMaterial({color: '#4a7d33', roughness: 1}),
        new THREE.MeshStandardMaterial({color: '#5d8a3c', roughness: 1})
      ];
      [trunkMat, ...leafMats, ...broadMats].forEach((m) => {
        csm.setupMaterial(m); // first: its onBeforeCompile gets chained
        applyAerial(m);
      });
      const geoTrunk = new THREE.CylinderGeometry(0.13, 0.2, 1.1, 7);
      const geoCone1 = new THREE.ConeGeometry(1.15, 2.3, 10);
      const geoCone2 = new THREE.ConeGeometry(0.82, 1.8, 10);
      // Broadleaf crowns: an indexed sphere displaced by a smooth
      // position-hashed field (same offset for co-located verts, so
      // averaged normals stay smooth), instead of a faceted icosahedron.
      const geoCanopy = new THREE.SphereGeometry(1.25, 14, 10);
      {
        const cp = geoCanopy.attributes.position;
        const cv = new THREE.Vector3();
        for (let i = 0; i < cp.count; i++) {
          cv.fromBufferAttribute(cp, i);
          const s =
            1 +
            0.16 *
              Math.sin(cv.x * 4.7) *
              Math.sin(cv.y * 3.9 + 1.3) *
              Math.sin(cv.z * 5.1 + 2.1);
          cp.setXYZ(i, cv.x * s, cv.y * s, cv.z * s);
        }
        geoCanopy.computeVertexNormals();
      }
      // Deciduous phenology bases (Hopkins' law shifts the calendar).
      const broadBases = broadMats.map((m) => m.color.clone());
      const cBare = new THREE.Color('#6f5b46');
      const cSpring = new THREE.Color('#7cbf5d');
      const cAutumn = new THREE.Color('#b95f24');
      // Climatic treeline vs latitude, after Körner & Paulsen (2004).
      function treelineM(lat) {
        const a = Math.abs(lat);
        return a < 30
          ? 3500 + (30 - a) * 13
          : Math.max(3500 - 92 * (a - 30), 0);
      }
      let trees = [];
      let camBaseY = 6;
      let viewSign = 1; // +1: camera looks south (north hemisphere)
      let snowSim = null; // Rapier world, booted the first time it snows
      let snowLoading = false;
      let water = null; // three.js Water plane, built when the DEM has sea
      const waterNormalsTex = new THREE.TextureLoader().load(
        './horizon/waternormals.jpg'
      );
      waterNormalsTex.wrapS = waterNormalsTex.wrapT = THREE.RepeatWrapping;

      // Terrain material: grass/rock/snow/sea decided per PIXEL in the
      // fragment shader (slope and altitude with noise-jittered borders),
      // not per vertex, so faces stay crisp at any distance. Elevation in
      // metres is recovered in-shader by inverting the asinh compression.
      const terrainUniforms = {
        uNormalTex: {value: null},
        uWorldSize: {value: WORLD},
        uCenterElev: {value: 300},
        uSnowy: {value: 0},
        uSnowLine: {value: 2300},
        uTime: {value: 0},
        uWindMs: {value: 3},
        uWindVec: {value: new THREE.Vector2(1, 0)},
        uSunDirW: {value: new THREE.Vector3(0, 1, 0)},
        uSunCol: {value: new THREE.Color(0, 0, 0)}
      };
      const TERRAIN_GLSL =
        'uniform sampler2D uNormalTex;\n' +
        'uniform float uWorldSize;\n' +
        'uniform float uCenterElev;\n' +
        'uniform float uSnowy;\n' +
        'uniform float uSnowLine;\n' +
        'uniform float uTime;\n' +
        'uniform float uWindMs;\n' +
        'uniform vec2 uWindVec;\n' +
        'uniform vec3 uSunDirW;\n' +
        'uniform vec3 uSunCol;\n' +
        'varying float vWet;\n' +
        'varying vec3 vWp;\n' +
        'float gRough = 0.95;\n' +
        'float thash(vec2 p){ return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453); }\n' +
        'float tnoise(vec2 p){\n' +
        '  vec2 i = floor(p); vec2 f = fract(p);\n' +
        '  vec2 u = f * f * (3.0 - 2.0 * f);\n' +
        '  return mix(mix(thash(i), thash(i + vec2(1.0, 0.0)), u.x),\n' +
        '             mix(thash(i + vec2(0.0, 1.0)), thash(i + vec2(1.0, 1.0)), u.x), u.y);\n' +
        '}\n' +
        'float tfbm(vec2 p){ return 0.6 * tnoise(p) + 0.28 * tnoise(p * 2.7 + 19.0) + 0.12 * tnoise(p * 6.1 + 47.0); }\n' +
        // The sea obeys oceanography, scaled honestly (1 unit = 57.14m).
        // Pierson-Moskowitz fully developed sea: significant wave height
        // Hs = 0.21 U^2/g, peak period Tp = 2*pi*U/(0.877g); each wave
        // train moves at its true deep-water dispersion speed w = sqrt(gk)
        // and tilts the normal by the real steepness pi*Hs/lambda.
        'vec3 seaNormal(vec3 wp){\n' +
        '  float U = max(uWindMs, 0.8);\n' +
        '  float Hs = 0.21 * U * U / 9.81;\n' +
        '  float Tp = 0.7305 * U;\n' +
        '  float Lp = max(1.5614 * Tp * Tp, 4.0);\n' +
        '  vec2 pm = wp.xz * 57.14;\n' +
        '  vec2 d1 = normalize(uWindVec);\n' +
        '  vec2 d2 = normalize(uWindVec + vec2(-uWindVec.y, uWindVec.x) * 0.6);\n' +
        '  float k1 = 6.28318 / Lp;\n' +
        '  float k2 = 6.28318 / (Lp * 0.45);\n' +
        '  float s1 = 3.14159 * Hs / Lp;\n' +
        '  float a1 = cos(dot(pm, d1) * k1 - uTime * sqrt(9.81 * k1));\n' +
        '  float a2 = cos(dot(pm, d2) * k2 - uTime * sqrt(9.81 * k2) + 1.7);\n' +
        '  float chop = (tnoise(pm * 0.05 + uTime * 0.15 * d1) - 0.5) * s1 * 1.2;\n' +
        '  vec2 grad = d1 * (s1 * a1) + d2 * (s1 * 0.6 * a2) + vec2(chop);\n' +
        '  return normalize(vec3(-grad.x, 1.0, -grad.y));\n' +
        '}\n' +
        // Sun glitter: Blinn lobe on the wave normals with Schlick
        // fresnel; calm water gives a tight bright path, wind spreads it.
        'vec3 seaSpec(vec3 wp){\n' +
        '  vec3 n = seaNormal(wp);\n' +
        '  vec3 V = normalize(cameraPosition - wp);\n' +
        '  vec3 H = normalize(V + uSunDirW);\n' +
        '  float gloss = mix(700.0, 60.0, clamp(uWindMs / 15.0, 0.0, 1.0));\n' +
        '  float f = pow(clamp(1.0 - dot(V, n), 0.0, 1.0), 5.0) * 0.95 + 0.05;\n' +
        '  return uSunCol * pow(max(dot(n, H), 0.0), gloss) * f * 6.0;\n' +
        '}\n' +
        // The surface normal comes from the baked DEM normal map (full
        // tile resolution), NOT from screen-space derivatives of the
        // interpolated mesh - that is what removes the faceted look.
        'vec3 demNormal(vec2 xz){\n' +
        '  return normalize(texture2D(uNormalTex, xz / uWorldSize + 0.5).xyz * 2.0 - 1.0);\n' +
        '}\n' +
        'vec3 terrainColor(vec3 wp, float wetF){\n' +
        '  vec3 nW = demNormal(wp.xz);\n' +
        '  float slope = 1.0 - nW.y;\n' +
        '  float e = uCenterElev + 500.0 * sinh(wp.y / 16.0);\n' +
        '  float n1 = tfbm(wp.xz * 0.11);\n' +
        '  float n2 = tfbm(wp.xz * 0.6);\n' +
        '  float n3 = tfbm(wp.xz * 3.3);\n' +
        '  vec3 grass = mix(vec3(0.09, 0.21, 0.05), vec3(0.19, 0.33, 0.08), n1);\n' +
        '  grass *= 0.85 + n3 * 0.3;\n' +
        '  vec3 rock = mix(vec3(0.28, 0.25, 0.21), vec3(0.4, 0.37, 0.32), n2);\n' +
        '  rock *= 0.82 + n3 * 0.36;\n' +
        '  float rockF = smoothstep(0.2, 0.45, slope + (n2 - 0.5) * 0.08);\n' +
        '  vec3 col = mix(grass, rock, rockF);\n' +
        '  col = mix(col, rock, smoothstep(1600.0, 2400.0, e) * 0.92);\n' +
        '  float snowLine = uSnowLine + (n1 - 0.5) * 500.0;\n' +
        '  float snow = smoothstep(snowLine, snowLine + 700.0, e) * (1.0 - smoothstep(0.35, 0.6, slope));\n' +
        '  snow = max(snow, uSnowy * (1.0 - smoothstep(0.25, 0.45, slope)) * 0.85);\n' +
        '  col = mix(col, vec3(0.87, 0.9, 0.93), snow);\n' +
        // Per-pixel microfacet roughness for the GGX BRDF: measured-ish
        // values - vegetation ~0.95, rock ~0.88, snow much glossier
        // (0.45, its forward-scattering sheen). Wet sea pixels keep
        // roughness 1 so Cox-Munk seaSpec stays the one glitter model.
        '  gRough = mix(mix(0.95, 0.88, rockF), 0.45, snow);\n' +
        '  gRough = mix(gRough, 1.0, wetF);\n' +
        '  vec3 sea = mix(vec3(0.05, 0.13, 0.2), vec3(0.07, 0.17, 0.25), n1);\n' +
        // Whitecap coverage from Monahan & O'Muircheartaigh (1980):
        // W = 3.84e-6 * U^3.41 - a real few percent at 10 m/s.
        '  float U = max(uWindMs, 0.8);\n' +
        '  float W = clamp(3.84e-6 * pow(U, 3.41), 0.0, 0.6);\n' +
        '  vec2 pmc = wp.xz * 57.14 * 0.11;\n' +
        '  float capN = tnoise(pmc + uTime * 0.25 * normalize(uWindVec) + 31.0);\n' +
        '  sea = mix(sea, vec3(0.75, 0.8, 0.84), smoothstep(1.0 - W, 1.0 - W + 0.04, capN));\n' +
        '  return mix(col, sea, wetF);\n' +
        '}\n';
      // MeshStandardMaterial is three's vendored implementation of the
      // research BRDF (GGX + Smith height-correlated visibility after
      // Karis 2013, Schlick fresnel, Burley diffuse) - the terrain gets
      // the real microfacet model with per-pixel roughness, not Lambert.
      const terrainMat = new THREE.MeshStandardMaterial({metalness: 0});
      record(
        'GGX microfacet BRDF (Karis 2013)',
        'per-pixel roughness · vegetation/rock/snow'
      );
      record('Lommel-Seeliger moon', 'lunar regolith photometry');
      csm.setupMaterial(terrainMat);
      const terrainCSMHook = terrainMat.onBeforeCompile;
      terrainMat.onBeforeCompile = (shader, r) => {
        terrainCSMHook(shader, r);
        Object.assign(shader.uniforms, terrainUniforms);
        shader.vertexShader = shader.vertexShader
          .replace(
            '#include <common>',
            '#include <common>\nattribute float wet; varying float vWet; varying vec3 vWp;'
          )
          .replace(
            '#include <begin_vertex>',
            '#include <begin_vertex>\nvWet = wet; vWp = transformed;'
          );
        shader.fragmentShader = shader.fragmentShader
          .replace('#include <common>', '#include <common>\n' + TERRAIN_GLSL)
          .replace(
            '#include <color_fragment>',
            '#include <color_fragment>\ndiffuseColor.rgb = terrainColor(vWp, vWet);'
          )
          .replace(
            '#include <normal_fragment_begin>',
            '#include <normal_fragment_begin>\n' +
              'vec3 wNrm = vWet > 0.5 ? seaNormal(vWp) : demNormal(vWp.xz);\n' +
              'normal = normalize((viewMatrix * vec4(wNrm, 0.0)).xyz);'
          )
          .replace(
            '#include <roughnessmap_fragment>',
            'float roughnessFactor = gRough;'
          )
          .replace(
            '#include <opaque_fragment>',
            'outgoingLight += vWet * seaSpec(vWp);\n#include <opaque_fragment>'
          );
      };
      applyAerial(terrainMat);

      // The DEM outresolves the mesh (~26 m ground truth vs ~0.9 units
      // per vertex), so shading reads the data directly: a world-space
      // normal map baked from the same sample() surface by central
      // differences - the standard heightfield-to-normal-map pipeline.
      // The mesh only carries the silhouette; every lit pixel gets the
      // real hillside orientation.
      function bakeTerrainNormals() {
        const S = 768;
        const step = WORLD / (S - 1);
        const hs = new Float32Array(S * S);
        for (let j = 0; j < S; j++)
          for (let i = 0; i < S; i++)
            hs[j * S + i] = sample(
              (i / (S - 1) - 0.5) * WORLD,
              (j / (S - 1) - 0.5) * WORLD
            ).y;
        const arr = new Uint8Array(S * S * 4);
        for (let j = 0; j < S; j++)
          for (let i = 0; i < S; i++) {
            const iL = Math.max(i - 1, 0);
            const iR = Math.min(i + 1, S - 1);
            const jU = Math.max(j - 1, 0);
            const jD = Math.min(j + 1, S - 1);
            const dx = (hs[j * S + iR] - hs[j * S + iL]) / ((iR - iL) * step);
            const dz = (hs[jD * S + i] - hs[jU * S + i]) / ((jD - jU) * step);
            const l = Math.hypot(dx, 1, dz);
            const k = (j * S + i) * 4;
            arr[k] = (-dx / l) * 127.5 + 127.5;
            arr[k + 1] = (1 / l) * 127.5 + 127.5;
            arr[k + 2] = (-dz / l) * 127.5 + 127.5;
            arr[k + 3] = 255;
          }
        const tex = new THREE.DataTexture(arr, S, S, THREE.RGBAFormat);
        tex.minFilter = tex.magFilter = THREE.LinearFilter;
        tex.needsUpdate = true;
        if (terrainUniforms.uNormalTex.value)
          terrainUniforms.uNormalTex.value.dispose();
        terrainUniforms.uNormalTex.value = tex;
      }

      function buildWorld() {
        ground.clear();
        trees = [];
        if (demData) {
          // Average the real elevation in a small ring around the scene
          // centre (grid-layout agnostic).
          let sum = 0;
          let cnt = 0;
          for (let dx = -12; dx <= 12; dx += 6)
            for (let dz = -12; dz <= 12; dz += 6) {
              sum += demElev(dx, dz);
              cnt++;
            }
          centerElev = Math.max(sum / cnt, 0.3);
        } else {
          centerElev = 300;
        }
        terrainUniforms.uCenterElev.value = centerElev;
        viewSign = state.lat < 0 ? -1 : 1;
        bakeTerrainNormals();

        const geo = new THREE.PlaneGeometry(WORLD, WORLD, 320, 320);
        geo.rotateX(-Math.PI / 2);
        const pos = geo.attributes.position;
        const wet = new Float32Array(pos.count);
        for (let i = 0; i < pos.count; i++) {
          const s = sample(pos.getX(i), pos.getZ(i));
          pos.setY(i, s.y);
          wet[i] = s.water ? 1 : 0;
        }
        geo.computeVertexNormals();
        geo.setAttribute('wet', new THREE.BufferAttribute(wet, 1));
        const terrain = new THREE.Mesh(geo, terrainMat);
        terrain.castShadow = true;
        terrain.receiveShadow = true;
        terrain.layers.enable(3); // cloud depth prepass
        ground.add(terrain);

        // Trees: inside the real OSM woods when we have them, below the
        // real tree line, off cliffs, out of the sea, and not on top of
        // either camera spot (it can face both ways).
        const tl = treelineM(state.lat);
        for (let i = 0; i < 1800 && trees.length < 140; i++) {
          const x = (rand() - 0.5) * (WORLD - 40);
          const z = (rand() - 0.5) * (WORLD - 40);
          const s0 = sample(x, z);
          if (s0.water || s0.e > tl) continue;
          if (!inForest(x, z)) continue;
          // Real forests stand on ~35° alpine slopes; the asinh height
          // compression roughly doubles scene gradients, hence 4.5.
          const grade =
            Math.abs(sample(x + 2, z).y - sample(x - 2, z).y) +
            Math.abs(sample(x, z + 2).y - sample(x, z - 2).y);
          if (grade > 4.5) continue;
          if (Math.hypot(x, z - 26) < 24 || Math.hypot(x, z + 26) < 24)
            continue;
          const sc = 0.8 + rand() * 1.4;
          // Conifers own the subalpine belt below the climatic treeline.
          const conifer = s0.e > tl - 700 || rand() < 0.4;
          const tree = new THREE.Group();
          const trunk = new THREE.Mesh(geoTrunk, trunkMat);
          trunk.position.y = 0.55;
          trunk.castShadow = true;
          tree.add(trunk);
          if (conifer) {
            const mat = leafMats[Math.floor(rand() * leafMats.length)];
            const c1 = new THREE.Mesh(geoCone1, mat);
            c1.position.y = 1.7;
            const c2 = new THREE.Mesh(geoCone2, mat);
            c2.position.y = 3.1;
            c1.castShadow = c2.castShadow = true;
            c1.receiveShadow = true;
            tree.add(c1, c2);
          } else {
            const canopy = new THREE.Mesh(
              geoCanopy,
              broadMats[Math.floor(rand() * broadMats.length)]
            );
            canopy.position.y = 2.2;
            canopy.scale.y = 0.82;
            canopy.castShadow = canopy.receiveShadow = true;
            tree.add(canopy);
          }
          tree.scale.setScalar(sc);
          tree.position.set(x, s0.y, z);
          tree.userData = {phase: rand() * Math.PI * 2, a: 0, v: 0};
          trees.push(tree);
          ground.add(tree);
        }

        // The sea: three.js Water (planar reflections) riding at real sea
        // level wherever the DEM says there is water.
        if (water) {
          ground.remove(water);
          water.geometry.dispose();
          water.material.dispose();
          water = null;
        }
        let hasWater = false;
        for (let i = 0; i < wet.length; i++)
          if (wet[i]) {
            hasWater = true;
            break;
          }
        if (hasWater && waterNormalsTex) {
          water = new Water(new THREE.PlaneGeometry(WORLD, WORLD), {
            textureWidth: 512,
            textureHeight: 512,
            waterNormals: waterNormalsTex,
            sunDirection: new THREE.Vector3(0, 1, 0),
            sunColor: 0xffffff,
            waterColor: 0x0a2431,
            distortionScale: 1.4,
            fog: true
          });
          water.rotation.x = -Math.PI / 2;
          water.position.y = 16 * Math.asinh((0 - centerElev) / 500) - 0.15;
          // Cox & Munk (1954): sun glitter is shaped by the sea-surface
          // slope variance, mss = 0.003 + 0.00512*U. Patch the vendored
          // shader's fixed Blinn lobe to follow it, mix in Monahan
          // whitecaps, and break surf along the REAL shallows: a depth
          // texture sampled from the terrarium bathymetry, with the
          // McCowan criterion (waves break where H > 0.78d).
          const DT = 128;
          const dArr = new Uint8Array(DT * DT);
          for (let dj = 0; dj < DT; dj++)
            for (let di = 0; di < DT; di++) {
              const e = demData
                ? demElev(
                    (di / (DT - 1) - 0.5) * WORLD,
                    (dj / (DT - 1) - 0.5) * WORLD
                  )
                : 1;
              dArr[dj * DT + di] = THREE.MathUtils.clamp(
                (-e / 40) * 255,
                0,
                255
              );
            }
          const depthTex = new THREE.DataTexture(dArr, DT, DT, THREE.RedFormat);
          depthTex.needsUpdate = true;
          Object.assign(water.material.uniforms, {
            shiny: {value: 200},
            whitecapW: {value: 0},
            windDirW: {value: new THREE.Vector2(1, 0)},
            depthTex: {value: depthTex},
            hsWave: {value: 0.5}
          });
          water.material.fragmentShader = water.material.fragmentShader
            .replace(
              'uniform vec3 waterColor;',
              'uniform vec3 waterColor; uniform float shiny;' +
                ' uniform float whitecapW; uniform vec2 windDirW;' +
                ' uniform sampler2D depthTex; uniform float hsWave;'
            )
            .replace(
              'sunLight( surfaceNormal, eyeDirection, 100.0, 2.0, 0.5, diffuseLight, specularLight );',
              'sunLight( surfaceNormal, eyeDirection, shiny, shiny * 0.02 + 0.5, 0.5, diffuseLight, specularLight );'
            )
            .replace(
              'vec3 outgoingLight = albedo;',
              'float capN = texture2D( normalSampler, worldPosition.xz * 0.02 + windDirW * time * 0.012 ).g;\n' +
                'float capMask = smoothstep( 1.0 - whitecapW - 0.04, 1.0 - whitecapW + 0.02, capN );\n' +
                'float dpt = texture2D( depthTex, worldPosition.xz / 280.0 + 0.5 ).r * 40.0;\n' +
                'float db = hsWave / 0.78;\n' +
                'float shoal = smoothstep( db * 2.4, db * 0.6, dpt ) * smoothstep( 0.012, 0.05, dpt );\n' +
                'float surfN = texture2D( normalSampler, worldPosition.xz * 0.05 + windDirW * time * 0.03 ).b;\n' +
                'float surf = shoal * smoothstep( 0.35, 0.7, surfN + shoal * 0.25 );\n' +
                'albedo = mix( albedo, vec3( 0.82, 0.86, 0.88 ) * ( 0.3 + max( sunDirection.y, 0.0 ) ), clamp( capMask * 0.9 + surf * 0.85, 0.0, 1.0 ) );\n' +
                'vec3 outgoingLight = albedo;'
            );
          // Aerial perspective for the sea, via the Water shader's own
          // worldPosition varying and eye uniform (its vertex stage has
          // no `transformed`, so the generic hook cannot apply).
          if (atmo.ok) {
            Object.assign(water.material.uniforms, aerialU);
            water.material.fragmentShader = water.material.fragmentShader
              .replace(
                '#include <fog_pars_fragment>',
                '#include <fog_pars_fragment>\n' +
                  'uniform sampler2D uAerialTex; uniform float uAerialMaxU;\n' +
                  'uniform vec2 uSunAzV; uniform float uAerialExp;'
              )
              .replace(
                '#include <fog_fragment>',
                'vec3 aerDir = worldPosition.xyz - eye;\n' +
                  'float aerD = length(aerDir);\n' +
                  'vec2 aerH = normalize(aerDir.xz + vec2(1e-6));\n' +
                  'float aerAz = acos(clamp(dot(aerH, uSunAzV), -1.0, 1.0)) / 3.14159265;\n' +
                  'vec4 aer = texture2D(uAerialTex, vec2(aerAz, min(aerD / uAerialMaxU, 1.0)));\n' +
                  'gl_FragColor.rgb = gl_FragColor.rgb * aer.a + aer.rgb * uAerialExp;\n' +
                  '#include <fog_fragment>'
              );
          }
          water.material.needsUpdate = true;
          record(
            'three.js Water (vendored)',
            'planar reflections · Cox-Munk glitter · Monahan whitecaps'
          );
        }

        camBaseY = sample(0, -26 * viewSign).y + 5;
        // New terrain invalidates the physics heightfield and any drifts.
        if (snowSim) {
          snowSim.rebuildTerrain();
          snowSim.clearDrifts();
        }
      }
      buildWorld();

      // Camera yaw: equatorward by default (that is where the sun arc
      // lives), but pan poleward at night when a real aurora is on. The
      // first frame snaps; only live changes pan.
      let yaw = state.lat < 0 ? Math.PI : 0;
      let yawInit = false;

      // Stars: the real sky (Yale Bright Star Catalog), spun by sidereal
      // time around a pole tilted to the latitude.
      const celestial = new THREE.Group();
      const polar = new THREE.Group();
      polar.add(celestial);
      scene.add(polar);
      let starMat = null;
      fetch('./horizon/stars.json')
        .then((r) => r.json())
        .then((stars) => {
          const pos = [];
          const color = [];
          const size = [];
          const col = new THREE.Color();
          for (const [ra, dec, mag, kelvin] of stars) {
            const raR = ra * RAD;
            const decR = dec * RAD;
            pos.push(
              900 * Math.cos(decR) * Math.sin(raR),
              900 * Math.sin(decR),
              900 * Math.cos(decR) * Math.cos(raR)
            );
            const t = THREE.MathUtils.clamp((kelvin - 3000) / 9000, 0, 1);
            col.setRGB(
              1 - t * 0.25,
              0.88 - Math.abs(t - 0.45) * 0.2,
              0.72 + t * 0.28
            );
            color.push(col.r, col.g, col.b);
            size.push(THREE.MathUtils.clamp(7.5 - mag, 1.8, 7.5));
          }
          const geo = new THREE.BufferGeometry();
          geo.setAttribute(
            'position',
            new THREE.Float32BufferAttribute(pos, 3)
          );
          geo.setAttribute('color', new THREE.Float32BufferAttribute(color, 3));
          geo.setAttribute('size', new THREE.Float32BufferAttribute(size, 1));
          // Scintillation: Kolmogorov turbulence makes twinkle grow with
          // airmass (~sec z), so horizon stars shimmer and zenith stars
          // barely do. Per-star phase from a PCG hash (Jarzynski &
          // Olano 2020) on the position bits - the old sin-hash
          // decorrelates across shader compilers at fp32.
          starMat = new THREE.ShaderMaterial({
            transparent: true,
            depthWrite: false,
            uniforms: {night: {value: 0}, time: {value: 0}},
            vertexShader:
              'attribute float size; uniform float time;' +
              ' varying vec3 vc; varying float vtw;' +
              ' uint pcg(uint v){ uint s = v * 747796405u + 2891336453u;' +
              '  uint w = ((s >> ((s >> 28) + 4u)) ^ s) * 277803737u;' +
              '  return (w >> 22) ^ w; }' +
              ' void main(){ vc = color;' +
              '  float alt = max(normalize((modelMatrix * vec4(position, 1.0)).xyz).y, 0.04);' +
              '  float am = 1.0 / alt;' +
              '  float ph = float(pcg(floatBitsToUint(position.x) ^ (floatBitsToUint(position.y) * 2654435769u)))' +
              '    * 1.46291807e-9;' + // 2*pi / 2^32
              '  vtw = 1.0 + clamp(0.06 * (am - 1.0), 0.0, 0.5) * sin(time * 9.0 + ph);' +
              ' vec4 mv = modelViewMatrix * vec4(position, 1.0);' +
              ' gl_PointSize = size * vtw; gl_Position = projectionMatrix * mv; }',
            fragmentShader:
              'uniform float night; varying vec3 vc; varying float vtw;' +
              ' void main(){ float d = length(gl_PointCoord - 0.5);' +
              ' if (d > 0.5) discard;' +
              ' gl_FragColor = vec4(vc, night * vtw * smoothstep(0.5, 0.2, d)); }',
            vertexColors: true
          });
          celestial.add(new THREE.Points(geo, starMat));
          record(
            'Yale Bright Star Catalog',
            stars.length + ' stars (vendored)'
          );
        });

      // Constellation figures (d3-celestial dataset): faint real lines
      // riding the same sidereal dome as the stars.
      let constMat = null;
      fetch('./horizon/constellations.lines.json')
        .then((r) => r.json())
        .then((geo) => {
          const pts = [];
          for (const f of geo.features)
            for (const line of f.geometry.coordinates)
              for (let i = 0; i < line.length - 1; i++)
                for (const p of [line[i], line[i + 1]]) {
                  const ra = (((p[0] % 360) + 360) % 360) * RAD;
                  const dec = p[1] * RAD;
                  pts.push(
                    870 * Math.cos(dec) * Math.sin(ra),
                    870 * Math.sin(dec),
                    870 * Math.cos(dec) * Math.cos(ra)
                  );
                }
          const g = new THREE.BufferGeometry();
          g.setAttribute('position', new THREE.Float32BufferAttribute(pts, 3));
          constMat = new THREE.LineBasicMaterial({
            color: '#7f9fc4',
            transparent: true,
            opacity: 0,
            depthWrite: false
          });
          celestial.add(new THREE.LineSegments(g, constMat));
          record(
            'd3-celestial constellations',
            geo.features.length + ' figures (vendored)'
          );
        });

      // The moon: a sphere lit from the sun's REAL direction, so the
      // phase is always correct - and shaded by the Lommel-Seeliger
      // photometric function (the standard lunar regolith model, the
      // basis of McEwen's lunar-Lambert), not Lambert. That is why a
      // full moon renders flat like the real one instead of
      // limb-darkening like a billiard ball.
      const moonU = {
        sunDirM: {value: new THREE.Vector3(0, 1, 0)},
        albM: {value: new THREE.Color('#cdd4e2')},
        glowM: {value: new THREE.Color('#0c0f16')}
      };
      const moonDisc = new THREE.Mesh(
        new THREE.SphereGeometry(24, 24, 18),
        new THREE.ShaderMaterial({
          uniforms: moonU,
          vertexShader:
            'varying vec3 vN; varying vec3 vWpM; void main(){' +
            ' vN = normalize(mat3(modelMatrix) * normal);' +
            ' vWpM = (modelMatrix * vec4(position, 1.0)).xyz;' +
            ' gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }',
          fragmentShader:
            'uniform vec3 sunDirM; uniform vec3 albM; uniform vec3 glowM;' +
            'varying vec3 vN; varying vec3 vWpM;' +
            'void main(){' +
            '  vec3 n = normalize(vN);' +
            '  float mu0 = dot(n, sunDirM);' + // cos incidence
            '  float mu = dot(n, normalize(cameraPosition - vWpM));' + // cos emission
            '  float ls = mu0 > 0.0 ? mu0 / max(mu0 + mu, 1e-3) : 0.0;' +
            // Lommel-Seeliger reflectance; x2 normalises the full-moon
            // face back to the albedo.
            '  gl_FragColor = vec4(albM * ls * 2.0 + glowM, 1.0); }'
        })
      );
      moonDisc.layers.set(2);
      scene.add(moonDisc);

      // Naked-eye planets at their true ephemeris positions, sized by
      // real apparent magnitude, tinted like the eye sees them.
      const PLANETS = ['Mercury', 'Venus', 'Mars', 'Jupiter', 'Saturn'];
      const PLANET_TINTS = [
        [0.9, 0.85, 0.78],
        [1, 0.98, 0.9],
        [1, 0.62, 0.44],
        [0.98, 0.92, 0.8],
        [0.95, 0.9, 0.72]
      ];
      const planetGeo = new THREE.BufferGeometry();
      planetGeo.setAttribute(
        'position',
        new THREE.Float32BufferAttribute(
          new Float32Array(PLANETS.length * 3),
          3
        )
      );
      planetGeo.setAttribute(
        'color',
        new THREE.Float32BufferAttribute(PLANET_TINTS.flat(), 3)
      );
      planetGeo.setAttribute(
        'size',
        new THREE.Float32BufferAttribute(
          new Float32Array(PLANETS.length).fill(4),
          1
        )
      );
      const planetMat = new THREE.ShaderMaterial({
        transparent: true,
        depthWrite: false,
        uniforms: {night: {value: 0}},
        vertexShader:
          'attribute float size; varying vec3 vc;' +
          ' void main(){ vc = color;' +
          ' vec4 mv = modelViewMatrix * vec4(position, 1.0);' +
          ' gl_PointSize = size; gl_Position = projectionMatrix * mv; }',
        fragmentShader:
          'uniform float night; varying vec3 vc;' +
          ' void main(){ float d = length(gl_PointCoord - 0.5);' +
          ' if (d > 0.5) discard;' +
          ' gl_FragColor = vec4(vc, night * smoothstep(0.5, 0.2, d)); }',
        vertexColors: true
      });
      const planetPoints = new THREE.Points(planetGeo, planetMat);
      planetPoints.frustumCulled = false;
      scene.add(planetPoints);

      // Ephemeris cache, refreshed at 1Hz in the frame loop.
      const astro = {
        at: -1e9,
        sun: {alt: 0.5, az: Math.PI},
        moon: {alt: -1, az: 0},
        moonScale: 0.28,
        planets: [],
        recorded: false
      };

      // Aurora: additive curtains over the poleward horizon, driven by
      // NOAA's OVATION oval (Kp heuristic as fallback). The oval's real
      // latitude sets the curtain's true elevation via uBase.
      const auroraU = {
        time: {value: 0},
        strength: {value: 0},
        uBase: {value: 60}
      };
      const aurora = new THREE.Mesh(
        new THREE.CylinderGeometry(
          760,
          760,
          720,
          64,
          1,
          true,
          Math.PI - Math.PI / 2.6,
          Math.PI / 1.3
        ),
        new THREE.ShaderMaterial({
          transparent: true,
          depthWrite: false,
          side: THREE.DoubleSide,
          blending: THREE.AdditiveBlending,
          uniforms: auroraU,
          vertexShader:
            'varying vec2 u; varying float vy; void main(){ u = uv;' +
            ' vy = (modelMatrix * vec4(position, 1.0)).y;' +
            ' gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }',
          fragmentShader:
            'uniform float time; uniform float strength; uniform float uBase;' +
            ' varying vec2 u; varying float vy;' +
            ' void main(){' +
            ' float h = clamp((vy - uBase) / 720.0, 0.0, 1.0);' +
            ' float w = sin(u.x * 38.0 + time * 0.9 + sin(u.x * 7.0 + time * 0.35) * 2.4)' +
            '   * 0.5 + 0.5;' +
            ' float w2 = sin(u.x * 61.0 - time * 0.6 + 2.1) * 0.5 + 0.5;' +
            ' float band = pow(1.0 - h, 2.0) * smoothstep(0.08, 0.32, h);' +
            ' float a = strength * band * (0.9 + 1.0 * w * w2);' +
            ' vec3 col = mix(vec3(0.13, 0.95, 0.45), vec3(0.5, 0.25, 0.95), h * 1.3);' +
            ' gl_FragColor = vec4(col * a, a); }'
        })
      );
      aurora.position.y = 420;
      scene.add(aurora);

      // Atmospheric optics on one additive dome:
      // - primary and secondary rainbows at their Descartes angles (42.0
      //   and 51 deg around the antisolar point, reversed colours,
      //   Alexander's dark band between) - only when real rain falls with
      //   the sun shining below 42 deg
      // - the 22 deg ice-crystal halo (red inner edge) whenever real
      //   cirrus is present, with parhelia (sundogs) at low sun
      const opticsU = {
        sunDir: {value: new THREE.Vector3(0, 1, 0)},
        antisolar: {value: new THREE.Vector3(0, -1, 0)},
        bow: {value: 0},
        halo: {value: 0},
        dogs: {value: 0}
      };
      const optics = new THREE.Mesh(
        new THREE.SphereGeometry(590, 32, 20),
        new THREE.ShaderMaterial({
          side: THREE.BackSide,
          transparent: true,
          depthWrite: false,
          blending: THREE.AdditiveBlending,
          uniforms: opticsU,
          vertexShader:
            'varying vec3 vDir; void main(){ vDir = position;' +
            ' gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }',
          fragmentShader:
            'uniform vec3 sunDir; uniform vec3 antisolar;' +
            ' uniform float bow; uniform float halo; uniform float dogs;' +
            ' varying vec3 vDir;' +
            ' vec3 spectral(float h){' +
            '  return clamp(vec3(' +
            '    1.6 * h - 0.35,' +
            '    1.0 - abs(2.4 * h - 1.25),' +
            '    1.05 - 1.7 * h), 0.0, 1.0); }' +
            ' void main(){' +
            '  vec3 v = normalize(vDir);' +
            '  float aA = degrees(acos(clamp(dot(v, antisolar), -1.0, 1.0)));' +
            '  float aS = degrees(acos(clamp(dot(v, sunDir), -1.0, 1.0)));' +
            '  vec3 col = vec3(0.0);' +
            // primary bow: violet 40.6 inner -> red 42.4 outer
            '  float b1 = smoothstep(40.4, 40.9, aA) * (1.0 - smoothstep(42.2, 42.6, aA));' +
            '  col += spectral(1.0 - clamp((aA - 40.6) / 1.8, 0.0, 1.0)) * b1 * bow * 0.55;' +
            // secondary: red 50.4 inner -> violet 53.2 outer, 43% brightness
            '  float b2 = smoothstep(50.2, 50.8, aA) * (1.0 - smoothstep(52.8, 53.6, aA));' +
            '  col += spectral(clamp((aA - 50.4) / 2.8, 0.0, 1.0)) * b2 * bow * 0.24;' +
            // 22 deg halo, red inner edge fading to bluish white
            '  float th = smoothstep(21.2, 21.9, aS) * (1.0 - smoothstep(22.5, 23.8, aS));' +
            '  vec3 hcol = mix(vec3(1.0, 0.5, 0.35), vec3(0.85, 0.92, 1.0), clamp((aS - 21.8) / 1.6, 0.0, 1.0));' +
            '  float dogBand = exp(-pow((v.y - sunDir.y) * 14.0, 2.0));' +
            '  col += hcol * th * halo * (0.18 + dogs * dogBand * 0.6);' +
            '  gl_FragColor = vec4(col, 1.0); }'
        })
      );
      optics.renderOrder = 1;
      scene.add(optics);

      // Clouds in the three layers the weather model actually reports
      // (open-meteo cloud_cover_low/mid/high): the low cumulus deck and
      // the mid altostratus deck march in ONE volumetric pass
      // (clouds.js, after Schneider & Vos) with temporal reconstruction
      // exactly as shipped in Horizon Zero Dawn - a quarter-res buffer,
      // one 4x4 Bayer pixel marched per frame, the rest reprojected -
      // plus a terrain depth prepass so the march clips against the
      // real ridges and the depth-aware upsample never bleeds cloud
      // across a silhouette. Only thin cirrus stays a 2D sheet, as in
      // the research.
      const cloudGroup = new THREE.Group();
      const cirrusMat = new THREE.MeshBasicMaterial({
        color: '#ffffff',
        transparent: true,
        opacity: 0.15,
        depthWrite: false
      });
      applyAerial(cirrusMat);
      const cloudSys = createCloudSystem(renderer);
      record(
        'Temporal cloud reconstruction',
        'quarter-res march · 1/16 Bayer refresh · reprojection'
      );
      const cloudDepthRT = new THREE.WebGLRenderTarget(2, 2, {
