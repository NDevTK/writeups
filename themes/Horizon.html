        depthTexture: new THREE.DepthTexture(2, 2)
      });
      const depthOnlyMat = new THREE.MeshBasicMaterial({colorWrite: false});
      sizeCloudTargets = () => {
        const s = renderer.getDrawingBufferSize(new THREE.Vector2());
        cloudDepthRT.setSize(s.x, s.y);
        cloudSys.setSize(s.x, s.y);
      };
      sizeCloudTargets();
      let cloudsActive = false;
      let cloudTexPending = false;
      const cloudsHigh = [];
      for (let i = 0; i < 7; i++) {
        const sheet = new THREE.Mesh(
          new THREE.PlaneGeometry(80 + rand() * 50, 9 + rand() * 8),
          cirrusMat
        );
        sheet.rotation.x = -Math.PI / 2;
        sheet.rotation.z = rand() * Math.PI;
        sheet.position.set((rand() - 0.5) * 480, 90, (rand() - 0.5) * 480);
        sheet.userData.jitter = rand() * 6;
        cloudsHigh.push(sheet);
        cloudGroup.add(sheet);
      }
      scene.add(cloudGroup);

      // The ISS: real orbital mechanics. Current elements from
      // wheretheiss.at, propagated locally with SGP4 (satellite.js), shown
      // only during genuinely visible passes: above the horizon, sunlit,
      // and the observer in twilight or darkness.
      let satrec = null;
      let lastPassSaid = -1e9;
      const iss = new THREE.Mesh(
        new THREE.SphereGeometry(2.4, 8, 6),
        new THREE.MeshBasicMaterial({color: '#f4f7ff', fog: false})
      );
      iss.visible = false;
      scene.add(iss);
      async function syncISS() {
        try {
          const tle = await (
            await fetch('https://api.wheretheiss.at/v1/satellites/25544/tles', {
              credentials: 'omit'
            })
          ).json();
          satrec = satellite.twoline2satrec(tle.line1, tle.line2);
          record(
            'ISS TLE (wheretheiss.at)',
            'epoch ' +
              satrec.epochyr +
              '/' +
              satrec.epochdays.toFixed(2) +
              ' · SGP4'
          );
        } catch {
          // Keep any previous elements; SGP4 stays accurate for days.
        }
      }

      // Precipitation: one particle field, styled as rain or snow.
      const PRECIP_N = 1600;
      const precipGeo = new THREE.BufferGeometry();
      {
        const p = [];
        for (let i = 0; i < PRECIP_N; i++)
          p.push((rand() - 0.5) * 90, rand() * 45, (rand() - 0.5) * 90);
        precipGeo.setAttribute(
          'position',
          new THREE.Float32BufferAttribute(p, 3)
        );
      }
      const dot = document.createElement('canvas');
      dot.width = dot.height = 32;
      {
        const g = dot.getContext('2d');
        const grad = g.createRadialGradient(16, 16, 2, 16, 16, 15);
        grad.addColorStop(0, 'rgba(255,255,255,1)');
        grad.addColorStop(1, 'rgba(255,255,255,0)');
        g.fillStyle = grad;
        g.fillRect(0, 0, 32, 32);
      }
      const precipMat = new THREE.PointsMaterial({
        color: '#bcd2e8',
        size: 0.22,
        map: new THREE.CanvasTexture(dot),
        depthWrite: false,
        transparent: true,
        opacity: 0
      });
      const precip = new THREE.Points(precipGeo, precipMat);
      precip.layers.set(4); // drawn in the post-cloud overlay pass
      scene.add(precip);

      // ---------- physical snow (Rapier, loaded only when it snows) ----------
      // The near-field weather box is human scale (roughly 1 unit = 1m),
      // unlike the 57 m/unit map scale. Flakes are rigid bodies in a real
      // physics engine: gravity against air drag (linear damping gives the
      // ~1.4 m/s terminal velocity), pushed by the real wind, colliding
      // with a heightfield of the actual local terrain AND with every
      // flake already settled - so drifts grow on the real topography for
      // as long as the page stays open, and melt when the real
      // temperature says so.
      const SNOW_N = 240;
      const DRIFT_CAP = 2400;
      const SNOW_EXT = 120;
      const tmpM4 = new THREE.Matrix4();
      const driftSnowMat = new THREE.MeshStandardMaterial({
        color: '#eef2f6',
        roughness: 0.5
      });
      csm.setupMaterial(driftSnowMat);
      const driftMesh = new THREE.InstancedMesh(
        new THREE.IcosahedronGeometry(0.16, 0),
        driftSnowMat,
        DRIFT_CAP
      );
      driftMesh.count = 0;
      driftMesh.frustumCulled = false;
      applyAerial(driftMesh.material);
      scene.add(driftMesh);
      const flakeMesh = new THREE.InstancedMesh(
        new THREE.IcosahedronGeometry(0.12, 0),
        new THREE.MeshBasicMaterial({color: '#ffffff'}),
        SNOW_N
      );
      flakeMesh.count = 0;
      flakeMesh.frustumCulled = false;
      flakeMesh.layers.set(4); // falls in front of the far cloud decks
      scene.add(flakeMesh);

      async function initSnowSim() {
        snowLoading = true;
        const RAPIER = await import('./horizon/rapier.es.js');
        await RAPIER.init();
        const world = new RAPIER.World({x: 0, y: -3, z: 0});
        const sim = {
          world,
          bodies: [],
          drifts: new Array(DRIFT_CAP).fill(null),
          head: 0,
          countD: 0,
          highWater: 0,
          melt: 0
        };
        sim.rebuildTerrain = () => {
          if (sim.terrain) world.removeCollider(sim.terrain, false);
          const HF = 60;
          const heights = new Float32Array((HF + 1) * (HF + 1));
          for (let r = 0; r <= HF; r++)
            for (let c = 0; c <= HF; c++)
              heights[r * (HF + 1) + c] = sample(
                (r / HF - 0.5) * SNOW_EXT, // rows run along +x (verified)
                (c / HF - 0.5) * SNOW_EXT
              ).y;
          sim.terrain = world.createCollider(
            RAPIER.ColliderDesc.heightfield(HF, HF, heights, {
              x: SNOW_EXT,
              y: 1,
              z: SNOW_EXT
            })
          );
        };
        sim.clearDrifts = () => {
          for (let i = 0; i < DRIFT_CAP; i++) {
            if (sim.drifts[i]) {
              world.removeCollider(sim.drifts[i], false);
              sim.drifts[i] = null;
            }
            tmpM4.makeScale(0, 0, 0);
            driftMesh.setMatrixAt(i, tmpM4);
          }
          sim.head = 0;
          sim.countD = 0;
          sim.highWater = 0;
          driftMesh.count = 0;
          driftMesh.instanceMatrix.needsUpdate = true;
        };
        sim.spawn = (body) => {
          body.setTranslation(
            {
              x: (Math.random() - 0.5) * 80,
              y: camBaseY + 26 + Math.random() * 10,
              z: (Math.random() - 0.5) * 80
            },
            true
          );
          body.setLinvel({x: 0, y: -1, z: 0}, true);
        };
        sim.deposit = (p) => {
          const slot = sim.head;
          sim.head = (sim.head + 1) % DRIFT_CAP;
          if (sim.drifts[slot]) world.removeCollider(sim.drifts[slot], false);
          else sim.countD++;
          sim.drifts[slot] = world.createCollider(
            RAPIER.ColliderDesc.ball(0.14).setTranslation(p.x, p.y, p.z)
          );
          tmpM4.makeScale(1, 0.72, 1).setPosition(p.x, p.y, p.z);
          driftMesh.setMatrixAt(slot, tmpM4);
          sim.highWater = Math.max(sim.highWater, slot + 1);
          driftMesh.count = sim.highWater;
          driftMesh.instanceMatrix.needsUpdate = true;
        };
        sim.meltOldest = () => {
          for (let i = 0; i < DRIFT_CAP; i++) {
            const slot = (sim.head + i) % DRIFT_CAP; // oldest surviving
            if (!sim.drifts[slot]) continue;
            world.removeCollider(sim.drifts[slot], false);
            sim.drifts[slot] = null;
            sim.countD--;
            tmpM4.makeScale(0, 0, 0);
            driftMesh.setMatrixAt(slot, tmpM4);
            driftMesh.instanceMatrix.needsUpdate = true;
            return;
          }
        };
        sim.rebuildTerrain();
        for (let i = 0; i < SNOW_N; i++) {
          const body = world.createRigidBody(
            // Locked rotations: flakes must not roll away downwind on
            // landing (validated: rolling leaked 95% of deposits).
            RAPIER.RigidBodyDesc.dynamic().setLinearDamping(2.1).lockRotations()
          );
          world.createCollider(
            RAPIER.ColliderDesc.ball(0.12).setRestitution(0.02).setFriction(1),
            body
          );
          sim.spawn(body);
          sim.bodies.push(body);
        }
        snowSim = sim;
        record(
          'Rapier physics engine (vendored)',
          SNOW_N + ' snow bodies · heightfield of the local terrain'
        );
      }

      // ---------- colour ramps for light/fog ----------
      const cDayBot = new THREE.Color('#dceef7');
      const cSetBot = new THREE.Color('#f2a65e');
      const cNightBot = new THREE.Color('#141c33');
      const cGray = new THREE.Color('#9aa4ad');
      const tmpB = new THREE.Color();
      const windV = new THREE.Vector3(1, 0, 0);
      const windVMid = new THREE.Vector3(1, 0, 0);
      const windVHigh = new THREE.Vector3(1, 0, 0);
      const treeAxis = new THREE.Vector3(0, 0, 1);
      const tmpP = new THREE.Color();

      // ---------- data panel (✦ toggle / ?debug=1 / D key) ----------
      const panel = document.getElementById('panel');
      const live = {};
      let panelOn = params.get('debug') === '1';
      panel.hidden = !panelOn;
      function refreshPanel() {
        if (panel.hidden) return;
        panel.replaceChildren();
        const title = document.createElement('b');
        title.textContent = 'HORIZON · every value below is real\n\n';
        panel.appendChild(title);
        for (const [k, v] of Object.entries(live)) {
          const line = document.createElement('div');
          line.textContent = k + ': ' + v;
          panel.appendChild(line);
        }
        const hdr = document.createElement('b');
        hdr.textContent = '\nlive sources\n';
        panel.appendChild(hdr);
        for (const [k, s] of Object.entries(sources)) {
          const line = document.createElement('div');
          line.textContent = '· ' + k + ' — ' + s.value;
          const age = document.createElement('span');
          age.className = 'age';
          age.textContent =
            ' (' + Math.round((Date.now() - s.at) / 1000) + 's ago)';
          line.appendChild(age);
          panel.appendChild(line);
        }
      }
      setInterval(refreshPanel, 1000);
      function setPanel(on) {
        panelOn = on;
        panel.hidden = !on;
        refreshPanel();
      }
      addEventListener('keydown', (e) => {
        // 'd' strafes once the free camera is engaged; use ?debug=1 or
        // the shaderwall toggle for the panel then.
        if (e.key === 'd' && !freeCam.on) setPanel(!panelOn);
      });
      // Announce support for the site's ✦ wallpaper control.
      if (window.parent !== window) {
        parent.postMessage(
          {type: 'shaderwall', state: 'hidden'},
          location.origin
        );
      }

      // ---------- free camera ----------
      // Drag to look, WASD/arrows to fly (Shift for speed, R/F for
      // altitude), wheel to dolly. Until the first interaction the
      // camera keeps its cinematic auto spot (and pans poleward for
      // aurora); afterwards the view is yours. Height stays clamped to
      // the real terrain, bounds to the loaded DEM.
      const freeCam = {
        on: false,
        yaw: 0,
        pitch: 0.015,
        dolly: 0,
        pos: new THREE.Vector3(),
        keys: new Set()
      };
      function engageFreeCam() {
        if (freeCam.on) return;
        freeCam.on = true;
        freeCam.pos.copy(camera.position);
        freeCam.yaw = yaw;
        freeCam.pitch = 0.015;
      }
      {
        let dragId = -1;
        let lastPX = 0;
        let lastPY = 0;
        canvas.addEventListener('pointerdown', (e) => {
          dragId = e.pointerId;
          lastPX = e.clientX;
          lastPY = e.clientY;
          // Capture can throw for an already-released pointer; the drag
          // still works without it.
          try {
            canvas.setPointerCapture(e.pointerId);
          } catch {}
          engageFreeCam();
        });
        canvas.addEventListener('pointermove', (e) => {
          if (e.pointerId !== dragId) return;
          freeCam.yaw -= (e.clientX - lastPX) * 0.0032;
          freeCam.pitch += (e.clientY - lastPY) * 0.0032;
          freeCam.pitch = THREE.MathUtils.clamp(freeCam.pitch, -1.35, 1.35);
          lastPX = e.clientX;
          lastPY = e.clientY;
        });
        addEventListener('pointerup', (e) => {
          if (e.pointerId === dragId) dragId = -1;
        });
        canvas.addEventListener(
          'wheel',
          (e) => {
            engageFreeCam();
            freeCam.dolly -= e.deltaY * 0.02;
            e.preventDefault();
          },
          {passive: false}
        );
        const moveCodes = [
          'KeyW',
          'KeyA',
          'KeyS',
          'KeyD',
          'KeyR',
          'KeyF',
          'ArrowUp',
          'ArrowDown',
          'ArrowLeft',
          'ArrowRight',
          'ShiftLeft',
          'ShiftRight'
        ];
        addEventListener('keydown', (e) => {
          if (freeCam.on && moveCodes.includes(e.code))
            freeCam.keys.add(e.code);
        });
        addEventListener('keyup', (e) => {
          freeCam.keys.delete(e.code);
        });
      }

      // ---------- pointer parallax (forwarded by footer.js) ----------
      const look = {x: 0, y: 0};
      addEventListener('message', (e) => {
        if (e.origin !== location.origin) return;
        const d = e.data || {};
        if (d.type === 'wallpaper-pointer' && !reduceMotion) {
          look.x = (d.x - 0.5) * 2;
          look.y = (d.y - 0.5) * 2;
        }
        if (d.type === 'shaderwall' && d.action === 'toggle') {
          setPanel(!panelOn);
          parent.postMessage(
            {type: 'shaderwall', state: panelOn ? 'shown' : 'hidden'},
            location.origin
          );
        }
      });

      // ---------- main loop ----------
      let last = performance.now();
      function frame(t) {
        requestAnimationFrame(frame);
        const dt = Math.min((t - last) / 1000, 0.1) * timeScale;
        last = t;
        const d = now();

        // Ephemerides: astronomy-engine (VSOP87/ELP truncations,
        // topocentric, refraction-corrected) at 1Hz; the hand-rolled
        // low-precision formulas remain as offline fallback.
        if (t - astro.at > 1000) {
          astro.at = t;
          if (window.Astronomy) {
            const AE = window.Astronomy;
            const obs = new AE.Observer(state.lat, state.lon, centerElev);
            const pos = (body) => {
              const eq = AE.Equator(body, d, obs, true, true);
              const h = AE.Horizon(d, obs, eq.ra, eq.dec, 'normal');
              return {alt: h.altitude * RAD, az: h.azimuth * RAD};
            };
            astro.sun = pos(AE.Body.Sun);
            astro.moon = pos(AE.Body.Moon);
            // True apparent size: the moon disc scales with its real
            // distance (supermoon vs apogee is a visible ~7%).
            const distKm = AE.GeoMoon(d).Length() * AE.KM_PER_AU;
            astro.moonScale = (1500 * 1737) / distKm / 24;
            // Solar eclipse: topocentric angular separation against the
            // two real disc radii. Nonzero only when one is underway.
            const cosSep =
              Math.sin(astro.sun.alt) * Math.sin(astro.moon.alt) +
              Math.cos(astro.sun.alt) *
                Math.cos(astro.moon.alt) *
                Math.cos(astro.sun.az - astro.moon.az);
            const sepDeg =
              Math.acos(THREE.MathUtils.clamp(cosSep, -1, 1)) / RAD;
            const moonR = Math.asin(1737 / distKm) / RAD;
            astro.eclipse = THREE.MathUtils.clamp(
              (0.267 + moonR - sepDeg) / (2 * 0.267),
              0,
              1
            );
            if (astro.eclipse > 0.05 && !astro.eclipseSaid) {
              astro.eclipseSaid = true;
              say(
                'solar eclipse in progress · ~' +
                  Math.round(astro.eclipse * 100) +
                  '% obscured'
              );
            } else if (astro.eclipse < 0.01) {
              astro.eclipseSaid = false;
            }
            for (let i = 0; i < PLANETS.length; i++) {
              const p = pos(AE.Body[PLANETS[i]]);
              const mag = AE.Illumination(AE.Body[PLANETS[i]], d).mag;
              astro.planets[i] = {alt: p.alt, az: p.az, mag};
            }
            if (!astro.recorded) {
              astro.recorded = true;
              record(
                'astronomy-engine (vendored)',
                'VSOP87/ELP · topocentric · refraction · 5 planets'
              );
            }
          } else {
            astro.sun = altAz(sunEquatorial(d), d, state.lat, state.lon);
            astro.moon = altAz(moonEquatorial(d), d, state.lat, state.lon);
          }
        }
        const sun = astro.sun;
        const moon = astro.moon;
        moonDisc.scale.setScalar(astro.moonScale);
        if (planetMat) {
          const pp = planetGeo.attributes.position;
          const ps = planetGeo.attributes.size;
          for (let i = 0; i < PLANETS.length; i++) {
            const pl = astro.planets[i];
            if (!pl) continue;
            const v = skyPoint(pl.alt, pl.az, 860);
            pp.setXYZ(i, v.x, v.y, v.z);
            ps.setX(i, THREE.MathUtils.clamp(6 - pl.mag * 1.4, 2, 9.5));
          }
          pp.needsUpdate = true;
          ps.needsUpdate = true;
        }
        const sunVec = skyPoint(sun.alt, sun.az, 1);
        // The CSM cascades carry the sun: true direction, transmitted
        // colour and intensity mirrored from the data holder below.
        csm.lightDirection
          .copy(skyPoint(Math.max(sun.alt, -0.12), sun.az, 1))
          .negate()
          .normalize();
        moonDisc.position.copy(skyPoint(moon.alt, moon.az, 1500));
        // Sun direction as seen at the moon disc (same geometry the old
        // directional light encoded), feeding the Lommel-Seeliger shader.
        moonU.sunDirM.value
          .copy(skyPoint(sun.alt, sun.az, 200))
          .sub(moonDisc.position)
          .normalize();

        polar.rotation.x = -(90 - state.lat) * RAD;
        celestial.rotation.y = -(gmst(d) + state.lon * RAD);

        const day = THREE.MathUtils.clamp((sun.alt / RAD + 6) / 24, 0, 1);
        const dusk = 1 - Math.abs(day - 0.5) * 2;
        const cloudy = state.cloud / 100;
        // Stars belong to dusk, not daylight: the night sky fades in only
        // once the sun is truly below the horizon (civil to nautical
        // twilight, -3 to -9 deg).
        const nightSky = THREE.MathUtils.clamp(-(sun.alt / RAD + 3) / 6, 0, 1);

        // The sky: aerosols scale the Mie profile physically (AOD 0.12 as
        // the temperate baseline); the grey veil handles overcast.
        const mieScale = THREE.MathUtils.clamp(state.aod / 0.12, 0.25, 8);
        if (atmo.ok) {
          const skyExposure = 24 / (0.2 + 0.8 * day);
          // The camera's REAL altitude (inverting the asinh height
          // compression) feeds the sky and aerial LUTs, so flying up
          // physically lowers the horizon and thins the haze.
          const eCam = centerElev + 500 * Math.sinh(camera.position.y / 16);
          atmo.update(sunVec, mieScale, Math.max(eCam, 50), skyExposure);
          // Aerial perspective shares the dome's exposure so inscattered
          // light on the terrain matches the sky it comes from.
          aerialU.uSunAzV.value.set(sunVec.x, sunVec.z).normalize();
          aerialU.uAerialExp.value = skyExposure;
        } else {
          skyU.sunPosition.value.copy(sunVec);
          skyU.turbidity.value = 1.6 + state.aod * 14 + cloudy * 12 + dusk * 2;
          skyU.mieCoefficient.value =
            0.003 + state.aod * 0.012 + cloudy * 0.005;
        }
        veilU.alpha.value = cloudy * cloudy * 0.85 * day;

        tmpB
          .copy(cNightBot)
          .lerp(cDayBot, day)
          .lerp(cSetBot, dusk * 0.8)
          .lerp(cGray, cloudy * 0.7 * day);
        scene.fog.color.copy(tmpB);
        // Koschmieder relation: extinction from the MEASURED visibility
        // (2% contrast at V). Fog codes need no special-casing - a foggy
        // hour reports a short visibility by itself.
        scene.fog.density =
          1.98 / (Math.max(state.visibility, 400) / 57.14) + cloudy * 0.001;

        // A real solar eclipse dims the direct light by its obscuration.
        const ecl = astro.eclipse || 0;
        // The sun's light on the world carries its true transmitted
        // colour: the CPU mirror of the transmittance integral reddens
        // low sun physically instead of by hue heuristic.
        const st = sunTransmittanceJS(Math.sin(Math.max(sun.alt, 0)), mieScale);
        const stMax = Math.max(st[0], st[1], st[2], 1e-4);
        sunLight.color.setRGB(st[0] / stMax, st[1] / stMax, st[2] / stMax);
        const stLum = 0.2126 * st[0] + 0.7152 * st[1] + 0.0722 * st[2];
        sunLight.intensity =
          (0.18 + 2.4 * stLum) *
          (day > 0 ? 1 : 0) *
          (1 - cloudy * 0.55) *
          (1 - 0.93 * ecl);
        const moonUp = moon.alt > 0 ? 0.07 * (1 - day) : 0;
        if (atmo.ok) {
          if (t - lastIrrT > 1000) {
            lastIrrT = t;
            const ir = atmo.readIrradiance();
            if (ir[0] + ir[1] + ir[2] > 1e-7)
              skyIrr.setRGB(ir[0], ir[1], ir[2]);
          }
          // The ambient term IS the sky: cosine-weighted irradiance
          // integrated from the sky-view LUT (read back at 1 Hz), in the
          // dome's own eye-adaptation exposure - twilight blues, sunset
          // warmth and dusk falloff arrive from the raymarch, not from a
          // tuned curve. One calibration constant maps LUT radiance into
          // three's light units (the sun's intensity mapping already
          // does the same). The LUT is clear-sky and sunlit only, so the
          // measured cloud dimming, the eclipse obscuration and a small
          // moonlit-sky term apply here.
          const expo = 24 / (0.2 + 0.8 * day);
          const dim = (1 - 0.85 * ecl) * (1 - cloudy * 0.3);
          ambient.intensity = 1;
          // 1.1 puts the clear-sky diffuse fraction at ~20% of direct,
          // the measured real-world ratio.
          ambient.color.copy(skyIrr).multiplyScalar(expo * 1.1 * dim);
          tmpC.setRGB(0.05, 0.055, 0.075).multiplyScalar(moonUp * 14);
          ambient.color.add(tmpC);
          // Ground half: sky plus direct sun bounced off the terrain
          // albedo (0.25 grass/rock to 0.7 snow).
          const alb = 0.25 + 0.45 * terrainUniforms.uSnowy.value;
          tmpC
            .copy(sunLight.color)
            .multiplyScalar(
              sunLight.intensity * Math.max(Math.sin(sun.alt), 0) * 0.55
            )
            .add(ambient.color);
          ambient.groundColor.copy(tmpC).multiplyScalar(alb);
        } else {
          // Preetham fallback keeps the tuned formula.
          ambient.intensity =
            (0.12 +
              day * 0.3 * (1 - cloudy * 0.3) +
              cloudy * day * 0.12 +
              moonUp) *
            (1 - 0.8 * ecl);
          ambient.color.copy(tmpB);
          ambient.groundColor.copy(tmpB).multiplyScalar(0.4);
        }
        if (starMat) {
          starMat.uniforms.night.value = nightSky * (1 - cloudy * 0.85);
          starMat.uniforms.time.value = t / 1000;
        }
        if (constMat) constMat.opacity = nightSky * (1 - cloudy * 0.9) * 0.2;
        // Venus and Jupiter pierce twilight a little before the stars.
        planetMat.uniforms.night.value =
          THREE.MathUtils.clamp(nightSky * 1.6, 0, 1) * (1 - cloudy * 0.85);
        moonDisc.visible = moon.alt > -0.05;

        // The Water plane: Cox-Munk slope statistics set the glitter
        // lobe, Monahan sets the whitecap fraction, Pierson-Moskowitz
        // scales the distortion - all from the one real wind speed.
        if (water) {
          const wu = water.material.uniforms;
          const Ums = state.wind / 3.6;
          wu.time.value += dt * (0.3 + Ums * 0.05);
          wu.sunDirection.value.copy(sunVec);
          wu.sunColor.value
            .copy(sunLight.color)
            .multiplyScalar(sunLight.intensity);
          wu.distortionScale.value = 0.6 + ((0.21 * Ums * Ums) / 9.81) * 2.5;
          const mss = 0.003 + 0.00512 * Ums;
          wu.shiny.value = Math.max(2 / mss - 2, 30);
          wu.whitecapW.value = Math.min(3.84e-6 * Math.pow(Ums, 3.41), 0.5);
          wu.windDirW.value.set(windV.x, windV.z);
          wu.hsWave.value = (0.21 * Ums * Ums) / 9.81;
        }

        // The real wind vectors, per level: meteorological direction is
        // where wind comes FROM; the scene advects along where it blows.
        const dirOf = (deg, out) => {
          const a = (deg + 180) * RAD;
          out.set(Math.sin(a), 0, -Math.cos(a));
        };
        dirOf(state.winddir, windV);
        dirOf(state.dir700 ?? state.winddir, windVMid);
        dirOf(state.dir250 ?? state.winddir, windVHigh);

        // The snowline on the peaks tracks the real freezing level (snow
        // lingers a little below the instantaneous 0°C isotherm).
        terrainUniforms.uSnowLine.value +=
          ((state.freezing != null
            ? THREE.MathUtils.clamp(state.freezing - 300, 600, 5500)
            : 2300) -
            terrainUniforms.uSnowLine.value) *
          Math.min(dt, 1);

        // Sea-state uniforms: real wind feeds the wave model.
        terrainUniforms.uTime.value = t / 1000;
        terrainUniforms.uWindMs.value = state.wind / 3.6;
        terrainUniforms.uWindVec.value.set(windV.x, windV.z);
        terrainUniforms.uSunDirW.value.copy(sunVec);
        terrainUniforms.uSunCol.value
          .copy(sunLight.color)
          .multiplyScalar(
            sunLight.intensity * (sun.alt > 0.01 ? 1 : 0) * (1 - cloudy * 0.8)
          );

        // Aurora: OVATION oval probability when available (Kp heuristic
        // otherwise), with the curtain elevation from the oval's true
        // distance - Earth curvature included, ~150km emission height.
        let auroraP;
        let ovalDeg;
        if (state.auroraP !== null) {
          auroraP = state.auroraP;
          ovalDeg = Math.abs(state.auroraLat) - Math.abs(state.lat);
        } else {
          auroraP =
            THREE.MathUtils.clamp((state.kp - 4) / 4, 0, 1) *
            THREE.MathUtils.clamp((Math.abs(state.lat) - 46) / 14, 0, 1);
          ovalDeg = 8;
        }
        const ovalKm = Math.max(ovalDeg, 0) * 111;
        const elevA = Math.atan2(
          150 - (ovalKm * ovalKm) / 12742,
          Math.max(ovalKm, 60)
        );
        auroraU.strength.value =
          auroraP * nightSky * (1 - cloudy * 0.7) * (elevA > 0.035 ? 1 : 0);
        auroraU.time.value = t / 1000;
        const yAurora = Math.tan(THREE.MathUtils.clamp(elevA, 0.06, 1.1)) * 760;
        auroraU.uBase.value = yAurora - 160;
        aurora.position.y = yAurora + 200;
        aurora.rotation.y = state.lat < 0 ? Math.PI : 0;

        // Three cloud layers from the model's real per-layer covers.
        // Cumulus base at the real lifting condensation level (Espy:
        // ~125m per degree of dew point spread), clamped above the
        // camera because the asinh height compression squeezes low
        // decks harder than the terrain they sit over.
        const cLow = state.cloudLow ?? state.cloud * 0.7;
        const cMid = state.cloudMid ?? state.cloud * 0.5;
        const cHigh = state.cloudHigh ?? state.cloud * 0.3;
        const lcl = Math.max(125 * (state.temp - state.dew), 150);
        const yCloud = Math.max(16 * Math.asinh(lcl / 500) + 8, camBaseY + 26);
        // Each deck rides its own real wind: surface, 700hPa, 250hPa jet.
        const driftLayer = (arr, cover, y, wv, speed) => {
          const showN = Math.round((cover / 100) * arr.length);
          arr.forEach((c, i) => {
            c.visible = i < showN;
            c.position.x += wv.x * speed * 0.06 * dt;
            c.position.z += wv.z * speed * 0.06 * dt;
            c.position.y +=
              (y + c.userData.jitter - c.position.y) * Math.min(dt, 1);
            if (c.position.x > 260) c.position.x = -260;
            if (c.position.x < -260) c.position.x = 260;
            if (c.position.z > 260) c.position.z = -260;
            if (c.position.z < -260) c.position.z = 260;
          });
        };
        // Volumetric decks: real cover carves the density field, the
        // real wind advects it, the physically transmitted sun lights it.
        if ((cLow > 3 || cMid > 3) && !cloudTexPending) {
          cloudTexPending = true;
          setTimeout(() => {
            const tex = generateCloudTextures();
            cloudSys.shared.baseTex.value = tex.baseTex;
            cloudSys.shared.detailTex.value = tex.detailTex;
            record(
              'Nubis cloud noise (generated)',
              'Perlin-Worley 64³ + Worley 32³, tileable'
            );
          }, 60);
        }
        cloudsActive =
          !!cloudSys.shared.baseTex.value && (cLow > 2 || cMid > 2);
        if (cloudsActive) {
          cloudSys.shared.sunDirW.value.copy(sunVec);
          cloudSys.shared.sunCol.value
            .copy(sunLight.color)
            .multiplyScalar(Math.max(sunLight.intensity, 0.02) * 0.55);
          // Cloud ambient is the same integrated sky the terrain gets.
          if (atmo.ok)
            cloudSys.shared.ambCol.value
              .copy(ambient.color)
              .multiplyScalar(0.6);
          else
            cloudSys.shared.ambCol.value
              .copy(tmpB)
              .multiplyScalar(0.22 + day * 0.5);

          const lu = cloudSys.uniformsLow;
          lu.cov.value =
            cLow > 2 ? THREE.MathUtils.clamp(cLow / 100, 0, 0.95) : 0;
          // Cloud TYPE from the reported WMO code: overcast, fog and
          // drizzle/steady-rain codes mean a flat stratiform sheet,
          // shower and thunderstorm codes mean towering convection,
          // anything else is fair-weather cumulus. The deck's thickness
          // follows the type.
          const wmo = state.code || 0;
          const cTypeT =
            wmo >= 80 ? 1.85 : wmo === 3 || (wmo >= 45 && wmo <= 67) ? 0.15 : 1;
          lu.cType.value += (cTypeT - lu.cType.value) * Math.min(dt * 0.5, 1);
          lu.yBase.value = yCloud;
          lu.yTop.value = yCloud + 8 + lu.cType.value * 9;
          lu.wOff.value.x += windV.x * state.wind * 0.06 * dt;
          lu.wOff.value.y += windV.z * state.wind * 0.06 * dt;

          // Mid deck: altostratus at the 700 hPa level - stratiform
          // profile, lower liquid water content, advected by the REAL
          // wind at its own altitude.
          const mu = cloudSys.uniformsMid;
          mu.cov.value =
            cMid > 2 ? THREE.MathUtils.clamp(cMid / 100, 0, 0.95) : 0;
          mu.yBase.value = Math.max(16 * Math.asinh(8), yCloud + 16);
          mu.yTop.value = mu.yBase.value + 6;
          const w700 = state.wind700 ?? state.wind;
          mu.wOff.value.x += windVMid.x * w700 * 0.06 * dt;
          mu.wOff.value.y += windVMid.z * w700 * 0.06 * dt;
        }
        driftLayer(
          cloudsHigh,
          cHigh,
          Math.max(16 * Math.asinh(16), yCloud + 26),
          windVHigh,
          state.wind250 ?? state.wind
        );
        cirrusMat.opacity = 0.05 + day * 0.12;

        // Ground snow cover reacts live to the real temperature.
        const snowyGround =
          state.temp <= 0.5 && (state.snow > 0 || state.code >= 71) ? 1 : 0;
        terrainUniforms.uSnowy.value +=
          (snowyGround - terrainUniforms.uSnowy.value) * Math.min(dt, 1);

        const snowing =
          state.snow > 0 ||
          (state.code >= 71 &&
            state.code <= 86 &&
            ![80, 81, 82].includes(state.code));
        const raining = !snowing && (state.precip > 0 || state.code >= 51);
        const rate = snowing
          ? THREE.MathUtils.clamp(state.snow / 2, 0.3, 1)
          : THREE.MathUtils.clamp(state.precip / 4, 0.25, 1);
        precipMat.opacity = raining || snowing ? 0.35 + rate * 0.45 : 0;
        precipMat.size = snowing ? 0.34 : 0.16;
        precipMat.color.set(snowing ? '#ffffff' : '#a9c6e2');
        if (raining || snowing) {
          const p = precipGeo.attributes.position;
          const fall = (snowing ? 6 : 34) * (0.4 + rate * 0.6) * dt;
          // Advected along the true wind vector, not just eastward.
          const drift = state.wind * 0.05 * dt;
          for (let i = 0; i < PRECIP_N; i++) {
            let y = p.getY(i) - fall;
            const wob = snowing ? Math.sin(t / 900 + i) * 0.02 : 0;
            let x = p.getX(i) + windV.x * drift + wob;
            let z = p.getZ(i) + windV.z * drift;
            if (y < 0) y += 45;
            if (x > 45) x -= 90;
            if (x < -45) x += 90;
            if (z > 45) z -= 90;
            if (z < -45) z += 90;
            p.setY(i, y);
            p.setX(i, x);
            p.setZ(i, z);
          }
          p.needsUpdate = true;
        }

        // Atmospheric optics, gated by the real conditions: bows need
        // rain with the sun shining below the Descartes angle; the halo
        // needs real cirrus; parhelia strengthen at low sun.
        opticsU.sunDir.value.copy(sunVec);
        opticsU.antisolar.value.copy(sunVec).negate();
        const sunOut = day * THREE.MathUtils.clamp(1 - cloudy * 1.1, 0, 1);
        opticsU.bow.value =
          raining && sun.alt > 0 && sun.alt < 0.733 ? sunOut : 0;
        opticsU.halo.value =
          (cHigh / 100) *
          (cHigh < 90 ? 1 : 0.5) *
          sunOut *
          (sun.alt > 0 ? 1 : 0);
        opticsU.dogs.value = THREE.MathUtils.clamp(
          (0.44 - sun.alt) / 0.26,
          0,
          1
        );

        // Deciduous phenology: Hopkins' bioclimatic law shifts the leaf
        // calendar ~4 days per degree of latitude and per 122m of
        // elevation; the southern hemisphere is half a year out of phase.
        let doy = (d.getTime() - Date.UTC(d.getUTCFullYear(), 0, 0)) / 86400000;
        if (state.lat < 0) doy = (doy + 182.5) % 365;
        const hop = 4 * (Math.abs(state.lat) - 39) + centerElev / 30.5;
        const leafOut = 105 + hop;
        const senesce = 265 - hop;
        const frac = (x, a, b) =>
          THREE.MathUtils.clamp((x - a) / (b - a), 0, 1);
        const spring = frac(doy, leafOut, leafOut + 18);
        const mature = frac(doy, leafOut + 18, leafOut + 45);
        const fall = frac(doy, senesce, senesce + 20);
        const drop = frac(doy, senesce + 25, senesce + 45);
        broadMats.forEach((m, i) => {
          m.color
            .copy(cBare)
            .lerp(cSpring, spring)
            .lerp(broadBases[i], spring * mature)
            .lerp(cAutumn, fall)
            .lerp(cBare, drop);
        });

        // Physical snow: lazily boot Rapier the first time it really
        // snows, then step the world once per frame.
        if (snowing && !snowSim && !snowLoading && !reduceMotion) initSnowSim();
        if (snowSim) {
          snowSim.world.step();
          let fi = 0;
          for (const body of snowSim.bodies) {
            // The real wind pushes every airborne flake.
            body.resetForces(true);
            body.addForce(
              {
                x: windV.x * state.wind * 0.0004,
                y: 0,
                z: windV.z * state.wind * 0.0004
              },
              true
            );
            const p = body.translation();
            // Settled = genuinely at rest. The per-frame wind force keeps
            // bodies formally awake, so ask the velocity, not sleep state.
            const v = body.linvel();
            const settled =
              body.isSleeping() ||
              Math.hypot(v.x, v.y, v.z) < 0.07 ||
              p.y < sample(p.x, p.z).y + 0.05;
            if (settled) {
              if (snowing) snowSim.deposit(p);
              snowSim.spawn(body);
            } else if (Math.abs(p.x) > 130 || Math.abs(p.z) > 130) {
              snowSim.spawn(body); // blown out of the near field
            } else if (snowing) {
              tmpM4.makeScale(1, 1, 1).setPosition(p.x, p.y, p.z);
              flakeMesh.setMatrixAt(fi++, tmpM4);
            }
          }
          flakeMesh.count = fi;
          flakeMesh.instanceMatrix.needsUpdate = true;
          // Warm real temperatures erode the drifts, oldest first.
          if (state.temp > 1 && snowSim.countD) {
            snowSim.melt += dt * (state.temp - 1) * 1.5;
            while (snowSim.melt > 1 && snowSim.countD) {
              snowSim.melt -= 1;
              snowSim.meltOldest();
            }
          }
        }

        // Trees: an underdamped spring-damper per tree, forced by the
        // real mean wind and the real gust spread, leaning along the
        // true wind direction.
        const meanLean = Math.min(state.wind / 130, 0.5);
        const gustAmp = Math.min(
          Math.max(state.gust - state.wind, 0) / 90,
          0.6
        );
        treeAxis.set(windV.z, 0, -windV.x);
        for (const tree of trees) {
          const u = tree.userData;
          const forcing =
            meanLean +
            gustAmp *
              (0.6 *
                Math.sin(t * 0.0011 + u.phase) *
                Math.sin(t * 0.00043 + u.phase * 2.7) +
                0.4 * Math.sin(t * 0.0027 + u.phase * 1.3));
          u.v += (14 * (forcing - u.a) - 4.2 * u.v) * dt;
          u.a += u.v * dt;
          tree.setRotationFromAxisAngle(treeAxis, u.a);
        }

        // ISS: SGP4-propagated position; drawn only when the pass is
        // genuinely visible (above horizon, sunlit against a dark sky).
        if (satrec && window.satellite) {
          const pv = satellite.propagate(satrec, d);
          if (pv.position) {
            const lk = satellite.ecfToLookAngles(
              {
                latitude: state.lat * RAD,
                longitude: state.lon * RAD,
                height: centerElev / 1000
              },
              satellite.eciToEcf(pv.position, satellite.gstime(d))
            );
            // Cylindrical Earth-shadow test in the equatorial frame.
            const sEq = sunEquatorial(d);
            const sx = Math.cos(sEq.dec) * Math.cos(sEq.ra);
            const sy = Math.cos(sEq.dec) * Math.sin(sEq.ra);
            const sz = Math.sin(sEq.dec);
            const r = pv.position;
            const dp = r.x * sx + r.y * sy + r.z * sz;
            const perp = Math.hypot(
              r.x - dp * sx,
              r.y - dp * sy,
              r.z - dp * sz
            );
            const sunlit = dp > 0 || perp > 6371;
            iss.visible = lk.elevation > 0.09 && sunlit && sun.alt < -0.05;
            if (iss.visible) {
              iss.position.copy(skyPoint(lk.elevation, lk.azimuth, 820));
              if (t - lastPassSaid > 900000) {
                lastPassSaid = t;
                say(
                  'ISS pass · ' +
                    Math.round(lk.rangeSat) +
                    ' km away · real orbit via SGP4'
                );
              }
            }
          }
        }

        let shakeX = 0;
        let shakeY = 0;
        if (state.shake > 0.005 && !reduceMotion) {
          shakeX = (Math.random() - 0.5) * state.shake;
          shakeY = (Math.random() - 0.5) * state.shake * 0.6;
          state.shake *= Math.pow(0.35, dt);
        }

        if (freeCam.on) {
          // Free flight: yaw/pitch from drag, movement from keys and
          // wheel, height clamped to the real terrain.
          const cp = Math.cos(freeCam.pitch);
          const fx = Math.sin(freeCam.yaw) * cp;
          const fy = -Math.sin(freeCam.pitch);
          const fz = Math.cos(freeCam.yaw) * cp;
          const rx = Math.cos(freeCam.yaw);
          const rz = -Math.sin(freeCam.yaw);
          const k = freeCam.keys;
          const fast = k.has('ShiftLeft') || k.has('ShiftRight') ? 3 : 1;
          const sp = 12 * fast * dt;
          let mx = 0;
          let my = 0;
          let mz = 0;
          if (k.has('KeyW') || k.has('ArrowUp')) {
            mx += fx * sp;
            my += fy * sp;
            mz += fz * sp;
          }
          if (k.has('KeyS') || k.has('ArrowDown')) {
            mx -= fx * sp;
            my -= fy * sp;
            mz -= fz * sp;
          }
          if (k.has('KeyD') || k.has('ArrowRight')) {
            mx += rx * sp;
            mz += rz * sp;
          }
          if (k.has('KeyA') || k.has('ArrowLeft')) {
            mx -= rx * sp;
            mz -= rz * sp;
          }
          if (k.has('KeyR')) my += sp;
          if (k.has('KeyF')) my -= sp;
          // Wheel dolly eases out along the view direction.
          const dol = freeCam.dolly * Math.min(dt * 8, 1);
          freeCam.dolly -= dol;
          mx += fx * dol;
          my += fy * dol;
          mz += fz * dol;
          freeCam.pos.x = THREE.MathUtils.clamp(freeCam.pos.x + mx, -130, 130);
          freeCam.pos.z = THREE.MathUtils.clamp(freeCam.pos.z + mz, -130, 130);
          const ground = sample(freeCam.pos.x, freeCam.pos.z).y + 1.6;
          freeCam.pos.y = THREE.MathUtils.clamp(freeCam.pos.y + my, ground, 95);
          camera.position.set(
            freeCam.pos.x + shakeX,
            freeCam.pos.y + shakeY,
            freeCam.pos.z
          );
          camera.lookAt(
            freeCam.pos.x + fx,
            freeCam.pos.y + fy,
            freeCam.pos.z + fz
          );
        } else {
          const equatorYaw = state.lat < 0 ? Math.PI : 0;
          const auroraOn = auroraU.strength.value > 0.04;
          const targetYaw = auroraOn ? Math.PI - equatorYaw : equatorYaw;
          if (!yawInit) {
            yaw = targetYaw;
            yawInit = true;
          }
          yaw += (targetYaw - yaw) * Math.min(dt * 0.4, 1);
          const vx = Math.sin(yaw);
          const vz = Math.cos(yaw);
          const camZ = -26 * vz;
          const camX = -26 * vx;
          // Clear the immediate foreground so the camera never sits with
          // its face in a hillside.
          const baseY =
            Math.max(
              sample(camX, camZ).y,
              sample(camX + 5, camZ).y,
              sample(camX - 5, camZ).y,
              sample(camX, camZ + 5).y,
              sample(camX, camZ - 5).y
            ) + 4.5;
          camBaseY += (baseY - camBaseY) * Math.min(dt * 2, 1);

          camera.position.set(
            camX + look.x * 3 + shakeX,
            camBaseY + look.y * -1.2 + shakeY,
            camZ
          );
          camera.lookAt(
            camX + vx * 66 + look.x * 8,
            camBaseY + 1 + look.y * -5,
            camZ + vz * 66
          );
        }

        if (!panel.hidden) {
          const Ums = state.wind / 3.6;
          live['sun (computed)'] =
            (sun.alt / RAD).toFixed(1) +
            '° alt · ' +
            ((((sun.az / RAD) % 360) + 360) % 360).toFixed(0) +
            '° az';
          live['moon (computed)'] = (moon.alt / RAD).toFixed(1) + '° alt';
          live['sea state'] =
            'Hs ' +
            ((0.21 * Ums * Ums) / 9.81).toFixed(2) +
            ' m · Tp ' +
            (0.7305 * Ums).toFixed(1) +
            ' s (Pierson-Moskowitz) · mss ' +
            (0.003 + 0.00512 * Ums).toFixed(4) +
            ' (Cox-Munk) · whitecaps ' +
            (3.84e-4 * Math.pow(Ums, 3.41)).toFixed(2) +
            '% (Monahan)';
          live['visibility (Koschmieder fog)'] =
            (state.visibility / 1000).toFixed(1) + ' km measured';
          live['snowline (freezing level)'] =
            Math.round(terrainUniforms.uSnowLine.value) + ' m';
          live['treeline (Körner & Paulsen)'] =
            Math.round(treelineM(state.lat)) + ' m';
          live['optics'] =
            'bow ' +
            opticsU.bow.value.toFixed(2) +
            ' · halo ' +
            opticsU.halo.value.toFixed(2) +
            ' · eclipse ' +
            ((astro.eclipse || 0) * 100).toFixed(0) +
            '%';
          live['aurora curtain'] =
            auroraU.strength.value.toFixed(2) + ' strength';
          if (snowSim)
            live['snow (Rapier)'] =
              snowSim.countD +
              ' drift deposits · ' +
              flakeMesh.count +
              ' falling';
        }

        csm.lights.forEach((l) => {
          l.color.copy(sunLight.color);
          l.intensity = sunLight.intensity;
        });
        camera.updateMatrixWorld();
        csm.update();

        if (cloudsActive) {
          // Terrain depth prepass (cheap: colour writes off, override
          // material): gives the cloud march its scene depth and the
          // composite its bilateral weights.
          const mask = camera.layers.mask;
          scene.overrideMaterial = depthOnlyMat;
          camera.layers.mask = 1 << 3;
          renderer.setRenderTarget(cloudDepthRT);
          renderer.render(scene, camera);
          renderer.setRenderTarget(null);
          camera.layers.mask = mask;
          scene.overrideMaterial = null;
          cloudSys.render(camera, cloudDepthRT.depthTexture);
        }
        renderer.render(scene, camera);
        if (cloudsActive) cloudSys.composite();
        // Precipitation overlays the composite (rain and snow fall in
        // FRONT of the far cloud decks), still depth-tested against the
        // scene via the preserved depth buffer.
        {
          const mask = camera.layers.mask;
          camera.layers.mask = 1 << 4;
          renderer.autoClear = false;
          renderer.render(scene, camera);
          renderer.autoClear = true;
          camera.layers.mask = mask;
        }
      }

      (async () => {
        if (document.prerendering) {
          await new Promise((resolve) =>
            document.addEventListener('prerenderingchange', resolve, {
              once: true
            })
          );
        }
        requestAnimationFrame(frame);
        await syncWeather();
        setInterval(syncWeather, 15 * 60 * 1000);
        syncAir();
        setInterval(syncAir, 30 * 60 * 1000);
        syncAloft();
        setInterval(syncAloft, 30 * 60 * 1000);
        syncForests();
        syncKp();
        setInterval(syncKp, 15 * 60 * 1000);
        syncOvation();
        setInterval(syncOvation, 30 * 60 * 1000);
        syncISS();
        setInterval(syncISS, 6 * 60 * 60 * 1000);
        if (params.get('dem') !== '0') {
          try {
            demData = await fetchDEMTiles(state.lat, state.lon);
            buildWorld();
          } catch {
            try {
              demData = await fetchDEM(state.lat, state.lon);
              buildWorld();
            } catch {
              // Keep the procedural fallback silently.
            }
          }
        }
        if (params.has('quake')) {
          setTimeout(() => {
            state.shake = Math.min((+params.get('quake') - 4) * 0.5, 1.2);
            say('M' + params.get('quake') + ' earthquake · debug override');
          }, 1500);
        } else {
          pollQuakes();
          setInterval(pollQuakes, 5 * 60 * 1000);
        }
      })();
    </script>
  </body>
</html>
