        } catch {
          // daemon unreachable - the sea keeps its last ships
        }
      }
      // Apply one ship list (from the 120 s poll OR a pushed
      // `ais` stream event - both carry the same schema).
      // Idempotent by MMSI, so the two paths coexist safely.
      function applyShips(shipList) {
        const ref = {
          lat: state.lat,
          lon: state.lon,
          halfM: DEM_HALF_M,
          world: WORLD,
          mpu: MPU
        };
        const now_ = Date.now();
        const names = [];
        for (const ship of shipList) {
          const sc = aisToScene(ship, ref);
          if (Math.abs(sc.x) > 150 || Math.abs(sc.z) > 150) continue;
          const slot =
            shipPool.find((s) => s.active && s.mmsi === ship.mmsi) ??
            shipPool.find((s) => !s.active);
          if (!slot) break;
          Object.assign(slot, {
            mmsi: ship.mmsi,
            name: ship.name,
            x: sc.x,
            z: sc.z,
            vx: sc.vx,
            vz: sc.vz,
            hdg: ship.hdg ?? ship.cog ?? 0,
            seen: now_,
            active: true
          });
          // The measured vessel: message-5 dimensions scale the
          // hull; the type picks the silhouette. Before a static
          // report arrives the defaults are class-sized.
          const cls = ship.type ? typeClass(ship.type) : 'other';
          const small = cls === 'sailing' || cls === 'pleasure';
          buildShip(
            slot,
            ship.len || (small ? 12 : 90),
            ship.beam || (small ? 4 : 14),
            cls
          );
          names.push(
            (ship.name || ship.mmsi) +
              (ship.len ? ' ' + ship.len + 'm' : '') +
              (ship.type ? ' ' + typeClass(ship.type) : '') +
              ' ' +
              Math.round(ship.sog) +
              ' kt'
          );
        }
        for (const s of shipPool)
          if (s.active && now_ - s.seen > 360e3) {
            s.active = false;
            s.g.visible = false;
          }
        if (names.length)
          record(
            'AIS live ships (daemon)',
            names.slice(0, 4).join(' · ') +
              (names.length > 4 ? ' +' + (names.length - 4) : '')
          );
      }

      // ---- Live lightning: Blitzortung.org over the daemon's
      // UNIFIED stream (/stream - one origin-scoped EventSource
      // carries strike + ais + adsb named events; EventSource
      // bypasses CORS, so the daemon's Origin allowlist IS the
      // protection). Each pushed strike becomes a flash whose
      // FLICKER IS THE PHYSICS (lightning.js): a Rakov-Uman
      // stroke sequence - 15-20% single-stroke, mean multiplicity
      // 3-5, ~60 ms interstroke intervals, continuing-current
      // plateaus - viewed through Koschmieder extinction and the
      // inverse square at the strike's true great-circle
      // distance, hung at its true bearing. The glow quad itself
      // is the documented display shape; the timing and
      // brightness are measured + published physics. Data CC
      // BY-SA Blitzortung.org (credited in the provenance panel).
      // ?live=URL overrides the stream base; ?strike=N spawns
      // deterministic synthetic flashes for the offline harness.
      const LIVE_STREAM = params.get('live') ?? 'https://api.ndev.tk/stream';
      const FLASH_N = 5;
      const flashPool = [];
      for (let i = 0; i < FLASH_N; i++) {
        const fm = createFlashMaterial();
        const mesh = new THREE.Mesh(
          new THREE.PlaneGeometry(90, 55),
          fm.material
        );
        mesh.visible = false;
        scene.add(mesh);
        flashPool.push({
          mesh,
          u: fm.u,
          active: false,
          t: 0,
          seq: null,
          amp0: 0
        });
      }
      let strikeCount = 0;
      function spawnFlash(azDeg, distKm, rands) {
        const p = flashPool.find((f) => !f.active) ?? flashPool[0];
        p.seq = strokeSequence(rands);
        p.amp0 = Math.min(apparentFlash(distKm), 4);
        p.t = 0;
        p.active = true;
        const az = azDeg * RAD;
        const R = 235;
        p.mesh.position.set(
          camera.position.x + Math.sin(az) * R,
          38,
          camera.position.z - Math.cos(az) * R
        );
        const s = THREE.MathUtils.clamp(60 / Math.max(distKm, 10), 0.5, 2.5);
        p.mesh.scale.set(s, s, 1);
        p.mesh.lookAt(camera.position);
        p.mesh.visible = true;
        strikeCount++;
      }
      let liveES = null;
      const strikeOv = params.has('strike') ? +params.get('strike') : null;
      if (strikeOv !== null) {
        // Offline harness: deterministic flashes in the camera
        // cone on a fixed cadence (fixed uniform table - no
        // Math.random, pinned shots stay reproducible).
        const RANDS = [
          0.31, 0.62, 0.08, 0.77, 0.45, 0.91, 0.19, 0.54, 0.36, 0.83, 0.27, 0.7,
          0.12, 0.6, 0.48, 0.95
        ];
        let k = 0;
        setInterval(() => {
          if (k >= strikeOv && strikeOv > 0) k = 0;
          camera.getWorldDirection(mFlashDir);
          const az =
            (Math.atan2(mFlashDir.x, -mFlashDir.z) / RAD +
              (((k * 37) % 60) - 30) +
              360) %
            360;
          spawnFlash(az, 12 + ((k * 23) % 60), RANDS.slice(k % 8));
          k++;
        }, 1700);
      } else if (typeof EventSource !== 'undefined') {
        connectStream();
      }
      // One connection, three layers: strikes flash the moment
      // Blitzortung locates them; ship and aircraft deltas ride
      // the same channel (30 s / 20 s server cadence), applied
      // through the SAME functions the polling fallback uses -
      // the polls stay armed as belt and braces, application is
      // idempotent by MMSI/hex. The subscription is a lat/lon
      // point, so roaming re-anchors it: connectStream() again
      // closes the old channel and opens one at the new anchor
      // (the server pushes an initial ais/adsb snapshot on
      // connect, repopulating the cleared pools within seconds).
      function connectStream() {
        if (liveES) liveES.close();
        liveES = new EventSource(
          LIVE_STREAM +
            '?lat=' +
            state.lat.toFixed(3) +
            '&lon=' +
            state.lon.toFixed(3) +
            '&km=200&ais=8&adsb=15'
        );
        liveES.addEventListener('strike', (ev) => {
          try {
            const s = JSON.parse(ev.data);
            const az = strikeBearing({lat: state.lat, lon: state.lon}, s);
            spawnFlash(
              az,
              s.km,
              Array.from({length: 12}, () => Math.random())
            );
            record(
              'Blitzortung.org lightning (CC BY-SA)',
              strikeCount + ' strikes streamed · nearest ' + s.km + ' km'
            );
          } catch {
            // malformed event

      // Spawn one meteor of shower s (radiant ra/dec in degrees).
      function spawnMeteor(slot, s, rad) {
        const vr = mV1.set(
          Math.cos(rad.dec * RAD) * Math.sin(rad.ra * RAD),
          Math.sin(rad.dec * RAD),
          Math.cos(rad.dec * RAD) * Math.cos(rad.ra * RAD)
        );
        // Random sky point 10-100 deg from the radiant, above the
        // local horizon (world y through the celestial rotation).
        // The ?meteor harness override also biases spawns into the
        // camera cone so a pinned shot can catch one - the natural
        // path stays all-sky.
        const biased = params.has('meteor');
        if (biased) camera.getWorldDirection(mV4);
        let w = null;
        for (let tries = 0; tries < (biased ? 40 : 8) && !w; tries++) {
          const zc = Math.random() * 2 - 1;
          const ph = Math.random() * 2 * Math.PI;
          const rr = Math.sqrt(1 - zc * zc);
          mV2.set(rr * Math.cos(ph), zc, rr * Math.sin(ph));
          const cosD = mV2.dot(vr);
          if (cosD > 0.985 || cosD < -0.17) continue; // 10..100 deg
          mV3.copy(mV2).applyMatrix4(celestial.matrixWorld);
          if (mV3.y < 0.12) continue; // below/near horizon
          if (biased && mV3.normalize().dot(mV4) < 0.6) continue;
          w = mV2;
        }
        if (!w) return false;
        const sinD = Math.sqrt(1 - Math.min(w.dot(vr) ** 2, 1));
        // Great-circle tangent at w pointing AWAY from the radiant.
        const t = mV3
          .copy(vr)
          .addScaledVector(w, -w.dot(vr))
          .normalize()
          .negate();
        // Display kinematics: streak length foreshortens with
        // sin(D) and scales with the shower's entry speed; angular
        // rate ~ 20 deg/s x (V/72) x sin(D) (documented mapping of
        // the true ~radians/s sky speeds).
        const Ldeg = (2 + 14 * sinD * (s.v / 72)) * (0.7 + 0.6 * Math.random());
        const wdeg = Math.max(20 * (s.v / 72) * sinD, 5);
        const Lr = Ldeg * RAD;
        const B = mV4
          .copy(w)
          .multiplyScalar(Math.cos(Lr))
          .addScaledVector(t, Math.sin(Lr));
        // Quad basis: X along the chord, Y lateral, Z radial.
        const R = 868;
        const ax = mV1.copy(B).sub(w); // reuse mV1 (vr done)
        const cx = mV2.copy(w).add(B).multiplyScalar(0.5).normalize();
        const ay = mV3.copy(cx).cross(ax).normalize();
        const m = drawMagnitude(s.r, 1 - Math.random());
        const p = meteorPool[slot];
        const wid = (m < 0 ? 3.5 : 2.2) * RAD * R;
        p.mesh.matrix.makeBasis(
          ax.clone().multiplyScalar(R),
          ay.multiplyScalar(wid),
          cx.clone()
        );
        p.mesh.matrix.setPosition(cx.multiplyScalar(R));
        p.mesh.visible = true;
        p.active = true;
        p.t = 0;
        p.dur = Ldeg / wdeg; // seconds head-travel
        // Display amplitude from the drawn magnitude (a mag-4.5
        // meteor is plainly visible - the eye is drawn to motion;
        // brighter = exponentially stronger per Pogson, capped).
        p.u.amp.value = Math.min(0.5 * Math.pow(10, 0.4 * (4.5 - m)), 3);
        return true;

              SKYGLOW_H,
              state.lat,
              state.lon,
              i * 22.5
            )
          );
        const mean = g.reduce((a, b) => a + b, 0) / 16;
        for (let i = 0; i < 16; i++)
          lpGlowObj.u.azData[i] = THREE.MathUtils.clamp(
            (lpRatio + g[i]) / Math.max(lpRatio + mean, 1e-6),

      }
      // The LIVE sky over the atlas: clouds amplify the artificial

      // whenever the measured cloud cover changes, so an overcast
      // night over a town is visibly brighter than a clear one and
      // the stars fade under it exactly as the contrast says.
      function applyCloudSkyglow() {
        const amp = cloudAmp(lpRatio, (state.cloud ?? 0) / 100);
        const rEff = lpRatio * amp;
        lpVis = pointVisibility(rEff);
        lpVisBright = 1 / Math.sqrt(1 + rEff);
        lpMag = skyMag(rEff);
        lpGlowAmp = THREE.MathUtils.clamp(Math.log10(1 + rEff) / 2.5, 0, 1);
        if (lpGlow) lpGlow.visible = lpGlowAmp > 0.01;

          'Falchi 2016 skyglow atlas',
          'zenith ' +
            lpMag.toFixed(2) +
            ' mag/arcsec\u00b2 \u00b7 Bortle ' +
            bortleClass(lpMag) +

            lpVis.toFixed(2) +

      const SAT_DOT_N = 12;

      // ---------- physical snow (Rapier, loaded only when it snows) ----------
      // The near-field weather box is human scale (roughly 1 unit = 1m),
      // unlike the 57 m/unit map scale. Flakes are rigid bodies in a real
      // physics engine: gravity against air drag (linear damping gives the
      // ~1.4 m/s terminal velocity), pushed by the real wind, colliding
      // with a heightfield of the actual local terrain AND with every
      // flake already settled - so drifts grow on the real topography for
      // as long as the page stays open, and melt when the real
      // temperature says so.
      const SNOW_N = 240;
      const DRIFT_CAP = 2400;
      const SNOW_EXT = 120;
      const tmpM4 = new THREE.Matrix4();
      const driftSnowMat = new THREE.MeshStandardNodeMaterial({
        color: '#eef2f6',
        roughness: 0.5
      });
      const driftMesh = new THREE.InstancedMesh(
        new THREE.IcosahedronGeometry(0.16, 0),
        driftSnowMat,

      driftMesh.frustumCulled = false;

      const flakeMat = new THREE.MeshBasicNodeMaterial();
      aerial.applyFogColor(flakeMat, '#ffffff');
      const flakeMesh = new THREE.InstancedMesh(
        new THREE.IcosahedronGeometry(0.12, 0),
        flakeMat,
        SNOW_N
      );
      flakeMesh.count = 0;
      flakeMesh.visible = false; // count = 0 still draws on WebGPU
      flakeMesh.frustumCulled = false;

      async function initSnowSim() {
        snowLoading = true;
        const RAPIER = await import('./horizon/rapier.es.js');
        await RAPIER.init();
        const world = new RAPIER.World({x: 0, y: -3, z: 0});
        const sim = {
          world,
          bodies: [],
          drifts: new Array(DRIFT_CAP).fill(null),
          head: 0,
          countD: 0,
          highWater: 0,
          melt: 0
        };
        sim.rebuildTerrain = () => {
          if (sim.terrain) world.removeCollider(sim.terrain, false);
          const HF = 60;
          const heights = new Float32Array((HF + 1) * (HF + 1));
          for (let r = 0; r <= HF; r++)
            for (let c = 0; c <= HF; c++)
              heights[r * (HF + 1) + c] = sample(
                (r / HF - 0.5) * SNOW_EXT, // rows run along +x (verified)
                (c / HF - 0.5) * SNOW_EXT
              ).y;
          sim.terrain = world.createCollider(
            RAPIER.ColliderDesc.heightfield(HF, HF, heights, {
              x: SNOW_EXT,
              y: 1,
              z: SNOW_EXT
            })
          );
        };
        sim.clearDrifts = () => {
          for (let i = 0; i < DRIFT_CAP; i++) {
            if (sim.drifts[i]) {
              world.removeCollider(sim.drifts[i], false);
              sim.drifts[i] = null;
            }
            tmpM4.makeScale(0, 0, 0);
            driftMesh.setMatrixAt(i, tmpM4);
          }
          sim.head = 0;
          sim.countD = 0;
          sim.highWater = 0;
          driftMesh.count = 0;
          driftMesh.visible = false;
          driftMesh.instanceMatrix.needsUpdate = true;
        };
        sim.spawn = (body) => {
          body.setTranslation(
            {
              x: (Math.random() - 0.5) * 80,
              y: camBaseY + 26 + Math.random() * 10,
              z: (Math.random() - 0.5) * 80
            },
            true
          );
          body.setLinvel({x: 0, y: -1, z: 0}, true);
        };
        sim.deposit = (p) => {
          const slot = sim.head;
          sim.head = (sim.head + 1) % DRIFT_CAP;
          if (sim.drifts[slot]) world.removeCollider(sim.drifts[slot], false);
          else sim.countD++;
          sim.drifts[slot] = world.createCollider(
            RAPIER.ColliderDesc.ball(0.14).setTranslation(p.x, p.y, p.z)
          );
          tmpM4.makeScale(1, 0.72, 1).setPosition(p.x, p.y, p.z);
          driftMesh.setMatrixAt(slot, tmpM4);
          sim.highWater = Math.max(sim.highWater, slot + 1);
          driftMesh.count = sim.highWater;
          driftMesh.visible = sim.highWater > 0;
          driftMesh.instanceMatrix.needsUpdate = true;
        };
        sim.meltOldest = () => {
          for (let i = 0; i < DRIFT_CAP; i++) {
            const slot = (sim.head + i) % DRIFT_CAP; // oldest surviving
            if (!sim.drifts[slot]) continue;
            world.removeCollider(sim.drifts[slot], false);
            sim.drifts[slot] = null;
            sim.countD--;
            tmpM4.makeScale(0, 0, 0);
            driftMesh.setMatrixAt(slot, tmpM4);
            driftMesh.instanceMatrix.needsUpdate = true;
            return;
          }
        };
        sim.rebuildTerrain();
        for (let i = 0; i < SNOW_N; i++) {
          const body = world.createRigidBody(
            // Locked rotations: flakes must not roll away downwind on
            // landing (validated: rolling leaked 95% of deposits).
            RAPIER.RigidBodyDesc.dynamic().setLinearDamping(2.1).lockRotations()
          );
          world.createCollider(
            RAPIER.ColliderDesc.ball(0.12).setRestitution(0.02).setFriction(1),
            body
          );
          sim.spawn(body);
          sim.bodies.push(body);
        }
        snowSim = sim;
        record(
          'Rapier physics engine (vendored)',
          SNOW_N + ' snow bodies · heightfield of the local terrain'
        );
      }

      // ---------- colour ramps for light/fog ----------

      let searchSeq = 0;

      addEventListener('keydown', (e) => {

      if (params.get('explore') === '1') setExplore(true);

      // ---------- free camera ----------
      // Drag to look, WASD/arrows to fly (Shift for speed, R/F for
      // altitude), wheel to dolly. Until the first interaction the
      // camera keeps its cinematic auto spot (and pans poleward for
      // aurora); afterwards the view is yours. Height stays clamped to
      // the real terrain, bounds to the loaded DEM.
      const freeCam = {
        on: false,
        yaw: 0,
        pitch: 0.015,
        dolly: 0,
        pos: new THREE.Vector3(),
        keys: new Set()
      };
      function engageFreeCam() {
        if (freeCam.on) return;
        freeCam.on = true;
        freeCam.pos.copy(camera.position);
        freeCam.yaw = yaw;
        freeCam.pitch = 0.015;
      }
      {
        let dragId = -1;
        let lastPX = 0;
        let lastPY = 0;
        canvas.addEventListener('pointerdown', (e) => {
          dragId = e.pointerId;
          lastPX = e.clientX;
          lastPY = e.clientY;
          // Capture can throw for an already-released pointer; the drag
          // still works without it.
          try {
            canvas.setPointerCapture(e.pointerId);
          } catch {}
          engageFreeCam();
        });

          if (e.pointerId !== dragId) return;
          freeCam.yaw -= (e.clientX - lastPX) * 0.0032;
          freeCam.pitch += (e.clientY - lastPY) * 0.0032;
          freeCam.pitch = THREE.MathUtils.clamp(freeCam.pitch, -1.35, 1.35);
          lastPX = e.clientX;
          lastPY = e.clientY;
        });
        addEventListener('pointerup', (e) => {
          if (e.pointerId === dragId) dragId = -1;
        });
        canvas.addEventListener(
          'wheel',
          (e) => {
            engageFreeCam();
            freeCam.dolly -= e.deltaY * 0.02;
            e.preventDefault();
          },
          {passive: false}
        );
        const moveCodes = [
          'KeyW',
          'KeyA',
          'KeyS',
          'KeyD',
          'KeyR',
          'KeyF',
          'ArrowUp',
          'ArrowDown',
          'ArrowLeft',
          'ArrowRight',
          'ShiftLeft',
          'ShiftRight'
        ];
        addEventListener('keydown', (e) => {
          if (freeCam.on && moveCodes.includes(e.code) && !typing(e))
            freeCam.keys.add(e.code);
        });
        addEventListener('keyup', (e) => {
          freeCam.keys.delete(e.code);
        });
      }

      // ---------- roam: terrain streaming under the free camera ----------
      // The world is one re-anchorable box (roam.js): fly
      // ROAM_TRIGGER_M metres from the anchor and the theme
      // fetches a fresh DEM box centred on the camera's geodetic
      // position, swaps it in with buildWorld() (the same call
      // boot uses), and rewrites the camera EXACTLY - its
      // geodetic point becomes the new origin (sceneToGeo /
      // geoToScene are algebraic inverses, gated) and its
      // absolute altitude survives the asinh datum change
      // (elevOfY/yOfElev, gated). Every point-anchored live
      // source then re-anchors: the /stream EventSource
      // reconnects (initial ais/adsb snapshot repopulates the
      // cleared pools), the cheap syncs re-fetch, the skyglow
      // atlas re-samples, and the URL is rewritten through the
      // same gated relocateURL the explore menu uses - reloading
      // keeps the spot you walked to. Forest polygons and BRDF
      // arrive async and dress the NEXT rebuild, exactly as at
      // boot. ?roam=0 disables (harness shots never roam - the
      // camera starts well inside the trigger ring).
      // The terrain worker: the hop's heavy bakes (LEADR moments,
      // mesh surface, bathymetry - the SAME gated modules, see
      // terrain-worker.js) run off the main thread while the old
      // world keeps rendering. Any failure - no module workers,
      // a crash, a hung job - falls back to the synchronous path
      // forever after; the hop still happens, just with the old
      // hitch.
      let terrainWorker = null;
      let terrainJobId = 0;
      let terrainWorkerUsed = 0;
      function prepareTerrain(dem, anchor) {
        // Harvest the lattice from the geometry the swap will use -
        // no vertex-ordering assumptions cross the thread boundary.
        const geo = new THREE.PlaneGeometry(WORLD, WORLD, 320, 320);
        geo.rotateX(-Math.PI / 2);
        const pos = geo.attributes.position;
        const xz = new Float32Array(pos.count * 2);
        for (let i = 0; i < pos.count; i++) {
          xz[2 * i] = pos.getX(i);
          xz[2 * i + 1] = pos.getZ(i);
        }
        // The datum the worker bakes with is the same 25-point ring
        // buildWorld derives (identical inputs, identical doubles).
        let sum = 0;
        let cnt = 0;
        for (let dx = -12; dx <= 12; dx += 6)
          for (let dz = -12; dz <= 12; dz += 6) {
            sum += demElevOf(dem, dx, dz, WORLD);
            cnt++;
          }
        const center = Math.max(sum / cnt, 0.3);
        // The lake wet mask for THIS box (lakes.js, gated): built
        // from the new DEM + anchor so worker and main thread bake
        // the same water.
        const lakes = lakesGeo
          ? lakeMask(lakesGeo, anchor, WORLD, 192, (x, z) =>
              demElevOf(dem, x, z, WORLD)
            )
          : null;
        return new Promise((resolve) => {
          if (!terrainWorker && terrainWorker !== false) {
            try {
              terrainWorker = new Worker(
                new URL('./horizon/terrain-worker.js', location.href),
                {type: 'module'}
              );
              terrainWorker.addEventListener('error', () => {
                terrainWorker = false; // sync path from here on
              });
            } catch {
              terrainWorker = false;
            }
          }
          if (!terrainWorker) return resolve({geo, lakes});
          const id = ++terrainJobId;
          const bail = setTimeout(() => resolve({geo, lakes}), 8000);
          const onMsg = (ev) => {
            if (!ev.data || ev.data.id !== id) return;
            terrainWorker.removeEventListener('message', onMsg);
            clearTimeout(bail);
            terrainWorkerUsed++;
            resolve({geo, lakes, ...ev.data});
          };
          terrainWorker.addEventListener('message', onMsg);
          terrainWorker.postMessage(
            {
              id,
              dem,
              centerElev: center,
              anchor: {lat: anchor.lat, lon: anchor.lon},
              world: WORLD,
              xz,
              S: 512,
              DT: 512,
              lakes
            },
            [xz.buffer]
          );
        });
      }

      const roam = {pending: false, notBefore: 0};
      function clearLivePools() {
        // Scene positions are relative to the old anchor; the
        // objects themselves live on (same MMSI/hex) and re-apply
        // idempotently from the next stream event or poll.
        liveTraffic = null;
        seenFlights.clear();
        for (const a of airLights) {
          a.active = false;
          a.g.visible = false;
        }
        for (const s of shipPool) {
          s.active = false;
          s.g.visible = false;
        }
        for (const p of contrailPool) {
          p.active = false;
          p.mesh.visible = false;
        }
        for (const f of flashPool) {
          f.active = false;
          f.mesh.visible = false;
        }
      }
      async function reanchor() {
        roam.pending = true;
        const geo = sceneToGeo(freeCam.pos.x, freeCam.pos.z, {
          lat: state.lat,
          lon: state.lon
        });
        try {
          let dem;
          try {
            dem = await fetchDEMTiles(geo.lat, geo.lon);
          } catch {
            dem = await fetchDEM(geo.lat, geo.lon);
          }
          // Heavy bakes off-thread: the frame loop keeps flying over
          // the OLD world while the new one is computed; the swap
          // below is milliseconds.
          const pre = await prepareTerrain(dem, geo);
          const altM = elevOfY(freeCam.pos.y, centerElev);
          // Exact continuity: the camera kept moving through the
          // fetch and the bake - rewrite from where it IS, not from
          // where the hop was triggered (which used to teleport it
          // back to the anchor).
          const camGeo = sceneToGeo(freeCam.pos.x, freeCam.pos.z, {
            lat: state.lat,
            lon: state.lon
          });
          demData = dem;
          state.lat = geo.lat;
          state.lon = geo.lon;
          state.place = '';
          state.metar = null; // the old station no longer speaks for here
          pinnedLoc = true; // geolocation must not snap us home
          buildWorld(pre); // new centerElev, moments, water, trees
          const np = geoToScene(camGeo.lat, camGeo.lon, geo);

        syncTraffic();
        syncMetar();
        syncSmoke();
        syncAerosol();
        syncWater();
        syncBuildings();
        syncRoads();
        syncRivers();
        syncDischarge();
        syncRails();
        syncAerialways();
        syncTurbines();
        syncPeaks();
        syncLanduse();
        syncSoil();

                  q: 0.9,
                  e: 0.999,

        const moon = astro.moon;

          const pp = planetObj.posAttr;
          const ps = planetObj.sizeAttr;

                        ? v
                        : skyPoint(pts[i - 1].alt, pts[i - 1].az, 858);

                      .normalize()
                      .cross(pt.clone().normalize())

                    DUST_BETAS.length;

          cs.needsUpdate = true;

        // drawn sun (refraction.js: Ciddor + the exact bending
        // integral through the MEASURED pressure-level column; the

        // deg of true altitude when the sun is low (it moves that
        // far in ~5 s), every 0.5 deg high up where refraction is

        // deliberately stay on the standard convention - this is
        // the DRAWN sun.
        const profNow = state.profile ?? stdProfileFallback();
        const camAltM = elevOfY(camera.position.y, centerElev);
        if (
          profNow !== refr.prof ||
          Math.abs(sun.alt - refr.alt) > (sun.alt < 0.175 ? 3.5e-4 : 8.7e-3) ||

            d.flatten.value = refr.sun.flatten;

            d.dirR.value.copy(sunVec);
            d.dirB.value.copy(sunVec);
            d.flatten.value = 1;
          }

        // shadow node follows it.

          .copy(skyPoint(Math.max(sun.alt, -0.12), sun.az, 1))
          .multiplyScalar(400);

        // derivative-sampling span, second-order vs the moon's own

          if (moon.alt > -0.06) {
