            if (sDelay < -120) continue; // shaking here is long over
            const jolt = (amp) => {
              state.shake = Math.max(
                state.shake,
                Math.min((mag - 4) * 0.5 * atten * amp, 1.2)
              );
            };
            if (pDelay > 0) setTimeout(() => jolt(0.35), pDelay * 1000);
            if (sDelay > 0) setTimeout(() => jolt(1), sDelay * 1000);
            else jolt(1);
            say(
              'M' +
                mag.toFixed(1) +
                ' earthquake · ' +
                Math.round(km).toLocaleString('en') +
                ' km away · ' +
                (sDelay > 5
                  ? 'S-wave arrives in ' + Math.round(sDelay) + 's · '
                  : '') +
                f.properties.place
            );
          }
          firstQuakePoll = false;
          record('USGS M4.5+ quake feed', q.features.length + ' events today');
        } catch {
          // Silent: quakes are garnish, not the meal.
        }
      }

      // ---------- real terrain (open-meteo elevation, Copernicus DEM) ----------
      // 24x24 real elevations spanning 16km around the visitor, cached per
      // rounded location. The mesh gets macro relief from the DEM and only
      // fine detail from noise, so the landscape is recognisably *yours*.
      const DEM_N = 24;
      // DEM_HALF_M (8000 m), WORLD (280 units) and the exact
      // metres-per-unit MPU are imported from roam.js - the roam
      // system re-anchors this same box as the free camera walks,
      // so the constants live (and are gated) at one source.

      // Primary source: AWS terrarium tiles (Mapzen open data). Elevation
      // is PNG-encoded as (R*256 + G + B/256) - 32768, CORS-open, so a
      // stitched canvas gives ~30-90m real elevations in a few requests.
      // Kept at full pixel resolution (no downsampled cache: the browser's
      // HTTP cache already holds the tiles themselves).
      // ?demtiles=URL overrides the endpoint (same z/x/y.png scheme) -
      // an infrastructure param like ?adsb/?ais: the offline harness
      // serves deterministic tiles through it to exercise roam.
      const DEM_TILES =
        params.get('demtiles') ??
        'https://s3.amazonaws.com/elevation-tiles-prod/terrarium';
      async function fetchDEMTiles(lat, lon) {
        const z = Math.max(
          8,
          Math.min(
            13,
            Math.round(Math.log2((40075000 * Math.cos(lat * RAD)) / 8000))
          )
        );
        const world = 2 ** z * 256; // global pixels at this zoom
        const px = (lo) => ((lo + 180) / 360) * world;
        const py = (la) => {
          const r = la * RAD;
          return (
            ((1 - Math.log(Math.tan(r) + 1 / Math.cos(r)) / Math.PI) / 2) *
            world
          );
        };
        const mLat = 111320;
        const mLon = Math.max(111320 * Math.cos(lat * RAD), 1e-6);
        const dLat = DEM_HALF_M / mLat;
        const dLon = DEM_HALF_M / mLon;
        const x0 = Math.floor(px(lon - dLon) / 256);
        const x1 = Math.floor(px(lon + dLon) / 256);
        const y0 = Math.floor(py(lat + dLat) / 256);
        const y1 = Math.floor(py(lat - dLat) / 256);
        if ((x1 - x0 + 1) * (y1 - y0 + 1) > 12)
          throw new Error('tile span too large');
        const canvas = document.createElement('canvas');
        canvas.width = (x1 - x0 + 1) * 256;
        canvas.height = (y1 - y0 + 1) * 256;
        const ctx = canvas.getContext('2d', {willReadFrequently: true});
        const jobs = [];
        for (let ty = y0; ty <= y1; ty++)
          for (let tx = x0; tx <= x1; tx++)
            jobs.push(
              new Promise((resolve, reject) => {
                const img = new Image();
                img.crossOrigin = 'anonymous';
                img.onload = () => {
                  ctx.drawImage(img, (tx - x0) * 256, (ty - y0) * 256);
                  resolve();
                };
                img.onerror = reject;
                img.src = DEM_TILES + '/' + z + '/' + tx + '/' + ty + '.png';
              })
            );
        await Promise.all(jobs);
        const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
        const elev = new Float32Array(canvas.width * canvas.height);
        for (let k = 0; k < elev.length; k++)
          elev[k] =
            data[k * 4] * 256 + data[k * 4 + 1] + data[k * 4 + 2] / 256 - 32768;
        record(
          'AWS terrarium DEM tiles',
          jobs.length +
            ' tiles at z' +
            z +
            ' · ' +
            canvas.width +
            'x' +
            canvas.height +
            ' px'
        );
        return {
          kind: 'img',
          w: canvas.width,
          h: canvas.height,
          elev,
          ox: x0 * 256,
          oy: y0 * 256,
          worldPx: world,
          lat,
          lon,
          dLat,
          dLon
        };
      }

      async function fetchDEM(lat, lon) {
        const key = 'horizon-dem-om-' + lat.toFixed(2) + ',' + lon.toFixed(2);
        try {
          const hit = localStorage.getItem(key);
          if (hit) return JSON.parse(hit);
        } catch {}
        const mLat = 111320;
        const mLon = Math.max(111320 * Math.cos(lat * RAD), 1e-6);
        const lats = [];
        const lons = [];
        for (let j = 0; j < DEM_N; j++)
          for (let i = 0; i < DEM_N; i++) {
            lats.push(
              (lat + ((j / (DEM_N - 1) - 0.5) * 2 * DEM_HALF_M) / mLat).toFixed(
                4
              )
            );
            lons.push(
              (lon + ((i / (DEM_N - 1) - 0.5) * 2 * DEM_HALF_M) / mLon).toFixed(
                4
              )
            );
          }
        const grid = [];
        for (let o = 0; o < DEM_N * DEM_N; o += 96) {
          const r = await fetch(
            'https://api.open-meteo.com/v1/elevation?latitude=' +
              lats.slice(o, o + 96).join(',') +
              '&longitude=' +
              lons.slice(o, o + 96).join(','),
            {credentials: 'omit'}
          );
          if (!r.ok) throw new Error(r.status);
          grid.push(...(await r.json()).elevation);
        }
        const dem = {n: DEM_N, grid};
        record(
          'open-meteo elevation API',
          DEM_N + 'x' + DEM_N + ' grid (fallback)'
        );
        try {
          localStorage.setItem(key, JSON.stringify(dem));
        } catch {}
        return dem;
      }

      // ---------- scene ----------
      const canvas = document.getElementById('gl');
      // WebGPU-only build: every GPU pass is a compute kernel over
      // storage textures (the WebGL2-backend raster drivers were
      // deleted). Browsers without WebGPU get a plain caption.
      if (!navigator.gpu) {
        document.getElementById('caption').textContent =
          'this wallpaper needs WebGPU - current Chrome, Edge, Firefox or Safari';
        throw new Error('WebGPU unavailable');
      }
      const renderer = new THREE.WebGPURenderer({
        canvas,
        forceWebGL: false,
        antialias: true
      });
      renderer.setPixelRatio(Math.min(devicePixelRatio, 1.5));
      await renderer.init();
      if (!renderer.backend.isWebGPUBackend) {
        document.getElementById('caption').textContent =
          'this wallpaper needs WebGPU - the adapter request failed';
        throw new Error('WebGPU adapter unavailable');
      }
      // The renderer's own output transform stays identity: AgX (Sobotka;
      // Blender 4's default view transform - better hue preservation
      // toward clipping than ACES) and the sRGB encode are applied
      // per-material by the shared output hooks in aerial-tsl, in the
      // same order the classic chunk pipeline ran them, so raw-output
      // passes (the atmosphere dome, the sky objects, the cloud
      // composite) stay raw exactly as they shipped.
      renderer.toneMapping = THREE.NoToneMapping;
      renderer.outputColorSpace = THREE.LinearSRGBColorSpace;
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;
      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(55, 1, 0.1, 2000);
      // Harness capture hooks (?debug=1): composited screenshots
      // are blank for WebGPU surfaces under Xvfb, so the shoot
      // driver captures through the page itself. The theme's frame
      // is multi-pass (depth prepass, cloud composite, precipitation
      // overlay), so a re-render from outside the loop both collides
      // with the running backend and misses the composited passes -
      // __capture instead queues a request that the frame loop
      // services right after its own final pass, snapshotting the
      // canvas before WebGPU presents (and recycles) the texture.
      let captureReq = null;
      if (params.has('debug')) {
        window.__r = renderer;
        window.__scene = scene;
        window.__cam = camera;
        window.__THREE = THREE;
        window.__capture = (w, h) =>
          new Promise((res) => {
            captureReq = {w, h, res};
          });
      }
      camera.layers.enable(2);

      // Cascaded shadow maps (vendored three.js CSMShadowNode: practical
      // split scheme after Zhang et al. 2006) as a shadow node on ONE
      // real sun light - cascades split the shadow frustum without
      // mirrored cascade lights. Its colour/intensity come from the CPU
      // transmittance mirror each frame.
      const sunLight = new THREE.DirectionalLight(0xffffff, 1);
      sunLight.castShadow = true;
      const shadowRes = innerWidth < 800 ? 1024 : 2048;
      sunLight.shadow.mapSize.set(shadowRes, shadowRes);
      sunLight.shadow.bias = -0.0004;
      sunLight.shadow.normalBias = 1.5;
      sunLight.shadow.camera.near = 1;
      sunLight.shadow.camera.far = 800;
      const csm = new CSMShadowNode(sunLight, {
        cascades: 3,
        maxFar: 460,
        mode: 'practical',
        lightMargin: 150
      });
      csm.fade = true;
      sunLight.shadow.shadowNode = csm;
      scene.add(sunLight);
      scene.add(sunLight.target);
      record('Cascaded shadow maps', '3 cascades · practical splits (CSM)');

      let sizeCloudTargets = null;
      function resize() {
        renderer.setSize(innerWidth, innerHeight);
        camera.aspect = innerWidth / innerHeight;
        camera.updateProjectionMatrix();
        // The CSM shadow node binds its camera on first render.
        if (csm.camera) csm.updateFrustums();
        if (sizeCloudTargets) sizeCloudTargets();
      }
      addEventListener('resize', resize);
      resize();

      // Ambient is a hemisphere fed by the REAL sky: the atmosphere pass
      // integrates its own sky-view LUT (cosine-weighted) and the result
      // is read back at 1 Hz - twilight blues, overcast greys and sunset
      // warmth arrive from the raymarch, not from a tuned formula. The
      // ground half is that irradiance bounced off an estimated terrain
      // albedo (0.25 grass/rock, 0.7 snow - the one disclosed estimate).
      const ambient = new THREE.HemisphereLight(0xffffff, 0x404038, 0.5);
      scene.add(ambient);

      // Cloud shadows (phase 5): Beer-Lambert through the SAME Nubis
      // density the sky renders, multiplied into every sunlit
      // material's received shadow AND into the aerial march's
      // direct term (crepuscular rays). Created BEFORE the
      // atmosphere so its transmittance node can compile into the
      // aerial LUT kernel; until the lazy cloud system attaches, the
      // hook is a zero map - full sun.
      const cloudShadow = createCloudShadowHook();
      cloudShadow.uniforms.uWorldSize.value = WORLD;

      // The sky: Hillaire (2020) multiple-scattering atmosphere -
      // transmittance, multiple-scattering and per-frame sky-view LUTs
      // with Rayleigh, measured-aerosol Mie and ozone profiles.
      // Twilight arch and the Belt of Venus emerge from the raymarch
      // instead of being painted. The aerial-perspective march
      // carries Hillaire's volumetric shadow through the cloud
      // shadow hook - the haze itself shows the beams.
      const atmo = createAtmosphereTSL(renderer, cloudShadow);
      if (atmo.ok) {
        scene.add(atmo.mesh);
        record(
          'Hillaire (2020) atmosphere',
          'multiple-scattering LUTs · ozone · measured-aerosol Mie'
        );
      } else {
        record('atmosphere unavailable', 'no float render targets');
      }

      // Aerial perspective (Hillaire 2020, sec. 5.2): the atmosphere
      // BETWEEN the camera and every surface. atmosphere-tsl marches a
      // 64x32 LUT of inscattered radiance and mean transmittance over
      // (relative azimuth x distance), and every world material swaps
      // three.js' colour-only fog input for it - distant ridges turn
      // blue by scattering physics, then the Koschmieder haze (which
      // carries the MEASURED visibility) applies on top.
      function dummyTex(bytes) {
        const t = new THREE.DataTexture(
          new Uint8Array(bytes),
          1,
          1,
          THREE.RGBAFormat
        );
        t.needsUpdate = true;
        return t;
      }
      const aerial = createAerialFog(
        atmo.ok ? atmo.aerialTex : dummyTex([0, 0, 0, 255])
      );
      const aerialU = aerial.uniforms;
      aerialU.uAerialMaxU.value = atmo.ok ? atmo.aerialMaxUnits : 1;
      aerialU.uAerialOn.value = atmo.ok ? 1 : 0;
      const applyAerial = (mat) => aerial.apply(mat);
      if (atmo.ok) {
        record(
          'Aerial perspective LUT',
          'per-pixel inscatter + transmittance on every material'
        );
        record(
          'Sky-irradiance ambient',
          'hemisphere light integrated from the sky-view LUT'
        );
      }
      const skyIrr = new THREE.Color(0.05, 0.07, 0.1);
      const tmpC = new THREE.Color();
      let lastIrrT = -1e9;
      // The irradiance readback is async on WebGPURenderer (no
      // pipeline stall); until the first read resolves, skyIrr is a
      // guess. Systems with TEMPORAL HISTORY (the cloud buffer) must
      // not integrate lighting built on that guess - the 8%%/frame
      // exponential blend takes hundreds of frames to forget it.
      let skyIrrReady = !atmo.ok;

      // Overcast veil: a translucent grey dome that fades in with real
      // cloud cover (the scattering model alone stays too blue).
      const veilObj = createVeilMaterial();
      const veilU = veilObj.u;
      const veil = new THREE.Mesh(
        new THREE.SphereGeometry(600, 24, 16),
        veilObj.material
      );
      veil.renderOrder = -1;
      scene.add(veil);

      // ---------- terrain ----------
      function mulberry32(a) {
        return () => {
          a |= 0;
          a = (a + 0x6d2b79f5) | 0;
          let t = Math.imul(a ^ (a >>> 15), 1 | a);
          t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
          return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
        };
      }
      const rand = mulberry32(20260704);
      const gridN = 48;
      const grid = Array.from({length: gridN * gridN}, rand);
      const lerp = (a, b, t) => a + (b - a) * t;
      const smooth = (t) => t * t * (3 - 2 * t);
      function noise2(x, y) {
        const xi = Math.floor(x),
          yi = Math.floor(y);
        const g = (ix, iy) =>
          grid[
            (((iy % gridN) + gridN) % gridN) * gridN +
              (((ix % gridN) + gridN) % gridN)
          ];
        const tx = smooth(x - xi),
          ty = smooth(y - yi);
        return lerp(
          lerp(g(xi, yi), g(xi + 1, yi), tx),
          lerp(g(xi, yi + 1), g(xi + 1, yi + 1), tx),
          ty
        );
      }
      const fbm = (x, y) =>
        0.55 * noise2(x, y) +
        0.27 * noise2(x * 2.1 + 13, y * 2.1 + 7) +
        0.13 * noise2(x * 4.3 + 41, y * 4.3 + 3) +
        0.05 * noise2(x * 8.9 + 5, y * 8.9 + 59);

      // Fallback height model when the DEM is unavailable: domain-warped
      // fBm, in real metres so the colouring logic stays unified.
      function proceduralElev(x, z) {
        const wx = x / 90 + 1.7 * fbm(x / 60 + 31, z / 60 + 17);
        const wz = z / 90 + 1.7 * fbm(x / 60 + 3, z / 60 + 47);
        const ridged = 1 - Math.abs(2 * fbm(wx, wz) - 1);
        return 90 + 700 * ridged * ridged + 260 * fbm(x / 40, z / 40);
      }

      let demData = null; // full-res tile image or {n, grid} API fallback
      // The DEM sampler lives in terrain-sample.js now (gated, and
      // shared with the terrain worker - the model lives once);
      // this wrapper just binds the module state.
      const demElev = (x, z) => demElevOf(demData, x, z, WORLD);

      let centerElev = 300;
      // The dressing anchor: pinned to the box the terrain was BUILT
      // from (buildWorld sets it), so per-frame sample() calls stay
      // consistent with the mesh even while a re-anchor is in flight.
      let dressAnchor = {lat: 51.48, lon: 0};
      function sample(x, z) {
        if (demData) {
          return sampleDem(
            demData,
            x,
            z,
            centerElev,
            dressAnchor,
            WORLD,
            lakesMask
          );
        }
        // Procedural fallback (offline harness, DEM unreachable):
        // same datum and Earth-anchored seasoning, never water.
        const e = proceduralElev(x, z);
        const y =
          16 * Math.asinh((e - centerElev) / 500) +
          1.6 * (microRelief(x, z, dressAnchor) - 0.5);
        return {e, y, water: false};
      }

      const ground = new THREE.Group();
      scene.add(ground);
      // Tree archetypes (shared geometry, per-tree scale): conifers for
      // the subalpine band, broadleaves lower down.
      // GGX standard materials: bark and foliage are near-diffuse
      // (roughness ~1), which the microfacet model represents honestly
      // instead of Lambert's zero specular.
      const trunkMat = new THREE.MeshStandardNodeMaterial({
        color: '#6b4a33',
        roughness: 0.9,
        metalness: 0
      });
      const leafMats = [
        new THREE.MeshStandardNodeMaterial({color: '#2e5230', roughness: 1}),
        new THREE.MeshStandardNodeMaterial({color: '#3f6b3a', roughness: 1}),
        new THREE.MeshStandardNodeMaterial({color: '#4d7a35', roughness: 1})
      ];
      const broadMats = [
        new THREE.MeshStandardNodeMaterial({color: '#4a7d33', roughness: 1}),
        new THREE.MeshStandardNodeMaterial({color: '#5d8a3c', roughness: 1})
      ];
      [trunkMat, ...leafMats, ...broadMats].forEach((m) => applyAerial(m));
      const geoTrunk = new THREE.CylinderGeometry(0.13, 0.2, 1.1, 7);
      const geoCone1 = new THREE.ConeGeometry(1.15, 2.3, 10);
      const geoCone2 = new THREE.ConeGeometry(0.82, 1.8, 10);
      // Broadleaf crowns: an indexed sphere displaced by a smooth
      // position-hashed field (same offset for co-located verts, so
      // averaged normals stay smooth), instead of a faceted icosahedron.
      const geoCanopy = new THREE.SphereGeometry(1.25, 14, 10);
      {
        const cp = geoCanopy.attributes.position;
        const cv = new THREE.Vector3();
        for (let i = 0; i < cp.count; i++) {
          cv.fromBufferAttribute(cp, i);
          const s =
            1 +
            0.16 *
              Math.sin(cv.x * 4.7) *
              Math.sin(cv.y * 3.9 + 1.3) *
              Math.sin(cv.z * 5.1 + 2.1);
          cp.setXYZ(i, cv.x * s, cv.y * s, cv.z * s);
        }
        geoCanopy.computeVertexNormals();
      }
      // Deciduous phenology bases (Hopkins' law shifts the calendar).
      const broadBases = broadMats.map((m) => m.color.clone());
      const cBare = new THREE.Color('#6f5b46');
      const cSpring = new THREE.Color('#7cbf5d');
      const cAutumn = new THREE.Color('#b95f24');
      // Climatic treeline vs latitude, after Körner & Paulsen (2004).
      function treelineM(lat) {
        const a = Math.abs(lat);
        return a < 30
          ? 3500 + (30 - a) * 13
          : Math.max(3500 - 92 * (a - 30), 0);
      }
      let trees = [];
      let camBaseY = 6;
      let viewSign = 1; // +1: camera looks south (north hemisphere)
      let snowSim = null; // Rapier world, booted the first time it snows
      let snowLoading = false;
      let water = null; // three.js Water plane, built when the DEM has sea
      let oceanCascades = null; // FFT ocean (phase 5), built with water
      let oceanBuiltU = -1; // wind the spectrum was built at (m/s)
      let oceanBuiltDir = 0;
      let oceanBuiltSeaKey = null; // measured partitions in the spectrum
      let oceanSeaDepth = 60;
      let oceanTime = 0; // REAL seconds - the dispersion is physical

      // Terrain material: grass/rock/snow/sea decided per PIXEL in the
      // fragment shader (slope and altitude with noise-jittered borders),
      // not per vertex, so faces stay crisp at any distance. Elevation in
      // metres is recovered in-shader by inverting the asinh compression.
      const flatMoments = new THREE.DataTexture(
        new Float32Array([0, 0, 0, 0]),
        1,
        1,
        THREE.RGBAFormat,
        THREE.FloatType
      );
      flatMoments.needsUpdate = true;
      const terrainObj = createTerrainNodeMaterial(flatMoments, aerial);
      const terrainMat = terrainObj.material;
      const terrainUniforms = terrainObj.uniforms;
      terrainUniforms.uWorldSize.value = WORLD;
      cloudShadow.applyTo(terrainMat);
      terrainUniforms.uLightsTint.value.fromArray(LAMP_TINT);
      record(
        'GGX microfacet BRDF (Karis 2013)',
        'per-pixel roughness · vegetation/rock/snow'
      );
      record(
        'Cloud shadow map',
        'Beer-Lambert through the cloud decks (Schneider 2015)'
      );
      record(
        'Crepuscular rays',
        'volumetric cloud shadow in the aerial in-scatter (Hillaire 2020)'
      );
      record('Lommel-Seeliger moon', 'lunar regolith photometry');

      // The DEM outresolves the mesh (~26 m ground truth vs ~0.9 units
      // per vertex), so shading reads the data directly - as LEADR
      // slope moments (leadr.js): a double-precision box pyramid of
      // (E[sx], E[sz], E[sx^2], E[sz^2]) from the same sample()
      // surface. The trilinear auto-LOD sample gives every lit pixel
      // the footprint's MEAN hillside orientation and the slope
      // variance that inflates the specular lobes - the mipless
      // 8-bit normal map this replaces aliased both. 512^2 base
      // matches the ~26 m source data over the 16 km world.
      function bakeTerrainMoments(pre) {
        const S = 512;
        let levels = pre;
        if (!levels) {
          const step = WORLD / (S - 1);
          const hs = new Float64Array(S * S);
          for (let j = 0; j < S; j++)
            for (let i = 0; i < S; i++)
              hs[j * S + i] = sample(
                (i / (S - 1) - 0.5) * WORLD,
                (j / (S - 1) - 0.5) * WORLD
              ).y;
          const {sx, sz} = slopesFromHeights(hs, S, step);
          levels = buildMomentPyramid(sx, sz, S).levels;
        }
        const tex = new THREE.DataTexture(
          levels[0].data,
          S,
          S,
          THREE.RGBAFormat,
          THREE.FloatType
        );
        tex.generateMipmaps = false;
        tex.mipmaps = levels.map((l) => ({
          data: l.data,
          width: l.size,
          height: l.size
        }));
        tex.minFilter = THREE.LinearMipmapLinearFilter;
        tex.magFilter = THREE.LinearFilter;
        tex.needsUpdate = true;
        if (terrainObj.momentsTexNode.value.isDataTexture)
          terrainObj.momentsTexNode.value.dispose();
        terrainObj.momentsTexNode.value = tex;
      }

      let terrainMesh = null;
      let worldBuilt = false;
      // Trees: Earth-anchored candidates (roam.js treeCandidates) -
      // the same wood grows the same trees from any roam box, with
      // the same species, size and sway phase (gated overlap
      // landmark) - filtered by the theme's physical tests: inside
      // the real OSM woods when we have them, below the real tree
      // line, off cliffs, out of the sea, and off both camera
      // spots. Re-runnable on its own: fresh forest polygons
      // re-dress the standing terrain without a full rebuild.
      function placeTrees() {
        for (const t of trees) ground.remove(t);
        trees = [];
        // Forest polygons are stored geodetic; project them onto
        // the CURRENT box for the point-in-polygon test.
        forestScene = forestGeo
          ? forestGeo.map((poly) =>
              poly.map(([la, lo]) => {
                const s = geoToScene(la, lo, dressAnchor);
                return [s.x, s.z];
              })
            )
          : null;
        const tl = treelineM(state.lat);
        for (const c of treeCandidates(dressAnchor)) {
          if (trees.length >= 140) break;
          const {x, z} = c;
          const s0 = sample(x, z);
          if (s0.water || s0.e > tl) continue;
          if (!inForest(x, z)) continue;
          // Real forests stand on ~35° alpine slopes; the asinh height
          // compression roughly doubles scene gradients, hence 4.5.
          const grade =
            Math.abs(sample(x + 2, z).y - sample(x - 2, z).y) +
            Math.abs(sample(x, z + 2).y - sample(x, z - 2).y);
          if (grade > 4.5) continue;
          if (Math.hypot(x, z - 26) < 24 || Math.hypot(x, z + 26) < 24)
            continue;
          const sc = 0.8 + c.r[0] * 1.4;
          // Conifers own the subalpine belt below the climatic treeline.
          const conifer = s0.e > tl - 700 || c.r[1] < 0.4;
          const tree = new THREE.Group();
          const trunk = new THREE.Mesh(geoTrunk, trunkMat);
          trunk.position.y = 0.55;
          trunk.castShadow = true;
          tree.add(trunk);
          if (conifer) {
            const mat = leafMats[Math.floor(c.r[2] * leafMats.length)];
            const c1 = new THREE.Mesh(geoCone1, mat);
            c1.position.y = 1.7;
            const c2 = new THREE.Mesh(geoCone2, mat);
            c2.position.y = 3.1;
            c1.castShadow = c2.castShadow = true;
            c1.receiveShadow = true;
            tree.add(c1, c2);
          } else {
            const canopy = new THREE.Mesh(
              geoCanopy,
              broadMats[Math.floor(c.r[2] * broadMats.length)]
            );
            canopy.position.y = 2.2;
            canopy.scale.y = 0.82;
            canopy.castShadow = canopy.receiveShadow = true;
            tree.add(canopy);
          }
          tree.scale.setScalar(sc);
          tree.position.set(x, s0.y, z);
          tree.userData = {phase: c.r[3] * Math.PI * 2, a: 0, v: 0};
          trees.push(tree);
          ground.add(tree);
        }
      }
      // Buildings: the town's real shape. Real OSM footprints are
      // projected through the shared Earth anchoring and seated on
      // the sampled terrain (never in water); after dark the walls
      // emit the town's MEASURED Black Marble radiance - windows
      // warm exactly where the night lights say the town is lit,
      // with the lamps' own tint and eye-response mapping.
      let bldMesh = null;
      let bldMat = null;
      let bldNightU = null;
      let bldGlowAt = null; // scene (x,z) -> measured radiance [0..1]
      let bldSnowAt = null; // scene (x,z) -> measured FSC [0..1]
      let bldSnowU = null; // live-snowfall term (the terrain's uSnowy)
      function placeBuildings() {
        if (bldMesh) {
          ground.remove(bldMesh);
          bldMesh.geometry.dispose();
          bldMesh = null;
        }
        if (!buildsGeo || !buildsGeo.length || params.get('buildings') === '0')
          return;
        const groundY = (x, z) => {
          const s = sample(x, z);
          return s.water ? null : s.y;
        };
        const glowAt = (x, z) => (bldGlowAt ? Math.sqrt(bldGlowAt(x, z)) : 0);
        const g = buildingsGeometry(
          buildsGeo,
          dressAnchor,
          groundY,
          glowAt,
          1 / MPU,
          WORLD / 2
        );
        if (!g.placed) return;
        const geo = new THREE.BufferGeometry();
        geo.setAttribute('position', new THREE.BufferAttribute(g.position, 3));
        geo.setAttribute('normal', new THREE.BufferAttribute(g.normal, 3));
        geo.setAttribute('color', new THREE.BufferAttribute(g.color, 3));
        geo.setAttribute('glow', new THREE.BufferAttribute(g.glow, 1));
        geo.setAttribute('roof', new THREE.BufferAttribute(g.roof, 1));
        // Measured snow per vertex: the same FSC field the terrain
        // reads, sampled at each building vertex (0 until the
        // satellite answers).
        const rsnow = new Float32Array(g.count);
        if (bldSnowAt)
          for (let i = 0; i < g.count; i++)
            rsnow[i] = bldSnowAt(g.position[3 * i], g.position[3 * i + 2]);
        geo.setAttribute('rsnow', new THREE.BufferAttribute(rsnow, 1));
        if (!bldMat) {
          bldNightU = tslUniform(0);
          bldSnowU = tslUniform(0);
          bldMat = new THREE.MeshStandardNodeMaterial({
            vertexColors: true,
            roughness: 0.9,
            metalness: 0
          });
          // Snow lies on the roofs exactly as it lies on the
          // ground beside them: the measured FSC (rsnow) OR the
          // live-snowfall term the terrain uses (bldSnowU),
          // whichever says more - and ONLY on the roof-flagged
          // surfaces (walls, gables and spires stay bare). The
          // snow albedo is the terrain's own.
          bldMat.colorNode = tslMix(
            tslAttribute('color'),
            tslVec3(0.87, 0.9, 0.93),
            tslAttribute('roof')
              .mul(tslAttribute('rsnow').max(bldSnowU))
              .clamp(0, 1)
              .mul(0.95)
          );
          bldMat.emissiveNode = tslUniform(
            new THREE.Color(LAMP_TINT[0], LAMP_TINT[1], LAMP_TINT[2])
          )
            .mul(tslAttribute('glow'))
            .mul(bldNightU)
            .mul(0.6);
          applyAerial(bldMat);
        }
        bldMesh = new THREE.Mesh(geo, bldMat);
        bldMesh.castShadow = bldMesh.receiveShadow = true;
        ground.add(bldMesh);
        record(
          'OSM buildings placed',
          g.placed + ' of ' + buildsGeo.length + ' footprints on this box'
        );
      }
      // Roads: ribbons of the measured width seated on the sampled
      // terrain, 2 m of clearance for the coarse render mesh (the
      // ribbon follows sample() every 15 m; the mesh interpolates
      // 50 m cells). Water cuts a road; tagged bridges span it.
      let roadMesh = null;
      let roadMat = null;
      function placeRoads() {
        if (roadMesh) {
          ground.remove(roadMesh);
          roadMesh.geometry.dispose();
          roadMesh = null;
        }
        if (!roadsGeo || !roadsGeo.length || params.get('roads') === '0')
          return;
        const groundY = (x, z) => {
          const s = sample(x, z);
          return s.water ? null : s.y + 2 / MPU;
        };
        const g = roadsGeometry(roadsGeo, dressAnchor, groundY, 1 / MPU, 140);
        if (!g.placed) return;
        const geo = new THREE.BufferGeometry();
        geo.setAttribute('position', new THREE.BufferAttribute(g.position, 3));
        geo.setAttribute('normal', new THREE.BufferAttribute(g.normal, 3));
        geo.setAttribute('color', new THREE.BufferAttribute(g.color, 3));
        if (!roadMat) {
          roadMat = new THREE.MeshStandardNodeMaterial({
            vertexColors: true,
            roughness: 0.95,
            metalness: 0,
            polygonOffset: true,
            polygonOffsetFactor: -2,
            polygonOffsetUnits: -2
          });
          applyAerial(roadMat);
        }
        roadMesh = new THREE.Mesh(geo, roadMat);
        roadMesh.receiveShadow = true;
        ground.add(roadMesh);
        record(
          'OSM roads placed',
          g.placed + ' of ' + roadsGeo.length + ' ways on this box'
        );
      }
      // Ground cover: rasterise the landuse polygons onto THIS box
      // (landuse.js, gated) and hand the terrain shader its tint
      // field - same swap pattern as the night-lights texture.
      function placeLanduse() {
        if (!landGeo || !landGeo.length || params.get('landuse') === '0')
          return;
        const t = landTint(
          landGeo,
          dressAnchor,
          WORLD,
          192,
          soilDarkening(soilTheta)
        );
        if (!t) {
          terrainUniforms.uLandOn.value = 0;
          return;
        }
        const tex = new THREE.DataTexture(
          t.data,
          t.n,
          t.n,
          THREE.RGBAFormat,
          THREE.FloatType
        );
        tex.minFilter = tex.magFilter = THREE.LinearFilter;
        tex.needsUpdate = true;
        const old = terrainObj.landTexNode.value;
        terrainObj.landTexNode.value = tex;
        if (old && old.image && old.image.width > 1) old.dispose();
        terrainUniforms.uLandOn.value = 1;
        record(
          'OSM landuse painted',
          t.painted + ' of ' + landGeo.length + ' polygons on this box'
        );
      }
      // Watercourses: water-albedo ribbons through the same gated
      // builder as the roads, seated 1.5 m over the render mesh -
      // just under the roads' 2 m, so a tagged road bridge crosses
      // ABOVE the river it spans. Lakes and the sea break them at
      // the shore (sample().water -> null).
      let riverMesh = null;
      let riverMat = null;
      function placeRivers() {
        if (riverMesh) {
          ground.remove(riverMesh);
          riverMesh.geometry.dispose();
          riverMesh = null;
        }
        if (!riversGeo || !riversGeo.length || params.get('rivers') === '0')
          return;
        const groundY = (x, z) => {
          const s = sample(x, z);
          return s.water ? null : s.y + 1.5 / MPU;
        };
        // Today's measured flow scales the ladder widths through
        // the gated hydraulic geometry (factor 1 without data).
        const f = riverFlow ? riverFlow.factor : 1;
        const flowed =
          f === 1 ? riversGeo : riversGeo.map((r) => ({...r, wM: r.wM * f}));
        const g = riversGeometry(flowed, dressAnchor, groundY, 1 / MPU, 140);
        if (!g.placed) return;
        const geo = new THREE.BufferGeometry();
        geo.setAttribute('position', new THREE.BufferAttribute(g.position, 3));
        geo.setAttribute('normal', new THREE.BufferAttribute(g.normal, 3));
        geo.setAttribute('color', new THREE.BufferAttribute(g.color, 3));
        if (!riverMat) {
          riverMat = new THREE.MeshStandardNodeMaterial({
            vertexColors: true,
            roughness: 0.22, // water sheen without a reflector pass
            metalness: 0,
            polygonOffset: true,
            polygonOffsetFactor: -2,
            polygonOffsetUnits: -2
          });
          applyAerial(riverMat);
        }
        riverMesh = new THREE.Mesh(geo, riverMat);
        riverMesh.receiveShadow = true;
        ground.add(riverMesh);
        record(
          'OSM waterways placed',
          g.placed + ' of ' + riversGeo.length + ' watercourses on this box'
        );
      }
      // Railways: ballast ribbons through the shared gated builder
      // at 1.8 m clearance - above the rivers' 1.5 m (rail bridges
      // deck over the water they span) and under the roads' 2 m
      // (road overpasses stay on top).
      let railMesh = null;
      let railMat = null;
      // Map-matching over the drawn network (rails.js): moving
      // trains follow the rail graph's own route between their
      // stops (railRoute - the chord between stops cuts across
      // city blocks); dwell positions snap to the nearest arc. A
      // leg the drawn network cannot carry hides its train rather
      // than gliding it across the grass. Routes cache per leg.
      let railSnapIdx = null;
      const railRouteCache = new Map();
      function placeRails() {
        if (railMesh) {
          ground.remove(railMesh);
          railMesh.geometry.dispose();
          railMesh = null;
        }
        railSnapIdx = null;
        railRouteCache.clear();
        if (!railsGeo || !railsGeo.length || params.get('rails') === '0')
          return;
        const groundY = (x, z) => {
          const s = sample(x, z);
          return s.water ? null : s.y + 1.8 / MPU;
        };
        const g = railsGeometry(railsGeo, dressAnchor, groundY, 1 / MPU, 140);
        if (!g.placed) return;
        const geo = new THREE.BufferGeometry();
        geo.setAttribute('position', new THREE.BufferAttribute(g.position, 3));
        geo.setAttribute('normal', new THREE.BufferAttribute(g.normal, 3));
        geo.setAttribute('color', new THREE.BufferAttribute(g.color, 3));
        if (!railMat) {
          railMat = new THREE.MeshStandardNodeMaterial({
            vertexColors: true,
            roughness: 0.92,
            metalness: 0,
            polygonOffset: true,
            polygonOffsetFactor: -2,
            polygonOffsetUnits: -2
          });
          applyAerial(railMat);
        }
        railMesh = new THREE.Mesh(geo, railMat);
        railMesh.receiveShadow = true;
        ground.add(railMesh);
        railSnapIdx = railIndex(
          railsGeo.map((w) =>
            w.pts.map(([la, lo]) => {
              const s = geoToScene(la, lo, dressAnchor);
              return [s.x, s.z];
            })
          )
        );
        record(
          'OSM railways placed',
          g.placed + ' of ' + railsGeo.length + ' ways on this box'
        );
      }
      // Wind turbines: the shared windmills.js silhouettes at
      // the spec ladder's measured sizes, yawed into the wind
      // and spun by the frame loop below.
      let turbinesGroup = null;
      let turbineMats = null;
      const turbineRigs = []; // {yaw, rotor, spec, yawA}
      function placeTurbines() {
        turbineRigs.length = 0;
        if (turbinesGroup) {
          ground.remove(turbinesGroup);
          turbinesGroup.traverse((o) => o.geometry && o.geometry.dispose());
          turbinesGroup = null;
        }
        if (
          !turbinesGeo ||
          !turbinesGeo.length ||
          params.get('turbines') === '0'
        )
          return;
        if (!turbineMats) {
          const mk = (color, roughness) => {
            const m = new THREE.MeshStandardNodeMaterial({color, roughness});
            applyAerial(m);
            return m;
          };
          // the asset-viewer palette (?asset=windmills)
          turbineMats = {body: mk('#d5d8d9', 0.55), dark: mk('#3c4146', 0.6)};
        }
        turbinesGroup = new THREE.Group();
        let placed = 0;
        for (const t of turbinesGeo) {
          const sc = geoToScene(t.lat, t.lon, dressAnchor);
          if (Math.max(Math.abs(sc.x), Math.abs(sc.z)) > WORLD / 2) continue;
          const smp = sample(sc.x, sc.z);
          if (smp.water) continue; // no turbines in the lake
          const g = new THREE.Group();
          g.position.set(sc.x, smp.y, sc.z);
          const rig = buildWindmill(g, t.spec, turbineMats, 1 / MPU);
          rig.rotor.rotation.z = placed * 2.4; // dephased blades
          turbinesGroup.add(g);
          turbineRigs.push({
            yaw: rig.yaw,
            rotor: rig.rotor,
            spec: t.spec,
            // metres for the wake geometry (the scene's
            // asinh-warped Y is not a length)
            mx: sc.x * MPU,
            mz: sc.z * MPU,
            my: elevOfY(smp.y, centerElev) + t.spec.hub,
            wake: 1,
            yawA: null
          });
          placed++;
        }
        if (!placed) {
          turbinesGroup = null;
          return;
        }
        ground.add(turbinesGroup);
        record(
          'wind turbines placed',
          placed + ' of ' + turbinesGeo.length + ' on this box'
        );
        applyWakes();
      }

      // The farm robs itself (wakes.js - the Jensen/Katic PARK
      // model on the published V112 thrust curve): each turbine's
      // effective wind is its free hub wind times its farm
      // factor, recomputed whenever the measured wind (speed or
      // direction) changes.
      function turbineHubWind(spec) {
        return state.wind80 != null
          ? hubWind(
              state.wind / 3.6,
              state.wind80 / 3.6,
              (state.wind120 ?? state.wind80) / 3.6,
              spec.hub
            )
          : state.wind / 3.6;
      }
      function applyWakes() {
        if (!turbineRigs.length) return;
        const a = (state.winddir + 180) * RAD;
        const f = farmFactors(
          turbineRigs.map((r) => ({x: r.mx, y: r.my, z: r.mz, spec: r.spec})),
          {x: Math.sin(a), z: -Math.cos(a)},
          (i) => turbineHubWind(turbineRigs[i].spec)
        );
        let waked = 0;
        let worst = 1;
        for (let i = 0; i < f.length; i++) {
          turbineRigs[i].wake = f[i];
          if (f[i] < 0.999) waked++;
          worst = Math.min(worst, f[i]);
        }
        if (waked)
          record(
            'Jensen wind-farm wakes',
            waked +
              ' of ' +
              turbineRigs.length +
              ' turbines waked \u00b7 deepest -' +
              Math.round((1 - worst) * 100) +
              '% wind (Katic 1986, k 0.075)'
          );
      }

      // Cable cars: pylons at the real support nodes, spans hung
      // on the exact catenary between them (interior supports
      // 12 m over the sampled ground, end stations 6 m), cabins
      // at deterministic hash fractions along the line. Lines
      // render 1 px at any distance - what a distant cable is.
      let aerialGroup = null;
      const aerialCabins = []; // {m, hang, phase} - swung per frame
      let cableMat = null;
      let pylonMat = null;
      let cabinMat = null;
      const pylonGeo = new THREE.CylinderGeometry(0.006, 0.009, 1, 5);
      const cabinGeo = new THREE.BoxGeometry(0.045, 0.05, 0.055);
      function placeAerialways() {
        aerialCabins.length = 0;
        if (aerialGroup) {
          ground.remove(aerialGroup);
          aerialGroup.traverse((o) => {
            if (
              o.geometry &&
              o.geometry !== pylonGeo &&
              o.geometry !== cabinGeo
            )
              o.geometry.dispose();
          });
          aerialGroup = null;
        }
        if (!aerialGeo || !aerialGeo.length || params.get('aerialways') === '0')
          return;
        if (!cableMat) {
          cableMat = new THREE.LineBasicNodeMaterial({color: '#1c1e20'});
          pylonMat = new THREE.MeshStandardNodeMaterial({
            color: '#5c6166',
            roughness: 0.6,
            metalness: 0.4
          });
          cabinMat = new THREE.MeshStandardNodeMaterial({
            color: '#8a2020',
            roughness: 0.5
          });
          applyAerial(pylonMat);
          applyAerial(cabinMat);
        }
        aerialGroup = new THREE.Group();
        let placed = 0;
        for (const w of aerialGeo) {
          // Supports: project each pylon node onto the terrain.
          const sup = [];
          let ok = true;
          for (let i = 0; i < w.pts.length; i++) {
            const s = geoToScene(w.pts[i][0], w.pts[i][1], dressAnchor);
            if (Math.abs(s.x) > 140 || Math.abs(s.z) > 140) {
              ok = false;
              break;
            }
            const g = sample(s.x, s.z);
            const hM = i === 0 || i === w.pts.length - 1 ? STATION_M : PYLON_M;
            sup.push([s.x, g.y + hM / MPU, s.z]);
          }
          if (!ok || sup.length < 2) continue;
          // The cable: every span on its own catenary.
          const cablePts = [];
          for (let i = 0; i + 1 < sup.length; i++) {
            const span = catenaryPoints(sup[i], sup[i + 1], 10);
            for (let k = 0; k + 1 < span.length; k++)
              cablePts.push(...span[k], ...span[k + 1]);
          }
          const cg = new THREE.BufferGeometry();
          cg.setAttribute(
            'position',
            new THREE.BufferAttribute(new Float32Array(cablePts), 3)
          );
          aerialGroup.add(new THREE.LineSegments(cg, cableMat));
          // Pylons (interior supports) and the cabins.
          for (let i = 0; i < sup.length; i++) {
            const hM = i === 0 || i === sup.length - 1 ? STATION_M : PYLON_M;
            const p = new THREE.Mesh(pylonGeo, pylonMat);
            p.scale.y = hM / MPU;
            p.position.set(sup[i][0], sup[i][1] - hM / MPU / 2, sup[i][2]);
            aerialGroup.add(p);
          }
          let lineLen = 0;
          const cum = [0];
          for (let i = 0; i + 1 < sup.length; i++) {
            lineLen += Math.hypot(
              sup[i + 1][0] - sup[i][0],
              sup[i + 1][2] - sup[i][2]
            );
            cum.push(lineLen);
          }
          for (const f of cabinFractions(w, lineLen * MPU)) {
            const want = f * lineLen;
            let i = 0;
            while (i + 1 < cum.length - 1 && cum[i + 1] < want) i++;
            const t = (want - cum[i]) / Math.max(cum[i + 1] - cum[i], 1e-9);
            const span = catenaryPoints(sup[i], sup[i + 1], 10);
            const k = Math.min(9, Math.floor(t * 10));
            const q = span[k];
            const cab = new THREE.Mesh(cabinGeo, cabinMat);
            cab.position.set(q[0], q[1] - CABIN.arm / MPU, q[2]);
            aerialGroup.add(cab);
            // The frame loop swings each cabin as a pendulum in
            // the measured wind (aerialways.js, gated).
            aerialCabins.push({m: cab, hang: q, phase: f * Math.PI * 2});
          }
          placed++;
        }
        if (!placed) {
          aerialGroup = null;
          return;
        }
        ground.add(aerialGroup);
        record(
          'OSM aerialways placed',
          placed + ' of ' + aerialGeo.length + ' installations on this box'
        );
      }
      // Summit labels: the gated declutter selection, each label a
      // small canvas sprite ('Jungfrau · 4158 m') pinned just over
      // the RENDERED summit (the terrain the visitor actually
      // sees), constant size on screen. Annotations, not scenery -
      // they skip the aerial haze on purpose (a label that fades
      // like rock defeats its reason to exist).
      let peakGroup = null;
      function placePeaks() {
        if (peakGroup) {
          scene.remove(peakGroup);
          peakGroup.traverse((o) => {
            if (o.material && o.material.map) o.material.map.dispose();
            if (o.material) o.material.dispose();
          });
          peakGroup = null;
        }
        if (!peaksGeo || !peaksGeo.length || params.get('peaks') === '0')
          return;
        const inBox = [];
        for (const p of peaksGeo) {
          const s = geoToScene(p.lat, p.lon, dressAnchor);
          if (Math.abs(s.x) <= 138 && Math.abs(s.z) <= 138)
            inBox.push({...p, x: s.x, z: s.z});
        }
        const sel = selectPeaks(inBox, 12, 1800);
        if (!sel.length) return;
        peakGroup = new THREE.Group();
        for (const p of sel) {
          const text = labelText(p);
          const cv = document.createElement('canvas');
          const ctx = cv.getContext('2d');
          ctx.font = '28px system-ui, sans-serif';
          const w = Math.ceil(ctx.measureText(text).width) + 16;
          cv.width = w;
          cv.height = 40;
          const c2 = cv.getContext('2d');
          c2.font = '28px system-ui, sans-serif';
          c2.textBaseline = 'middle';
          c2.shadowColor = 'rgba(8,12,18,0.9)';
          c2.shadowBlur = 5;
          c2.fillStyle = 'rgba(238,242,246,0.92)';
          c2.fillText(text, 8, 21);
          const tex = new THREE.CanvasTexture(cv);
          tex.colorSpace = THREE.SRGBColorSpace;
          const mat = new THREE.SpriteNodeMaterial({
            map: tex,
            transparent: true,
            depthWrite: false
          });
          const spr = new THREE.Sprite(mat);
          // constant screen size: sizeAttenuation off, scaled to
          // the texture's aspect
          mat.sizeAttenuation = false;
          spr.scale.set(0.045 * (w / 40), 0.045, 1);
          spr.position.set(p.x, sample(p.x, p.z).y + 0.9, p.z);
          spr.renderOrder = 9;
          peakGroup.add(spr);
        }
        scene.add(peakGroup);
        record(
          'OSM peaks labelled',
          sel.length +
            ' of ' +
            inBox.length +
            ' summits on this box · highest ' +
            labelText(sel[0])
        );
      }
      function buildWorld(pre) {
        // Roam rebuilds repeatedly: free the previous terrain
        // geometry (trees share cached geometries/materials and
        // need no disposal; ground.clear() drops the references).
        if (terrainMesh) terrainMesh.geometry.dispose();
        ground.clear();
        trees = [];
        // Pin the dressing to the box being built: per-frame
        // sample() calls stay consistent with this mesh even while
        // the next re-anchor's fetch is in flight.
        dressAnchor = {lat: state.lat, lon: state.lon};
        // The lake wet mask rides the same pin: prepared off-thread
        // when the worker ran, rebuilt here otherwise.
        lakesMask =
          (pre && pre.lakes) ||
          (lakesGeo && demData
            ? lakeMask(lakesGeo, dressAnchor, WORLD, 192, (x, z) =>
                demElevOf(demData, x, z, WORLD)
              )
            : null);
        if (demData) {
          // Average the real elevation in a small ring around the scene
          // centre (grid-layout agnostic).
          let sum = 0;
          let cnt = 0;
          for (let dx = -12; dx <= 12; dx += 6)
            for (let dz = -12; dz <= 12; dz += 6) {
              sum += demElev(dx, dz);
              cnt++;
            }
          centerElev = Math.max(sum / cnt, 0.3);
        } else {
          centerElev = 300;
        }
        terrainUniforms.uCenterElev.value = centerElev;
        viewSign = state.lat < 0 ? -1 : 1;
        bakeTerrainMoments(pre && pre.levels);

        // The worker path hands back the vertex surface for the
        // very lattice it was given (pre.geo) - no ordering
        // assumptions; the sync path samples as always.
        let geo = pre && pre.geo;
        if (!geo) {
          geo = new THREE.PlaneGeometry(WORLD, WORLD, 320, 320);
          geo.rotateX(-Math.PI / 2);
        }
        const pos = geo.attributes.position;
        const wet = new Float32Array(pos.count);
        if (pre && pre.meshY) {
          for (let i = 0; i < pos.count; i++) {
            pos.setY(i, pre.meshY[i]);
            wet[i] = pre.meshWet[i];
          }
        } else {
          for (let i = 0; i < pos.count; i++) {
            const s = sample(pos.getX(i), pos.getZ(i));
            pos.setY(i, s.y);
            wet[i] = s.water ? 1 : 0;
          }
        }
        geo.computeVertexNormals();
        geo.setAttribute('wet', new THREE.BufferAttribute(wet, 1));
        const terrain = new THREE.Mesh(geo, terrainMat);
        terrain.castShadow = true;
        terrain.receiveShadow = true;
        terrain.layers.enable(3); // cloud depth prepass
        ground.add(terrain);
        terrainMesh = terrain;

        placeTrees();
        placeBuildings();
        placeRoads();
        placeRivers();
        placeRails();
        placeAerialways();
        placeTurbines();
        placePeaks();
        placeLanduse();

        // The sea: three.js Water (planar reflections) riding at real sea
        // level wherever the DEM says there is water. Roam rebuilds
        // per coastline, so the previous build's GPU residents (FFT
        // cascade textures, the signed-depth texture) are freed, not
        // just dropped.
        if (water) {
          ground.remove(water);
          water.geometry.dispose();
          water.material.dispose();
          water.userData.depthTex?.dispose();
          water = null;
        }
        if (oceanCascades) {
          for (const c of oceanCascades) c.dispose();
          oceanCascades = null;
        }
        let hasWater = false;
        for (let i = 0; i < wet.length; i++)
          if (wet[i]) {
            hasWater = true;
            break;
          }
        if (hasWater) {
          // Cox & Munk (1954): sun glitter shaped by the sea-surface
          // slope variance; Monahan whitecaps; Battjes-Janssen surf
          // breaking - all carried at source level in the
          // HorizonWaterMesh fork, against the REAL bathymetry sampled
          // from the terrarium tiles into a depth texture.
          // 512^2 float texels over the 16 km world = 31 m/texel -
          // the z12 terrarium source resolution itself (the surf
          // band is a few tens of metres; the old 128^2 8-bit
          // nearest-sampled texture could not resolve it at all,
          // and 0.157 m quantisation stepped the McCowan-era ramp).
          const DT = 512;
          let dArr;
          let dSum = 0;
          let dCnt = 0;
          if (pre && pre.depth) {
            dArr = pre.depth;
            dSum = pre.dSum;
            dCnt = pre.dCnt;
          } else {
            dArr = new Float32Array(DT * DT);
            for (let dj = 0; dj < DT; dj++)
              for (let di = 0; di < DT; di++) {
                const e = demData
                  ? demElev(
                      (di / (DT - 1) - 0.5) * WORLD,
                      (dj / (DT - 1) - 0.5) * WORLD
                    )
                  : 1;
                if (e < 0) {
                  dSum += -e;
                  dCnt++;
                }
                // SIGNED depth vs MSL (float texture): shoreline
                // texels keep their real height above the water, so
                // the measured tide can flood or expose them
                // exactly (water-tsl adds the tide before clamping
                // at the bed).
                dArr[dj * DT + di] = THREE.MathUtils.clamp(-e / 40, -1, 1);
              }
          }
          const depthTex = new THREE.DataTexture(
            dArr,
            DT,
            DT,
            THREE.RedFormat,
            THREE.FloatType
          );
          depthTex.minFilter = depthTex.magFilter = THREE.LinearFilter;
          depthTex.needsUpdate = true;
          // Tessendorf FFT ocean cascades (phase 5): JONSWAP/TMA at
          // the real wind, TMA depth from the mean of the real
          // bathymetry, k-space partitioned at lambda = 25 m so the
          // two patch scales never double-count energy. The spectrum
          // rebuilds in place when the wind moves materially (same
          // gating pattern as the aerosol LUTs).
          oceanSeaDepth = dCnt ? Math.max(dSum / dCnt, 5) : 60;
          oceanBuiltU = state.wind / 3.6;
          oceanBuiltDir = Math.atan2(windV.z, windV.x);
          // Measured sea-state partitions (marine model) take over
          // from the wind prediction when present.
          const seaNow = seaParts();
          oceanBuiltSeaKey = seaNow ? JSON.stringify(seaNow) : null;
          const OCEAN_SPLIT = (2 * Math.PI) / 25;
          oceanCascades = [
            createOceanFFT(renderer, {
              N: 256,
              L: 1000,
              U10: oceanBuiltU,
              F: 150e3,
              D: oceanSeaDepth,
              windDir: oceanBuiltDir,
              sea: seaNow ?? undefined,
              kMax: OCEAN_SPLIT,
              seed: 1337,
              lambda: 1.1
            }),
            createOceanFFT(renderer, {
              N: 256,
              L: 120,
              U10: oceanBuiltU,
              F: 150e3,
              D: oceanSeaDepth,
              windDir: oceanBuiltDir,
              sea: seaNow ?? undefined,
              kMin: OCEAN_SPLIT,
              seed: 7331,
              lambda: 1.1
            })
          ];
          water = new HorizonWaterMesh(
            new THREE.PlaneGeometry(WORLD, WORLD, 192, 192),
            {
              sunDirection: new THREE.Vector3(0, 1, 0),
              sunColor: 0xffffff,
              waterColor: 0x0a2431,
              distortionScale: 1.4,
              depthTex,
              worldSize: WORLD,
              resolutionScale: 0.5,
              ocean: {cascades: oceanCascades, metersPerUnit: MPU},
              // Deck shadows dim the DIRECT sun terms (glitter,
              // diffuse) - not the sky reflection - via the shared
              // Beer-Lambert transmittance.
              cloudShadow
            }
          );
          water.rotation.x = -Math.PI / 2;
          water.userData.depthTex = depthTex; // freed on the next rebuild
          water.position.y = 16 * Math.asinh((0 - centerElev) / 500) - 0.15;
          // Aerial perspective + AgX for the sea via the shared hook.
          applyAerial(water.material);
          ground.add(water);
          record(
            'Tessendorf FFT ocean',
            (oceanBuiltSeaKey
              ? 'measured marine partitions (wind sea + swell)'
              : 'JONSWAP/TMA wind sea') +
              ' · exact spectral normals · Jacobian whitecaps'
          );
        }

        camBaseY = sample(0, -26 * viewSign).y + 5;
        // New terrain invalidates the physics heightfield and any drifts.
        if (snowSim) {
          snowSim.rebuildTerrain();
          snowSim.clearDrifts();
        }
        worldBuilt = true;
      }
      buildWorld();

      // Camera yaw: equatorward by default (that is where the sun arc
      // lives), but pan poleward at night when a real aurora is on. The
      // first frame snaps; only live changes pan.
      let yaw = state.lat < 0 ? Math.PI : 0;
      let yawInit = false;
      // ?look=az,alt (degrees, compass azimuth): pin the default
      // camera's view direction - the harness aims at the feature
      // under test (a bow is antisolar, a halo circumsolar).
      const LOOK = params.has('look')
        ? params.get('look').split(',').map(Number)
        : null;

      // Stars: the real sky (Yale Bright Star Catalog), spun by sidereal
      // time around a pole tilted to the latitude.
      const celestial = new THREE.Group();
      const polar = new THREE.Group();
      polar.add(celestial);
      scene.add(polar);
      // Zodiacal light: the Leinert brightness map rides the SAME
      // celestial dome as the stars, so the cone stands along the
      // real ecliptic and the Gegenschein tracks the antisolar
      // point (zodiacal.js; the shader rotates object-space
      // directions into ecliptic coordinates).
      const zodiObj = createZodiacalMaterial();
      const zodiU = zodiObj.u;
      // The photometric base (zlPerGreen) baked by the factory; the
      // frame loop multiplies the live r^-2.3 onto it.
      const zodiBase = zodiU.uScale.value;
      const zodi = new THREE.Mesh(
        new THREE.SphereGeometry(880, 48, 24),
        zodiObj.material
      );
      celestial.add(zodi);
      // The Milky Way: Gaia DR3 integrated starlight - every one
      // of the catalogue's 1,811,709,771 sources aggregated
      // server-side at ESA into HEALPix cells, minus the bright
      // end drawn as individual stars (milkyway.js: Gorski
      // pixelisation, Riello G-V, S10 units). It rides the same
      // celestial dome AND the same zlPerGreen photometric base
      // as the zodiacal light, so the galaxy/zodiacal contrast
      // carries no free parameter - at a dark site the summer
      // Sagittarius band clearly outshines the cone, exactly as
      // in Leinert's tables.
      const mwObj = createMilkyWayMaterial();
      const mwU = mwObj.u;
      const mw = new THREE.Mesh(
        new THREE.SphereGeometry(875, 48, 24),
        mwObj.material
      );
      celestial.add(mw);
      record(
        'Gaia DR3 integrated starlight',
        '1,811,709,771 sources · HEALPix-5 · Riello G-V · S10 on the zodiacal base'
      );
      // Noctilucent clouds: the 83-km mesospheric shell, lit only
      // where it still sees the sun while the ground stands in
      // twilight (nlc.js - the published 6-16 deg window EMERGES
      // from the shadow-cylinder geometry; the season/latitude
      // envelope follows the DeLand/Fiedler climatology). A
      // high-latitude summer visitor gets the silvery billows
      // along the poleward twilight horizon; everyone else,
      // honestly, gets nothing. ?nlc=1 forces the envelope for
      // harness shots (geometry stays exact).
      const nlcObj = createNLCMaterial();
      const nlcU = nlcObj.u;
      const nlcShell = new THREE.Mesh(
        new THREE.SphereGeometry(930, 48, 24),
        nlcObj.material
      );
      nlcShell.visible = false;
      scene.add(nlcShell);
      // Meteor streaks: a small pool of quads on the star sphere,
      // spawned as a Poisson process at the REAL observed rate
      // (meteors.js: IMO 2026 working list rates through the
      // Jenniskens 1994 activity profiles and the sin(h_R) zenith
      // correction). A Perseid-maximum sky yields a meteor every
      // ~40 s with the radiant high - real rates, not fireworks.
      const METEOR_N = 5;
      const meteorPool = [];
      for (let i = 0; i < METEOR_N; i++) {
        const mo = createMeteorMaterial();
        const mesh = new THREE.Mesh(new THREE.PlaneGeometry(1, 1), mo.material);
        mesh.matrixAutoUpdate = false;
        mesh.visible = false;
        celestial.add(mesh);
        meteorPool.push({mesh, u: mo.u, active: false, t: 0, dur: 1});
      }
      let meteorsRecorded = false;
      window.__meteors = meteorPool; // harness introspection

      // Contrails: ambient cruise traffic whose trails exist ONLY
      // when the measured 250 hPa air passes Schmidt-Appleman
      // (state.contrail, syncAloft), and linger only when it is
      // ice-supersaturated. ?contrail=1 forces short-lived, =2
      // persistent (offline harness).
      const CONTRAIL_N = 3;
      const contrailPool = [];
      for (let i = 0; i < CONTRAIL_N; i++) {
        const co = createContrailMaterial();
        const mesh = new THREE.Mesh(new THREE.PlaneGeometry(1, 1), co.material);
        mesh.matrixAutoUpdate = false;
        mesh.visible = false;
        scene.add(mesh);
        contrailPool.push({mesh, u: co.u, active: false, t: 0, life: 1});
      }
      const CT_LEN = 260; // path length, scene units
      const CT_SPEED = 230 / MPU; // jet ground speed, units/s
      // live = an ADS-B snapshot from adsbToScene (real position,
      // altitude, velocity); absent = ambient traffic.
      function spawnContrail(p, persists, live) {
        let dx, dz, cx, cz, y, speed;
        if (live) {
          const sp = Math.hypot(live.vx, live.vz);
          dx = live.vx / sp;
          dz = live.vz / sp;
          // Quad runs from the aircraft's current position forward
          // along its real track at its real ground speed.
          cx = live.x + dx * (CT_LEN / 2);
          cz = live.z + dz * (CT_LEN / 2);
          y = live.y;
          speed = sp;
        } else {
          const th = Math.random() * Math.PI * 2;
          dx = Math.cos(th);
          dz = Math.sin(th);
          const off = (Math.random() - 0.5) * 150;
          cx = -dz * off;
          cz = dx * off;
          y = 16 * Math.asinh((10500 - centerElev) / 500);
          speed = CT_SPEED;
        }
        const cross = CT_LEN / speed;
        p.u.cross.value = cross;
        p.u.head.value = 0;
        p.u.tau.value = persists ? 240 : 25;
        p.u.spread.value = persists ? 1 : 0.15;
        p.t = 0;
        // Alive until the aircraft crosses AND the tail e-folds out.
        p.life = cross + (persists ? 480 : 100);
        p.active = true;
        p.flight = live ? live.flight : null;
        const X = new THREE.Vector3(dx, 0, dz).multiplyScalar(CT_LEN);
        const Y = new THREE.Vector3(-dz, 0, dx).multiplyScalar(6);
        const Z = new THREE.Vector3(0, 1, 0);
        p.mesh.matrix.makeBasis(X, Y, Z);
        p.mesh.matrix.setPosition(cx, y, cz);
        p.mesh.visible = true;
      }

      // Live aircraft: the horizon-live daemon (themes/horizon/
      // server, on the owner's dedicated-IP box) proxies the
      // readsb feeds no browser can reach - measured from its own
      // IP: adsb.lol answers first, the rich feed Cloudflare
      // egress never got. Cruise traffic claims contrail slots
      // with its REAL position, altitude, track and speed;
      // Schmidt-Appleman still decides whether the trail exists.
      // Unreachable daemon (offline harness): the ambient traffic
      // above stands in. ?adsb=URL overrides (the harness points
      // it at fixture vectors).
      const ADSB_PROXY = params.get('adsb') ?? 'https://api.ndev.tk/adsb';
      let liveTraffic = null; // queue of unclaimed cruise snapshots
      const seenFlights = new Map(); // hex -> last spawn ms
      async function syncTraffic() {
        if (!state.contrail?.forms && !params.has('contrail')) return;
        try {
          const r = await (
            await fetch(
              ADSB_PROXY +
                '?lat=' +
                state.lat.toFixed(3) +
                '&lon=' +
                state.lon.toFixed(3) +
                '&dist=15',
              {credentials: 'omit'}
            )
          ).json();
          if (!Array.isArray(r.ac)) return;
          applyTraffic(r.ac);
        } catch {
          liveTraffic = null; // ambient traffic stands in
        }
      }
      // Apply one aircraft list (from the 60 s poll OR a pushed
      // `adsb` stream event - both carry the same schema).
      function applyTraffic(acList) {
        const ref = {
          lat: state.lat,
          lon: state.lon,
          halfM: DEM_HALF_M,
          world: WORLD,
          centerElev,
          mpu: MPU
        };
        const now_ = Date.now();
        for (const [hex, t] of seenFlights)
          if (now_ - t > 600e3) seenFlights.delete(hex);
        liveTraffic = [];
        const names = [];
        for (const ac of acList) {
          if (
            typeof ac.lat !== 'number' ||
            typeof ac.lon !== 'number' ||
            typeof ac.gs !== 'number' ||
            typeof ac.track !== 'number' ||
            typeof ac.alt_baro !== 'number'
          )
            continue;
          const s = adsbToScene(ac, ref);
          if (Math.abs(s.x) > 220 || Math.abs(s.z) > 220) continue;
          s.flight = (ac.flight ?? ac.hex ?? '').trim();
          s.hex = ac.hex;
          // EVERY real aircraft (any altitude) carries its FAR
          // exterior lights after sunset - approach and departure
          // traffic low overhead is the brightest of all
          updateAirLight(ac.hex, s, ac.track, now_);
          if (ac.alt_baro < 26000 || seenFlights.has(ac.hex)) continue;
          // cruise only (~8 km up) claims contrail slots
          liveTraffic.push(s);
          names.push(s.flight + ' FL' + Math.round(ac.alt_baro / 100));
        }
        if (names.length)
          record(
            'ADS-B live aircraft (daemon)',
            names.slice(0, 4).join(' · ') +
              (names.length > 4 ? ' +' + (names.length - 4) : '')
          );
      }

      // ---- Aircraft exterior lights (navlights.js): after
      // sunset every live aircraft carries what 14 CFR Part 25
      // certifies - red/green forward position lights (110 deg
      // arcs, the 25.1391 intensity table: 40/30/5 cd by angle
      // off the nose), the white 140-deg tail light (20 cd), and
      // 25.1401 anti-collision strobes (400 cd effective, 40-100
      // flashes/min, phase spread by ICAO hex so the sky never
      // blinks in unison). Brightness through the SAME Allard law
      // as the ships at the true SLANT range - a jet ten
      // kilometres up is ten kilometres away even overhead, and a
      // 40 cd position light really does vanish beyond ~4.6 nm.
      // ?plane=N spawns deterministic synthetic aircraft for the
      // offline harness.
      const AIRLIGHT_N = 8;
      const airLights = [];
      {
        const dotGeo = new THREE.SphereGeometry(0.07, 8, 6);
        const strobeGeo = new THREE.SphereGeometry(0.11, 8, 6);
        const AIR_COLOR = {
          red: '#ff2418',
          green: '#19e34d',
          tail: '#ffffff',
          strobe: '#f4f7ff'
        };
        for (let i = 0; i < AIRLIGHT_N; i++) {
          const g = new THREE.Group(); // nose points local -z
          const lights = {};
          for (const [k, px, py, pz, geo] of [
            ['red', -0.31, 0, -0.05, dotGeo], // left wingtip
            ['green', 0.31, 0, -0.05, dotGeo], // right wingtip
            ['tail', 0, 0.05, 0.35, dotGeo],
            ['strobe', 0, 0.02, 0, strobeGeo]
          ]) {
            const m = new THREE.MeshBasicNodeMaterial({color: AIR_COLOR[k]});
            aerial.applyTone(m);
            const dot = new THREE.Mesh(geo, m);
            dot.position.set(px, py, pz);
            dot.visible = false;
            dot.userData.base = AIR_COLOR[k];
            lights[k] = dot;
            g.add(dot);
          }
          g.visible = false;
          scene.add(g);
          airLights.push({
            g,
            lights,
            hex: null,
            x: 0,
            z: 0,
            y: 0,
            vx: 0,
            vz: 0,
            track: 0,
            altM: 0,
            seen: 0,
            active: false
          });
        }
        record(
          '14 CFR 25 aircraft lights',
          '25.1385 arcs · 25.1391 candela · 25.1401 strobes · Allard slant range'
        );
      }
      function updateAirLight(hex, s, track, now_) {
        const slot =
          airLights.find((a) => a.active && a.hex === hex) ??
          airLights.find((a) => !a.active);
        if (!slot) return;
        Object.assign(slot, {
          hex,
          x: s.x,
          z: s.z,
          y: s.y,
          vx: s.vx,
          vz: s.vz,
          track,
          altM: s.altM,
          seen: now_,
          active: true
        });
      }
      const planeOv = params.has('plane') ? +params.get('plane') : null;
      if (planeOv !== null) {
        // Offline harness: deterministic crossings at mixed
        // altitudes (an approach at 900 m, cruise above), fixed
        // table, refreshed so they never expire.
        const seed = () => {
          camera.getWorldDirection(mFlashDir);
          mFlashDir.y = 0;
          mFlashDir.normalize();
          const px = -mFlashDir.z;
          const pz = mFlashDir.x;
          for (let i = 0; i < Math.min(planeOv, AIRLIGHT_N); i++) {
            const ahead = 60 + i * 25;
            const side = (i - 1) * 30;
            const altM = i === 0 ? 900 : 3000 + i * 1500;
            updateAirLight(
              'aa' + i,
              {
                x: camera.position.x + mFlashDir.x * ahead + px * side,
                z: camera.position.z + mFlashDir.z * ahead + pz * side,
                y: 16 * Math.asinh((altM - centerElev) / 500),
                vx: ((i % 2 ? -1 : 1) * (140 * 0.514444)) / MPU,
                vz: 0,
                altM
              },
              i % 2 ? 270 : 90,
              Date.now()
            );
          }
        };
        setInterval(seed, 3000);
        setTimeout(seed, 500);
      }

      // ---- Live ships: AIS via the same daemon (/ais route).
      // horizon-live holds ONE persistent global aisstream.io
      // subscription (the API key lives only on the box -
      // aisstream's terms forbid exposing it to a browser) and
      // answers from its in-RAM picture: ~23k vessels resident
      // when first deployed. Ships dead-reckon on the tide-following water
      // plane between reports and carry COLREGS navigation lights
      // after sunset (ships.js: Rule 21 arcs, Rule 22 ranges,
      // Annex I candela through Allard's law - beyond a light's
      // rated range the eye receives less than the adopted 2e-7
      // lux threshold and the light goes out, exactly as the
      // regulation is constructed). The hulls are MEASURED too:
      // the daemon merges AIS message 5 (real length/beam from
      // the A/B/C/D antenna offsets, M.1371 type, draught), the
      // silhouette follows the type class and the light plan
      // follows the dimensions (Rule 23's second masthead at
      // >= 50 m, Rule 25(b)'s no-masthead sailing rig, Annex I
      // heights - ships.js, gated). ?ais=URL overrides the proxy;
      // ?ship=N spawns N deterministic vessels (one per class)
      // for the offline harness.
      const AIS_PROXY = params.get('ais') ?? 'https://api.ndev.tk/ais';
      const SHIP_N = 8;
      const NAV_COLOR = {
        masthead: '#ffffff',
        stern: '#ffffff',
        port: '#ff2418',
        starboard: '#19e34d'
      };
      const shipPool = [];
      const shipMats = {};
      const dotGeo = new THREE.SphereGeometry(0.085, 8, 6);
      {
        // The palette the asset viewer was tuned with
        // (harness/asset-viewer.html) - same values, aerial-hooked.
        const mk = (color, rough = 0.85) => {
          const m = new THREE.MeshStandardNodeMaterial({
            color,
            roughness: rough
          });
          applyAerial(m);
          return m;
        };
        shipMats.hullA = mk('#3a444d');
        shipMats.hullB = mk('#6e3a2c'); // oxide red, the other paint
        shipMats.sup = mk('#8a949e');
        shipMats.white = mk('#dfe3e7', 0.7);
        shipMats.deck = mk('#4b5157');
        shipMats.funnel = mk('#c8402f');
        shipMats.sail = mk('#f2efe6');
        shipMats.sail.side = THREE.DoubleSide;
        shipMats.boxes = [
          '#a4553d',
          '#3f7392',
          '#7b9245',
          '#b09a3e',
          '#6a5488',
          '#8a8f96'
        ].map((c) => mk(c));
      }
      // Build one vessel from its MEASURED identity: AIS message 5
      // length/beam scale the hull exactly, the M.1371 type picks
      // the silhouette, and the COLREGS light plan (ships.js,
      // gated) places the lights - two mastheads on >= 50 m power
      // vessels (Rule 23), none on sailing vessels (Rule 25(b)),
      // Annex I heights/separations from the real dimensions.
      // Without a static report yet: a 90 x 14 m 'other'.
      function buildShip(slot, lenM, beamM, cls) {
        const key = cls + '/' + lenM + '/' + beamM + '/' + (slot.mmsi % 2);
        if (slot.dims === key) return;
        slot.dims = key;
        for (const c of [...slot.g.children]) {
          slot.g.remove(c);
          if (c.geometry && c.geometry !== dotGeo) c.geometry.dispose();
          if (c.userData.dotMat) c.material.dispose();
        }
        const U = 1 / MPU; // metres -> scene units
        const L = lenM * U;
        const B = Math.max(beamM, 3) * U;
        const hM = (m) => m * U;
        // The geometry lives ONCE in vessels.js - a real plan-form
        // hull (flared bow, elliptical transom) and class-specific
        // arrangement, designed against screenshots in the asset
        // viewer (harness/asset-viewer.html) and shipped
        // identically here.
        const {deckY} = buildVessel(
          slot.g,
          lenM,
          beamM,
          cls,
          shipMats,
          slot.mmsi | 0,
          U
        );
        // COLREGS lights from the measured plan (metres -> units).
        const plan = lightPlan(lenM, beamM, cls);
        slot.lightList = [];
        const addDot = (arc, range, x, y, z) => {
          const mat = new THREE.MeshBasicNodeMaterial({color: NAV_COLOR[arc]});
          aerial.applyTone(mat);
          const dot = new THREE.Mesh(dotGeo, mat);
          dot.userData.dotMat = true;
          dot.position.set(x, y, z);
          dot.visible = false;
          slot.g.add(dot);
          slot.lightList.push({arc, range, dot});
        };
        for (const mh of plan.mastheads)
          addDot(
            'masthead',
            plan.ranges.masthead,
            0,
            deckY + hM(mh.y),
            hM(mh.z)
          );
        addDot(
          'port',
          plan.ranges.side,
          -B / 2,
          deckY + hM(plan.sideY),
          -L * 0.1
        );
        addDot(
          'starboard',
          plan.ranges.side,
          B / 2,
          deckY + hM(plan.sideY),
          -L * 0.1
        );
        addDot(
          'stern',
          plan.ranges.stern,
          0,
          deckY + hM(plan.sternY),
          L * 0.49
        );
      }
      {
        for (let i = 0; i < SHIP_N; i++) {
          const g = new THREE.Group(); // bow points local -z
          g.visible = false;
          scene.add(g);
          shipPool.push({
            g,
            lightList: [],
            dims: '',
            mmsi: null,
            name: '',
            x: 0,
            z: 0,
            vx: 0,
            vz: 0,
            hdg: 0,
            seen: 0,
            active: false
          });
        }
        record(
          'COLREGS navigation lights',
          'Rule 21 arcs · Rule 23/25 by measured length · Annex I heights · Allard visibility'
        );
        record(
          'Measured vessels',
          'AIS message 5 · real length/beam hulls · M.1371 type silhouettes'
        );
      }
      const shipOv = params.has('ship') ? +params.get('ship') : null;
      const shipCamDir = new THREE.Vector3();
      async function syncShips() {
        if (shipOv !== null) {
          // Offline harness: deterministic stations fanned across
          // the camera's view (no fetch, no Math.random - pinned
          // shots stay reproducible).
          camera.getWorldDirection(shipCamDir);
          shipCamDir.y = 0;
          shipCamDir.normalize();
          const px = -shipCamDir.z;
          const pz = shipCamDir.x;
          // One of each silhouette class, measured-sized: the
          // harness fleet exercises every hull the types produce.
          const FLEET = [
            [70, 240, 32], // cargo
            [80, 180, 28], // tanker
            [60, 140, 22], // passenger
            [30, 24, 7], // fishing
            [36, 14, 4], // sailing
            [52, 30, 10], // tug
            [0, 90, 14], // unknown -> other
            [71, 160, 24] // cargo again, odd mmsi paint
          ];
          for (let i = 0; i < Math.min(shipOv, SHIP_N); i++) {
            const s = shipPool[i];
            const ahead = 55 + i * 20;
            const side = (i - (Math.min(shipOv, SHIP_N) - 1) / 2) * 26;
            Object.assign(s, {
              mmsi: 1000000 + i,
              name: 'HARNESS' + i,
              x: camera.position.x + shipCamDir.x * ahead + px * side,
              z: camera.position.z + shipCamDir.z * ahead + pz * side,
              hdg: (30 + i * 47) % 360,
              seen: Date.now(),
              active: true
            });
            const [ft, fl, fb] = FLEET[i % FLEET.length];
            buildShip(s, fl, fb, typeClass(ft));
            const tr = s.hdg * RAD;
            const sp = (12 * 0.514444) / MPU; // 12 kt
            s.vx = sp * Math.sin(tr);
            s.vz = -sp * Math.cos(tr);
          }
          return;
        }
        if (!water && !lakesMask) return; // no sea, no lakes - no ships
        try {
          const r = await (
            await fetch(
              AIS_PROXY +
                '?lat=' +
                state.lat.toFixed(3) +
                '&lon=' +
                state.lon.toFixed(3) +
                '&dist=8',
              {credentials: 'omit'}
            )
          ).json();
          if (!Array.isArray(r.ships)) return;
          applyShips(r.ships);
