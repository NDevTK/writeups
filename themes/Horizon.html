<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Horizon</title>
    <!--
      A 3D landscape where everything shown is real state:
      - the terrain is your terrain: real elevations around the visitor's
        location (AWS terrarium elevation tiles at ~30-90m resolution,
        falling back to the open-meteo elevation API), with sea rendered
        where the sea actually is
      - a physically-based scattering sky (Preetham model via the three.js
        Sky addon) lit by the sun's true computed position
      - the actual night sky (Yale Bright Star Catalog: 1630 stars with
        real positions, magnitudes and colour temperatures) rotated for
        the latitude and the current sidereal time; the moon shows its
        real phase because it is lit from the sun's real direction
      - live weather (open-meteo + geojs, both keyless): cloud cover,
        rain, snow, fog, wind-driven sway; fresh snow whitens the ground
        only when it is actually freezing where you are
      - the sea follows oceanography: Pierson-Moskowitz wave height and
        period from the real wind, deep-water dispersion, whitecap
        fraction from Monahan & O'Muircheartaigh, fresnel sun glitter
      - clouds ride the true wind vector at the real lifting condensation
        level; trees are spring-dampers forced by real mean wind and gusts
      - USGS M4.5+ earthquakes arrive at their true seismic travel times
        (P then S), attenuated by real distance
      - aurora follows NOAA's OVATION forecast oval: its real latitude
        sets the curtain's elevation in the sky (Kp heuristic fallback)
      - the ISS crosses the sky via SGP4-propagated live elements, drawn
        only during genuinely visible passes
      - when it snows, flakes are rigid bodies in a real physics engine
        (vendored Rapier): air drag, real wind force, collision with a
        heightfield of the local terrain and with settled flakes, so
        drifts accumulate while the page is open and melt when the real
        temperature rises
      - sky turbidity and haze come from measured air quality (open-meteo
        AOD and PM2.5); trees stand inside the real OSM forest polygons
        around you; the sea is a reflecting three.js Water plane whose
        wave energy follows the real sea state; constellation figures
        (d3-celestial data) ride the same sidereal dome as the stars
      - a data panel (the ✦ wallpaper control, ?debug=1, or the D key)
        lists every live source with its last real value

      Standalone debug overrides (query params, e.g. Horizon.html?time=...):
        lat, lon, time (ISO), cloud (0-100), wind (km/h), winddir (deg),
        gust (km/h), precip (mm), snow (cm), temp (C), dew (C), aod,
        pm25, code (WMO weather code), quake (magnitude), kp (0-9),
        aurora (0-1), auroralat (deg), dem=0 (skip real terrain), debug=1
    -->
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #0a0e1d;
      }
      #gl {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        display: block;
      }
      #caption {
        position: fixed;
        left: 14px;
        bottom: 12px;
        color: rgba(255, 255, 255, 0.75);
        font:
          12px/1.5 ui-sans-serif,
          system-ui,
          sans-serif;
        text-shadow: 0 1px 6px rgba(0, 0, 0, 0.7);
        transition: opacity 1.2s ease;
      }
      #panel {
        position: fixed;
        right: 14px;
        bottom: 14px;
        max-width: 380px;
        max-height: 80vh;
        overflow-y: auto;
        padding: 12px 14px;
        border-radius: 10px;
        background: rgba(10, 14, 24, 0.82);
        backdrop-filter: blur(6px);
        color: rgba(230, 237, 243, 0.92);
        font:
          11px/1.6 ui-monospace,
          'Cascadia Mono',
          Consolas,
          monospace;
        white-space: pre-wrap;
      }
      #panel b {
        color: #7ee2a8;
      }
      #panel .age {
        color: rgba(230, 237, 243, 0.45);
      }
    </style>
    <script type="importmap">
      {"imports": {"three": "./horizon/three.module.min.js"}}
    </script>
  </head>
  <body>
    <canvas id="gl"></canvas>
    <div id="caption"></div>
    <div id="panel" hidden></div>
    <script src="./horizon/satellite.min.js"></script>
    <script type="module">
      import * as THREE from 'three';
      import {Sky} from './horizon/Sky.js';
      import {Water} from './horizon/Water.js';

      const params = new URL(location.href).searchParams;
      const reduceMotion = matchMedia(
        '(prefers-reduced-motion: reduce)'
      ).matches;
      const timeScale = reduceMotion ? 0.25 : 1;

      // ---------- real time (with optional ?time= override) ----------
      const t0 = performance.now();
      const timeBase = params.has('time')
        ? new Date(params.get('time')).getTime()
        : 0;
      const now = () =>
        timeBase ? new Date(timeBase + (performance.now() - t0)) : new Date();

      // ---------- astronomy (NOAA/Almanac low-precision, ~0.1 deg) ----------
      const RAD = Math.PI / 180;
      const days2000 = (d) => d.getTime() / 86400000 - 10957.5;

      function sunEquatorial(d) {
        const n = days2000(d);
        const L = (280.46 + 0.9856474 * n) % 360;
        const g = (357.528 + 0.9856003 * n) * RAD;
        const lambda = (L + 1.915 * Math.sin(g) + 0.02 * Math.sin(2 * g)) * RAD;
        const eps = 23.439 * RAD;
        return {
          ra: Math.atan2(Math.cos(eps) * Math.sin(lambda), Math.cos(lambda)),
          dec: Math.asin(Math.sin(eps) * Math.sin(lambda))
        };
      }

      function moonEquatorial(d) {
        const n = days2000(d);
        const L = (218.316 + 13.176396 * n) * RAD;
        const M = (134.963 + 13.064993 * n) * RAD;
        const F = (93.272 + 13.22935 * n) * RAD;
        const lambda = L + 6.289 * RAD * Math.sin(M);
        const beta = 5.128 * RAD * Math.sin(F);
        const eps = 23.439 * RAD;
        return {
          ra: Math.atan2(
            Math.sin(lambda) * Math.cos(eps) - Math.tan(beta) * Math.sin(eps),
            Math.cos(lambda)
          ),
          dec: Math.asin(
            Math.sin(beta) * Math.cos(eps) +
              Math.cos(beta) * Math.sin(eps) * Math.sin(lambda)
          )
        };
      }

      // Greenwich mean sidereal time, radians.
      const gmst = (d) =>
        ((18.697374558 + 24.06570982441908 * days2000(d)) % 24) * 15 * RAD;

      // Equatorial -> local horizontal (altitude/azimuth from north, cw).
      function altAz(eq, d, lat, lon) {
        const lst = gmst(d) + lon * RAD;
        const H = lst - eq.ra;
        const phi = lat * RAD;
        const alt = Math.asin(
          Math.sin(phi) * Math.sin(eq.dec) +
            Math.cos(phi) * Math.cos(eq.dec) * Math.cos(H)
        );
        const az = Math.atan2(
          Math.sin(H),
          Math.cos(H) * Math.sin(phi) - Math.tan(eq.dec) * Math.cos(phi)
        );
        return {alt, az: az + Math.PI}; // 0 = north, clockwise via east
      }

      // Alt/az onto the sky dome. East = +x, north = -z, up = +y.
      const skyPoint = (alt, az, r) =>
        new THREE.Vector3(
          r * Math.cos(alt) * Math.sin(az),
          r * Math.sin(alt),
          -r * Math.cos(alt) * Math.cos(az)
        );

      const haversineKm = (lat1, lon1, lat2, lon2) => {
        const a =
          Math.sin(((lat2 - lat1) * RAD) / 2) ** 2 +
          Math.cos(lat1 * RAD) *
            Math.cos(lat2 * RAD) *
            Math.sin(((lon2 - lon1) * RAD) / 2) ** 2;
        return 12742 * Math.asin(Math.sqrt(a));
      };

      // ---------- state from the real world ----------
      const state = {
        lat: params.has('lat') ? +params.get('lat') : 51.48,
        lon: params.has('lon') ? +params.get('lon') : 0,
        place: '',
        cloud: params.has('cloud') ? +params.get('cloud') : 20,
        wind: params.has('wind') ? +params.get('wind') : 8,
        precip: params.has('precip') ? +params.get('precip') : 0,
        snow: params.has('snow') ? +params.get('snow') : 0,
        temp: params.has('temp') ? +params.get('temp') : 14,
        winddir: params.has('winddir') ? +params.get('winddir') : 250,
        gust: params.has('gust') ? +params.get('gust') : 12,
        dew: params.has('dew') ? +params.get('dew') : 8,
        aod: params.has('aod') ? +params.get('aod') : 0.12,
        pm25: params.has('pm25') ? +params.get('pm25') : 6,
        code: params.has('code') ? +params.get('code') : 1,
        kp: params.has('kp') ? +params.get('kp') : 0,
        auroraP: null, // OVATION oval probability 0..1, null = use Kp
        auroraLat: 68,
        shake: 0
      };
      const overridden = [
        'lat',
        'lon',
        'cloud',
        'wind',
        'precip',
        'snow',
        'temp',
        'winddir',
        'gust',
        'dew',
        'code'
      ].some((k) => params.has(k));

      const caption = document.getElementById('caption');
      let captionTimer = 0;
      function say(text, sticky) {
        caption.textContent = text;
        caption.style.opacity = 1;
        clearTimeout(captionTimer);
        if (!sticky)
          captionTimer = setTimeout(() => (caption.style.opacity = 0), 12000);
      }

      // Every live data source records what it last delivered, so the
      // panel (the site's ✦ wallpaper toggle, or ?debug=1, or the D key)
      // can prove nothing here is invented.
      const sources = {};
      function record(name, value) {
        sources[name] = {value: String(value), at: Date.now()};
      }

      const WMO = {
        0: 'clear',
        1: 'mostly clear',
        2: 'partly cloudy',
        3: 'overcast',
        45: 'fog',
        48: 'rime fog',
        51: 'drizzle',
        53: 'drizzle',
        55: 'drizzle',
        61: 'light rain',
        63: 'rain',
        65: 'heavy rain',
        71: 'light snow',
        73: 'snow',
        75: 'heavy snow',
        77: 'snow grains',
        80: 'showers',
        81: 'showers',
        82: 'heavy showers',
        85: 'snow showers',
        86: 'snow showers',
        95: 'thunderstorm',
        96: 'thunderstorm',
        99: 'thunderstorm'
      };

      async function syncWeather() {
        if (overridden) return;
        try {
          const geo = await (
            await fetch('https://get.geojs.io/v1/ip/geo.json', {
              credentials: 'omit'
            })
          ).json();
          state.lat = +geo.latitude;
          state.lon = +geo.longitude;
          state.place = geo.city || geo.country || '';
          record(
            'geojs.io IP location',
            state.lat.toFixed(2) +
              ', ' +
              state.lon.toFixed(2) +
              ' · ' +
              state.place
          );
        } catch {
          // Keep the Greenwich fallback.
        }
        try {
          const w = await (
            await fetch(
              'https://api.open-meteo.com/v1/forecast?latitude=' +
                state.lat +
                '&longitude=' +
                state.lon +
                '&current=weather_code,cloud_cover,precipitation,snowfall,wind_speed_10m,wind_direction_10m,wind_gusts_10m,temperature_2m,dew_point_2m',
              {credentials: 'omit'}
            )
          ).json();
          const c = w.current;
          state.code = c.weather_code;
          state.cloud = c.cloud_cover;
          state.precip = c.precipitation;
          state.snow = c.snowfall;
          state.wind = c.wind_speed_10m;
          state.winddir = c.wind_direction_10m;
          state.gust = c.wind_gusts_10m;
          state.temp = c.temperature_2m;
          state.dew = c.dew_point_2m;
          record(
            'open-meteo current',
            (WMO[state.code] || state.code) +
              ' · ' +
              state.temp +
              '°C · wind ' +
              state.wind +
              ' km/h from ' +
              state.winddir +
              '° gust ' +
              state.gust +
              ' · cloud ' +
              state.cloud +
              '% · dew ' +
              state.dew +
              '°C'
          );
          say(
            (state.place ? state.place + ' · ' : '') +
              (WMO[state.code] || 'weather code ' + state.code) +
              ' · this scene mirrors your sky and terrain'
          );
        } catch {
          say('weather unavailable · showing a calm day');
        }
      }

      // Real aerosols: the scattering sky's turbidity and the haze come
      // from measured air quality, not guesses.
      async function syncAir() {
        if (params.has('aod') || params.has('pm25')) return;
        try {
          const a = await (
            await fetch(
              'https://air-quality-api.open-meteo.com/v1/air-quality?latitude=' +
                state.lat +
                '&longitude=' +
                state.lon +
                '&current=aerosol_optical_depth,pm2_5',
              {credentials: 'omit'}
            )
          ).json();
          state.aod = a.current.aerosol_optical_depth ?? state.aod;
          state.pm25 = a.current.pm2_5 ?? state.pm25;
          record(
            'open-meteo air quality',
            'AOD ' + state.aod + ' · PM2.5 ' + state.pm25 + ' µg/m³'
          );
        } catch {
          // Keep the temperate defaults.
        }
      }

      // Real forests: OSM wood/forest polygons around the visitor decide
      // where trees stand (scene-space polygons, cached per location).
      let forestPolys = null;
      async function syncForests() {
        const key =
          'horizon-forest-' + state.lat.toFixed(2) + ',' + state.lon.toFixed(2);
        try {
          const hit = localStorage.getItem(key);
          if (hit) {
            forestPolys = JSON.parse(hit);
            record(
              'OSM Overpass forests (cached)',
              forestPolys.length + ' wood polygons'
            );
            buildWorld();
            return;
          }
        } catch {}
        try {
          const mLat = 111320;
          const mLon = Math.max(111320 * Math.cos(state.lat * RAD), 1e-6);
          const dLat = DEM_HALF_M / mLat;
          const dLon = DEM_HALF_M / mLon;
          const bbox =
            (state.lat - dLat).toFixed(4) +
            ',' +
            (state.lon - dLon).toFixed(4) +
            ',' +
            (state.lat + dLat).toFixed(4) +
            ',' +
            (state.lon + dLon).toFixed(4);
          const q =
            '[out:json][timeout:25];(way[natural=wood](' +
            bbox +
            ');way[landuse=forest](' +
            bbox +
            '););out geom 120;';
          // The mail.ru mirror is faster (Surveillance.html uses it too);
          // the main overpass-api.de instance is the fallback.
          let osm = null;
          for (const host of [
            'https://maps.mail.ru/osm/tools/overpass/api/interpreter',
            'https://overpass-api.de/api/interpreter'
          ]) {
            try {
              const r = await fetch(host + '?data=' + encodeURIComponent(q), {
                credentials: 'omit'
              });
              if (!r.ok) throw new Error(r.status);
              osm = await r.json();
              break;
            } catch {
              // Try the next mirror.
            }
          }
          if (!osm) throw new Error('overpass unavailable');
          forestPolys = osm.elements
            .filter((w) => w.geometry && w.geometry.length > 3)
            .map((w) =>
              w.geometry.map((g) => [
                +(((g.lon - state.lon) / (2 * dLon)) * WORLD).toFixed(1),
                +((-(g.lat - state.lat) / (2 * dLat)) * WORLD).toFixed(1)
              ])
            );
          record('OSM Overpass forests', forestPolys.length + ' wood polygons');
          try {
            localStorage.setItem(key, JSON.stringify(forestPolys));
          } catch {}
          buildWorld(); // replant where the real woods are
        } catch {
          forestPolys = null; // procedural scatter stays
        }
      }

      function inForest(x, z) {
        if (!forestPolys || !forestPolys.length) return true;
        for (const poly of forestPolys) {
          let inside = false;
          for (let i = 0, j = poly.length - 1; i < poly.length; j = i++) {
            const xi = poly[i][0];
            const zi = poly[i][1];
            const xj = poly[j][0];
            const zj = poly[j][1];
            if (
              zi > z !== zj > z &&
              x < ((xj - xi) * (z - zi)) / (zj - zi) + xi
            )
              inside = !inside;
          }
          if (inside) return true;
        }
        return false;
      }

      async function syncKp() {
        if (params.has('kp')) return;
        try {
          const rows = await (
            await fetch(
              'https://services.swpc.noaa.gov/json/planetary_k_index_1m.json',
              {credentials: 'omit'}
            )
          ).json();
          state.kp = +rows[rows.length - 1].estimated_kp || 0;
          record('NOAA SWPC planetary K-index', state.kp.toFixed(2));
        } catch {
          state.kp = 0;
        }
      }

      // NOAA's OVATION model: the actual forecast auroral oval. We take
      // the strongest probability near our meridian on our hemisphere,
      // and where it sits decides the curtain's true elevation in the
      // sky (overhead if the oval reaches our latitude).
      async function syncOvation() {
        if (params.has('aurora')) {
          state.auroraP = +params.get('aurora');
          state.auroraLat = params.has('auroralat')
            ? +params.get('auroralat')
            : state.lat + 6;
          return;
        }
        try {
          const o = await (
            await fetch(
              'https://services.swpc.noaa.gov/json/ovation_aurora_latest.json',
              {credentials: 'omit'}
            )
          ).json();
          const myLon = ((state.lon % 360) + 360) % 360;
          const south = state.lat < 0;
          let best = 0;
          let bestLat = south ? -68 : 68;
          for (const [lon, la, val] of o.coordinates) {
            if (south ? la > -40 : la < 40) continue;
            let dl = Math.abs(lon - myLon);
            if (dl > 180) dl = 360 - dl;
            if (dl > 3) continue;
            if (val > best) {
              best = val;
              bestLat = la;
            }
          }
          state.auroraP = best / 100;
          state.auroraLat = bestLat;
          record(
            'NOAA OVATION aurora oval',
            best + '% at lat ' + bestLat + '° on this meridian'
          );
        } catch {
          state.auroraP = null; // fall back to the Kp heuristic
        }
      }

      const seenQuakes = new Set();
      let firstQuakePoll = true;
      async function pollQuakes() {
        try {
          const q = await (
            await fetch(
              'https://earthquake.usgs.gov/earthquakes/feed/v1.0/summary/4.5_day.geojson',
              {credentials: 'omit'}
            )
          ).json();
          for (const f of q.features) {
            if (seenQuakes.has(f.id)) continue;
            seenQuakes.add(f.id);
            if (firstQuakePoll) continue; // only rumble live events
            // Real distance decides how hard it shakes here - and real
            // seismology decides WHEN. Waves are not instant: P-waves
            // average ~7.8 km/s and the stronger S-waves ~4.4 km/s, so
            // each arrival is scheduled at its true travel time (unless
            // feed latency means it already passed).
            const [qlon, qlat] = f.geometry.coordinates;
            const km = haversineKm(state.lat, state.lon, qlat, qlon);
            const atten = Math.max(Math.exp(-km / 2500), 0.04);
            const mag = f.properties.mag;
            const elapsed = (Date.now() - f.properties.time) / 1000;
            const pDelay = km / 7.8 - elapsed;
            const sDelay = km / 4.4 - elapsed;
            if (sDelay < -120) continue; // shaking here is long over
            const jolt = (amp) => {
              state.shake = Math.max(
                state.shake,
                Math.min((mag - 4) * 0.5 * atten * amp, 1.2)
              );
            };
            if (pDelay > 0) setTimeout(() => jolt(0.35), pDelay * 1000);
            if (sDelay > 0) setTimeout(() => jolt(1), sDelay * 1000);
            else jolt(1);
            say(
              'M' +
                mag.toFixed(1) +
                ' earthquake · ' +
                Math.round(km).toLocaleString('en') +
                ' km away · ' +
                (sDelay > 5
                  ? 'S-wave arrives in ' + Math.round(sDelay) + 's · '
                  : '') +
                f.properties.place
            );
          }
          firstQuakePoll = false;
          record('USGS M4.5+ quake feed', q.features.length + ' events today');
        } catch {
          // Silent: quakes are garnish, not the meal.
        }
      }

      // ---------- real terrain (open-meteo elevation, Copernicus DEM) ----------
      // 24x24 real elevations spanning 16km around the visitor, cached per
      // rounded location. The mesh gets macro relief from the DEM and only
      // fine detail from noise, so the landscape is recognisably *yours*.
      const DEM_N = 24;
      const DEM_HALF_M = 8000;
      const WORLD = 280; // scene units across; ~57 m per unit

      // Primary source: AWS terrarium tiles (Mapzen open data). Elevation
      // is PNG-encoded as (R*256 + G + B/256) - 32768, CORS-open, so a
      // stitched canvas gives ~30-90m real elevations in a few requests.
      // Kept at full pixel resolution (no downsampled cache: the browser's
      // HTTP cache already holds the tiles themselves).
      async function fetchDEMTiles(lat, lon) {
        const z = Math.max(
          8,
          Math.min(
            13,
            Math.round(Math.log2((40075000 * Math.cos(lat * RAD)) / 8000))
          )
        );
        const world = 2 ** z * 256; // global pixels at this zoom
        const px = (lo) => ((lo + 180) / 360) * world;
        const py = (la) => {
          const r = la * RAD;
          return (
            ((1 - Math.log(Math.tan(r) + 1 / Math.cos(r)) / Math.PI) / 2) *
            world
          );
        };
        const mLat = 111320;
        const mLon = Math.max(111320 * Math.cos(lat * RAD), 1e-6);
        const dLat = DEM_HALF_M / mLat;
        const dLon = DEM_HALF_M / mLon;
        const x0 = Math.floor(px(lon - dLon) / 256);
        const x1 = Math.floor(px(lon + dLon) / 256);
        const y0 = Math.floor(py(lat + dLat) / 256);
        const y1 = Math.floor(py(lat - dLat) / 256);
        if ((x1 - x0 + 1) * (y1 - y0 + 1) > 12)
          throw new Error('tile span too large');
        const canvas = document.createElement('canvas');
        canvas.width = (x1 - x0 + 1) * 256;
        canvas.height = (y1 - y0 + 1) * 256;
        const ctx = canvas.getContext('2d', {willReadFrequently: true});
        const jobs = [];
        for (let ty = y0; ty <= y1; ty++)
          for (let tx = x0; tx <= x1; tx++)
            jobs.push(
              new Promise((resolve, reject) => {
                const img = new Image();
                img.crossOrigin = 'anonymous';
                img.onload = () => {
                  ctx.drawImage(img, (tx - x0) * 256, (ty - y0) * 256);
                  resolve();
                };
                img.onerror = reject;
                img.src =
                  'https://s3.amazonaws.com/elevation-tiles-prod/terrarium/' +
                  z +
                  '/' +
                  tx +
                  '/' +
                  ty +
                  '.png';
              })
            );
        await Promise.all(jobs);
        const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
        const elev = new Float32Array(canvas.width * canvas.height);
        for (let k = 0; k < elev.length; k++)
          elev[k] =
            data[k * 4] * 256 + data[k * 4 + 1] + data[k * 4 + 2] / 256 - 32768;
        record(
          'AWS terrarium DEM tiles',
          jobs.length +
            ' tiles at z' +
            z +
            ' · ' +
            canvas.width +
            'x' +
            canvas.height +
            ' px'
        );
        return {
          kind: 'img',
          w: canvas.width,
          h: canvas.height,
          elev,
          ox: x0 * 256,
          oy: y0 * 256,
          worldPx: world,
          lat,
          lon,
          dLat,
          dLon
        };
      }

      async function fetchDEM(lat, lon) {
        const key = 'horizon-dem-om-' + lat.toFixed(2) + ',' + lon.toFixed(2);
        try {
          const hit = localStorage.getItem(key);
          if (hit) return JSON.parse(hit);
        } catch {}
        const mLat = 111320;
        const mLon = Math.max(111320 * Math.cos(lat * RAD), 1e-6);
        const lats = [];
        const lons = [];
        for (let j = 0; j < DEM_N; j++)
          for (let i = 0; i < DEM_N; i++) {
            lats.push(
              (lat + ((j / (DEM_N - 1) - 0.5) * 2 * DEM_HALF_M) / mLat).toFixed(
                4
              )
            );
            lons.push(
              (lon + ((i / (DEM_N - 1) - 0.5) * 2 * DEM_HALF_M) / mLon).toFixed(
                4
              )
            );
          }
        const grid = [];
        for (let o = 0; o < DEM_N * DEM_N; o += 96) {
          const r = await fetch(
            'https://api.open-meteo.com/v1/elevation?latitude=' +
              lats.slice(o, o + 96).join(',') +
              '&longitude=' +
              lons.slice(o, o + 96).join(','),
            {credentials: 'omit'}
          );
          if (!r.ok) throw new Error(r.status);
          grid.push(...(await r.json()).elevation);
        }
        const dem = {n: DEM_N, grid};
        record(
          'open-meteo elevation API',
          DEM_N + 'x' + DEM_N + ' grid (fallback)'
        );
        try {
          localStorage.setItem(key, JSON.stringify(dem));
        } catch {}
        return dem;
      }

      // ---------- scene ----------
      const canvas = document.getElementById('gl');
      const renderer = new THREE.WebGLRenderer({canvas, antialias: true});
      renderer.setPixelRatio(Math.min(devicePixelRatio, 1.5));
      renderer.toneMapping = THREE.ACESFilmicToneMapping;
      renderer.toneMappingExposure = 0.55;
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;
      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(55, 1, 0.1, 2000);
      camera.layers.enable(2);

      function resize() {
        renderer.setSize(innerWidth, innerHeight);
        camera.aspect = innerWidth / innerHeight;
        camera.updateProjectionMatrix();
      }
      addEventListener('resize', resize);
      resize();

      const sunLight = new THREE.DirectionalLight(0xffffff, 1);
      sunLight.castShadow = true;
      sunLight.shadow.mapSize.setScalar(innerWidth < 800 ? 1024 : 2048);
      sunLight.shadow.camera.left = -170;
      sunLight.shadow.camera.right = 170;
      sunLight.shadow.camera.top = 170;
      sunLight.shadow.camera.bottom = -170;
      sunLight.shadow.camera.near = 20;
      sunLight.shadow.camera.far = 460;
      sunLight.shadow.bias = -0.0004;
      sunLight.shadow.normalBias = 1.5;
      scene.add(sunLight);
      scene.add(sunLight.target);
      const ambient = new THREE.AmbientLight(0xffffff, 0.5);
      scene.add(ambient);

      // Physically-based sky: Preetham analytic scattering, driven by the
      // real sun vector. Turbidity rises with real cloud cover.
      const sky = new Sky();
      sky.scale.setScalar(1200);
      scene.add(sky);
      const skyU = sky.material.uniforms;
      skyU.rayleigh.value = 2.2;
      skyU.mieCoefficient.value = 0.004;
      skyU.mieDirectionalG.value = 0.8;

      // Overcast veil: a translucent grey dome that fades in with real
      // cloud cover (the scattering model alone stays too blue).
      const veilU = {
        alpha: {value: 0},
        top: {value: new THREE.Color('#79838c')},
        bottom: {value: new THREE.Color('#a2abb3')}
      };
      const veil = new THREE.Mesh(
        new THREE.SphereGeometry(600, 24, 16),
        new THREE.ShaderMaterial({
          side: THREE.BackSide,
          transparent: true,
          depthWrite: false,
          uniforms: veilU,
          vertexShader:
            'varying vec3 p; void main(){ p = position;' +
            ' gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }',
          fragmentShader:
            'varying vec3 p; uniform vec3 top; uniform vec3 bottom; uniform float alpha;' +
            ' void main(){ float h = clamp(normalize(p).y * 1.4 + 0.25, 0.0, 1.0);' +
            ' gl_FragColor = vec4(mix(bottom, top, h), alpha); }'
        })
      );
      veil.renderOrder = -1;
      scene.add(veil);
      scene.fog = new THREE.FogExp2('#dceef7', 0.004);

      // ---------- terrain ----------
      function mulberry32(a) {
        return () => {
          a |= 0;
          a = (a + 0x6d2b79f5) | 0;
          let t = Math.imul(a ^ (a >>> 15), 1 | a);
          t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
          return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
        };
      }
      const rand = mulberry32(20260704);
      const gridN = 48;
      const grid = Array.from({length: gridN * gridN}, rand);
      const lerp = (a, b, t) => a + (b - a) * t;
      const smooth = (t) => t * t * (3 - 2 * t);
      function noise2(x, y) {
        const xi = Math.floor(x),
          yi = Math.floor(y);
        const g = (ix, iy) =>
          grid[
            (((iy % gridN) + gridN) % gridN) * gridN +
              (((ix % gridN) + gridN) % gridN)
          ];
        const tx = smooth(x - xi),
          ty = smooth(y - yi);
        return lerp(
          lerp(g(xi, yi), g(xi + 1, yi), tx),
          lerp(g(xi, yi + 1), g(xi + 1, yi + 1), tx),
          ty
        );
      }
      const fbm = (x, y) =>
        0.55 * noise2(x, y) +
        0.27 * noise2(x * 2.1 + 13, y * 2.1 + 7) +
        0.13 * noise2(x * 4.3 + 41, y * 4.3 + 3) +
        0.05 * noise2(x * 8.9 + 5, y * 8.9 + 59);

      // Fallback height model when the DEM is unavailable: domain-warped
      // fBm, in real metres so the colouring logic stays unified.
      function proceduralElev(x, z) {
        const wx = x / 90 + 1.7 * fbm(x / 60 + 31, z / 60 + 17);
        const wz = z / 90 + 1.7 * fbm(x / 60 + 3, z / 60 + 47);
        const ridged = 1 - Math.abs(2 * fbm(wx, wz) - 1);
        return 90 + 700 * ridged * ridged + 260 * fbm(x / 40, z / 40);
      }

      let demData = null; // full-res tile image or {n, grid} API fallback
      function demElev(x, z) {
        if (demData.kind === 'img') {
          // Scene x/z -> lat/lon -> mercator pixel, bilinear on the tiles.
          const la = demData.lat - (z / WORLD) * 2 * demData.dLat;
          const lo = demData.lon + (x / WORLD) * 2 * demData.dLon;
          const r = la * RAD;
          const gx = THREE.MathUtils.clamp(
            ((lo + 180) / 360) * demData.worldPx - demData.ox,
            0,
            demData.w - 1.001
          );
          const gy = THREE.MathUtils.clamp(
            ((1 - Math.log(Math.tan(r) + 1 / Math.cos(r)) / Math.PI) / 2) *
              demData.worldPx -
              demData.oy,
            0,
            demData.h - 1.001
          );
          const i = Math.floor(gx);
          const j = Math.floor(gy);
          const e = demData.elev;
          const w = demData.w;
          return lerp(
            lerp(e[j * w + i], e[j * w + i + 1], gx - i),
            lerp(e[(j + 1) * w + i], e[(j + 1) * w + i + 1], gx - i),
            gy - j
          );
        }
        // x east, z south, in scene units -> bilinear over the DEM grid.
        const N = demData.n;
        const u = THREE.MathUtils.clamp(x / WORLD + 0.5, 0, 1) * (N - 1);
        const v = THREE.MathUtils.clamp(1 - (z / WORLD + 0.5), 0, 1) * (N - 1);
        const i = Math.min(Math.floor(u), N - 2);
        const j = Math.min(Math.floor(v), N - 2);
        const g = demData.grid;
        const e00 = g[j * N + i];
        const e10 = g[j * N + i + 1];
        const e01 = g[(j + 1) * N + i];
        const e11 = g[(j + 1) * N + i + 1];
        return lerp(lerp(e00, e10, u - i), lerp(e01, e11, u - i), v - j);
      }

      let centerElev = 300;
      function sample(x, z) {
        const e = demData ? demElev(x, z) : proceduralElev(x, z);
        const water = demData && e <= 0.3;
        // Real metres compressed onto the scene: asinh keeps flatlands
        // honest while alpine relief still towers.
        let y = 16 * Math.asinh((e - centerElev) / 500);
        if (water) y = 16 * Math.asinh((0 - centerElev) / 500) - 0.6;
        else {
          // With 30m tile data the noise is only seasoning; the coarse
          // fallbacks need more of it to avoid reading as blobs.
          const micro = demData && demData.kind === 'img' ? 0.5 : 1.6;
          y += micro * (fbm(x / 7, z / 7) - 0.5);
        }
        return {e, y, water};
      }

      const ground = new THREE.Group();
      scene.add(ground);
      // Tree archetypes (shared geometry, per-tree scale): conifers for
      // the subalpine band, broadleaves lower down.
      const trunkMat = new THREE.MeshLambertMaterial({color: '#6b4a33'});
      const leafMats = [
        new THREE.MeshLambertMaterial({color: '#2e5230', flatShading: true}),
        new THREE.MeshLambertMaterial({color: '#3f6b3a', flatShading: true}),
        new THREE.MeshLambertMaterial({color: '#4d7a35', flatShading: true})
      ];
      const broadMats = [
        new THREE.MeshLambertMaterial({color: '#4a7d33', flatShading: true}),
        new THREE.MeshLambertMaterial({color: '#5d8a3c', flatShading: true})
      ];
      const geoTrunk = new THREE.CylinderGeometry(0.13, 0.2, 1.1, 5);
      const geoCone1 = new THREE.ConeGeometry(1.15, 2.3, 7);
      const geoCone2 = new THREE.ConeGeometry(0.82, 1.8, 7);
      const geoCanopy = new THREE.IcosahedronGeometry(1.25, 1);
      let trees = [];
      let camBaseY = 6;
      let viewSign = 1; // +1: camera looks south (north hemisphere)
      let snowSim = null; // Rapier world, booted the first time it snows
      let snowLoading = false;
      let water = null; // three.js Water plane, built when the DEM has sea
      const waterNormalsTex = new THREE.TextureLoader().load(
        './horizon/waternormals.jpg'
      );
      waterNormalsTex.wrapS = waterNormalsTex.wrapT = THREE.RepeatWrapping;

      // Terrain material: grass/rock/snow/sea decided per PIXEL in the
      // fragment shader (slope and altitude with noise-jittered borders),
      // not per vertex, so faces stay crisp at any distance. Elevation in
      // metres is recovered in-shader by inverting the asinh compression.
      const terrainUniforms = {
        uCenterElev: {value: 300},
        uSnowy: {value: 0},
        uTime: {value: 0},
        uWindMs: {value: 3},
        uWindVec: {value: new THREE.Vector2(1, 0)},
        uSunDirW: {value: new THREE.Vector3(0, 1, 0)},
        uSunCol: {value: new THREE.Color(0, 0, 0)}
      };
      const TERRAIN_GLSL =
        'uniform float uCenterElev;\n' +
        'uniform float uSnowy;\n' +
        'uniform float uTime;\n' +
        'uniform float uWindMs;\n' +
        'uniform vec2 uWindVec;\n' +
        'uniform vec3 uSunDirW;\n' +
        'uniform vec3 uSunCol;\n' +
        'varying float vWet;\n' +
        'varying vec3 vWp;\n' +
        'float thash(vec2 p){ return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453); }\n' +
        'float tnoise(vec2 p){\n' +
        '  vec2 i = floor(p); vec2 f = fract(p);\n' +
        '  vec2 u = f * f * (3.0 - 2.0 * f);\n' +
        '  return mix(mix(thash(i), thash(i + vec2(1.0, 0.0)), u.x),\n' +
        '             mix(thash(i + vec2(0.0, 1.0)), thash(i + vec2(1.0, 1.0)), u.x), u.y);\n' +
        '}\n' +
        'float tfbm(vec2 p){ return 0.6 * tnoise(p) + 0.28 * tnoise(p * 2.7 + 19.0) + 0.12 * tnoise(p * 6.1 + 47.0); }\n' +
        // The sea obeys oceanography, scaled honestly (1 unit = 57.14m).
        // Pierson-Moskowitz fully developed sea: significant wave height
        // Hs = 0.21 U^2/g, peak period Tp = 2*pi*U/(0.877g); each wave
        // train moves at its true deep-water dispersion speed w = sqrt(gk)
        // and tilts the normal by the real steepness pi*Hs/lambda.
        'vec3 seaNormal(vec3 wp){\n' +
        '  float U = max(uWindMs, 0.8);\n' +
        '  float Hs = 0.21 * U * U / 9.81;\n' +
        '  float Tp = 0.7305 * U;\n' +
        '  float Lp = max(1.5614 * Tp * Tp, 4.0);\n' +
        '  vec2 pm = wp.xz * 57.14;\n' +
        '  vec2 d1 = normalize(uWindVec);\n' +
        '  vec2 d2 = normalize(uWindVec + vec2(-uWindVec.y, uWindVec.x) * 0.6);\n' +
        '  float k1 = 6.28318 / Lp;\n' +
        '  float k2 = 6.28318 / (Lp * 0.45);\n' +
        '  float s1 = 3.14159 * Hs / Lp;\n' +
        '  float a1 = cos(dot(pm, d1) * k1 - uTime * sqrt(9.81 * k1));\n' +
        '  float a2 = cos(dot(pm, d2) * k2 - uTime * sqrt(9.81 * k2) + 1.7);\n' +
        '  float chop = (tnoise(pm * 0.05 + uTime * 0.15 * d1) - 0.5) * s1 * 1.2;\n' +
        '  vec2 grad = d1 * (s1 * a1) + d2 * (s1 * 0.6 * a2) + vec2(chop);\n' +
        '  return normalize(vec3(-grad.x, 1.0, -grad.y));\n' +
        '}\n' +
        // Sun glitter: Blinn lobe on the wave normals with Schlick
        // fresnel; calm water gives a tight bright path, wind spreads it.
        'vec3 seaSpec(vec3 wp){\n' +
        '  vec3 n = seaNormal(wp);\n' +
        '  vec3 V = normalize(cameraPosition - wp);\n' +
        '  vec3 H = normalize(V + uSunDirW);\n' +
        '  float gloss = mix(700.0, 60.0, clamp(uWindMs / 15.0, 0.0, 1.0));\n' +
        '  float f = pow(clamp(1.0 - dot(V, n), 0.0, 1.0), 5.0) * 0.95 + 0.05;\n' +
        '  return uSunCol * pow(max(dot(n, H), 0.0), gloss) * f * 6.0;\n' +
        '}\n' +
        'vec3 terrainColor(vec3 wp, float wetF){\n' +
        '  vec3 nW = normalize(cross(dFdx(wp), dFdy(wp)));\n' +
        '  if (nW.y < 0.0) nW = -nW;\n' +
        '  float slope = 1.0 - nW.y;\n' +
        '  float e = uCenterElev + 500.0 * sinh(wp.y / 16.0);\n' +
        '  float n1 = tfbm(wp.xz * 0.11);\n' +
        '  float n2 = tfbm(wp.xz * 0.6);\n' +
        '  vec3 grass = mix(vec3(0.09, 0.21, 0.05), vec3(0.19, 0.33, 0.08), n1);\n' +
        '  vec3 rock = mix(vec3(0.28, 0.25, 0.21), vec3(0.4, 0.37, 0.32), n2);\n' +
        '  vec3 col = mix(grass, rock, smoothstep(0.2, 0.45, slope + (n2 - 0.5) * 0.08));\n' +
        '  col = mix(col, rock, smoothstep(1600.0, 2400.0, e) * 0.92);\n' +
        '  float snowLine = 2300.0 + (n1 - 0.5) * 500.0;\n' +
        '  float snow = smoothstep(snowLine, snowLine + 700.0, e) * (1.0 - smoothstep(0.35, 0.6, slope));\n' +
        '  snow = max(snow, uSnowy * (1.0 - smoothstep(0.25, 0.45, slope)) * 0.85);\n' +
        '  col = mix(col, vec3(0.87, 0.9, 0.93), snow);\n' +
        '  vec3 sea = mix(vec3(0.05, 0.13, 0.2), vec3(0.07, 0.17, 0.25), n1);\n' +
        // Whitecap coverage from Monahan & O'Muircheartaigh (1980):
        // W = 3.84e-6 * U^3.41 - a real few percent at 10 m/s.
        '  float U = max(uWindMs, 0.8);\n' +
        '  float W = clamp(3.84e-6 * pow(U, 3.41), 0.0, 0.6);\n' +
        '  vec2 pmc = wp.xz * 57.14 * 0.11;\n' +
        '  float capN = tnoise(pmc + uTime * 0.25 * normalize(uWindVec) + 31.0);\n' +
        '  sea = mix(sea, vec3(0.75, 0.8, 0.84), smoothstep(1.0 - W, 1.0 - W + 0.04, capN));\n' +
        '  return mix(col, sea, wetF);\n' +
        '}\n';
      const terrainMat = new THREE.MeshLambertMaterial({flatShading: true});
      terrainMat.onBeforeCompile = (shader) => {
        Object.assign(shader.uniforms, terrainUniforms);
        shader.vertexShader = shader.vertexShader
          .replace(
            '#include <common>',
            '#include <common>\nattribute float wet; varying float vWet; varying vec3 vWp;'
          )
          .replace(
            '#include <begin_vertex>',
            '#include <begin_vertex>\nvWet = wet; vWp = transformed;'
          );
        shader.fragmentShader = shader.fragmentShader
          .replace('#include <common>', '#include <common>\n' + TERRAIN_GLSL)
          .replace(
            '#include <color_fragment>',
            '#include <color_fragment>\ndiffuseColor.rgb = terrainColor(vWp, vWet);'
          )
          .replace(
            '#include <normal_fragment_begin>',
            '#include <normal_fragment_begin>\n' +
              'if (vWet > 0.5) normal = normalize((viewMatrix * vec4(seaNormal(vWp), 0.0)).xyz);'
          )
          .replace(
            '#include <opaque_fragment>',
            'outgoingLight += vWet * seaSpec(vWp);\n#include <opaque_fragment>'
          );
      };

      function buildWorld() {
        ground.clear();
        trees = [];
        if (demData) {
          // Average the real elevation in a small ring around the scene
          // centre (grid-layout agnostic).
          let sum = 0;
          let cnt = 0;
          for (let dx = -12; dx <= 12; dx += 6)
            for (let dz = -12; dz <= 12; dz += 6) {
              sum += demElev(dx, dz);
              cnt++;
            }
          centerElev = Math.max(sum / cnt, 0.3);
        } else {
          centerElev = 300;
        }
        terrainUniforms.uCenterElev.value = centerElev;
        viewSign = state.lat < 0 ? -1 : 1;

        const geo = new THREE.PlaneGeometry(WORLD, WORLD, 220, 220);
        geo.rotateX(-Math.PI / 2);
        const pos = geo.attributes.position;
        const wet = new Float32Array(pos.count);
        for (let i = 0; i < pos.count; i++) {
          const s = sample(pos.getX(i), pos.getZ(i));
          pos.setY(i, s.y);
          wet[i] = s.water ? 1 : 0;
        }
        geo.computeVertexNormals();
        geo.setAttribute('wet', new THREE.BufferAttribute(wet, 1));
        const terrain = new THREE.Mesh(geo, terrainMat);
        terrain.castShadow = true;
        terrain.receiveShadow = true;
        ground.add(terrain);

        // Trees: inside the real OSM woods when we have them, below the
        // real tree line, off cliffs, out of the sea, and not on top of
        // either camera spot (it can face both ways).
        for (let i = 0; i < 1800 && trees.length < 140; i++) {
          const x = (rand() - 0.5) * (WORLD - 40);
          const z = (rand() - 0.5) * (WORLD - 40);
          const s0 = sample(x, z);
          if (s0.water || s0.e > 1900) continue;
          if (!inForest(x, z)) continue;
          // Real forests stand on ~35° alpine slopes; the asinh height
          // compression roughly doubles scene gradients, hence 4.5.
          const grade =
            Math.abs(sample(x + 2, z).y - sample(x - 2, z).y) +
            Math.abs(sample(x, z + 2).y - sample(x, z - 2).y);
          if (grade > 4.5) continue;
          if (Math.hypot(x, z - 26) < 24 || Math.hypot(x, z + 26) < 24)
            continue;
          const sc = 0.8 + rand() * 1.4;
          const conifer = s0.e > 1000 || rand() < 0.4;
          const tree = new THREE.Group();
          const trunk = new THREE.Mesh(geoTrunk, trunkMat);
          trunk.position.y = 0.55;
          trunk.castShadow = true;
          tree.add(trunk);
          if (conifer) {
            const mat = leafMats[Math.floor(rand() * leafMats.length)];
            const c1 = new THREE.Mesh(geoCone1, mat);
            c1.position.y = 1.7;
            const c2 = new THREE.Mesh(geoCone2, mat);
            c2.position.y = 3.1;
            c1.castShadow = c2.castShadow = true;
            c1.receiveShadow = true;
            tree.add(c1, c2);
          } else {
            const canopy = new THREE.Mesh(
              geoCanopy,
              broadMats[Math.floor(rand() * broadMats.length)]
            );
            canopy.position.y = 2.2;
            canopy.scale.y = 0.82;
            canopy.castShadow = canopy.receiveShadow = true;
            tree.add(canopy);
          }
          tree.scale.setScalar(sc);
          tree.position.set(x, s0.y, z);
          tree.userData = {phase: rand() * Math.PI * 2, a: 0, v: 0};
          trees.push(tree);
          ground.add(tree);
        }

        // The sea: three.js Water (planar reflections) riding at real sea
        // level wherever the DEM says there is water.
        if (water) {
          ground.remove(water);
          water.geometry.dispose();
          water.material.dispose();
          water = null;
        }
        let hasWater = false;
        for (let i = 0; i < wet.length; i++)
          if (wet[i]) {
            hasWater = true;
            break;
          }
        if (hasWater && waterNormalsTex) {
          water = new Water(new THREE.PlaneGeometry(WORLD, WORLD), {
            textureWidth: 512,
            textureHeight: 512,
            waterNormals: waterNormalsTex,
            sunDirection: new THREE.Vector3(0, 1, 0),
            sunColor: 0xffffff,
            waterColor: 0x0a2431,
            distortionScale: 1.4,
            fog: true
          });
          water.rotation.x = -Math.PI / 2;
          water.position.y = 16 * Math.asinh((0 - centerElev) / 500) - 0.15;
          ground.add(water);
          record('three.js Water (vendored)', 'planar reflections · 512px');
        }

        camBaseY = sample(0, -26 * viewSign).y + 5;
        // New terrain invalidates the physics heightfield and any drifts.
        if (snowSim) {
          snowSim.rebuildTerrain();
          snowSim.clearDrifts();
        }
      }
      buildWorld();

      // Camera yaw: equatorward by default (that is where the sun arc
      // lives), but pan poleward at night when a real aurora is on. The
      // first frame snaps; only live changes pan.
      let yaw = state.lat < 0 ? Math.PI : 0;
      let yawInit = false;

      // Stars: the real sky (Yale Bright Star Catalog), spun by sidereal
      // time around a pole tilted to the latitude.
      const celestial = new THREE.Group();
      const polar = new THREE.Group();
      polar.add(celestial);
      scene.add(polar);
      let starMat = null;
      fetch('./horizon/stars.json')
        .then((r) => r.json())
        .then((stars) => {
          const pos = [];
          const color = [];
          const size = [];
          const col = new THREE.Color();
          for (const [ra, dec, mag, kelvin] of stars) {
            const raR = ra * RAD;
            const decR = dec * RAD;
            pos.push(
              900 * Math.cos(decR) * Math.sin(raR),
              900 * Math.sin(decR),
              900 * Math.cos(decR) * Math.cos(raR)
            );
            const t = THREE.MathUtils.clamp((kelvin - 3000) / 9000, 0, 1);
            col.setRGB(
              1 - t * 0.25,
              0.88 - Math.abs(t - 0.45) * 0.2,
              0.72 + t * 0.28
            );
            color.push(col.r, col.g, col.b);
            size.push(THREE.MathUtils.clamp(7.5 - mag, 1.8, 7.5));
          }
          const geo = new THREE.BufferGeometry();
          geo.setAttribute(
            'position',
            new THREE.Float32BufferAttribute(pos, 3)
          );
          geo.setAttribute('color', new THREE.Float32BufferAttribute(color, 3));
          geo.setAttribute('size', new THREE.Float32BufferAttribute(size, 1));
          starMat = new THREE.ShaderMaterial({
            transparent: true,
            depthWrite: false,
            uniforms: {night: {value: 0}},
            vertexShader:
              'attribute float size; varying vec3 vc;' +
              ' void main(){ vc = color;' +
              ' vec4 mv = modelViewMatrix * vec4(position, 1.0);' +
              ' gl_PointSize = size; gl_Position = projectionMatrix * mv; }',
            fragmentShader:
              'uniform float night; varying vec3 vc;' +
              ' void main(){ float d = length(gl_PointCoord - 0.5);' +
              ' if (d > 0.5) discard;' +
              ' gl_FragColor = vec4(vc, night * smoothstep(0.5, 0.2, d)); }',
            vertexColors: true
          });
          celestial.add(new THREE.Points(geo, starMat));
          record(
            'Yale Bright Star Catalog',
            stars.length + ' stars (vendored)'
          );
        });

      // Constellation figures (d3-celestial dataset): faint real lines
      // riding the same sidereal dome as the stars.
      let constMat = null;
      fetch('./horizon/constellations.lines.json')
        .then((r) => r.json())
        .then((geo) => {
          const pts = [];
          for (const f of geo.features)
            for (const line of f.geometry.coordinates)
              for (let i = 0; i < line.length - 1; i++)
                for (const p of [line[i], line[i + 1]]) {
                  const ra = (((p[0] % 360) + 360) % 360) * RAD;
                  const dec = p[1] * RAD;
                  pts.push(
                    870 * Math.cos(dec) * Math.sin(ra),
                    870 * Math.sin(dec),
                    870 * Math.cos(dec) * Math.cos(ra)
                  );
                }
          const g = new THREE.BufferGeometry();
          g.setAttribute('position', new THREE.Float32BufferAttribute(pts, 3));
          constMat = new THREE.LineBasicMaterial({
            color: '#7f9fc4',
            transparent: true,
            opacity: 0,
            depthWrite: false
          });
          celestial.add(new THREE.LineSegments(g, constMat));
          record(
            'd3-celestial constellations',
            geo.features.length + ' figures (vendored)'
          );
        });

      // The moon: a lit sphere on its own light layer. Because its light
      // comes from the sun's real direction, the phase is always correct.
      const moonDisc = new THREE.Mesh(
        new THREE.SphereGeometry(24, 24, 18),
        new THREE.MeshLambertMaterial({
          color: '#cdd4e2',
          emissive: '#0c0f16',
          fog: false
        })
      );
      moonDisc.layers.set(2);
      scene.add(moonDisc);
      const moonLight = new THREE.DirectionalLight(0xffffff, 2.2);
      moonLight.layers.set(2);
      scene.add(moonLight);
      scene.add(moonLight.target);

      // Aurora: additive curtains over the poleward horizon, driven by
      // NOAA's OVATION oval (Kp heuristic as fallback). The oval's real
      // latitude sets the curtain's true elevation via uBase.
      const auroraU = {
        time: {value: 0},
        strength: {value: 0},
        uBase: {value: 60}
      };
      const aurora = new THREE.Mesh(
        new THREE.CylinderGeometry(
          760,
          760,
          720,
          64,
          1,
          true,
          Math.PI - Math.PI / 2.6,
          Math.PI / 1.3
        ),
        new THREE.ShaderMaterial({
          transparent: true,
          depthWrite: false,
          side: THREE.DoubleSide,
          blending: THREE.AdditiveBlending,
          uniforms: auroraU,
          vertexShader:
            'varying vec2 u; varying float vy; void main(){ u = uv;' +
            ' vy = (modelMatrix * vec4(position, 1.0)).y;' +
            ' gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }',
          fragmentShader:
            'uniform float time; uniform float strength; uniform float uBase;' +
            ' varying vec2 u; varying float vy;' +
            ' void main(){' +
            ' float h = clamp((vy - uBase) / 720.0, 0.0, 1.0);' +
            ' float w = sin(u.x * 38.0 + time * 0.9 + sin(u.x * 7.0 + time * 0.35) * 2.4)' +
            '   * 0.5 + 0.5;' +
            ' float w2 = sin(u.x * 61.0 - time * 0.6 + 2.1) * 0.5 + 0.5;' +
            ' float band = pow(1.0 - h, 2.0) * smoothstep(0.08, 0.32, h);' +
            ' float a = strength * band * (0.9 + 1.0 * w * w2);' +
            ' vec3 col = mix(vec3(0.13, 0.95, 0.45), vec3(0.5, 0.25, 0.95), h * 1.3);' +
            ' gl_FragColor = vec4(col * a, a); }'
        })
      );
      aurora.position.y = 420;
      scene.add(aurora);

      // Clouds: soft blobs; coverage and drift follow the real weather.
      const cloudGroup = new THREE.Group();
      const cloudMat = new THREE.MeshLambertMaterial({
        color: '#ffffff',
        transparent: true,
        opacity: 0.85,
        flatShading: true
      });
      const clouds = [];
      for (let i = 0; i < 16; i++) {
        const blob = new THREE.Group();
        for (let j = 0; j < 4; j++) {
          const puff = new THREE.Mesh(
            new THREE.IcosahedronGeometry(6 + rand() * 6, 0),
            cloudMat
          );
          puff.position.set((j - 1.5) * 7 + rand() * 3, rand() * 3, rand() * 4);
          puff.scale.y = 0.45;
          blob.add(puff);
        }
        blob.position.set(
          (rand() - 0.5) * 480,
          70 + rand() * 30,
          (rand() - 0.5) * 480
        );
        // Altitude jitter around the real cloud base (set each frame).
        blob.userData.jitter = rand() * 10;
        clouds.push(blob);
        cloudGroup.add(blob);
      }
      scene.add(cloudGroup);

      // The ISS: real orbital mechanics. Current elements from
      // wheretheiss.at, propagated locally with SGP4 (satellite.js), shown
      // only during genuinely visible passes: above the horizon, sunlit,
      // and the observer in twilight or darkness.
      let satrec = null;
      let lastPassSaid = -1e9;
      const iss = new THREE.Mesh(
        new THREE.SphereGeometry(2.4, 8, 6),
        new THREE.MeshBasicMaterial({color: '#f4f7ff', fog: false})
      );
      iss.visible = false;
      scene.add(iss);
      async function syncISS() {
        try {
          const tle = await (
            await fetch('https://api.wheretheiss.at/v1/satellites/25544/tles', {
              credentials: 'omit'
            })
          ).json();
          satrec = satellite.twoline2satrec(tle.line1, tle.line2);
          record(
            'ISS TLE (wheretheiss.at)',
            'epoch ' +
              satrec.epochyr +
              '/' +
              satrec.epochdays.toFixed(2) +
              ' · SGP4'
          );
        } catch {
          // Keep any previous elements; SGP4 stays accurate for days.
        }
      }

      // Precipitation: one particle field, styled as rain or snow.
      const PRECIP_N = 1600;
      const precipGeo = new THREE.BufferGeometry();
      {
        const p = [];
        for (let i = 0; i < PRECIP_N; i++)
          p.push((rand() - 0.5) * 90, rand() * 45, (rand() - 0.5) * 90);
        precipGeo.setAttribute(
          'position',
          new THREE.Float32BufferAttribute(p, 3)
        );
      }
      const dot = document.createElement('canvas');
      dot.width = dot.height = 32;
      {
        const g = dot.getContext('2d');
        const grad = g.createRadialGradient(16, 16, 2, 16, 16, 15);
        grad.addColorStop(0, 'rgba(255,255,255,1)');
        grad.addColorStop(1, 'rgba(255,255,255,0)');
        g.fillStyle = grad;
        g.fillRect(0, 0, 32, 32);
      }
      const precipMat = new THREE.PointsMaterial({
        color: '#bcd2e8',
        size: 0.22,
        map: new THREE.CanvasTexture(dot),
        depthWrite: false,
        transparent: true,
        opacity: 0
      });
      const precip = new THREE.Points(precipGeo, precipMat);
      scene.add(precip);

      // ---------- physical snow (Rapier, loaded only when it snows) ----------
      // The near-field weather box is human scale (roughly 1 unit = 1m),
      // unlike the 57 m/unit map scale. Flakes are rigid bodies in a real
      // physics engine: gravity against air drag (linear damping gives the
      // ~1.4 m/s terminal velocity), pushed by the real wind, colliding
      // with a heightfield of the actual local terrain AND with every
      // flake already settled - so drifts grow on the real topography for
      // as long as the page stays open, and melt when the real
      // temperature says so.
      const SNOW_N = 240;
      const DRIFT_CAP = 2400;
      const SNOW_EXT = 120;
      const tmpM4 = new THREE.Matrix4();
      const driftMesh = new THREE.InstancedMesh(
        new THREE.IcosahedronGeometry(0.16, 0),
        new THREE.MeshLambertMaterial({color: '#eef2f6'}),
        DRIFT_CAP
      );
      driftMesh.count = 0;
      driftMesh.frustumCulled = false;
      scene.add(driftMesh);
      const flakeMesh = new THREE.InstancedMesh(
        new THREE.IcosahedronGeometry(0.12, 0),
        new THREE.MeshBasicMaterial({color: '#ffffff'}),
        SNOW_N
      );
      flakeMesh.count = 0;
      flakeMesh.frustumCulled = false;
      scene.add(flakeMesh);

      async function initSnowSim() {
        snowLoading = true;
        const RAPIER = await import('./horizon/rapier.es.js');
        await RAPIER.init();
        const world = new RAPIER.World({x: 0, y: -3, z: 0});
        const sim = {
          world,
          bodies: [],
          drifts: new Array(DRIFT_CAP).fill(null),
          head: 0,
          countD: 0,
          highWater: 0,
          melt: 0
        };
        sim.rebuildTerrain = () => {
          if (sim.terrain) world.removeCollider(sim.terrain, false);
          const HF = 60;
          const heights = new Float32Array((HF + 1) * (HF + 1));
          for (let r = 0; r <= HF; r++)
            for (let c = 0; c <= HF; c++)
              heights[r * (HF + 1) + c] = sample(
                (r / HF - 0.5) * SNOW_EXT, // rows run along +x (verified)
                (c / HF - 0.5) * SNOW_EXT
              ).y;
          sim.terrain = world.createCollider(
            RAPIER.ColliderDesc.heightfield(HF, HF, heights, {
              x: SNOW_EXT,
              y: 1,
              z: SNOW_EXT
            })
          );
        };
        sim.clearDrifts = () => {
          for (let i = 0; i < DRIFT_CAP; i++) {
            if (sim.drifts[i]) {
              world.removeCollider(sim.drifts[i], false);
              sim.drifts[i] = null;
            }
            tmpM4.makeScale(0, 0, 0);
            driftMesh.setMatrixAt(i, tmpM4);
          }
          sim.head = 0;
          sim.countD = 0;
          sim.highWater = 0;
          driftMesh.count = 0;
          driftMesh.instanceMatrix.needsUpdate = true;
        };
        sim.spawn = (body) => {
          body.setTranslation(
            {
              x: (Math.random() - 0.5) * 80,
              y: camBaseY + 26 + Math.random() * 10,
              z: (Math.random() - 0.5) * 80
            },
            true
          );
          body.setLinvel({x: 0, y: -1, z: 0}, true);
        };
        sim.deposit = (p) => {
          const slot = sim.head;
          sim.head = (sim.head + 1) % DRIFT_CAP;
          if (sim.drifts[slot]) world.removeCollider(sim.drifts[slot], false);
          else sim.countD++;
          sim.drifts[slot] = world.createCollider(
            RAPIER.ColliderDesc.ball(0.14).setTranslation(p.x, p.y, p.z)
          );
          tmpM4.makeScale(1, 0.72, 1).setPosition(p.x, p.y, p.z);
          driftMesh.setMatrixAt(slot, tmpM4);
          sim.highWater = Math.max(sim.highWater, slot + 1);
          driftMesh.count = sim.highWater;
          driftMesh.instanceMatrix.needsUpdate = true;
        };
        sim.meltOldest = () => {
          for (let i = 0; i < DRIFT_CAP; i++) {
            const slot = (sim.head + i) % DRIFT_CAP; // oldest surviving
            if (!sim.drifts[slot]) continue;
            world.removeCollider(sim.drifts[slot], false);
            sim.drifts[slot] = null;
            sim.countD--;
            tmpM4.makeScale(0, 0, 0);
            driftMesh.setMatrixAt(slot, tmpM4);
            driftMesh.instanceMatrix.needsUpdate = true;
            return;
          }
        };
        sim.rebuildTerrain();
        for (let i = 0; i < SNOW_N; i++) {
          const body = world.createRigidBody(
            // Locked rotations: flakes must not roll away downwind on
            // landing (validated: rolling leaked 95% of deposits).
            RAPIER.RigidBodyDesc.dynamic().setLinearDamping(2.1).lockRotations()
          );
          world.createCollider(
            RAPIER.ColliderDesc.ball(0.12).setRestitution(0.02).setFriction(1),
            body
          );
          sim.spawn(body);
          sim.bodies.push(body);
        }
        snowSim = sim;
        record(
          'Rapier physics engine (vendored)',
          SNOW_N + ' snow bodies · heightfield of the local terrain'
        );
      }

      // ---------- colour ramps for light/fog ----------
      const cDayBot = new THREE.Color('#dceef7');
      const cSetBot = new THREE.Color('#f2a65e');
      const cNightBot = new THREE.Color('#141c33');
      const cGray = new THREE.Color('#9aa4ad');
      const tmpB = new THREE.Color();
      const windV = new THREE.Vector3(1, 0, 0);
      const treeAxis = new THREE.Vector3(0, 0, 1);

      // ---------- data panel (✦ toggle / ?debug=1 / D key) ----------
      const panel = document.getElementById('panel');
      const live = {};
      let panelOn = params.get('debug') === '1';
      panel.hidden = !panelOn;
      function refreshPanel() {
        if (panel.hidden) return;
        panel.replaceChildren();
        const title = document.createElement('b');
        title.textContent = 'HORIZON · every value below is real\n\n';
        panel.appendChild(title);
        for (const [k, v] of Object.entries(live)) {
          const line = document.createElement('div');
          line.textContent = k + ': ' + v;
          panel.appendChild(line);
        }
        const hdr = document.createElement('b');
        hdr.textContent = '\nlive sources\n';
        panel.appendChild(hdr);
        for (const [k, s] of Object.entries(sources)) {
          const line = document.createElement('div');
          line.textContent = '· ' + k + ' — ' + s.value;
          const age = document.createElement('span');
          age.className = 'age';
          age.textContent =
            ' (' + Math.round((Date.now() - s.at) / 1000) + 's ago)';
          line.appendChild(age);
          panel.appendChild(line);
        }
      }
      setInterval(refreshPanel, 1000);
      function setPanel(on) {
        panelOn = on;
        panel.hidden = !on;
        refreshPanel();
      }
      addEventListener('keydown', (e) => {
        if (e.key === 'd') setPanel(!panelOn);
      });
      // Announce support for the site's ✦ wallpaper control.
      if (window.parent !== window) {
        parent.postMessage(
          {type: 'shaderwall', state: 'hidden'},
          location.origin
        );
      }

      // ---------- pointer parallax (forwarded by footer.js) ----------
      const look = {x: 0, y: 0};
      addEventListener('message', (e) => {
        if (e.origin !== location.origin) return;
        const d = e.data || {};
        if (d.type === 'wallpaper-pointer' && !reduceMotion) {
          look.x = (d.x - 0.5) * 2;
          look.y = (d.y - 0.5) * 2;
        }
        if (d.type === 'shaderwall' && d.action === 'toggle') {
          setPanel(!panelOn);
          parent.postMessage(
            {type: 'shaderwall', state: panelOn ? 'shown' : 'hidden'},
            location.origin
          );
        }
      });

      // ---------- main loop ----------
      let last = performance.now();
      function frame(t) {
        requestAnimationFrame(frame);
        const dt = Math.min((t - last) / 1000, 0.1) * timeScale;
        last = t;
        const d = now();

        const sun = altAz(sunEquatorial(d), d, state.lat, state.lon);
        const moon = altAz(moonEquatorial(d), d, state.lat, state.lon);
        const sunVec = skyPoint(sun.alt, sun.az, 1);
        skyU.sunPosition.value.copy(sunVec);
        sunLight.position.copy(skyPoint(Math.max(sun.alt, -0.12), sun.az, 190));
        moonDisc.position.copy(skyPoint(moon.alt, moon.az, 1500));
        moonLight.position.copy(skyPoint(sun.alt, sun.az, 200));
        moonLight.target.position.copy(moonDisc.position);

        polar.rotation.x = -(90 - state.lat) * RAD;
        celestial.rotation.y = -(gmst(d) + state.lon * RAD);

        const day = THREE.MathUtils.clamp((sun.alt / RAD + 6) / 24, 0, 1);
        const dusk = 1 - Math.abs(day - 0.5) * 2;
        const cloudy = state.cloud / 100;

        // Scattering sky: turbidity from MEASURED aerosols (AOD), plus
        // cloud haze; the grey veil finishes the overcast look.
        skyU.turbidity.value = 1.6 + state.aod * 14 + cloudy * 12 + dusk * 2;
        skyU.mieCoefficient.value = 0.003 + state.aod * 0.012 + cloudy * 0.005;
        veilU.alpha.value = cloudy * cloudy * 0.85 * day;

        tmpB
          .copy(cNightBot)
          .lerp(cDayBot, day)
          .lerp(cSetBot, dusk * 0.8)
          .lerp(cGray, cloudy * 0.7 * day);
        scene.fog.color.copy(tmpB);
        const foggy = state.code === 45 || state.code === 48;
        // Particulate haze: real PM2.5 shortens the visibility.
        scene.fog.density =
          0.004 +
          (foggy ? 0.028 : 0) +
          cloudy * 0.002 +
          Math.min(state.pm25, 150) * 0.00006;

        sunLight.intensity = (0.25 + day) * (1 - cloudy * 0.55);
        sunLight.color.setHSL(0.12, 0.5, 0.6 + day * 0.4 - dusk * 0.15);
        // Kept moderate so the sun's cast shadows stay readable.
        ambient.intensity =
          0.12 +
          day * 0.3 * (1 - cloudy * 0.3) +
          cloudy * day * 0.12 +
          (moon.alt > 0 ? 0.07 * (1 - day) : 0);
        ambient.color.copy(tmpB);
        if (starMat)
          starMat.uniforms.night.value = (1 - day) * (1 - cloudy * 0.85);
        if (constMat) constMat.opacity = (1 - day) * (1 - cloudy * 0.9) * 0.2;
        moonDisc.visible = moon.alt > -0.05;

        // The Water plane: real waves via the sea-state, real sun tint.
        if (water) {
          const wu = water.material.uniforms;
          wu.time.value += dt * (0.3 + (state.wind / 3.6) * 0.05);
          wu.sunDirection.value.copy(sunVec);
          wu.sunColor.value
            .copy(sunLight.color)
            .multiplyScalar(sunLight.intensity);
          wu.distortionScale.value =
            0.6 + ((0.21 * Math.pow(state.wind / 3.6, 2)) / 9.81) * 2.5;
        }

        // The real wind vector: meteorological direction is where wind
        // comes FROM; the scene advects along where it blows TO.
        const windTo = (state.winddir + 180) * RAD;
        windV.set(Math.sin(windTo), 0, -Math.cos(windTo));

        // Sea-state uniforms: real wind feeds the wave model.
        terrainUniforms.uTime.value = t / 1000;
        terrainUniforms.uWindMs.value = state.wind / 3.6;
        terrainUniforms.uWindVec.value.set(windV.x, windV.z);
        terrainUniforms.uSunDirW.value.copy(sunVec);
        terrainUniforms.uSunCol.value
          .copy(sunLight.color)
          .multiplyScalar(
            sunLight.intensity * (sun.alt > 0.01 ? 1 : 0) * (1 - cloudy * 0.8)
          );

        // Aurora: OVATION oval probability when available (Kp heuristic
        // otherwise), with the curtain elevation from the oval's true
        // distance - Earth curvature included, ~150km emission height.
        let auroraP;
        let ovalDeg;
        if (state.auroraP !== null) {
          auroraP = state.auroraP;
          ovalDeg = Math.abs(state.auroraLat) - Math.abs(state.lat);
        } else {
          auroraP =
            THREE.MathUtils.clamp((state.kp - 4) / 4, 0, 1) *
            THREE.MathUtils.clamp((Math.abs(state.lat) - 46) / 14, 0, 1);
          ovalDeg = 8;
        }
        const ovalKm = Math.max(ovalDeg, 0) * 111;
        const elevA = Math.atan2(
          150 - (ovalKm * ovalKm) / 12742,
          Math.max(ovalKm, 60)
        );
        auroraU.strength.value =
          auroraP * (1 - day) * (1 - cloudy * 0.7) * (elevA > 0.035 ? 1 : 0);
        auroraU.time.value = t / 1000;
        const yAurora = Math.tan(THREE.MathUtils.clamp(elevA, 0.06, 1.1)) * 760;
        auroraU.uBase.value = yAurora - 160;
        aurora.position.y = yAurora + 200;
        aurora.rotation.y = state.lat < 0 ? Math.PI : 0;

        // Clouds ride the real wind vector, based at the real lifting
        // condensation level (Espy: ~125m per degree of dew point spread).
        // Clamped above the camera: the asinh height compression squeezes
        // low cloud decks harder than the terrain they sit over.
        const lcl = Math.max(125 * (state.temp - state.dew), 150);
        const yCloud = Math.max(16 * Math.asinh(lcl / 500) + 8, camBaseY + 26);
        const showClouds = Math.round(cloudy * clouds.length);
        clouds.forEach((c, i) => {
          c.visible = i < showClouds;
          c.position.x += windV.x * state.wind * 0.06 * dt;
          c.position.z += windV.z * state.wind * 0.06 * dt;
          c.position.y +=
            (yCloud + c.userData.jitter - c.position.y) * Math.min(dt, 1);
          if (c.position.x > 260) c.position.x = -260;
          if (c.position.x < -260) c.position.x = 260;
          if (c.position.z > 260) c.position.z = -260;
          if (c.position.z < -260) c.position.z = 260;
        });
        cloudMat.opacity = 0.5 + cloudy * 0.4;
        // Unlit clouds are dark; only daylight (or moonlight) brightens.
        cloudMat.color.setScalar(
          0.3 + day * 0.7 + (moon.alt > 0 ? 0.08 * (1 - day) : 0)
        );

        // Ground snow cover reacts live to the real temperature.
        const snowyGround =
          state.temp <= 0.5 && (state.snow > 0 || state.code >= 71) ? 1 : 0;
        terrainUniforms.uSnowy.value +=
          (snowyGround - terrainUniforms.uSnowy.value) * Math.min(dt, 1);

        const snowing =
          state.snow > 0 ||
          (state.code >= 71 &&
            state.code <= 86 &&
            ![80, 81, 82].includes(state.code));
        const raining = !snowing && (state.precip > 0 || state.code >= 51);
        const rate = snowing
          ? THREE.MathUtils.clamp(state.snow / 2, 0.3, 1)
          : THREE.MathUtils.clamp(state.precip / 4, 0.25, 1);
        precipMat.opacity = raining || snowing ? 0.35 + rate * 0.45 : 0;
        precipMat.size = snowing ? 0.34 : 0.16;
        precipMat.color.set(snowing ? '#ffffff' : '#a9c6e2');
        if (raining || snowing) {
          const p = precipGeo.attributes.position;
          const fall = (snowing ? 6 : 34) * (0.4 + rate * 0.6) * dt;
          // Advected along the true wind vector, not just eastward.
          const drift = state.wind * 0.05 * dt;
          for (let i = 0; i < PRECIP_N; i++) {
            let y = p.getY(i) - fall;
            const wob = snowing ? Math.sin(t / 900 + i) * 0.02 : 0;
            let x = p.getX(i) + windV.x * drift + wob;
            let z = p.getZ(i) + windV.z * drift;
            if (y < 0) y += 45;
            if (x > 45) x -= 90;
            if (x < -45) x += 90;
            if (z > 45) z -= 90;
            if (z < -45) z += 90;
            p.setY(i, y);
            p.setX(i, x);
            p.setZ(i, z);
          }
          p.needsUpdate = true;
        }

        // Physical snow: lazily boot Rapier the first time it really
        // snows, then step the world once per frame.
        if (snowing && !snowSim && !snowLoading && !reduceMotion) initSnowSim();
        if (snowSim) {
          snowSim.world.step();
          let fi = 0;
          for (const body of snowSim.bodies) {
            // The real wind pushes every airborne flake.
            body.resetForces(true);
            body.addForce(
              {
                x: windV.x * state.wind * 0.0004,
                y: 0,
                z: windV.z * state.wind * 0.0004
              },
              true
            );
            const p = body.translation();
            // Settled = genuinely at rest. The per-frame wind force keeps
            // bodies formally awake, so ask the velocity, not sleep state.
            const v = body.linvel();
            const settled =
              body.isSleeping() ||
              Math.hypot(v.x, v.y, v.z) < 0.07 ||
              p.y < sample(p.x, p.z).y + 0.05;
            if (settled) {
              if (snowing) snowSim.deposit(p);
              snowSim.spawn(body);
            } else if (Math.abs(p.x) > 130 || Math.abs(p.z) > 130) {
              snowSim.spawn(body); // blown out of the near field
            } else if (snowing) {
              tmpM4.makeScale(1, 1, 1).setPosition(p.x, p.y, p.z);
              flakeMesh.setMatrixAt(fi++, tmpM4);
            }
          }
          flakeMesh.count = fi;
          flakeMesh.instanceMatrix.needsUpdate = true;
          // Warm real temperatures erode the drifts, oldest first.
          if (state.temp > 1 && snowSim.countD) {
            snowSim.melt += dt * (state.temp - 1) * 1.5;
            while (snowSim.melt > 1 && snowSim.countD) {
              snowSim.melt -= 1;
              snowSim.meltOldest();
            }
          }
        }

        // Trees: an underdamped spring-damper per tree, forced by the
        // real mean wind and the real gust spread, leaning along the
        // true wind direction.
        const meanLean = Math.min(state.wind / 130, 0.5);
        const gustAmp = Math.min(
          Math.max(state.gust - state.wind, 0) / 90,
          0.6
        );
        treeAxis.set(windV.z, 0, -windV.x);
        for (const tree of trees) {
          const u = tree.userData;
          const forcing =
            meanLean +
            gustAmp *
              (0.6 *
                Math.sin(t * 0.0011 + u.phase) *
                Math.sin(t * 0.00043 + u.phase * 2.7) +
                0.4 * Math.sin(t * 0.0027 + u.phase * 1.3));
          u.v += (14 * (forcing - u.a) - 4.2 * u.v) * dt;
          u.a += u.v * dt;
          tree.setRotationFromAxisAngle(treeAxis, u.a);
        }

        // ISS: SGP4-propagated position; drawn only when the pass is
        // genuinely visible (above horizon, sunlit against a dark sky).
        if (satrec && window.satellite) {
          const pv = satellite.propagate(satrec, d);
          if (pv.position) {
            const lk = satellite.ecfToLookAngles(
              {
                latitude: state.lat * RAD,
                longitude: state.lon * RAD,
                height: centerElev / 1000
              },
              satellite.eciToEcf(pv.position, satellite.gstime(d))
            );
            // Cylindrical Earth-shadow test in the equatorial frame.
            const sEq = sunEquatorial(d);
            const sx = Math.cos(sEq.dec) * Math.cos(sEq.ra);
            const sy = Math.cos(sEq.dec) * Math.sin(sEq.ra);
            const sz = Math.sin(sEq.dec);
            const r = pv.position;
            const dp = r.x * sx + r.y * sy + r.z * sz;
            const perp = Math.hypot(
              r.x - dp * sx,
              r.y - dp * sy,
              r.z - dp * sz
            );
            const sunlit = dp > 0 || perp > 6371;
            iss.visible = lk.elevation > 0.09 && sunlit && sun.alt < -0.05;
            if (iss.visible) {
              iss.position.copy(skyPoint(lk.elevation, lk.azimuth, 820));
              if (t - lastPassSaid > 900000) {
                lastPassSaid = t;
                say(
                  'ISS pass · ' +
                    Math.round(lk.rangeSat) +
                    ' km away · real orbit via SGP4'
                );
              }
            }
          }
        }

        let shakeX = 0;
        let shakeY = 0;
        if (state.shake > 0.005 && !reduceMotion) {
          shakeX = (Math.random() - 0.5) * state.shake;
          shakeY = (Math.random() - 0.5) * state.shake * 0.6;
          state.shake *= Math.pow(0.35, dt);
        }

        const equatorYaw = state.lat < 0 ? Math.PI : 0;
        const auroraOn = auroraU.strength.value > 0.04;
        const targetYaw = auroraOn ? Math.PI - equatorYaw : equatorYaw;
        if (!yawInit) {
          yaw = targetYaw;
          yawInit = true;
        }
        yaw += (targetYaw - yaw) * Math.min(dt * 0.4, 1);
        const vx = Math.sin(yaw);
        const vz = Math.cos(yaw);
        const camZ = -26 * vz;
        const camX = -26 * vx;
        // Clear the immediate foreground so the camera never sits with
        // its face in a hillside.
        const baseY =
          Math.max(
            sample(camX, camZ).y,
            sample(camX + 5, camZ).y,
            sample(camX - 5, camZ).y,
            sample(camX, camZ + 5).y,
            sample(camX, camZ - 5).y
          ) + 4.5;
        camBaseY += (baseY - camBaseY) * Math.min(dt * 2, 1);

        camera.position.set(
          camX + look.x * 3 + shakeX,
          camBaseY + look.y * -1.2 + shakeY,
          camZ
        );
        camera.lookAt(
          camX + vx * 66 + look.x * 8,
          camBaseY + 1 + look.y * -5,
          camZ + vz * 66
        );

        if (!panel.hidden) {
          const Ums = state.wind / 3.6;
          live['sun (computed)'] =
            (sun.alt / RAD).toFixed(1) +
            '° alt · ' +
            ((((sun.az / RAD) % 360) + 360) % 360).toFixed(0) +
            '° az';
          live['moon (computed)'] = (moon.alt / RAD).toFixed(1) + '° alt';
          live['sea (Pierson-Moskowitz)'] =
            'Hs ' +
            ((0.21 * Ums * Ums) / 9.81).toFixed(2) +
            ' m · Tp ' +
            (0.7305 * Ums).toFixed(1) +
            ' s · whitecaps ' +
            (3.84e-4 * Math.pow(Ums, 3.41)).toFixed(2) +
            '%';
          live['aurora curtain'] =
            auroraU.strength.value.toFixed(2) + ' strength';
          if (snowSim)
            live['snow (Rapier)'] =
              snowSim.countD +
              ' drift deposits · ' +
              flakeMesh.count +
              ' falling';
        }

        renderer.render(scene, camera);
      }

      (async () => {
        if (document.prerendering) {
          await new Promise((resolve) =>
            document.addEventListener('prerenderingchange', resolve, {
              once: true
            })
          );
        }
        requestAnimationFrame(frame);
        await syncWeather();
        setInterval(syncWeather, 15 * 60 * 1000);
        syncAir();
        setInterval(syncAir, 30 * 60 * 1000);
        syncForests();
        syncKp();
        setInterval(syncKp, 15 * 60 * 1000);
        syncOvation();
        setInterval(syncOvation, 30 * 60 * 1000);
        syncISS();
        setInterval(syncISS, 6 * 60 * 60 * 1000);
        if (params.get('dem') !== '0') {
          try {
            demData = await fetchDEMTiles(state.lat, state.lon);
            buildWorld();
          } catch {
            try {
              demData = await fetchDEM(state.lat, state.lon);
              buildWorld();
            } catch {
              // Keep the procedural fallback silently.
            }
          }
        }
        if (params.has('quake')) {
          setTimeout(() => {
            state.shake = Math.min((+params.get('quake') - 4) * 0.5, 1.2);
            say('M' + params.get('quake') + ' earthquake · debug override');
          }, 1500);
        } else {
          pollQuakes();
          setInterval(pollQuakes, 5 * 60 * 1000);
        }
      })();
    </script>
  </body>
</html>
