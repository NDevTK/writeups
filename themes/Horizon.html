<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Horizon</title>
    <!--
      A 3D landscape where everything shown is real state:
      - the terrain is your terrain: real elevations around the visitor's
        location (AWS terrarium elevation tiles at ~30-90m resolution,
        falling back to the open-meteo elevation API), with sea rendered
        where the sea actually is; shading reads the DEM directly - a
        world-space normal map baked from the heightfield at close to
        full tile resolution lights every pixel with the real hillside
        orientation (the mesh only carries the silhouette)
      - a multiple-scattering atmosphere after Hillaire (2020):
        transmittance, multiple-scattering and per-frame sky-view LUTs
        with Rayleigh, Mie (scaled by the measured AOD) and ozone
        profiles, so twilight structure emerges from the raymarch; an
        aerial-perspective LUT applies the same scattering to the air
        BETWEEN camera and terrain, so distant ridges blue out by
        physics; the sun's terrain light carries its true transmitted
        colour; sun position from astronomy-engine (VSOP87/ELP
        truncations, topocentric, refraction-corrected); Preetham as
        fallback
      - the actual night sky (Yale Bright Star Catalog: 2887 stars with
        real positions, magnitudes and colour temperatures) rotated for
        the latitude and the current sidereal time; the five naked-eye
        planets at their ephemeris positions and magnitudes; the moon
        shows its real phase (lit from the sun's true direction) and its
        real apparent size for today's Earth-Moon distance
      - fog obeys the Koschmieder relation on the MEASURED visibility;
        sun glitter follows Cox & Munk (1954) slope statistics; cloud
        cover renders in the model's real low/mid/high layers, each deck
        riding its own real wind (surface, 700hPa, 250hPa jet); the low
        cumulus deck AND the mid altostratus deck are raymarched
        volumetric cloudscapes after Schneider & Vos (SIGGRAPH 2015):
        Perlin-Worley density carved by the real cover at the real LCL,
        a zero-mean weather map varying that cover across the sky
        without changing it, stratus/cumulus/cumulonimbus height
        profiles picked by the reported WMO code, adaptive
        coarse-to-fine marching, Beer-powder sun lighting, dual-lobe
        Henyey-Greenstein phase - reconstructed temporally exactly as
        shipped in HZD (quarter-res buffer, 1-of-16 Bayer refresh,
        reprojection, golden-ratio jitter integration) with a terrain
        depth prepass so cloud passes IN FRONT of far ridges, and
        nearest-depth upsampling (Jansen & Bavoil 2010) keeping
        silhouettes clean (only thin cirrus stays 2D, as in the
        research)
      - the snowline tracks the real freezing level; the treeline follows
        Körner & Paulsen (2004); deciduous leaves follow Hopkins' law
        (real date, latitude and elevation), so autumn arrives when it
        actually does; surf breaks along the real shallows (McCowan
        H > 0.78d on the terrarium bathymetry)
      - atmospheric optics appear only under their true conditions:
        Descartes rainbows (42/51 deg) opposite a low sun during real
        rain, the 22 deg cirrus halo with low-sun parhelia, star twinkle
        growing with airmass, and real solar eclipses dimming the scene
      - live weather (open-meteo + geojs, both keyless): cloud cover,
        rain, snow, fog, wind-driven sway; fresh snow whitens the ground
        only when it is actually freezing where you are
      - the sea follows oceanography: Pierson-Moskowitz wave height and
        period from the real wind, deep-water dispersion, whitecap
        fraction from Monahan & O'Muircheartaigh, fresnel sun glitter
      - clouds ride the true wind vector at the real lifting condensation
        level; trees are spring-dampers forced by real mean wind and gusts
      - USGS M4.5+ earthquakes arrive at their true seismic travel times
        (P then S), attenuated by real distance
      - aurora follows NOAA's OVATION forecast oval: its real latitude
        sets the curtain's elevation in the sky (Kp heuristic fallback)
      - the ISS crosses the sky via SGP4-propagated live elements, drawn
        only during genuinely visible passes
      - when it snows, flakes are rigid bodies in a real physics engine
        (vendored Rapier): air drag, real wind force, collision with a
        heightfield of the local terrain and with settled flakes, so
        drifts accumulate while the page is open and melt when the real
        temperature rises
      - sky turbidity and haze come from measured air quality (open-meteo
        AOD and PM2.5); trees stand inside the real OSM forest polygons
        around you; the sea is a reflecting three.js Water plane whose
        wave energy follows the real sea state; constellation figures
        (d3-celestial data) ride the same sidereal dome as the stars
      - a data panel (the ✦ wallpaper control, ?debug=1, or the D key)
        lists every live source with its last real value

      Standalone debug overrides (query params, e.g. Horizon.html?time=...):
        lat, lon, time (ISO), cloud (0-100), wind (km/h), winddir (deg),
        gust (km/h), precip (mm), snow (cm), temp (C), dew (C), aod,
        pm25, vis (m), cloudlow/cloudmid/cloudhigh (0-100), code (WMO
        weather code), quake (magnitude), kp (0-9), aurora (0-1),
        auroralat (deg), dem=0 (skip real terrain), debug=1
    -->
    <style>

    <script type="importmap">
      {
        "imports": {
          "three": "./horizon/three.webgpu.min.js",
          "three/webgpu": "./horizon/three.webgpu.min.js",
          "three/tsl": "./horizon/three.tsl.min.js"

  <body>
    <canvas id="gl"></canvas>
    <div id="caption"></div>
    <div id="panel" hidden></div>
    <script src="./horizon/satellite.min.js"></script>
    <script src="./horizon/astronomy.browser.min.js"></script>
    <script type="module">
      import * as THREE from 'three';
      import {sunTransmittanceJS} from './horizon/sun-transmittance.js';
      import {createAtmosphereTSL} from './horizon/atmosphere-tsl.js';
      import {
        createCloudShadowHook,
        createCloudSystemTSL,
        generateCloudTexturesTSL
      } from './horizon/clouds-tsl.js';
      import {createAerialFog} from './horizon/aerial-tsl.js';
      import {createTerrainNodeMaterial} from './horizon/terrain-tsl.js';
      import {ARCHETYPES, fitArchetype, mod09Clear} from './horizon/ross-li.js';
      import {shadowRate, sigmaScale, vRms} from './horizon/cn2.js';
      import {EYE_D_CM, youngSigma} from './horizon/scintillation.js';
      import {buildMomentPyramid, slopesFromHeights} from './horizon/leadr.js';
      import {metresPerPixel, tileAt, windowStats} from './horizon/radar.js';
      import {geomagneticLatitude, igrfField} from './horizon/igrf.js';
      import {HorizonWaterMesh} from './horizon/water-tsl.js';
      import {createOceanFFT} from './horizon/ocean-tsl.js';
      import {peakOmega} from './horizon/ocean-spectrum.js';
      import {
        createVeilMaterial,
        createMoonMaterial,
        createAirglowMaterial,
        createAuroraMaterial,
        createOpticsMaterial,
        createStarSprites,
        createPlanetSprites,
        createPrecipSprites,
        createZodiacalMaterial
      } from './horizon/sky-objects-tsl.js';
      import {lineStrengths} from './horizon/airglow.js';
      import {fR, ZL_OMEGA} from './horizon/zodiacal.js';
      import {CSMShadowNode} from './horizon/CSMShadowNode.js';

      const params = new URL(location.href).searchParams;
      const reduceMotion = matchMedia(
        '(prefers-reduced-motion: reduce)'
      ).matches;
      const timeScale = reduceMotion ? 0.25 : 1;

      // ---------- real time (with optional ?time= override) ----------
      const t0 = performance.now();
      const timeBase = params.has('time')
        ? new Date(params.get('time')).getTime()
        : 0;
      const now = () =>
        timeBase ? new Date(timeBase + (performance.now() - t0)) : new Date();

      // ---------- astronomy (NOAA/Almanac low-precision, ~0.1 deg) ----------
      const RAD = Math.PI / 180;
      const days2000 = (d) => d.getTime() / 86400000 - 10957.5;

      // The sun's geocentric ecliptic longitude (radians) - the same
      // NOAA low-precision series sunEquatorial builds on; the
      // zodiacal light dome is anchored to it.
      function sunEclipticLon(d) {
        const n = days2000(d);
        const L = (280.46 + 0.9856474 * n) % 360;
        const g = (357.528 + 0.9856003 * n) * RAD;
        return (L + 1.915 * Math.sin(g) + 0.02 * Math.sin(2 * g)) * RAD;
      }

      function sunEquatorial(d) {
        const lambda = sunEclipticLon(d);
        const eps = 23.439 * RAD;
        return {
          ra: Math.atan2(Math.cos(eps) * Math.sin(lambda), Math.cos(lambda)),
          dec: Math.asin(Math.sin(eps) * Math.sin(lambda))
        };
      }

      function moonEquatorial(d) {
        const n = days2000(d);
        const L = (218.316 + 13.176396 * n) * RAD;
        const M = (134.963 + 13.064993 * n) * RAD;
        const F = (93.272 + 13.22935 * n) * RAD;
        const lambda = L + 6.289 * RAD * Math.sin(M);
        const beta = 5.128 * RAD * Math.sin(F);
        const eps = 23.439 * RAD;
        return {
          ra: Math.atan2(
            Math.sin(lambda) * Math.cos(eps) - Math.tan(beta) * Math.sin(eps),
            Math.cos(lambda)
          ),
          dec: Math.asin(
            Math.sin(beta) * Math.cos(eps) +
              Math.cos(beta) * Math.sin(eps) * Math.sin(lambda)
          )
        };
      }

      // Greenwich mean sidereal time, radians.
      const gmst = (d) =>
        ((18.697374558 + 24.06570982441908 * days2000(d)) % 24) * 15 * RAD;

      // Equatorial -> local horizontal (altitude/azimuth from north, cw).
      function altAz(eq, d, lat, lon) {
        const lst = gmst(d) + lon * RAD;
        const H = lst - eq.ra;
        const phi = lat * RAD;
        const alt = Math.asin(
          Math.sin(phi) * Math.sin(eq.dec) +
            Math.cos(phi) * Math.cos(eq.dec) * Math.cos(H)
        );
        const az = Math.atan2(
          Math.sin(H),
          Math.cos(H) * Math.sin(phi) - Math.tan(eq.dec) * Math.cos(phi)
        );
        return {alt, az: az + Math.PI}; // 0 = north, clockwise via east
      }

      // Alt/az onto the sky dome. East = +x, north = -z, up = +y.
      const skyPoint = (alt, az, r) =>
        new THREE.Vector3(
          r * Math.cos(alt) * Math.sin(az),
          r * Math.sin(alt),
          -r * Math.cos(alt) * Math.cos(az)
        );

      const haversineKm = (lat1, lon1, lat2, lon2) => {
        const a =
          Math.sin(((lat2 - lat1) * RAD) / 2) ** 2 +
          Math.cos(lat1 * RAD) *
            Math.cos(lat2 * RAD) *
            Math.sin(((lon2 - lon1) * RAD) / 2) ** 2;
        return 12742 * Math.asin(Math.sqrt(a));
      };

      // ---------- state from the real world ----------
      const state = {
        lat: params.has('lat') ? +params.get('lat') : 51.48,
        lon: params.has('lon') ? +params.get('lon') : 0,
        place: '',
        cloud: params.has('cloud') ? +params.get('cloud') : 20,
        wind: params.has('wind') ? +params.get('wind') : 8,
        precip: params.has('precip') ? +params.get('precip') : 0,
        snow: params.has('snow') ? +params.get('snow') : 0,
        temp: params.has('temp') ? +params.get('temp') : 14,
        winddir: params.has('winddir') ? +params.get('winddir') : 250,
        gust: params.has('gust') ? +params.get('gust') : 12,
        dew: params.has('dew') ? +params.get('dew') : 8,
        aod: params.has('aod') ? +params.get('aod') : 0.12,
        pm25: params.has('pm25') ? +params.get('pm25') : 6,
        cloudLow: params.has('cloudlow') ? +params.get('cloudlow') : null,
        cloudMid: params.has('cloudmid') ? +params.get('cloudmid') : null,
        cloudHigh: params.has('cloudhigh') ? +params.get('cloudhigh') : null,
        visibility: params.has('vis') ? +params.get('vis') : 30000,
        wind700: params.has('w700') ? +params.get('w700') : null,
        dir700: params.has('d700') ? +params.get('d700') : null,
        wind250: params.has('w250') ? +params.get('w250') : null,
        dir250: params.has('d250') ? +params.get('d250') : null,
        freezing: params.has('fl') ? +params.get('fl') : null,
        code: params.has('code') ? +params.get('code') : 1,
        kp: params.has('kp') ? +params.get('kp') : 0,
        auroraP: null, // OVATION oval probability 0..1, null = use Kp
        auroraLat: 68,
        sea: null, // measured wave partitions (marine model), null = wind sea
        shake: 0
      };
      // Pinned sea state (harness/debug): hsw/tpw/dww wind-sea Hs (m),
      // peak Tp (s), met direction; hss/tps/dws the swell partition;
      // hstot the total Hs if it differs from the two partitions.
      if (params.has('hsw') || params.has('hss')) {
        const wp = params.has('hsw')
          ? {
              hs: +params.get('hsw'),
              tp: +(params.get('tpw') ?? 6),
              dir: +(params.get('dww') ?? state.winddir)
            }
          : null;
        const sp = params.has('hss')
          ? {
              hs: +params.get('hss'),
              tp: +(params.get('tps') ?? 12),
              dir: +(params.get('dws') ?? state.winddir)
            }
          : null;
        state.sea = {
          hs: params.has('hstot')
            ? +params.get('hstot')
            : Math.hypot(wp ? wp.hs : 0, sp ? sp.hs : 0),
          wind: wp,
          swell: sp
        };
      }
      const overridden = [
        'lat',
        'lon',
        'cloud',
        'wind',
        'precip',
        'snow',
        'temp',
        'winddir',
        'gust',
        'dew',
        'code'
      ].some((k) => params.has(k));

      const caption = document.getElementById('caption');
      let captionTimer = 0;
      function say(text, sticky) {
        caption.textContent = text;
        caption.style.opacity = 1;
        clearTimeout(captionTimer);
        if (!sticky)
          captionTimer = setTimeout(() => (caption.style.opacity = 0), 12000);
      }

      // Every live data source records what it last delivered, so the
      // panel (the site's ✦ wallpaper toggle, or ?debug=1, or the D key)
      // can prove nothing here is invented.
      const sources = {};
      function record(name, value) {
        sources[name] = {value: String(value), at: Date.now()};
      }

      const WMO = {
        0: 'clear',
        1: 'mostly clear',
        2: 'partly cloudy',
        3: 'overcast',
        45: 'fog',
        48: 'rime fog',
        51: 'drizzle',
        53: 'drizzle',
        55: 'drizzle',
        61: 'light rain',
        63: 'rain',
        65: 'heavy rain',
        71: 'light snow',
        73: 'snow',
        75: 'heavy snow',
        77: 'snow grains',
        80: 'showers',
        81: 'showers',
        82: 'heavy showers',
        85: 'snow showers',
        86: 'snow showers',
        95: 'thunderstorm',
        96: 'thunderstorm',
        99: 'thunderstorm'
      };

      async function syncWeather() {
        if (overridden) return;
        try {
          const geo = await (
            await fetch('https://get.geojs.io/v1/ip/geo.json', {
              credentials: 'omit'
            })
          ).json();
          state.lat = +geo.latitude;
          state.lon = +geo.longitude;
          state.place = geo.city || geo.country || '';
          record(
            'geojs.io IP location',
            state.lat.toFixed(2) +
              ', ' +
              state.lon.toFixed(2) +
              ' · ' +
              state.place
          );
        } catch {
          // Keep the Greenwich fallback.
        }
        try {
          const w = await (
            await fetch(
              'https://api.open-meteo.com/v1/forecast?latitude=' +
                state.lat +
                '&longitude=' +
                state.lon +
                '&current=weather_code,cloud_cover,cloud_cover_low,cloud_cover_mid,cloud_cover_high,visibility,precipitation,snowfall,wind_speed_10m,wind_direction_10m,wind_gusts_10m,temperature_2m,dew_point_2m',
              {credentials: 'omit'}
            )
          ).json();
          const c = w.current;
          state.code = c.weather_code;
          state.cloud = c.cloud_cover;
          state.cloudLow = c.cloud_cover_low;
          state.cloudMid = c.cloud_cover_mid;
          state.cloudHigh = c.cloud_cover_high;
          state.visibility = c.visibility || state.visibility;
          state.precip = c.precipitation;
          state.snow = c.snowfall;
          state.wind = c.wind_speed_10m;
          state.winddir = c.wind_direction_10m;
          state.gust = c.wind_gusts_10m;
          state.temp = c.temperature_2m;
          state.dew = c.dew_point_2m;
          record(
            'open-meteo current',
            (WMO[state.code] || state.code) +
              ' · ' +
              state.temp +
              '°C · wind ' +
              state.wind +
              ' km/h from ' +
              state.winddir +
              '° gust ' +
              state.gust +
              ' · cloud ' +
              state.cloud +
              '% · dew ' +
              state.dew +
              '°C'
          );
          say(
            (state.place ? state.place + ' · ' : '') +
              (WMO[state.code] || 'weather code ' + state.code) +
              ' · this scene mirrors your sky and terrain'
          );
        } catch {
          say('weather unavailable · showing a calm day');
        }
      }

      // Winds aloft and the freezing level: mid clouds ride the 700hPa
      // wind, cirrus rides the 250hPa jet, and the snowline on the peaks
      // follows the real 0°C isotherm.
      async function syncAloft() {
        if (params.has('fl') || params.has('w250')) return;
        try {
          // The full 500..50 hPa wind/height profile spans the ITU-R
          // P.1621 5-20 km slab that drives the Hufnagel-Valley
          // turbulence model (cn2.js) for the star scintillation.
          const LV = [500, 400, 300, 250, 200, 150, 100, 70, 50];
          const w = await (
            await fetch(
              'https://api.open-meteo.com/v1/forecast?latitude=' +
                state.lat +
                '&longitude=' +
                state.lon +
                '&hourly=wind_speed_700hPa,wind_direction_700hPa,wind_direction_250hPa,freezing_level_height,' +
                LV.map(
                  (p) =>
                    'wind_speed_' + p + 'hPa,geopotential_height_' + p + 'hPa'
                ).join(',') +
                '&forecast_hours=1',
              {credentials: 'omit'}
            )
          ).json();
          const h = w.hourly;
          state.wind700 = h.wind_speed_700hPa[0];
          state.dir700 = h.wind_direction_700hPa[0];
          state.wind250 = h.wind_speed_250hPa[0];
          state.dir250 = h.wind_direction_250hPa[0];
          state.freezing = h.freezing_level_height[0];
          record(
            'open-meteo winds aloft',
            '700hPa ' +
              state.wind700 +
              ' km/h @' +
              state.dir700 +
              '° · 250hPa jet ' +
              state.wind250 +
              ' km/h @' +
              state.dir250 +
              '° · freezing level ' +
              state.freezing +
              ' m'
          );
          // Heights above ground (geopotential is AMSL), speeds in
          // m/s; the RMS 5-20 km wind sets the HV profile, and the
          // profile sets the twinkle depth and rate.
          const pts = LV.map((p) => ({
            h: h['geopotential_height_' + p + 'hPa'][0] - w.elevation,
            v: h['wind_speed_' + p + 'hPa'][0] / 3.6
          })).filter((q) => Number.isFinite(q.h) && Number.isFinite(q.v));
          const v = vRms(pts);
          if (v) {
            state.cn2Scale = sigmaScale(v);
            state.cn2Rate = shadowRate(pts, v);
            record(
              'Hufnagel-Valley Cn² (winds aloft)',
              'RMS 5-20 km wind ' +
                v.toFixed(1) +
                ' m/s · sigma x' +
                state.cn2Scale.toFixed(2) +
                ' · shadow rate ' +
                state.cn2Rate.toFixed(0) +
                ' Hz'
            );
          }
        } catch {
          // Layers fall back to the surface wind.
        }
      }

      // Real aerosols: the scattering sky's turbidity and the haze come
      // from measured air quality, not guesses.
      async function syncAir() {
        if (params.has('aod') || params.has('pm25')) return;
        try {
          const a = await (
            await fetch(
              'https://air-quality-api.open-meteo.com/v1/air-quality?latitude=' +
                state.lat +
                '&longitude=' +
                state.lon +
                '&current=aerosol_optical_depth,pm2_5',
              {credentials: 'omit'}
            )
          ).json();
          state.aod = a.current.aerosol_optical_depth ?? state.aod;
          state.pm25 = a.current.pm2_5 ?? state.pm25;
          record(
            'open-meteo air quality',
            'AOD ' + state.aod + ' · PM2.5 ' + state.pm25 + ' µg/m³'
          );
        } catch {
          // Keep the temperate defaults.
        }
      }

      // The real sea: measured wave partitions from the marine model
      // (ECMWF WAM under open-meteo) - wind sea and swell each with
      // significant height, PEAK period and direction - drive the FFT
      // spectrum as a measured two-peak composition. Over land the
      // partitions come back null and the fetch-limited wind-sea
      // prediction stands (same spectrum builder, no data - predict).
      const seaDirRad = (deg) => {
        // Met convention: waves come FROM deg; the spectrum wants the
        // world-XZ math angle they travel TOWARD (same convention as
        // dirOf for the wind).
        const a = (deg + 180) * RAD;
        return Math.atan2(-Math.cos(a), Math.sin(a));
      };
      function seaParts() {
        if (!state.sea) return null;
        const parts = [];
        const w = state.sea.wind;
        const s = state.sea.swell;
        if (w && w.hs > 0.01 && w.tp > 0.5) {
          parts.push({
            hs: w.hs,
            tp: w.tp,
            dir: seaDirRad(w.dir),
            U10: Math.max(state.wind / 3.6, 1)
          });
        }
        if (s && s.hs > 0.01 && s.tp > 0.5) {
          parts.push({hs: s.hs, tp: s.tp, dir: seaDirRad(s.dir)});
        }
        return parts.length ? parts : null;
      }
      // Geomagnetic frame at the visitor (IGRF-14, igrf.js):
      // declination steers the aurora curtain azimuth, geomagnetic
      // latitude organises the Kp oval fallback. Pure computation -
      // refresh whenever the location may have moved.
      function syncGeomag() {
        const year = Date.now() / 31557600000 + 1970; // decimal year
        const f = igrfField(state.lat, state.lon, 0, year);
        state.magD = f.d;
        state.magI = f.i;
        state.gmLat = geomagneticLatitude(state.lat, state.lon, year);
        // Field-aligned rays: the curtain shader fans its rays
        // toward the magnetic zenith with tan|I|.
        auroraU.uTanI.value = Math.max(Math.tan(Math.abs(f.i) * RAD), 0.5);
        record(
          'IGRF-14 geomagnetism',
          'declination ' +
            f.d.toFixed(1) +
            '° · inclination ' +
            f.i.toFixed(1) +
            '° · geomagnetic lat ' +
            state.gmLat.toFixed(1) +
            '°'
        );
      }

      async function syncMarine() {
        // Pinned sea, or pinned weather (a live sea would contradict
        // the pinned wind): keep what the URL says.
        if (params.has('hsw') || params.has('hss') || overridden) return;
        try {
          const m = await (
            await fetch(
              'https://marine-api.open-meteo.com/v1/marine?latitude=' +
                state.lat +
                '&longitude=' +
                state.lon +
                '&current=wave_height,wind_wave_height,wind_wave_peak_period,wind_wave_direction,swell_wave_height,swell_wave_peak_period,swell_wave_direction,sea_level_height_msl',
              {credentials: 'omit'}
            )
          ).json();
          const c = m.current;
          // The MEASURED tide (sea level vs MSL, tides + surge):
          // lifts the water plane through the same asinh world
          // mapping the terrain uses and deepens/shoals the surf
          // zone's true depth. Independent of the wave fields -
          // a flat calm still has a tide.
          if (c && typeof c.sea_level_height_msl === 'number') {
            state.tide = c.sea_level_height_msl;
            record(
              'open-meteo tide',
              'sea level ' + c.sea_level_height_msl.toFixed(2) + ' m vs MSL'
            );
          }
          if (c && (c.wind_wave_height || c.swell_wave_height)) {
            state.sea = {
              hs: c.wave_height,
              wind: {
                hs: c.wind_wave_height,
                tp: c.wind_wave_peak_period,
                dir: c.wind_wave_direction
              },
              swell: {
                hs: c.swell_wave_height,
                tp: c.swell_wave_peak_period,
                dir: c.swell_wave_direction
              }
            };
            record(
              'open-meteo marine',
              'Hs ' +
                c.wave_height +
                ' m · wind sea ' +
                c.wind_wave_height +
                ' m @' +
                c.wind_wave_peak_period +
                ' s · swell ' +
                c.swell_wave_height +
                ' m @' +
                c.swell_wave_peak_period +
                ' s from ' +
                c.swell_wave_direction +
                '°'
            );
          } else {
            state.sea = null;
          }
        } catch {
          // Keep the wind-sea prediction.
        }
      }

      // MEASURED precipitation: the latest RainViewer radar composite
      // decoded at the visitor (radar.js - their black-and-white dBZ
      // tile scheme; Marshall & Palmer 1948 Z-R for rain, Sekhon &
      // Srivastava 1970 for the snow-flagged pixels). Radar is a
      // measurement with ~10-minute latency; when fresh it replaces
      // the model's point value. No coverage or offline: the model
      // stands silently.
      let radarObs = null; // {rain, snow, coverage, snowFrac, time}
      async function syncRadar() {
        if (overridden) return;
        try {
          const cat = await (
            await fetch('https://api.rainviewer.com/public/weather-maps.json', {
              credentials: 'omit'
            })
          ).json();
          const frames = cat.radar && cat.radar.past;
          if (!frames || !frames.length) return;
          const f = frames[frames.length - 1];
          const {tx, ty, px, py} = tileAt(state.lat, state.lon, 8);
          const img = new Image();
          img.crossOrigin = 'anonymous';
          img.src =
            cat.host + f.path + '/256/8/' + tx + '/' + ty + '/0/0_0.png';
          await img.decode();
          const cv = document.createElement('canvas');
          cv.width = cv.height = 256;
          const cx = cv.getContext('2d', {willReadFrequently: true});
          cx.drawImage(img, 0, 0);
          const data = cx.getImageData(0, 0, 256, 256).data;
          // window sized to the 16 km world footprint
          const h = Math.max(
            Math.round(8000 / metresPerPixel(state.lat, 8)),
            1
          );
          const s = windowStats(data, px, py, h);
          radarObs = {...s, time: f.time * 1000};
          // The measured coverage field for the cloud decks (the
          // Nubis weather map, from data): precip at a texel means
          // cloud overhead - map the local rate onto a coverage
          // value with the drizzle floor as threshold. Zero border
          // ring so the field fades at the world edge.
          const RM = 64;
          const field = new Float32Array(RM * RM * 4);
          const mppScene = metresPerPixel(state.lat, 8) / 57.14;
          for (let jj = 0; jj < RM; jj++) {
            for (let ii = 0; ii < RM; ii++) {
              const k = (jj * RM + ii) * 4;
              field[k + 3] = 1;
              if (ii === 0 || jj === 0 || ii === RM - 1 || jj === RM - 1)
                continue;
              const xs = ((ii + 0.5) / RM - 0.5) * WORLD; // scene units
              const zs = ((jj + 0.5) / RM - 0.5) * WORLD;
              const pi = Math.round(px + xs / mppScene);
              const pj = Math.round(py + zs / mppScene);
              if (pi < 0 || pi > 255 || pj < 0 || pj > 255) continue;
              const kk = (pj * 256 + pi) * 4;
              if (data[kk + 3] === 0) continue;
              const dec = decodeRed(data[kk]);
              const rate = dec.snow ? snowRate(dec.dbz) : rainRate(dec.dbz);
              // >0.05 mm/h (below drizzle nothing shows on radar
              // reliably); saturate toward 0.95 local cover by 1 mm/h
              field[k] = 0.95 * THREE.MathUtils.smoothstep(rate, 0.05, 1.0);
            }
          }
          radarObs.field = field;
          radarObs.fieldSize = RM;
          if (cloudSys) cloudSys.setRadarCover(field, RM, WORLD);
          record(
            'RainViewer radar',
            (s.coverage > 0.05
              ? 'rain ' +
                s.rain.toFixed(2) +
                ' mm/h · snow ' +
                s.snow.toFixed(2) +
                ' mm/h liq · ' +
                Math.round(s.snowFrac * 100) +
                '% snow px'
              : 'no radar coverage here') +
              ' · ' +
              Math.round((Date.now() - radarObs.time) / 60000) +
              ' min old'
          );
        } catch {
          // Keep the model's precipitation.
        }
      }

      // Real forests: OSM wood/forest polygons around the visitor decide
      // where trees stand (scene-space polygons, cached per location).
      let forestPolys = null;
      async function syncForests() {
        const key =
          'horizon-forest-' + state.lat.toFixed(2) + ',' + state.lon.toFixed(2);
        try {
          const hit = localStorage.getItem(key);
          if (hit) {
            forestPolys = JSON.parse(hit);
            record(
              'OSM Overpass forests (cached)',
              forestPolys.length + ' wood polygons'
            );
            buildWorld();
            return;
          }
        } catch {}
        try {
          const mLat = 111320;
          const mLon = Math.max(111320 * Math.cos(state.lat * RAD), 1e-6);
          const dLat = DEM_HALF_M / mLat;
          const dLon = DEM_HALF_M / mLon;
          const bbox =
            (state.lat - dLat).toFixed(4) +
            ',' +
            (state.lon - dLon).toFixed(4) +
            ',' +
            (state.lat + dLat).toFixed(4) +
            ',' +
            (state.lon + dLon).toFixed(4);
          const q =
            '[out:json][timeout:25];(way[natural=wood](' +
            bbox +
            ');way[landuse=forest](' +
            bbox +
            '););out geom 120;';
          // The mail.ru mirror is faster (Surveillance.html uses it too);
          // the main overpass-api.de instance is the fallback.
          let osm = null;
          for (const host of [
            'https://maps.mail.ru/osm/tools/overpass/api/interpreter',
            'https://overpass-api.de/api/interpreter'
          ]) {
            try {
              const r = await fetch(host + '?data=' + encodeURIComponent(q), {
                credentials: 'omit'
              });
              if (!r.ok) throw new Error(r.status);
              osm = await r.json();
              break;
            } catch {
              // Try the next mirror.
            }
          }
          if (!osm) throw new Error('overpass unavailable');
          forestPolys = osm.elements
            .filter((w) => w.geometry && w.geometry.length > 3)
            .map((w) =>
              w.geometry.map((g) => [
                +(((g.lon - state.lon) / (2 * dLon)) * WORLD).toFixed(1),
                +((-(g.lat - state.lat) / (2 * dLat)) * WORLD).toFixed(1)
              ])
            );
          record('OSM Overpass forests', forestPolys.length + ' wood polygons');
          try {
            localStorage.setItem(key, JSON.stringify(forestPolys));
          } catch {}
          buildWorld(); // replant where the real woods are
        } catch {
          forestPolys = null; // procedural scatter stays
        }
      }

      // Surface BRDF: the visitor pixel's own multi-angular MODIS
      // reflectance record (MOD09A1 8-day surface reflectance with
      // per-composite sun/view geometry, ORNL subset REST API, 60
      // composites = ~16 months of Terra cross-track sampling - the
      // archetype papers fit multi-year records per location)
      // selects one of the six global RTLSR BRDF archetypes (Zhang,
      // Jiao et al. 2016) by the published minimum-fitting-error
      // rule (Jiao et al. 2014). The terrain's vegetation then
      // carries that archetype's Ross-Li anisotropy: hotspot
      // brightening opposite the sun, shadow-driven darkening into
      // it. Too few strictly-clear looks (ocean, polar night,
      // persistent cloud - the state-word QC keeps only cloud-,
      // shadow-, snow- and heavy-aerosol-free land) leaves the
      // grass Lambertian, and says so.
      async function syncBrdf() {
        const key =
          'horizon-brdf-' + state.lat.toFixed(2) + ',' + state.lon.toFixed(2);
        const apply = (fit, n, cached) => {
          const w = ARCHETYPES.red[fit.k];
          terrainUniforms.uRossW.value.set(w.iso, w.vol, w.geo);
          terrainUniforms.uRossOn.value = 1;
          record(
            'MODIS MOD09A1 BRDF' + (cached ? ' (cached)' : ''),
            'archetype A' +
              (fit.k + 1) +
              ' red, ' +
              n +
              ' clear obs, rmse ' +
              fit.rmse.toFixed(4)
          );
        };
        // Debug override (the harness page is offline): ?brdf=N pins
        // archetype A_N directly, N in 1..6.
        if (params.has('brdf')) {
          const k = THREE.MathUtils.clamp((+params.get('brdf') || 1) - 1, 0, 5);
          apply({k, rmse: 0}, 0, false);
          return;
        }
        try {
          const hit = JSON.parse(localStorage.getItem(key));
          // One MOD09A1 compositing period is 8 days.
          if (hit && Date.now() - hit.t < 8 * 864e5) {
            apply(hit.fit, hit.n, true);
            return;
          }
        } catch {}
        try {
          const base = 'https://modis.ornl.gov/rst/api/v1/MOD09A1';
          const q = 'latitude=' + state.lat + '&longitude=' + state.lon;
          const dr = await (
            await fetch(base + '/dates?' + q, {credentials: 'omit'})
          ).json();
          if (!Array.isArray(dr.dates)) return;
          const md = dr.dates.map((d) => d.modis_date).slice(-60);
          const obs = [];
          // The subset endpoint caps one request at 10 composites.
          for (let i = 0; i < md.length; i += 10) {
            const span =
              '&startDate=' +
              md[i] +
              '&endDate=' +
              md[Math.min(i + 9, md.length - 1)];
            const rs = await Promise.all(
              ['b01', 'szen', 'vzen', 'raz', 'state_500m'].map((b) =>
                fetch(
                  base +
                    '/subset?' +
                    q +
                    '&band=sur_refl_' +
                    b +
                    span +
                    '&kmAboveBelow=0&kmLeftRight=0',
                  {credentials: 'omit'}
                ).then((r) => r.json())
              )
            );
            for (let j = 0; j < rs[0].subset.length; j++) {
              const [r, sz, vz, ra, st] = rs.map((x) => x.subset[j].data[0]);
              const refl = r * 1e-4; // stored scale 0.0001
              if (!mod09Clear(st) || refl <= 0 || refl > 1) continue;
              obs.push({
                r: refl,
                ti: sz * 0.01 * RAD, // angles stored in 0.01 deg
                tv: vz * 0.01 * RAD,
                phi: ra * 0.01 * RAD
              });
            }
          }
          const fit = fitArchetype(obs, 'red');
          if (!fit) {
            // Too few clear looks: Lambertian stays - and the panel
            // proves the source was consulted, not skipped.
            record(
              'MODIS MOD09A1 BRDF',
              obs.length + ' clear obs of 60 - Lambertian fallback'
            );
            return;
          }
          apply(fit, obs.length, false);
          try {
            localStorage.setItem(
              key,
              JSON.stringify({t: Date.now(), fit, n: obs.length})
            );
          } catch {}
        } catch {
          // Lambertian grass stays.
        }
      }

      function inForest(x, z) {
        if (!forestPolys || !forestPolys.length) return true;
        for (const poly of forestPolys) {
          let inside = false;
          for (let i = 0, j = poly.length - 1; i < poly.length; j = i++) {
            const xi = poly[i][0];
            const zi = poly[i][1];
            const xj = poly[j][0];
            const zj = poly[j][1];
            if (
              zi > z !== zj > z &&
              x < ((xj - xi) * (z - zi)) / (zj - zi) + xi
            )
              inside = !inside;
          }
          if (inside) return true;
        }
        return false;
      }

      // Solar 10.7 cm radio flux (NOAA SWPC): drives the airglow
      // line intensities via PALACE Eq. 1. PALACE regressed on
      // centred 27-day averages; live we take the trailing 27-day
      // mean of the SWPC feed (~3 reports/day, newest first).
      async function syncF107() {
        if (params.has('f107')) {
          airglowU.uLineI.value.fromArray(lineStrengths(+params.get('f107')));
          return;
        }
        try {
          const rows = await (
            await fetch(
              'https://services.swpc.noaa.gov/json/f107_cm_flux.json',
              {credentials: 'omit'}
            )
          ).json();
          const fs = rows
            .slice(0, 81)
            .map((r) => +r.flux)
            .filter((f) => f > 0);
          if (!fs.length) return;
          const srf = fs.reduce((a, b) => a + b, 0) / fs.length;
          state.f107 = srf;
          airglowU.uLineI.value.fromArray(lineStrengths(srf));
          record(
            'NOAA SWPC F10.7',
            srf.toFixed(0) +
              ' sfu (27-day mean) · airglow lines x' +
              (1 + 0.00754 * (srf - 100)).toFixed(2)
          );
        } catch {
          // The 100 sfu PALACE reference intensities stay.
        }
      }

      async function syncKp() {
        if (params.has('kp')) return;
        try {
          const rows = await (
            await fetch(
              'https://services.swpc.noaa.gov/json/planetary_k_index_1m.json',
              {credentials: 'omit'}
            )
          ).json();
          state.kp = +rows[rows.length - 1].estimated_kp || 0;
          record('NOAA SWPC planetary K-index', state.kp.toFixed(2));
        } catch {
          state.kp = 0;
        }
      }

      // NOAA's OVATION model: the actual forecast auroral oval. We take
      // the strongest probability near our meridian on our hemisphere,
      // and where it sits decides the curtain's true elevation in the
      // sky (overhead if the oval reaches our latitude).
      async function syncOvation() {
        if (params.has('aurora')) {
          state.auroraP = +params.get('aurora');
          state.auroraLat = params.has('auroralat')
            ? +params.get('auroralat')
            : state.lat + 6;
          return;
        }
        try {
          const o = await (
            await fetch(
              'https://services.swpc.noaa.gov/json/ovation_aurora_latest.json',
              {credentials: 'omit'}
            )
          ).json();
          const myLon = ((state.lon % 360) + 360) % 360;
          const south = state.lat < 0;
          let best = 0;
          let bestLat = south ? -68 : 68;
          for (const [lon, la, val] of o.coordinates) {
            if (south ? la > -40 : la < 40) continue;
            let dl = Math.abs(lon - myLon);
            if (dl > 180) dl = 360 - dl;
            if (dl > 3) continue;
            if (val > best) {
              best = val;
              bestLat = la;
            }
          }
          state.auroraP = best / 100;
          state.auroraLat = bestLat;
          record(
            'NOAA OVATION aurora oval',
            best + '% at lat ' + bestLat + '° on this meridian'
          );
        } catch {
          state.auroraP = null; // fall back to the Kp heuristic
        }
      }

      const seenQuakes = new Set();
      let firstQuakePoll = true;
      async function pollQuakes() {
        try {
          const q = await (
            await fetch(
              'https://earthquake.usgs.gov/earthquakes/feed/v1.0/summary/4.5_day.geojson',
              {credentials: 'omit'}
            )
          ).json();
          for (const f of q.features) {
            if (seenQuakes.has(f.id)) continue;
            seenQuakes.add(f.id);
            if (firstQuakePoll) continue; // only rumble live events
            // Real distance decides how hard it shakes here - and real
            // seismology decides WHEN. Waves are not instant: P-waves
            // average ~7.8 km/s and the stronger S-waves ~4.4 km/s, so
            // each arrival is scheduled at its true travel time (unless
            // feed latency means it already passed).
            const [qlon, qlat] = f.geometry.coordinates;
            const km = haversineKm(state.lat, state.lon, qlat, qlon);
            const atten = Math.max(Math.exp(-km / 2500), 0.04);
            const mag = f.properties.mag;
            const elapsed = (Date.now() - f.properties.time) / 1000;
            const pDelay = km / 7.8 - elapsed;
            const sDelay = km / 4.4 - elapsed;
            if (sDelay < -120) continue; // shaking here is long over
            const jolt = (amp) => {
              state.shake = Math.max(
                state.shake,
                Math.min((mag - 4) * 0.5 * atten * amp, 1.2)
              );
            };
            if (pDelay > 0) setTimeout(() => jolt(0.35), pDelay * 1000);
            if (sDelay > 0) setTimeout(() => jolt(1), sDelay * 1000);
            else jolt(1);
            say(
              'M' +
                mag.toFixed(1) +
                ' earthquake · ' +
                Math.round(km).toLocaleString('en') +
                ' km away · ' +
                (sDelay > 5
                  ? 'S-wave arrives in ' + Math.round(sDelay) + 's · '
                  : '') +
                f.properties.place
            );
          }
          firstQuakePoll = false;
          record('USGS M4.5+ quake feed', q.features.length + ' events today');
        } catch {
          // Silent: quakes are garnish, not the meal.
        }
      }

      // ---------- real terrain (open-meteo elevation, Copernicus DEM) ----------
      // 24x24 real elevations spanning 16km around the visitor, cached per
      // rounded location. The mesh gets macro relief from the DEM and only
      // fine detail from noise, so the landscape is recognisably *yours*.
      const DEM_N = 24;
      const DEM_HALF_M = 8000;
      const WORLD = 280; // scene units across; ~57 m per unit

      // Primary source: AWS terrarium tiles (Mapzen open data). Elevation
      // is PNG-encoded as (R*256 + G + B/256) - 32768, CORS-open, so a
      // stitched canvas gives ~30-90m real elevations in a few requests.
      // Kept at full pixel resolution (no downsampled cache: the browser's
      // HTTP cache already holds the tiles themselves).
      async function fetchDEMTiles(lat, lon) {
        const z = Math.max(
          8,
          Math.min(
            13,
            Math.round(Math.log2((40075000 * Math.cos(lat * RAD)) / 8000))
          )
        );
        const world = 2 ** z * 256; // global pixels at this zoom
        const px = (lo) => ((lo + 180) / 360) * world;
        const py = (la) => {
          const r = la * RAD;
          return (
            ((1 - Math.log(Math.tan(r) + 1 / Math.cos(r)) / Math.PI) / 2) *
            world
          );
        };
        const mLat = 111320;
        const mLon = Math.max(111320 * Math.cos(lat * RAD), 1e-6);
        const dLat = DEM_HALF_M / mLat;
        const dLon = DEM_HALF_M / mLon;
        const x0 = Math.floor(px(lon - dLon) / 256);
        const x1 = Math.floor(px(lon + dLon) / 256);
        const y0 = Math.floor(py(lat + dLat) / 256);
        const y1 = Math.floor(py(lat - dLat) / 256);
        if ((x1 - x0 + 1) * (y1 - y0 + 1) > 12)
          throw new Error('tile span too large');
        const canvas = document.createElement('canvas');
        canvas.width = (x1 - x0 + 1) * 256;
        canvas.height = (y1 - y0 + 1) * 256;
        const ctx = canvas.getContext('2d', {willReadFrequently: true});
        const jobs = [];
        for (let ty = y0; ty <= y1; ty++)
          for (let tx = x0; tx <= x1; tx++)
            jobs.push(
              new Promise((resolve, reject) => {
                const img = new Image();
                img.crossOrigin = 'anonymous';
                img.onload = () => {
                  ctx.drawImage(img, (tx - x0) * 256, (ty - y0) * 256);
                  resolve();
                };
                img.onerror = reject;
                img.src =
                  'https://s3.amazonaws.com/elevation-tiles-prod/terrarium/' +
                  z +
                  '/' +
                  tx +
                  '/' +
                  ty +
                  '.png';
              })
            );
        await Promise.all(jobs);
        const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
        const elev = new Float32Array(canvas.width * canvas.height);
        for (let k = 0; k < elev.length; k++)
          elev[k] =
            data[k * 4] * 256 + data[k * 4 + 1] + data[k * 4 + 2] / 256 - 32768;
        record(
          'AWS terrarium DEM tiles',
          jobs.length +
            ' tiles at z' +
            z +
            ' · ' +
            canvas.width +
            'x' +
            canvas.height +
            ' px'
        );
        return {
          kind: 'img',
          w: canvas.width,
          h: canvas.height,
          elev,
          ox: x0 * 256,
          oy: y0 * 256,
          worldPx: world,
          lat,
          lon,
          dLat,
          dLon
        };
      }

      async function fetchDEM(lat, lon) {
        const key = 'horizon-dem-om-' + lat.toFixed(2) + ',' + lon.toFixed(2);
        try {
          const hit = localStorage.getItem(key);
          if (hit) return JSON.parse(hit);
        } catch {}
        const mLat = 111320;
        const mLon = Math.max(111320 * Math.cos(lat * RAD), 1e-6);
        const lats = [];
        const lons = [];
        for (let j = 0; j < DEM_N; j++)
          for (let i = 0; i < DEM_N; i++) {
            lats.push(
              (lat + ((j / (DEM_N - 1) - 0.5) * 2 * DEM_HALF_M) / mLat).toFixed(
                4
              )
            );
            lons.push(
              (lon + ((i / (DEM_N - 1) - 0.5) * 2 * DEM_HALF_M) / mLon).toFixed(
                4
              )
            );
          }
        const grid = [];
        for (let o = 0; o < DEM_N * DEM_N; o += 96) {
          const r = await fetch(
            'https://api.open-meteo.com/v1/elevation?latitude=' +
              lats.slice(o, o + 96).join(',') +
              '&longitude=' +
              lons.slice(o, o + 96).join(','),
            {credentials: 'omit'}
          );
          if (!r.ok) throw new Error(r.status);
          grid.push(...(await r.json()).elevation);
        }
        const dem = {n: DEM_N, grid};
        record(
          'open-meteo elevation API',
          DEM_N + 'x' + DEM_N + ' grid (fallback)'
        );
        try {
          localStorage.setItem(key, JSON.stringify(dem));
        } catch {}
        return dem;
      }

      // ---------- scene ----------
      const canvas = document.getElementById('gl');
      // WebGPU-only build: every GPU pass is a compute kernel over
      // storage textures (the WebGL2-backend raster drivers were
      // deleted). Browsers without WebGPU get a plain caption.
      if (!navigator.gpu) {
        document.getElementById('caption').textContent =
          'this wallpaper needs WebGPU - current Chrome, Edge, Firefox or Safari';
        throw new Error('WebGPU unavailable');
      }
      const renderer = new THREE.WebGPURenderer({
        canvas,
        forceWebGL: false,
        antialias: true
      });
      renderer.setPixelRatio(Math.min(devicePixelRatio, 1.5));
      await renderer.init();
      if (!renderer.backend.isWebGPUBackend) {
        document.getElementById('caption').textContent =
          'this wallpaper needs WebGPU - the adapter request failed';
        throw new Error('WebGPU adapter unavailable');
      }
      // The renderer's own output transform stays identity: AgX (Sobotka;
      // Blender 4's default view transform - better hue preservation
      // toward clipping than ACES) and the sRGB encode are applied
      // per-material by the shared output hooks in aerial-tsl, in the
      // same order the classic chunk pipeline ran them, so raw-output
      // passes (the atmosphere dome, the sky objects, the cloud
      // composite) stay raw exactly as they shipped.
      renderer.toneMapping = THREE.NoToneMapping;
      renderer.outputColorSpace = THREE.LinearSRGBColorSpace;
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;
      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(55, 1, 0.1, 2000);
      camera.layers.enable(2);

      // Cascaded shadow maps (vendored three.js CSMShadowNode: practical
      // split scheme after Zhang et al. 2006) as a shadow node on ONE
      // real sun light - cascades split the shadow frustum without
      // mirrored cascade lights. Its colour/intensity come from the CPU
      // transmittance mirror each frame.
      const sunLight = new THREE.DirectionalLight(0xffffff, 1);
      sunLight.castShadow = true;
      const shadowRes = innerWidth < 800 ? 1024 : 2048;
      sunLight.shadow.mapSize.set(shadowRes, shadowRes);
      sunLight.shadow.bias = -0.0004;
      sunLight.shadow.normalBias = 1.5;
      sunLight.shadow.camera.near = 1;
      sunLight.shadow.camera.far = 800;
      const csm = new CSMShadowNode(sunLight, {
        cascades: 3,
        maxFar: 460,
        mode: 'practical',
        lightMargin: 150
      });
      csm.fade = true;
      sunLight.shadow.shadowNode = csm;
      scene.add(sunLight);
      scene.add(sunLight.target);
      record('Cascaded shadow maps', '3 cascades · practical splits (CSM)');

      let sizeCloudTargets = null;
      function resize() {
        renderer.setSize(innerWidth, innerHeight);
        camera.aspect = innerWidth / innerHeight;
        camera.updateProjectionMatrix();
        // The CSM shadow node binds its camera on first render.
        if (csm.camera) csm.updateFrustums();
        if (sizeCloudTargets) sizeCloudTargets();
      }
      addEventListener('resize', resize);
      resize();

      // Ambient is a hemisphere fed by the REAL sky: the atmosphere pass
      // integrates its own sky-view LUT (cosine-weighted) and the result
      // is read back at 1 Hz - twilight blues, overcast greys and sunset
      // warmth arrive from the raymarch, not from a tuned formula. The
      // ground half is that irradiance bounced off an estimated terrain
      // albedo (0.25 grass/rock, 0.7 snow - the one disclosed estimate).
      const ambient = new THREE.HemisphereLight(0xffffff, 0x404038, 0.5);
      scene.add(ambient);

      // The sky: Hillaire (2020) multiple-scattering atmosphere -
      // transmittance, multiple-scattering and per-frame sky-view LUTs
      // with Rayleigh, Mie (scaled by measured AOD) and ozone profiles.
      // Twilight arch and the Belt of Venus emerge from the raymarch
      // instead of being painted.
      const atmo = createAtmosphereTSL(renderer);
      if (atmo.ok) {
        scene.add(atmo.mesh);
        record(
          'Hillaire (2020) atmosphere',
          'multiple-scattering LUTs · ozone · AOD-scaled Mie'
        );
      } else {
        record('atmosphere unavailable', 'no float render targets');
      }

      // Aerial perspective (Hillaire 2020, sec. 5.2): the atmosphere
      // BETWEEN the camera and every surface. atmosphere-tsl marches a
      // 64x32 LUT of inscattered radiance and mean transmittance over
      // (relative azimuth x distance), and every world material swaps
      // three.js' colour-only fog input for it - distant ridges turn
      // blue by scattering physics, then the Koschmieder haze (which
      // carries the MEASURED visibility) applies on top.
      function dummyTex(bytes) {
        const t = new THREE.DataTexture(
          new Uint8Array(bytes),
          1,
          1,
          THREE.RGBAFormat
        );
        t.needsUpdate = true;
        return t;
      }
      const aerial = createAerialFog(
        atmo.ok ? atmo.aerialTex : dummyTex([0, 0, 0, 255])
      );
      const aerialU = aerial.uniforms;
      aerialU.uAerialMaxU.value = atmo.ok ? atmo.aerialMaxUnits : 1;
      aerialU.uAerialOn.value = atmo.ok ? 1 : 0;
      const applyAerial = (mat) => aerial.apply(mat);
      if (atmo.ok) {
        record(
          'Aerial perspective LUT',
          'per-pixel inscatter + transmittance on every material'
        );
        record(
          'Sky-irradiance ambient',
          'hemisphere light integrated from the sky-view LUT'
        );
      }
      const skyIrr = new THREE.Color(0.05, 0.07, 0.1);
      const tmpC = new THREE.Color();
      let lastIrrT = -1e9;
      // The irradiance readback is async on WebGPURenderer (no
      // pipeline stall); until the first read resolves, skyIrr is a
      // guess. Systems with TEMPORAL HISTORY (the cloud buffer) must
      // not integrate lighting built on that guess - the 8%%/frame
      // exponential blend takes hundreds of frames to forget it.
      let skyIrrReady = !atmo.ok;

      // Overcast veil: a translucent grey dome that fades in with real
      // cloud cover (the scattering model alone stays too blue).
      const veilObj = createVeilMaterial();
      const veilU = veilObj.u;
      const veil = new THREE.Mesh(
        new THREE.SphereGeometry(600, 24, 16),
        veilObj.material
      );
      veil.renderOrder = -1;
      scene.add(veil);

      // ---------- terrain ----------
      function mulberry32(a) {
        return () => {
          a |= 0;
          a = (a + 0x6d2b79f5) | 0;
          let t = Math.imul(a ^ (a >>> 15), 1 | a);
          t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
          return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
        };
      }
      const rand = mulberry32(20260704);
      const gridN = 48;
      const grid = Array.from({length: gridN * gridN}, rand);
      const lerp = (a, b, t) => a + (b - a) * t;
      const smooth = (t) => t * t * (3 - 2 * t);
      function noise2(x, y) {
        const xi = Math.floor(x),
          yi = Math.floor(y);
        const g = (ix, iy) =>
          grid[
            (((iy % gridN) + gridN) % gridN) * gridN +
              (((ix % gridN) + gridN) % gridN)
          ];
        const tx = smooth(x - xi),
          ty = smooth(y - yi);
        return lerp(
          lerp(g(xi, yi), g(xi + 1, yi), tx),
          lerp(g(xi, yi + 1), g(xi + 1, yi + 1), tx),
          ty
        );
      }
      const fbm = (x, y) =>
        0.55 * noise2(x, y) +
        0.27 * noise2(x * 2.1 + 13, y * 2.1 + 7) +
        0.13 * noise2(x * 4.3 + 41, y * 4.3 + 3) +
        0.05 * noise2(x * 8.9 + 5, y * 8.9 + 59);

      // Fallback height model when the DEM is unavailable: domain-warped
      // fBm, in real metres so the colouring logic stays unified.
      function proceduralElev(x, z) {
        const wx = x / 90 + 1.7 * fbm(x / 60 + 31, z / 60 + 17);
        const wz = z / 90 + 1.7 * fbm(x / 60 + 3, z / 60 + 47);
        const ridged = 1 - Math.abs(2 * fbm(wx, wz) - 1);
        return 90 + 700 * ridged * ridged + 260 * fbm(x / 40, z / 40);
      }

      let demData = null; // full-res tile image or {n, grid} API fallback
      function demElev(x, z) {
        if (demData.kind === 'img') {
          // Scene x/z -> lat/lon -> mercator pixel, bilinear on the tiles.
          const la = demData.lat - (z / WORLD) * 2 * demData.dLat;
          const lo = demData.lon + (x / WORLD) * 2 * demData.dLon;
          const r = la * RAD;
          const gx = THREE.MathUtils.clamp(
            ((lo + 180) / 360) * demData.worldPx - demData.ox,
            0,
            demData.w - 1.001
          );
          const gy = THREE.MathUtils.clamp(
            ((1 - Math.log(Math.tan(r) + 1 / Math.cos(r)) / Math.PI) / 2) *
              demData.worldPx -
              demData.oy,
            0,
            demData.h - 1.001
          );
          const i = Math.floor(gx);
          const j = Math.floor(gy);
          const e = demData.elev;
          const w = demData.w;
          return lerp(
            lerp(e[j * w + i], e[j * w + i + 1], gx - i),
            lerp(e[(j + 1) * w + i], e[(j + 1) * w + i + 1], gx - i),
            gy - j
          );
        }
        // x east, z south, in scene units -> bilinear over the DEM grid.
        const N = demData.n;
        const u = THREE.MathUtils.clamp(x / WORLD + 0.5, 0, 1) * (N - 1);
        const v = THREE.MathUtils.clamp(1 - (z / WORLD + 0.5), 0, 1) * (N - 1);
        const i = Math.min(Math.floor(u), N - 2);
        const j = Math.min(Math.floor(v), N - 2);
        const g = demData.grid;
        const e00 = g[j * N + i];
        const e10 = g[j * N + i + 1];
        const e01 = g[(j + 1) * N + i];
        const e11 = g[(j + 1) * N + i + 1];
        return lerp(lerp(e00, e10, u - i), lerp(e01, e11, u - i), v - j);
      }

      let centerElev = 300;
      function sample(x, z) {
        const e = demData ? demElev(x, z) : proceduralElev(x, z);
        const water = demData && e <= 0.3;
        // Real metres compressed onto the scene: asinh keeps flatlands
        // honest while alpine relief still towers.
        let y = 16 * Math.asinh((e - centerElev) / 500);
        if (water) y = 16 * Math.asinh((0 - centerElev) / 500) - 0.6;
        else {
          // With 30m tile data the noise is only seasoning; the coarse
          // fallbacks need more of it to avoid reading as blobs.
          const micro = demData && demData.kind === 'img' ? 0.5 : 1.6;
          y += micro * (fbm(x / 7, z / 7) - 0.5);
        }
        return {e, y, water};
      }

      const ground = new THREE.Group();
      scene.add(ground);
      // Tree archetypes (shared geometry, per-tree scale): conifers for
      // the subalpine band, broadleaves lower down.
      // GGX standard materials: bark and foliage are near-diffuse
      // (roughness ~1), which the microfacet model represents honestly
      // instead of Lambert's zero specular.
      const trunkMat = new THREE.MeshStandardNodeMaterial({
        color: '#6b4a33',
        roughness: 0.9,
        metalness: 0
      });
      const leafMats = [
        new THREE.MeshStandardNodeMaterial({color: '#2e5230', roughness: 1}),
        new THREE.MeshStandardNodeMaterial({color: '#3f6b3a', roughness: 1}),
        new THREE.MeshStandardNodeMaterial({color: '#4d7a35', roughness: 1})
      ];
      const broadMats = [
        new THREE.MeshStandardNodeMaterial({color: '#4a7d33', roughness: 1}),
        new THREE.MeshStandardNodeMaterial({color: '#5d8a3c', roughness: 1})
      ];
      [trunkMat, ...leafMats, ...broadMats].forEach((m) => applyAerial(m));
      const geoTrunk = new THREE.CylinderGeometry(0.13, 0.2, 1.1, 7);
      const geoCone1 = new THREE.ConeGeometry(1.15, 2.3, 10);
      const geoCone2 = new THREE.ConeGeometry(0.82, 1.8, 10);
      // Broadleaf crowns: an indexed sphere displaced by a smooth
      // position-hashed field (same offset for co-located verts, so
      // averaged normals stay smooth), instead of a faceted icosahedron.
      const geoCanopy = new THREE.SphereGeometry(1.25, 14, 10);
      {
        const cp = geoCanopy.attributes.position;
        const cv = new THREE.Vector3();
        for (let i = 0; i < cp.count; i++) {
          cv.fromBufferAttribute(cp, i);
          const s =
            1 +
            0.16 *
              Math.sin(cv.x * 4.7) *
              Math.sin(cv.y * 3.9 + 1.3) *
              Math.sin(cv.z * 5.1 + 2.1);
          cp.setXYZ(i, cv.x * s, cv.y * s, cv.z * s);
        }
        geoCanopy.computeVertexNormals();
      }
      // Deciduous phenology bases (Hopkins' law shifts the calendar).
      const broadBases = broadMats.map((m) => m.color.clone());
      const cBare = new THREE.Color('#6f5b46');
      const cSpring = new THREE.Color('#7cbf5d');
      const cAutumn = new THREE.Color('#b95f24');
      // Climatic treeline vs latitude, after Körner & Paulsen (2004).
      function treelineM(lat) {
        const a = Math.abs(lat);
        return a < 30
          ? 3500 + (30 - a) * 13
          : Math.max(3500 - 92 * (a - 30), 0);
      }
      let trees = [];
      let camBaseY = 6;
      let viewSign = 1; // +1: camera looks south (north hemisphere)
      let snowSim = null; // Rapier world, booted the first time it snows
      let snowLoading = false;
      let water = null; // three.js Water plane, built when the DEM has sea
      let oceanCascades = null; // FFT ocean (phase 5), built with water
      let oceanBuiltU = -1; // wind the spectrum was built at (m/s)
      let oceanBuiltDir = 0;
      let oceanBuiltSeaKey = null; // measured partitions in the spectrum
      let oceanSeaDepth = 60;
      let oceanTime = 0; // REAL seconds - the dispersion is physical

      // Terrain material: grass/rock/snow/sea decided per PIXEL in the
      // fragment shader (slope and altitude with noise-jittered borders),
      // not per vertex, so faces stay crisp at any distance. Elevation in
      // metres is recovered in-shader by inverting the asinh compression.
      const flatMoments = new THREE.DataTexture(
        new Float32Array([0, 0, 0, 0]),
        1,
        1,
        THREE.RGBAFormat,
        THREE.FloatType
      );
      flatMoments.needsUpdate = true;
      const terrainObj = createTerrainNodeMaterial(flatMoments, aerial);
      const terrainMat = terrainObj.material;
      const terrainUniforms = terrainObj.uniforms;
      terrainUniforms.uWorldSize.value = WORLD;
      // Cloud shadows (phase 5): Beer-Lambert through the SAME Nubis
      // density the sky renders, multiplied into every sunlit
      // material's received shadow. Until the lazy cloud system
      // attaches, the hook is a zero map - full sun.
      const cloudShadow = createCloudShadowHook();
      cloudShadow.uniforms.uWorldSize.value = WORLD;
      cloudShadow.applyTo(terrainMat);
      record(
        'GGX microfacet BRDF (Karis 2013)',
        'per-pixel roughness · vegetation/rock/snow'
      );
      record(
        'Cloud shadow map',
        'Beer-Lambert through the cloud decks (Schneider 2015)'
      );
      record('Lommel-Seeliger moon', 'lunar regolith photometry');

      // The DEM outresolves the mesh (~26 m ground truth vs ~0.9 units
      // per vertex), so shading reads the data directly - as LEADR
      // slope moments (leadr.js): a double-precision box pyramid of
      // (E[sx], E[sz], E[sx^2], E[sz^2]) from the same sample()
      // surface. The trilinear auto-LOD sample gives every lit pixel
      // the footprint's MEAN hillside orientation and the slope
      // variance that inflates the specular lobes - the mipless
      // 8-bit normal map this replaces aliased both. 512^2 base
      // matches the ~26 m source data over the 16 km world.
      function bakeTerrainMoments() {
        const S = 512;
        const step = WORLD / (S - 1);
        const hs = new Float64Array(S * S);
        for (let j = 0; j < S; j++)
          for (let i = 0; i < S; i++)
            hs[j * S + i] = sample(
              (i / (S - 1) - 0.5) * WORLD,
              (j / (S - 1) - 0.5) * WORLD
            ).y;
        const {sx, sz} = slopesFromHeights(hs, S, step);
        const pyr = buildMomentPyramid(sx, sz, S);
        const tex = new THREE.DataTexture(
          pyr.levels[0].data,
          S,
          S,
          THREE.RGBAFormat,
          THREE.FloatType
        );
        tex.generateMipmaps = false;
        tex.mipmaps = pyr.levels.map((l) => ({
          data: l.data,
          width: l.size,
          height: l.size
        }));
        tex.minFilter = THREE.LinearMipmapLinearFilter;
        tex.magFilter = THREE.LinearFilter;
        tex.needsUpdate = true;
        if (terrainObj.momentsTexNode.value.isDataTexture)
          terrainObj.momentsTexNode.value.dispose();
        terrainObj.momentsTexNode.value = tex;
      }

      function buildWorld() {
        ground.clear();
        trees = [];
        if (demData) {
          // Average the real elevation in a small ring around the scene
          // centre (grid-layout agnostic).
          let sum = 0;
          let cnt = 0;
          for (let dx = -12; dx <= 12; dx += 6)
            for (let dz = -12; dz <= 12; dz += 6) {
              sum += demElev(dx, dz);
              cnt++;
            }
          centerElev = Math.max(sum / cnt, 0.3);
        } else {
          centerElev = 300;
        }
        terrainUniforms.uCenterElev.value = centerElev;
        viewSign = state.lat < 0 ? -1 : 1;
        bakeTerrainMoments();

        const geo = new THREE.PlaneGeometry(WORLD, WORLD, 320, 320);
        geo.rotateX(-Math.PI / 2);
        const pos = geo.attributes.position;
        const wet = new Float32Array(pos.count);
        for (let i = 0; i < pos.count; i++) {
          const s = sample(pos.getX(i), pos.getZ(i));
          pos.setY(i, s.y);
          wet[i] = s.water ? 1 : 0;
        }
        geo.computeVertexNormals();
        geo.setAttribute('wet', new THREE.BufferAttribute(wet, 1));
        const terrain = new THREE.Mesh(geo, terrainMat);
        terrain.castShadow = true;
        terrain.receiveShadow = true;
        terrain.layers.enable(3); // cloud depth prepass
        ground.add(terrain);

        // Trees: inside the real OSM woods when we have them, below the
        // real tree line, off cliffs, out of the sea, and not on top of
        // either camera spot (it can face both ways).
        const tl = treelineM(state.lat);
        for (let i = 0; i < 1800 && trees.length < 140; i++) {
          const x = (rand() - 0.5) * (WORLD - 40);
          const z = (rand() - 0.5) * (WORLD - 40);
          const s0 = sample(x, z);
          if (s0.water || s0.e > tl) continue;
          if (!inForest(x, z)) continue;
          // Real forests stand on ~35° alpine slopes; the asinh height
          // compression roughly doubles scene gradients, hence 4.5.
          const grade =
            Math.abs(sample(x + 2, z).y - sample(x - 2, z).y) +
            Math.abs(sample(x, z + 2).y - sample(x, z - 2).y);
          if (grade > 4.5) continue;
          if (Math.hypot(x, z - 26) < 24 || Math.hypot(x, z + 26) < 24)
            continue;
          const sc = 0.8 + rand() * 1.4;
          // Conifers own the subalpine belt below the climatic treeline.
          const conifer = s0.e > tl - 700 || rand() < 0.4;
          const tree = new THREE.Group();
          const trunk = new THREE.Mesh(geoTrunk, trunkMat);
          trunk.position.y = 0.55;
          trunk.castShadow = true;
          tree.add(trunk);
          if (conifer) {
            const mat = leafMats[Math.floor(rand() * leafMats.length)];
            const c1 = new THREE.Mesh(geoCone1, mat);
            c1.position.y = 1.7;
            const c2 = new THREE.Mesh(geoCone2, mat);
            c2.position.y = 3.1;
            c1.castShadow = c2.castShadow = true;
            c1.receiveShadow = true;
            tree.add(c1, c2);
          } else {
            const canopy = new THREE.Mesh(
              geoCanopy,
              broadMats[Math.floor(rand() * broadMats.length)]
            );
            canopy.position.y = 2.2;
            canopy.scale.y = 0.82;
            canopy.castShadow = canopy.receiveShadow = true;
            tree.add(canopy);
          }
          tree.scale.setScalar(sc);
          tree.position.set(x, s0.y, z);
          tree.userData = {phase: rand() * Math.PI * 2, a: 0, v: 0};
          trees.push(tree);
          ground.add(tree);
        }

        // The sea: three.js Water (planar reflections) riding at real sea
        // level wherever the DEM says there is water.
        if (water) {
          ground.remove(water);
          water.geometry.dispose();
          water.material.dispose();
          water = null;
        }
        let hasWater = false;
        for (let i = 0; i < wet.length; i++)
          if (wet[i]) {
            hasWater = true;
            break;
          }
        if (hasWater) {
          // Cox & Munk (1954): sun glitter shaped by the sea-surface
          // slope variance; Monahan whitecaps; Battjes-Janssen surf
          // breaking - all carried at source level in the
          // HorizonWaterMesh fork, against the REAL bathymetry sampled
          // from the terrarium tiles into a depth texture.
          // 512^2 float texels over the 16 km world = 31 m/texel -
          // the z12 terrarium source resolution itself (the surf
          // band is a few tens of metres; the old 128^2 8-bit
          // nearest-sampled texture could not resolve it at all,
          // and 0.157 m quantisation stepped the McCowan-era ramp).
          const DT = 512;
          const dArr = new Float32Array(DT * DT);
          let dSum = 0;
          let dCnt = 0;
          for (let dj = 0; dj < DT; dj++)
            for (let di = 0; di < DT; di++) {
              const e = demData
                ? demElev(
                    (di / (DT - 1) - 0.5) * WORLD,
                    (dj / (DT - 1) - 0.5) * WORLD
                  )
                : 1;
              if (e < 0) {
                dSum += -e;
                dCnt++;
              }
              // SIGNED depth vs MSL (float texture): shoreline
              // texels keep their real height above the water, so
              // the measured tide can flood or expose them exactly
              // (water-tsl adds the tide before clamping at the
              // bed).
              dArr[dj * DT + di] = THREE.MathUtils.clamp(-e / 40, -1, 1);
            }
          const depthTex = new THREE.DataTexture(
            dArr,
            DT,
            DT,
            THREE.RedFormat,
            THREE.FloatType
          );
          depthTex.minFilter = depthTex.magFilter = THREE.LinearFilter;
          depthTex.needsUpdate = true;
          // Tessendorf FFT ocean cascades (phase 5): JONSWAP/TMA at
          // the real wind, TMA depth from the mean of the real
          // bathymetry, k-space partitioned at lambda = 25 m so the
          // two patch scales never double-count energy. The spectrum
          // rebuilds in place when the wind moves materially (same
          // gating pattern as the aerosol LUTs).
          oceanSeaDepth = dCnt ? Math.max(dSum / dCnt, 5) : 60;
          oceanBuiltU = state.wind / 3.6;
          oceanBuiltDir = Math.atan2(windV.z, windV.x);
          // Measured sea-state partitions (marine model) take over
          // from the wind prediction when present.
          const seaNow = seaParts();
          oceanBuiltSeaKey = seaNow ? JSON.stringify(seaNow) : null;
          const OCEAN_SPLIT = (2 * Math.PI) / 25;
          oceanCascades = [
            createOceanFFT(renderer, {
              N: 256,
              L: 1000,
              U10: oceanBuiltU,
              F: 150e3,
              D: oceanSeaDepth,
              windDir: oceanBuiltDir,
              sea: seaNow ?? undefined,
              kMax: OCEAN_SPLIT,
              seed: 1337,
              lambda: 1.1
            }),
            createOceanFFT(renderer, {
              N: 256,
              L: 120,
              U10: oceanBuiltU,
              F: 150e3,
              D: oceanSeaDepth,
              windDir: oceanBuiltDir,
              sea: seaNow ?? undefined,
              kMin: OCEAN_SPLIT,
              seed: 7331,
              lambda: 1.1
            })
          ];
          water = new HorizonWaterMesh(
            new THREE.PlaneGeometry(WORLD, WORLD, 192, 192),
            {
              sunDirection: new THREE.Vector3(0, 1, 0),
              sunColor: 0xffffff,
              waterColor: 0x0a2431,
              distortionScale: 1.4,
              depthTex,
              worldSize: WORLD,
              resolutionScale: 0.5,
              ocean: {cascades: oceanCascades, metersPerUnit: 57.14},
              // Deck shadows dim the DIRECT sun terms (glitter,
              // diffuse) - not the sky reflection - via the shared
              // Beer-Lambert transmittance.
              cloudShadow
            }
          );
          water.rotation.x = -Math.PI / 2;
          water.position.y = 16 * Math.asinh((0 - centerElev) / 500) - 0.15;
          // Aerial perspective + AgX for the sea via the shared hook.
          applyAerial(water.material);
          ground.add(water);
          record(
            'Tessendorf FFT ocean',
            (oceanBuiltSeaKey
              ? 'measured marine partitions (wind sea + swell)'
              : 'JONSWAP/TMA wind sea') +
              ' · exact spectral normals · Jacobian whitecaps'
          );
        }

        camBaseY = sample(0, -26 * viewSign).y + 5;
        // New terrain invalidates the physics heightfield and any drifts.
        if (snowSim) {
          snowSim.rebuildTerrain();
          snowSim.clearDrifts();
        }
      }
      buildWorld();

      // Camera yaw: equatorward by default (that is where the sun arc
      // lives), but pan poleward at night when a real aurora is on. The
      // first frame snaps; only live changes pan.
      let yaw = state.lat < 0 ? Math.PI : 0;
      let yawInit = false;

      // Stars: the real sky (Yale Bright Star Catalog), spun by sidereal
      // time around a pole tilted to the latitude.
      const celestial = new THREE.Group();
      const polar = new THREE.Group();
      polar.add(celestial);
      scene.add(polar);
      // Zodiacal light: the Leinert brightness map rides the SAME
      // celestial dome as the stars, so the cone stands along the
      // real ecliptic and the Gegenschein tracks the antisolar
      // point (zodiacal.js; the shader rotates object-space
      // directions into ecliptic coordinates).
      const zodiObj = createZodiacalMaterial();
      const zodiU = zodiObj.u;
      // The photometric base (zlPerGreen) baked by the factory; the
      // frame loop multiplies the live r^-2.3 onto it.
      const zodiBase = zodiU.uScale.value;
      const zodi = new THREE.Mesh(
        new THREE.SphereGeometry(880, 48, 24),
        zodiObj.material
      );
      celestial.add(zodi);
      let starObj = null;
      fetch('./horizon/stars.json')
        .then((r) => r.json())
        .then((stars) => {
          const pos = [];
          const color = [];
          const size = [];
          const col = new THREE.Color();
          for (const [ra, dec, mag, kelvin] of stars) {
            const raR = ra * RAD;
            const decR = dec * RAD;
            pos.push(
              900 * Math.cos(decR) * Math.sin(raR),
              900 * Math.sin(decR),
              900 * Math.cos(decR) * Math.cos(raR)
            );
            const t = THREE.MathUtils.clamp((kelvin - 3000) / 9000, 0, 1);
            col.setRGB(
              1 - t * 0.25,
              0.88 - Math.abs(t - 0.45) * 0.2,
              0.72 + t * 0.28
            );
            color.push(col.r, col.g, col.b);
            size.push(THREE.MathUtils.clamp(7.5 - mag, 1.8, 7.5));
          }
          // Scintillation: Kolmogorov turbulence makes twinkle grow
          // with airmass (~sec z), so horizon stars shimmer and zenith
          // stars barely do; per-star phase from a PCG hash (Jarzynski
          // & Olano 2020). Instanced sprites reproduce gl_PointSize -
          // WebGPU has no point size.
          starObj = createStarSprites(
            new Float32Array(pos),
            new Float32Array(color),
            new Float32Array(size)
          );
          celestial.add(starObj.mesh);
          record(
            'Yale Bright Star Catalog',
            stars.length + ' stars (vendored)'
          );
        });

      // Constellation figures (d3-celestial dataset): faint real lines
      // riding the same sidereal dome as the stars.
      let constMat = null;
      fetch('./horizon/constellations.lines.json')
        .then((r) => r.json())
        .then((geo) => {
          const pts = [];
          for (const f of geo.features)
            for (const line of f.geometry.coordinates)
              for (let i = 0; i < line.length - 1; i++)
                for (const p of [line[i], line[i + 1]]) {
                  const ra = (((p[0] % 360) + 360) % 360) * RAD;
                  const dec = p[1] * RAD;
                  pts.push(
                    870 * Math.cos(dec) * Math.sin(ra),
                    870 * Math.sin(dec),
                    870 * Math.cos(dec) * Math.cos(ra)
                  );
                }
          const g = new THREE.BufferGeometry();
          g.setAttribute('position', new THREE.Float32BufferAttribute(pts, 3));
          constMat = new THREE.LineBasicNodeMaterial({
            transparent: true,
            opacity: 0,
            depthWrite: false
          });
          aerial.applyFogColor(constMat, '#7f9fc4');
          celestial.add(new THREE.LineSegments(g, constMat));
          record(
            'd3-celestial constellations',
            geo.features.length + ' figures (vendored)'
          );
        });

      // The moon: a sphere lit from the sun's REAL direction, so the
      // phase is always correct - and shaded by the Lommel-Seeliger
      // photometric function (the standard lunar regolith model, the
      // basis of McEwen's lunar-Lambert), not Lambert. That is why a
      // full moon renders flat like the real one instead of
      // limb-darkening like a billiard ball.
      const moonObj = createMoonMaterial();
      const moonU = moonObj.u;
      const moonDisc = new THREE.Mesh(
        new THREE.SphereGeometry(24, 24, 18),
        moonObj.material
      );
      moonDisc.layers.set(2);
      scene.add(moonDisc);

      // Naked-eye planets at their true ephemeris positions, sized by
      // real apparent magnitude, tinted like the eye sees them.
      const PLANETS = ['Mercury', 'Venus', 'Mars', 'Jupiter', 'Saturn'];
      const PLANET_TINTS = [
        [0.9, 0.85, 0.78],
        [1, 0.98, 0.9],
        [1, 0.62, 0.44],
        [0.98, 0.92, 0.8],
        [0.95, 0.9, 0.72]
      ];
