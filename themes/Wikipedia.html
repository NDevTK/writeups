<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Listen to Wikipedia</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #0a0a12;
        overflow: hidden;
        font-family: ui-sans-serif, system-ui, 'Segoe UI', Arial, sans-serif;
      }
      #embed {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        border: 0;
      }
      /* Shown only if the embed never paints (e.g. framing was refused) */
      #fallback {
        position: fixed;
        inset: 0;
        z-index: -1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        text-align: center;
        color: #8a93a6;
        font-size: 14px;
      }
      #hint {
        position: fixed;
        left: 50%;
        bottom: 22px;
        transform: translateX(-50%);
        padding: 6px 14px;
        border-radius: 999px;
        background: rgba(10, 10, 18, 0.65);
        border: 1px solid rgba(160, 170, 200, 0.25);
        color: rgba(220, 226, 240, 0.85);
        font-size: 12px;
        transition: opacity 1s ease;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="fallback">
      Loading listen.hatnote.com — a live visualisation of Wikipedia edits.<br />
      If nothing appears, the site declined to be embedded.
    </div>
    <iframe
      id="embed"
      src="https://listen.hatnote.com/"
      title="Listen to Wikipedia"
      allow="autoplay"
      sandbox="allow-scripts allow-same-origin allow-popups"
      referrerpolicy="no-referrer"></iframe>
    <div id="hint">
      Listen to Wikipedia · live edits · ✦ to interact &amp; hear it
    </div>

    <script>
      'use strict';
      // ---------- Host bridge (shaderwall protocol) ----------
      let shown = false;
      function setShown(value) {
        shown = value;
        window.parent.postMessage(
          {type: 'shaderwall', state: shown ? 'shown' : 'hidden'},
          location.origin
        );
      }
      addEventListener('message', (e) => {
        if (e.origin != location.origin) return;
        const d = e.data || {};
        if (d.type !== 'shaderwall') return;
        if (d.action === 'show') setShown(true);
        else if (d.action === 'hide') setShown(false);
        else if (d.action === 'toggle') setShown(!shown);
      });
      addEventListener('keydown', (e) => {
        if (e.key === 'h' || e.key === 'H') setShown(!shown);
      });
      setTimeout(() => {
        const h = document.getElementById('hint');
        if (h) h.style.opacity = '0';
      }, 7000);
      setShown(false);
    </script>
  </body>
</html>
