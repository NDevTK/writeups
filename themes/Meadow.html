<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Meadow</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #1a2a1e;
      }
      #c {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
      }
    </style>
  </head>
  <body>
    <canvas id="c"></canvas>
    <script>
      'use strict';

      const canvas = document.getElementById('c');
      const ctx = canvas.getContext('2d');
      ctx.imageSmoothingEnabled = false;
      const reduce = matchMedia('(prefers-reduced-motion: reduce)');

      let vw = 0;
      let vh = 0;
      let PX = 5;
      function resize() {
        PX = Math.max(3, Math.round(innerHeight / 175));
        vw = Math.ceil(innerWidth / PX);
        vh = Math.ceil(innerHeight / PX);
        canvas.width = vw;
        canvas.height = vh;
        ctx.imageSmoothingEnabled = false;
        initScene();
      }
      addEventListener('resize', resize);

      // ---- time-of-day palette ----
      const HEX = (s) => [parseInt(s.slice(1, 3), 16), parseInt(s.slice(3, 5), 16), parseInt(s.slice(5, 7), 16)];
      const mix = (a, b, t) => [a[0] + (b[0] - a[0]) * t, a[1] + (b[1] - a[1]) * t, a[2] + (b[2] - a[2]) * t];
      const rgb = (c) => 'rgb(' + (c[0] | 0) + ',' + (c[1] | 0) + ',' + (c[2] | 0) + ')';
      const dim = (c, f) => [c[0] * f, c[1] * f, c[2] * f];
      const KF = [
        {h: 0, t: '#0a1230', hz: '#1c2a4a', f: '#16301f', m: '#112617', n: '#0c1c11', su: '#d8e0ec', st: 1, li: 0.5},
        {h: 6, t: '#3a4a72', hz: '#f3b27a', f: '#4a7a4a', m: '#3c6a3a', n: '#2e5430', su: '#ffe0a8', st: 0.2, li: 0.82},
        {h: 9, t: '#5fb0e8', hz: '#cdeefb', f: '#7cc35e', m: '#5fa84a', n: '#468a37', su: '#fff6cf', st: 0, li: 1},
        {h: 16, t: '#5fb0e8', hz: '#cdeefb', f: '#7cc35e', m: '#5fa84a', n: '#468a37', su: '#fff6cf', st: 0, li: 1},
        {h: 18.7, t: '#3a3568', hz: '#f59a55', f: '#5a7048', m: '#46583a', n: '#33412c', su: '#ff9a52', st: 0.32, li: 0.8},
        {h: 20.5, t: '#0a1230', hz: '#1c2a4a', f: '#16301f', m: '#112617', n: '#0c1c11', su: '#d8e0ec', st: 1, li: 0.5},
        {h: 24, t: '#0a1230', hz: '#1c2a4a', f: '#16301f', m: '#112617', n: '#0c1c11', su: '#d8e0ec', st: 1, li: 0.5}
      ];
      KF.forEach((k) => { k.t = HEX(k.t); k.hz = HEX(k.hz); k.f = HEX(k.f); k.m = HEX(k.m); k.n = HEX(k.n); k.su = HEX(k.su); });
      function tod(h) {
        for (let i = 0; i < KF.length - 1; i++) {
          if (h >= KF[i].h && h <= KF[i + 1].h) {
            const a = KF[i], b = KF[i + 1], f = (h - a.h) / (b.h - a.h || 1);
            return {
              t: mix(a.t, b.t, f), hz: mix(a.hz, b.hz, f), f: mix(a.f, b.f, f),
              m: mix(a.m, b.m, f), n: mix(a.n, b.n, f), su: mix(a.su, b.su, f),
              st: a.st + (b.st - a.st) * f, li: a.li + (b.li - a.li) * f
            };
          }
        }
        return tod(0.001);
      }
      function nowHour() {
        const p = new URLSearchParams(location.search).get('hour');
        if (p != null) return parseFloat(p);
        const d = new Date();
        return d.getHours() + d.getMinutes() / 60;
      }

      // ---- scene ----
      const FLOWERCOLS = [[230, 80, 90], [240, 210, 90], [240, 240, 245], [225, 130, 200], [150, 120, 230]];
      let stars = [], flowers = [], butterflies = [], clouds = [], birds = [], grass = [], fireflies = [], tree = {};
      let hillFarY, hillMidY, hillNearY;
      function hillAt(baseY, amp, freq, x, phase) { return baseY + Math.sin(x * freq + phase) * amp + Math.sin(x * freq * 2.3 + phase) * amp * 0.3; }
      function initScene() {
        hillFarY = Math.round(vh * 0.5);
        hillMidY = Math.round(vh * 0.62);
        hillNearY = Math.round(vh * 0.76);
        stars = [];
        for (let i = 0; i < 55; i++) stars.push({x: Math.random() * vw, y: Math.random() * hillFarY * 0.9, ph: Math.random() * 6.28});
        flowers = [];
        for (let i = 0; i < 60; i++) {
          const x = Math.random() * vw;
          const onNear = Math.random() < 0.6;
          const baseY = onNear ? hillNearY : hillMidY;
          const amp = onNear ? vh * 0.05 : vh * 0.04;
          const y = hillAt(baseY, amp, 0.06, x, onNear ? 1.7 : 0.8) + 1 + Math.random() * (onNear ? vh * 0.18 : vh * 0.1);
          flowers.push({x, y, c: FLOWERCOLS[(Math.random() * FLOWERCOLS.length) | 0], ph: Math.random() * 6.28});
        }
        butterflies = [];
        for (let i = 0; i < 6; i++) butterflies.push({x: Math.random() * vw, y: hillFarY + Math.random() * (vh - hillFarY), vx: (Math.random() - 0.5) * 0.3, vy: (Math.random() - 0.5) * 0.2, flap: Math.random() * 10, c: FLOWERCOLS[(Math.random() * FLOWERCOLS.length) | 0]});
        clouds = [];
        for (let i = 0; i < 4; i++) clouds.push({x: Math.random() * vw, y: 4 + Math.random() * hillFarY * 0.5, s: 0.04 + Math.random() * 0.05, w: 8 + Math.random() * 10});
        birds = [];
        for (let i = 0; i < 2; i++) birds.push({x: Math.random() * vw, y: hillFarY * (0.25 + Math.random() * 0.4), sp: 0.14 + Math.random() * 0.1, flap: Math.random() * 36});
        grass = [];
        for (let i = 0; i < vw; i += 2) grass.push({x: i, h: 3 + Math.random() * 5, ph: Math.random() * 6.28});
        fireflies = [];
        for (let i = 0; i < 14; i++) fireflies.push({x: Math.random() * vw, y: hillMidY + Math.random() * (vh - hillMidY), ph: Math.random() * 6.28, vx: (Math.random() - 0.5) * 0.05, vy: (Math.random() - 0.5) * 0.05});
        tree = {x: Math.round(vw * (0.16 + Math.random() * 0.1)), groundY: 0};
      }

      function fillHill(baseY, amp, freq, phase, color) {
        ctx.fillStyle = rgb(color);
        ctx.beginPath();
        ctx.moveTo(0, vh);
        for (let x = 0; x <= vw; x++) ctx.lineTo(x, hillAt(baseY, amp, freq, x, phase));
        ctx.lineTo(vw, vh);
        ctx.closePath();
        ctx.fill();
      }

      function drawSprite(map, color, x, y, light, alpha) {
        const w = map[0].length;
        ctx.globalAlpha = alpha == null ? 1 : alpha;
        ctx.fillStyle = rgb(dim(color, light));
        for (let r = 0; r < map.length; r++)
          for (let c = 0; c < w; c++)
            if (map[r][c] !== '.') ctx.fillRect((x + c) | 0, (y + r) | 0, 1, 1);
        ctx.globalAlpha = 1;
      }
      const BIRD_A = ['#...#', '.#.#.', '..#..'];
      const BIRD_B = ['.....', '#...#', '.###.'];

      function draw(now) {
        requestAnimationFrame(draw);
        if (document.hidden) return;
        const reduced = reduce.matches;
        const T = reduced ? 0 : now / 1000;
        const P = tod(nowHour());
        const h = nowHour();

        // sky
        for (let y = 0; y < vh; y++) {
          if (y > hillFarY) break;
          ctx.fillStyle = rgb(mix(P.t, P.hz, y / hillFarY));
          ctx.fillRect(0, y, vw, 1);
        }
        // base ground colour so far-hill dips never reveal the page background
        ctx.fillStyle = rgb(P.f);
        ctx.fillRect(0, hillFarY - 1, vw, vh - hillFarY + 1);
        // stars
        if (P.st > 0.05) {
          ctx.fillStyle = '#ffffff';
          for (const s of stars) { ctx.globalAlpha = P.st * (0.35 + 0.65 * ((Math.sin(T * 2 + s.ph) + 1) / 2)); ctx.fillRect(s.x | 0, s.y | 0, 1, 1); }
          ctx.globalAlpha = 1;
        }
        // sun / moon
        let bodyX, bodyY, isSun;
        if (h >= 6 && h <= 19) { const f = (h - 6) / 13; bodyX = vw * f; bodyY = hillFarY - Math.sin(f * Math.PI) * hillFarY * 0.78; isSun = true; }
        else { const nh = h < 6 ? h + 24 : h; const f = (nh - 19) / 11; bodyX = vw * f; bodyY = hillFarY - Math.sin(f * Math.PI) * hillFarY * 0.6; isSun = false; }
        const rad = Math.max(2, Math.round(vh * 0.03));
        ctx.fillStyle = rgb(P.su);
        ctx.beginPath(); ctx.arc(bodyX, bodyY, rad, 0, 6.2832); ctx.fill();
        if (!isSun) { ctx.fillStyle = rgb(mix(P.t, P.hz, bodyY / hillFarY)); ctx.beginPath(); ctx.arc(bodyX + rad * 0.5, bodyY - rad * 0.4, rad, 0, 6.2832); ctx.fill(); }

        // clouds
        for (const cl of clouds) {
          if (!reduced) { cl.x += cl.s; if (cl.x - cl.w > vw) cl.x = -cl.w; }
          ctx.globalAlpha = 0.85;
          ctx.fillStyle = rgb(dim([245, 248, 252], 0.6 + P.li * 0.4));
          const x = cl.x | 0, y = cl.y | 0, w = cl.w | 0;
          ctx.fillRect(x, y + 2, w, 3);
          ctx.fillRect(x + 2, y, w - 5, 3);
          ctx.fillRect(x + w * 0.4, y - 1, w * 0.4, 3);
          ctx.globalAlpha = 1;
        }

        // hills back -> front
        fillHill(hillFarY, vh * 0.04, 0.04, 0.5, P.f);
        fillHill(hillMidY, vh * 0.04, 0.06, 0.8, P.m);
        fillHill(hillNearY, vh * 0.05, 0.06, 1.7, P.n);

        // a lone tree on the near hill
        const tgy = hillAt(hillNearY, vh * 0.05, 0.06, tree.x, 1.7);
        ctx.fillStyle = rgb(dim([74, 52, 36], P.li));
        ctx.fillRect(tree.x | 0, tgy | 0, 2, Math.round(vh * 0.09));
        ctx.fillStyle = rgb(dim([54, 110, 52], P.li));
        const cr = Math.round(vh * 0.07);
        ctx.beginPath(); ctx.arc(tree.x + 1, tgy - cr * 0.6, cr, 0, 6.2832); ctx.fill();
        ctx.beginPath(); ctx.arc(tree.x + 1 - cr * 0.7, tgy - cr * 0.2, cr * 0.7, 0, 6.2832); ctx.fill();
        ctx.beginPath(); ctx.arc(tree.x + 1 + cr * 0.7, tgy - cr * 0.2, cr * 0.7, 0, 6.2832); ctx.fill();

        // flowers
        for (const fl of flowers) {
          const sway = reduced ? 0 : Math.sin(T * 1.2 + fl.ph) * 0.6;
          ctx.fillStyle = rgb(dim(fl.c, P.li));
          ctx.fillRect((fl.x + sway) | 0, fl.y | 0, 1, 1);
          ctx.fillStyle = rgb(dim([240, 240, 200], P.li * 0.9));
          ctx.fillRect((fl.x + sway) | 0, (fl.y | 0) - 1, 1, 1);
        }

        // foreground grass
        for (const g of grass) {
          const sway = reduced ? 0 : Math.sin(T * 1.4 + g.ph) * 1.2;
          ctx.strokeStyle = rgb(dim([46, 92, 44], P.li));
          ctx.lineWidth = 1;
          ctx.beginPath(); ctx.moveTo(g.x, vh); ctx.lineTo(g.x + sway, vh - g.h); ctx.stroke();
        }

        // butterflies (day) / fireflies (night)
        if (P.st < 0.5) {
          for (const bf of butterflies) {
            if (!reduced) {
              bf.x += bf.vx; bf.y += bf.vy; bf.flap += 0.5;
              if (Math.random() < 0.03) { bf.vx = (Math.random() - 0.5) * 0.4; bf.vy = (Math.random() - 0.5) * 0.3; }
              if (bf.x < 2 || bf.x > vw - 2) bf.vx *= -1;
              if (bf.y < hillFarY * 0.6 || bf.y > vh - 4) bf.vy *= -1;
            }
            const x = bf.x | 0, y = bf.y | 0, up = (bf.flap | 0) % 2 === 0;
            ctx.fillStyle = rgb(dim(bf.c, P.li));
            if (up) { ctx.fillRect(x - 1, y - 1, 1, 1); ctx.fillRect(x + 1, y - 1, 1, 1); }
            else { ctx.fillRect(x - 1, y, 1, 1); ctx.fillRect(x + 1, y, 1, 1); }
            ctx.fillStyle = rgb(dim([30, 24, 20], P.li));
            ctx.fillRect(x, y, 1, 1);
          }
        }
        if (P.st > 0.25) {
          for (const ff of fireflies) {
            if (!reduced) {
              ff.x += ff.vx; ff.y += ff.vy;
              if (Math.random() < 0.02) { ff.vx = (Math.random() - 0.5) * 0.08; ff.vy = (Math.random() - 0.5) * 0.08; }
              if (ff.x < 0 || ff.x > vw) ff.vx *= -1;
              if (ff.y < hillMidY || ff.y > vh) ff.vy *= -1;
            }
            ctx.globalAlpha = ((Math.sin(T * 3 + ff.ph) + 1) / 2) * 0.9 * Math.min(1, (P.st - 0.25) * 3);
            ctx.fillStyle = '#dff58a';
            ctx.fillRect(ff.x | 0, ff.y | 0, 1, 1);
          }
          ctx.globalAlpha = 1;
        }

        // birds
        for (const bd of birds) {
          if (!reduced) { bd.x += bd.sp; if (bd.x > vw + 4) { bd.x = -4; bd.y = hillFarY * (0.25 + Math.random() * 0.4); } bd.flap = (bd.flap + 1) % 36; }
          drawSprite(bd.flap < 18 ? BIRD_A : BIRD_B, [30, 30, 38], bd.x | 0, bd.y | 0, P.li * 0.7, 0.85);
        }
      }
      requestAnimationFrame(draw);
      resize();

      // ---------- host bridge (shaderwall protocol) ----------
      let shown = false;
      function setShown(value) {
        shown = value;
        window.parent.postMessage({type: 'shaderwall', state: shown ? 'shown' : 'hidden'}, location.origin);
      }
      addEventListener('message', (e) => {
        if (e.origin != location.origin) return;
        const d = e.data || {};
        if (d.type !== 'shaderwall') return;
        if (d.action === 'show') setShown(true);
        else if (d.action === 'hide') setShown(false);
        else if (d.action === 'toggle') setShown(!shown);
      });
      addEventListener('keydown', (e) => { if (e.key === 'h' || e.key === 'H') setShown(!shown); });
      setShown(false);
    </script>
  </body>
</html>
