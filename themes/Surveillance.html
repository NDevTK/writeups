<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Surveillance</title>
    <!-- Leaflet + the OSM/Nominatim geocoder. For production add SRI hashes. -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha384-sHL9NAb7lN7rfvG5lfHpm643Xkcjzp4jFvuavGOndn6pjVqS6ny56CAt3nsEVT4H"
      crossorigin="anonymous" />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet-control-geocoder@3.3.1/dist/Control.Geocoder.css"
      integrity="sha384-vreRpx6017gtwUzcBhs2vpY19++6YuBl7eZVucKz1McFCXT2qTGrnVoXtheRZeSR"
      crossorigin="anonymous" />
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #0b0f14;
        overflow: hidden;
        font-family: ui-monospace, 'Consolas', 'Courier New', monospace;
        color: #d7e6f0;
      }
      #map {
        position: fixed;
        inset: 0;
      }
      .leaflet-container {
        background: #0b0f14;
      }
      /* Make the search control fit the dark map */
      .leaflet-control-geocoder,
      .leaflet-control-geocoder-alternatives {
        background: #0b0f14;
        border: 1px solid rgba(120, 200, 255, 0.3);
        color: #d7e6f0;
      }
      .leaflet-control-geocoder-form input {
        color: #d7e6f0;
        background: transparent;
      }
      .leaflet-control-geocoder-alternatives a {
        color: #d7e6f0;
      }
      .leaflet-control-geocoder-alternatives li:hover {
        background: rgba(120, 200, 255, 0.12);
      }
      /* Zoom + search stay hidden until the wallpaper is brought forward */
      .leaflet-control-zoom,
      .leaflet-control-geocoder {
        display: none;
      }
      body.controls .leaflet-control-zoom,
      body.controls .leaflet-control-geocoder {
        display: block;
      }
      /* Dark popups for the camera details */
      .leaflet-popup-content-wrapper,
      .leaflet-popup-tip {
        background: #0b0f14;
        color: #d7e6f0;
      }
      .leaflet-popup-content-wrapper {
        border: 1px solid rgba(120, 200, 255, 0.3);
      }
      .leaflet-container a.leaflet-popup-close-button {
        color: #7fb6d6;
      }
      .cam b {
        display: block;
        margin-bottom: 4px;
      }
      .cam div {
        margin: 1px 0;
      }
      .cam .k {
        color: #7fb6d6;
      }
      .cam a {
        color: #9be7ff;
      }
      /* Legend rides along with the other controls */
      .legend {
        position: fixed;
        left: 10px;
        bottom: 24px;
        z-index: 500;
        padding: 8px 10px;
        border-radius: 6px;
        font-size: 12px;
        line-height: 1.6;
        background: rgba(11, 15, 20, 0.85);
        border: 1px solid rgba(120, 200, 255, 0.25);
        display: none;
      }
      body.controls .legend {
        display: block;
      }
      .legend .dot {
        display: inline-block;
        width: 10px;
        height: 10px;
        margin-right: 6px;
        border-radius: 50%;
        vertical-align: middle;
      }
    </style>
  </head>
  <body>
    <div id="map"></div>
    <div class="legend" aria-hidden="true">
      <div><span class="dot" style="background: #ffd166"></span>Camera</div>
      <div>
        <span class="dot" style="background: #5fd0ff"></span>ALPR (plate reader)
      </div>
      <div><span class="dot" style="background: #9be37d"></span>Guard</div>
    </div>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha384-cxOPjt7s7Iz04uaHJceBmS+qpjv2JkIHNVcuOrM+YHwZOmJGBXI00mdUXEq65HTH"
      crossorigin="anonymous"></script>
    <script
      src="https://unpkg.com/leaflet-control-geocoder@3.3.1/dist/Control.Geocoder.js"
      integrity="sha384-Bfl31bOQuT8Lw6OrGjU5VoBPSS95TwHMsWkt/7Rx1Wbk2TeR5wgoaNP7f2cxR3gS"
      crossorigin="anonymous"></script>
    <script>
      'use strict';

      // HTML-escape OSM tag values before they touch a popup.
      function esc(value) {
        return String(value == null ? '' : value).replace(
          /[&<>"']/g,
          (c) =>
            ({
              '&': '&amp;',
              '<': '&lt;',
              '>': '&gt;',
              '"': '&quot;',
              "'": '&#39;'
            })[c]
        );
      }

      // Marker colour + label for each kind of surveillance node.
      function kindInfo(tags) {
        const t = (tags['surveillance:type'] || '').toLowerCase();
        if (t === 'alpr' || t === 'anpr')
          return {
            label: 'ALPR camera',
            icon: '🚗',
            color: '#1b9bd8',
            fill: '#5fd0ff'
          };
        if (t === 'guard')
          return {
            label: 'Guard',
            icon: '👮',
            color: '#3fa34d',
            fill: '#9be37d'
          };
        return {
          label: 'Surveillance camera',
          icon: '📷',
          color: '#ff5f5f',
          fill: '#ffd166'
        };
      }

      // Build a popup from whatever tags the node carries (all escaped).
      function popupHtml(node) {
        const tags = node.tags || {};
        const info = kindInfo(tags);
        const rows = [];
        function row(label, value) {
          if (value)
            rows.push(
              '<div><span class="k">' +
                label +
                '</span> ' +
                esc(value) +
                '</div>'
            );
        }
        row('Name', tags.name);
        row('Operator', tags.operator);
        row('Camera', tags['camera:type']);
        row('Mount', tags['camera:mount']);
        const dir = tags['camera:direction'] || tags.direction;
        if (dir) row('Facing', /^-?\d+(\.\d+)?$/.test(dir) ? dir + '°' : dir);
        row('Zone', tags['surveillance:zone'] || tags.surveillance);
        row('Height', tags.height);

        const feed =
          tags['contact:webcam'] || tags.webcam || tags.website || tags.url;
        let extra = '';
        if (feed && /^https?:\/\//i.test(feed))
          extra +=
            '<div><a href="' +
            esc(feed) +
            '" target="_blank" rel="noreferrer noopener">▶ live feed</a></div>';
        extra +=
          '<div><a href="https://www.openstreetmap.org/node/' +
          esc(node.id) +
          '" target="_blank" rel="noreferrer noopener">OSM node ' +
          esc(node.id) +
          '</a></div>';

        return (
          '<div class="cam"><b>' +
          info.icon +
          ' ' +
          esc(info.label) +
          '</b>' +
          rows.join('') +
          extra +
          '</div>'
        );
      }

      const map = L.map('map', {zoomControl: true}).setView([25, 0], 2);
      L.tileLayer(
        'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
        {
          subdomains: 'abcd',
          maxZoom: 19,
          attribution: '&copy; OpenStreetMap contributors &copy; CARTO'
        }
      ).addTo(map);

      // Search (OpenStreetMap / Nominatim, keyless).
      L.Control.geocoder({
        collapsed: false,
        defaultMarkGeocode: true,
        position: 'topright'
      }).addTo(map);

      // Cameras for whatever is currently on screen — no invented radius.
      const cameras = L.layerGroup().addTo(map);
      const MIN_ZOOM = 14; // below this the view is too large to query responsibly

      function refresh() {
        if (map.getZoom() < MIN_ZOOM) {
          cameras.clearLayers();
          return;
        }
        const b = map.getBounds();
        const query =
          '[out:json][timeout:25];node["man_made"="surveillance"](' +
          b.getSouth() +
          ',' +
          b.getWest() +
          ',' +
          b.getNorth() +
          ',' +
          b.getEast() +
          ');out body 800;';
        fetch(
          'https://maps.mail.ru/osm/tools/overpass/api/interpreter?data=' +
            encodeURIComponent(query),
          {credentials: 'omit'}
        )
          .then((r) => r.json())
          .then((d) => {
            cameras.clearLayers();
            (d.elements || []).forEach((n) => {
              if (!n.lat || !n.lon) return;
              const info = kindInfo(n.tags || {});
              L.circleMarker([n.lat, n.lon], {
                radius: 4,
                color: info.color,
                weight: 1,
                fillColor: info.fill,
                fillOpacity: 0.85
              })
                .bindPopup(popupHtml(n))
                .addTo(cameras);
            });
          })
          .catch(() => {});
      }

      let timer;
      map.on('moveend', () => {
        clearTimeout(timer);
        timer = setTimeout(refresh, 600);
      });

      // Open near the visitor (IP-based) as a starting point; search takes over.
      fetch('https://get.geojs.io/v1/ip/geo.json', {credentials: 'omit'})
        .then((r) => r.json())
        .then((g) => {
          const lat = parseFloat(g.latitude);
          const lon = parseFloat(g.longitude);
          if (isFinite(lat) && isFinite(lon)) map.setView([lat, lon], 16);
          else refresh();
        })
        .catch(() => refresh());

      // ---------- Host bridge (shaderwall protocol) ----------
      let shown = false;
      function setShown(value) {
        shown = value;
        document.body.classList.toggle('controls', value);
        window.parent.postMessage(
          {type: 'shaderwall', state: shown ? 'shown' : 'hidden'},
          location.origin
        );
        setTimeout(() => map.invalidateSize(), 60);
      }
      addEventListener('message', (e) => {
        if (e.origin != location.origin) return;
        const d = e.data || {};
        if (d.type !== 'shaderwall') return;
        if (d.action === 'show') setShown(true);
        else if (d.action === 'hide') setShown(false);
        else if (d.action === 'toggle') setShown(!shown);
      });
      addEventListener('keydown', (e) => {
        if (e.key === 'h' || e.key === 'H') setShown(!shown);
      });
      setShown(false);
    </script>
  </body>
</html>
