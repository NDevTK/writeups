<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nature</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #0a1024;
        font-family: ui-monospace, 'Consolas', monospace;
      }
      #c {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
      }
      /* Custom controls — revealed only when the wallpaper is brought forward
         (the ✦ "Wallpaper controls" button sets body.shown). */
      #ui {
        position: fixed;
        left: 50%;
        bottom: 18px;
        transform: translateX(-50%);
        display: none;
        flex-direction: column;
        gap: 6px;
        align-items: center;
        padding: 10px 12px;
        border-radius: 12px;
        background: rgba(10, 14, 22, 0.72);
        border: 1px solid rgba(160, 200, 255, 0.22);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        color: #d7e6f0;
        font-size: 13px;
        max-width: 92vw;
      }
      body.shown #ui {
        display: flex;
      }
      #ui .row {
        display: flex;
        gap: 5px;
        flex-wrap: wrap;
        justify-content: center;
      }
      #ui button {
        font: inherit;
        color: #cfe0ef;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(160, 200, 255, 0.2);
        border-radius: 8px;
        padding: 5px 9px;
        cursor: pointer;
      }
      #ui button:hover {
        background: rgba(255, 255, 255, 0.12);
      }
      #ui button.on {
        background: #2c5a8c;
        border-color: #6fb0ef;
        color: #fff;
      }
      #ui .lbl {
        opacity: 0.6;
        font-size: 11px;
        margin-right: 2px;
        align-self: center;
      }
    </style>
  </head>
  <body>
    <canvas id="c"></canvas>
    <div id="ui" aria-hidden="true">
      <div class="row" id="uiBiomes"></div>
      <div class="row" id="uiTimes"></div>
      <div class="row" id="uiSeasons"></div>
    </div>
    <script>
      'use strict';

      const canvas = document.getElementById('c');
      const ctx = canvas.getContext('2d');
      ctx.imageSmoothingEnabled = false;
      const reduce = matchMedia('(prefers-reduced-motion: reduce)');
      const LS = (k, v) => {
        try {
          if (v === undefined) return localStorage.getItem('nature:' + k);
          localStorage.setItem('nature:' + k, v);
        } catch (e) {}
      };

      // ---------- colour helpers + day/night sky ----------
      const HEX = (s) => [parseInt(s.slice(1, 3), 16), parseInt(s.slice(3, 5), 16), parseInt(s.slice(5, 7), 16)];
      const mix = (a, b, t) => [a[0] + (b[0] - a[0]) * t, a[1] + (b[1] - a[1]) * t, a[2] + (b[2] - a[2]) * t];
      const rgb = (c) => 'rgb(' + (c[0] | 0) + ',' + (c[1] | 0) + ',' + (c[2] | 0) + ')';
      const dim = (c, f) => [c[0] * f, c[1] * f, c[2] * f];
      const NIGHT = [22, 32, 64];
      const C = (s) => HEX(s); // shorthand for biome colours
      const SKY = [
        {h: 0, t: '#070b1e', hz: '#141d3a', su: '#d8e0ec', st: 1, li: 0.5},
        {h: 6, t: '#2a3a66', hz: '#f0a368', su: '#ffd9a0', st: 0.2, li: 0.8},
        {h: 9, t: '#5193c9', hz: '#cfe7f2', su: '#fff6cf', st: 0, li: 1},
        {h: 16, t: '#5193c9', hz: '#cfe7f2', su: '#fff6cf', st: 0, li: 1},
        {h: 18.7, t: '#2f2a58', hz: '#f07b4e', su: '#ff8a4a', st: 0.36, li: 0.78},
        {h: 20.5, t: '#070b1e', hz: '#141d3a', su: '#d8e0ec', st: 1, li: 0.5},
        {h: 24, t: '#070b1e', hz: '#141d3a', su: '#d8e0ec', st: 1, li: 0.5}
      ];
      SKY.forEach((k) => { k.t = HEX(k.t); k.hz = HEX(k.hz); k.su = HEX(k.su); });
      function tod(h) {
        for (let i = 0; i < SKY.length - 1; i++)
          if (h >= SKY[i].h && h <= SKY[i + 1].h) {
            const a = SKY[i], b = SKY[i + 1], f = (h - a.h) / (b.h - a.h || 1);
            return {t: mix(a.t, b.t, f), hz: mix(a.hz, b.hz, f), su: mix(a.su, b.su, f), st: a.st + (b.st - a.st) * f, li: a.li + (b.li - a.li) * f};
          }
        return tod(0.001);
      }
      // seasonal colour grade (recomputed each frame from the active season + daylight)
      let seasonGrade = {mul: [1, 1, 1], add: [0, 0, 0], desat: 0};
      function grade(c) {
        const g = seasonGrade; let r = c[0], gg = c[1], b = c[2];
        if (g.desat) { const m = (r + gg + b) / 3; r += (m - r) * g.desat; gg += (m - gg) * g.desat; b += (m - b) * g.desat; }
        return [r * g.mul[0] + g.add[0], gg * g.mul[1] + g.add[1], b * g.mul[2] + g.add[2]];
      }
      // tint a biome colour for the current light: darken, blend toward night, then season-grade
      const tint = (c, P) => grade(mix(dim(c, P.li), NIGHT, P.st * 0.22));
      const SEASONS = {
        spring: {mul: [1.04, 1.05, 1.0], add: [10, 5, 12], desat: 0, particle: 'petal'},
        summer: {mul: [1.0, 1.0, 1.0], add: [0, 0, 0], desat: 0, particle: 'none'},
        autumn: {mul: [1.22, 0.83, 0.48], add: [26, 6, 0], desat: 0.1, particle: 'leaf'},
        winter: {mul: [0.96, 0.99, 1.06], add: [22, 24, 32], desat: 0.5, particle: 'snow'}
      };
      const LEAFCOL = [[206, 110, 40], [214, 150, 52], [184, 72, 40], [150, 92, 44]];

      // ---------- canvas sizing ----------
      let vw = 0, vh = 0, horizon = 0, PX = 5;
      function resize() {
        PX = Math.max(3, Math.round(innerHeight / 175));
        vw = Math.ceil(innerWidth / PX);
        vh = Math.ceil(innerHeight / PX);
        canvas.width = vw; canvas.height = vh;
        ctx.imageSmoothingEnabled = false;
        applyBiome();
      }
      addEventListener('resize', resize);

      // ---------- state ----------
      let biome = LS('biome') || 'pond';
      let timeMode = LS('time') || 'auto'; // auto|dawn|day|dusk|night
      let season = LS('season') || 'auto'; // auto|spring|summer|autumn|winter
      function seasonNow() {
        const o = new URLSearchParams(location.search).get('season');
        if (o) return o;
        if (season !== 'auto') return season;
        const m = new Date().getMonth(); // 0=Jan, northern hemisphere
        return m < 2 || m === 11 ? 'winter' : m < 5 ? 'spring' : m < 8 ? 'summer' : 'autumn';
      }
      function nowHour() {
        const q = new URLSearchParams(location.search);
        if (q.get('hour') != null) return parseFloat(q.get('hour'));
        if (timeMode === 'dawn') return 6.4;
        if (timeMode === 'day') return 13;
        if (timeMode === 'dusk') return 18.6;
        if (timeMode === 'night') return 23;
        const d = new Date();
        return d.getHours() + d.getMinutes() / 60;
      }

      // ---------- generic helpers ----------
      function fillUnder(curve, color) {
        ctx.fillStyle = rgb(color);
        ctx.beginPath();
        ctx.moveTo(0, vh);
        for (let x = 0; x <= vw; x++) ctx.lineTo(x, curve(x));
        ctx.lineTo(vw, vh);
        ctx.closePath();
        ctx.fill();
      }
      function drawSprite(map, color, x, y, light, alpha, flip) {
        const w = map[0].length;
        ctx.globalAlpha = alpha == null ? 1 : alpha;
        ctx.fillStyle = rgb(dim(color, light));
        for (let r = 0; r < map.length; r++)
          for (let c = 0; c < w; c++)
            if (map[r][c] !== '.') ctx.fillRect((flip ? x + (w - 1 - c) : x + c) | 0, (y + r) | 0, 1, 1);
        ctx.globalAlpha = 1;
      }
      const BIRD_A = ['#...#', '.#.#.', '..#..'], BIRD_B = ['.....', '#...#', '.###.'];
      const DUCK = ['....HHH.....', '...HHHHHe...', '...HHHHHBB..', '...nnnn.....', '..cbbbbbd...', '.cbbbbbbbd..', '.dbbbbbbt...', '..wwwwww....'];
      const DPAL = {H: [31, 122, 61], e: [10, 12, 8], B: [240, 194, 74], n: [230, 238, 228], c: [176, 150, 118], b: [120, 96, 70], d: [80, 62, 44], t: [70, 56, 40], w: [200, 225, 228]};
      function drawDuck(x, y, flip, light) {
        const w = DUCK[0].length;
        for (let r = 0; r < DUCK.length; r++)
          for (let c = 0; c < w; c++) {
            const ch = DUCK[r][c];
            if (ch === '.') continue;
            ctx.fillStyle = rgb(dim(DPAL[ch], light));
            ctx.fillRect((flip ? x + (w - 1 - c) : x + c) | 0, (y + r) | 0, 1, 1);
          }
      }

      // shared scene actors
      let stars = [], clouds = [], birds = [], rainDrops = [], ripples = [];
      function initShared() {
        stars = [];
        for (let i = 0; i < 60; i++) stars.push({x: Math.random() * vw, y: Math.random() * horizon * 0.95, ph: Math.random() * 6.28});
        clouds = [];
        for (let i = 0; i < 4; i++) clouds.push({x: Math.random() * vw, y: 3 + Math.random() * horizon * 0.45, s: 0.04 + Math.random() * 0.05, w: 8 + Math.random() * 10});
        birds = [];
        for (let i = 0; i < 2; i++) birds.push({x: Math.random() * vw, y: horizon * (0.2 + Math.random() * 0.35), sp: 0.14 + Math.random() * 0.1, flap: Math.random() * 36});
        rainDrops = [];
        for (let i = 0; i < 140; i++) rainDrops.push({x: Math.random() * vw, y: Math.random() * vh, l: 3 + Math.random() * 3, sp: 1.2 + Math.random() * 0.8});
        ripples = [];
      }
      function drawSky(P, T) {
        for (let y = 0; y < horizon; y++) { ctx.fillStyle = rgb(mix(P.t, P.hz, y / horizon)); ctx.fillRect(0, y, vw, 1); }
        if (P.st > 0.05) {
          ctx.fillStyle = '#fff';
          for (const s of stars) { ctx.globalAlpha = P.st * (0.35 + 0.65 * ((Math.sin(T * 2 + s.ph) + 1) / 2)); ctx.fillRect(s.x | 0, s.y | 0, 1, 1); }
          ctx.globalAlpha = 1;
        }
        const h = nowHour();
        let bx, by, sun;
        if (h >= 6 && h <= 19) { const f = (h - 6) / 13; bx = vw * f; by = horizon - Math.sin(f * Math.PI) * horizon * 0.8; sun = true; }
        else { const nh = h < 6 ? h + 24 : h, f = (nh - 19) / 11; bx = vw * f; by = horizon - Math.sin(f * Math.PI) * horizon * 0.6; sun = false; }
        const rad = Math.max(2, Math.round(vh * 0.03));
        ctx.fillStyle = rgb(P.su);
        ctx.beginPath(); ctx.arc(bx, by, rad, 0, 6.2832); ctx.fill();
        if (!sun) { ctx.fillStyle = rgb(mix(P.t, P.hz, by / horizon)); ctx.beginPath(); ctx.arc(bx + rad * 0.5, by - rad * 0.4, rad, 0, 6.2832); ctx.fill(); }
        skyBody = {x: bx, y: by, sun};
        for (const cl of clouds) {
          if (!reduce.matches) { cl.x += cl.s; if (cl.x - cl.w > vw) cl.x = -cl.w; }
          ctx.globalAlpha = 0.8; ctx.fillStyle = rgb(dim([245, 248, 252], 0.55 + P.li * 0.45));
          const x = cl.x | 0, y = cl.y | 0, w = cl.w | 0;
          ctx.fillRect(x, y + 2, w, 3); ctx.fillRect(x + 2, y, w - 5, 3); ctx.fillRect(x + (w * 0.4) | 0, y - 1, (w * 0.4) | 0, 3);
          ctx.globalAlpha = 1;
        }
      }
      let skyBody = {x: 0, y: 0, sun: true};
      function drawBirds(P, reduced) {
        for (const bd of birds) {
          if (!reduced) { bd.x += bd.sp; if (bd.x > vw + 4) { bd.x = -4; bd.y = horizon * (0.2 + Math.random() * 0.35); } bd.flap = (bd.flap + 1) % 36; }
          drawSprite(bd.flap < 18 ? BIRD_A : BIRD_B, [30, 30, 40], bd.x | 0, bd.y | 0, P.li * 0.7, 0.85);
        }
      }
      function fireflies(P, T, reduced, top) {
        if (P.st <= 0.25) return;
        for (const ff of ffList) {
          if (!reduced) {
            ff.x += ff.vx; ff.y += ff.vy;
            if (Math.random() < 0.02) { ff.vx = (Math.random() - 0.5) * 0.08; ff.vy = (Math.random() - 0.5) * 0.08; }
            if (ff.x < 0 || ff.x > vw) ff.vx *= -1;
            if (ff.y < top || ff.y > vh) ff.vy *= -1;
          }
          ctx.globalAlpha = ((Math.sin(T * 3 + ff.ph) + 1) / 2) * 0.9 * Math.min(1, (P.st - 0.25) * 3);
          ctx.fillStyle = '#dff58a'; ctx.fillRect(ff.x | 0, ff.y | 0, 1, 1);
        }
        ctx.globalAlpha = 1;
      }
      let ffList = [];
      function drawRain(P, T, reduced) {
        ctx.strokeStyle = 'rgba(180,205,225,0.5)'; ctx.lineWidth = 1;
        ctx.beginPath();
        for (const d of rainDrops) {
          if (!reduced) { d.y += d.sp * 3; d.x += 0.6; if (d.y > vh) { d.y = -4; d.x = Math.random() * vw; } }
          ctx.moveTo(d.x, d.y); ctx.lineTo(d.x - 1, d.y + d.l);
        }
        ctx.stroke();
      }
      function ripplesDraw(P, reduced, col) {
        for (let i = ripples.length - 1; i >= 0; i--) {
          const r = ripples[i];
          if (!reduced) { r.r += 0.25; r.life -= 0.012; }
          if (r.life <= 0) { ripples.splice(i, 1); continue; }
          ctx.globalAlpha = r.life * 0.5; ctx.strokeStyle = rgb(col); ctx.lineWidth = 1;
          ctx.beginPath(); ctx.ellipse(r.x, r.y, Math.max(1, r.r), Math.max(0.6, r.r * 0.35), 0, 0, 6.2832); ctx.stroke();
        }
        ctx.globalAlpha = 1;
      }

      // seasonal particles: falling leaves (autumn) / snow (winter) / blossom petals (spring)
      let flakes = [], flakeType = '';
      function ensureFlakes(type) {
        if (type === flakeType && flakes.length) return;
        flakeType = type; flakes = [];
        if (type === 'none') return;
        const n = type === 'leaf' ? 34 : type === 'snow' ? 90 : 54;
        for (let i = 0; i < n; i++) flakes.push({x: Math.random() * vw, y: Math.random() * vh, ph: Math.random() * 6.28, sp: 0.2 + Math.random() * 0.5, c: LEAFCOL[(Math.random() * LEAFCOL.length) | 0]});
      }
      function drawFlakes(P, T, reduced) {
        ensureFlakes(SEASONS[seasonNow()].particle);
        if (flakeType === 'none') return;
        for (const f of flakes) {
          if (!reduced) {
            f.y += f.sp * (flakeType === 'snow' ? 0.8 : flakeType === 'petal' ? 0.9 : 1.4);
            f.x += Math.sin(T * 1.1 + f.ph) * (flakeType === 'snow' ? 0.4 : 0.85) + (flakeType === 'leaf' ? 0.25 : 0);
            if (f.y > vh + 2) { f.y = -3; f.x = Math.random() * vw; }
            if (f.x > vw + 3) f.x = -3; else if (f.x < -3) f.x = vw + 3;
          }
          if (flakeType === 'snow') { ctx.globalAlpha = 0.9; ctx.fillStyle = rgb(dim([240, 248, 255], 0.55 + P.li * 0.45)); ctx.fillRect(f.x | 0, f.y | 0, 1, 1); }
          else if (flakeType === 'petal') { ctx.globalAlpha = 0.85; ctx.fillStyle = rgb(dim([250, 198, 218], 0.5 + P.li * 0.5)); ctx.fillRect(f.x | 0, f.y | 0, 1, 1); }
          else { ctx.globalAlpha = 0.92; ctx.fillStyle = rgb(dim(f.c, 0.45 + P.li * 0.55)); ctx.fillRect(f.x | 0, f.y | 0, 2, 1); }
        }
        ctx.globalAlpha = 1;
      }

      // water surface (reflection + shimmer + sun glitter), used by pond/mountains
      function water(topY, P, T, reduced, baseCol) {
        for (let y = topY; y < vh; y++) {
          const mir = 2 * topY - y;
          const sky = mix(P.t, P.hz, Math.max(0, Math.min(1, mir / horizon)));
          const depth = (y - topY) / (vh - topY || 1);
          let col = mix(dim(sky, 0.6), baseCol, 0.5 + depth * 0.3);
          const sh = 1 + (reduced ? 0 : 0.07 * Math.sin(y * 0.7 + T * 1.6));
          ctx.fillStyle = rgb(dim(col, sh)); ctx.fillRect(0, y, vw, 1);
        }
        for (let y = topY + 1; y < vh; y++) {
          if (Math.random() < 0.5) continue;
          const depth = (y - topY) / (vh - topY || 1);
          const wob = (reduced ? 0 : Math.sin(y * 0.9 + T * 2.2)) * (1 + depth * 5);
          ctx.globalAlpha = (1 - depth) * 0.5; ctx.fillStyle = rgb(P.su);
          ctx.fillRect((skyBody.x + wob) | 0, y, 1 + (depth > 0.5 ? 1 : 0), 1);
        }
        ctx.globalAlpha = 1;
      }

      // waterfall down a cliff into a pool
      function waterfall(x, w, topY, botY, P, T, reduced) {
        ctx.fillStyle = rgb(tint([60, 70, 64], P)); // rock face
        ctx.fillRect(x - 2, topY, w + 4, botY - topY);
        for (let c = 0; c < w; c++) {
          const cx = x + c;
          for (let y = topY; y < botY; y++) {
            const flow = ((y * 0.5 - (reduced ? 0 : T * 18) + c * 7) % 6 + 6) % 6;
            const bright = flow < 1.5 ? 1 : flow < 3 ? 0.7 : 0.5;
            const edge = c === 0 || c === w - 1 ? 1.1 : 1;
            ctx.fillStyle = rgb(dim(mix([150, 200, 230], [235, 248, 252], bright), edge * P.li));
            if (Math.random() < 0.85) ctx.fillRect(cx, y, 1, 1);
          }
        }
        // splash pool
        ctx.fillStyle = rgb(dim([225, 245, 250], P.li));
        ctx.fillRect(x - 3, botY - 1, w + 6, 2);
        if (!reduced && Math.random() < 0.5) ripples.push({x: x + Math.random() * w, y: botY + 1, r: 1, life: 0.7});
        // mist
        for (let i = 0; i < 6; i++) {
          ctx.globalAlpha = 0.12 + Math.random() * 0.1; ctx.fillStyle = '#dfeef2';
          ctx.fillRect((x + Math.random() * w) | 0, (botY - 2 - (reduced ? 0 : (T * 4 + i * 5) % 8)) | 0, 1, 1);
        }
        ctx.globalAlpha = 1;
      }

      // a tall jungle tree: trunk rising from the bank to a canopy dome up high
      function jungleTree(x, baseY, h, w, P, depth) {
        const tw = Math.max(2, Math.round(w * 0.2));
        const top = baseY - h;
        ctx.fillStyle = rgb(tint([52, 36, 24], P));
        ctx.fillRect((x - tw / 2) | 0, top | 0, tw, h | 0);
        // base canopy mass
        ctx.fillStyle = rgb(tint([22, 78 + depth * 26, 44], P));
        for (const [dx, dy, r] of [[0, 0, 1], [-0.7, 0.3, 0.72], [0.7, 0.3, 0.72], [-1.1, 0.15, 0.5], [1.1, 0.15, 0.5]]) { ctx.beginPath(); ctx.arc(x + dx * w, top + dy * w, r * w, 0, 6.2832); ctx.fill(); }
        // shaded underside (volume)
        ctx.fillStyle = rgb(tint([13, 50, 28], P));
        for (const [dx, dy, r] of [[-0.4, 0.72, 0.58], [0.4, 0.72, 0.58]]) { ctx.beginPath(); ctx.arc(x + dx * w, top + dy * w, r * w, 0, 6.2832); ctx.fill(); }
        // sunlit crown, light from upper-left (asymmetric — never reads as a face)
        ctx.fillStyle = rgb(tint([42, 110 + depth * 18, 62], P));
        ctx.beginPath(); ctx.arc(x - w * 0.12, top - w * 0.52, w * 0.66, 0, 6.2832); ctx.fill();
        ctx.beginPath(); ctx.arc(x - w * 0.62, top - w * 0.12, w * 0.46, 0, 6.2832); ctx.fill();
      }
      // a big foreground leaf silhouette for framing the jungle
      function bigLeaf(cx, cy, r, ang, P) {
        ctx.save(); ctx.translate(cx, cy); ctx.rotate(ang);
        ctx.fillStyle = rgb(tint([16, 50, 28], P));
        ctx.beginPath(); ctx.ellipse(0, 0, r, r * 0.42, 0, 0, 6.2832); ctx.fill();
        ctx.strokeStyle = rgb(tint([9, 32, 18], P)); ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(-r, 0); ctx.lineTo(r, 0); ctx.stroke();
        ctx.restore();
      }

      // small broadleaf tree dotted across the vista's hills
      function roundTree(x, gy, h, P, hue) {
        const w = h * 0.5;
        ctx.fillStyle = rgb(tint([58, 42, 28], P)); ctx.fillRect((x - 1) | 0, (gy - h * 0.55) | 0, 2, Math.ceil(h * 0.55));
        ctx.fillStyle = rgb(tint([40, 96 + (hue || 0), 52], P));
        for (const [dx, dy, r] of [[0, -0.62, 1], [-0.6, -0.4, 0.66], [0.6, -0.4, 0.66]]) { ctx.beginPath(); ctx.arc(x + dx * w, gy + dy * h, r * w, 0, 6.2832); ctx.fill(); }
        ctx.fillStyle = rgb(tint([54, 120 + (hue || 0), 64], P));
        ctx.beginPath(); ctx.arc(x - w * 0.25, gy - h * 0.78, w * 0.5, 0, 6.2832); ctx.fill();
      }
      // a layered conifer
      function pineTree(x, gy, h, P) {
        ctx.fillStyle = rgb(tint([60, 44, 28], P)); ctx.fillRect((x - 0.5) | 0, (gy - h * 0.12) | 0, 1, Math.ceil(h * 0.12));
        ctx.fillStyle = rgb(tint([26, 64, 42], P));
        for (let k = 0; k < 3; k++) { const yy = gy - h * (0.1 + k * 0.28), ww = h * (0.34 - k * 0.08); ctx.beginPath(); ctx.moveTo(x, yy - h * 0.32); ctx.lineTo(x - ww, yy); ctx.lineTo(x + ww, yy); ctx.fill(); }
      }
      // a grazing deer silhouette (12x9, faces right; flip for left)
      const DEER = ['..........#.', '.........#.#', '..#.......##', '..##....###.', '..#########.', '.##########.', '.##########.', '..#.##.##...', '..#.##.#.#..'];
      function drawDeer(x, y, flip, P) {
        ctx.fillStyle = rgb(tint([66, 46, 32], P));
        const w = DEER[0].length;

            for (const fl of flowers) { const sw = reduced ? 0 : Math.sin(T * 1.2 + fl.ph) * 0.6; ctx.fillStyle = rgb(tint(fl.c, P)); ctx.fillRect((fl.x + sw) | 0, fl.y | 0, 1, 1); }
            if (P.st < 0.5) for (const bf of butterflies) {
              if (!reduced) { bf.x += bf.vx; bf.y += bf.vy; bf.flap += 0.5; if (Math.random() < 0.03) { bf.vx = (Math.random() - 0.5) * 0.4; bf.vy = (Math.random() - 0.5) * 0.3; } if (bf.x < 2 || bf.x > vw - 2) bf.vx *= -1; if (bf.y < vh * 0.42 || bf.y > pondY) bf.vy *= -1; }
              const x = bf.x | 0, y = bf.y | 0, up = (bf.flap | 0) % 2 === 0; ctx.fillStyle = rgb(tint(bf.c, P));
              ctx.fillRect(x - 1, up ? y - 1 : y, 1, 1); ctx.fillRect(x + 1, up ? y - 1 : y, 1, 1);
            }
            fireflies(P, T, reduced, pondY);
          }
        }
      };
      const FLO = [[230, 80, 90], [240, 210, 90], [240, 240, 245], [225, 130, 200], [150, 120, 230]];
      let rain = LS('rain') === '1';

      // ---------- main loop ----------
      function draw(now) {
        requestAnimationFrame(draw);
        if (document.hidden) return;
        const reduced = reduce.matches, T = reduced ? 0 : now / 1000, P = tod(nowHour());
        // resolve the active season into a colour grade, eased out toward night
        const sb = SEASONS[seasonNow()], k = 1 - 0.5 * P.st;
        seasonGrade = {mul: [1 + (sb.mul[0] - 1) * k, 1 + (sb.mul[1] - 1) * k, 1 + (sb.mul[2] - 1) * k], add: [sb.add[0] * k, sb.add[1] * k, sb.add[2] * k], desat: sb.desat * k};
        drawSky(P, T);
        BIOME[biome].draw(P, T, reduced);
        drawBirds(P, reduced);
        if (rain) drawRain(P, T, reduced);
        drawFlakes(P, T, reduced);
      }
      requestAnimationFrame(draw);

      // ---------- custom controls UI ----------
      const BLIST = [['pond', '🦆 Pond'], ['meadow', '🌼 Meadow'], ['beach', '🏖️ Beach'], ['mountains', '⛰️ Mountains'], ['rainforest', '🌴 Jungle'], ['wilds', '🏞️ Wilds']];
      const TLIST = [['auto', 'Auto'], ['dawn', 'Dawn'], ['day', 'Day'], ['dusk', 'Dusk'], ['night', 'Night']];
      const SLIST = [['auto', 'Auto'], ['spring', 'Spring'], ['summer', 'Summer'], ['autumn', 'Autumn'], ['winter', 'Winter']];
      const uiB = document.getElementById('uiBiomes'), uiT = document.getElementById('uiTimes'), uiS = document.getElementById('uiSeasons');
      function mkBtn(label, on, fn) { const b = document.createElement('button'); b.textContent = label; if (on) b.className = 'on'; b.addEventListener('click', fn); return b; }
      function lbl(text, row) { const s = document.createElement('span'); s.className = 'lbl'; s.textContent = text; row.appendChild(s); }
      function buildUI() {
        uiB.textContent = ''; uiT.textContent = ''; uiS.textContent = '';
        BLIST.forEach(([k, l]) => uiB.appendChild(mkBtn(l, k === biome, () => { biome = k; LS('biome', k); applyBiome(); buildUI(); })));
        lbl('time', uiT);
        TLIST.forEach(([k, l]) => uiT.appendChild(mkBtn(l, k === timeMode, () => { timeMode = k; LS('time', k); buildUI(); })));
        uiT.appendChild(mkBtn('🌧️ Rain', rain, () => { rain = !rain; LS('rain', rain ? '1' : '0'); buildUI(); }));
        lbl('season', uiS);
        SLIST.forEach(([k, l]) => uiS.appendChild(mkBtn(l, k === season, () => { season = k; LS('season', k); flakeType = ''; buildUI(); })));
      }
      buildUI();
      resize();

      // ---------- host bridge ----------
      let shown = false;
      function setShown(v) { shown = v; document.body.classList.toggle('shown', v); window.parent.postMessage({type: 'shaderwall', state: v ? 'shown' : 'hidden'}, location.origin); }
      addEventListener('message', (e) => { if (e.origin != location.origin) return; const d = e.data || {}; if (d.type !== 'shaderwall') return; if (d.action === 'show') setShown(true); else if (d.action === 'hide') setShown(false); else if (d.action === 'toggle') setShown(!shown); });
      addEventListener('keydown', (e) => { if (e.key === 'h' || e.key === 'H') setShown(!shown); });
      setShown(false);
    </script>
  </body>
</html>
