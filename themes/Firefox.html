<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Firefox</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #1c1b22;
      }
      /* The writeup is rendered inside a real (WASM) Firefox that fills the
         view. Switching themes is handled by the host page's ✦ wallpaper
         controls, so this theme adds no chrome of its own. */
      .fx {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        border: 0;
        display: block;
      }
    </style>
  </head>
  <body>
    <iframe class="fx" id="fx" title="Firefox (WebAssembly)"></iframe>

    <script>
      'use strict';

      const SITE = 'https://ndevtk.github.io/writeups/';

      // The page to show inside Firefox: the writeup the visitor is reading.
      function ourUrl() {
        try {
          if (window.parent && window.parent !== window) {
            const h = window.parent.location.href;
            if (/^https?:\/\//.test(h)) return h;
          }
        } catch (e) {}
        return SITE;
      }

      // Embed firefox-wasm full-screen; it auto-boots and opens the writeup.
      const fx = document.getElementById('fx');
      fx.src = '/writeups/firefox-wasm/?url=' + encodeURIComponent(ourUrl());
      // `autoplay` clears the embedded browser to start its audio graph so
      // media in the writeup can play (sound still needs a click first, per
      // the browser autoplay policy).
      fx.allow = 'cross-origin-isolated; fullscreen; clipboard-write; autoplay';

      // ---------- host bridge (shaderwall protocol) ----------
      // Forward by default (Firefox covers the page); the ✦ toggle drops it
      // behind so the plain page shows through.
      let shown = false;
      function setShown(state) {
        shown = state !== 'hidden';
        window.parent.postMessage({type: 'shaderwall', state}, location.origin);
      }
      // Mirror the embedded Firefox's active tab into the real address bar,
      // but only for pages on this same site: the History API can't set a
      // cross-origin URL (it throws), and we don't want to leak where the
      // reader browses off-site into the host's location.
      function syncLocation(raw) {
        try {
          const top = window.top;
          const u = new URL(raw, location.href);
          if (u.origin !== top.location.origin) return;
          top.history.replaceState(null, '', u.pathname + u.search + u.hash);
        } catch (e) {}
      }
      addEventListener('message', (e) => {
        if (e.origin != location.origin) return;
        const d = e.data || {};
        if (d.type === 'gecko-location') {
          if (typeof d.url === 'string') syncLocation(d.url);
          return;
        }
        if (d.type !== 'shaderwall') return;
        if (d.action === 'show') setShown('bare');
        else if (d.action === 'hide') setShown('hidden');
        else if (d.action === 'toggle') setShown(shown ? 'hidden' : 'bare');
      });
      addEventListener('keydown', (e) => {
        if (e.key === 'h' || e.key === 'H') setShown(shown ? 'hidden' : 'bare');
      });
      setShown('bare');
    </script>
  </body>
</html>
