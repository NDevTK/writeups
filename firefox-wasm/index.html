<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Firefox in WebAssembly</title>
    <link id="favicon" rel="icon" type="image/webp" href="logo.webp" />
    <!-- Self-host everything; the only external calls are Google Fonts (below)
         and the WISP network proxy the engine browses through. Cross-origin
         isolation (for SharedArrayBuffer / Gecko's threads) is synthesised by
         the writeups service worker, whose scope covers this path. Loaded here
         too so the build is isolated even when opened on its own. -->
    <script src="/writeups/coi-serviceworker.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@100;300;400;500;700;900&display=swap"
      rel="stylesheet" />
    <script type="module" src="./assets/app.js"></script>
    <link rel="stylesheet" href="./assets/app.css" />
  </head>
  <body>
    <section id="splash" aria-live="polite">
      <header class="top-nav">
        <div class="nav-left">
          <span class="nav-brand-label"
            >Firefox <span class="labs-badge">WASM</span></span
          >
        </div>
        <div class="nav-links">
          <a
            class="nav-link"
            href="https://github.com/HeyPuter/firefox-wasm"
            target="_blank"
            rel="noreferrer"
            aria-label="GitHub">
            <svg
              viewBox="0 0 16 16"
              width="18"
              height="18"
              fill="currentColor"
              aria-hidden="true">
              <path
                d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27s1.36.09 2 .27c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8Z" />
            </svg>
          </a>
        </div>
      </header>
      <main class="stage">
        <div id="splash-shell" class="stage-inner" data-phase="loading">
          <div class="logo-lockup">
            <span class="logo-tile firefox-tile">
              <img class="project-logo" src="logo.webp" alt="Firefox" />
            </span>
            <span class="logo-x" aria-hidden="true">&times;</span>
            <span class="logo-tile wasm-tile">
              <svg
                class="wasm-mark"
                viewBox="97.43 0 107.62 107.62"
                xmlns="http://www.w3.org/2000/svg"
                role="img"
                aria-label="WebAssembly">
                <rect
                  x="97.43"
                  y="0"
                  width="107.62"
                  height="107.62"
                  fill="#fff" />
                <path
                  fill="#654ff0"
                  transform="translate(-0.21)"
                  d="M163.76,0c0,.19,0,.38,0,.58a12.34,12.34,0,0,1-24.68,0c0-.2,0-.39,0-.58H97.64V107.62H205.26V0ZM149,96.1l-5.24-25.93h-.09L138,96.1h-7.22L122.6,58h7.13l4.88,25.93h.09L140.58,58h6.67l5.28,26.25h.09L158.19,58h7L156.1,96.1Zm39.26,0-2.43-8.48H173l-1.87,8.48H164L173.22,58h11.25l11.21,38.1Z" />
                <polygon
                  fill="#654ff0"
                  transform="translate(-0.21)"
                  points="177.3 67.39 174.19 81.37 183.87 81.37 180.3 67.39 177.3 67.39" />
              </svg>
            </span>
          </div>
          <h1 id="project-title" class="splash-title">
            Firefox in WebAssembly
          </h1>
          <p class="project-copy">
            The Gecko engine compiled to WebAssembly.<br />
            The real Firefox interface, rendering entirely inside this browser
            tab.
          </p>

          <div id="stage-card" class="launch-panel" data-phase="loading">
            <div class="panel-loading" aria-label="Loading Firefox">
              <div
                class="progress-track"
                role="progressbar"
                aria-valuemin="0"
                aria-valuemax="100"
                aria-valuenow="0">
                <div id="progress-fill" class="progress-fill"></div>
              </div>
              <div class="progress-meta">
                <span id="progress-phase">Preparing</span>
                <span id="progress-percent"></span>
              </div>
              <p id="splash-status" class="splash-status">Preparing Firefox…</p>
            </div>

            <div class="panel-ready" aria-label="Launch">
              <button id="start-btn" type="button" class="start-btn">
                Launch Firefox
              </button>
              <p id="jspi-note" class="jspi-note" hidden></p>
              <details class="advanced">
                <summary>Advanced options</summary>
                <div class="splash-controls">
                  <label class="option-card">
                    <input type="checkbox" id="opt-gpu" />
                    <span class="option-copy">
                      <strong>GPU acceleration</strong>
                      <span>WebGL-based rendering for web content.</span>
                    </span>
                  </label>
                  <label class="option-card">
                    <input type="checkbox" id="opt-jit" />
                    <span class="option-copy">
                      <strong>Enable JIT</strong>
                      <span>Experimental JS → WASM JIT. Expect bugs.</span>
                    </span>
                  </label>
                  <label class="wisp-field">
                    <span>Wisp server</span>
                    <span class="wisp-copy">
                      WebSocket proxy that tabs load web content through.
                    </span>
                    <input
                      type="text"
                      id="opt-wisp"
                      spellcheck="false"
                      autocomplete="off"
                      aria-label="Wisp server" />
                  </label>
                </div>
              </details>
            </div>
          </div>

          <section class="startup-console" aria-label="Startup console">
            <p class="phase-kicker">Startup log</p>
            <div
              id="console-output"
              class="console-box"
              role="log"
              aria-label="Startup console output"></div>
          </section>
        </div>
      </main>
    </section>
    <canvas id="screen" width="1024" height="768" tabindex="0"></canvas>
  </body>
</html>
