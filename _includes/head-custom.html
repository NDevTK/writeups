<meta
  http-equiv="Content-Security-Policy"
  content="default-src 'self'; script-src 'self' 'inline-speculation-rules'; style-src 'self' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; object-src 'none'; base-uri 'none'; require-trusted-types-for 'script'; connect-src https://api.pwnedpasswords.com;" />
<link rel="icon" href="/writeups/favicon.ico" type="image/x-icon" />
<meta name="fediverse:creator" content="@ndevtk@infosec.exchange" />
<!-- The COOP/COEP service worker that makes the page crossOriginIsolated (for
     the Firefox theme's firefox-wasm SharedArrayBuffer) is registered on demand
     when that theme is selected and removed when leaving it — see js/footer.js.
     It is deliberately not loaded globally, so other pages keep their normal
     cross-origin behaviour and don't take the isolation reload. -->

<noscript>
  <link rel="stylesheet" href="/writeups/themes/noscript.css" />
</noscript>
<!-- Prerender posts -->
<script type="speculationrules">
  {
    "prerender": [
      {
        "source": "document",
        "where": {"href_matches": "/*\\?*#*"},
        "eagerness": "moderate"
      }
    ],
    "prefetch": [
      {
        "source": "document",
        "where": {"not": {"href_matches": "/*\\?*#*"}},
        "eagerness": "moderate"
      }
    ]
  }
</script>

<script src="/writeups/js/themes.js"></script>
